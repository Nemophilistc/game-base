<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMO 城市建设者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    /* ---- 顶部资源栏 ---- */
    #resource-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
      background: rgba(16, 16, 40, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    #resource-bar .res-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
    }

    #resource-bar .res-item.good { color: #4CAF50; }
    #resource-bar .res-item.warn { color: #FF9800; }
    #resource-bar .res-item.bad { color: #F44336; }

    #res-title {
      font-size: 18px;
      font-weight: bold;
      color: #4fc3f7;
      margin-right: 10px;
      letter-spacing: 1px;
    }

    #speed-controls {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .speed-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ccc;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .speed-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .speed-btn.active {
      background: rgba(79, 195, 247, 0.25);
      border-color: #4fc3f7;
      color: #4fc3f7;
    }

    #btn-help {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ccc;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 8px;
    }

    #btn-help:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* ---- 左侧建筑面板 ---- */
    #building-panel {
      position: fixed;
      top: 60px;
      left: 10px;
      width: 110px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: rgba(16, 16, 40, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px;
      z-index: 100;
    }

    #building-panel::-webkit-scrollbar {
      width: 4px;
    }

    #building-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: bold;
      color: #4fc3f7;
      text-align: center;
      padding-bottom: 6px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .building-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid transparent;
    }

    .building-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .building-btn.selected {
      background: rgba(79, 195, 247, 0.15);
      border-color: #4fc3f7;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
    }

    .building-btn.cannot-afford {
      opacity: 0.45;
    }

    .building-icon {
      font-size: 24px;
      line-height: 1;
    }

    .building-name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: 500;
    }

    .building-cost {
      font-size: 11px;
      color: #FFD54F;
      margin-top: 1px;
    }

    /* ---- 底部信息面板 ---- */
    #info-panel {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 360px;
      max-width: 500px;
      background: rgba(16, 16, 40, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 20px;
      z-index: 100;
      transition: opacity 0.2s, transform 0.2s;
    }

    #info-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .info-icon {
      font-size: 28px;
    }

    .info-name {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .info-level {
      font-size: 14px;
      color: #FFD700;
      font-weight: bold;
    }

    .info-details {
      font-size: 13px;
      color: #b0bec5;
      margin-bottom: 4px;
      line-height: 1.6;
    }

    .info-maint {
      font-size: 12px;
      color: #ef9a9a;
      margin-bottom: 10px;
    }

    .info-actions {
      display: flex;
      gap: 10px;
    }

    .btn-upgrade, .btn-demolish {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-upgrade {
      background: #4CAF50;
      color: #fff;
    }

    .btn-upgrade:hover {
      background: #66BB6A;
      box-shadow: 0 2px 8px rgba(76, 175, 80, 0.4);
    }

    .btn-upgrade.disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
    }

    .btn-demolish {
      background: rgba(244, 67, 54, 0.15);
      color: #EF5350;
      border: 1px solid rgba(244, 67, 54, 0.3);
    }

    .btn-demolish:hover {
      background: rgba(244, 67, 54, 0.3);
    }

    .max-level {
      color: #FFD700;
      font-size: 13px;
    }

    /* ---- 通知 ---- */
    #notifications {
      position: fixed;
      bottom: 130px;
      right: 15px;
      width: 300px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .notification {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: slideIn 0.3s ease;
    }

    .notification.info {
      background: rgba(33, 150, 243, 0.2);
      border: 1px solid rgba(33, 150, 243, 0.3);
      color: #90CAF9;
    }

    .notification.success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #A5D6A7;
    }

    .notification.warn {
      background: rgba(255, 152, 0, 0.2);
      border: 1px solid rgba(255, 152, 0, 0.3);
      color: #FFCC80;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ---- 帮助覆盖层 ---- */
    #help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #help-overlay.hidden {
      display: none;
    }

    .help-content {
      background: rgba(20, 20, 50, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 30px 40px;
      max-width: 500px;
      width: 90%;
    }

    .help-content h2 {
      font-size: 22px;
      color: #4fc3f7;
      margin-bottom: 16px;
      text-align: center;
    }

    .help-content .help-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .help-content .help-key {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }

    .help-content .help-close {
      display: block;
      margin: 20px auto 0;
      padding: 8px 30px;
      background: rgba(79, 195, 247, 0.2);
      border: 1px solid #4fc3f7;
      color: #4fc3f7;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .help-content .help-close:hover {
      background: rgba(79, 195, 247, 0.35);
    }

    /* ---- 快捷键提示 ---- */
    #shortcut-hint {
      position: fixed;
      bottom: 15px;
      right: 15px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      z-index: 50;
    }

    #shortcut-hint kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <!-- 顶部资源栏 -->
  <div id="resource-bar">
    <span id="res-title">🏙️ 城市建设者</span>
    <span class="res-item" id="res-gold">💰 1000</span>
    <span class="res-item" id="res-pop">👥 0/0</span>
    <span class="res-item" id="res-food">🍎 50</span>
    <span class="res-item" id="res-power">⚡ 0/0</span>
    <span class="res-item good" id="res-satisfaction">😊 50%</span>
    <span class="res-item" id="res-day">📅 第1天</span>
    <span class="res-item" id="res-time">☀️ 白天</span>
    <button id="btn-help">? 帮助</button>
  </div>

  <!-- 左侧建筑面板 -->
  <div id="building-panel"></div>

  <!-- 底部信息面板 -->
  <div id="info-panel" class="hidden"></div>

  <!-- 通知区域 -->
  <div id="notifications"></div>

  <!-- 快捷键提示 -->
  <div id="shortcut-hint">
    <kbd>1</kbd>-<kbd>0</kbd> 选择建筑 &nbsp;
    <kbd>+</kbd> 升级 &nbsp;
    <kbd>-</kbd> 拆除 &nbsp;
    <kbd>Esc</kbd> 取消 &nbsp;
    <kbd>H</kbd> 帮助
  </div>

  <!-- 帮助覆盖层 -->
  <div id="help-overlay" class="hidden">
    <div class="help-content">
      <h2>🏙️ 城市建设者 - 操作指南</h2>
      <div class="help-row"><span>选择建筑</span><span class="help-key">左侧面板 或 1-0</span></div>
      <div class="help-row"><span>放置建筑</span><span class="help-key">左键点击地图</span></div>
      <div class="help-row"><span>移动视角</span><span class="help-key">左键拖拽</span></div>
      <div class="help-row"><span>缩放</span><span class="help-key">鼠标滚轮</span></div>
      <div class="help-row"><span>选中建筑</span><span class="help-key">左键点击已有建筑</span></div>
      <div class="help-row"><span>升级建筑</span><span class="help-key">选中后按 +</span></div>
      <div class="help-row"><span>拆除建筑</span><span class="help-key">选中后按 - 或 Delete</span></div>
      <div class="help-row"><span>取消选择</span><span class="help-key">Esc</span></div>
      <div class="help-row"><span>游戏速度</span><span class="help-key">右上角 x1/x2/x3</span></div>
      <button class="help-close" onclick="document.getElementById('help-overlay').classList.add('hidden')">知道了</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
