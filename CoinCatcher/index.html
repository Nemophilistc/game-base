    <script>
        // roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (Array.isArray(radii) ? radii[0] : 0);
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.arcTo(x + w, y, x + w, y + r, r);
                this.lineTo(x + w, y + h - r);
                this.arcTo(x + w, y + h, x + w - r, y + h, r);
                this.lineTo(x + r, y + h);
                this.arcTo(x, y + h, x, y + h - r, r);
                this.lineTo(x, y + r);
                this.arcTo(x, y, x + r, y, r);
                this.closePath();
                return this;
            };
        }
    </script>

// === ./sound.js ===
// sound.js - Web Audio API sound effects

let audioCtx = null;
let masterGain = null;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    return audioCtx;
}

function playTone(freq, duration, type = 'sine', gainVal = 0.3, detune = 0) {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(gainVal, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
}

function playNoise(duration, gainVal = 0.2) {
    const ctx = ensureAudio();
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(gainVal, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 3000;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    source.start(ctx.currentTime);
    source.stop(ctx.currentTime + duration);
}

const Sound = {
    init() {
        ensureAudio();
    },

    coinCatch(combo = 0) {
        const baseFreq = 600 + combo * 80;
        playTone(baseFreq, 0.15, 'sine', 0.25);

// === ./player.js ===
// player.js - Player basket with movement


class Player {
    constructor(canvasHeight) {
        this.width = BASKET_WIDTH;
        this.height = BASKET_HEIGHT;
        this.x = GAME_WIDTH / 2 - this.width / 2;
        this.y = canvasHeight - BASKET_Y_OFFSET - this.height;
        this.speed = BASKET_SPEED;
        this.baseSpeed = BASKET_SPEED;
        this.vx = 0;

        // Visual feedback
        this.catchFlash = 0;
        this.missFlash = 0;
        this.tilt = 0;

        // Slow debuff
        this.slowTimer = 0;
        this.isSlowed = false;

        // Power-up states
        this.hasShield = false;
        this.hasMagnet = false;
        this.magnetTimer = 0;
        this.multiplier = 1;
        this.multiplierTimer = 0;
        this.shieldUsed = false;
    }

    get centerX() {
        return this.x + this.width / 2;
    }

    get centerY() {
        return this.y + this.height / 2;
    }

    get bounds() {
        return {
            left: this.x,
            right: this.x + this.width,
            top: this.y,
            bottom: this.y + this.height,
        };
    }

    applySlow(duration) {
        this.slowTimer = duration;
        this.isSlowed = true;
        this.speed = this.baseSpeed * 0.5;
    }

    activateMagnet(duration) {
        this.hasMagnet = true;
        this.magnetTimer = duration;
    }

    activateShield() {
        this.hasShield = true;
    }

    activateMultiplier(duration) {
        this.multiplier = 2;
        this.multiplierTimer = duration;
    }

    onCatch() {
        this.catchFlash = 0.3;
    }

    onMiss() {
        this.missFlash = 0.3;
        this.tilt = (Math.random() - 0.5) * 0.3;
    }

    update(dt, keys, mouseX) {
        // Movement from keyboard
        let moveDir = 0;
        if (keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) moveDir -= 1;
        if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) moveDir += 1;

        // Mouse/touch override - direct lerp for fast tracking
        if (mouseX !== null) {
            const targetX = mouseX - this.width / 2;
            const diff = targetX - this.x;
            if (Math.abs(diff) > 1) {
                // Lerp directly toward mouse with high factor for responsive feel
                const lerpFactor = 1 - Math.pow(0.05, dt); // ~0.85 effective per frame at 60fps
                this.x += diff * lerpFactor;
                this.vx = diff * lerpFactor / dt;
            } else {
                this.x = targetX;
                this.vx = 0;
            }
        } else {
            // Apply keyboard velocity
            this.vx = moveDir * this.speed;
            this.x += this.vx * dt;
        }

        // Clamp to bounds
        this.x = Math.max(0, Math.min(GAME_WIDTH - this.width, this.x));

        // Update timers
        if (this.slowTimer > 0) {
            this.slowTimer -= dt * 1000;
            if (this.slowTimer <= 0) {
                this.isSlowed = false;
                this.speed = this.baseSpeed;
            }
        }

        if (this.magnetTimer > 0) {
            this.magnetTimer -= dt * 1000;
            if (this.magnetTimer <= 0) {
                this.hasMagnet = false;
            }
        }

        if (this.multiplierTimer > 0) {
            this.multiplierTimer -= dt * 1000;
            if (this.multiplierTimer <= 0) {
                this.multiplier = 1;
            }
        }

        // Visual feedback decay
        this.catchFlash = Math.max(0, this.catchFlash - dt * 2);
        this.missFlash = Math.max(0, this.missFlash - dt * 2);
        this.tilt *= 0.95;
    }

    draw(ctx) {
        ctx.save();

        // Screen feedback tint
        if (this.catchFlash > 0) {
            ctx.globalAlpha = this.catchFlash;
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.globalAlpha = 1;
        }
        if (this.missFlash > 0) {
            ctx.globalAlpha = this.missFlash * 0.5;
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.globalAlpha = 1;
        }

        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;

        ctx.translate(cx, cy);
        ctx.rotate(this.tilt);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.roundRect(-this.width / 2 + 3, -this.height / 2 + 3, this.width, this.height, 8);
        ctx.fill();

        // Basket body gradient
        const grad = ctx.createLinearGradient(0, -this.height / 2, 0, this.height / 2);
        if (this.isSlowed) {
            grad.addColorStop(0, '#6D4C41');
            grad.addColorStop(1, '#3E2723');
        } else {
            grad.addColorStop(0, '#FFB300');
            grad.addColorStop(0.5, '#FF8F00');
            grad.addColorStop(1, '#E65100');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
        ctx.fill();

        // Basket rim highlight
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
        ctx.stroke();

        // Inner detail lines (basket weave look)
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        for (let i = -this.width / 2 + 15; i < this.width / 2; i += 15) {
            ctx.beginPath();
            ctx.moveTo(i, -this.height / 2 + 4);
            ctx.lineTo(i, this.height / 2 - 4);
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.moveTo(-this.width / 2 + 4, 0);
        ctx.lineTo(this.width / 2 - 4, 0);
        ctx.stroke();

        // Shield indicator
        if (this.hasShield) {
            ctx.strokeStyle = 'rgba(66, 165, 245, 0.6)';
            ctx.lineWidth = 3;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.ellipse(0, 0, this.width / 2 + 8, this.height / 2 + 8, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Magnet indicator
        if (this.hasMagnet) {
            ctx.strokeStyle = 'rgba(244, 67, 54, 0.5)';
            ctx.lineWidth = 2;
            const pulseR = this.width / 2 + 15 + Math.sin(Date.now() / 200) * 5;
            ctx.beginPath();
            ctx.arc(0, 0, pulseR, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Multiplier glow
        if (this.multiplier > 1) {
            ctx.shadowColor = '#FF6F00';
            ctx.shadowBlur = 20;
            ctx.strokeStyle = '#FF6F00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(-this.width / 2 - 3, -this.height / 2 - 3, this.width + 6, this.height + 6, 10);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }
}

// === ./items.js ===
// items.js - Falling items (coins, power-ups, bombs)


const ALL_ITEMS = Object.values(ITEM_TYPES);

class FallingItem {
    constructor(type, x, fallSpeed) {
        this.type = type;
        this.x = x;
        this.y = -type.size;
        this.size = type.size;
        this.speed = fallSpeed * (0.85 + Math.random() * 0.3);
        this.baseSpeed = this.speed;
        this.alive = true;
        this.caught = false;
        this.missed = false;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 3;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 2 + Math.random() * 2;
        this.wobbleAmp = 15 + Math.random() * 10;
        this.baseX = x;
        this.shimmerPhase = Math.random() * Math.PI * 2;
        this.glowPulse = 0;
        this.magnetized = false;
        this.slowFactor = 1;
    }

    get bounds() {
        return {
            left: this.x - this.size / 2,
            right: this.x + this.size / 2,
            top: this.y - this.size / 2,
            bottom: this.y + this.size / 2,
        };
    }

    update(dt, player, isSlowedGlobal) {
        this.glowPulse += dt * 4;
        this.shimmerPhase += dt * 3;
        this.rotation += this.rotSpeed * dt;
        this.wobble += this.wobbleSpeed * dt;

        // Wobble movement
        const wobbleX = Math.sin(this.wobble) * this.wobbleAmp * dt;

        // Magnet pull
        if (player.hasMagnet && !this.type.danger) {
            const dx = player.centerX - this.x;
            const dy = player.centerY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAGNET_RANGE && dist > 0) {
                const pull = MAGNET_STRENGTH / dist;
                this.x += (dx / dist) * pull * dt;
                this.y += (dy / dist) * pull * dt;
                this.magnetized = true;
            } else {
                this.magnetized = false;
            }
        } else {
            this.magnetized = false;
        }

        // Fall speed with slow power-up
        let effectiveSpeed = this.speed * this.slowFactor;
        if (isSlowedGlobal) {
            effectiveSpeed *= 0.5;
        }

        this.x += wobbleX;
        this.y += effectiveSpeed * dt;

        // Clamp x
        this.x = Math.max(this.size / 2, Math.min(GAME_WIDTH - this.size / 2, this.x));

        // Check if fallen past screen
        if (this.y > 650) {
            this.alive = false;
            this.missed = true;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        const isDanger = this.type.danger;
        const isPowerUp = !!this.type.powerUp;

        // Glow effect
        const glowSize = this.size + 8 + Math.sin(this.glowPulse) * 3;
        if (isDanger) {
            ctx.shadowColor = this.type.glow;
            ctx.shadowBlur = 15 + Math.sin(this.glowPulse * 2) * 5;
        } else if (isPowerUp) {
            ctx.shadowColor = this.type.glow;
            ctx.shadowBlur = 12;
        } else {
            ctx.shadowColor = this.type.glow;
            ctx.shadowBlur = 8 + Math.sin(this.shimmerPhase) * 4;
        }

        ctx.rotate(this.rotation);

        // Draw based on type
        switch (this.type.id) {
            case 'gold_coin':
            case 'silver_coin':
                this._drawCoin(ctx);
                break;
            case 'diamond':
                this._drawDiamond(ctx);
                break;
            case 'star':
                this._drawStar(ctx);
                break;
            case 'bomb':
                this._drawBomb(ctx);
                break;
            case 'rock':
                this._drawRock(ctx);
                break;
            case 'magnet':
                this._drawMagnet(ctx);
                break;
            case 'shield':
                this._drawShield(ctx);
                break;
            case 'slow':
                this._drawSlow(ctx);
                break;
            default:
                this._drawCircle(ctx);
        }

        ctx.shadowBlur = 0;
        ctx.restore();

        // Magnetized indicator
        if (this.magnetized) {
            ctx.save();
            ctx.strokeStyle = 'rgba(244, 67, 54, 0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size + 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    _drawCoin(ctx) {
        const r = this.size / 2;
        const isGold = this.type.id === 'gold_coin';

        // Coin body
        const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
        if (isGold) {
            grad.addColorStop(0, '#FFF176');
            grad.addColorStop(0.4, '#FFD700');
            grad.addColorStop(1, '#FFA000');
        } else {
            grad.addColorStop(0, '#E8E8E8');
            grad.addColorStop(0.4, '#C0C0C0');
            grad.addColorStop(1, '#9E9E9E');
        }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        // Shimmer highlight
        const shimmerAngle = this.shimmerPhase;
        const shimmerX = Math.cos(shimmerAngle) * r * 0.3;
        const shimmerY = Math.sin(shimmerAngle) * r * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(this.shimmerPhase) * 0.2})`;
        ctx.beginPath();
        ctx.ellipse(shimmerX, shimmerY, r * 0.5, r * 0.3, shimmerAngle, 0, Math.PI * 2);
        ctx.fill();

        // Dollar sign
        ctx.fillStyle = isGold ? 'rgba(180,120,0,0.6)' : 'rgba(100,100,100,0.6)';
        ctx.font = `bold ${r * 1.1}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 1);

        // Edge ring
        ctx.strokeStyle = isGold ? 'rgba(255,200,0,0.5)' : 'rgba(200,200,200,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, r - 2, 0, Math.PI * 2);
        ctx.stroke();
    }

    _drawDiamond(ctx) {
        const s = this.size / 2;
        const grad = ctx.createLinearGradient(-s, -s, s, s);
        grad.addColorStop(0, '#B3E5FC');
        grad.addColorStop(0.3, '#00E5FF');
        grad.addColorStop(0.6, '#00B8D4');
        grad.addColorStop(1, '#006064');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.8, -s * 0.2);
        ctx.lineTo(s, s * 0.3);
        ctx.lineTo(0, s);
        ctx.lineTo(-s, s * 0.3);
        ctx.lineTo(-s * 0.8, -s * 0.2);
        ctx.closePath();
        ctx.fill();

        // Facets
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(0, s);
        ctx.moveTo(-s * 0.8, -s * 0.2);
        ctx.lineTo(s * 0.8, -s * 0.2);
        ctx.stroke();

        // Sparkle
        const sp = Math.sin(this.shimmerPhase * 2) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(255,255,255,${sp * 0.8})`;
        ctx.beginPath();
        ctx.arc(-s * 0.2, -s * 0.3, s * 0.15, 0, Math.PI * 2);
        ctx.fill();
    }

    _drawStar(ctx) {
        const outer = this.size / 2;
        const inner = outer * 0.4;
        const spikes = 5;
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, outer);
        grad.addColorStop(0, '#FFF9C4');
        grad.addColorStop(0.5, '#FFD600');
        grad.addColorStop(1, '#FF6F00');

        ctx.fillStyle = grad;
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
            const r = i % 2 === 0 ? outer : inner;
            const angle = (i * Math.PI) / spikes - Math.PI / 2;
            const x = Math.cos(angle) * r;
            const y = Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Glow ring
        ctx.strokeStyle = `rgba(255,200,0,${0.3 + Math.sin(this.glowPulse) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, outer + 3, 0, Math.PI * 2);
        ctx.stroke();
    }

    _drawBomb(ctx) {
        const r = this.size / 2;

        // Body
        const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
        grad.addColorStop(0, '#616161');
        grad.addColorStop(0.5, '#333333');
        grad.addColorStop(1, '#1a1a1a');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 2, r, 0, Math.PI * 2);
        ctx.fill();

        // Fuse
        ctx.strokeStyle = '#8D6E63';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(0, -r + 2);
        ctx.quadraticCurveTo(r * 0.5, -r - 5, r * 0.3, -r - 8);
        ctx.stroke();

        // Fuse spark
        const sparkT = Date.now() / 100;
        ctx.fillStyle = `rgba(255,${150 + Math.sin(sparkT) * 100},0,${0.7 + Math.sin(sparkT * 3) * 0.3})`;
        ctx.beginPath();
        ctx.arc(r * 0.3, -r - 8, 3 + Math.sin(sparkT) * 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Danger glow
        ctx.strokeStyle = `rgba(244,67,54,${0.3 + Math.sin(this.glowPulse * 2) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 2, r + 3, 0, Math.PI * 2);
        ctx.stroke();

        // Skull symbol
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = `${r * 0.9}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✕', 0, 3);
    }

    _drawRock(ctx) {
        const s = this.size / 2;
        ctx.fillStyle = '#795548';
        ctx.beginPath();
        ctx.moveTo(-s * 0.8, s * 0.3);
        ctx.lineTo(-s * 0.5, -s * 0.7);
        ctx.lineTo(s * 0.2, -s);
        ctx.lineTo(s * 0.9, -s * 0.3);
        ctx.lineTo(s * 0.7, s * 0.6);
        ctx.lineTo(-s * 0.1, s);
        ctx.closePath();
        ctx.fill();

        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.moveTo(-s * 0.5, -s * 0.7);
        ctx.lineTo(s * 0.2, -s);
        ctx.lineTo(s * 0.1, -s * 0.2);
        ctx.lineTo(-s * 0.4, 0);
        ctx.closePath();
        ctx.fill();

        // Danger indicator
        ctx.strokeStyle = `rgba(244,67,54,${0.2 + Math.sin(this.glowPulse) * 0.2})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, s + 3, 0, Math.PI * 2);
        ctx.stroke();
    }

    _drawMagnet(ctx) {
        const s = this.size / 2;
        // U-shape magnet
        ctx.lineWidth = s * 0.5;
        ctx.lineCap = 'round';

        // Red half
        ctx.strokeStyle = '#F44336';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.6, Math.PI * 0.1, Math.PI * 0.9);
        ctx.stroke();

        // Blue half
        ctx.strokeStyle = '#2196F3';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.6, Math.PI * 1.1, Math.PI * 1.9);
        ctx.stroke();

        // Poles
        ctx.fillStyle = '#F44336';
        ctx.fillRect(-s * 0.8, -s * 0.3, s * 0.35, s * 0.6);
        ctx.fillStyle = '#2196F3';
        ctx.fillRect(s * 0.45, -s * 0.3, s * 0.35, s * 0.6);
    }

    _drawShield(ctx) {
        const s = this.size / 2;
        ctx.fillStyle = '#42A5F5';
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.9, -s * 0.4);
        ctx.lineTo(s * 0.7, s * 0.6);
        ctx.lineTo(0, s);
        ctx.lineTo(-s * 0.7, s * 0.6);
        ctx.lineTo(-s * 0.9, -s * 0.4);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#1E88E5';
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.5);
        ctx.lineTo(s * 0.4, -s * 0.2);
        ctx.lineTo(s * 0.3, s * 0.3);
        ctx.lineTo(0, s * 0.5);
        ctx.lineTo(-s * 0.3, s * 0.3);
        ctx.lineTo(-s * 0.4, -s * 0.2);
        ctx.closePath();
        ctx.fill();

        // Check mark
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-s * 0.2, 0);
        ctx.lineTo(-s * 0.05, s * 0.2);
        ctx.lineTo(s * 0.25, -s * 0.2);
        ctx.stroke();
    }

    _drawSlow(ctx) {
        const s = this.size / 2;
        // Clock icon
        ctx.fillStyle = '#66BB6A';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2E7D32';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
        ctx.fill();

        // Clock hands
        const t = Date.now() / 1000;
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(t) * s * 0.4, Math.sin(t) * s * 0.4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(t * 0.2) * s * 0.25, Math.sin(t * 0.2) * s * 0.25);
        ctx.stroke();
    }

    _drawCircle(ctx) {
        ctx.fillStyle = this.type.color;
        ctx.beginPath();
        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

class ItemSpawner {
    constructor() {
        this.spawnTimer = 0;
        this.difficultyTime = 0;
    }

    getSpawnInterval(elapsed) {
        const base = 1200 - elapsed * 0.003;
        return Math.max(350, base);
    }

    getFallSpeed(elapsed) {
        return 120 + elapsed * 0.08;
    }

    getWeights(elapsed) {
        // Increase bomb weight over time
        const bombBonus = Math.min(15, elapsed * 0.005);
        const rockBonus = Math.min(8, elapsed * 0.003);
        const powerUpBonus = Math.min(2, elapsed * 0.001);

        return ALL_ITEMS.map(item => {
            if (item.id === 'bomb') return item.weight + bombBonus;
            if (item.id === 'rock') return item.weight + rockBonus;
            if (item.powerUp) return item.weight + powerUpBonus;
            return item.weight;
        });
    }

    pickItemType(elapsed) {
        const weights = this.getWeights(elapsed);
        const total = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * total;
        for (let i = 0; i < ALL_ITEMS.length; i++) {
            r -= weights[i];
            if (r <= 0) return ALL_ITEMS[i];
        }
        return ALL_ITEMS[0];
    }

    spawn(elapsed, items) {
        const interval = this.getSpawnInterval(elapsed);
        this.spawnTimer += 16.67; // approximate, actual dt used in update

        if (this.spawnTimer >= interval && items.length < 12) {
            this.spawnTimer = 0;
            const type = this.pickItemType(elapsed);
            const x = 40 + Math.random() * (GAME_WIDTH - 80);
            const speed = this.getFallSpeed(elapsed);
            return new FallingItem(type, x, speed);
        }
        return null;
    }

    update(dt, elapsed, items) {
        this.spawnTimer += dt * 1000;
        const interval = this.getSpawnInterval(elapsed);

        const spawned = [];
        while (this.spawnTimer >= interval && items.length + spawned.length < 12) {
            this.spawnTimer -= interval;
            const type = this.pickItemType(elapsed);
            const x = 40 + Math.random() * (GAME_WIDTH - 80);
            const speed = this.getFallSpeed(elapsed);
            spawned.push(new FallingItem(type, x, speed));
        }
        return spawned;
    }

    reset() {
        this.spawnTimer = 0;
    }
}

// effects.js - Particles, screen shake, combo effects


class Particle {
    constructor(x, y, vx, vy, color, size, life, gravity = 200) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
        this.gravity = gravity;
        this.alive = true;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 10;
    }

    update(dt) {
        this.life -= dt;
        if (this.life <= 0) {
            this.alive = false;
            return;
        }
        this.vy += this.gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.rotation += this.rotSpeed * dt;
    }

    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        const scale = 0.5 + alpha * 0.5;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size * scale / 2, -this.size * scale / 2, this.size * scale, this.size * scale);
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, size = 20, duration = 1.0) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.size = size;
        this.life = duration;
        this.maxLife = duration;
        this.alive = true;
        this.vy = -80;
    }

    update(dt) {
        this.life -= dt;
        if (this.life <= 0) {
            this.alive = false;
            return;
        }
        this.y += this.vy * dt;
        this.vy *= 0.98;
    }

    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        const scale = 0.8 + (1 - this.life / this.maxLife) * 0.3;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${this.size * scale}px "Segoe UI", Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

class Effects {
    constructor() {
        this.particles = [];
        this.floatingTexts = [];
        this.shakeTimer = 0;
        this.shakeIntensity = 0;
        this.shakeOffsetX = 0;
        this.shakeOffsetY = 0;
        this.comboFlash = 0;
        this.comboFlashColor = '#FFD700';
        this.slowFlash = 0;
    }

    spawnCatchParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const speed = 100 + Math.random() * 200;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed - 50;
            const size = 3 + Math.random() * 4;
            const life = 0.4 + Math.random() * 0.4;
            this.particles.push(new Particle(x, y, vx, vy, color, size, life));
        }
    }

    spawnDiamondParticles(x, y) {
        const colors = ['#B3E5FC', '#00E5FF', '#00B8D4', '#FFFFFF', '#80DEEA'];
        for (let i = 0; i < 16; i++) {
            const angle = (Math.PI * 2 * i) / 16;
            const speed = 120 + Math.random() * 180;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed - 80;
            const size = 2 + Math.random() * 5;
            const life = 0.5 + Math.random() * 0.5;
            const color = colors[Math.floor(Math.random() * colors.length)];
            this.particles.push(new Particle(x, y, vx, vy, color, size, life, 100));
        }
    }

    spawnBombExplosion(x, y) {
        const colors = ['#FF5722', '#FF9800', '#FFEB3B', '#F44336', '#333333', '#666666'];
        for (let i = 0; i < 25; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 150 + Math.random() * 300;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed - 100;
            const size = 4 + Math.random() * 8;
            const life = 0.5 + Math.random() * 0.8;
            const color = colors[Math.floor(Math.random() * colors.length)];
            this.particles.push(new Particle(x, y, vx, vy, color, size, life, 300));
        }
        // Smoke
        for (let i = 0; i < 8; i++) {
            const vx = (Math.random() - 0.5) * 60;
            const vy = -50 - Math.random() * 80;
            this.particles.push(new Particle(x + (Math.random() - 0.5) * 20, y, vx, vy, 'rgba(80,80,80,0.6)', 10 + Math.random() * 15, 1 + Math.random(), -20));
        }
    }

    spawnPowerUpParticles(x, y, color) {
        for (let i = 0; i < 14; i++) {
            const angle = (Math.PI * 2 * i) / 14;
            const speed = 80 + Math.random() * 120;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const size = 3 + Math.random() * 3;
            this.particles.push(new Particle(x, y, vx, vy, color, size, 0.6 + Math.random() * 0.4, 0));
        }
    }

    spawnComboParticles(x, y, comboLevel) {
        const colors = ['#FFD700', '#FFA000', '#FF6F00', '#FF3D00'];
        const count = 8 + comboLevel * 4;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 60 + Math.random() * 150;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed - 60;
            const size = 2 + Math.random() * 4;
            const color = colors[Math.min(comboLevel, colors.length - 1)];
            this.particles.push(new Particle(x, y, vx, vy, color, size, 0.4 + Math.random() * 0.3, 100));
        }
    }

    addFloatingText(x, y, text, color, size = 20) {
        this.floatingTexts.push(new FloatingText(x, y, text, color, size));
    }

    startShake(intensity = SHAKE_INTENSITY, duration = SHAKE_DURATION) {
        this.shakeTimer = duration / 1000;
        this.shakeIntensity = intensity;
    }

    triggerComboFlash(combo) {
        this.comboFlash = 0.4;
        if (combo >= 10) this.comboFlashColor = '#FF3D00';
        else if (combo >= 6) this.comboFlashColor = '#FF6F00';
        else if (combo >= 3) this.comboFlashColor = '#FFA000';
        else this.comboFlashColor = '#FFD700';
    }

    triggerSlowFlash() {
        this.slowFlash = 0.3;
    }

    update(dt) {
        // Update particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(dt);
            if (!this.particles[i].alive) {
                this.particles.splice(i, 1);
            }
        }

        // Update floating texts
        for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
            this.floatingTexts[i].update(dt);
            if (!this.floatingTexts[i].alive) {
                this.floatingTexts.splice(i, 1);
            }
        }

        // Update shake
        if (this.shakeTimer > 0) {
            this.shakeTimer -= dt;
            const progress = this.shakeTimer / (SHAKE_DURATION / 1000);
            this.shakeOffsetX = (Math.random() - 0.5) * 2 * this.shakeIntensity * progress;
            this.shakeOffsetY = (Math.random() - 0.5) * 2 * this.shakeIntensity * progress;
        } else {
            this.shakeOffsetX = 0;
            this.shakeOffsetY = 0;
        }

        // Combo flash
        if (this.comboFlash > 0) {
            this.comboFlash -= dt;
        }

        // Slow flash
        if (this.slowFlash > 0) {
            this.slowFlash -= dt;
        }
    }

    drawParticles(ctx) {
        for (const p of this.particles) {
            p.draw(ctx);
        }
    }

    drawFloatingTexts(ctx) {
        for (const ft of this.floatingTexts) {
            ft.draw(ctx);
        }
    }

    drawScreenEffects(ctx) {
        // Combo flash
        if (this.comboFlash > 0) {
            ctx.save();
            ctx.globalAlpha = this.comboFlash * 0.2;
            ctx.fillStyle = this.comboFlashColor;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.restore();
        }

        // Slow debuff flash
        if (this.slowFlash > 0) {
            ctx.save();
            ctx.globalAlpha = this.slowFlash * 0.15;
            ctx.fillStyle = '#795548';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.restore();
        }
    }

    clear() {
        this.particles = [];
        this.floatingTexts = [];
        this.shakeTimer = 0;
        this.shakeOffsetX = 0;
        this.shakeOffsetY = 0;
        this.comboFlash = 0;
        this.slowFlash = 0;
    }
}

// ui.js - HUD, overlays, UI rendering


class UI {
    constructor() {
        this.showStartOverlay = true;
        this.showGameOverOverlay = false;
        this.showHelp = false;
        this.gameOverStats = null;
        this.highScore = parseInt(localStorage.getItem('coinCatcher_highScore') || '0');
    }

    saveHighScore(score) {
        if (score > this.highScore) {
            this.highScore = score;
            localStorage.setItem('coinCatcher_highScore', score.toString());
        }
    }

    drawHUD(ctx, score, lives, combo, comboCount, player, elapsed, misses) {
        ctx.save();

        // Top HUD bar
        const hudH = 50;
        const grad = ctx.createLinearGradient(0, 0, 0, hudH);
        grad.addColorStop(0, 'rgba(0,0,0,0.7)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, GAME_WIDTH, hudH);

        // Score
        ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = COLORS.gold;
        ctx.textAlign = 'left';
        ctx.fillText(`💰 ${score}`, 15, hudH / 2);

        // High score
        ctx.font = '13px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = COLORS.textSecondary;
        ctx.fillText(`最高: ${this.highScore}`, 140, hudH / 2);

        // Lives
        ctx.textAlign = 'center';
        ctx.font = '20px "Segoe UI", Arial, sans-serif';
        let heartsStr = '';
        for (let i = 0; i < MAX_LIVES; i++) {
            heartsStr += i < lives ? '❤️' : '🖤';
        }
        ctx.fillText(heartsStr, GAME_WIDTH / 2, hudH / 2);

        // Miss counter
        ctx.font = '12px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = misses >= 7 ? '#F44336' : COLORS.textSecondary;
        ctx.fillText(`掉落: ${misses}/10`, GAME_WIDTH / 2, hudH / 2 + 18);

        // Combo
        if (comboCount >= 2) {
            ctx.textAlign = 'right';
            ctx.font = `bold ${20 + combo * 2}px "Segoe UI", Arial, sans-serif`;
            const comboColors = ['#FFFFFF', '#FFD700', '#FFA000', '#FF6F00', '#FF3D00'];
            ctx.fillStyle = comboColors[Math.min(combo, comboColors.length - 1)];
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 10;
            ctx.fillText(`连击 x${combo}`, GAME_WIDTH - 15, hudH / 2 - 5);
            ctx.shadowBlur = 0;

            // Combo bar
            ctx.font = '11px "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = COLORS.textSecondary;
            const nextThreshold = COMBO.thresholds.find(t => t > comboCount) || comboCount + 5;
            const prevThreshold = COMBO.thresholds.filter(t => t <= comboCount).pop() || 0;
            const progress = (comboCount - prevThreshold) / (nextThreshold - prevThreshold);
            const barW = 80;
            const barX = GAME_WIDTH - 15 - barW;
            const barY = hudH / 2 + 8;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(barX, barY, barW, 6);
            ctx.fillStyle = COLORS.gold;
            ctx.fillRect(barX, barY, barW * Math.min(1, progress), 6);
        }

        // Active power-ups on left side
        this._drawActivePowerUps(ctx, player, hudH);

        // Elapsed time
        ctx.textAlign = 'right';
        ctx.font = '12px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = COLORS.textSecondary;
        const mins = Math.floor(elapsed / 60000);

        ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, GAME_WIDTH - 15, hudH + 20);

    _drawActivePowerUps(ctx, player, startY) {
        const icons = [];
        if (player.hasMagnet) icons.push({ emoji: '🧲', timer: player.magnetTimer / 1000, color: '#F44336' });
        if (player.hasShield) icons.push({ emoji: '🛡️', timer: 0, color: '#42A5F5' });
        if (player.multiplier > 1) icons.push({ emoji: '⭐', timer: player.multiplierTimer / 1000, color: '#FF6F00' });
        if (player.isSlowed) icons.push({ emoji: '🐌', timer: player.slowTimer / 1000, color: '#795548' });

        if (icons.length === 0) return;

        const startX = 15;
        const y = startY + 20;
        ctx.font = '16px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'left';

        icons.forEach((icon, i) => {

            ctx.roundRect(x - 4, y - 10, 55, 22, 6);

    drawComboPopup(ctx, combo) {

// === main.js ===
// main.js - Game loop, state machine, collision detection


class Game {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        this.state = 'menu'; // menu | playing | gameover
        this.score = 0;
        this.lives = MAX_LIVES;
        this.combo = 0;
        this.comboCount = 0;
        this.maxCombo = 0;
        this.misses = 0;
        this.itemsCaught = 0;
        this.coinsCaught = 0;
        this.diamondsCaught = 0;
        this.elapsed = 0;
        this.lastTime = 0;

        this.player = new Player(GAME_HEIGHT);
        this.spawner = new ItemSpawner();
        this.effects = new Effects();
        this.ui = new UI();
        this.items = [];

        this.keys = new Set();
        this.mouseX = null;
        this.useMouseControl = false;

        this._globalSlow = false;
        this._globalSlowTimer = 0;

        this.bgStars = this._generateBgStars(60);
        this.bgClouds = this._generateBgClouds(5);

        this._bindEvents();
        this._startLoop();
    }

    _generateBgStars(count) {
        const stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * GAME_WIDTH,
                y: Math.random() * GAME_HEIGHT,
                size: 0.5 + Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2,
                speed: 0.5 + Math.random() * 2,
            });
        }
        return stars;
    }

    _generateBgClouds(count) {
        const clouds = [];
        for (let i = 0; i < count; i++) {
            clouds.push({
                x: Math.random() * GAME_WIDTH,
                y: 50 + Math.random() * (GAME_HEIGHT * 0.5),
                width: 80 + Math.random() * 120,
                height: 20 + Math.random() * 30,
                speed: 5 + Math.random() * 10,
                alpha: 0.03 + Math.random() * 0.04,
            });
        }
        return clouds;
    }

    _bindEvents() {
        window.addEventListener('keydown', (e) => {
            this.keys.add(e.key);
            if (e.key === ' ' || e.key === 'Enter') {
                if (this.state === 'menu') this._startGame();
                else if (this.state === 'gameover') this._restart();
            }
        });

        window.addEventListener('keyup', (e) => {
            this.keys.delete(e.key);
        });

        this.canvas.addEventListener('mousemove', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            this.mouseX = (e.clientX - rect.left) * scaleX;
            this.useMouseControl = true;
        });

        this.canvas.addEventListener('mouseleave', () => {
            this.mouseX = null;
            this.useMouseControl = false;
        });

        this.canvas.addEventListener('click', (e) => {
            if (this.state === 'menu') {
                this._startGame();
            } else if (this.state === 'gameover') {
                this._restart();
            }
        });

        // Touch support
        this.canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            this.mouseX = (e.touches[0].clientX - rect.left) * scaleX;
            this.useMouseControl = true;
        }, { passive: false });

        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (this.state === 'menu') {
                this._startGame();
            } else if (this.state === 'gameover') {
                this._restart();
            }
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            this.mouseX = (e.touches[0].clientX - rect.left) * scaleX;
            this.useMouseControl = true;
        }, { passive: false });

        this.canvas.addEventListener('touchend', () => {
            this.mouseX = null;
            this.useMouseControl = false;
        });
    }

    _startGame() {
        Sound.init();
        this.state = 'playing';
        this.score = 0;
        this.lives = MAX_LIVES;
        this.combo = 0;
        this.comboCount = 0;
        this.maxCombo = 0;
        this.misses = 0;
        this.itemsCaught = 0;
        this.coinsCaught = 0;
        this.diamondsCaught = 0;
        this.elapsed = 0;
        this.items = [];
        this._globalSlow = false;
        this._globalSlowTimer = 0;
        this.player = new Player(GAME_HEIGHT);
        this.spawner.reset();
        this.effects.clear();
    }

    _restart() {
        this._startGame();
    }

    _gameOver() {
        this.state = 'gameover';
        Sound.gameOver();

        const mins = Math.floor(this.elapsed / 60000);
        const secs = Math.floor((this.elapsed / 1000) % 60);

        const isNewHighScore = this.score > this.ui.highScore;
        this.ui.saveHighScore(this.score);

        this.ui.gameOverStats = {
            score: this.score,
            itemsCaught: this.itemsCaught,
            coinsCaught: this.coinsCaught,
            diamondsCaught: this.diamondsCaught,
            maxCombo: this.maxCombo,
            survivalTime: `${mins}:${secs.toString().padStart(2, '0')}`,
            isNewHighScore,
        };
    }

    _checkCollision(item, player) {
        const ib = item.bounds;
        const pb = player.bounds;
        return ib.right > pb.left && ib.left < pb.right && ib.bottom > pb.top && ib.top < pb.bottom;
    }

    _handleItemCatch(item) {
        const type = item.type;
        item.alive = false;
        item.caught = true;
        this.itemsCaught++;
        this.player.onCatch();

        if (type.points > 0) {
            // Score item
            this.comboCount++;
            this._updateCombo();

            const points = type.points * this.combo * this.player.multiplier;
            this.score += points;

            if (type.id === 'gold_coin' || type.id === 'silver_coin') {
                this.coinsCaught++;
                Sound.coinCatch(this.combo);
                this.effects.spawnCatchParticles(item.x, item.y, type.color, 10);
                this.effects.addFloatingText(item.x, item.y - 20, `+${points}`, COLORS.gold);
            } else if (type.id === 'diamond') {
                this.diamondsCaught++;
                Sound.diamondCatch();
                this.effects.spawnDiamondParticles(item.x, item.y);
                this.effects.addFloatingText(item.x, item.y - 20, `+${points}`, '#00E5FF', 24);
            }

            if (this.combo >= 3) {
                this.effects.triggerComboFlash(this.combo);
                this.effects.spawnComboParticles(item.x, item.y, this.combo);
            }
        } else if (type.powerUp) {
            // Power-up
            Sound.powerUp();
            this.effects.spawnPowerUpParticles(item.x, item.y, type.color);

            switch (type.powerUp) {
                case 'multiplier':
                    this.player.activateMultiplier(type.duration);
                    this.effects.addFloatingText(item.x, item.y - 20, 'x2 得分!', '#FF6F00', 22);
                    break;
                case 'magnet':
                    this.player.activateMagnet(type.duration);
                    this.effects.addFloatingText(item.x, item.y - 20, '磁铁!', '#F44336', 22);
                    break;
                case 'shield':
                    this.player.activateShield();
                    this.effects.addFloatingText(item.x, item.y - 20, '护盾!', '#42A5F5', 22);
                    break;
                case 'slow':
                    // Global slow effect on items
                    this._globalSlow = true;
                    this._globalSlowTimer = type.duration;
                    this.effects.addFloatingText(item.x, item.y - 20, '减速!', '#66BB6A', 22);
                    break;
            }
        } else if (type.danger) {
            // Caught a danger item
            if (type.id === 'bomb') {
                if (this.player.hasShield) {
                    // Shield absorbs bomb
                    this.player.hasShield = false;
                    Sound.shieldBlock();
                    this.effects.spawnCatchParticles(item.x, item.y, '#42A5F5', 12);
                    this.effects.addFloatingText(item.x, item.y - 20, '护盾挡住!', '#42A5F5', 20);
                } else {
                    // Hit by bomb
                    Sound.bombHit();
                    this.effects.spawnBombExplosion(item.x, item.y);
                    this.effects.startShake(12, 400);
                    this.lives--;
                    this._resetCombo();
                    this.effects.addFloatingText(item.x, item.y - 20, '-1 生命', '#F44336', 24);
                    if (this.lives <= 0) {
                        this._gameOver();
                    }
                }
            } else if (type.id === 'rock') {
                Sound.rockHit();
                this.player.applySlow(type.duration);
                this.effects.triggerSlowFlash();
                this.effects.spawnCatchParticles(item.x, item.y, '#795548', 8);
                this.effects.addFloatingText(item.x, item.y - 20, '减速!', '#795548', 20);
            }
        }
    }

    _updateCombo() {
        let newCombo = 1;
        for (let i = COMBO.thresholds.length - 1; i >= 0; i--) {
            if (this.comboCount >= COMBO.thresholds[i]) {
                newCombo = i + 2;
                break;
            }
        }
        newCombo = Math.min(newCombo, COMBO.maxMultiplier);

        if (newCombo > this.combo) {
            Sound.comboLevel(newCombo);
        }
        this.combo = newCombo;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
    }

    _resetCombo() {
        if (this.comboCount >= 3) {
            Sound.comboBreak();
        }
        this.combo = 0;
        this.comboCount = 0;
    }

    _handleItemMiss(item) {
        const type = item.type;
        if (type.points > 0 || type.powerUp) {
            // Missed a good item
            this.misses++;
            this._resetCombo();
            Sound.miss();
            if (this.misses >= MISSES_TO_LOSE_LIFE) {
                this.misses = 0;
                this.lives--;
                this.effects.addFloatingText(GAME_WIDTH / 2, GAME_HEIGHT / 2, '掉落太多! -1 生命', '#F44336', 22);
                this.effects.startShake(8, 300);
                if (this.lives <= 0) {
                    this._gameOver();
                }
            }
        } else if (type.id === 'bomb') {
            // Bomb hit ground - safe, small explosion
            Sound.bombExplode();
            this.effects.spawnBombExplosion(item.x, GAME_HEIGHT - 30);
        }
    }

    _startLoop() {
        requestAnimationFrame((t) => this._loop(t));
    }

    _loop(timestamp) {
        if (this.lastTime === 0) this.lastTime = timestamp;
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.05); // cap at 50ms
        this.lastTime = timestamp;

        this._update(dt);
        this._draw();

        requestAnimationFrame((t) => this._loop(t));
    }

    _update(dt) {
        // Update background
        this.bgStars.forEach(s => {
            s.twinkle += s.speed * dt;
        });
        this.bgClouds.forEach(c => {
            c.x += c.speed * dt;
            if (c.x > GAME_WIDTH + c.width) c.x = -c.width;
        });

        if (this.state !== 'playing') return;

        this.elapsed += dt * 1000;

        // Update player
        this.player.update(dt, this.keys, this.useMouseControl ? this.mouseX : null);

        // Global slow timer
        if (this._globalSlow) {
            this._globalSlowTimer -= dt * 1000;
            if (this._globalSlowTimer <= 0) {
                this._globalSlow = false;
            }
        }

        // Spawn items
        const newItems = this.spawner.update(dt, this.elapsed, this.items);
        this.items.push(...newItems);

        // Update items
        for (let i = this.items.length - 1; i >= 0; i--) {
            const item = this.items[i];
            item.slowFactor = this._globalSlow ? 0.5 : 1;
            item.update(dt, this.player, this._globalSlow);

            // Check collision with player
            if (item.alive && this._checkCollision(item, this.player)) {
                this._handleItemCatch(item);
            }

            // Check if missed
            if (!item.alive && item.missed) {
                this._handleItemMiss(item);
            }

            // Remove dead items
            if (!item.alive) {
                this.items.splice(i, 1);
            }
        }

        // Update effects
        this.effects.update(dt);
    }

    _drawBg(ctx) {
        // Gradient background
        const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        grad.addColorStop(0, COLORS.bgGradientTop);
        grad.addColorStop(1, COLORS.bgGradientBottom);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Stars
        this.bgStars.forEach(s => {
            const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Clouds
        this.bgClouds.forEach(c => {
            ctx.fillStyle = `rgba(255,255,255,${c.alpha})`;
            ctx.beginPath();
            ctx.ellipse(c.x, c.y, c.width / 2, c.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
        });

        // Ground line
        const groundY = GAME_HEIGHT - 30;
        const groundGrad = ctx.createLinearGradient(0, groundY - 5, 0, GAME_HEIGHT);
        groundGrad.addColorStop(0, 'rgba(255,143,0,0.1)');
        groundGrad.addColorStop(1, 'rgba(255,143,0,0.02)');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, groundY - 5, GAME_WIDTH, GAME_HEIGHT - groundY + 5);

        ctx.strokeStyle = 'rgba(255,143,0,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(GAME_WIDTH, groundY);
        ctx.stroke();
    }

    _draw() {
        const ctx = this.ctx;

        ctx.save();

        // Apply screen shake
        if (this.effects.shakeTimer > 0) {
            ctx.translate(this.effects.shakeOffsetX, this.effects.shakeOffsetY);
        }

        // Background
        this._drawBg(ctx);

        if (this.state === 'playing' || this.state === 'gameover') {
            // Draw items
            for (const item of this.items) {
                item.draw(ctx);
            }

            // Draw player
            this.player.draw(ctx);

            // Draw particles
            this.effects.drawParticles(ctx);

            // Draw floating texts
            this.effects.drawFloatingTexts(ctx);

            // Draw screen effects
            this.effects.drawScreenEffects(ctx);

            // Draw HUD
            this.ui.drawHUD(ctx, this.score, this.lives, this.combo, this.comboCount, this.player, this.elapsed, this.misses);

            // Combo popup
            if (this.combo >= 3) {
                this.ui.drawComboPopup(ctx, this.combo);
            }
        }

        ctx.restore();

        // Overlays (not affected by shake)
        if (this.state === 'menu') {
            this.ui.drawStartOverlay(ctx);
        } else if (this.state === 'gameover') {
            this.ui.drawGameOverOverlay(ctx, this.ui.gameOverStats);
        }
    }
}

// Export start function for index.html
function startGame() {
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) {
        console.error('Canvas not found!');
        return;
    }
    new Game(canvas);
}

        
        window.startGame = startGame;

        // Auto-start on load
        startGame();
    
</script>
