<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子战棋 - Dice Wars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            color: #e0e0e0;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ========== Overlays ========== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        .overlay.visible {
            display: flex;
            opacity: 1;
        }

        .overlay-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .overlay-card h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-card .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        /* ========== Start Screen ========== */
        .player-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .player-select button,
        .btn-primary {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .player-select button:hover,
        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .player-select button:active,
        .btn-primary:active {
            transform: translateY(0);
        }

        .player-select button.selected {
            background: rgba(74, 144, 226, 0.4);
            border-color: #4a90e2;
        }

        .help-toggle {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .help-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #help-box {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            text-align: left;
            margin-top: 15px;
        }

        #help-box.visible {
            max-height: 400px;
        }

        #help-box .help-content {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.75);
        }

        #help-box h3 {
            color: #ffd93d;
            margin-bottom: 8px;
            font-size: 15px;
        }

        #help-box ul {
            padding-left: 18px;
            margin: 5px 0;
        }

        /* ========== Battle Popup ========== */
        .battle-card {
            max-width: 620px;
            padding: 30px 35px;
        }

        .battle-card .battle-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffd93d;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .battle-sides {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .battle-side {
            flex: 1;
            text-align: center;
        }

        .battle-player-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .battle-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .battle-vs {
            font-size: 28px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            padding-top: 30px;
            flex-shrink: 0;
        }

        .dice-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .die {
            width: 46px;
            height: 46px;
            background: #f5f5f0;
            border-radius: 8px;
            border: 3px solid #888;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s;
        }

        .die .dot {
            position: absolute;
            width: 9px;
            height: 9px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .die.rolling {
            animation: shake 0.08s infinite;
        }

        .die.stopped {
            animation: bounceStop 0.2s ease-out;
        }

        .die.win {
            border-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.5);
            transform: scale(1.1);
        }

        .die.lose {
            border-color: #e74c3c;
            opacity: 0.5;
            transform: scale(0.9);
        }

        @keyframes shake {
            0% { transform: rotate(-8deg) scale(1.05); }
            25% { transform: rotate(8deg) scale(0.95); }
            50% { transform: rotate(-6deg) scale(1.02); }
            75% { transform: rotate(6deg) scale(0.98); }
            100% { transform: rotate(-8deg) scale(1.05); }
        }

        @keyframes bounceStop {
            0% { transform: scale(1.2) rotate(5deg); }
            50% { transform: scale(0.9) rotate(-2deg); }
            100% { transform: scale(1) rotate(0); }
        }

        #battle-result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
        }

        /* ========== Game Over ========== */
        #gameover-overlay .overlay-card {
            max-width: 450px;
        }

        #winner-text {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #gameover-stats {
            margin: 20px 0;
        }

        /* ========== HUD ========== */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 50;
        }

        #hud-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #turn-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .player-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px currentColor;
        }

        #phase-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        #dice-pool {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
        }

        .dice-pool-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .dice-pool-count {
            font-size: 22px;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 8px rgba(255, 217, 61, 0.4);
        }

        #hud-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
        }

        #player-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .stat-item.active {
            opacity: 1;
            font-weight: bold;
        }

        .stat-item.eliminated {
            opacity: 0.25;
            text-decoration: line-through;
        }

        .stat-name {
            margin-right: 2px;
        }

        .stat-detail {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        #action-buttons {
            display: flex;
            gap: 10px;
        }

        #btn-end-turn, #btn-help {
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            pointer-events: auto;
        }

        #btn-end-turn {
            background: rgba(231, 76, 60, 0.3);
            border-color: rgba(231, 76, 60, 0.5);
        }

        #btn-end-turn:hover {
            background: rgba(231, 76, 60, 0.5);
        }

        #btn-help:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .overlay-card {
                padding: 25px 20px;
            }

            .overlay-card h1 {
                font-size: 36px;
            }

            .battle-card {
                padding: 20px 15px;
            }

            .die {
                width: 38px;
                height: 38px;
            }

            .die .dot {
                width: 7px;
                height: 7px;
            }

            #player-stats {
                gap: 10px;
            }

            .stat-item {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Top -->
    <div id="hud">
        <div id="hud-top">
            <div id="turn-indicator"></div>
            <div id="phase-text"></div>
            <div id="dice-pool" class="hidden"></div>
        </div>
    </div>

    <!-- HUD Bottom -->
    <div id="hud-bottom">
        <div id="player-stats"></div>
        <div id="action-buttons">
            <button id="btn-help" title="游戏规则">?</button>
            <button id="btn-end-turn" style="display:none">结束回合</button>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="overlay visible">
        <div class="overlay-card">
            <h1>骰子战棋</h1>
            <div class="subtitle">Dice Wars - 策略骰子对战</div>
            <p style="margin-bottom: 20px; color: rgba(255,255,255,0.6); font-size: 15px;">选择玩家数量开始游戏</p>
            <div class="player-select">
                <button onclick="startGame(2)">2 人</button>
                <button onclick="startGame(3)">3 人</button>
                <button onclick="startGame(4)" style="background:rgba(74,144,226,0.3);border-color:#4a90e2;">4 人</button>
            </div>
            <button class="help-toggle" onclick="document.getElementById('help-box').classList.toggle('visible')">游戏规则</button>
            <div id="help-box">
                <div class="help-content">
                    <h3>游戏目标</h3>
                    <p>占领所有领地，消灭所有对手！</p>
                    <h3>基本规则</h3>
                    <ul>
                        <li>每回合开始获得骰子奖励（基于最大连片领地数）</li>
                        <li>点击己方领地分配骰子（每块最多8个）</li>
                        <li>选择己方领地作为进攻出发地</li>
                        <li>选择相邻的敌方领地作为目标</li>
                        <li>双方掷骰比较，点数大的获胜（进攻方平局获胜）</li>
                        <li>获胜后可继续从新占领地进攻（连锁进攻）</li>
                    </ul>
                    <h3>操作提示</h3>
                    <ul>
                        <li>左键点击：选择/分配</li>
                        <li>右键点击：取消选择</li>
                        <li>ESC键：返回上一步</li>
                        <li>空格/回车：结束回合</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Battle Overlay -->
    <div id="battle-overlay" class="overlay hidden">
        <div class="overlay-card battle-card">
            <div class="battle-title">⚔ 战斗 ⚔</div>
            <div class="battle-sides">
                <div class="battle-side" id="battle-attacker"></div>
                <div class="battle-vs">VS</div>
                <div class="battle-side" id="battle-defender"></div>
            </div>
            <div id="battle-result"></div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameover-overlay" class="overlay hidden">
        <div class="overlay-card">
            <h1 id="winner-text"></h1>
            <div id="gameover-stats"></div>
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 15px;">再来一局</button>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
<script>
if(location.protocol==="file:"){document.body.innerHTML='<div style="position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;font-family:sans-serif;color:#fff;z-index:9999"><div style="font-size:48px;margin-bottom:20px">⚠️</div><h2 style="color:#ff6b4a;font-size:20px;margin-bottom:12px">需要启动HTTP服务器</h2><p style="color:#888;font-size:13px;line-height:1.8;max-width:400px">此游戏使用ES Modules，无法通过file://打开。<br>请在游戏目录运行:</p><div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 20px;margin:16px;font-family:monospace;color:#4aeaff;font-size:13px">python -m http.server 8000</div><p style="color:#666;font-size:12px">然后访问 http://localhost:8000</p><a href="../index.html" style="margin-top:16px;color:#ff6b4a;font-size:13px;text-decoration:none">← 返回游戏合集</a></div>'}

</body>
</html>
