<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(100,181,246,0.3);cursor:pointer}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#64b5f6;font-weight:bold}
        .hud-restart{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);padding:8px 14px;border-radius:8px;font-size:12px;color:#aaa;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px)}
        .hud-restart:hover{background:rgba(100,181,246,0.3);color:#64b5f6;border-color:#64b5f6}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.7)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;color:#64b5f6;text-shadow:0 0 20px rgba(100,181,246,0.5);margin-bottom:10px}
        .overlay-sub{font-size:16px;color:#888;margin-bottom:20px}
        .menu-btn{background:linear-gradient(135deg,#64b5f6 0%,#42a5f5 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(100,181,246,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#64b5f6;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
        <button class="hud-restart" onclick="startGame()" title="重新开始 (R)">↺ 重新开始</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title">Flappy Bird</div>
        <div class="overlay-sub">点击 或 按空格 开始飞行</div>
        <div class="help-box">
            <h3>🎮 操作说明</h3>
            <div>点击屏幕 / 空格键：小鸟扇翅膀向上飞</div>
            <div>不操作时小鸟受重力下落</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">🎯 游戏规则</h3>
            <div>穿过管道间隙得分 | 碰到管道或地面游戏结束</h3>
            <div style="margin-top:6px;color:#666">难度随分数递增（管道加速、间距缩小）</div>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script>
// === ./config.js ===
// Flappy Bird - 常量配置
const W = 520;
const H = 720;

const GRAVITY = 0.5;
const FLAP = -8.5;
const BIRD_SIZE = 20;

const BASE_PIPE_SPEED = 2.8;
const BASE_PIPE_GAP = 160;
const PIPE_WIDTH = 65;
const PIPE_INTERVAL = 110;

const GROUND_H = 70;
const HIGH_SCORE_KEY = 'flappy_high';

// === ./sound.js ===
// Flappy Bird - Web Audio API 音效
const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'flap':
                o.type = 'sine';
                o.frequency.setValueAtTime(400, t);
                o.frequency.exponentialRampToValueAtTime(600, t + 0.06);
                g.gain.setValueAtTime(0.08, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.start(t);
                o.stop(t + 0.08);
                break;
            case 'score':
                o.type = 'sine';
                o.frequency.setValueAtTime(800, t);
                o.frequency.setValueAtTime(1000, t + 0.05);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;
            case 'die':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                o.start(t);
                o.stop(t + 0.3);
                break;
        }
    }
};

Sound;

// === ./bird.js ===
// Flappy Bird - 小鸟类（重力物理、扇翅膀动画、绘制）

const bird = {
    x: 100,
    y: H / 2,
    vy: 0,
    angle: 0,
    flapFrame: 0
};

function resetBird() {
    bird.x = 100;
    bird.y = H / 2;
    bird.vy = 0;
    bird.angle = 0;
    bird.flapFrame = 0;
}

function flapBird() {
    bird.vy = FLAP;
    bird.flapFrame = 8;
    Sound.play('flap');
}

function updateBird() {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.angle = Math.min(Math.max(bird.vy * 3, -30), 90);
    if (bird.flapFrame > 0) bird.flapFrame--;
}

function drawBird(ctx, frameCount, state) {
    ctx.save();

    if (state === 'ready') {
        // 待机状态：小鸟上下浮动，不旋转
        const bobY = H / 2 + Math.sin(frameCount * 0.05) * 15;
        ctx.translate(bird.x, bobY);
        ctx.rotate(0);
    } else {
        ctx.translate(bird.x, bird.y);
        ctx.rotate(bird.angle * Math.PI / 180);
    }

    // 身体
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_SIZE, BIRD_SIZE * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀
    const wingY = bird.flapFrame > 0 ? -7 : 4;
    ctx.fillStyle = '#ff9800';
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 13, 7, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // 眼白
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(10, -5, 6, 0, Math.PI * 2);
    ctx.fill();

    // 瞳孔
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(11, -5, 3, 0, Math.PI * 2);
    ctx.fill();

    // 嘴巴
    ctx.fillStyle = '#f44336';
    ctx.beginPath();
    ctx.moveTo(15, 0);
    ctx.lineTo(25, 3);
    ctx.lineTo(15, 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function getBird() {
    return bird;
}

// === ./pipes.js ===
// Flappy Bird - 管道系统（生成、移动、碰撞检测、绘制）

let pipes = [];

function resetPipes() {
    pipes = [];
}

function getPipeSpeed(score) {
    return BASE_PIPE_SPEED + score * 0.03;
}

function getPipeGap(score) {
    return Math.max(100, BASE_PIPE_GAP - score * 1.5);
}

function updatePipes(score, frameCount, bird, onScore) {
    const sp = getPipeSpeed(score);
    const gap = getPipeGap(score);

    // 生成新管道
    if (frameCount % PIPE_INTERVAL === 0) {
        const gapY = 100 + Math.random() * (H - 250 - gap);
        pipes.push({ x: W, gapY, gapH: gap, scored: false });
    }

    // 移动管道
    pipes.forEach(p => p.x -= sp);

    // 计分
    pipes.forEach(p => {
        if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
            p.scored = true;
            Sound.play('score');
            onScore();
        }
    });

    // 移除屏幕外管道
    pipes = pipes.filter(p => p.x > -PIPE_WIDTH);
}

function checkCollision(bird) {
    // 地面和天花板
    if (bird.y + BIRD_SIZE > H - GROUND_H || bird.y - BIRD_SIZE < 0) {
        return true;
    }

    // 管道碰撞
    for (const p of pipes) {
        if (bird.x + BIRD_SIZE > p.x && bird.x - BIRD_SIZE < p.x + PIPE_WIDTH) {
            if (bird.y - BIRD_SIZE < p.gapY || bird.y + BIRD_SIZE > p.gapY + p.gapH) {
                return true;
            }
        }
    }

    return false;
}

function drawPipes(ctx) {
    pipes.forEach(p => {
        const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
        grad.addColorStop(0, '#4caf50');
        grad.addColorStop(0.5, '#66bb6a');
        grad.addColorStop(1, '#388e3c');

        // 上管道
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY);
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(p.x - 3, p.gapY - 20, PIPE_WIDTH + 6, 20);

        // 下管道
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, p.gapY + p.gapH, PIPE_WIDTH, H - p.gapY - p.gapH - GROUND_H);
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(p.x - 3, p.gapY + p.gapH, PIPE_WIDTH + 6, 20);
    });
}

// === ./ui.js ===
// Flappy Bird - HUD、菜单、昼夜背景绘制

let groundX = 0;

function updateGroundX(score) {
    const sp = getPipeSpeed(score);
    groundX = ((groundX - sp) % 20 + 20) % 20;
}

function updateHUD(score, highScore) {
    document.getElementById('score').textContent = score;
    document.getElementById('high').textContent = Math.max(highScore, score);
}

function showGameOver(score, highScore) {
    document.getElementById('goStats').innerHTML = `分数: ${score}<br>最高: ${highScore}`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function hideOverlays() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
}

// ---- Canvas 绘制 ----

function drawSky(ctx, dayNight) {
    const skyR = Math.floor(135 * dayNight + 20 * (1 - dayNight));
    const skyG = Math.floor(206 * dayNight + 20 * (1 - dayNight));
    const skyB = Math.floor(235 * dayNight + 60 * (1 - dayNight));
    ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
    ctx.fillRect(0, 0, W, H);
}

function drawStars(ctx, dayNight, frameCount) {
    if (dayNight >= 0.5) return;
    ctx.fillStyle = `rgba(255,255,255,${(1 - dayNight * 2) * 0.6})`;
    for (let i = 0; i < 20; i++) {
        const sx = (i * 97 + frameCount * 0.1) % W;
        const sy = (i * 131) % 300;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawClouds(ctx, dayNight, frameCount) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + dayNight * 0.2})`;
    for (let i = 0; i < 3; i++) {
        const cx = ((i * 200 + frameCount * 0.3) % (W + 100)) - 50;
        const cy = 80 + i * 60;
        ctx.beginPath();
        ctx.arc(cx, cy, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + 20, cy - 5, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx - 15, cy + 3, 12, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawGround(ctx) {
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(0, H - GROUND_H, W, 8);
    ctx.fillStyle = '#4caf50';
    for (let i = -1; i < W / 20 + 2; i++) {
        ctx.fillRect(i * 20 + groundX, H - GROUND_H, 10, 5);
    }
}

function drawParticles(ctx, particles) {
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 30;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawScore(ctx, score) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 4;
    ctx.strokeText(score, W / 2, 70);
    ctx.fillText(score, W / 2, 70);
}

// === main.js ===
// Flappy Bird - 游戏主循环、初始化、事件监听

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

let score = 0;
let highScore = parseInt(localStorage.getItem(HIGH_SCORE_KEY)) || 0;
let state = 'ready';
let frameCount = 0;
let dayNight = 0;
let particles = [];

// ---- 初始化 ----

function init() {
    resetBird();
    resetPipes();
    particles = [];
    score = 0;
    frameCount = 0;
    state = 'ready';
    updateHUD(score, highScore);
}

function startGame() {
    Sound.init();
    hideOverlays();
    init();
    state = 'playing';
}

// ---- 扇翅膀 ----

function flap() {
    if (state === 'ready') {
        startGame();
        return;
    }
    if (state !== 'playing') return;
    flapBird();
}

// ---- 死亡 ----

function die() {
    state = 'dead';
    Sound.play('die');

    const bird = getBird();
    for (let i = 0; i < 20; i++) {
        particles.push({
            x: bird.x,
            y: bird.y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 3,
            life: 30,
            color: ['#ffeb3b', '#ff9800', '#f44336'][Math.floor(Math.random() * 3)]
        });
    }

    highScore = Math.max(highScore, score);
    localStorage.setItem(HIGH_SCORE_KEY, highScore);

    setTimeout(() => {
        showGameOver(score, highScore);
    }, 500);
}

// ---- 游戏主循环 ----

function gameLoop() {
    requestAnimationFrame(gameLoop);
    frameCount++;
    dayNight = (Math.sin(frameCount * 0.001) + 1) / 2;

    if (state === 'playing') {
        updateBird();

        const bird = getBird();
        updatePipes(score, frameCount, bird, () => {
            score++;
            updateHUD(score, highScore);
        });

        updateGroundX(score);

        if (checkCollision(bird)) {
            die();
            return;
        }
    } else {
        // ready/dead 状态也要更新地面滚动（用默认速度）
        updateGroundX(score);
    }

    // 粒子更新
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life--;
        return p.life > 0;
    });

    draw();
}

// ---- 绘制 ----

function draw() {
    drawSky(ctx, dayNight);
    drawStars(ctx, dayNight, frameCount);
    drawClouds(ctx, dayNight, frameCount);
    drawPipes(ctx);
    drawGround(ctx);
    drawBird(ctx, frameCount, state);
    drawParticles(ctx, particles);

    if (state === 'playing' || state === 'dead') {
        drawScore(ctx, score);
    }
}

// ---- 事件监听 ----

window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        flap();
    }
    if (e.code === 'KeyR') {
        e.preventDefault();
        startGame();
    }
});

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    flap();
});

// 暴露 startGame 给 HTML 按钮的 onclick
window.startGame = startGame;

// ---- 启动 ----
updateHUD(score, highScore);
init();
gameLoop();


</script>

</body>
</html>
