<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>模拟飞行 - Flight Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1628;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading .text {
            color: #88aacc;
            font-size: 24px;
            text-align: center;
        }

        #loading .text .title {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4488ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="text">
            <div class="title">模拟飞行</div>
            <div>正在加载...</div>
            <div class="spinner"></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module">
        import './js/main.js';

        // Hide loading screen once module is loaded
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(() => loading.remove(), 500);
                }
            }, 300);
        });
    </script>

</body>
</html>
