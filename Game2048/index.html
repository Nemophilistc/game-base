<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff;user-select:none}
        .header{display:flex;align-items:center;gap:30px;margin-bottom:15px}
        .title{font-size:56px;color:#edc53f;text-shadow:0 0 30px rgba(237,197,63,0.5);letter-spacing:4px}
        .scores{display:flex;gap:12px}
        .score-box{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .score-label{font-size:11px;color:#aaa;text-transform:uppercase}
        .score-val{font-size:22px;font-weight:bold;color:#fff}
        #board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:rgba(255,255,255,0.05);padding:10px;border-radius:12px;width:400px;height:400px;position:relative}
        .cell{background:rgba(255,255,255,0.08);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;transition:all 0.12s ease}
        .cell[data-value="2"]{background:#eee4da;color:#776e65}
        .cell[data-value="4"]{background:#ede0c8;color:#776e65}
        .cell[data-value="8"]{background:#f2b179;color:#fff}
        .cell[data-value="16"]{background:#f59563;color:#fff}
        .cell[data-value="32"]{background:#f67c5f;color:#fff}
        .cell[data-value="64"]{background:#f65e3b;color:#fff}
        .cell[data-value="128"]{background:#edcf72;color:#fff;font-size:24px}
        .cell[data-value="256"]{background:#edcc61;color:#fff;font-size:24px}
        .cell[data-value="512"]{background:#edc850;color:#fff;font-size:24px}
        .cell[data-value="1024"]{background:#edc53f;color:#fff;font-size:20px}
        .cell[data-value="2048"]{background:#edc22e;color:#fff;font-size:20px;box-shadow:0 0 20px rgba(237,194,46,0.5)}
        .cell.merged{animation:pop 0.2s ease}
        .cell.new{animation:appear 0.2s ease}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
        @keyframes appear{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
        .controls{display:flex;gap:10px;margin-top:15px}
        .ctrl-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.2s}
        .ctrl-btn:hover{background:rgba(255,255,255,0.2);color:#fff}
        .ctrl-btn:disabled{opacity:0.3;cursor:not-allowed}
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;z-index:10}
        .overlay.hidden{display:none}
        .overlay-text{font-size:48px;font-weight:bold;margin-bottom:15px}
        .overlay-btns{display:flex;gap:10px}
        .overlay-btn{background:linear-gradient(135deg,#edc53f,#edc22e);border:none;padding:12px 30px;font-size:16px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.2s}
        .overlay-btn:hover{transform:scale(1.05)}
        .overlay-btn.secondary{background:rgba(255,255,255,0.15);color:#aaa}
        .help-box{margin-top:12px;font-size:13px;color:#666;text-align:center;line-height:1.6}
    </style>
</head>
<body>
    <div class="header">
        <div class="title">2048</div>
        <div class="scores">
            <div class="score-box"><div class="score-label">分数</div><div class="score-val" id="score">0</div></div>
            <div class="score-box"><div class="score-label">最高</div><div class="score-val" id="high">0</div></div>
        </div>
    </div>
    <div id="board"></div>
    <div class="controls">
        <button class="ctrl-btn" id="undoBtn">撤销 (<span id="undoCount">3</span>)</button>
        <button class="ctrl-btn" id="newGameBtn">新游戏</button>
    </div>
    <div class="help-box">WASD / 方向键 滑动 | 相同数字合并 | 目标：2048 | R 重新开始</div>

    <div id="overlay" class="overlay hidden">
        <div class="overlay-text" id="overlayText"></div>
        <div class="overlay-btns">
            <button class="overlay-btn" id="overlayMainBtn">再来一局</button>
            <button class="overlay-btn secondary hidden" id="continueBtn">继续挑战</button>
        </div>
    </div>

    <script>
// === ./config.js ===
// config.js — 常量配置
const GRID_SIZE = 4;
const WIN_VALUE = 2048;
const MAX_UNDOS = 3;
const STORAGE_KEY = '2048_high';
const SWIPE_THRESHOLD = 30;

// === ./sound.js ===
// sound.js — Web Audio API 音效
let audioCtx = null;

function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function beep(freq, duration, vol = 0.15) {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
}

function playMove()  { beep(300, 0.08, 0.08); }
function playMerge() { beep(520, 0.12, 0.15); }
function playWin()   { beep(660, 0.3, 0.2); setTimeout(() => beep(880, 0.4, 0.2), 150); }
function playLose()  { beep(200, 0.4, 0.15); }

// === ./grid.js ===
// grid.js — 网格逻辑（移动、合并、生成、撤销）

const N = GRID_SIZE;

/** 创建空网格 */
function createGrid() {
    return Array.from({ length: N }, () => Array(N).fill(0));
}

/** 深拷贝网格 */
function cloneGrid(g) {
    return g.map(r => [...r]);
}

/** 在空位随机生成 2（90%）或 4（10%），返回位置或 null */
function addRandom(grid) {
    const empty = [];
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            if (grid[r][c] === 0) empty.push({ r, c });
    if (empty.length === 0) return null;
    const pos = empty[Math.floor(Math.random() * empty.length)];
    grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
    return pos;
}

/** 逆时针旋转 90 度 */
function rotate(g) {
    const res = Array.from({ length: N }, () => Array(N).fill(0));
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            res[N - 1 - c][r] = g[r][c];
    return res;
}

/** 顺时针旋转 90 度 */
function rotateCW(g) {
    const res = Array.from({ length: N }, () => Array(N).fill(0));
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            res[c][N - 1 - r] = g[r][c];
    return res;
}

/**
 * 执行一次移动
 * @param {number[][]} grid  当前网格
 * @param {string}     dir   'up'|'down'|'left'|'right'
 * @returns {{ grid, moved, scoreGain, mergedPositions, randomPos }}
 */
function move(grid, dir) {
    let g = cloneGrid(grid);
    let scoreGain = 0;

    // 统一旋转到"向左合并"的方向，处理完再旋转回来
    // 'left': 不旋转  'right': 旋转180°  'up': 逆时针90°  'down': 顺时针90°
    if (dir === 'up') g = rotate(g);          // 逆时针90°
    else if (dir === 'down') g = rotateCW(g); // 顺时针90°
    else if (dir === 'right') { g = rotate(g); g = rotate(g); } // 180°

    for (let r = 0; r < N; r++) {
        let row = g[r].filter(v => v !== 0);
        for (let i = 0; i < row.length - 1; i++) {
            if (row[i] === row[i + 1]) {
                row[i] *= 2;
                scoreGain += row[i];
                row.splice(i + 1, 1);
            }
        }
        while (row.length < N) row.push(0);
        g[r] = row;
    }

    // 旋转回来
    if (dir === 'up') g = rotateCW(g);        // 顺时针90°（逆时针的逆）
    else if (dir === 'down') g = rotate(g);   // 逆时针90°（顺时针的逆）
    else if (dir === 'right') { g = rotate(g); g = rotate(g); } // 180°

    // 检测是否真的移动了
    let moved = false;
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            if (g[r][c] !== grid[r][c]) moved = true;

    if (!moved) return { grid, moved: false, scoreGain: 0, mergedPositions: [], randomPos: null };

    // 检测合并位置：变换前后都非零且值不同 → 合并（值翻倍）
    const mergedPositions = [];
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            if (g[r][c] !== 0 && grid[r][c] !== 0 && g[r][c] !== grid[r][c])
                mergedPositions.push({ r, c });

    const randomPos = addRandom(g);

    return { grid: g, moved: true, scoreGain, mergedPositions, randomPos };
}

/** 判断是否还能移动 */
function canMove(grid) {
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++) {
            if (grid[r][c] === 0) return true;
            if (c < N - 1 && grid[r][c] === grid[r][c + 1]) return true;
            if (r < N - 1 && grid[r][c] === grid[r + 1][c]) return true;
        }
    return false;
}

/** 检查网格中是否包含目标值 */
function hasValue(grid, value) {
    for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
            if (grid[r][c] === value) return true;
    return false;
}

// === ./ui.js ===
// ui.js — 渲染、动画、HUD

const N = GRID_SIZE;

/** 渲染棋盘 */
function renderBoard(grid, randomPos, mergedPositions) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    const mergedSet = new Set(mergedPositions.map(p => p.r * N + p.c));

    for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (grid[r][c] !== 0) {
                cell.textContent = grid[r][c];
                cell.dataset.value = grid[r][c];
                if (randomPos && randomPos.r === r && randomPos.c === c) {
                    cell.classList.add('new');
                }
                // Bug fix: 为合并的格子添加 merged 类
                if (mergedSet.has(r * N + c)) {
                    cell.classList.add('merged');
                }
            }
            board.appendChild(cell);
        }
    }
}

/** 更新分数显示 */
function updateScore(score, highScore) {
    document.getElementById('score').textContent = score;
    document.getElementById('high').textContent = highScore;
    localStorage.setItem(STORAGE_KEY, highScore);
}

/** 更新撤销按钮 UI */
function updateUndoUI(undos) {
    document.getElementById('undoCount').textContent = undos;
    document.getElementById('undoBtn').disabled = undos <= 0;
}

/** 显示胜利遮罩 */
function showWin() {
    document.getElementById('overlayText').textContent = '🎉 2048!';
    document.getElementById('overlayText').style.color = '#4caf50';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('continueBtn').classList.remove('hidden');
    document.getElementById('overlayMainBtn').textContent = '再来一局';
}

/** 显示失败遮罩 */
function showGameOver() {
    document.getElementById('overlayText').textContent = '游戏结束';
    document.getElementById('overlayText').style.color = '#f44336';
    document.getElementById('continueBtn').classList.add('hidden');
    document.getElementById('overlayMainBtn').textContent = '再来一局';
    document.getElementById('overlay').classList.remove('hidden');
}

/** 隐藏遮罩 */
function hideOverlay() {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('continueBtn').classList.add('hidden');
}

// === main.js ===
// main.js — 游戏主循环、事件监听（键盘+触摸）

// ── 游戏状态 ──
let grid, score, highScore, undos, prevGrid, prevScore, gameOver, hasWon;

highScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;

/** 开始新游戏 */
function newGame() {
    grid = createGrid();
    score = 0;
    undos = MAX_UNDOS;
    gameOver = false;
    hasWon = false;
    prevGrid = null;
    prevScore = 0;

    addRandom(grid);
    addRandom(grid);
    renderBoard(grid, null, []);
    hideOverlay();
    updateUndoUI(undos);
    updateScore(score, highScore);
}

/** 保存状态用于撤销 */
function saveState() {
    prevGrid = cloneGrid(grid);
    prevScore = score;
}

/** 撤销 */
function undo() {
    if (!prevGrid || undos <= 0 || gameOver) return;
    grid = prevGrid;
    score = prevScore;
    undos--;
    prevGrid = null;
    updateUndoUI(undos);
    renderBoard(grid, null, []);
    updateScore(score, highScore);
}

/** 执行移动 */
function doMove(dir) {
    if (gameOver) return;
    saveState();

    const result = move(grid, dir);
    if (!result.moved) {
        prevGrid = null;
        return;
    }

    grid = result.grid;
    score += result.scoreGain;

    // 音效
    playMove();
    if (result.mergedPositions.length > 0) playMerge();

    renderBoard(grid, result.randomPos, result.mergedPositions);
    highScore = Math.max(highScore, score);
    updateScore(score, highScore);

    // 胜利检测（只触发一次，且有继续游戏选项）
    if (!hasWon && hasValue(grid, WIN_VALUE)) {
        hasWon = true;
        playWin();
        showWin();
        return;
    }

    // 失败检测
    if (!canMove(grid)) {
        gameOver = true;
        playLose();
        showGameOver();
    }
}

/** 继续挑战（胜利后） */
function continuePlay() {
    gameOver = false;
    hideOverlay();
}

// ── 键盘事件 ──
window.addEventListener('keydown', e => {
    if (e.code === 'KeyR') { e.preventDefault(); newGame(); return; }
    switch (e.code) {
        case 'ArrowUp':    case 'KeyW': e.preventDefault(); doMove('up');    break;
        case 'ArrowDown':  case 'KeyS': e.preventDefault(); doMove('down');  break;
        case 'ArrowLeft':  case 'KeyA': e.preventDefault(); doMove('left');  break;
        case 'ArrowRight': case 'KeyD': e.preventDefault(); doMove('right'); break;
    }
});

// ── 触摸事件 ──
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', e => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > SWIPE_THRESHOLD) doMove(dx > 0 ? 'right' : 'left');
    } else {
        if (Math.abs(dy) > SWIPE_THRESHOLD) doMove(dy > 0 ? 'down' : 'up');
    }
});

// ── 按钮事件 ──
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('newGameBtn').addEventListener('click', newGame);
document.getElementById('overlayMainBtn').addEventListener('click', newGame);
document.getElementById('continueBtn').addEventListener('click', continuePlay);

// ── 初始化 ──
updateScore(0, highScore);
newGame();


</script>

</body>
</html>
