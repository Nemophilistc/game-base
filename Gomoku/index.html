<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 — Gomoku</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
}

.game-container {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
}

/* 左侧面板 */
.panel-left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 260px;
    flex-shrink: 0;
}

/* 棋盘区 */
.board-wrapper {
    position: relative;
    flex-shrink: 0;
}

canvas#board {
    display: block;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

/* 右侧面板 */
.panel-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 220px;
    flex-shrink: 0;
}

/* 卡片样式 */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
}

.card h3 {
    font-size: 14px;
    color: #90caf9;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* 状态栏 */
#status {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    text-shadow: 0 0 10px rgba(100,181,246,0.4);
}

/* 按钮 */
.btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.btn {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    min-width: 0;
    text-align: center;
}

.btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
}

.btn.active {
    background: rgba(66,165,245,0.25);
    border-color: #42a5f5;
    color: #90caf9;
    font-weight: bold;
}

.btn-action {
    background: rgba(76,175,80,0.2);
    border-color: rgba(76,175,80,0.4);
    color: #81c784;
}

.btn-action:hover {
    background: rgba(76,175,80,0.35);
    color: #a5d6a7;
}

.btn-warn {
    background: rgba(255,152,0,0.2);
    border-color: rgba(255,152,0,0.4);
    color: #ffb74d;
}

.btn-warn:hover {
    background: rgba(255,152,0,0.35);
    color: #ffcc80;
}

/* 下拉框 */
select {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    width: 100%;
}

select:focus {
    border-color: #42a5f5;
}

option {
    background: #1a1a2e;
    color: #ccc;
}

/* 历史记录 */
#history {
    max-height: 300px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.8;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
}

#history::-webkit-scrollbar {
    width: 5px;
}

#history::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
}

.history-empty {
    color: #666;
    text-align: center;
    padding: 16px;
}

.history-item {
    padding: 2px 6px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.history-item:nth-child(odd) {
    background: rgba(255,255,255,0.02);
}

.h-num {
    color: #666;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    min-width: 24px;
}

.h-stone {
    font-size: 12px;
    width: 16px;
    text-align: center;
}

.h-stone.black { color: #aaa; }
.h-stone.white { color: #fff; }

/* 覆盖层 */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.overlay.show {
    opacity: 1;
    pointer-events: auto;
}

.overlay-msg {
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    text-align: center;
}

/* 空行分隔 */
.spacer { height: 4px; }

/* 响应式 */
@media (max-width: 800px) {
    .game-container {
        flex-direction: column;
        align-items: center;
    }
    .panel-left, .panel-right {
        width: 100%;
        max-width: 540px;
    }
}

<body>

<div class="game-container">
    <!-- 左侧面板 -->
    <div class="panel-left">

            <div style="font-size:13px; line-height:1.7; color:#aaa;">

                <p>先连成五子者获胜</p>
                <p>支持横/竖/斜方向</p>
                <p class="spacer"></p>
                <p><b>快捷操作：</b></p>

</div>

<script>
// === ./config.js ===
// config.js — 五子棋常量配置

const BOARD_SIZE = 15;        // 棋盘 15×15
const WIN_COUNT = 5;          // 五子连珠获胜
const CELL_SIZE = 40;         // 格子像素大小
const PADDING = 30;           // 棋盘边距
const BOARD_PX = CELL_SIZE * (BOARD_SIZE - 1) + PADDING * 2; // 画布尺寸

const EMPTY = 0;
const BLACK = 1;
const WHITE = 2;

// AI 难度对应的搜索深度
const DIFFICULTY = {
    easy:   2,
    medium: 4,
    hard:   6,
};

// 棋型评分
const SCORE = {
    FIVE:       1000000,   // 五连
    LIVE_FOUR:   100000,   // 活四
    RUSH_FOUR:    10000,   // 冲四
    LIVE_THREE:    1000,   // 活三
    SLEEP_THREE:    100,   // 眠三
    LIVE_TWO:        10,   // 活二
    SLEEP_TWO:        1,   // 眠二
};

// 角色颜色名
const COLOR_NAME = { [BLACK]: '黑棋', [WHITE]: '白棋' };

// === ./sound.js ===
// sound.js — Web Audio API 音效

let ctx = null;

function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
}

function play(freq, duration, type = 'sine', volume = 0.3) {
    try {
        const c = getCtx();
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, c.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(c.currentTime);
        osc.stop(c.currentTime + duration);
    } catch (_) { /* 静默失败 */ }
}

/** 落子音效 — 清脆短促 */
function playPlace() {
    play(800, 0.12, 'sine', 0.25);
    setTimeout(() => play(1200, 0.08, 'sine', 0.15), 30);
}

/** 获胜音效 — 上升和弦 */
function playWin() {
    play(523, 0.3, 'sine', 0.3);
    setTimeout(() => play(659, 0.3, 'sine', 0.3), 150);
    setTimeout(() => play(784, 0.4, 'sine', 0.35), 300);
    setTimeout(() => play(1047, 0.6, 'sine', 0.3), 500);
}

/** 失败音效 — 下降音 */
function playLose() {
    play(400, 0.3, 'sawtooth', 0.15);
    setTimeout(() => play(300, 0.4, 'sawtooth', 0.12), 200);
    setTimeout(() => play(200, 0.6, 'sawtooth', 0.1), 450);
}

// === ./board.js ===
// board.js — 棋盘状态管理


class Board {
    constructor() {
        this.reset();
    }

    reset() {
        // 15×15 网格，EMPTY=0
        this.grid = Array.from({ length: BOARD_SIZE }, () =>
            new Array(BOARD_SIZE).fill(EMPTY));
        this.history = [];   // [{row, col, player}, ...]
        this.current = BLACK; // 黑先
    }

    /** 落子 */
    place(row, col, player) {
        if (this.grid[row][col] !== EMPTY) return false;
        this.grid[row][col] = player;
        this.history.push({ row, col, player });
        this.current = player === BLACK ? WHITE : BLACK;
        return true;
    }

    /** 悔棋（撤回最近一步） */
    undo() {
        if (this.history.length === 0) return null;
        const last = this.history.pop();
        this.grid[last.row][last.col] = EMPTY;
        this.current = last.player;
        return last;
    }

    /** 获取某位置的棋子 */
    get(row, col) {
        return this.grid[row][col];
    }

    /** 是否为空位 */
    isEmpty(row, col) {
        return this.grid[row][col] === EMPTY;
    }

    /** 步数 */
    get moveCount() {
        return this.history.length;
    }

    /** 最后一手 */
    get lastMove() {
        return this.history.length > 0 ? this.history[this.history.length - 1] : null;
    }

    /** 克隆（供 AI 搜索使用） */
    clone() {
        const b = new Board();
        b.grid = this.grid.map(row => [...row]);
        b.history = [...this.history];
        b.current = this.current;
        return b;
    }
}

// === ./rules.js ===
// rules.js — 五子棋规则引擎


const DIRS = [[1, 0], [0, 1], [1, 1], [1, -1]]; // 横 竖 右下 右上

/**
 * 检测某一方是否获胜
 * @returns {Array|null} 获胜的五子坐标数组，或 null
 */
function checkWin(board, row, col, player) {
    for (const [dr, dc] of DIRS) {
        const cells = [[row, col]];
        // 正方向
        for (let i = 1; i < WIN_COUNT; i++) {
            const r = row + dr * i, c = col + dc * i;
            if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
            if (board[r][c] !== player) break;
            cells.push([r, c]);
        }
        // 反方向
        for (let i = 1; i < WIN_COUNT; i++) {
            const r = row - dr * i, c = col - dc * i;
            if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
            if (board[r][c] !== player) break;
            cells.push([r, c]);
        }
        if (cells.length >= WIN_COUNT) return cells;
    }
    return null;
}

/**
 * 检查位置是否合法
 */
function isValidMove(board, row, col) {
    return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE
        && board[row][col] === EMPTY;
}

/**
 * 检查棋盘是否已满（平局）
 */
function isBoardFull(board) {
    for (let r = 0; r < BOARD_SIZE; r++)
        for (let c = 0; c < BOARD_SIZE; c++)
            if (board[r][c] === EMPTY) return false;
    return true;
}

// === ./ai.js ===
// ai.js — AI 对弈引擎（评估函数 + minimax + alpha-beta 剪枝）


// ---------- 棋型匹配 ----------

const DIRS = [[1, 0], [0, 1], [1, 1], [1, -1]];

/**
 * 沿某方向统计连续同色及两端空位
 * 返回 {count, openEnds}  count=连续数 openEnds=两端开放数(0/1/2)
 */
function countLine(grid, row, col, dr, dc, player) {
    let count = 1;
    let openEnds = 0;

    // 正方向
    let r = row + dr, c = col + dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === player) {
        count++;
        r += dr;
        c += dc;
    }
    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === EMPTY)
        openEnds++;

    // 反方向
    r = row - dr;
    c = col - dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === player) {
        count++;
        r -= dr;
        c -= dc;
    }
    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === EMPTY)
        openEnds++;

    return { count, openEnds };
}

/**
 * 对某个位置给某方打分（用于评估函数）
 */
function evaluatePoint(grid, row, col, player) {
    let total = 0;
    for (const [dr, dc] of DIRS) {
        const { count, openEnds } = countLine(grid, row, col, dr, dc, player);
        if (count >= 5) total += SCORE.FIVE;
        else if (count === 4) {
            if (openEnds === 2) total += SCORE.LIVE_FOUR;
            else if (openEnds === 1) total += SCORE.RUSH_FOUR;
        } else if (count === 3) {
            if (openEnds === 2) total += SCORE.LIVE_THREE;
            else if (openEnds === 1) total += SCORE.SLEEP_THREE;
        } else if (count === 2) {
            if (openEnds === 2) total += SCORE.LIVE_TWO;
            else if (openEnds === 1) total += SCORE.SLEEP_TWO;
        }
    }
    return total;
}

// ---------- 全局评估 ----------

function evaluateBoard(grid, aiColor) {
    const humanColor = aiColor === BLACK ? WHITE : BLACK;
    let aiScore = 0, humanScore = 0;

    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] === aiColor) {
                aiScore += evaluatePoint(grid, r, c, aiColor);
            } else if (grid[r][c] === humanColor) {
                humanScore += evaluatePoint(grid, r, c, humanColor);
            }
        }
    }
    return aiScore - humanScore * 1.1; // 稍微偏重防守
}

// ---------- 候选点生成 ----------

function getCandidates(grid, range = 2) {
    const set = new Set();
    let hasStone = false;

    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] !== EMPTY) {
                hasStone = true;
                for (let dr = -range; dr <= range; dr++) {
                    for (let dc = -range; dc <= range; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE
                            && grid[nr][nc] === EMPTY) {
                            set.add(nr * BOARD_SIZE + nc);
                        }
                    }
                }
            }
        }
    }

    // 棋盘为空时返回中心
    if (!hasStone) {
        const mid = Math.floor(BOARD_SIZE / 2);
        return [{ row: mid, col: mid }];
    }

    return [...set].map(v => ({ row: Math.floor(v / BOARD_SIZE), col: v % BOARD_SIZE }));
}

// ---------- 候选点快速评分（用于排序） ----------

function scoreCandidate(grid, row, col, aiColor) {
    const humanColor = aiColor === BLACK ? WHITE : BLACK;
    grid[row][col] = aiColor;
    const atk = evaluatePoint(grid, row, col, aiColor);
    grid[row][col] = humanColor;
    const def = evaluatePoint(grid, row, col, humanColor);
    grid[row][col] = EMPTY;
    return atk + def;
}

// ---------- Minimax + Alpha-Beta ----------

function minimax(grid, depth, alpha, beta, isMaximizing, aiColor) {
    // 检查是否有人赢了
    // 快速检查：只检查最后一步周围
    const winner = quickWinCheck(grid, aiColor);
    if (winner === aiColor) return SCORE.FIVE * 10;
    if (winner !== null) return -SCORE.FIVE * 10;

    if (depth === 0) return evaluateBoard(grid, aiColor);

    const currentColor = isMaximizing ? aiColor : (aiColor === BLACK ? WHITE : BLACK);
    const candidates = getCandidates(grid);

    if (candidates.length === 0) return 0;

    // 排序候选点以提高剪枝效率
    const scored = candidates.map(p => ({
        ...p,
        s: scoreCandidate(grid, p.row, p.col, aiColor)
    }));
    scored.sort((a, b) => b.s - a.s);

    // 限制候选点数量防止过慢
    const limit = depth >= 4 ? 15 : 20;
    const top = scored.slice(0, limit);

    if (isMaximizing) {
        let maxEval = -Infinity;
        for (const { row, col } of top) {
            grid[row][col] = currentColor;
            const ev = minimax(grid, depth - 1, alpha, beta, false, aiColor);
            grid[row][col] = EMPTY;
            maxEval = Math.max(maxEval, ev);
            alpha = Math.max(alpha, ev);
            if (beta <= alpha) break;
        }
        return maxEval;
    } else {
        let minEval = Infinity;
        for (const { row, col } of top) {
            grid[row][col] = currentColor;
            const ev = minimax(grid, depth - 1, alpha, beta, true, aiColor);
            grid[row][col] = EMPTY;
            minEval = Math.min(minEval, ev);
            beta = Math.min(beta, ev);
            if (beta <= alpha) break;
        }
        return minEval;
    }
}

/** 快速检查是否有人获胜（只看有棋子的地方） */
function quickWinCheck(grid, aiColor) {
    const humanColor = aiColor === BLACK ? WHITE : BLACK;
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] !== EMPTY) {
                const w = checkWin(grid, r, c, grid[r][c]);
                if (w) return grid[r][c];
            }
        }
    }
    return null;
}

// ---------- 公共 API ----------

/**
 * AI 计算最佳落子位置
 * @param {Board} board 棋盘对象
 * @param {number} aiColor AI 的颜色
 * @param {string} difficulty 难度 'easy'|'medium'|'hard'
 * @returns {{row: number, col: number}}
 */
function getAIMove(board, aiColor, difficulty = 'medium') {
    const depth = DIFFICULTY[difficulty] || DIFFICULTY.medium;
    const grid = board.grid;

    // 第一步下中心附近
    if (board.moveCount === 0) {
        const mid = Math.floor(BOARD_SIZE / 2);
        return { row: mid, col: mid };
    }
    if (board.moveCount === 1) {
        const mid = Math.floor(BOARD_SIZE / 2);
        if (grid[mid][mid] !== EMPTY) {
            // 随机偏移一格
            const offsets = [[0, 1], [1, 0], [1, 1], [-1, 1]];
            const [dr, dc] = offsets[Math.floor(Math.random() * offsets.length)];
            return { row: mid + dr, col: mid + dc };
        }
        return { row: mid, col: mid };
    }

    const candidates = getCandidates(grid);
    const scored = candidates.map(p => ({
        ...p,
        s: scoreCandidate(grid, p.row, p.col, aiColor)
    }));
    scored.sort((a, b) => b.s - a.s);

    // 检查是否有直接获胜的点
    const humanColor = aiColor === BLACK ? WHITE : BLACK;
    for (const { row, col } of scored) {
        grid[row][col] = aiColor;
        if (checkWin(grid, row, col, aiColor)) {
            grid[row][col] = EMPTY;
            return { row, col };
        }
        grid[row][col] = EMPTY;
    }

    // 检查是否需要阻止对手获胜
    for (const { row, col } of scored) {
        grid[row][col] = humanColor;
        if (checkWin(grid, row, col, humanColor)) {
            grid[row][col] = EMPTY;
            return { row, col };
        }
        grid[row][col] = EMPTY;
    }

    // Minimax 搜索
    let bestMove = scored[0];
    let bestScore = -Infinity;

    const limit = depth >= 4 ? 12 : 15;
    const top = scored.slice(0, limit);

    for (const { row, col } of top) {
        grid[row][col] = aiColor;
        const score = minimax(grid, depth - 1, -Infinity, Infinity, false, aiColor);
        grid[row][col] = EMPTY;

        if (score > bestScore) {
            bestScore = score;
            bestMove = { row, col };
        }
    }

    return bestMove;
}

// ui.js — 棋盘渲染、棋子绘制、获胜线高亮、覆盖层


class Renderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.canvas.width = BOARD_PX;
        this.canvas.height = BOARD_PX;

        // 高 DPI 支持
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = BOARD_PX * dpr;
        this.canvas.height = BOARD_PX * dpr;
        this.canvas.style.width = BOARD_PX + 'px';
        this.canvas.style.height = BOARD_PX + 'px';
        this.ctx.scale(dpr, dpr);

        this.hoverPos = null;   // 悬停位置 {row, col}
        this.winLine = null;    // 获胜连线
    }

    // ------ 坐标转换 ------

    /** 像素坐标 → 棋盘坐标 */
    pxToBoard(px, py) {
        const col = Math.round((px - PADDING) / CELL_SIZE);
        const row = Math.round((py - PADDING) / CELL_SIZE);
        if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return null;
        return { row, col };
    }

    /** 棋盘坐标 → 像素坐标 */
    boardToPx(row, col) {
        return {
            x: PADDING + col * CELL_SIZE,
            y: PADDING + row * CELL_SIZE,
        };
    }

    // ------ 绘制 ------

    /** 完整重绘 */
    draw(board, lastMove, winLine) {
        const ctx = this.ctx;
        this.winLine = winLine;

        // 木纹背景
        this._drawBoardBg(ctx);

        // 网格线
        this._drawGrid(ctx);

        // 星位（天元 + 四个星）
        this._drawStars(ctx);

        // 棋子
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                if (board[r][c] !== EMPTY) {
                    this._drawStone(ctx, r, c, board[r][c],
                        lastMove && lastMove.row === r && lastMove.col === c);
                }
            }
        }

        // 悬停预览
        if (this.hoverPos && board[this.hoverPos.row][this.hoverPos.col] === EMPTY) {
            this._drawHover(ctx, this.hoverPos.row, this.hoverPos.col);
        }

        // 获胜线
        if (winLine && winLine.length >= 2) {
            this._drawWinLine(ctx, winLine);
        }
    }

    // ------ 内部绘制方法 ------

    _drawBoardBg(ctx) {
        // 渐变木纹
        const grad = ctx.createLinearGradient(0, 0, BOARD_PX, BOARD_PX);
        grad.addColorStop(0, '#e8c878');
        grad.addColorStop(0.3, '#dcb560');
        grad.addColorStop(0.5, '#e2be6a');
        grad.addColorStop(0.7, '#d4a84a');
        grad.addColorStop(1, '#ddb85c');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, BOARD_PX, BOARD_PX);

        // 细微纹理
        ctx.globalAlpha = 0.08;
        for (let i = 0; i < BOARD_PX; i += 3) {
            const offset = Math.sin(i * 0.05) * 4;
            ctx.fillStyle = i % 6 === 0 ? '#b08030' : '#c09040';
            ctx.fillRect(0, i + offset, BOARD_PX, 1);
        }
        ctx.globalAlpha = 1;

        // 边框阴影
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, BOARD_PX - 2, BOARD_PX - 2);
    }

    _drawGrid(ctx) {
        ctx.strokeStyle = '#5a3a10';
        ctx.lineWidth = 1;

        for (let i = 0; i < BOARD_SIZE; i++) {
            const pos = PADDING + i * CELL_SIZE;
            // 横线
            ctx.beginPath();
            ctx.moveTo(PADDING, pos);
            ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, pos);
            ctx.stroke();
            // 竖线
            ctx.beginPath();
            ctx.moveTo(pos, PADDING);
            ctx.lineTo(pos, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
            ctx.stroke();
        }
    }

    _drawStars(ctx) {
        const stars = [
            [3, 3], [3, 11], [7, 7], [11, 3], [11, 11]
        ];
        ctx.fillStyle = '#5a3a10';
        for (const [r, c] of stars) {
            const { x, y } = this.boardToPx(r, c);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    _drawStone(ctx, row, col, player, isLast) {
        const { x, y } = this.boardToPx(row, col);
        const r = CELL_SIZE * 0.43;

        ctx.save();

        // 阴影
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        if (player === BLACK) {
            // 黑棋渐变
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
            grad.addColorStop(0, '#606060');
            grad.addColorStop(0.5, '#303030');
            grad.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = grad;
        } else {
            // 白棋渐变
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.6, '#f0f0f0');
            grad.addColorStop(1, '#d0d0d0');
            ctx.fillStyle = grad;
        }

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // 最后一手标记 — 红色小圆点
        if (isLast) {
            ctx.fillStyle = '#e02020';
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    _drawHover(ctx, row, col) {
        const { x, y } = this.boardToPx(row, col);
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(x, y, CELL_SIZE * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    _drawWinLine(ctx, cells) {
        if (cells.length < 2) return;

        // 按行列排序连线
        const sorted = [...cells].sort((a, b) =>
            a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1]);

        const first = this.boardToPx(sorted[0][0], sorted[0][1]);
        const last = this.boardToPx(sorted[sorted.length - 1][0], sorted[sorted.length - 1][1]);

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.85)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(255, 0, 0, 0.6)';
        ctx.shadowBlur = 10;

        ctx.beginPath();
        ctx.moveTo(first.x, first.y);
        ctx.lineTo(last.x, last.y);
        ctx.stroke();

        // 高亮每个获胜棋子
        for (const [r, c] of cells) {
            const { x, y } = this.boardToPx(r, c);
            ctx.strokeStyle = 'rgba(255, 80, 80, 0.7)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE * 0.45, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.restore();
    }
}

// === main.js ===
// main.js — 游戏初始化、事件监听


// ---------- 状态 ----------

let board = new Board();
let renderer;
let gameMode = 'pve';       // 'pvp' | 'pve'
let playerColor = BLACK;    // 玩家执子颜色（人机模式）
let aiColor = WHITE;
let difficulty = 'medium';
let gameOver = false;
let winLine = null;
let aiThinking = false;

// ---------- DOM ----------

const $ = (sel) => document.querySelector(sel);

function init() {
    const canvas = $('#board');
    renderer = new Renderer(canvas);

    bindEvents(canvas);
    render();
    updateStatus();
    updateHistory();
}

// ---------- 事件 ----------

function bindEvents(canvas) {
    // 棋盘点击
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('mousemove', onCanvasMove);
    canvas.addEventListener('mouseleave', () => {
        renderer.hoverPos = null;
        render();
    });

    // 模式选择
    $('#btn-pvp').addEventListener('click', () => setMode('pvp'));
    $('#btn-pve').addEventListener('click', () => setMode('pve'));

    // 难度选择
    $('#difficulty').addEventListener('change', (e) => {
        difficulty = e.target.value;
    });

    // 先手选择
    $('#btn-black').addEventListener('click', () => setPlayerColor(BLACK));
    $('#btn-white').addEventListener('click', () => setPlayerColor(WHITE));

    // 悔棋
    $('#btn-undo').addEventListener('click', undoMove);

    // 新局
    $('#btn-restart').addEventListener('click', restart);

    // 覆盖层按钮
    $('#btn-play-again').addEventListener('click', () => {
        hideOverlay();
        restart();
    });
}

function onCanvasClick(e) {
    if (gameOver || aiThinking) return;

    const rect = e.target.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const pos = renderer.pxToBoard(px, py);
    if (!pos) return;

    const { row, col } = pos;

    // 人机模式：只在轮到玩家时响应
    if (gameMode === 'pve' && board.current !== playerColor) return;

    if (!isValidMove(board.grid, row, col)) return;

    doMove(row, col);
}

function onCanvasMove(e) {
    if (gameOver || aiThinking) return;
    const rect = e.target.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const pos = renderer.pxToBoard(px, py);
    renderer.hoverPos = pos;
    render();
}

// ---------- 游戏逻辑 ----------

function doMove(row, col) {
    const player = board.current;
    board.place(row, col, player);
    playPlace();

    // 检查胜负
    const win = checkWin(board.grid, row, col, player);
    if (win) {
        winLine = win;
        gameOver = true;
        render();
        onGameEnd(player);
        return;
    }

    // 检查平局
    if (isBoardFull(board.grid)) {
        gameOver = true;
        render();
        onDraw();
        return;
    }

    render();
    updateStatus();
    updateHistory();

    // 人机模式：AI 走
    if (gameMode === 'pve' && board.current === aiColor && !gameOver) {
        aiThinking = true;
        updateStatus('AI 思考中...');
        setTimeout(() => {
            const move = getAIMove(board, aiColor, difficulty);
            aiThinking = false;
            doMove(move.row, move.col);
        }, 100);
    }
}

function onGameEnd(winner) {
    const isPlayerWin = gameMode === 'pvp' || winner === playerColor;
    if (isPlayerWin) {
        playWin();
        showOverlay(`🎉 ${COLOR_NAME[winner]}获胜！`, '#4CAF50');
    } else {
        playLose();
        showOverlay(`😔 ${COLOR_NAME[winner]}获胜！`, '#e53935');
    }
    updateStatus(`游戏结束 — ${COLOR_NAME[winner]}获胜！`);
}

function onDraw() {
    showOverlay('🤝 平局！', '#FF9800');
    updateStatus('平局！');
}

function undoMove() {
    if (gameOver || board.moveCount === 0) return;

    if (gameMode === 'pve') {
        // 人机模式悔两步（AI + 玩家）
        board.undo();
        if (board.moveCount > 0 && board.current !== playerColor) {
            board.undo();
        }
    } else {
        board.undo();
    }

    winLine = null;
    gameOver = false;
    hideOverlay();
    render();
    updateStatus();
    updateHistory();
}

function restart() {
    board.reset();
    gameOver = false;
    winLine = null;
    aiThinking = false;
    hideOverlay();
    render();
    updateStatus();
    updateHistory();

    // 如果人机模式玩家选白，AI先手
    if (gameMode === 'pve' && playerColor === WHITE) {
        aiThinking = true;
        updateStatus('AI 思考中...');
        setTimeout(() => {
            const move = getAIMove(board, aiColor, difficulty);
            aiThinking = false;
            doMove(move.row, move.col);
        }, 200);
    }
}

// ---------- 模式设置 ----------

function setMode(mode) {
    gameMode = mode;
    $('#btn-pvp').classList.toggle('active', mode === 'pvp');
    $('#btn-pve').classList.toggle('active', mode === 'pve');
    $('#difficulty-group').style.display = mode === 'pve' ? 'flex' : 'none';
    $('#color-group').style.display = mode === 'pve' ? 'flex' : 'none';
    restart();
}

function setPlayerColor(color) {
    playerColor = color;
    aiColor = color === BLACK ? WHITE : BLACK;
    $('#btn-black').classList.toggle('active', color === BLACK);
    $('#btn-white').classList.toggle('active', color === WHITE);
    restart();
}

// ---------- 渲染 ----------

function render() {
    renderer.draw(board.grid, board.lastMove, winLine);
}

function updateStatus(text) {
    const el = $('#status');
    if (text) {
        el.textContent = text;
        return;
    }
    if (gameOver) return;
    const name = COLOR_NAME[board.current];
    if (gameMode === 'pve') {
        el.textContent = board.current === playerColor ? `轮到你（${name}）` : `AI（${name}）思考中...`;
    } else {
        el.textContent = `${name}落子`;
    }
}

function updateHistory() {
    const el = $('#history');
    if (board.moveCount === 0) {
        el.innerHTML = '<div class="history-empty">暂无走法</div>';
        return;
    }
    let html = '';
    for (let i = 0; i < board.history.length; i++) {
        const m = board.history[i];
        const colLabel = String.fromCharCode(65 + m.col);
        const rowLabel = BOARD_SIZE - m.row;
        const color = m.player === BLACK ? '●' : '○';
        const num = String(i + 1).padStart(2, ' ');
        html += `<div class="history-item"><span class="h-num">${num}.</span> <span class="h-stone ${m.player === BLACK ? 'black' : 'white'}">${color}</span> ${colLabel}${rowLabel}</div>`;
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

// ---------- 覆盖层 ----------

function showOverlay(msg, color) {
    const overlay = $('#overlay');
    const msgEl = $('#overlay-msg');
    msgEl.textContent = msg;
    msgEl.style.color = color;
    overlay.classList.add('show');
}

function hideOverlay() {
    $('#overlay').classList.remove('show');
}

// ---------- 启动 ----------

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()};


</script>
