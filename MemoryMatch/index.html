<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .header{font-size:42px;color:#ab47bc;text-shadow:0 0 30px rgba(171,71,188,0.5);margin-bottom:12px;letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:10px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#ab47bc}
        #board{display:inline-grid;gap:8px;padding:10px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.08)}
        .card{width:90px;height:90px;border-radius:12px;cursor:pointer;transition:all 0.3s;perspective:800px;user-select:none}
        .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
        .card:not(.flipped):not(.matched):hover .card-inner{transform:rotateY(15deg) scale(1.05)}
        .card.flipped .card-inner{transform:rotateY(180deg)}
        .card.matched .card-inner{transform:rotateY(180deg) scale(1.05)}
        .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center}
        .card-front{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid rgba(171,71,188,0.3);font-size:36px}
        .card-back{background:linear-gradient(135deg,#2a1a3e,#1a1040);border:2px solid rgba(171,71,188,0.2);transform:rotateY(180deg);font-size:42px}
        .card:not(.flipped):not(.matched):hover .card-inner{transform:rotateY(10deg)}
        .card.matched{opacity:0.7;pointer-events:none;animation:matchPop 0.4s ease-out}
        .card.matched .card-back{border-color:#4caf50;background:linear-gradient(135deg,#1a2e1a,#104020);box-shadow:0 0 15px rgba(76,175,80,0.3)}
        @keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(171,71,188,0.5)}
        .menu-btn{background:linear-gradient(135deg,#ab47bc 0%,#8e24aa 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(171,71,188,0.5)}
        .diff-btns{display:flex;gap:10px;margin-bottom:15px}
        .diff-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .diff-btn:hover,.diff-btn.active{border-color:#ab47bc;color:#ab47bc;background:rgba(171,71,188,0.1)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ab47bc;font-size:14px;margin-bottom:6px;text-align:center}
        .ctrl-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 14px;font-size:12px;color:#888;cursor:pointer;transition:all 0.2s;margin-top:10px}
        .ctrl-btn:hover{background:rgba(171,71,188,0.2);color:#ab47bc;border-color:#ab47bc}
    </style>
</head>
<body>
    <div class="header">记忆翻牌</div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">步数</div><div class="info-val" id="moves">0</div></div>
        <div class="info-box"><div class="info-label">配对</div><div class="info-val" id="pairs">0/0</div></div>
        <div class="info-box"><div class="info-label">时间</div><div class="info-val" id="timer">0</div></div>
    </div>
    <div id="board"></div>
    <button class="ctrl-btn" id="btnRestart">↺ 重新开始 (R)</button>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#ab47bc">记忆翻牌</div>
        <div class="diff-btns">
            <button class="diff-btn active" data-cols="4" data-rows="3">4×3 简单</button>
            <button class="diff-btn" data-cols="4" data-rows="4">4×4 中等</button>
            <button class="diff-btn" data-cols="6" data-rows="5">6×5 困难</button>
        </div>
        <button class="menu-btn" id="btnStart">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击翻开卡牌，找到相同的两张即配对成功</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>记住卡牌位置，用最少步数完成所有配对</div>
            <div>步数越少、时间越短，分数越高</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">全部配对！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" id="btnAgain">再来一局</button>
    </div>

<script type="module" src="js/main.js"></script>

</body>
</html>
