<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合金弹头 - Metal Slug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 40px rgba(255, 68, 68, 0.3),
                        0 0 80px rgba(255, 68, 68, 0.1);
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
            background: #0f0f23;
        }

        .title-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF4444, #FFD700, #FF4444);
        }

        /* 移动端提示 */
        @media (max-width: 1200px) {
            #gameContainer {
                transform: scale(0.8);
                transform-origin: center center;
            }
        }

        @media (max-width: 900px) {
            #gameContainer {
                transform: scale(0.6);
                transform-origin: center center;
            }
        }

        @media (max-width: 600px) {
            #gameContainer {
                transform: scale(0.4);
                transform-origin: center center;
            }
        }

        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="title-bar"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="js/main.js"></script>

</html>
