<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .header{display:flex;align-items:center;gap:20px;margin-bottom:12px}
        .title{font-size:42px;color:#42a5f5;text-shadow:0 0 30px rgba(66,165,245,0.5);letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:10px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#42a5f5}
        #board{display:inline-grid;gap:2px;background:rgba(255,255,255,0.03);padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1)}
        .cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;border-radius:4px;cursor:pointer;transition:all 0.1s;user-select:none}
        .cell.hidden{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.08)}
        .cell.hidden:hover{background:rgba(66,165,245,0.25);border-color:rgba(66,165,245,0.4)}
        .cell.revealed{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.03)}
        .cell.flagged{background:rgba(255,152,0,0.2);border:1px solid rgba(255,152,0,0.3)}
        .cell.mine-hit{background:rgba(244,67,54,0.4);border:1px solid rgba(244,67,54,0.5)}
        .cell.mine-show{background:rgba(244,67,54,0.15)}
        .n1{color:#42a5f5}.n2{color:#66bb6a}.n3{color:#f44336}.n4{color:#7e57c2}
        .n5{color:#ff7043}.n6{color:#26c6da}.n7{color:#fff}.n8{color:#bdbdbd}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(66,165,245,0.5)}
        .menu-btn{background:linear-gradient(135deg,#42a5f5 0%,#1e88e5 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(66,165,245,0.5)}
        .diff-btns{display:flex;gap:10px;margin-bottom:15px}
        .diff-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .diff-btn:hover,.diff-btn.active{border-color:#42a5f5;color:#42a5f5;background:rgba(66,165,245,0.1)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#42a5f5;font-size:14px;margin-bottom:6px;text-align:center}
        .controls-row{display:flex;gap:10px;margin-top:10px}
        .ctrl-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 14px;font-size:12px;color:#888;cursor:pointer;transition:all 0.2s}
        .ctrl-btn:hover{background:rgba(66,165,245,0.2);color:#42a5f5;border-color:#42a5f5}
    </style>
</head>
<body>
    <div class="header"><div class="title">扫雷</div></div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">地雷</div><div class="info-val" id="minesLeft">10</div></div>
        <div class="info-box"><div class="info-label">时间</div><div class="info-val" id="timer">0</div></div>
        <div class="info-box"><div class="info-label">最高</div><div class="info-val" id="high">--</div></div>
    </div>
    <div id="board"></div>
    <div class="controls-row">
        <button class="ctrl-btn" id="restartBtn">↺ 重新开始 (R)</button>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#42a5f5">扫雷</div>
        <div class="diff-btns">
            <button class="diff-btn active" data-diff="easy">简单 9×9</button>
            <button class="diff-btn" data-diff="medium">中等 16×16</button>
            <button class="diff-btn" data-diff="hard">困难 30×16</button>
        </div>
        <button class="menu-btn" id="startBtn">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>左键：揭开格子</div>
            <div>右键：标记/取消旗帜</div>
            <div>数字表示周围8格的地雷数</div>
            <div>R：重新开始 | P：暂停</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>揭开所有非雷格子即获胜</div>
            <div>踩到地雷则游戏结束</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">恭喜通关！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" id="winRestartBtn">再来一局</button>
    </div>
    <div id="loseOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">踩雷了！</div>
        <div id="loseStats" class="stats"></div>
        <button class="menu-btn" id="loseRestartBtn">再来一局</button>
    </div>

    <script type="module" src="js/main.js"></script>
<script>
if(location.protocol==="file:"){document.body.innerHTML='<div style="position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;font-family:sans-serif;color:#fff;z-index:9999"><div style="font-size:48px;margin-bottom:20px">⚠️</div><h2 style="color:#ff6b4a;font-size:20px;margin-bottom:12px">需要启动HTTP服务器</h2><p style="color:#888;font-size:13px;line-height:1.8;max-width:400px">此游戏使用ES Modules，无法通过file://打开。<br>请在游戏目录运行:</p><div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 20px;margin:16px;font-family:monospace;color:#4aeaff;font-size:13px">python -m http.server 8000</div><p style="color:#666;font-size:12px">然后访问 http://localhost:8000</p><a href="../index.html" style="margin-top:16px;color:#ff6b4a;font-size:13px;text-decoration:none">← 返回游戏合集</a></div>'}
</script>
</body>
</html>
