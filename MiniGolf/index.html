    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        #gameCanvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.15), 0 0 80px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.4s;
            padding: 20px;
        }
        .overlay.fade-out { opacity: 0; pointer-events: none; }
        .overlay.fade-fast { animation: fadeInOut 1.2s ease-in-out; }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .overlay-content {
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            color: #fff;
        }
        .course-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .course-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .course-btn.active {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ADE80;
            color: #4ADE80;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5) !important; }
        button:active { transform: translateY(0); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(74,222,128,0.3); border-radius: 3px; }
    </style>

// ============================================
// Mini Golf - Sound System (Web Audio API)
// ============================================

let audioCtx = null;

function ensureAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
}

function playTone(freq, duration, type = 'sine', vol = 0.15, detune = 0) {
    try {
        const ctx = ensureAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        if (detune) osc.detune.setValueAtTime(detune, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
    } catch (e) {}
}

function playNoise(duration, vol = 0.08) {
    try {
        const ctx = ensureAudioCtx();
        const bufferSize = ctx.sampleRate * duration;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.5;
        }
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(2000, ctx.currentTime);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start(ctx.currentTime);
    } catch (e) {}
}

function resumeAudio() {
    try {
        const ctx = ensureAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
    } catch (e) {}
}

function playHit() {
    playTone(440, 0.12, 'triangle', 0.2);
    playTone(880, 0.08, 'sine', 0.08);
}

function playWallBounce() {

}

}

function playHoleIn() {
    const ctx = ensureAudioCtx();
    const t = ctx.currentTime;
    [523, 659, 784, 1047].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, t + i * 0.12);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t + i * 0.12);
        osc.stop(t + i * 0.12 + 0.5);
    });
}

// ============================================
// Mini Golf - Physics Engine
// ============================================


function createBall(x, y) {
    return { x, y, vx: 0, vy: 0, inHole: false, inWater: false };
}

function resetBall(ball, x, y) {
    ball.x = x;
    ball.y = y;
    ball.vx = 0;
    ball.vy = 0;
    ball.inHole = false;
    ball.inWater = false;
}

function isBallMoving(ball) {
    return !ball.inHole && (Math.abs(ball.vx) > STOP_THRESHOLD || Math.abs(ball.vy) > STOP_THRESHOLD);
}

function applyShot(ball, vx, vy) {
    const speed = Math.sqrt(vx * vx + vy * vy);
    if (speed > MAX_SPEED) {
        const ratio = MAX_SPEED / speed;
        vx *= ratio;
        vy *= ratio;
    }
    ball.vx = vx;
    ball.vy = vy;
}

// Closest point on segment to point
function closestPointOnSeg(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return { x: x1, y: y1, t: 0 };
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    return { x: x1 + t * dx, y: y1 + t * dy, t };
}

// Ball-Wall collision
function collideWall(ball, wall, bounce) {
    const cp = closestPointOnSeg(ball.x, ball.y, wall.x1, wall.y1, wall.x2, wall.y2);
    const dx = ball.x - cp.x, dy = ball.y - cp.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < BALL_RADIUS && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
            ball.vx -= (1 + bounce) * dot * nx;
            ball.vy -= (1 + bounce) * dot * ny;
        }
        const push = BALL_RADIUS - dist + 0.5;
        ball.x += nx * push;
        ball.y += ny * push;
        return true;
    }
    return false;
}

// Ball-Bumper collision
function collideBumper(ball, bumper) {
    const dx = ball.x - bumper.x, dy = ball.y - bumper.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = BALL_RADIUS + bumper.r;
    if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
            ball.vx -= (1 + bumper.bounce) * dot * nx;
            ball.vy -= (1 + bumper.bounce) * dot * ny;
        }
        const push = minDist - dist + 1;
        ball.x += nx * push;
        ball.y += ny * push;
        return true;
    }
    return false;
}

// Ball-Windmill collision
function collideWindmill(ball, wm) {
    const cos = Math.cos(wm.angle), sin = Math.sin(wm.angle);
    let hit = false;
    for (let arm = 0; arm < 4; arm++) {
        const a = wm.angle + arm * Math.PI / 2;
        const ac = Math.cos(a), as = Math.sin(a);
        const x1 = wm.x - ac * wm.armLength, y1 = wm.y - as * wm.armLength;
        const x2 = wm.x + ac * wm.armLength, y2 = wm.y + as * wm.armLength;
        const cp = closestPointOnSeg(ball.x, ball.y, x1, y1, x2, y2);
        const dx = ball.x - cp.x, dy = ball.y - cp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < BALL_RADIUS + wm.bladeWidth / 2 && dist > 0) {
            const nx = dx / dist, ny = dy / dist;
            const dot = ball.vx * nx + ball.vy * ny;
            if (dot < 0) {
                ball.vx -= (1 + 0.8) * dot * nx;
                ball.vy -= (1 + 0.8) * dot * ny;
            }
            // Add windmill tangential velocity
            const rx = cp.x - wm.x, ry = cp.y - wm.y;
            const tangentX = -ry * wm.speed * 30;
            const tangentY = rx * wm.speed * 30;
            ball.vx += tangentX * 0.05;
            ball.vy += tangentY * 0.05;
            const push = BALL_RADIUS + wm.bladeWidth / 2 - dist + 1;
            ball.x += nx * push;
            ball.y += ny * push;
            hit = true;
        }
    }
    return hit;
}

// Check if ball is in a rectangle area
function inRect(ball, rect) {
    return ball.x >= rect.x && ball.x <= rect.x + rect.w &&
           ball.y >= rect.y && ball.y <= rect.y + rect.h;
}

// Check ball-hole
function checkHole(ball, holePos) {
    const dx = ball.x - holePos.x, dy = ball.y - holePos.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (dist < HOLE_RADIUS && speed < HOLE_CAPTURE_SPEED) {
        ball.inHole = true;
        ball.vx = 0;
        ball.vy = 0;
        ball.x = holePos.x;
        ball.y = holePos.y;
        return true;
    }
    // Gravitational pull when close and slow
    if (dist < HOLE_RADIUS * 3 && speed < HOLE_CAPTURE_SPEED * 1.5) {
        const pull = 0.0015 * (1 - dist / (HOLE_RADIUS * 3));
        ball.vx -= dx * pull * dist;
        ball.vy -= dy * pull * dist;
    }
    return false;
}

// Check ball-out-of-bounds (safety)
function checkBounds(ball) {
    const margin = BALL_RADIUS + 5;
    if (ball.x < margin) { ball.x = margin; ball.vx = Math.abs(ball.vx) * 0.5; }
    if (ball.x > COURSE_W - margin) { ball.x = COURSE_W - margin; ball.vx = -Math.abs(ball.vx) * 0.5; }
    if (ball.y < margin) { ball.y = margin; ball.vy = Math.abs(ball.vy) * 0.5; }
    if (ball.y > COURSE_H - margin) { ball.y = COURSE_H - margin; ball.vy = -Math.abs(ball.vy) * 0.5; }
}

// Main physics step
function step(ball, course, dt = 1) {
    if (ball.inHole) return { wallHit: false, bumperHit: false, waterHit: false, sandHit: false, holeIn: false, windmillHit: false };

    const events = { wallHit: false, bumperHit: false, waterHit: false, sandHit: false, holeIn: false, windmillHit: false };

    // Update windmill angle
    if (course.windmill) {
        course.windmill.angle = (course.windmill.angle || 0) + course.windmill.speed * dt;
    }

    // Apply slopes
    if (course.slopes) {
        for (const s of course.slopes) {
            if (inRect(ball, s)) {
                ball.vx += s.fx * SLOPE_FORCE * dt;
                ball.vy += s.fy * SLOPE_FORCE * dt;
            }
        }
    }

    // Check sand friction
    let onSand = false;
    if (course.sand) {
        for (const s of course.sand) {
            if (inRect(ball, s)) { onSand = true; events.sandHit = true; break; }
        }
    }

    const friction = onSand ? SAND_FRICTION : (FRICTION[course.theme] || FRICTION.grass);

    // Sub-step movement
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    const steps = speed > 3 ? Math.ceil(speed / 2) : 1;
    const subDt = dt / steps;

    for (let i = 0; i < steps; i++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        // Wall collisions
        for (const w of course.walls) {
            if (collideWall(ball, w, w.bounce || BOUNCE_FACTOR)) {
                events.wallHit = true;
            }
        }

        // Bumper collisions
        if (course.bumpers) {
            for (const b of course.bumpers) {
                if (collideBumper(ball, b)) {
                    events.bumperHit = true;
                }
            }
        }

        // Windmill collision
        if (course.windmill) {
            if (collideWindmill(ball, course.windmill)) {
                events.windmillHit = true;
            }
        }

        checkBounds(ball);
    }

    // Apply friction
    ball.vx *= Math.pow(friction, dt);
    ball.vy *= Math.pow(friction, dt);

    // Check water
    if (course.water) {
        for (const w of course.water) {
            if (inRect(ball, w)) {
                const speed2 = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                if (speed2 < 2) {
                    events.waterHit = true;
                    ball.inWater = true;
                    ball.vx = 0;
                    ball.vy = 0;
                } else {
                    ball.vx *= 0.92;
                    ball.vy *= 0.92;
                }
                break;
            }
        }
    }

    // Check hole
    if (checkHole(ball, course.hole)) {
        events.holeIn = true;
    }

    // Stop if very slow
    if (Math.abs(ball.vx) < STOP_THRESHOLD && Math.abs(ball.vy) < STOP_THRESHOLD) {
        ball.vx = 0;
        ball.vy = 0;
    }

    return events;
}

// Simulate trajectory for preview
function simulateTrajectory(startX, startY, vx, vy, course, maxSteps = 120) {
    const points = [];
    let x = startX, y = startY;
    let svx = vx, svy = vy;
    const friction = FRICTION[course.theme] || FRICTION.grass;

    for (let i = 0; i < maxSteps; i++) {
        x += svx;
        y += svy;

        // Wall bounce
        for (const w of course.walls) {
            const cp = closestPointOnSeg(x, y, w.x1, w.y1, w.x2, w.y2);
            const dx = x - cp.x, dy = y - cp.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_RADIUS && dist > 0) {
                const nx = dx / dist, ny = dy / dist;
                const dot = svx * nx + svy * ny;
                if (dot < 0) {
                    svx -= (1 + BOUNCE_FACTOR) * dot * nx;
                    svy -= (1 + BOUNCE_FACTOR) * dot * ny;
                }
                x += nx * (BALL_RADIUS - dist + 1);
                y += ny * (BALL_RADIUS - dist + 1);
            }
        }

        // Bumper bounce
        if (course.bumpers) {
            for (const b of course.bumpers) {
                const dx = x - b.x, dy = y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS + b.r && dist > 0) {
                    const nx = dx / dist, ny = dy / dist;
                    const dot = svx * nx + svy * ny;
                    if (dot < 0) {
                        svx -= (1 + b.bounce) * dot * nx;
                        svy -= (1 + b.bounce) * dot * ny;
                    }
                }
            }
        }

        svx *= friction;
        svy *= friction;

        if (Math.abs(svx) < 0.05 && Math.abs(svy) < 0.05) break;
        if (x < 10 || x > COURSE_W - 10 || y < 10 || y > COURSE_H - 10) break;

        if (i % 3 === 0) points.push({ x, y, alpha: 1 - i / maxSteps });
    }
    return points;
}

// ============================================
// Mini Golf - Course Rendering
// ============================================


function getTheme(course) {
    return THEMES[course.theme] || THEMES.grass;
}

// Draw the course background
function drawCourse(ctx, course, toCanvasX, toCanvasY, scale, frameCount) {
    const theme = getTheme(course);
    const cx1 = toCanvasX(0), cy1 = toCanvasY(0);
    const cw = course.w * scale, ch = course.h * scale;

    // Background
    const grad = ctx.createRadialGradient(
        cx1 + cw / 2, cy1 + ch / 2, 0,
        cx1 + cw / 2, cy1 + ch / 2, Math.max(cw, ch) * 0.7
    );
    grad.addColorStop(0, theme.courseCenter);
    grad.addColorStop(1, theme.course);
    ctx.fillStyle = grad;
    ctx.fillRect(cx1, cy1, cw, ch);

    // Grass texture dots
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let i = 0; i < 80; i++) {
        const x = cx1 + (i * 137.5 % cw);
        const y = cy1 + (i * 89.3 % ch);
        ctx.beginPath();
        ctx.arc(x, y, 2 * scale, 0, Math.PI * 2);
        ctx.fill();
    }

    // Slopes
    if (course.slopes) {
        for (const s of course.slopes) {
            const sx = toCanvasX(s.x), sy = toCanvasY(s.y);
            ctx.fillStyle = SLOPE_COLOR;
            ctx.fillRect(sx, sy, s.w * scale, s.h * scale);
            // Arrow showing slope direction
            ctx.strokeStyle = SLOPE_ARROW;
            ctx.lineWidth = 2;
            const dirX = s.fx > 0 ? 1 : s.fx < 0 ? -1 : 0;
            const dirY = s.fy > 0 ? 1 : s.fy < 0 ? -1 : 0;
            for (let i = 0; i < 3; i++) {
                const ax = sx + (s.w * 0.3 + i * s.w * 0.2) * scale;
                const ay = sy + s.h * 0.5 * scale;
                ctx.beginPath();
                ctx.moveTo(ax - dirX * 10 * scale, ay - dirY * 10 * scale);
                ctx.lineTo(ax + dirX * 10 * scale, ay + dirY * 10 * scale);
                ctx.lineTo(ax + dirX * 6 * scale - dirY * 4 * scale, ay + dirY * 6 * scale + dirX * 4 * scale);
                ctx.stroke();
            }
            ctx.lineWidth = 1;
        }
    }

    // Sand traps
    if (course.sand) {
        for (const s of course.sand) {
            const sx = toCanvasX(s.x), sy = toCanvasY(s.y);
            const sandGrad = ctx.createRadialGradient(
                sx + s.w * scale / 2, sy + s.h * scale / 2, 0,
                sx + s.w * scale / 2, sy + s.h * scale / 2, Math.max(s.w, s.h) * scale * 0.6
            );
            sandGrad.addColorStop(0, SAND_COLOR);
            sandGrad.addColorStop(1, SAND_DARK);
            ctx.fillStyle = sandGrad;
            ctx.beginPath();
            ctx.ellipse(sx + s.w * scale / 2, sy + s.h * scale / 2,
                       s.w * scale / 2, s.h * scale / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            // Sand dots
            ctx.fillStyle = 'rgba(180,160,120,0.3)';
            for (let i = 0; i < 12; i++) {
                const dx = sx + (s.w * (0.1 + Math.random() * 0.8)) * scale;
                const dy = sy + (s.h * (0.1 + Math.random() * 0.8)) * scale;
                ctx.beginPath();
                ctx.arc(dx, dy, 1.5 * scale, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Water hazards
    if (course.water) {
        for (const w of course.water) {
            const wx = toCanvasX(w.x), wy = toCanvasY(w.y);
            const waterGrad = ctx.createRadialGradient(
                wx + w.w * scale / 2, wy + w.h * scale / 2, 0,
                wx + w.w * scale / 2, wy + w.h * scale / 2, Math.max(w.w, w.h) * scale * 0.6
            );
            waterGrad.addColorStop(0, WATER_COLOR);
            waterGrad.addColorStop(1, WATER_DARK);
            ctx.fillStyle = waterGrad;
            ctx.beginPath();
            ctx.ellipse(wx + w.w * scale / 2, wy + w.h * scale / 2,
                       w.w * scale / 2, w.h * scale / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            // Animated water ripples
            const time = frameCount * 0.03;
            ctx.strokeStyle = WATER_HIGHLIGHT;
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 3; i++) {
                const rx = w.w * 0.15 * (i + 1) * scale;
                const ry = w.h * 0.12 * (i + 1) * scale;
                ctx.globalAlpha = 0.3 - i * 0.08;
                ctx.beginPath();
                ctx.ellipse(wx + w.w * scale / 2 + Math.sin(time + i) * 5 * scale,
                           wy + w.h * scale / 2, rx, ry, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.lineWidth = 1;
        }
    }

    // Hole (cup)
    const hx = toCanvasX(course.hole.x), hy = toCanvasY(course.hole.y);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(hx + 2 * scale, hy + 2 * scale, HOLE_RADIUS * scale, 0, Math.PI * 2);
    ctx.fill();
    // Ring
    ctx.fillStyle = HOLE_RING;
    ctx.beginPath();
    ctx.arc(hx, hy, HOLE_RADIUS * scale + 2, 0, Math.PI * 2);
    ctx.fill();
    // Cup
    ctx.fillStyle = HOLE_COLOR;
    ctx.beginPath();
    ctx.arc(hx, hy, HOLE_RADIUS * scale, 0, Math.PI * 2);
    ctx.fill();
    // Inner gradient
    const holeGrad = ctx.createRadialGradient(hx, hy, 0, hx, hy, HOLE_RADIUS * scale);
    holeGrad.addColorStop(0, '#000000');
    holeGrad.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = holeGrad;
    ctx.beginPath();
    ctx.arc(hx, hy, HOLE_RADIUS * scale * 0.8, 0, Math.PI * 2);
    ctx.fill();
    // Flag
    const flagH = 35 * scale;
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx, hy - flagH);
    ctx.stroke();
    ctx.fillStyle = FLAG_COLOR;
    ctx.beginPath();
    ctx.moveTo(hx, hy - flagH);
    ctx.lineTo(hx + 14 * scale, hy - flagH + 8 * scale);
    ctx.lineTo(hx, hy - flagH + 16 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.lineWidth = 1;
}

// Draw walls
function drawWalls(ctx, course, toCanvasX, toCanvasY, scale) {
    for (const w of course.walls) {
        const sx = toCanvasX(w.x1), sy = toCanvasY(w.y1);
        const ex = toCanvasX(w.x2), ey = toCanvasY(w.y2);

        // Shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 8 * scale;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(sx + 2, sy + 2);
        ctx.lineTo(ex + 2, ey + 2);
        ctx.stroke();

        // Main wall
        ctx.strokeStyle = WALL_COLOR;
        ctx.lineWidth = 6 * scale;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();

        // Highlight
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2 * scale;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
    }
    ctx.lineCap = 'butt';
    ctx.lineWidth = 1;
}

// Draw bumpers
function drawBumpers(ctx, course, toCanvasX, toCanvasY, scale) {
    if (!course.bumpers) return;
    for (const b of course.bumpers) {
        const bx = toCanvasX(b.x), by = toCanvasY(b.y);
        const r = b.r * scale;
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.arc(bx + 2, by + 2, r, 0, Math.PI * 2);
        ctx.fill();
        // Body
        const bGrad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.3, 0, bx, by, r);
        bGrad.addColorStop(0, BUMPER_HIGHLIGHT);
        bGrad.addColorStop(1, BUMPER_COLOR);
        ctx.fillStyle = bGrad;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.fill();
        // Ring
        ctx.strokeStyle = '#CC2222';
        ctx.lineWidth = 2 * scale;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.stroke();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.arc(bx - r * 0.25, by - r * 0.25, r * 0.35, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.lineWidth = 1;
}

// Draw windmill
function drawWindmill(ctx, wm, toCanvasX, toCanvasY, scale) {
    if (!wm) return;
    const wx = toCanvasX(wm.x), wy = toCanvasY(wm.y);
    const angle = wm.angle || 0;

    // Center post
    ctx.fillStyle = WINDMILL_COLOR;
    ctx.beginPath();
    ctx.arc(wx, wy, 10 * scale, 0, Math.PI * 2);
    ctx.fill();

    // Blades
    ctx.save();
    ctx.translate(wx, wy);
    for (let arm = 0; arm < 4; arm++) {
        ctx.save();
        ctx.rotate(angle + arm * Math.PI / 2);
        // Blade
        const bladeGrad = ctx.createLinearGradient(0, 0, wm.armLength * scale, 0);
        bladeGrad.addColorStop(0, WINDMILL_COLOR);
        bladeGrad.addColorStop(0.5, WINDMILL_BLADE);
        bladeGrad.addColorStop(1, WINDMILL_COLOR);
        ctx.fillStyle = bladeGrad;
        ctx.beginPath();
        ctx.moveTo(-8 * scale, -wm.bladeWidth / 2 * scale);
        ctx.lineTo(wm.armLength * scale, -wm.bladeWidth / 4 * scale);
        ctx.lineTo(wm.armLength * scale, wm.bladeWidth / 4 * scale);
        ctx.lineTo(-8 * scale, wm.bladeWidth / 2 * scale);
        ctx.closePath();
        ctx.fill();
        // Border
        ctx.strokeStyle = '#664422';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();

    // Center cap
    ctx.fillStyle = '#553322';
    ctx.beginPath();
    ctx.arc(wx, wy, 5 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 1;
}

// Draw the ball
function drawBall(ctx, ball, toCanvasX, toCanvasY, scale) {
    const bx = toCanvasX(ball.x), by = toCanvasY(ball.y);
    const r = BALL_RADIUS * scale;

    // Shadow
    ctx.fillStyle = BALL_SHADOW;
    ctx.beginPath();
    ctx.ellipse(bx + 3 * scale, by + 3 * scale, r * 1.1, r * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const ballGrad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.3, 0, bx, by, r);
    ballGrad.addColorStop(0, '#FFFFFF');
    ballGrad.addColorStop(0.7, '#E8E8E8');
    ballGrad.addColorStop(1, '#CCCCCC');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.fill();

    // Sheen
    ctx.fillStyle = BALL_SHEEN;
    ctx.beginPath();
    ctx.arc(bx - r * 0.25, by - r * 0.25, r * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.stroke();
}

// Draw aim line
// dragDx, dragDy are in canvas-pixel units (offset from ball to cursor in canvas space)
function drawAimLine(ctx, ballX, ballY, dragDx, dragDy, power, trajectoryPoints, toCanvasX, toCanvasY, scale) {
    if (power <= 0) return;

    const bx = toCanvasX(ballX), by = toCanvasY(ballY);

    // Power indicator glow
    ctx.globalAlpha = 0.1 + power * 0.2;
    ctx.strokeStyle = power < 0.5 ? '#44FF44' : power < 0.8 ? '#FFAA00' : '#FF3333';
    ctx.lineWidth = 18 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(bx, by, 25 * scale, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineCap = 'butt';

    // Trajectory dots
    if (trajectoryPoints && trajectoryPoints.length > 0) {
        for (let i = 0; i < trajectoryPoints.length; i++) {
            const p = trajectoryPoints[i];
            const px = toCanvasX(p.x), py = toCanvasY(p.y);
            ctx.globalAlpha = p.alpha * 0.5;
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(px, py, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // Direction arrow (shoots opposite to drag)
    // dragDx/dragDy = cursor - ball in canvas pixels
    // Shot direction = ball - cursor = -drag
    const ax = -dragDx, ay = -dragDy;
    const len = Math.sqrt(ax * ax + ay * ay);
    if (len < 5) return;
    const nx = ax / len, ny = ay / len;
    const arrowLen = Math.min(len * 0.4, 60 * scale);

    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2 * scale;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(bx + nx * 20 * scale, by + ny * 20 * scale);
    ctx.lineTo(bx + nx * (20 * scale + arrowLen), by + ny * (20 * scale + arrowLen));
    ctx.stroke();
    // Arrowhead
    const tipX = bx + nx * (20 * scale + arrowLen);
    const tipY = by + ny * (20 * scale + arrowLen);
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - nx * 8 * scale + ny * 5 * scale, tipY - ny * 8 * scale - nx * 5 * scale);
    ctx.lineTo(tipX - nx * 8 * scale - ny * 5 * scale, tipY - ny * 8 * scale + nx * 5 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
}

// Ball trail
function createTrail() {

}

function updateTrail(trail, ballX, ballY, moving) {
    if (moving) {
        trail.points.push({ x: ballX, y: ballY, alpha: 1 });

    }
    for (let i = 0; i < trail.points.length; i++) {
        trail.points[i].alpha -= 0.05;
    }

}

function drawTrail(ctx, trail, toCanvasX, toCanvasY, scale) {

        ctx.beginPath();
        ctx.arc(toCanvasX(p.x), toCanvasY(p.y), 5 * scale, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// Particles
function createParticles() {
    return { list: [] };
}

function addParticle(pool, p) {
    pool.list.push(p);
}

function spawnConfetti(pool, x, y) {

        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 5;

        addParticle(pool, {
            x, y,

            vy: Math.sin(angle) * speed - 2,
            life: 1,
            decay: 0.008 + Math.random() * 0.015,
            size: 3 + Math.random() * 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            type: 'confetti',
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    // Add star particles
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.5 + Math.random() * 3;
        addParticle(pool, {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 1,
            decay: 0.006 + Math.random() * 0.01,
            size: 4 + Math.random() * 6,
            color: '#FFD700',
            type: 'star',
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.15
        });
    }
}

function spawnSplash(pool, x, y) {
    for (let i = 0; i < SPLASH_COUNT; i++) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
        const speed = 1 + Math.random() * 3;
        addParticle(pool, {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            size: 2 + Math.random() * 4,
            color: '#6699DD',
            type: 'splash'
        });
    }
}

function spawnDust(pool, x, y) {
    for (let i = 0; i < DUST_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.3 + Math.random() * 1.5;
        addParticle(pool, {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            size: 3 + Math.random() * 5,
            color: '#D4C090',
            type: 'dust'
        });
    }
}

function spawnSparks(pool, x, y) {
    for (let i = 0; i < SPARK_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        addParticle(pool, {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.03 + Math.random() * 0.05,
            size: 2 + Math.random() * 3,
            color: '#FFFFFF',
            type: 'spark'
        });
    }
}

function updateParticles(pool) {
    for (const p of pool.list) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05; // gravity
        p.life -= p.decay;
        if (p.rotation !== undefined) p.rotation += p.rotSpeed;
    }
    pool.list = pool.list.filter(p => p.life > 0);
}

function drawParticles(ctx, pool, toCanvasX, toCanvasY, scale) {
    for (const p of pool.list) {
        const cx = toCanvasX(p.x), cy = toCanvasY(p.y);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;

        if (p.type === 'confetti') {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(p.rotation);
            ctx.fillRect(-p.size * scale / 2, -p.size * scale / 4, p.size * scale, p.size * scale / 2);
            ctx.restore();
        } else if (p.type === 'star') {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(p.rotation);
            drawStar(ctx, 0, 0, p.size * scale, p.color);
            ctx.restore();
        } else if (p.type === 'splash') {
            ctx.beginPath();
            ctx.arc(cx, cy, p.size * scale * p.life, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'spark') {
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(cx, cy, p.size * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        } else {
            ctx.beginPath();
            ctx.arc(cx, cy, p.size * scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawStar(ctx, cx, cy, r, color) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}

// Celebration effect
function createCelebration() {
    return { active: false, timer: 0, scale: 1 };
}

function startCelebration(celeb) {
    celeb.active = true;
    celeb.timer = CELEBRATION_DURATION;
    celeb.scale = 1;
}

function updateCelebration(celeb, dt) {
    if (!celeb.active) return;
    celeb.timer -= dt;
    celeb.scale = 1 + Math.sin(celeb.timer * 0.005) * 0.1;
    if (celeb.timer <= 0) celeb.active = false;
}

function drawCelebration(ctx, celeb, toCanvasX, toCanvasY, holeX, holeY) {
    if (!celeb.active) return;
    const cx = toCanvasX(holeX), cy = toCanvasY(holeY);
    const progress = 1 - celeb.timer / CELEBRATION_DURATION;

    // Expanding ring
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 1 - progress;
    ctx.beginPath();
    ctx.arc(cx, cy, (30 + progress * 80) * celeb.scale, 0, Math.PI * 2);
    ctx.stroke();

    // Glow
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50 * celeb.scale);
    gradient.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
    gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.globalAlpha = (1 - progress) * 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, 50 * celeb.scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
}

// Game state
let canvas, ctx;
let scale = 1, canvasOffX = 0, canvasOffY = 0;
let ball, course, currentHole, startHole, endHole;
let strokes, totalStrokes, holeScores, holePar;
let aiming, aimDragX, aimDragY, aimPower;
let trajectoryPoints;
let trail, particles, celebration;
let frameCount, lastTime;
let gameStarted, transitioning;
let lastBallPos; // for water reset

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');

    resize();
    window.addEventListener('resize', resize);

    // Input events
    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd, { passive: false });

    trail = createTrail();
    particles = createParticles();
    celebration = createCelebration();
    frameCount = 0;
    lastTime = performance.now();
    gameStarted = false;
    transitioning = false;

    createStartOverlay((s, e) => {
        startHole = s;
        endHole = e;
        startGame();
    });

    requestAnimationFrame(gameLoop);
}

function resize() {
    const maxW = Math.min(CANVAS_MAX_W, window.innerWidth - 20);
    const maxH = Math.min(CANVAS_MAX_H, window.innerHeight - 20);
    const aspect = COURSE_W / COURSE_H;
    let cw, ch;
    if (maxW / maxH > aspect) {
        ch = maxH;
        cw = ch * aspect;
    } else {
        cw = maxW;
        ch = cw / aspect;
    }
    canvas.width = cw;
    canvas.height = ch;
    scale = cw / COURSE_W;
    canvasOffX = 0;
    canvasOffY = 0;
}

function toCanvasX(x) { return canvasOffX + x * scale; }
function toCanvasY(y) { return canvasOffY + y * scale; }
function toCourseX(cx) { return (cx - canvasOffX) / scale; }
function toCourseY(cy) { return (cy - canvasOffY) / scale; }

function startGame() {
    Sound.resumeAudio();
    totalStrokes = 0;
    holeScores = [];
    currentHole = startHole;
    gameStarted = true;
    loadHole(currentHole);
}

function loadHole(idx) {
    course = JSON.parse(JSON.stringify(COURSES[idx]));
    course.theme = getThemeForHole(idx);
    course.windmill = course.windmill ? { ...course.windmill, angle: 0 } : null;

    ball = createBall(course.start.x, course.start.y);
    lastBallPos = { x: course.start.x, y: course.start.y };
    strokes = 0;
    holePar = course.par;
    aiming = false;
    aimDragX = 0;
    aimDragY = 0;
    aimPower = 0;
    trajectoryPoints = [];
    trail.points = [];
    particles.list = [];
    transitioning = false;

    showHoleTransition(idx, course.par, COURSE_NAMES[idx], () => {});
}

function getThemeForHole(idx) {
    if (idx === 15) return 'ice';
    if (idx === 13 || idx === 14) return 'desert';
    return 'grass';
}

// Input handlers
function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function onPointerDown(e) {
    if (!gameStarted || transitioning) return;
    if (isBallMoving(ball) || ball.inHole) return;
    const pos = getPointerPos(e);
    startAim(pos.x, pos.y);
}

function onPointerMove(e) {
    if (!aiming) return;
    const pos = getPointerPos(e);
    updateAim(pos.x, pos.y);
}

function onPointerUp(e) {
    if (!aiming) return;
    releaseAim();
}

function onTouchStart(e) {
    e.preventDefault();
    if (!gameStarted || transitioning) return;
    if (isBallMoving(ball) || ball.inHole) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    startAim(touch.clientX - rect.left, touch.clientY - rect.top);
}

function onTouchMove(e) {
    e.preventDefault();
    if (!aiming) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    updateAim(touch.clientX - rect.left, touch.clientY - rect.top);
}

function onTouchEnd(e) {
    e.preventDefault();
    if (!aiming) return;
    releaseAim();
}

function startAim(cx, cy) {
    const bx = toCanvasX(ball.x), by = toCanvasY(ball.y);
    const dx = cx - bx, dy = cy - by;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 80) return; // Must click near ball
    aiming = true;
    Sound.resumeAudio();
}

function updateAim(cx, cy) {
    const bx = toCanvasX(ball.x), by = toCanvasY(ball.y);
    aimDragX = cx - bx;
    aimDragY = cy - by;
    const dist = Math.sqrt(aimDragX * aimDragX + aimDragY * aimDragY);
    aimPower = Math.min(1, dist / MAX_DRAG);

    // Calculate trajectory preview
    const power = aimPower * MAX_SPEED;
    const dirX = -aimDragX / (dist || 1);
    const dirY = -aimDragY / (dist || 1);
    trajectoryPoints = simulateTrajectory(
        ball.x, ball.y, dirX * power, dirY * power, course
    );
}

function releaseAim() {
    if (aimPower > 0.05) {
        const dist = Math.sqrt(aimDragX * aimDragX + aimDragY * aimDragY);
        if (dist > 5) {
            const power = aimPower * MAX_SPEED;
            const dirX = -aimDragX / dist;
            const dirY = -aimDragY / dist;
            applyShot(ball, dirX * power, dirY * power);
            lastBallPos = { x: ball.x, y: ball.y };
            strokes++;
            totalStrokes++;
            Sound.playHit();
        }
    }
    aiming = false;
    aimDragX = 0;
    aimDragY = 0;
    aimPower = 0;
    trajectoryPoints = [];
}

function nextHole() {
    holeScores.push(strokes);
    currentHole++;
    if (currentHole >= endHole) {
        const totalPar = holeScores.reduce((sum, _, i) => sum + COURSES[startHole + i].par, 0);
        showGameComplete(totalStrokes, totalPar, holeScores, startHole);
        gameStarted = false;
    } else {
        transitioning = true;
        setTimeout(() => loadHole(currentHole), 800);
    }
}

// HUD
function drawHUD() {
    const pad = 12;
    const fontSize = Math.max(12, Math.min(16, canvas.width * 0.03));

    ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;

    // Top left - Hole info
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(pad - 4, pad - 4, 130, 52);
    ctx.fillStyle = '#4ADE80';
    ctx.fillText(`第 ${currentHole + 1} 洞 / ${endHole}`, pad + 4, pad + fontSize);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(`杆数: ${strokes}`, pad + 4, pad + fontSize * 2 + 4);

    // Top right - Par & Total
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(canvas.width - 130 - pad, pad - 4, 130, 52);
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`标准杆: ${holePar}`, canvas.width - pad - 4, pad + fontSize);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(`总杆: ${totalStrokes}`, canvas.width - pad - 4, pad + fontSize * 2 + 4);

    // Power meter
    if (aiming && aimPower > 0) {
        const meterW = 16, meterH = 120;
        const mx = pad + 4, my = canvas.height - meterH - pad - 30;

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(mx - 2, my - 2, meterW + 4, meterH + 4);

        // Background
        ctx.fillStyle = '#333';
        ctx.fillRect(mx, my, meterW, meterH);

        // Fill
        const fillH = meterH * aimPower;
        const gradient = ctx.createLinearGradient(mx, my + meterH, mx, my);
        gradient.addColorStop(0, '#22c55e');
        gradient.addColorStop(0.5, '#eab308');
        gradient.addColorStop(1, '#ef4444');
        ctx.fillStyle = gradient;
        ctx.fillRect(mx, my + meterH - fillH, meterW, fillH);

        // Border
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.strokeRect(mx, my, meterW, meterH);

        // Label
        ctx.textAlign = 'center';
        ctx.fillStyle = '#FFFFFF';
        ctx.font = `bold ${fontSize - 2}px 'Segoe UI', sans-serif`;
        ctx.fillText(`力度 ${Math.round(aimPower * 100)}%`, mx + meterW / 2, my + meterH + 18);
    }

    ctx.textAlign = 'left';
    ctx.lineWidth = 1;
}

// Main game loop
function gameLoop(timestamp) {
    const dt = Math.min(50, timestamp - lastTime);
    lastTime = timestamp;
    frameCount++;

    // Physics
    if (gameStarted && ball && !transitioning) {
        const events = step(ball, course, 1);

        // Handle events
        if (events.wallHit) {
            Sound.playWallBounce();
            spawnSparks(particles, ball.x, ball.y);
        }
        if (events.bumperHit) {
            Sound.playBumper();
            spawnSparks(particles, ball.x, ball.y);
        }
        if (events.windmillHit) {
            Sound.playWindmillHit();
            spawnSparks(particles, ball.x, ball.y);
        }
        if (events.sandHit && isBallMoving(ball)) {
            spawnDust(particles, ball.x, ball.y);
        }
        if (events.waterHit) {
            Sound.playWaterSplash();
            spawnSplash(particles, ball.x, ball.y);
            // Reset to last position after a delay
            setTimeout(() => {
                if (ball.inWater) {
                    resetBall(ball, lastBallPos.x, lastBallPos.y);
                    ball.inWater = false;
                }
            }, 600);
        }
        if (events.holeIn) {
            Sound.playHoleIn();
            spawnConfetti(particles, course.hole.x, course.hole.y);
            startCelebration(celebration);
            setTimeout(() => nextHole(), 2000);
        }

        // Save position when ball stops (for water reset)
        if (!isBallMoving(ball) && !ball.inHole && !ball.inWater) {
            lastBallPos = { x: ball.x, y: ball.y };
        }

        updateTrail(trail, ball.x, ball.y, isBallMoving(ball));
    }

    updateParticles(particles);
    updateCelebration(celebration, dt);

    // Render
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameStarted && course) {
        drawCourse(ctx, course, toCanvasX, toCanvasY, scale, frameCount);
        drawWalls(ctx, course, toCanvasX, toCanvasY, scale);
        drawBumpers(ctx, course, toCanvasX, toCanvasY, scale);
        drawWindmill(ctx, course.windmill, toCanvasX, toCanvasY, scale);
        drawTrail(ctx, trail, toCanvasX, toCanvasY, scale);

        if (aiming && aimPower > 0) {
            drawAimLine(ctx, ball.x, ball.y, aimDragX, aimDragY,
                       aimPower, trajectoryPoints, toCanvasX, toCanvasY, scale);
        }

        if (!ball.inHole) {
            drawBall(ctx, ball, toCanvasX, toCanvasY, scale);
        }

        drawParticles(ctx, particles, toCanvasX, toCanvasY, scale);
        drawCelebration(ctx, celebration, toCanvasX, toCanvasY, course.hole.x, course.hole.y);
        drawHUD();
    } else if (!gameStarted) {
        // Idle background
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(gameLoop);
}

// Expose for HTML
window.startGame = init;


</script>
    <script>
        window.addEventListener('DOMContentLoaded', () => window.startGame());
    </script>
