<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃豆人</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(255,235,59,0.3);background:#000}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#ffeb3b;font-weight:bold}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(255,235,59,0.5)}
        .menu-btn{background:linear-gradient(135deg,#ffeb3b 0%,#f9a825 100%);border:none;padding:14px 40px;font-size:18px;color:#000;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px;font-weight:bold}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(255,235,59,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ffeb3b;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">生命: <span id="lives">3</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#ffeb3b">吃豆人</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>WASD / 方向键：移动</div>
            <div>R：重新开始 | P：暂停</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>吃掉所有豆子过关</div>
            <div>吃能量球后可以反杀幽灵</div>
            <div>碰到幽灵失去一条命</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">通关！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>
    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script type="module" src="js/main.js"></script>

</body>
</html>
