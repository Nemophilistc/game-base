<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡堂 - MIMO Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #gameCanvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5),
                        0 0 60px rgba(0, 212, 255, 0.3);
            background: #000;
        }

        #hud {
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingText {
            color: #00d4ff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-spinner"></div>
        <div id="loadingText">加载中...</div>
    </div>

    <div id="gameContainer">
        <div id="hud">
            <div class="hud-item">❤️ <span id="lives">3</span></div>
            <div class="hud-item">💣 <span id="bombs">1</span></div>
            <div class="hud-item">🔥 <span id="fire">1</span></div>
            <div class="hud-item">⚡ <span id="speed">1</span></div>
            <div class="hud-item">🏆 <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        方向键移动 | 空格键放炸弹 | ESC暂停
    </div>

    <script type="module" src="js/main.js"></script>
    <script>
        // 隐藏加载界面
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 500);
            }, 500);
        });
    </script>

</body>
</html>
