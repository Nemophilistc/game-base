<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻转棋 - Othello</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1912;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #e0f0e8;
        }

        #game-wrapper {
            position: relative;
            display: inline-block;
        }

        #game-canvas {
            display: block;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        #overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .overlay.active {
            display: flex;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .glass-panel {
            background: rgba(15, 35, 25, 0.92);
            border: 1px solid rgba(0, 200, 160, 0.25);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            max-width: 380px;
            width: 90%;
        }

        .game-title {
            text-align: center;
            font-size: 42px;
            font-weight: 700;
            color: #00c8a0;
            margin-bottom: 4px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(0, 200, 160, 0.3);
        }

        .game-subtitle {
            text-align: center;
            font-size: 14px;
            color: #6a9a8a;
            margin-bottom: 28px;
            letter-spacing: 2px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-label {
            display: block;
            font-size: 13px;
            color: #80a898;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .option-btn {
            flex: 1;
            padding: 10px 12px;
            background: rgba(0, 200, 160, 0.08);
            border: 1px solid rgba(0, 200, 160, 0.2);
            border-radius: 8px;
            color: #80a898;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: rgba(0, 200, 160, 0.15);
            border-color: rgba(0, 200, 160, 0.4);
            color: #e0f0e8;
        }

        .option-btn.active {
            background: rgba(0, 200, 160, 0.2);
            border-color: #00c8a0;
            color: #00c8a0;
            font-weight: 600;
        }

        .start-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: linear-gradient(135deg, #00c8a0, #00a080);
            border: none;
            border-radius: 10px;
            color: #0a1912;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 4px;
        }

        .start-btn:hover {
            background: linear-gradient(135deg, #00e0b8, #00c8a0);
            box-shadow: 0 4px 20px rgba(0, 200, 160, 0.3);
            transform: translateY(-1px);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .help-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 200, 160, 0.05);
            border: 1px solid rgba(0, 200, 160, 0.1);
            border-radius: 10px;
        }

        .help-box h3 {
            font-size: 14px;
            color: #00c8a0;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .help-box ul {
            list-style: none;
            padding: 0;
        }

        .help-box li {
            font-size: 12px;
            color: #6a9a8a;
            line-height: 1.8;
            padding-left: 16px;
            position: relative;
        }

        .help-box li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0, 200, 160, 0.4);
        }

        /* Game Over Overlay */
        .gameover-panel {
            text-align: center;
        }

        .winner-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #00c8a0;
        }

        .final-score {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .score-disc {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .black-disc-icon {
            background: radial-gradient(circle at 35% 35%, #3a3a3a, #1a1a1a);
            border: 1px solid rgba(80, 80, 80, 0.5);
        }

        .white-disc-icon {
            background: radial-gradient(circle at 35% 35%, #ffffff, #e0e0e0);
            border: 1px solid rgba(200, 200, 200, 0.3);
        }

        .score-num {
            font-size: 36px;
            font-weight: 700;
            color: #e0f0e8;
        }

        .score-vs {
            font-size: 18px;
            color: #4a7a6a;
            font-weight: 600;
        }

        .high-score-line {
            font-size: 14px;
            color: #6a9a8a;
            margin-bottom: 20px;
        }

        .high-score-line span {
            color: #00c8a0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="game-canvas"></canvas>
        <div id="overlay-container"></div>
    </div>
    <script type="module" src="js/main.js"></script>

</html>
