<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MIMO 节奏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 50%, #0a1a2e 100%);
    }

    #gameCanvas {
      display: block;
      background: #0a0a1a;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 60px rgba(100, 100, 255, 0.1);
    }

    /* 全屏模式下的样式 */
    :fullscreen #gameContainer {
      background: #050510;
    }

    :fullscreen #gameCanvas {
      border: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script>
// === ./config.js ===
// config.js - 常量配置
const CONFIG = {
  // 轨道设置
  LANE_COUNT: 4,
  KEYS: ['s', 'f', 'j', 'k'],
  KEY_LABELS: ['S', 'F', 'J', 'K'],

  // 轨道颜色
  LANE_COLORS: ['#ff4488', '#44aaff', '#44ff88', '#ffaa44'],
  LANE_GLOW: ['#ff448866', '#44aaff66', '#44ff8866', '#ffaa4466'],

  // 判定时间窗口 (ms)
  TIMING: {
    PERFECT: 30,
    GREAT: 60,
    GOOD: 100,
  },

  // 判定分数
  SCORE: {
    PERFECT: 300,
    GREAT: 200,
    GOOD: 100,
    MISS: 0,
  },

  // 判定颜色
  JUDGE_COLORS: {
    PERFECT: '#ffdd44',
    GREAT: '#44ffaa',
    GOOD: '#44aaff',
    MISS: '#ff4444',
  },

  // 判定文字
  JUDGE_TEXT: {
    PERFECT: 'PERFECT',
    GREAT: 'GREAT',
    GOOD: 'GOOD',
    MISS: 'MISS',
  },

  // 连击倍率
  COMBO_MULTIPLIERS: [
    { threshold: 0, mult: 1 },
    { threshold: 10, mult: 2 },
    { threshold: 30, mult: 4 },
    { threshold: 50, mult: 8 },
    { threshold: 100, mult: 16 },
  ],

  // 音符速度 (像素/秒)
  NOTE_SPEED: {
    easy: 300,
    hard: 450,
    hell: 600,
  },

  // 音符类型
  NOTE_TYPE: {
    TAP: 'tap',
    HOLD: 'hold',
    SLIDE: 'slide',
  },

  // 滑动方向
  SLIDE_DIR: {
    LEFT: -1,
    RIGHT: 1,
  },

  // 难度设置
  DIFFICULTY: {
    easy: {
      name: '简单',
      bpm: 120,
      noteDensity: 0.3,
      holdChance: 0.05,
      slideChance: 0.0,
      doubleChance: 0.0,
      speed: 300,
    },
    hard: {
      name: '困难',
      bpm: 140,
      noteDensity: 0.55,
      holdChance: 0.1,
      slideChance: 0.05,
      doubleChance: 0.1,
      speed: 450,
    },
    hell: {
      name: '地狱',
      bpm: 170,
      noteDensity: 0.8,
      holdChance: 0.15,
      slideChance: 0.1,
      doubleChance: 0.25,
      speed: 600,
    },
  },

  // 判定线位置 (距底部比例)
  JUDGMENT_LINE_RATIO: 0.85,

  // 音符大小
  NOTE_WIDTH: 60,
  NOTE_HEIGHT: 20,
  HOLD_WIDTH: 50,

  // 特效持续时间 (ms)
  FLASH_DURATION: 150,
  PARTICLE_LIFETIME: 800,
  COMBO_TEXT_DURATION: 1000,
  JUDGE_TEXT_DURATION: 600,

  // BGM设置
  BGM: {
    bars: 32,
    beatsPerBar: 4,
  },
};

// === ./sound.js ===
// sound.js - Web Audio API 音效 + 程序化生成BGM

class SoundManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.bgmGain = null;
    this.sfxGain = null;
    this.bgmPlaying = false;
    this.bgmScheduler = null;
    this.bgmStartTime = 0;
    this.bpm = 120;
    this.currentBeat = 0;
    this.nextBeatTime = 0;
    this.scheduleAheadTime = 0.1;
    this.lookahead = 25; // ms
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.7;
    this.masterGain.connect(this.ctx.destination);

    this.bgmGain = this.ctx.createGain();
    this.bgmGain.gain.value = 0.5;
    this.bgmGain.connect(this.masterGain);

    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 0.6;
    this.sfxGain.connect(this.masterGain);
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  }

  // === 合成打击音 ===
  playKick(time) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
    gain.gain.setValueAtTime(0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
    osc.connect(gain);
    gain.connect(this.bgmGain);
    osc.start(time);
    osc.stop(time + 0.3);
  }

  playSnare(time) {
    // 噪声层
    const bufferSize = this.ctx.sampleRate * 0.15;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1000;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.6, time);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(this.bgmGain);
    noise.start(time);
    noise.stop(time + 0.15);

    // 音调层
    const osc = this.ctx.createOscillator();
    const oscGain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(80, time + 0.08);
    oscGain.gain.setValueAtTime(0.5, time);
    oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    osc.connect(oscGain);
    oscGain.connect(this.bgmGain);
    osc.start(time);
    osc.stop(time + 0.08);
  }

  playHiHat(time, open = false) {
    const bufferSize = this.ctx.sampleRate * (open ? 0.15 : 0.05);
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 7000;
    const gain = this.ctx.createGain();
    const dur = open ? 0.15 : 0.05;
    gain.gain.setValueAtTime(open ? 0.25 : 0.2, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.bgmGain);
    noise.start(time);
    noise.stop(time + dur);
  }

  playBass(time, freq, dur) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    gain.gain.setValueAtTime(0.2, time);
    gain.gain.setValueAtTime(0.2, time + dur * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.bgmGain);
    osc.start(time);
    osc.stop(time + dur);
  }

  playSynth(time, freq, dur) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, time);
    filter.frequency.exponentialRampToValueAtTime(300, time + dur);
    gain.gain.setValueAtTime(0.12, time);
    gain.gain.setValueAtTime(0.12, time + dur * 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.bgmGain);
    osc.start(time);
    osc.stop(time + dur);
  }

  // === BGM调度器 ===
  startBGM(bpm) {
    this.init();
    this.resume();
    this.bpm = bpm;
    this.bgmPlaying = true;
    this.currentBeat = 0;
    this.bgmStartTime = this.ctx.currentTime + 0.1;
    this.nextBeatTime = this.bgmStartTime;

    // 和弦进行 (bass notes in Hz)
    this.bassPattern = [
      65.41,  // C2
      65.41,
      73.42,  // D2
      73.42,
      82.41,  // E2
      82.41,
      73.42,  // D2
      73.42,
    ];

    // 合成旋律音符
    this.melodyNotes = [
      261.63, 329.63, 392.00, 523.25,
      440.00, 349.23, 293.66, 261.63,
      329.63, 392.00, 440.00, 523.25,
      587.33, 523.25, 392.00, 329.63,
    ];

    this._scheduleBGM();
  }

  _scheduleBGM() {
    if (!this.bgmPlaying) return;

    while (this.nextBeatTime < this.ctx.currentTime + this.scheduleAheadTime) {
      this._scheduleBeat(this.nextBeatTime, this.currentBeat);

      const secondsPerBeat = 60.0 / this.bpm;
      // 有时用半拍细分
      const subdivision = (this.currentBeat % 2 === 0) ? 1 : 0.5;
      this.nextBeatTime += secondsPerBeat * subdivision;
      this.currentBeat++;
    }

    this.bgmScheduler = setTimeout(() => this._scheduleBGM(), this.lookahead);
  }

  _scheduleBeat(time, beat) {
    const bar = Math.floor(beat / 8) % 4;
    const pos = beat % 8;

    // Kick: beat 0, 4 (每小节)
    if (pos === 0 || pos === 4) {
      this.playKick(time);
    }

    // Snare: beat 2, 6
    if (pos === 2 || pos === 6) {
      this.playSnare(time);
    }

    // Hi-hat: every beat
    this.playHiHat(time, pos === 3 || pos === 7);

    // Bass: every 2 beats
    if (pos % 2 === 0) {
      const bassIdx = (bar * 2 + Math.floor(pos / 2)) % this.bassPattern.length;
      this.playBass(time, this.bassPattern[bassIdx], 60 / this.bpm * 1.8);
    }

    // Synth melody: some beats
    if (pos === 0 || pos === 3 || pos === 5) {
      const melIdx = (bar * 4 + Math.floor(pos / 2)) % this.melodyNotes.length;
      this.playSynth(time, this.melodyNotes[melIdx], 60 / this.bpm * 0.8);
    }
  }

  stopBGM() {
    this.bgmPlaying = false;
    if (this.bgmScheduler) {
      clearTimeout(this.bgmScheduler);
      this.bgmScheduler = null;
    }
  }

  getBGMTime() {
    if (!this.ctx || !this.bgmPlaying) return 0;
    return (this.ctx.currentTime - this.bgmStartTime) * 1000; // 返回毫秒
  }

  // === 判定音效 ===
  playJudgeSfx(type) {
    if (!this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    switch (type) {
      case 'PERFECT':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.setValueAtTime(1100, now + 0.04);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain);
        gain.connect(this.sfxGain);
        osc.start(now);
        osc.stop(now + 0.15);
        // 叠加泛音
        const osc2 = this.ctx.createOscillator();
        const gain2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = 1320;
        gain2.gain.setValueAtTime(0.15, now);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc2.connect(gain2);
        gain2.connect(this.sfxGain);
        osc2.start(now);
        osc2.stop(now + 0.1);
        break;
      case 'GREAT':
        osc.type = 'sine';
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain);
        gain.connect(this.sfxGain);
        osc.start(now);
        osc.stop(now + 0.12);
        break;
      case 'GOOD':
        osc.type = 'triangle';
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(this.sfxGain);
        osc.start(now);
        osc.stop(now + 0.1);
        break;
      case 'MISS':
        osc.type = 'sawtooth';
        osc.frequency.value = 100;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 300;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.sfxGain);
        osc.start(now);
        osc.stop(now + 0.2);
        break;
    }
  }

  playComboSfx(combo) {
    if (!this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const baseFreq = 400 + Math.min(combo, 100) * 5;

    for (let i = 0; i < 3; i++) {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = baseFreq * (1 + i * 0.5);
      const t = now + i * 0.04;
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(t);
      osc.stop(t + 0.15);
    }
  }

  playMenuSfx() {
    if (!this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 600;
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(now);
    osc.stop(now + 0.08);
  }
}

// === ./note.js ===
// note.js - 音符类（下落、判定、特效）

class Note {
  constructor({ type, lane, time, duration = 0, slideDir = 0 }) {
    this.type = type;           // 'tap', 'hold', 'slide'
    this.lane = lane;           // 0-3
    this.time = time;           // 判定时间 (ms, 相对于BGM开始)
    this.duration = duration;   // hold持续时间 (ms)
    this.slideDir = slideDir;   // slide方向: -1左, 1右

    this.y = -50;               // 当前屏幕Y
    this.active = true;         // 是否还在屏幕上
    this.judged = false;        // 是否已判定
    this.holdActive = false;    // hold是否正在按住
    this.holdComplete = false;  // hold是否完成
    this.slideTriggered = false;
    this.judgeResult = null;    // 判定结果

    // hold尾部位置
    this.endY = -50;

    // 视觉
    this.glow = 0;
    this.trail = [];
  }

  update(currentTime, judgmentY, noteSpeed) {
    // 计算音符Y位置: 距离判定线的时间差 * 速度
    const timeDiff = this.time - currentTime;
    this.y = judgmentY - (timeDiff / 1000) * noteSpeed;

    // hold音符的尾部
    if (this.type === 'hold' && this.duration > 0) {
      const endTimeDiff = (this.time + this.duration) - currentTime;
      this.endY = judgmentY - (endTimeDiff / 1000) * noteSpeed;
    }

    // 拖尾效果
    if (this.active && !this.judged) {
      this.trail.push({ x: 0, y: this.y, alpha: 1 });
      if (this.trail.length > 8) this.trail.shift();
    }
    // 更新拖尾透明度
    for (let t of this.trail) {
      t.alpha *= 0.85;
    }

    // 超出屏幕底部 → miss
    if (this.y > judgmentY + 200 && !this.judged) {
      this.active = false;
      this.judgeResult = 'MISS';
      return 'MISS';
    }

    // hold音符尾部超出屏幕
    if (this.type === 'hold' && this.endY > judgmentY + 200) {
      this.active = false;
    }

    // 已判定的非hold音符移除
    if (this.judged && this.type !== 'hold') {
      this.active = false;
    }

    // hold完成
    if (this.judged && this.type === 'hold' && this.holdComplete) {
      this.active = false;
    }

    return null;
  }

  checkJudgment(currentTime) {
    if (this.judged) return null;
    const diff = Math.abs(currentTime - this.time);

    if (diff <= CONFIG.TIMING.PERFECT) return 'PERFECT';
    if (diff <= CONFIG.TIMING.GREAT) return 'GREAT';
    if (diff <= CONFIG.TIMING.GOOD) return 'GOOD';

    // 如果在good窗口之前，还不算miss
    if (diff <= CONFIG.TIMING.GOOD + 50) return null;
    return null;
  }

  judge(result) {
    this.judged = true;
    this.judgeResult = result;
    this.glow = 1;
    return result;
  }

  draw(ctx, laneX, laneWidth) {
    if (!this.active && this.judgeResult !== null) return;

    const centerX = laneX + laneWidth / 2;
    const noteW = this.type === 'hold' ? CONFIG.HOLD_WIDTH : CONFIG.NOTE_WIDTH;
    const color = CONFIG.LANE_COLORS[this.lane];

    ctx.save();

    // 绘制拖尾
    for (const t of this.trail) {
      if (t.alpha < 0.05) continue;
      ctx.globalAlpha = t.alpha * 0.4;
      ctx.fillStyle = color;
      const tw = noteW * t.alpha;
      const th = CONFIG.NOTE_HEIGHT * t.alpha * 0.6;
      this._drawRoundRect(ctx, centerX - tw / 2, t.y - th / 2, tw, th, 4);
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    // glow效果
    if (this.glow > 0) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 20 * this.glow;
      this.glow *= 0.9;
    }

    if (this.type === 'tap') {
      this._drawTapNote(ctx, centerX, this.y, noteW, color);
    } else if (this.type === 'hold') {
      this._drawHoldNote(ctx, centerX, this.y, this.endY, noteW, color);
    } else if (this.type === 'slide') {
      this._drawSlideNote(ctx, centerX, this.y, noteW, color);
    }

    ctx.restore();
  }

  _drawTapNote(ctx, cx, cy, w, color) {
    const h = CONFIG.NOTE_HEIGHT;
    // 主体
    const grad = ctx.createLinearGradient(cx, cy - h / 2, cx, cy + h / 2);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, color);
    grad.addColorStop(1, this._darken(color));
    ctx.fillStyle = grad;
    this._drawRoundRect(ctx, cx - w / 2, cy - h / 2, w, h, 6);
    ctx.fill();
    // 边框
    ctx.strokeStyle = '#ffffff88';
    ctx.lineWidth = 1.5;
    this._drawRoundRect(ctx, cx - w / 2, cy - h / 2, w, h, 6);
    ctx.stroke();
  }

  _drawHoldNote(ctx, cx, startY, endY, w, color) {
    const h = CONFIG.NOTE_HEIGHT;
    const topY = Math.min(startY, endY);
    const botY = Math.max(startY, endY);
    const holdH = botY - topY;

    // hold条身
    ctx.fillStyle = color + '88';
    this._drawRoundRect(ctx, cx - w / 2, topY, w, holdH, 4);
    ctx.fill();

    // 条纹装饰
    ctx.strokeStyle = color + 'cc';
    ctx.lineWidth = 2;
    for (let y = topY; y < botY; y += 12) {
      ctx.beginPath();
      ctx.moveTo(cx - w / 4, y);
      ctx.lineTo(cx + w / 4, y);
      ctx.stroke();
    }

    // 头部 (像tap note)
    if (startY === topY) {
      this._drawTapNote(ctx, cx, startY, w, color);
    }
    // 尾部
    ctx.fillStyle = color;
    this._drawRoundRect(ctx, cx - w / 2, endY - h / 3, w, h * 0.66, 4);
    ctx.fill();
  }

  _drawSlideNote(ctx, cx, cy, w, color) {
    const h = CONFIG.NOTE_HEIGHT;
    // 三角形箭头
    const dir = this.slideDir;
    ctx.fillStyle = color;
    ctx.beginPath();
    if (dir > 0) {
      // 右滑箭头
      ctx.moveTo(cx - w / 2, cy - h / 2);
      ctx.lineTo(cx + w / 2, cy);
      ctx.lineTo(cx - w / 2, cy + h / 2);
    } else {
      // 左滑箭头
      ctx.moveTo(cx + w / 2, cy - h / 2);
      ctx.lineTo(cx - w / 2, cy);
      ctx.lineTo(cx + w / 2, cy + h / 2);
    }
    ctx.closePath();
    ctx.fill();

    // 边框
    ctx.strokeStyle = '#ffffff88';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  _drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  _darken(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${Math.floor(r * 0.5)},${Math.floor(g * 0.5)},${Math.floor(b * 0.5)})`;
  }
}

// === ./chart.js ===
// chart.js - 谱面系统（程序化生成节拍谱面）

class ChartGenerator {
  constructor() {
    this.notes = [];
    this.difficulty = null;
    this.totalNotes = 0;
  }

  /**
   * 生成谱面
   * @param {string} diffKey - 'easy', 'hard', 'hell'
   * @returns {Note[]}
   */
  generate(diffKey) {
    this.difficulty = CONFIG.DIFFICULTY[diffKey];
    this.notes = [];

    const bpm = this.difficulty.bpm;
    const beatDuration = 60000 / bpm; // 每拍毫秒
    const totalBeats = CONFIG.BGM.bars * CONFIG.BGM.beatsPerBar;
    const totalMs = totalBeats * beatDuration;

    // 使用确定性随机种子
    let seed = this._hashStr(diffKey + bpm);
    const rand = () => {
      seed = (seed * 1664525 + 1013904223) & 0xffffffff;
      return (seed >>> 0) / 0xffffffff;
    };

    // 按拍生成音符
    for (let beat = 0; beat < totalBeats; beat++) {
      const beatTime = beat * beatDuration;

      // 每拍开头有概率放音符
      if (rand() < this.difficulty.noteDensity) {
        const lane = Math.floor(rand() * CONFIG.LANE_COUNT);
        const noteType = this._pickNoteType(rand);
        const slideDir = noteType === 'slide' ? (rand() > 0.5 ? 1 : -1) : 0;

        const note = new Note({
          type: noteType,
          lane: lane,
          time: beatTime + 2000, // 2秒延迟让玩家准备
          duration: noteType === 'hold' ? beatDuration * (1 + Math.floor(rand() * 3)) : 0,
          slideDir: slideDir,
        });
        this.notes.push(note);
      }

      // 双押检测
      if (rand() < this.difficulty.doubleChance) {
        const lane1 = Math.floor(rand() * CONFIG.LANE_COUNT);
        let lane2 = (lane1 + 1 + Math.floor(rand() * (CONFIG.LANE_COUNT - 1))) % CONFIG.LANE_COUNT;
        const note = new Note({
          type: 'tap',
          lane: lane2,
          time: beatTime + 2000,
        });
        this.notes.push(note);
      }

      // 半拍细分（困难以上）
      if (diffKey !== 'easy' && rand() < this.difficulty.noteDensity * 0.4) {
        const halfBeatTime = beatTime + beatDuration / 2;
        const lane = Math.floor(rand() * CONFIG.LANE_COUNT);
        const note = new Note({
          type: 'tap',
          lane: lane,
          time: halfBeatTime + 2000,
        });
        this.notes.push(note);
      }

      // 16分音符（地狱难度）
      if (diffKey === 'hell' && rand() < 0.15) {
        for (let sub = 1; sub <= 3; sub++) {
          const subTime = beatTime + (beatDuration / 4) * sub;
          const lane = Math.floor(rand() * CONFIG.LANE_COUNT);
          const note = new Note({
            type: rand() > 0.8 ? 'slide' : 'tap',
            lane: lane,
            time: subTime + 2000,
            slideDir: rand() > 0.5 ? 1 : -1,
          });
          this.notes.push(note);
        }
      }
    }

    // 按时间排序
    this.notes.sort((a, b) => a.time - b.time);
    this.totalNotes = this.notes.length;
    return this.notes;
  }

  _pickNoteType(rand) {
    const r = rand();
    if (r < this.difficulty.holdChance) return 'hold';
    if (r < this.difficulty.holdChance + this.difficulty.slideChance) return 'slide';
    return 'tap';
  }

  _hashStr(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      const chr = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + chr;
      hash |= 0;
    }
    return Math.abs(hash) || 1;
  }
}

// === ./effects.js ===
// effects.js - 视觉特效（连击火焰、判定闪光、背景脉冲）

// 粒子
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.alive = true;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 150 * dt; // 重力
    this.life -= dt * 1000;
    if (this.life <= 0) this.alive = false;
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// 闪光
class Flash {
  constructor(x, y, color, radius) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.radius = radius;
    this.maxRadius = radius;
    this.life = CONFIG.FLASH_DURATION;
    this.maxLife = CONFIG.FLASH_DURATION;
  }

  update(dt) {
    this.life -= dt * 1000;
    this.radius = this.maxRadius * (this.life / this.maxLife);
    return this.life > 0;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    const grad = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius
    );
    grad.addColorStop(0, this.color + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
    grad.addColorStop(1, this.color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

class EffectsManager {
  constructor() {
    this.particles = [];
    this.flashes = [];
    this.comboTexts = []; // { text, x, y, color, life, maxLife, scale }
    this.bgPulse = 0;     // 背景脉冲强度 0-1
    this.comboFire = 0;   // 连击火焰强度 0-1
    this.beatPulse = 0;   // 节拍脉冲
    this.screenShake = 0;
  }

  update(dt) {
    // 更新粒子
    for (const p of this.particles) {
      p.update(dt);
    }
    this.particles = this.particles.filter(p => p.alive);

    // 更新闪光
    for (const f of this.flashes) {
      if (!f.update(dt)) {
        this.flashes.splice(this.flashes.indexOf(f), 1);
      }
    }

    // 更新连击文字
    for (const t of this.comboTexts) {
      t.life -= dt * 1000;
      t.scale += dt * 0.5;
    }
    this.comboTexts = this.comboTexts.filter(t => t.life > 0);

    // 衰减背景脉冲
    this.bgPulse *= 0.95;
    this.comboFire *= 0.97;
    this.beatPulse *= 0.9;
    this.screenShake *= 0.85;
  }

  // 判定闪光特效
  spawnJudgeFlash(x, y, judgeType) {
    const color = CONFIG.JUDGE_COLORS[judgeType];
    const radius = judgeType === 'PERFECT' ? 80 : judgeType === 'GREAT' ? 60 : 40;
    this.flashes.push(new Flash(x, y, color, radius));

    // 粒子爆发
    const count = judgeType === 'PERFECT' ? 20 : judgeType === 'GREAT' ? 12 : 6;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const speed = 100 + Math.random() * 200;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed - 50;
      const size = 2 + Math.random() * 3;
      this.particles.push(new Particle(
        x, y, vx, vy, color,
        CONFIG.PARTICLE_LIFETIME * (0.5 + Math.random() * 0.5),
        size
      ));
    }

    // 背景脉冲
    if (judgeType === 'PERFECT') {
      this.bgPulse = 1;
      this.screenShake = 5;
    } else if (judgeType === 'GREAT') {
      this.bgPulse = 0.6;
      this.screenShake = 3;
    }
  }

  // Perfect炫彩文字
  spawnPerfectText(x, y) {
    this.comboTexts.push({
      text: '✦ PERFECT ✦',
      x: x,
      y: y - 40,
      color: CONFIG.JUDGE_COLORS.PERFECT,
      life: CONFIG.JUDGE_TEXT_DURATION,
      maxLife: CONFIG.JUDGE_TEXT_DURATION,
      scale: 1,
    });
  }

  // 连击特效
  spawnComboEffect(combo, centerX, judgmentY) {
    if (combo <= 0) return;

    // 每10连击显示大特效
    if (combo % 10 === 0 && combo > 0) {
      this.comboTexts.push({
        text: `${combo} COMBO!`,
        x: centerX,
        y: judgmentY - 100,
        color: this._getComboColor(combo),
        life: CONFIG.COMBO_TEXT_DURATION,
        maxLife: CONFIG.COMBO_TEXT_DURATION,
        scale: 1,
      });

      // 连击火焰
      this.comboFire = Math.min(1, combo / 50);

      // 大量粒子
      for (let i = 0; i < 30; i++) {
        const x = centerX + (Math.random() - 0.5) * 300;
        const y = judgmentY;
        const vx = (Math.random() - 0.5) * 100;
        const vy = -200 - Math.random() * 300;
        this.particles.push(new Particle(
          x, y, vx, vy,
          this._getComboColor(combo),
          1200,
          3 + Math.random() * 4
        ));
      }
    }
  }

  // 节拍脉冲（由BGM驱动）
  triggerBeatPulse() {
    this.beatPulse = 1;
  }

  _getComboColor(combo) {
    if (combo >= 100) return '#ff44ff';
    if (combo >= 50) return '#ffaa44';
    if (combo >= 30) return '#ffdd44';
    if (combo >= 10) return '#44ffaa';
    return '#ffffff';
  }

  drawBackground(ctx, w, h) {
    // 背景色随脉冲变化
    const pulse = this.bgPulse;
    if (pulse > 0.01) {
      const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w * 0.7);
      const alpha = pulse * 0.15;
      grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    // 连击火焰
    if (this.comboFire > 0.01) {
      // 底部火焰
      const flameH = h * 0.3 * this.comboFire;
      const grad = ctx.createLinearGradient(0, h, 0, h - flameH);
      grad.addColorStop(0, `rgba(255, 100, 20, ${this.comboFire * 0.3})`);
      grad.addColorStop(0.5, `rgba(255, 200, 50, ${this.comboFire * 0.15})`);
      grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, h - flameH, w, flameH);
    }

    // 节拍脉冲边框
    if (this.beatPulse > 0.01) {
      ctx.strokeStyle = `rgba(255, 255, 255, ${this.beatPulse * 0.3})`;
      ctx.lineWidth = 4 * this.beatPulse;
      ctx.strokeRect(0, 0, w, h);
    }
  }

  drawParticles(ctx) {
    for (const p of this.particles) {
      p.draw(ctx);
    }
  }

  drawFlashes(ctx) {
    for (const f of this.flashes) {
      f.draw(ctx);
    }
  }

  drawComboTexts(ctx) {
    for (const t of this.comboTexts) {
      const alpha = t.life / t.maxLife;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = `bold ${24 * t.scale}px "Microsoft YaHei", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = t.color;
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 15;
      ctx.fillText(t.text, t.x, t.y);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  getScreenShake() {
    if (this.screenShake < 0.5) return { x: 0, y: 0 };
    return {
      x: (Math.random() - 0.5) * this.screenShake * 2,
      y: (Math.random() - 0.5) * this.screenShake * 2,
    };
  }
}

// === ./ui.js ===
// ui.js - HUD、连击显示、覆盖层

class UIManager {
  constructor() {
    this.judgeDisplay = null;  // { text, color, life, maxLife }
    this.combo = 0;
    this.score = 0;
    this.maxCombo = 0;
    this.multiplier = 1;
    this.maxScore = 0;
    this.progress = 0; // 0-1

    // 加载最高分
    this.highScore = parseInt(localStorage.getItem('rhythm_highscore') || '0');
  }

  reset() {
    this.combo = 0;
    this.score = 0;
    this.maxCombo = 0;
    this.multiplier = 1;
    this.judgeDisplay = null;
    this.progress = 0;
  }

  saveHighScore() {
    if (this.score > this.highScore) {
      this.highScore = this.score;
      localStorage.setItem('rhythm_highscore', this.highScore.toString());
    }
  }

  addJudgment(judgeType) {
    const scoreValue = CONFIG.SCORE[judgeType];
    this.multiplier = this._getMultiplier(this.combo);
    this.score += scoreValue * this.multiplier;

    if (judgeType === 'MISS') {
      this.combo = 0;
      this.multiplier = 1;
    } else {
      this.combo++;
      if (this.combo > this.maxCombo) this.maxCombo = this.combo;
      this.multiplier = this._getMultiplier(this.combo);
    }

    // 显示判定文字
    this.judgeDisplay = {
      text: CONFIG.JUDGE_TEXT[judgeType],
      color: CONFIG.JUDGE_COLORS[judgeType],
      life: CONFIG.JUDGE_TEXT_DURATION,
      maxLife: CONFIG.JUDGE_TEXT_DURATION,
    };

    return { combo: this.combo, score: this.score, multiplier: this.multiplier };
  }

  _getMultiplier(combo) {
    let mult = 1;
    for (const m of CONFIG.COMBO_MULTIPLIERS) {
      if (combo >= m.threshold) mult = m.mult;
    }
    return mult;
  }

  update(dt) {
    if (this.judgeDisplay) {
      this.judgeDisplay.life -= dt * 1000;
      if (this.judgeDisplay.life <= 0) {
        this.judgeDisplay = null;
      }
    }
  }

  drawHUD(ctx, w, h) {
    ctx.save();

    // 分数 (右上角)
    ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`${this.score.toLocaleString()}`, w - 20, 40);

    // 倍率
    if (this.multiplier > 1) {
      ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffdd44';
      ctx.fillText(`x${this.multiplier}`, w - 20, 65);
    }

    // 连击 (中间偏上)
    if (this.combo > 0) {
      const comboY = h * 0.25;
      const comboScale = 1 + Math.min(this.combo / 100, 0.5);

      ctx.save();
      ctx.translate(w / 2, comboY);
      ctx.scale(comboScale, comboScale);

      // 连击数字
      ctx.font = 'bold 48px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      const comboColor = this._getComboColor();
      ctx.fillStyle = comboColor;
      ctx.shadowColor = comboColor;
      ctx.shadowBlur = 20;
      ctx.fillText(this.combo.toString(), 0, 0);

      // "COMBO" 标签
      ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffffffcc';
      ctx.shadowBlur = 0;
      ctx.fillText('COMBO', 0, 24);

      ctx.restore();
    }

    // 判定文字 (中间)
    if (this.judgeDisplay) {
      const jd = this.judgeDisplay;
      const alpha = jd.life / jd.maxLife;
      const scale = 1 + (1 - alpha) * 0.3;
      const judgeY = h * CONFIG.JUDGMENT_LINE_RATIO - 60;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(w / 2, judgeY);
      ctx.scale(scale, scale);
      ctx.font = 'bold 32px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = jd.color;
      ctx.shadowColor = jd.color;
      ctx.shadowBlur = 20;
      ctx.fillText(jd.text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // 进度条 (顶部)
    if (this.progress > 0) {
      const barW = w - 40;
      const barH = 4;
      const barX = 20;
      const barY = 8;

      ctx.fillStyle = '#ffffff22';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(barX, barY, barW * this.progress, barH);
    }

    // 最高分 (左上角)
    ctx.font = '14px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffffff88';
    ctx.fillText(`最高: ${this.highScore.toLocaleString()}`, 20, 30);

    ctx.restore();
  }

  drawKeyHints(ctx, w, h, lanePositions, pressedKeys) {
    const judgeY = h * CONFIG.JUDGMENT_LINE_RATIO;

    for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
      const lx = lanePositions[i];
      const pressed = pressedKeys.has(CONFIG.KEYS[i]);

      // 按键提示背景
      ctx.save();
      ctx.globalAlpha = pressed ? 0.6 : 0.25;
      ctx.fillStyle = CONFIG.LANE_COLORS[i];
      ctx.beginPath();
      ctx.arc(lx, judgeY, 22, 0, Math.PI * 2);
      ctx.fill();

      if (pressed) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 按键字母
      ctx.globalAlpha = pressed ? 1 : 0.7;
      ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(CONFIG.KEY_LABELS[i], lx, judgeY);
      ctx.restore();
    }
  }

  drawJudgmentLine(ctx, w, h, laneWidth) {
    const judgeY = h * CONFIG.JUDGMENT_LINE_RATIO;

    // 判定线
    ctx.save();
    ctx.strokeStyle = '#ffffff44';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(laneWidth / 2 - 10, judgeY);
    ctx.lineTo(w - laneWidth / 2 + 10, judgeY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  drawStartScreen(ctx, w, h) {
    ctx.save();

    // 背景遮罩
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, w, h);

    // 标题
    ctx.font = 'bold 56px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 30;
    ctx.fillText('MIMO 节奏', w / 2, h * 0.25);
    ctx.shadowBlur = 0;

    // 副标题
    ctx.font = '20px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ffffffcc';
    ctx.fillText('选择难度开始游戏', w / 2, h * 0.35);

    // 难度按钮
    const difficulties = [
      { key: 'easy', label: '简单', color: '#44ff88', bpm: '120 BPM', desc: '适合新手' },
      { key: 'hard', label: '困难', color: '#ffaa44', bpm: '140 BPM', desc: '进阶挑战' },
      { key: 'hell', label: '地狱', color: '#ff4488', bpm: '170 BPM', desc: '极限手速' },
    ];

    const btnW = 200;
    const btnH = 80;
    const startY = h * 0.45;
    const gap = 20;

    for (let i = 0; i < difficulties.length; i++) {
      const d = difficulties[i];
      const bx = w / 2 - btnW / 2;
      const by = startY + i * (btnH + gap);

      // 按钮背景
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 2;
      this._drawRoundRect(ctx, bx, by, btnW, btnH, 12);
      ctx.fill();
      ctx.stroke();

      // 难度名
      ctx.font = 'bold 24px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = d.color;
      ctx.fillText(d.label, w / 2, by + 32);

      // BPM和描述
      ctx.font = '14px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffffffaa';
      ctx.fillText(`${d.bpm} | ${d.desc}`, w / 2, by + 58);
    }

    // 按键提示
    ctx.font = '14px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ffffff66';
    ctx.fillText('按 1/2/3 选择难度 | D F J K 操作音符', w / 2, h * 0.9);

    // 最高分
    if (this.highScore > 0) {
      ctx.font = '16px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffdd4488';
      ctx.fillText(`最高分: ${this.highScore.toLocaleString()}`, w / 2, h * 0.95);
    }

    ctx.restore();
  }

  drawGameOver(ctx, w, h, stats) {
    ctx.save();

    // 背景遮罩
    ctx.fillStyle = 'rgba(0, 0, 0, 0.88)';
    ctx.fillRect(0, 0, w, h);

    // 标题
    ctx.font = 'bold 48px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 20;
    ctx.fillText('演奏结束', w / 2, h * 0.2);
    ctx.shadowBlur = 0;

    // 评级
    const grade = this._getGrade(stats.accuracy);
    ctx.font = 'bold 72px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = grade.color;
    ctx.shadowColor = grade.color;
    ctx.shadowBlur = 30;
    ctx.fillText(grade.label, w / 2, h * 0.35);
    ctx.shadowBlur = 0;

    // 统计
    const lines = [
      `分数: ${stats.score.toLocaleString()}`,
      `最高连击: ${stats.maxCombo}`,
      `准确率: ${stats.accuracy.toFixed(1)}%`,
      `Perfect: ${stats.perfects}`,
      `Great: ${stats.greats}`,
      `Good: ${stats.goods}`,
      `Miss: ${stats.misses}`,
    ];

    ctx.font = '20px "Microsoft YaHei", sans-serif';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillStyle = i === 0 ? '#ffffff' : '#ffffffcc';
      ctx.fillText(lines[i], w / 2, h * 0.45 + i * 30);
    }

    // 新纪录
    if (stats.isNewHighScore) {
      ctx.font = 'bold 24px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffdd44';
      ctx.fillText('新纪录!', w / 2, h * 0.78);
    }

    // 提示
    ctx.font = '16px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ffffff66';
    ctx.fillText('按 R 重新开始 | 按 ESC 返回菜单', w / 2, h * 0.88);

    ctx.restore();
  }

  _getGrade(accuracy) {
    if (accuracy >= 95) return { label: 'S', color: '#ffdd44' };
    if (accuracy >= 85) return { label: 'A', color: '#44ff88' };
    if (accuracy >= 70) return { label: 'B', color: '#44aaff' };
    if (accuracy >= 50) return { label: 'C', color: '#ffaa44' };
    return { label: 'D', color: '#ff4444' };
  }

  _getComboColor() {
    if (this.combo >= 100) return '#ff44ff';
    if (this.combo >= 50) return '#ffaa44';
    if (this.combo >= 30) return '#ffdd44';
    if (this.combo >= 10) return '#44ffaa';
    return '#ffffff';
  }

  _drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

// === main.js ===
// main.js - 游戏主循环、事件监听、判定逻辑

class RhythmGame {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.sound = new SoundManager();
    this.chart = new ChartGenerator();
    this.effects = new EffectsManager();
    this.ui = new UIManager();

    // 游戏状态
    this.state = 'menu'; // 'menu', 'playing', 'gameover'
    this.difficulty = null;
    this.notes = [];
    this.activeNotes = [];
    this.pressedKeys = new Set();
    this.keyJustPressed = new Set();

    // 时间
    this.gameTime = 0;       // 游戏内时间 (ms)
    this.lastFrameTime = 0;
    this.totalDuration = 0;  // 总时长

    // 轨道布局
    this.laneWidth = 0;
    this.lanePositions = [];

    // 判定统计
    this.stats = {
      perfects: 0,
      greats: 0,
      goods: 0,
      misses: 0,
      totalJudged: 0,
    };

    // hold状态追踪
    this.holdStates = [null, null, null, null];

    this._resize();
    this._bindEvents();
    this._loop(0);
  }

  _resize() {
    const container = this.canvas.parentElement;
    this.canvas.width = Math.min(container.clientWidth, 600);
    this.canvas.height = container.clientHeight;

    this.laneWidth = this.canvas.width / CONFIG.LANE_COUNT;
    this.lanePositions = [];
    for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
      this.lanePositions.push(this.laneWidth * i + this.laneWidth / 2);
    }
  }

  _bindEvents() {
    window.addEventListener('resize', () => this._resize());

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const key = e.key.toLowerCase();

      // 阻止游戏按键触发浏览器默认行为（如书签、地址栏等）
      if (CONFIG.KEYS.includes(key)) {
        e.preventDefault();
      }

      // 菜单状态
      if (this.state === 'menu') {
        if (key === '1') this._startGame('easy');
        else if (key === '2') this._startGame('hard');
        else if (key === '3') this._startGame('hell');
        this.sound.playMenuSfx();
        return;
      }

      // 游戏结束状态
      if (this.state === 'gameover') {
        if (key === 'r') this._startGame(this.difficulty);
        else if (key === 'escape') this._showMenu();
        return;
      }

      // 游戏中
      if (this.state === 'playing') {
        if (CONFIG.KEYS.includes(key)) {
          this.pressedKeys.add(key);
          this.keyJustPressed.add(key);
          this._judgeLane(CONFIG.KEYS.indexOf(key));
          e.preventDefault();
        }
        if (key === 'escape') {
          this._endGame();
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      this.pressedKeys.delete(key);

      // hold音符松开检测
      if (this.state === 'playing' && CONFIG.KEYS.includes(key)) {
        const lane = CONFIG.KEYS.indexOf(key);
        this._releaseHold(lane);
      }
    });

    // 触摸支持
    this.canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      this.sound.init();
      this.sound.resume();

      if (this.state === 'menu') {
        const touch = e.touches[0];
        const rect = this.canvas.getBoundingClientRect();
        const y = touch.clientY - rect.top;
        const h = this.canvas.height;
        if (y > h * 0.45 && y < h * 0.45 + 80) this._startGame('easy');
        else if (y > h * 0.45 + 100 && y < h * 0.45 + 180) this._startGame('hard');
        else if (y > h * 0.45 + 200 && y < h * 0.45 + 280) this._startGame('hell');
        return;
      }

      if (this.state === 'gameover') {
        this._showMenu();
        return;
      }

      for (const touch of e.changedTouches) {
        const rect = this.canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const lane = Math.floor(x / this.laneWidth);
        if (lane >= 0 && lane < CONFIG.LANE_COUNT) {
          this.pressedKeys.add(CONFIG.KEYS[lane]);
          this.keyJustPressed.add(CONFIG.KEYS[lane]);
          this._judgeLane(lane);
        }
      }
    });

    this.canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        const rect = this.canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const lane = Math.floor(x / this.laneWidth);
        if (lane >= 0 && lane < CONFIG.LANE_COUNT) {
          this.pressedKeys.delete(CONFIG.KEYS[lane]);
          this._releaseHold(lane);
        }
      }
    });
  }

  _showMenu() {
    this.state = 'menu';
    this.sound.stopBGM();
  }

  _startGame(diffKey) {
    this.sound.init();
    this.sound.resume();
    this.difficulty = diffKey;
    this.state = 'playing';

    // 重置
    this.gameTime = -2000; // 2秒延迟
    this.pressedKeys.clear();
    this.keyJustPressed.clear();
    this.holdStates = [null, null, null, null];
    this.stats = { perfects: 0, greats: 0, goods: 0, misses: 0, totalJudged: 0 };

    // 生成谱面
    this.notes = this.chart.generate(diffKey);
    this.activeNotes = [...this.notes];

    // 计算总时长
    const lastNote = this.notes[this.notes.length - 1];
    this.totalDuration = lastNote ? lastNote.time + lastNote.duration + 3000 : 10000;

    // 重置UI
    this.ui.reset();

    // 开始BGM
    const bpm = CONFIG.DIFFICULTY[diffKey].bpm;
    this.sound.startBGM(bpm);
  }

  _endGame() {
    this.state = 'gameover';
    this.sound.stopBGM();

    // 计算统计
    const totalNotes = this.stats.totalJudged;
    const accuracy = totalNotes > 0
      ? ((this.stats.perfects * 100 + this.stats.greats * 75 + this.stats.goods * 50) / (totalNotes * 100)) * 100
      : 0;

    const oldHighScore = this.ui.highScore;
    this.ui.saveHighScore();

    this._gameOverStats = {
      score: this.ui.score,
      maxCombo: this.ui.maxCombo,
      accuracy: accuracy,
      perfects: this.stats.perfects,
      greats: this.stats.greats,
      goods: this.stats.goods,
      misses: this.stats.misses,
      isNewHighScore: this.ui.score > oldHighScore,
    };
  }

  _judgeLane(lane) {
    const currentTime = this.gameTime;

    // 找到该轨道最近的未判定音符
    let closestNote = null;
    let closestDiff = Infinity;

    for (const note of this.activeNotes) {
      if (note.lane !== lane || note.judged || !note.active) continue;
      const diff = Math.abs(currentTime - note.time);
      if (diff < closestDiff) {
        closestDiff = diff;
        closestNote = note;
      }
    }

    if (!closestNote) return;

    // 检查判定窗口
    const diff = Math.abs(currentTime - closestNote.time);
    let judgeType = null;

    if (diff <= CONFIG.TIMING.PERFECT) {
      judgeType = 'PERFECT';
    } else if (diff <= CONFIG.TIMING.GREAT) {
      judgeType = 'GREAT';
    } else if (diff <= CONFIG.TIMING.GOOD) {
      judgeType = 'GOOD';
    }

    if (!judgeType) return; // 太早，不判定

    // 处理hold音符
    if (closestNote.type === 'hold') {
      closestNote.judge(judgeType);
      closestNote.holdActive = true;
      this.holdStates[lane] = closestNote;
      // hold的miss需要在release时判断
    } else if (closestNote.type === 'slide') {
      // slide音符：检测滑动方向
      closestNote.judge(judgeType);
      closestNote.slideTriggered = true;
    } else {
      closestNote.judge(judgeType);
    }

    // 更新UI和统计
    this._applyJudgment(judgeType, lane);
  }

  _releaseHold(lane) {
    const holdNote = this.holdStates[lane];
    if (!holdNote) return;

    const currentTime = this.gameTime;
    const endTime = holdNote.time + holdNote.duration;
    const diff = Math.abs(currentTime - endTime);

    // 判定hold尾部
    let judgeType;
    if (diff <= CONFIG.TIMING.PERFECT) {
      judgeType = 'PERFECT';
      this.stats.perfects++;
    } else if (diff <= CONFIG.TIMING.GREAT) {
      judgeType = 'GREAT';
      this.stats.greats++;
    } else if (diff <= CONFIG.TIMING.GOOD) {
      judgeType = 'GOOD';
      this.stats.goods++;
    } else {
      judgeType = 'MISS';
      this.stats.misses++;
    }

    holdNote.holdComplete = true;
    holdNote.holdActive = false;
    this.stats.totalJudged++;
    this.holdStates[lane] = null;

    // 只有提前松开才算miss
    if (currentTime < endTime - CONFIG.TIMING.GOOD) {
      this._applyJudgment('MISS', lane);
    }
  }

  _applyJudgment(judgeType, lane) {
    this.stats.totalJudged++;
    if (judgeType === 'PERFECT') this.stats.perfects++;
    else if (judgeType === 'GREAT') this.stats.greats++;
    else if (judgeType === 'GOOD') this.stats.goods++;
    else if (judgeType === 'MISS') this.stats.misses++;

    const result = this.ui.addJudgment(judgeType);
    const lx = this.lanePositions[lane];
    const judgeY = this.canvas.height * CONFIG.JUDGMENT_LINE_RATIO;

    // 特效
    this.effects.spawnJudgeFlash(lx, judgeY, judgeType);
    if (judgeType === 'PERFECT') {
      this.effects.spawnPerfectText(lx, judgeY);
    }

    // 连击特效
    if (result.combo > 0 && result.combo % 10 === 0) {
      this.effects.spawnComboEffect(result.combo, this.canvas.width / 2, judgeY);
      this.sound.playComboSfx(result.combo);
    }

    // 判定音效
    this.sound.playJudgeSfx(judgeType);
  }

  _update(dt) {
    if (this.state !== 'playing') return;

    // 更新游戏时间
    this.gameTime += dt * 1000;

    // 节拍脉冲
    const bpm = CONFIG.DIFFICULTY[this.difficulty].bpm;
    const beatDuration = 60000 / bpm;
    if (Math.floor(this.gameTime / beatDuration) !== Math.floor((this.gameTime - dt * 1000) / beatDuration)) {
      this.effects.triggerBeatPulse();
    }

    // 判定线位置
    const judgmentY = this.canvas.height * CONFIG.JUDGMENT_LINE_RATIO;
    const noteSpeed = CONFIG.DIFFICULTY[this.difficulty].speed;

    // 更新音符
    for (const note of this.activeNotes) {
      if (!note.active) continue;

      const result = note.update(this.gameTime, judgmentY, noteSpeed);
      if (result === 'MISS' && !note.judged) {
        note.judge('MISS');
        this._applyJudgment('MISS', note.lane);
      }
    }

    // 移除不活跃音符
    this.activeNotes = this.activeNotes.filter(n => n.active);

    // 更新hold状态（按住中）
    for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
      const holdNote = this.holdStates[i];
      if (holdNote && holdNote.holdActive) {
        // 检查是否松开
        if (!this.pressedKeys.has(CONFIG.KEYS[i])) {
          this._releaseHold(i);
        }
      }
    }

    // 进度
    this.ui.progress = Math.max(0, this.gameTime / this.totalDuration);

    // 检查游戏结束
    if (this.gameTime > this.totalDuration || (this.activeNotes.length === 0 && this.gameTime > 0)) {
      this._endGame();
    }

    // 更新特效
    this.effects.update(dt);
    this.ui.update(dt);
  }

  _draw() {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;

    // 清空
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, w, h);

    if (this.state === 'menu') {
      this.ui.drawStartScreen(ctx, w, h);
      return;
    }

    // 屏幕震动
    const shake = this.effects.getScreenShake();
    ctx.save();
    ctx.translate(shake.x, shake.y);

    // 背景特效
    this.effects.drawBackground(ctx, w, h);

    // 绘制轨道背景
    this._drawLanes(ctx, w, h);

    // 判定线
    this.ui.drawJudgmentLine(ctx, w, h, this.laneWidth);

    // 绘制音符
    const noteSpeed = this.difficulty ? CONFIG.DIFFICULTY[this.difficulty].speed : 300;
    const judgmentY = h * CONFIG.JUDGMENT_LINE_RATIO;
    for (const note of this.activeNotes) {
      if (note.active || note.judged) {
        note.draw(ctx, this.laneWidth * note.lane, this.laneWidth);
      }
    }

    // 按键提示
    this.ui.drawKeyHints(ctx, w, h, this.lanePositions, this.pressedKeys);

    // 粒子特效
    this.effects.drawParticles(ctx);
    this.effects.drawFlashes(ctx);
    this.effects.drawComboTexts(ctx);

    ctx.restore();

    // HUD
    this.ui.drawHUD(ctx, w, h);

    // 游戏结束画面
    if (this.state === 'gameover' && this._gameOverStats) {
      this.ui.drawGameOver(ctx, w, h, this._gameOverStats);
    }
  }

  _drawLanes(ctx, w, h) {
    for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
      const lx = this.laneWidth * i;

      // 轨道背景
      ctx.fillStyle = (i % 2 === 0) ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.01)';
      ctx.fillRect(lx, 0, this.laneWidth, h);

      // 轨道线
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      ctx.lineTo(lx, h);
      ctx.stroke();

      // 按下时轨道高亮
      if (this.pressedKeys.has(CONFIG.KEYS[i])) {
        const judgeY = h * CONFIG.JUDGMENT_LINE_RATIO;
        const grad = ctx.createLinearGradient(0, judgeY - 100, 0, judgeY + 50);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, CONFIG.LANE_COLORS[i] + '22');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(lx, judgeY - 100, this.laneWidth, 150);
      }
    }

    // 最后一条轨道线
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.moveTo(w, 0);
    ctx.lineTo(w, h);
    ctx.stroke();
  }

  _loop(timestamp) {
    const dt = this.lastFrameTime ? Math.min((timestamp - this.lastFrameTime) / 1000, 0.05) : 0.016;
    this.lastFrameTime = timestamp;

    this._update(dt);
    this._draw();

    // 清除一次性按键状态
    this.keyJustPressed.clear();

    requestAnimationFrame((t) => this._loop(t));
  }
}

// 启动游戏
new RhythmGame();


</script>
