<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .header{font-size:42px;color:#26c6da;text-shadow:0 0 30px rgba(38,198,218,0.5);margin-bottom:12px;letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:10px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#26c6da}
        #board{display:grid;grid-template-columns:repeat(9,44px);gap:1px;background:#333;padding:2px;border-radius:6px;border:2px solid #444}
        .cell{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;background:#1a1a1a;cursor:pointer;transition:all 0.15s;user-select:none}
        .cell.given{color:#26c6da}
        .cell.user{color:#fff}
        .cell.error{color:#f44336;background:rgba(244,67,54,0.15)}
        .cell.selected{background:rgba(38,198,218,0.2);box-shadow:inset 0 0 0 2px #26c6da}
        .cell.highlight{background:rgba(38,198,218,0.08)}
        .cell.border-right{border-right:2px solid #444}
        .cell.border-bottom{border-bottom:2px solid #444}
        .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
        .num-btn{width:44px;height:44px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:20px;font-weight:bold;cursor:pointer;transition:all 0.15s}
        .num-btn:hover{background:rgba(38,198,218,0.3);border-color:#26c6da}
        .action-btns{display:flex;gap:8px;margin-top:8px}
        .act-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 16px;font-size:13px;color:#888;cursor:pointer;transition:all 0.2s}
        .act-btn:hover{background:rgba(38,198,218,0.2);color:#26c6da;border-color:#26c6da}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(38,198,218,0.5)}
        .menu-btn{background:linear-gradient(135deg,#26c6da 0%,#00838f 100%);border:none;padding:14px 40px;font-size:18px;color:#000;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px;font-weight:bold}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(38,198,218,0.5)}
        .diff-btns{display:flex;gap:10px;margin-bottom:15px}
        .diff-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .diff-btn:hover,.diff-btn.active{border-color:#26c6da;color:#26c6da;background:rgba(38,198,218,0.1)}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#26c6da;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="header">数独</div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">错误</div><div class="info-val" id="errors">0</div></div>
        <div class="info-box"><div class="info-label">时间</div><div class="info-val" id="timer">0:00</div></div>
        <div class="info-box"><div class="info-label">提示</div><div class="info-val" id="hints">3</div></div>
    </div>
    <div id="board"></div>
    <div class="controls">
        <button class="num-btn" data-num="1">1</button>
        <button class="num-btn" data-num="2">2</button>
        <button class="num-btn" data-num="3">3</button>
        <button class="num-btn" data-num="4">4</button>
        <button class="num-btn" data-num="5">5</button>
        <button class="num-btn" data-num="6">6</button>
        <button class="num-btn" data-num="7">7</button>
        <button class="num-btn" data-num="8">8</button>
        <button class="num-btn" data-num="9">9</button>
        <button class="num-btn" data-num="0" style="color:#888">✕</button>
    </div>
    <div class="action-btns">
        <button class="act-btn" id="btnHint">💡 提示</button>
        <button class="act-btn" id="btnCheck">✓ 检查</button>
        <button class="act-btn" id="btnRestart">↺ 重新开始</button>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#26c6da">数独</div>
        <div class="diff-btns">
            <button class="diff-btn active" data-givens="38">简单</button>
            <button class="diff-btn" data-givens="30">中等</button>
            <button class="diff-btn" data-givens="22">困难</button>
        </div>
        <button class="menu-btn" id="btnStart">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击格子选中，然后输入数字1-9</div>
            <div>也可点击下方数字按钮</div>
            <div>✕ 清除当前格子</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>每行、每列、每宫(3×3)都包含1-9不重复</div>
            <div>填满所有空格即获胜</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">完成！</div>
        <div id="winStats" class="stats" style="font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6"></div>
        <button class="menu-btn" id="btnWinRestart">再来一局</button>
    </div>

<script type="module" src="js/main.js"></script>

</body>
</html>
