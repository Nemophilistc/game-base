<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生存岛屿 - Survival Island</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a140a;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        #gameContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a2e1a 0%, #0a140a 100%);
        }

        #gameCanvas {
            border: 2px solid rgba(100, 160, 80, 0.3);
            border-radius: 8px;
            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(46, 125, 50, 0.1);
            image-rendering: pixelated;
            cursor: default;
            max-width: 100vw;
            max-height: 100vh;
        }

        /* Loading state */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a140a;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading h1 {
            color: #4caf50;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            display: block;
            width: 60%;
            height: 100%;
            background: #4caf50;
            border-radius: 2px;
            animation: loading 1s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
    </div>

    <div id="loading">
        <h1>生存岛屿</h1>
        <div class="loading-bar"></div>
    </div>

    <script type="module">
        import './js/main.js';

        // Hide loading after modules loaded
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });
    </script>
<script>

</body>
</html>
