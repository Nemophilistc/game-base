// ============================================================
// 升级选项应用逻辑
// ============================================================
function applyUpgrade(id) {
    const player = state.player;

    switch (id) {
        case 'sword': {
            const existing = player.weapons.find(w => w.type === 'sword');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('sword'));
            break;
        }
        case 'fire': {
            const existing = player.weapons.find(w => w.type === 'fire');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('fire'));
            break;
        }
        case 'lightning': {
            const existing = player.weapons.find(w => w.type === 'lightning');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('lightning'));
            break;
        }
        case 'orbit': {
            const existing = player.weapons.find(w => w.type === 'orbit');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('orbit'));
            break;
        }
        case 'aura': {
            const existing = player.weapons.find(w => w.type === 'aura');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('aura'));
            break;
        }
        case 'shield': {
            const existing = player.weapons.find(w => w.type === 'shield');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('shield'));
            break;
        }
        case 'maxhp':
            player.maxHp += 20;
            player.hp = Math.min(player.hp + 20, player.maxHp);
            break;
        case 'wind': {
            const existing = player.weapons.find(w => w.type === 'wind');
            if (existing) existing.levelUp();
            else player.weapons.push(new Weapon('wind'));
            break;
        }
        case 'magnet':
            CONFIG.ITEM_MAGNET_RANGE += 50;
            break;
        case 'heal':
            player.heal(player.maxHp * 0.3);
            break;
        case 'speed':
            player.speed += 0.5;
            break;
    }
}

// ============================================================
// 更新HUD
// ============================================================
function updateHUD() {
    const player = state.player;

    document.getElementById('hp').textContent = Math.floor(player.hp);
    document.getElementById('kills').textContent = game.kills;

    const minutes = Math.floor(game.time / 3600);
    const seconds = Math.floor((game.time % 3600) / 60);
    document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

    document.getElementById('level').textContent = player.level;
    document.getElementById('expFill').style.width = `${(player.exp / player.expToNext) * 100}%`;

    const weaponNames = player.weapons.map(w => w.icon).join(' ');
    document.getElementById('weapons').textContent = weaponNames || '无';
}

// ============================================================
// 升级界面
// ============================================================
function levelUp() {
    game.state = 'levelup';
    const player = state.player;

    // 升级特效
    for (let i = 0; i < 40; i++) spawnParticle(player.x, player.y, '#ffd700', 'exp');
    for (let i = 0; i < 20; i++) spawnParticle(player.x, player.y, '#4ecdc4', 'lightning');

    game.flashColor = 'rgba(255, 215, 0, 0.3)';
    game.flashTimer = 15;
    game.shake.intensity = 5;

    document.getElementById('levelUpScreen').classList.add('active');

    const options = document.getElementById('upgradeOptions');
    options.innerHTML = '';

    const shuffled = [...UPGRADE_DEFS].sort(() => Math.random() - 0.5).slice(0, 3);
    shuffled.forEach(upgrade => {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        card.innerHTML = `
            <div class="upgrade-icon">${upgrade.icon}</div>
            <div class="upgrade-name">${upgrade.name}</div>
            <div class="upgrade-desc">${upgrade.desc}</div>
        `;
        card.onclick = () => {
            applyUpgrade(upgrade.id);
            document.getElementById('levelUpScreen').classList.remove('active');
            game.state = 'playing';

            for (let i = 0; i < 25; i++) spawnParticle(player.x, player.y, '#4ecdc4', 'exp');

            updateHUD();
        };
        options.appendChild(card);
    });
}

// ============================================================
// 游戏结束
// ============================================================
function gameOver() {
    game.state = 'gameover';
    const player = state.player;

    for (let i = 0; i < 50; i++) spawnParticle(player.x, player.y, '#ff6b6b', 'fire');
    for (let i = 0; i < 30; i++) spawnParticle(player.x, player.y, '#ffd700', 'lightning');
    for (let i = 0; i < 20; i++) spawnParticle(player.x, player.y, '#4ecdc4', 'exp');

    game.shake.intensity = 20;
    game.flashColor = 'rgba(255, 0, 0, 0.5)';
    game.flashTimer = 30;

    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.add('active');

        const minutes = Math.floor(game.time / 3600);
        const seconds = Math.floor((game.time % 3600) / 60);
        document.getElementById('gameOverStats').innerHTML = `
            存活时间: ${minutes}:${seconds.toString().padStart(2, '0')}<br>
            击杀数量: ${game.kills}<br>
            最终等级: ${player.level}<br>
            武器数量: ${player.weapons.length}
        `;
    }, 1000);
}

// === main.js ===
// ============================================================
// 末日幸存者 - 主入口（游戏循环、初始化、事件监听）
// ============================================================


// ============================================================
// 注入依赖，避免循环引用
// ============================================================
Enemy._spawnEnemyProjectile = spawnEnemyProjectile;

// ============================================================
// Canvas 初始化
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.CANVAS_WIDTH;
canvas.height = CONFIG.CANVAS_HEIGHT;

game.canvas = canvas;
game.ctx = ctx;

// ============================================================
// 输入处理
// ============================================================
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
    }
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

// ============================================================
// 游戏初始化
// ============================================================
function initGame() {
    state.player = new Player();
    state.enemies = [];
    state.projectiles = [];
    state.expOrbs = [];
    state.particles = [];
    state.damageNumbers = [];

    game.time = 0;
    game.kills = 0;
    game.difficulty = 1;
    game.spawnTimer = 0;
    game.spawnRate = CONFIG.ENEMY_SPAWN_RATE;
    game.flashColor = null;
    game.flashTimer = 0;

    // 注入回调，避免 Player 直接依赖 ui.js
    state.player._onLevelUp = levelUp;
    state.player._onDeath = gameOver;
    state.player._updateHUD = updateHUD;

    // 初始武器
    state.player.weapons.push(new Weapon('sword'));

    updateHUD();
}

// ============================================================
// 游戏流程
// ============================================================
function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    game.state = 'playing';
    Sound.init();
    initGame();
    if (!game.loopRunning) {
        game.loopRunning = true;
        gameLoop();
    }
}

function restartGame() {
    document.getElementById('gameOverScreen').classList.remove('active');
    game.state = 'playing';
    initGame();
    if (!game.loopRunning) {
        game.loopRunning = true;
        gameLoop();
    }
}

// 绑定到 window 供 HTML onclick 使用
window.startGame = startGame;
window.restartGame = restartGame;

// ============================================================
// 相机系统
// ============================================================
function updateCamera() {
    const player = state.player;
    const targetX = player.x - CONFIG.CANVAS_WIDTH / 2;
    const targetY = player.y - CONFIG.CANVAS_HEIGHT / 2;

    game.camera.x += (targetX - game.camera.x) * CONFIG.CAMERA_SMOOTH;
    game.camera.y += (targetY - game.camera.y) * CONFIG.CAMERA_SMOOTH;

    if (game.shake.intensity > 0) {
        game.shake.x = (Math.random() - 0.5) * game.shake.intensity;
        game.shake.y = (Math.random() - 0.5) * game.shake.intensity;
        game.shake.intensity *= 0.9;
        if (game.shake.intensity < 0.5) game.shake.intensity = 0;
    }
}

// ============================================================
// 绘制背景
// ============================================================
function drawBackground() {
    const player = state.player;
    const time = game.time / 100;
    const bgHue = (time * 0.5) % 360;

    const gridSize = 100;
    const startX = Math.floor(game.camera.x / gridSize) * gridSize;
    const startY = Math.floor(game.camera.y / gridSize) * gridSize;

    ctx.strokeStyle = `hsla(${bgHue}, 30%, 15%, 0.5)`;
    ctx.lineWidth = 1;

    for (let x = startX; x < game.camera.x + CONFIG.CANVAS_WIDTH + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, game.camera.y);
        ctx.lineTo(x, game.camera.y + CONFIG.CANVAS_HEIGHT);
        ctx.stroke();
    }

    for (let y = startY; y < game.camera.y + CONFIG.CANVAS_HEIGHT + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(game.camera.x, y);
        ctx.lineTo(game.camera.x + CONFIG.CANVAS_WIDTH, y);
        ctx.stroke();
    }

    // 网格交叉点发光
    ctx.fillStyle = `hsla(${bgHue}, 50%, 30%, 0.3)`;
    for (let x = startX; x < game.camera.x + CONFIG.CANVAS_WIDTH + gridSize; x += gridSize) {
        for (let y = startY; y < game.camera.y + CONFIG.CANVAS_HEIGHT + gridSize; y += gridSize) {
            const dist = Math.sqrt(
                Math.pow(x - player.x, 2) +
                Math.pow(y - player.y, 2)
            );

            if (dist < 300) {
                const alpha = 1 - (dist / 300);
                ctx.globalAlpha = alpha * 0.5;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }
    ctx.globalAlpha = 1;

    // 玩家周围光环
    const playerGlow = ctx.createRadialGradient(
        player.x, player.y, 0,
        player.x, player.y, 200
    );
    playerGlow.addColorStop(0, 'rgba(78, 205, 196, 0.1)');
    playerGlow.addColorStop(1, 'rgba(78, 205, 196, 0)');

    ctx.fillStyle = playerGlow;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 200, 0, Math.PI * 2);
    ctx.fill();
}

// ============================================================
// 主游戏循环
// ============================================================
function gameLoop() {
    requestAnimationFrame(gameLoop);

    if (game.state !== 'playing') return;

    // 更新游戏时间
    game.time++;
    game.difficulty = 1 + game.time / 36000;

    // 更新生成速率
    game.spawnTimer++;
    game.spawnRate = Math.max(
        CONFIG.ENEMY_SPAWN_RATE_MIN,
        CONFIG.ENEMY_SPAWN_RATE - game.time * CONFIG.ENEMY_SPAWN_RATE_DECREASE / 600
    );

    if (game.spawnTimer >= game.spawnRate && state.enemies.length < CONFIG.MAX_ENEMIES) {
        game.spawnTimer = 0;
        spawnEnemy();
    }

    // 更新玩家
    state.player.update();

    // 更新敌人
    state.enemies.forEach(enemy => enemy.update());

    // 更新弹幕
    state.projectiles = state.projectiles.filter(p => p.update());

    // 更新经验球
    state.expOrbs = state.expOrbs.filter(o => o.update());

    // 更新粒子
    state.particles = state.particles.filter(p => p.update());

    // 更新伤害数字
    state.damageNumbers = state.damageNumbers.filter(n => n.update());

    // 更新相机
    updateCamera();

    // 清屏
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

    // 应用相机变换
    ctx.save();
    ctx.translate(
        -game.camera.x + game.shake.x,
        -game.camera.y + game.shake.y
    );

    // 绘制层次
    drawBackground();
    state.expOrbs.forEach(o => o.draw());
    state.enemies.forEach(enemy => enemy.draw());
    state.projectiles.forEach(p => p.draw());
    state.player.draw();
    state.particles.forEach(p => p.draw());
    state.damageNumbers.forEach(n => n.draw());

    ctx.restore();

    // 屏幕闪烁效果
    if (game.flashTimer > 0) {
        game.flashTimer--;
        ctx.fillStyle = game.flashColor;
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        if (game.flashTimer <= 0) {
            game.flashColor = null;
        }
    }

    // 更新HUD
    if (game.time % 10 === 0) {
        updateHUD();
    }
}
