<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日幸存者 - MIMO Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            background: #111;
            cursor: crosshair;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .hud-item span {
            color: #ff6b6b;
            font-weight: bold;
        }

        #expBar {
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #expFill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44bd32);
            width: 0%;
            transition: width 0.3s;
        }

        /* 升级选择界面 */
        #levelUpScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #levelUpScreen.active {
            display: flex;
        }

        #levelUpTitle {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #upgradeOptions {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .upgrade-card:hover {
            transform: translateY(-5px);
            border-color: #4ecdc4;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .upgrade-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upgrade-name {
            font-size: 18px;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 8px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
        }

        /* 游戏结束界面 */
        #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #gameOverScreen.active {
            display: flex;
        }

        #gameOverTitle {
            font-size: 48px;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        #gameOverStats {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        #restartBtn {
            background: linear-gradient(135deg, #4ecdc4 0%, #44bd32 100%);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            pointer-events: auto;
        }

        #restartBtn:hover {
            transform: scale(1.1);
        }

        /* 开始界面 */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        #startScreen.hidden {
            display: none;
        }

        #gameTitle {
            font-size: 64px;
            color: #ff6b6b;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.6);
            letter-spacing: 8px;
        }

        #gameSubtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }

        #startBtn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }

        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        #startInstructions {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            text-align: center;
            line-height: 1.8;
        }

        /* 控制提示 */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>

    <script>
// === ./config.js ===
// ============================================================
// 末日幸存者 - 全局配置和共享状态
// ============================================================

const CONFIG = {
    CANVAS_WIDTH: 1000,
    CANVAS_HEIGHT: 700,
    PLAYER_SPEED: 4,
    PLAYER_MAX_HP: 100,
    PLAYER_SIZE: 20,
    ENEMY_SIZE: 15,
    EXP_PER_LEVEL: 60,
    EXP_GROWTH: 1.2,
    ENEMY_SPAWN_RATE: 45, // 帧，更快出怪
    ENEMY_SPAWN_RATE_MIN: 15,
    ENEMY_SPAWN_RATE_DECREASE: 0.5,
    MAX_ENEMIES: 250,
    ITEM_MAGNET_RANGE: 100,
    CAMERA_SMOOTH: 0.1
};

// 共享游戏状态（所有模块通过 import 引用同一对象）
const game = {
    state: 'menu', // menu, playing, levelup, gameover
    time: 0,
    kills: 0,
    camera: { x: 0, y: 0 },
    shake: { x: 0, y: 0, intensity: 0 },
    difficulty: 1,
    loopRunning: false,
    flashColor: null,
    flashTimer: 0,
    spawnTimer: 0,
    spawnRate: CONFIG.ENEMY_SPAWN_RATE,
    ctx: null,        // main.js 初始化后设置
    canvas: null       // main.js 初始化后设置
};

const state = {
    player: null,
    enemies: [],
    projectiles: [],
    expOrbs: [],
    particles: [],
    damageNumbers: []
};

const keys = {};

// 升级选项元数据（apply 在 ui.js 中绑定）
const UPGRADE_DEFS = [
    { id: 'sword', name: '剑气', icon: '🗡️', desc: '发射剑气攻击最近的敌人' },
    { id: 'fire', name: '火球', icon: '🔥', desc: '发射火球造成范围伤害' },
    { id: 'lightning', name: '闪电', icon: '⚡', desc: '闪电链，可弹射多个敌人' },
    { id: 'orbit', name: '光环', icon: '💫', desc: '环绕身体的护体光球' },
    { id: 'aura', name: '圣光', icon: '✨', desc: '范围伤害光环' },
    { id: 'shield', name: '护盾', icon: '🛡️', desc: '周期性获得护盾保护' },
    { id: 'maxhp', name: '生命强化', icon: '❤️', desc: '最大生命值+20' },
    { id: 'wind', name: '疾风', icon: '💨', desc: '环绕玩家的风之领域，持续伤害周围敌人' },
    { id: 'magnet', name: '磁铁', icon: '🧲', desc: '经验吸取范围+50' },
    { id: 'heal', name: '治疗', icon: '💚', desc: '恢复30%生命值' },
    { id: 'speed', name: '疾步', icon: '🦶', desc: '移动速度+0.5' }
];

// === ./sound.js ===
// ============================================================
// Web Audio API 音效系统
// ============================================================

const Sound = {
    ctx: null,
    muted: false,
    volume: 0.3,

    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn('Web Audio API 不可用');
        }
    },

    ensureCtx() {
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
        return this.ctx;
    },

    // 通用音效播放
    play(type) {
        if (this.muted) return;
        const ctx = this.ensureCtx();
        if (!ctx) return;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        const now = ctx.currentTime;
        gain.gain.setValueAtTime(this.volume * 0.5, now);

        switch (type) {
            case 'hit':
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                break;

            case 'kill':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
                break;

            case 'levelup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, now);
                osc.frequency.setValueAtTime(659, now + 0.1);
                osc.frequency.setValueAtTime(784, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
                break;

            case 'exp':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                gain.gain.setValueAtTime(this.volume * 0.2, now);
                osc.start(now);
                osc.stop(now + 0.05);
                break;

            case 'damage':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
                break;

            case 'fire':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
                break;

            default:
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                break;
        }
    },

    toggle() {
        this.muted = !this.muted;
        return !this.muted;
    }
};

// === ./items.js ===
// ============================================================
// 末日幸存者 - 道具、经验球、粒子、伤害数字
// ============================================================


// ============================================================
// 经验球
// ============================================================
class ExpOrb {
    constructor(x, y, value) {
        this.x = x + (Math.random() - 0.5) * 30;
        this.y = y + (Math.random() - 0.5) * 30;
        this.value = value;
        this.size = 6;
        this.magnetized = false;
    }

    update() {
        const player = state.player;
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // 磁铁效果
        if (dist < CONFIG.ITEM_MAGNET_RANGE) {
            this.magnetized = true;
        }

        if (this.magnetized) {
            const speed = 8;
            this.x += (dx / dist) * speed;
            this.y += (dy / dist) * speed;
        }

        // 收集
        if (dist < player.size + this.size) {
            player.addExp(this.value);
            return false;
        }

        return true;
    }

    draw() {
        const ctx = game.ctx;
        ctx.save();

        // 外发光效果
        const glowAlpha = 0.3 + Math.sin(Date.now() / 200) * 0.2;
        const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 3
        );
        gradient.addColorStop(0, `rgba(78, 205, 196, ${glowAlpha})`);
        gradient.addColorStop(1, 'rgba(78, 205, 196, 0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fill();

        // 经验球主体
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        // 内核高光
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();

        // 旋转光环
        const angle = Date.now() / 500;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 1.5, angle, angle + Math.PI / 2);
        ctx.stroke();

        ctx.restore();
    }
}

// ============================================================
// 粒子系统
// ============================================================
class Particle {
    constructor(x, y, color, type = 'normal') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.life = 30;
        this.maxLife = 30;
        this.color = color;

        switch (type) {
            case 'fire':
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -Math.random() * 5 - 2;
                this.size = Math.random() * 8 + 4;
                this.life = 20 + Math.random() * 20;
                this.maxLife = this.life;
                this.colors = ['#ff6b35', '#ff9500', '#ffcc00', '#ff4444'];
                break;
            case 'wind':
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 3;
                this.size = Math.random() * 6 + 2;
                this.life = 15 + Math.random() * 15;
                this.maxLife = this.life;
                this.colors = ['#87ceeb', '#add8e6', '#e0f0ff', '#ffffff'];
                break;
            case 'lightning':
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.size = Math.random() * 5 + 2;
                this.life = 10 + Math.random() * 10;
                this.maxLife = this.life;
                this.colors = ['#ffd700', '#ffff00', '#00ffff', '#ffffff'];
                break;
            case 'exp':
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = -Math.random() * 2 - 1;
                this.size = Math.random() * 4 + 2;
                this.life = 25 + Math.random() * 15;
                this.maxLife = this.life;
                this.colors = ['#4ecdc4', '#44bd32', '#00ff88', '#ffffff'];
                break;
            default: // normal
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.size = Math.random() * 4 + 2;
                this.colors = [color];
                break;
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        switch (this.type) {
            case 'fire':
                this.vy -= 0.1;
                this.size *= 0.98;
                this.vx *= 0.98;
                break;
            case 'wind':
                this.vx *= 0.97;
                this.vy *= 0.97;
                this.size *= 0.99;
                break;
            case 'lightning':
                this.vx *= 0.9;
                this.vy *= 0.9;
                break;
            default:
                this.vx *= 0.95;
                this.vy *= 0.95;
                break;
        }

        this.life--;
        return this.life > 0;
    }

    draw() {
        const ctx = game.ctx;
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;

        const colorIndex = Math.floor(Math.random() * this.colors.length);
        ctx.fillStyle = this.colors[colorIndex];

        switch (this.type) {
            case 'fire': {
                const fireSize = this.size * (1 + (1 - alpha) * 0.5);
                ctx.beginPath();
                ctx.arc(this.x, this.y, fireSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffff00';
                ctx.globalAlpha = alpha * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, fireSize * 0.5, 0, Math.PI * 2);
                ctx.fill();
                break;
            }
            case 'wind':
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size * 2, this.size, Math.atan2(this.vy, this.vx), 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'lightning':
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.random() * Math.PI * 2);
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    const angle = (Math.PI * 2 / 4) * i;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                break;
            default:
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                break;
        }

        ctx.globalAlpha = 1;
    }
}

// ============================================================
// 伤害数字
// ============================================================
class DamageNumber {
    constructor(x, y, value, color) {
        this.x = x;
        this.y = y;
        this.value = value;
        this.color = color;
        this.life = 40;
        this.vy = -2;
    }

    update() {
        this.y += this.vy;
        this.vy *= 0.95;
        this.life--;
        return this.life > 0;
    }

    draw() {
        const ctx = game.ctx;
        ctx.globalAlpha = this.life / 40;
        ctx.fillStyle = this.color;
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(Math.floor(this.value), this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

// ============================================================
// 辅助生成函数
// ============================================================
function spawnExpOrb(x, y, value) {
    state.expOrbs.push(new ExpOrb(x, y, value));
}

function spawnParticle(x, y, color, type = 'normal') {
    state.particles.push(new Particle(x, y, color, type));
}

function addDamageNumber(x, y, value, color) {
    state.damageNumbers.push(new DamageNumber(x, y, value, color));
}

function spawnLightningEffect(x1, y1, x2, y2) {
    const segments = 8;
    for (let i = 0; i < segments; i++) {
        const t = i / segments;
        const x = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 25;
        const y = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 25;
        spawnParticle(x, y, '#ffd700', 'lightning');
    }
    for (let i = 0; i < 10; i++) {
        spawnParticle(x2, y2, '#00ffff', 'lightning');
    }
}

function spawnAuraEffect(x, y, range) {
    for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i;
        const px = x + Math.cos(angle) * range;
        const py = y + Math.sin(angle) * range;
        spawnParticle(px, py, '#4ecdc4', 'exp');
    }
}

// ============================================================

class Player {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.size = CONFIG.PLAYER_SIZE;
        this.speed = CONFIG.PLAYER_SPEED;
        this.hp = CONFIG.PLAYER_MAX_HP;
        this.maxHp = CONFIG.PLAYER_MAX_HP;
        this.exp = 0;
        this.level = 1;
        this.expToNext = CONFIG.EXP_PER_LEVEL;
        this.invincible = 0;
        this.weapons = [];
        this.upgrades = {};
        this.moveTimer = 0;
    }

    update() {
        // 移动
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) dy = -1;
        if (keys['KeyS'] || keys['ArrowDown']) dy = 1;
        if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
        if (keys['KeyD'] || keys['ArrowRight']) dx = 1;

        // 归一化对角线移动
        if (dx !== 0 && dy !== 0) {
            const len = Math.sqrt(dx * dx + dy * dy);
            dx /= len;
            dy /= len;
        }

        this.x += dx * this.speed;
        this.y += dy * this.speed;

        // 限制在地图范围内
        this.x = Math.max(-2000, Math.min(2000, this.x));
        this.y = Math.max(-2000, Math.min(2000, this.y));

        // 无敌时间
        if (this.invincible > 0) this.invincible--;

        // 移动时生成风粒子效果
        if (dx !== 0 || dy !== 0) {
            this.moveTimer++;
            if (this.moveTimer % 3 === 0) {
                const particle = new Particle(
                    this.x - dx * 15 + (Math.random() - 0.5) * 10,
                    this.y - dy * 15 + (Math.random() - 0.5) * 10,
                    '#87ceeb',
                    'wind'
                );
                particle.vx = -dx * (2 + Math.random() * 2) + (Math.random() - 0.5) * 1;
                particle.vy = -dy * (2 + Math.random() * 2) + (Math.random() - 0.5) * 1;
                state.particles.push(particle);
            }
        }

        // 更新武器
        this.weapons.forEach(w => w.update(this));
    }

    draw() {
        const ctx = game.ctx;
        ctx.save();

        // 无敌闪烁
        if (this.invincible > 0 && this.invincible % 4 < 2) {
            ctx.globalAlpha = 0.5;
        }

        // 移动方向
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) dy = -1;
        if (keys['KeyS'] || keys['ArrowDown']) dy = 1;
        if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
        if (keys['KeyD'] || keys['ArrowRight']) dx = 1;

        // 移动残影
        if (dx !== 0 || dy !== 0) {
            ctx.globalAlpha = 0.15;
            this.drawCharacterBody(this.x - dx * 10, this.y - dy * 10, 0.9);
            ctx.globalAlpha = 0.08;
            this.drawCharacterBody(this.x - dx * 20, this.y - dy * 20, 0.8);
            ctx.globalAlpha = 1;
        }

        // 外发光
        const glowSize = this.size * 3;
        const gradient = ctx.createRadialGradient(
            this.x, this.y, this.size * 0.5,
            this.x, this.y, glowSize
        );
        gradient.addColorStop(0, 'rgba(78, 205, 196, 0.25)');
        gradient.addColorStop(1, 'rgba(78, 205, 196, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
        ctx.fill();

        // 绘制角色身体
        this.drawCharacterBody(this.x, this.y, 1);

        // 武器效果
        this.weapons.forEach(w => w.draw(this));

        ctx.restore();
    }

    drawCharacterBody(x, y, scale) {
        const ctx = game.ctx;
        const s = this.size * scale;
        const time = Date.now() / 200;
        const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] ||
                         keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'];

        // 计算朝向角度
        let faceAngle = 0;
        if (isMoving) {
            let fdx = 0, fdy = 0;
            if (keys['KeyW'] || keys['ArrowUp']) fdy = -1;
            if (keys['KeyS'] || keys['ArrowDown']) fdy = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) fdx = -1;
            if (keys['KeyD'] || keys['ArrowRight']) fdx = 1;
            faceAngle = Math.atan2(fdy, fdx);
        }

        ctx.save();
        ctx.translate(x, y);

        // 身体（椭圆形）
        ctx.fillStyle = '#3db8b0';
        ctx.beginPath();
        ctx.ellipse(0, 0, s * 0.7, s * 0.9, 0, 0, Math.PI * 2);
        ctx.fill();

        // 身体高光
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.ellipse(-s * 0.15, -s * 0.2, s * 0.45, s * 0.6, -0.2, 0, Math.PI * 2);
        ctx.fill();

        // 头部
        ctx.fillStyle = '#5dd8d0';
        ctx.beginPath();
        ctx.arc(0, -s * 0.65, s * 0.5, 0, Math.PI * 2);
        ctx.fill();

        // 头发（动感）
        ctx.fillStyle = '#2a9d8f';
        const hairWave = isMoving ? Math.sin(time) * 3 : 0;
        ctx.beginPath();
        ctx.moveTo(-s * 0.4, -s * 0.9);
        ctx.quadraticCurveTo(-s * 0.2, -s * 1.3 + hairWave, 0, -s * 1.1);
        ctx.quadraticCurveTo(s * 0.2, -s * 1.3 - hairWave, s * 0.4, -s * 0.9);
        ctx.quadraticCurveTo(s * 0.3, -s * 0.7, 0, -s * 0.7);
        ctx.quadraticCurveTo(-s * 0.3, -s * 0.7, -s * 0.4, -s * 0.9);
        ctx.fill();

        // 眼睛
        const eyeOffsetX = Math.cos(faceAngle) * s * 0.15;
        const eyeOffsetY = Math.sin(faceAngle) * s * 0.1;

        // 左眼
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(-s * 0.2 + eyeOffsetX, -s * 0.7 + eyeOffsetY, s * 0.15, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(-s * 0.18 + eyeOffsetX * 1.2, -s * 0.7 + eyeOffsetY, s * 0.08, 0, Math.PI * 2);
        ctx.fill();

        // 右眼
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(s * 0.2 + eyeOffsetX, -s * 0.7 + eyeOffsetY, s * 0.15, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(s * 0.22 + eyeOffsetX * 1.2, -s * 0.7 + eyeOffsetY, s * 0.08, 0, Math.PI * 2);
        ctx.fill();

        // 嘴巴（微笑）
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, -s * 0.55, s * 0.12, 0.2, Math.PI - 0.2);
        ctx.stroke();

        // 腿部动画
        const legSwing = isMoving ? Math.sin(time) * 0.4 : 0;

        // 左腿
        ctx.fillStyle = '#2a9d8f';
        ctx.save();
        ctx.translate(-s * 0.25, s * 0.7);
        ctx.rotate(legSwing);
        ctx.fillRect(-s * 0.12, 0, s * 0.24, s * 0.5);
        // 鞋子
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(-s * 0.15, s * 0.45, s * 0.3, s * 0.12);
        ctx.restore();

        // 右腿
        ctx.fillStyle = '#2a9d8f';
        ctx.save();
        ctx.translate(s * 0.25, s * 0.7);
        ctx.rotate(-legSwing);
        ctx.fillRect(-s * 0.12, 0, s * 0.24, s * 0.5);
        // 鞋子
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(-s * 0.15, s * 0.45, s * 0.3, s * 0.12);
        ctx.restore();

        // 手臂动画
        const armSwing = isMoving ? Math.sin(time + Math.PI) * 0.5 : 0;

        // 左臂
        ctx.fillStyle = '#3db8b0';
        ctx.save();
        ctx.translate(-s * 0.6, -s * 0.2);
        ctx.rotate(armSwing);
        ctx.fillRect(-s * 0.1, 0, s * 0.2, s * 0.45);
        // 手
        ctx.fillStyle = '#5dd8d0';
        ctx.beginPath();
        ctx.arc(0, s * 0.5, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 右臂
        ctx.fillStyle = '#3db8b0';
        ctx.save();
        ctx.translate(s * 0.6, -s * 0.2);
        ctx.rotate(-armSwing);
        ctx.fillRect(-s * 0.1, 0, s * 0.2, s * 0.45);
        // 手
        ctx.fillStyle = '#5dd8d0';
        ctx.beginPath();
        ctx.arc(0, s * 0.5, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.restore();
    }

    takeDamage(amount) {
        if (this.invincible > 0) return;

        this.hp -= amount;
        this.invincible = 30; // 0.5秒无敌
        game.shake.intensity = 8;

        // 伤害数字
        addDamageNumber(this.x, this.y - 30, amount, '#ff6b6b');

        // 受伤粒子效果
        for (let i = 0; i < 10; i++) {
            spawnParticle(this.x, this.y, '#ff6b6b', 'normal');
        }

        // 屏幕闪烁效果
        game.flashColor = 'rgba(255, 0, 0, 0.3)';
        game.flashTimer = 10;

        if (this.hp <= 0) {
            // gameOver 由 main.js 注入
            if (this._onDeath) this._onDeath();
        }
    }

    addExp(amount) {
        this.exp += amount;
        while (this.exp >= this.expToNext) {
            this.exp -= this.expToNext;
            this.level++;
            this.expToNext = Math.floor(CONFIG.EXP_PER_LEVEL * Math.pow(CONFIG.EXP_GROWTH, this.level - 1));
            // levelUp 由 main.js 注入
            if (this._onLevelUp) this._onLevelUp();
        }
        // updateHUD 由 main.js 注入
        if (this._updateHUD) this._updateHUD();
    }

    heal(amount) {
        this.hp = Math.min(this.maxHp, this.hp + amount);
    }
}

class Enemy {
    constructor(x, y, type = 'normal') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.size = CONFIG.ENEMY_SIZE;
        this.speed = 1.5;
        this.hp = 20;
        this.maxHp = 20;
        this.damage = 10;
        this.exp = 10;
        this.color = '#ff6b6b';
        this.hitFlash = 0;
        this.attackCooldown = 0;
        this.shootTimer = 0;

        this.initType();
    }

    initType() {
        const hpMult = 1 + (game.difficulty - 1) * 0.2;

        switch (this.type) {
            case 'fast':
                this.speed = 2.5;
                this.hp = Math.floor(8 * hpMult);
                this.maxHp = this.hp;
                this.color = '#ffa502';
                this.size = 12;
                break;
            case 'tank':
                this.speed = 0.8;
                this.hp = Math.floor(30 * hpMult);
                this.maxHp = this.hp;
                this.damage = 12;
                this.exp = 20;
                this.color = '#8B4513';
                this.size = 22;
                break;
            case 'ranged':
                this.speed = 1;
                this.hp = Math.floor(12 * hpMult);
                this.maxHp = this.hp;
                this.damage = 10;
                this.exp = 15;
                this.color = '#9b59b6';
                this.shootTimer = 0;
                break;
            case 'boss':
                this.speed = 0.6;
                this.hp = Math.floor(150 * hpMult);
                this.maxHp = this.hp;
                this.damage = 20;
                this.exp = 100;
                this.color = '#e74c3c';
                this.size = 40;
                break;
            default:
                this.hp = Math.floor(10 * hpMult);
                this.maxHp = this.hp;
                this.damage = 6;
                break;
        }
    }

    update() {
        const player = state.player;

        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 0) {
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
        }

        // 碰撞玩家
        if (dist < this.size + player.size) {
            if (this.attackCooldown <= 0) {
                player.takeDamage(this.damage);
                this.attackCooldown = 60;
            }
        }
        if (this.attackCooldown > 0) this.attackCooldown--;

        // 远程敌人射击（通过注入的静态方法调用，避免循环依赖）
        if (this.type === 'ranged') {
            this.shootTimer++;
            if (this.shootTimer >= 120) {
                this.shootTimer = 0;
                if (dist < 300 && Enemy._spawnEnemyProjectile) {
                    Enemy._spawnEnemyProjectile(this.x, this.y, dx / dist, dy / dist);
                }
            }
        }

        if (this.hitFlash > 0) this.hitFlash--;
    }

    draw() {
        const ctx = game.ctx;
        ctx.save();

        if (this.hitFlash > 0) {
            const scale = 1 + (this.hitFlash / 10);
            ctx.translate(this.x, this.y);
            ctx.scale(scale, scale);
            ctx.translate(-this.x, -this.y);
        }

        this.drawEnemyBody();

        // 血条
        if (this.hp < this.maxHp) {
            const barWidth = this.size * 2.5;
            const barHeight = 5;
            const bx = this.x - barWidth / 2;
            const by = this.y - this.size - 15;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(bx - 1, by - 1, barWidth + 2, barHeight + 2);

            const hpPercent = this.hp / this.maxHp;
            let hpColor;
            if (hpPercent > 0.6) hpColor = '#4ecdc4';
            else if (hpPercent > 0.3) hpColor = '#ffa502';
            else hpColor = '#ff6b6b';

            const hpGradient = ctx.createLinearGradient(bx, by, bx + barWidth * hpPercent, by);
            hpGradient.addColorStop(0, hpColor);
            hpGradient.addColorStop(1, hpColor + '80');
            ctx.fillStyle = hpGradient;
            ctx.fillRect(bx, by, barWidth * hpPercent, barHeight);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(bx, by, barWidth * hpPercent, barHeight / 2);
        }

        ctx.restore();
    }

    drawEnemyBody() {
        const time = Date.now() / 300;
        const s = this.size;

        switch (this.type) {
            case 'normal': this.drawNormalEnemy(s, time); break;
            case 'fast': this.drawFastEnemy(s, time); break;
            case 'tank': this.drawTankEnemy(s, time); break;
            case 'ranged': this.drawRangedEnemy(s, time); break;
            case 'boss': this.drawBossEnemy(s, time); break;
        }
    }

    drawNormalEnemy(s, time) {
        const ctx = game.ctx;
        const player = state.player;

        ctx.fillStyle = this.hitFlash > 0 ? '#fff' : this.color;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, s * 0.8, s, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.hitFlash > 0 ? '#ddd' : '#cc4444';
        ctx.beginPath();
        ctx.ellipse(this.x, this.y + s * 0.1, s * 0.6, s * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();

        const lookX = Math.atan2(player.y - this.y, player.x - this.x);

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(this.x - s * 0.25, this.y - s * 0.2, s * 0.2, s * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(this.x - s * 0.25 + Math.cos(lookX) * s * 0.05, this.y - s * 0.2 + Math.sin(lookX) * s * 0.05, s * 0.1, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(this.x + s * 0.25, this.y - s * 0.2, s * 0.2, s * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.25 + Math.cos(lookX) * s * 0.05, this.y - s * 0.2 + Math.sin(lookX) * s * 0.05, s * 0.1, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#880000';
        ctx.beginPath();
        ctx.moveTo(this.x - s * 0.3, this.y + s * 0.3);
        for (let i = 0; i < 5; i++) {
            const px = this.x - s * 0.3 + (s * 0.6 / 5) * (i + 0.5);
            const py = this.y + s * 0.3 + (i % 2 === 0 ? s * 0.15 : 0);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(this.x + s * 0.3, this.y + s * 0.3);
        ctx.closePath();
        ctx.fill();
    }

    drawFastEnemy(s, time) {
        const ctx = game.ctx;

        ctx.globalAlpha = 0.3;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.ellipse(this.x - this.speed * 3, this.y, s * 0.6, s * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = this.hitFlash > 0 ? '#fff' : this.color;
        ctx.beginPath();
        ctx.moveTo(this.x + s, this.y);
        ctx.quadraticCurveTo(this.x, this.y - s * 0.8, this.x - s * 0.8, this.y);
        ctx.quadraticCurveTo(this.x, this.y + s * 0.8, this.x + s, this.y);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.3, this.y - s * 0.1, s * 0.15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.35, this.y - s * 0.1, s * 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 165, 0, 0.5)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
            const offset = Math.sin(time + i) * s * 0.3;
            ctx.beginPath();
            ctx.moveTo(this.x - s * 0.5, this.y + offset);
            ctx.lineTo(this.x - s * 1.5, this.y + offset);
            ctx.stroke();
        }
    }

    drawTankEnemy(s, time) {
        const ctx = game.ctx;

        ctx.fillStyle = this.hitFlash > 0 ? '#fff' : '#8B4513';
        const armorSize = s * 1.1;
        ctx.fillRect(this.x - armorSize, this.y - armorSize * 0.8, armorSize * 2, armorSize * 1.6);

        ctx.fillStyle = this.hitFlash > 0 ? '#ddd' : '#6B3410';
        ctx.fillRect(this.x - armorSize * 0.8, this.y - armorSize * 0.6, armorSize * 1.6, armorSize * 1.2);

        ctx.fillStyle = '#4a2800';
        const rivetPositions = [[-0.7, -0.5], [0.7, -0.5], [-0.7, 0.5], [0.7, 0.5], [-0.7, 0], [0.7, 0]];
        rivetPositions.forEach(([rx, ry]) => {
            ctx.beginPath();
            ctx.arc(this.x + s * rx, this.y + s * ry, s * 0.08, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(this.x - s * 0.4, this.y - s * 0.3, s * 0.25, s * 0.15);
        ctx.fillRect(this.x + s * 0.15, this.y - s * 0.3, s * 0.25, s * 0.15);

        ctx.fillStyle = '#ff0000';
        ctx.fillRect(this.x - s * 0.35, this.y - s * 0.27, s * 0.15, s * 0.09);
        ctx.fillRect(this.x + s * 0.2, this.y - s * 0.27, s * 0.15, s * 0.09);

        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - s * 0.4, this.y + s * 0.1, s * 0.8, s * 0.3);
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(this.x - s * 0.4, this.y + s * 0.1 + (s * 0.3 / 4) * (i + 1));
            ctx.lineTo(this.x + s * 0.4, this.y + s * 0.1 + (s * 0.3 / 4) * (i + 1));
            ctx.stroke();
        }
    }

    drawRangedEnemy(s, time) {
        const ctx = game.ctx;
        const magicGlow = 0.3 + Math.sin(time * 2) * 0.2;

        ctx.strokeStyle = `rgba(155, 89, 182, ${magicGlow})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, s * 1.3, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = this.hitFlash > 0 ? '#fff' : this.color;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - s);
        ctx.quadraticCurveTo(this.x + s * 0.8, this.y - s * 0.5, this.x + s * 0.6, this.y + s * 0.3);
        ctx.quadraticCurveTo(this.x + s * 0.4, this.y + s, this.x, this.y + s * 0.8);
        ctx.quadraticCurveTo(this.x - s * 0.4, this.y + s, this.x - s * 0.6, this.y + s * 0.3);
        ctx.quadraticCurveTo(this.x - s * 0.8, this.y - s * 0.5, this.x, this.y - s);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(this.x - s * 0.2, this.y - s * 0.2, s * 0.18, s * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#9b59b6';
        ctx.beginPath();
        ctx.arc(this.x - s * 0.2, this.y - s * 0.2, s * 0.12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(this.x + s * 0.2, this.y - s * 0.2, s * 0.18, s * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#9b59b6';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.2, this.y - s * 0.2, s * 0.12, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(155, 89, 182, ${0.5 + Math.sin(time * 3) * 0.3})`;
        ctx.lineWidth = 1.5;
        const runeAngle = time * 2;
        for (let i = 0; i < 3; i++) {
            const angle = runeAngle + (Math.PI * 2 / 3) * i;
            const rx = this.x + Math.cos(angle) * s * 0.6;
            const ry = this.y + Math.sin(angle) * s * 0.6;
            ctx.beginPath();
            ctx.arc(rx, ry, s * 0.08, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    drawBossEnemy(s, time) {
        const ctx = game.ctx;
        const player = state.player;

        ctx.fillStyle = `rgba(255, 0, 0, ${0.2 + Math.sin(time * 2) * 0.1})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, s * 1.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.hitFlash > 0 ? '#fff' : '#c0392b';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - s * 1.2);
        ctx.quadraticCurveTo(this.x + s * 0.8, this.y - s * 0.8, this.x + s, this.y);
        ctx.quadraticCurveTo(this.x + s * 0.9, this.y + s * 0.8, this.x, this.y + s);
        ctx.quadraticCurveTo(this.x - s * 0.9, this.y + s * 0.8, this.x - s, this.y);
        ctx.quadraticCurveTo(this.x - s * 0.8, this.y - s * 0.8, this.x, this.y - s * 1.2);
        ctx.fill();

        ctx.fillStyle = this.hitFlash > 0 ? '#ddd' : '#992222';
        ctx.beginPath();
        ctx.moveTo(this.x - s * 0.6, this.y - s * 0.3);
        ctx.quadraticCurveTo(this.x - s * 1.8, this.y - s * 1.5, this.x - s * 1.5, this.y + s * 0.2);
        ctx.quadraticCurveTo(this.x - s * 1.2, this.y + s * 0.5, this.x - s * 0.5, this.y);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(this.x + s * 0.6, this.y - s * 0.3);
        ctx.quadraticCurveTo(this.x + s * 1.8, this.y - s * 1.5, this.x + s * 1.5, this.y + s * 0.2);
        ctx.quadraticCurveTo(this.x + s * 1.2, this.y + s * 0.5, this.x + s * 0.5, this.y);
        ctx.fill();

        const lookX = Math.atan2(player.y - this.y, player.x - this.x);

        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.ellipse(this.x - s * 0.35, this.y - s * 0.3, s * 0.22, s * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(this.x - s * 0.35 + Math.cos(lookX) * s * 0.05, this.y - s * 0.3 + Math.sin(lookX) * s * 0.05, s * 0.15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x - s * 0.35 + Math.cos(lookX) * s * 0.08, this.y - s * 0.3 + Math.sin(lookX) * s * 0.08, s * 0.06, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.ellipse(this.x + s * 0.35, this.y - s * 0.3, s * 0.22, s * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.35 + Math.cos(lookX) * s * 0.05, this.y - s * 0.3 + Math.sin(lookX) * s * 0.05, s * 0.15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x + s * 0.35 + Math.cos(lookX) * s * 0.08, this.y - s * 0.3 + Math.sin(lookX) * s * 0.08, s * 0.06, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#880000';
        ctx.beginPath();
        ctx.moveTo(this.x - s * 0.5, this.y + s * 0.2);
        for (let i = 0; i < 7; i++) {
            const px = this.x - s * 0.5 + (s / 7) * (i + 0.5);
            const py = this.y + s * 0.2 + (i % 2 === 0 ? s * 0.25 : s * 0.05);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(this.x + s * 0.5, this.y + s * 0.2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.moveTo(this.x - s * 0.4, this.y - s * 0.8);
        ctx.lineTo(this.x - s * 0.7, this.y - s * 1.6);
        ctx.lineTo(this.x - s * 0.2, this.y - s * 0.9);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(this.x + s * 0.4, this.y - s * 0.8);
        ctx.lineTo(this.x + s * 0.7, this.y - s * 1.6);
        ctx.lineTo(this.x + s * 0.2, this.y - s * 0.9);
        ctx.fill();

        if (Math.random() < 0.3) {
            spawnParticle(
                this.x + (Math.random() - 0.5) * s,
                this.y - s * 0.5,
                '#ff6b35',
                'fire'
            );
        }
    }

    takeDamage(amount) {
        this.hp -= amount;
        this.hitFlash = 5;
        addDamageNumber(this.x, this.y - 20, amount, '#ffd700');

        for (let i = 0; i < 5; i++) {
            spawnParticle(this.x, this.y, this.color, 'normal');
        }

        if (this.hp <= 0) {
            this.die();
            return true;
        }
        return false;
    }

    die() {
        game.kills++;

        const expCount = Math.ceil(this.exp / 3);
        for (let i = 0; i < expCount; i++) {
            spawnExpOrb(this.x, this.y, Math.ceil(this.exp / expCount));
        }

        for (let i = 0; i < 20; i++) {
            spawnParticle(this.x, this.y, this.color, 'normal');
        }
        for (let i = 0; i < 8; i++) {
            spawnParticle(this.x, this.y, '#4ecdc4', 'exp');
        }

        switch (this.type) {
            case 'boss':
                for (let i = 0; i < 30; i++) spawnParticle(this.x, this.y, '#ff6b35', 'fire');
                for (let i = 0; i < 20; i++) spawnParticle(this.x, this.y, '#ffd700', 'lightning');
                break;
            case 'tank':
                for (let i = 0; i < 15; i++) spawnParticle(this.x, this.y, '#8B4513', 'normal');
                break;
            case 'fast':
                for (let i = 0; i < 10; i++) spawnParticle(this.x, this.y, '#ffa502', 'wind');
                break;
            case 'ranged':
                for (let i = 0; i < 12; i++) spawnParticle(this.x, this.y, '#9b59b6', 'lightning');
                break;
        }
    }
}

function spawnEnemy() {
    const player = state.player;
    const angle = Math.random() * Math.PI * 2;
    const dist = 500 + Math.random() * 200;
    const x = player.x + Math.cos(angle) * dist;
    const y = player.y + Math.sin(angle) * dist;

    let type = 'normal';
    const rand = Math.random();
    if (rand < 0.05 * game.difficulty) type = 'boss';
    else if (rand < 0.12) type = 'tank';
    else if (rand < 0.25) type = 'fast';
    else if (rand < 0.35) type = 'ranged';

    state.enemies.push(new Enemy(x, y, type));
}

// ============================================================
// 查找最近敌人（供武器瞄准用）
// ============================================================
function findNearestEnemy(x, y, exclude = []) {
    let nearest = null;
    let minDist = Infinity;

    state.enemies.forEach(enemy => {
        if (exclude.includes(enemy)) return;
        const dx = enemy.x - x;
        const dy = enemy.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) {
            minDist = dist;
            nearest = enemy;
        }
    });

    return nearest;
}

// ============================================================
// 弹幕类（增加 fromEnemy 参数修复Bug）
// ============================================================
class Projectile {
    constructor(x, y, vx, vy, damage, color, size, maxDist, piercing = false, type = 'normal', fromEnemy = false) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.damage = damage;
        this.color = color;
        this.size = size;
        this.maxDist = maxDist;
        this.dist = 0;
        this.piercing = piercing;
        this.hitEnemies = new Set();
        this.type = type;
        this.fromEnemy = fromEnemy; // Bug修复：标记子弹来源
        this.angle = Math.atan2(vy, vx);
        this.trail = [];
        this.life = 0;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.dist += Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        this.life++;

        // 记录轨迹
        this.trail.push({ x: this.x, y: this.y, life: 10 });
        if (this.trail.length > 20) this.trail.shift();
        this.trail.forEach(t => t.life--);
        this.trail = this.trail.filter(t => t.life > 0);

        // 生成特效粒子
        if (this.type === 'fire' && this.life % 2 === 0) {
            spawnParticle(this.x, this.y, '#ff6b35', 'fire');
        } else if (this.type === 'wind' && this.life % 3 === 0) {
            spawnParticle(this.x, this.y, '#87ceeb', 'wind');
        }

        // 检查距离
        if (this.dist > this.maxDist) return false;

        // Bug修复：根据来源区分碰撞检测目标
        if (this.fromEnemy) {
            // 敌人子弹只检测与玩家的碰撞
            const player = state.player;
            const dx = player.x - this.x;
            const dy = player.y - this.y;
            if (Math.sqrt(dx * dx + dy * dy) < this.size + player.size) {
                player.takeDamage(this.damage);
                this.onHit();
                return false;
            }
        } else {
            // 玩家子弹检测与敌人的碰撞
            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const enemy = state.enemies[i];
                if (this.hitEnemies.has(enemy)) continue;

                const dx = enemy.x - this.x;
                const dy = enemy.y - this.y;
                if (Math.sqrt(dx * dx + dy * dy) < this.size + enemy.size) {
                    const killed = enemy.takeDamage(this.damage);
                    if (killed) {
                        state.enemies.splice(i, 1);
                    }
                    this.onHit();
                    if (!this.piercing) return false;
                    this.hitEnemies.add(enemy);
                }
            }
        }

        return true;
    }

    onHit() {
        switch (this.type) {
            case 'fire':
                for (let i = 0; i < 15; i++) spawnParticle(this.x, this.y, '#ff6b35', 'fire');
                break;
            case 'lightning':
                for (let i = 0; i < 20; i++) spawnParticle(this.x, this.y, '#ffd700', 'lightning');
                break;
            case 'wind':
                for (let i = 0; i < 10; i++) spawnParticle(this.x, this.y, '#87ceeb', 'wind');
                break;
        }
    }

    draw() {
        const ctx = game.ctx;
        ctx.save();

        switch (this.type) {
            case 'fire': this.drawFire(); break;
            case 'lightning': this.drawLightning(); break;
            case 'wind': this.drawWind(); break;
            default: this.drawNormal(); break;
        }

        ctx.restore();
    }

    drawFire() {
        const ctx = game.ctx;
        const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 2
        );
        gradient.addColorStop(0, '#ffff00');
        gradient.addColorStop(0.3, '#ff9500');
        gradient.addColorStop(0.6, '#ff6b35');
        gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const alpha = t.life / 10;
            const size = this.size * alpha * 0.8;
            ctx.globalAlpha = alpha * 0.6;
            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    drawLightning() {
        const ctx = game.ctx;
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 20;

        ctx.beginPath();
        ctx.moveTo(this.x - this.vx * 3, this.y - this.vy * 3);

        const segments = 5;
        for (let i = 0; i < segments; i++) {
            const t = i / segments;
            const x = this.x - this.vx * 3 * (1 - t) + (Math.random() - 0.5) * 15;
            const y = this.y - this.vy * 3 * (1 - t) + (Math.random() - 0.5) * 15;
            ctx.lineTo(x, y);
        }
        ctx.lineTo(this.x, this.y);
        ctx.stroke();

        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i++) {
            const startX = this.x - this.vx * 2 * Math.random();
            const startY = this.y - this.vy * 2 * Math.random();
            const endX = startX + (Math.random() - 0.5) * 30;
            const endY = startY + (Math.random() - 0.5) * 30;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        ctx.shadowBlur = 0;
    }

    drawWind() {
        const ctx = game.ctx;
        ctx.strokeStyle = 'rgba(135, 206, 235, 0.6)';
        ctx.lineWidth = 2;

        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        for (let i = 0; i < 5; i++) {
            const offset = (i - 2) * 8;
            const perpX = speed > 0 ? -this.vy * offset / speed : 0;
            const perpY = speed > 0 ? this.vx * offset / speed : 0;

            ctx.beginPath();
            ctx.moveTo(this.x - this.vx * 2 + perpX, this.y - this.vy * 2 + perpY);
            ctx.quadraticCurveTo(
                this.x + perpX * 0.5,
                this.y + perpY * 0.5,
                this.x + perpX,
                this.y + perpY
            );
            ctx.stroke();
        }

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const alpha = t.life / 10;
            ctx.globalAlpha = alpha * 0.3;
            ctx.fillStyle = '#87ceeb';
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    drawNormal() {
        const ctx = game.ctx;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.color + '40';
        ctx.beginPath();
        ctx.arc(this.x - this.vx, this.y - this.vy, this.size * 0.8, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 武器类

class Weapon {
    constructor(type) {
        this.type = type;
        this.level = 1;
        this.timer = 0;
        this.angle = 0;
        this.active = false;
        this.timer2 = 0;
        this.particleTimer = 0;
        this.init();
    }

    init() {
        switch (this.type) {
            case 'sword':
                this.name = '剑气';
                this.icon = '🗡️';
                this.cooldown = 35;
                this.damage = 20;
                this.range = 180;
                this.count = 1;
                break;
            case 'fire':
                this.name = '火球';
                this.icon = '🔥';
                this.cooldown = 50;
                this.damage = 35;
                this.range = 220;
                this.count = 1;
                break;
            case 'lightning':
                this.name = '闪电';
                this.icon = '⚡';
                this.cooldown = 70;
                this.damage = 50;
                this.range = 280;
                this.count = 1;
                this.chain = 2;
                break;
            case 'orbit':
                this.name = '光环';
                this.icon = '💫';
                this.cooldown = 0;
                this.damage = 15;
                this.range = 90;
                this.count = 2;
                this.angle = 0;
                break;
            case 'aura':
                this.name = '圣光';
                this.icon = '✨';
                this.cooldown = 25;
                this.damage = 12;
                this.range = 120;
                break;
            case 'shield':
                this.name = '护盾';
                this.icon = '🛡️';
                this.cooldown = 150;
                this.duration = 150;
                this.active = false;
                this.timer2 = 0;
                break;
            case 'wind':
                this.name = '疾风';
                this.icon = '💨';
                this.cooldown = 0;
                this.damage = 5;
                this.range = 60;
                this.particleTimer = 0;
                break;
        }
    }

    update(player) {
        this.timer++;

        switch (this.type) {
            case 'sword':
                if (this.timer >= this.cooldown) {
                    this.timer = 0;
                    this.fireSword(player);
                }
                break;
            case 'fire':
                if (this.timer >= this.cooldown) {
                    this.timer = 0;
                    this.fireFire(player);
                }
                break;
            case 'lightning':
                if (this.timer >= this.cooldown) {
                    this.timer = 0;
                    this.fireLightning(player);
                }
                break;
            case 'orbit':
                this.angle += 0.05;
                this.checkOrbitHit(player);
                break;
            case 'aura':
                if (this.timer >= this.cooldown) {
                    this.timer = 0;
                    this.fireAura(player);
                }
                break;
            case 'shield':
                if (this.active) {
                    this.timer2--;
                    if (this.timer2 <= 0) this.active = false;
                } else if (this.timer >= this.cooldown) {
                    this.timer = 0;
                    this.active = true;
                    this.timer2 = this.duration;
                }
                break;
            case 'wind':
                this.particleTimer++;
                if (this.particleTimer >= 3) {
                    this.particleTimer = 0;
                    this.fireWind(player);
                }
                if (this.timer % 15 === 0) {
                    this.checkWindHit(player);
                }
                break;
        }
    }

    fireSword(player) {
        const target = findNearestEnemy(player.x, player.y);
        if (!target) return;

        const dx = target.x - player.x;
        const dy = target.y - player.y;

        for (let i = 0; i < this.count; i++) {
            const angle = Math.atan2(dy, dx) + (i - (this.count - 1) / 2) * 0.3;
            state.projectiles.push(new Projectile(
                player.x, player.y,
                Math.cos(angle) * 8,
                Math.sin(angle) * 8,
                this.damage, '#4ecdc4', 10, this.range, false, 'sword'
            ));
        }
    }

    fireFire(player) {
        const target = findNearestEnemy(player.x, player.y);
        if (!target) return;

        const dx = target.x - player.x;
        const dy = target.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        state.projectiles.push(new Projectile(
            player.x, player.y,
            (dx / dist) * 6,
            (dy / dist) * 6,
            this.damage, '#ff6b6b', 15, this.range, true, 'fire'
        ));
    }

    fireLightning(player) {
        const target = findNearestEnemy(player.x, player.y);
        if (!target) return;

        const killed = target.takeDamage(this.damage);
        if (killed) {
            const index = state.enemies.indexOf(target);
            if (index > -1) state.enemies.splice(index, 1);
        }
        spawnLightningEffect(player.x, player.y, target.x, target.y);

        // 链式闪电
        let lastX = target.x, lastY = target.y;
        let hitEnemies = [target];
        for (let i = 0; i < this.chain; i++) {
            const next = findNearestEnemy(lastX, lastY, hitEnemies);
            if (!next) break;
            const nextKilled = next.takeDamage(this.damage * 0.7);
            if (nextKilled) {
                const nextIndex = state.enemies.indexOf(next);
                if (nextIndex > -1) state.enemies.splice(nextIndex, 1);
            }
            spawnLightningEffect(lastX, lastY, next.x, next.y);
            hitEnemies.push(next);
            lastX = next.x;
            lastY = next.y;
        }
    }

    checkOrbitHit(player) {
        for (let i = 0; i < this.count; i++) {
            const angle = this.angle + (Math.PI * 2 / this.count) * i;
            const x = player.x + Math.cos(angle) * this.range;
            const y = player.y + Math.sin(angle) * this.range;

            for (let j = state.enemies.length - 1; j >= 0; j--) {
                const enemy = state.enemies[j];
                const dx = enemy.x - x;
                const dy = enemy.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < 20) {
                    if (this.timer % 10 === 0) {
                        const killed = enemy.takeDamage(this.damage);
                        if (killed) {
                            state.enemies.splice(j, 1);
                        }
                    }
                }
            }
        }
    }

    fireAura(player) {
        for (let i = state.enemies.length - 1; i >= 0; i--) {
            const enemy = state.enemies[i];
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            if (Math.sqrt(dx * dx + dy * dy) < this.range) {
                const killed = enemy.takeDamage(this.damage);
                if (killed) {
                    state.enemies.splice(i, 1);
                }
            }
        }
        spawnAuraEffect(player.x, player.y, this.range);
    }

    fireWind(player) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * this.range;
        const x = player.x + Math.cos(angle) * dist;
        const y = player.y + Math.sin(angle) * dist;

        let windVx = 0, windVy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) windVy = -1;
        if (keys['KeyS'] || keys['ArrowDown']) windVy = 1;
        if (keys['KeyA'] || keys['ArrowLeft']) windVx = -1;
        if (keys['KeyD'] || keys['ArrowRight']) windVx = 1;

        if (windVx === 0 && windVy === 0) {
            windVx = (Math.random() - 0.5) * 2;
            windVy = (Math.random() - 0.5) * 2;
        }

        const len = Math.sqrt(windVx * windVx + windVy * windVy);
        if (len > 0) {
            windVx /= len;
            windVy /= len;
        }

        for (let i = 0; i < 3; i++) {
            spawnParticle(x, y, '#87ceeb', 'wind');
            // 覆盖最后生成的粒子的速度以匹配风向
            const lastP = state.particles[state.particles.length - 1];
            if (lastP) {
                lastP.vx = windVx * (3 + Math.random() * 4) + (Math.random() - 0.5) * 2;
                lastP.vy = windVy * (3 + Math.random() * 4) + (Math.random() - 0.5) * 2;
            }
        }
    }

    checkWindHit(player) {
        for (let i = state.enemies.length - 1; i >= 0; i--) {
            const enemy = state.enemies[i];
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < this.range) {
                const killed = enemy.takeDamage(this.damage);
                if (killed) {
                    state.enemies.splice(i, 1);
                }
                if (dist > 0) {
                    const pushForce = 3;
                    enemy.x += (dx / dist) * pushForce;
                    enemy.y += (dy / dist) * pushForce;
                }
            }
        }
    }

    draw(player) {
        const ctx = game.ctx;

        switch (this.type) {
            case 'orbit':
                for (let i = 0; i < this.count; i++) {
                    const angle = this.angle + (Math.PI * 2 / this.count) * i;
                    const x = player.x + Math.cos(angle) * this.range;
                    const y = player.y + Math.sin(angle) * this.range;
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                break;
            case 'shield':
                if (this.active) {
                    ctx.strokeStyle = 'rgba(78, 205, 196, 0.5)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.size + 15, 0, Math.PI * 2);
                    ctx.stroke();
                }
                break;
            case 'wind': {
                const windAlpha = 0.2 + Math.sin(Date.now() / 200) * 0.1;
                ctx.strokeStyle = `rgba(135, 206, 235, ${windAlpha})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(player.x, player.y, this.range, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                let windDirX = 0, windDirY = 0;
                if (keys['KeyW'] || keys['ArrowUp']) windDirY = -1;
                if (keys['KeyS'] || keys['ArrowDown']) windDirY = 1;
                if (keys['KeyA'] || keys['ArrowLeft']) windDirX = -1;
                if (keys['KeyD'] || keys['ArrowRight']) windDirX = 1;

                if (windDirX !== 0 || windDirY !== 0) {
                    const len = Math.sqrt(windDirX * windDirX + windDirY * windDirY);
                    windDirX /= len;
                    windDirY /= len;

                    ctx.strokeStyle = 'rgba(135, 206, 235, 0.4)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(
                        player.x + windDirX * this.range * 0.8,
                        player.y + windDirY * this.range * 0.8
                    );
                    ctx.stroke();
                }
                break;
            }
        }
    }

    levelUp() {
        this.level++;
        switch (this.type) {
            case 'sword':
                this.damage += 8;
                this.count = Math.min(5, 1 + Math.floor(this.level / 2));
                this.cooldown = Math.max(20, this.cooldown - 3);
                break;
            case 'fire':
                this.damage += 15;
                this.cooldown = Math.max(25, this.cooldown - 5);
                break;
            case 'lightning':
                this.damage += 20;
                this.chain = Math.min(5, 2 + Math.floor(this.level / 2));
                break;
            case 'orbit':
                this.count = Math.min(6, 2 + Math.floor(this.level / 2));
                this.damage += 5;
                break;
            case 'aura':
                this.damage += 5;
                this.range += 15;
                break;
            case 'shield':
                this.duration += 40;
                this.cooldown = Math.max(60, this.cooldown - 15);
                break;
            case 'wind':
                this.damage += 3;
                this.range += 10;
                break;
        }
    }
}
