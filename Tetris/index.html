<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .game-wrap{display:flex;gap:20px;align-items:flex-start}
        #board{border:2px solid #333;border-radius:4px;box-shadow:0 0 30px rgba(156,39,176,0.3);background:#111}
        .side-panel{display:flex;flex-direction:column;gap:12px;width:140px}
        .panel-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;text-align:center}
        .panel-label{font-size:11px;color:#888;margin-bottom:6px}
        .panel-val{font-size:20px;font-weight:bold;color:#ce93d8}
        #nextCanvas,#holdCanvas{display:block;margin:0 auto}
        .controls-info{font-size:11px;color:#555;line-height:1.6}
        .restart-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#888;cursor:pointer;transition:all 0.2s}
        .restart-btn:hover{background:rgba(156,39,176,0.3);color:#ce93d8;border-color:#9c27b0}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;color:#ce93d8;text-shadow:0 0 20px rgba(156,39,176,0.5);margin-bottom:15px}
        .menu-btn{background:linear-gradient(135deg,#9c27b0 0%,#7b1fa2 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(156,39,176,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ce93d8;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="game-wrap">
        <canvas id="board"></canvas>
        <div class="side-panel">
            <div class="panel-box"><div class="panel-label">分数</div><div class="panel-val" id="score">0</div></div>
            <div class="panel-box"><div class="panel-label">等级</div><div class="panel-val" id="level">1</div></div>
            <div class="panel-box"><div class="panel-label">消行</div><div class="panel-val" id="lines">0</div></div>
            <div class="panel-box"><div class="panel-label">下一个</div><canvas id="nextCanvas" width="80" height="80"></canvas></div>
            <div class="panel-box"><div class="panel-label">暂存 (C)</div><canvas id="holdCanvas" width="80" height="80"></canvas></div>
            <div class="panel-box"><div class="panel-label">最高分</div><div class="panel-val" id="high">0</div></div>
            <div class="controls-info">← → 移动<br>↑ 旋转<br>↓ 软降<br>空格 硬降<br>C 暂存<br>P 暂停<br>R 重新开始</div>
            <div class="restart-btn" onclick="startGame()" title="重新开始 (R)">↺ 重新开始</div>
        </div>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title">俄罗斯方块</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>🎮 操作说明</h3>
            <div>← → 或 A/D：左右移动</div>
            <div>↑ 或 W：旋转方块</div>
            <div>↓ 或 S：软降（加速下落）</div>
            <div>空格：硬降（直接落底）</div>
            <div>C：暂存当前方块</div>
            <div>P：暂停/继续</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">🎯 游戏规则</h3>
            <div>填满一行消除得分 | 同时消多行有额外奖励</div>
            <div>每消10行升一级 | 等级越高速度越快</div>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script type="module" src="js/main.js"></script>
<script>
if(location.protocol==="file:"){document.body.innerHTML='<div style="position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;font-family:sans-serif;color:#fff;z-index:9999"><div style="font-size:48px;margin-bottom:20px">⚠️</div><h2 style="color:#ff6b4a;font-size:20px;margin-bottom:12px">需要启动HTTP服务器</h2><p style="color:#888;font-size:13px;line-height:1.8;max-width:400px">此游戏使用ES Modules，无法通过file://打开。<br>请在游戏目录运行:</p><div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 20px;margin:16px;font-family:monospace;color:#4aeaff;font-size:13px">python -m http.server 8000</div><p style="color:#666;font-size:12px">然后访问 http://localhost:8000</p><a href="../index.html" style="margin-top:16px;color:#ff6b4a;font-size:13px;text-decoration:none">← 返回游戏合集</a></div>'}
</script>
</body>
</html>
