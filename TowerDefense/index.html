  <script>
    // roundRect polyfill for older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        const [tl, tr, br, bl] = r;
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.arcTo(x + w, y, x + w, y + tr, tr);
        this.lineTo(x + w, y + h - br);
        this.arcTo(x + w, y + h, x + w - br, y + h, br);
        this.lineTo(x + bl, y + h);
        this.arcTo(x, y + h, x, y + h - bl, bl);
        this.lineTo(x, y + tl);
        this.arcTo(x, y, x + tl, y, tl);
        this.closePath();
      };
    }

// ==================== Web Audio API 音效系统 ====================

let audioCtx = null;
let masterGain = null;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function ensureResumed() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

// ---- 工具函数 ----
function playTone(freq, duration, type = 'square', volume = 0.3) {
  const ctx = ensureResumed();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function playNoise(duration, volume = 0.2) {
  const ctx = ensureResumed();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.value = volume;
  source.connect(gain);
  gain.connect(masterGain);
  source.start();
}

/** 建造音效：上升音阶 */
function playBuild() {
  const ctx = ensureResumed();
  const t = ctx.currentTime;
  [400, 600, 800].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.15, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.12);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t + i * 0.08);
    osc.stop(t + i * 0.08 + 0.15);
  });
}

// ==================== 地图系统 ====================


/** 地图网格：0=空地, 1=路径, 2=塔 */
const grid = [];

/** 路径像素坐标（敌人行走用） */
const pathPixels = [];

/** 当前选中的地图索引 */
let currentMapIndex = 0;
/** 当前使用的路径 */
let currentPath = ENEMY_PATH;

/** 获取当前地图索引 */
function getCurrentMapIndex() { return currentMapIndex; }

/** 切换地图 */
function selectMap(index) {
  currentMapIndex = index;
}

/** 初始化地图 */
function initMap(path) {
  const enemyPath = path || ENEMY_PATH;
  currentPath = enemyPath;
  grid.length = 0;
  for (let r = 0; r < GRID_ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_COLS; c++) {
      grid[r][c] = CELL_EMPTY;
    }
  }
  // 标记路径
  for (const [c, r] of enemyPath) {
    if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
      grid[r][c] = CELL_PATH;
    }
  }
  // 计算路径像素坐标（格子中心）
  pathPixels.length = 0;
  for (const [c, r] of enemyPath) {
    pathPixels.push({
      x: c * CELL_SIZE + CELL_SIZE / 2,
      y: r * CELL_SIZE + CELL_SIZE / 2
    });
  }
}

/** 检查某格是否可建塔 */
function canBuild(col, row) {
  if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return false;
  return grid[row][col] === CELL_EMPTY;
}

/** 放置塔 */
function placeTower(col, row) {
  grid[row][col] = CELL_TOWER;
}

/** 移除塔（出售时） */
function removeTower(col, row) {
  grid[row][col] = CELL_EMPTY;
}

function drawCanyonDecor(ctx, x, y, c, r, seed) {
  // 仙人掌
  if (seed === 0) {
    ctx.fillStyle = '#2d8a4e';
    ctx.fillRect(x + 22, y + 12, 6, 28);
    ctx.fillRect(x + 16, y + 18, 6, 4);
    ctx.fillRect(x + 16, y + 12, 4, 10);
    ctx.fillRect(x + 28, y + 22, 6, 4);
    ctx.fillRect(x + 28, y + 16, 4, 10);
    // 仙人掌花
    ctx.fillStyle = '#ff6b9d';
    ctx.beginPath();
    ctx.arc(x + 25, y + 10, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  // 岩石
  if (seed === 1) {
    ctx.fillStyle = '#8B7355';
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 42);
    ctx.lineTo(x + 18, y + 20);
    ctx.lineTo(x + 35, y + 18);
    ctx.lineTo(x + 45, y + 25);
    ctx.lineTo(x + 48, y + 42);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#9B8365';
    ctx.beginPath();
    ctx.moveTo(x + 15, y + 42);
    ctx.lineTo(x + 22, y + 25);
    ctx.lineTo(x + 32, y + 23);
    ctx.lineTo(x + 28, y + 42);
    ctx.closePath();
    ctx.fill();
  }
  // 沙丘凸起
  if (seed === 2) {
    ctx.fillStyle = '#b8884f';
    ctx.beginPath();
    ctx.ellipse(x + 28, y + 40, 18, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c99860';
    ctx.beginPath();
    ctx.ellipse(x + 28, y + 38, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // 裂缝纹理
  if (seed === 3) {
    ctx.strokeStyle = '#a07040';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 20);
    ctx.lineTo(x + 20, y + 28);
    ctx.lineTo(x + 35, y + 25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 20, y + 28);
    ctx.lineTo(x + 18, y + 40);
    ctx.stroke();
  }
}

function drawDungeonDecor(ctx, x, y, c, r, seed) {
  // 火把
  if (seed === 0) {
    // 火把柄
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x + 25, y + 15, 5, 25);
    // 火焰
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.moveTo(x + 22, y + 15);
    ctx.quadraticCurveTo(x + 27, y + 2, x + 32, y + 15);
    ctx.fill();
    ctx.fillStyle = '#FFCC00';
    ctx.beginPath();
    ctx.moveTo(x + 24, y + 15);
    ctx.quadraticCurveTo(x + 27, y + 6, x + 30, y + 15);
    ctx.fill();
    // 光晕
    ctx.fillStyle = 'rgba(255,150,0,0.08)';
    ctx.beginPath();
    ctx.arc(x + 28, y + 12, 20, 0, Math.PI * 2);
    ctx.fill();
  }
  // 石柱
  if (seed === 1) {
    ctx.fillStyle = '#555566';
    ctx.fillRect(x + 18, y + 5, 18, 46);
    ctx.fillStyle = '#666677';
    ctx.fillRect(x + 15, y + 3, 24, 6);
    ctx.fillRect(x + 15, y + 44, 24, 6);
    // 石柱纹理
    ctx.fillStyle = '#4a4a5a';
    ctx.fillRect(x + 22, y + 12, 2, 30);
  }
  // 地面裂缝
  if (seed === 2) {
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 30);
    ctx.lineTo(x + 20, y + 25);
    ctx.lineTo(x + 35, y + 32);
    ctx.lineTo(x + 50, y + 28);
    ctx.stroke();
  }
  // 蜘蛛网
  if (seed === 3) {
    ctx.strokeStyle = 'rgba(200,200,200,0.2)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 15 + i * 10, y + 20 + i * 8);
      ctx.stroke();
    }
  }
}

function drawForestDecor(ctx, x, y, c, r, seed) {
  // 树木
  if (seed === 0) {
    // 树干
    ctx.fillStyle = '#4a3520';
    ctx.fillRect(x + 23, y + 22, 8, 25);
    // 树冠
    ctx.fillStyle = '#1a5c10';
    ctx.beginPath();
    ctx.arc(x + 27, y + 18, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#228B22';
    ctx.beginPath();
    ctx.arc(x + 27, y + 15, 11, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = '#2a9a2a';
    ctx.beginPath();
    ctx.arc(x + 23, y + 12, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  // 蘑菇
  if (seed === 1) {
    // 蘑菇柄
    ctx.fillStyle = '#d4c4a0';
    ctx.fillRect(x + 24, y + 32, 6, 12);
    // 蘑菇帽
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.ellipse(x + 27, y + 32, 10, 7, 0, Math.PI, 0);
    ctx.fill();
    // 白点
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + 23, y + 28, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 30, y + 30, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  // 灌木丛
  if (seed === 2) {
    ctx.fillStyle = '#1a6010';
    ctx.beginPath();
    ctx.arc(x + 15, y + 38, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 30, y + 35, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#228018';
    ctx.beginPath();
    ctx.arc(x + 22, y + 33, 9, 0, Math.PI * 2);
    ctx.fill();
  }
  // 草丛和花朵
  if (seed === 3) {
    ctx.fillStyle = '#2a7a20';
    for (let i = 0; i < 5; i++) {
      const gx = x + 8 + i * 9;
      const gy = y + 35 + (i % 3) * 4;
      ctx.fillRect(gx, gy, 2, 8);
      ctx.fillRect(gx + 3, gy + 2, 2, 6);
    }
    // 小花
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(x + 20, y + 30, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff5577';
    ctx.beginPath();
    ctx.arc(x + 38, y + 34, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

/** 绘制地图 */
function drawMap(ctx, path) {
  const enemyPath = currentPath;
  const theme = MAP_THEMES[currentMapIndex] || MAP_THEMES[0];

  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      const x = c * CELL_SIZE;
      const y = r * CELL_SIZE;
      const seed = (r * 31 + c * 17) % 8;

      if (grid[r][c] === CELL_PATH) {
        // 路径
        ctx.fillStyle = theme.pathColor;
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        // 路径纹理
        ctx.fillStyle = theme.pathTexture;
        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, 2);
        ctx.fillRect(x + CELL_SIZE / 3, y + CELL_SIZE / 2, CELL_SIZE / 3, 2);
      } else {
        // 空地
        ctx.fillStyle = theme.groundColor;
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        // 地面纹理
        ctx.fillStyle = theme.groundTexture;
        ctx.fillRect(x, y, CELL_SIZE, 1);
        ctx.fillRect(x, y, 1, CELL_SIZE);
        // 地面装饰纹理
        if (seed < 2) {
          ctx.fillStyle = theme.groundAccent;
          ctx.fillRect(x + 10 + seed * 12, y + 15 + seed * 10, 4, 2);
          ctx.fillRect(x + 30 + seed * 6, y + 35 + seed * 5, 3, 2);
        }
        // 地图特有装饰物
        if (seed < 4) {
          theme.decorations(ctx, x, y, c, r, seed);
        }
      }

      // 网格线
      ctx.strokeStyle = theme.gridColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
    }
  }

  // 绘制路径方向箭头（每隔几格）
  ctx.fillStyle = theme.arrowColor;
  for (let i = 0; i < enemyPath.length - 1; i += 3) {
    const [c1, r1] = enemyPath[i];
    const [c2, r2] = enemyPath[Math.min(i + 1, enemyPath.length - 1)];
    const cx = c1 * CELL_SIZE + CELL_SIZE / 2;
    const cy = r1 * CELL_SIZE + CELL_SIZE / 2;
    const dx = c2 - c1;
    const dy = r2 - r1;
    const angle = Math.atan2(dy, dx);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-5, -6);
    ctx.lineTo(-5, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 入口和出口标记
  const [ec, er] = enemyPath[0];
  const [xc, xr] = enemyPath[enemyPath.length - 1];

  // 入口
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('入口', ec * CELL_SIZE + CELL_SIZE / 2, er * CELL_SIZE - 8);

  // 出口
  ctx.fillStyle = '#2ecc71';
  ctx.fillText('出口', xc * CELL_SIZE + CELL_SIZE / 2, xr * CELL_SIZE + CELL_SIZE + 12);
}

/** 像素坐标转网格坐标 */
function pixelToGrid(px, py) {
  return {
    col: Math.floor(px / CELL_SIZE),
    row: Math.floor(py / CELL_SIZE)
  };
}

/** 网格坐标转像素中心坐标 */
function gridToPixel(col, row) {
  return {
    x: col * CELL_SIZE + CELL_SIZE / 2,
    y: row * CELL_SIZE + CELL_SIZE / 2
  };
}

// ==================== 塔系统 ====================


class Tower {
  constructor(type, col, row) {
    this.type = type;
    this.col = col;
    this.row = row;
    this.level = 0; // 0-indexed
    this.fireCooldown = 0;
    this.target = null;
    this.angle = 0;
    this.totalInvested = TOWER_TYPES[type].levels[0].cost;

    const pos = gridToPixel(col, row);
    this.x = pos.x;
    this.y = pos.y;
  }

  get stats() {
    return TOWER_TYPES[this.type].levels[this.level];
  }

  get typeName() {
    return TOWER_TYPES[this.type].name;
  }

  get icon() {
    return TOWER_TYPES[this.type].icon;
  }

  get maxLevel() {
    return TOWER_TYPES[this.type].levels.length - 1;
  }

  get upgradeCost() {
    if (this.level >= this.maxLevel) return 0;
    return TOWER_TYPES[this.type].levels[this.level + 1].cost;
  }

  get sellValue() {
    return Math.floor(this.totalInvested * SELL_REFUND_RATIO);
  }

  canUpgrade() {
    return this.level < this.maxLevel;
  }

  upgrade() {
    if (!this.canUpgrade()) return false;
    const cost = this.upgradeCost;
    this.totalInvested += cost;
    this.level++;
    return true;
  }

  update(dt, enemies) {
    this.fireCooldown -= dt;
    if (this.fireCooldown <= 0) {
      this.target = this.findTarget(enemies);
      if (this.target) {
        this.fireCooldown = this.stats.fireRate;
        // 更新朝向
        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        this.angle = Math.atan2(dy, dx);
        return this.fire();
      }
    }
    // 更新朝向
    if (this.target && this.target.alive) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      this.angle = Math.atan2(dy, dx);
    }
    return null;
  }

  findTarget(enemies) {
    const range = this.stats.range * CELL_SIZE;
    let closest = null;
    let minDist = Infinity;
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - this.x;
      const dy = e.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= range) {
        // 优先攻击路径进度最远的
        if (!closest || e.pathProgress > closest.pathProgress) {
          closest = e;
          minDist = dist;
        }
      }
    }
    return closest;
  }

  fire() {
    // 返回射击数据，由 main.js 创建投射物
    const s = this.stats;
    switch (this.type) {
      case 'arrow':
        playArrowShoot();
        break;
      case 'cannon':
        playCannonShoot();
        break;
      case 'ice':
        playIceShoot();
        break;
      case 'electric':
        playElectricShoot();
        break;
      case 'flame':
        playFlameShoot();
        break;
      case 'laser':
        playLaserShoot();
        break;
    }
    return {
      type: this.type,
      x: this.x,
      y: this.y,
      target: this.target,
      angle: this.angle,
      damage: s.damage,
      splashRadius: s.splashRadius || 0,
      slowFactor: s.slowFactor || 0,
      slowDuration: s.slowDuration || 0,
      chainCount: s.chainCount || 0,
      chainRange: (s.chainRange || 0) * CELL_SIZE,
      burnDamage: s.burnDamage || 0,
      burnDuration: s.burnDuration || 0,
      pierceCount: s.pierceCount || 0,
      speed: 400
    };
  }

  draw(ctx, isSelected) {
    const s = this.stats;
    const x = this.x;
    const y = this.y;
    const size = CELL_SIZE * s.size;
    const now = Date.now();

    ctx.save();
    ctx.translate(x, y);

    // 选中时显示范围
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(0, 0, s.range * CELL_SIZE, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 按类型绘制不同塔身
    switch (this.type) {
      case 'arrow': this._drawArrowTower(ctx, size, now); break;
      case 'cannon': this._drawCannonTower(ctx, size, now); break;
      case 'ice': this._drawIceTower(ctx, size, now); break;
      case 'electric': this._drawElectricTower(ctx, size, now); break;
      case 'flame': this._drawFlameTower(ctx, size, now); break;
      case 'laser': this._drawLaserTower(ctx, size, now); break;
      default:
        ctx.fillStyle = s.color;
        ctx.beginPath(); ctx.arc(0, 0, size / 2, 0, Math.PI * 2); ctx.fill();
    }

    // 等级星星
    const starSize = 3;
    for (let i = 0; i <= this.level; i++) {
      const sx = (i - this.level / 2) * (starSize * 2 + 2);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(sx, -size / 2 - 8, starSize, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // --- 箭塔：木质高塔+弓 ---
  _drawArrowTower(ctx, size, now) {
    // 石基
    ctx.fillStyle = '#6d4c41';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-size / 2, -size / 4, size, size * 0.6, 3);
    else ctx.rect(-size / 2, -size / 4, size, size * 0.6);
    ctx.fill();
    // 木质塔身
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(0, -2, size / 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 木纹
    ctx.strokeStyle = 'rgba(100,60,20,0.3)';
    ctx.lineWidth = 1;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(-size / 3, i * 4);
      ctx.lineTo(size / 3, i * 4);
      ctx.stroke();
    }
    // 弓臂
    ctx.rotate(this.angle);
    ctx.strokeStyle = '#A0522D';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 6, -0.6, 0.6);
    ctx.stroke();
    // 弓弦
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    const bowR = size / 2 + 6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(-0.6) * bowR, Math.sin(-0.6) * bowR);
    ctx.lineTo(Math.cos(0.6) * bowR, Math.sin(0.6) * bowR);
    ctx.stroke();
    // 箭
    ctx.fillStyle = '#ccc';
    ctx.beginPath();
    ctx.moveTo(size / 2 + 8, 0);
    ctx.lineTo(size / 2 + 2, -2);
    ctx.lineTo(size / 2 + 2, 2);
    ctx.closePath();
    ctx.fill();
  }

  // --- 炮塔：金属底座+粗炮管 ---
  _drawCannonTower(ctx, size, now) {
    // 金属底座
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size / 2);
    grad.addColorStop(0, '#777');
    grad.addColorStop(1, '#444');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 铆钉
    ctx.fillStyle = '#999';
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * size / 3, Math.sin(a) * size / 3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 炮塔旋转部分
    ctx.rotate(this.angle);
    // 炮管
    ctx.fillStyle = '#555';
    ctx.fillRect(0, -4, size / 2 + 10, 8);
    // 炮口
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    // 炮口焰
    if (this.fireCooldown > this.stats.fireRate - 0.1) {
      ctx.fillStyle = 'rgba(255,150,0,0.6)';
      ctx.beginPath();
      ctx.arc(size / 2 + 14, 0, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- 冰塔：水晶结构 ---
  _drawIceTower(ctx, size, now) {
    // 冰晶基座
    ctx.fillStyle = 'rgba(0,150,255,0.2)';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
    // 主水晶体（六边形）
    ctx.fillStyle = '#00BFFF';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i - Math.PI / 6;
      const r = size / 2.5;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // 内部折射
    ctx.fillStyle = 'rgba(200,240,255,0.4)';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i - Math.PI / 6;
      const r = size / 4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // 旋转冰晶碎片
    const rot = now * 0.002;
    ctx.fillStyle = 'rgba(0,191,255,0.5)';
    for (let i = 0; i < 3; i++) {
      const a = rot + (Math.PI * 2 / 3) * i;
      const r = size / 2 + 3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(a + 0.3) * (r - 4), Math.sin(a + 0.3) * (r - 4));
      ctx.lineTo(Math.cos(a - 0.3) * (r - 4), Math.sin(a - 0.3) * (r - 4));
      ctx.closePath();
      ctx.fill();
    }
    // 武器指向
    ctx.rotate(this.angle);
    ctx.strokeStyle = '#00CED1';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(size / 2 + 6, 0);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,191,255,0.6)';
    ctx.beginPath();
    ctx.arc(size / 2 + 6, 0, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- 电塔：特斯拉线圈 ---
  _drawElectricTower(ctx, size, now) {
    // 底座
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 线圈层
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const r = size / 3 + i * 3;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 顶部球体
    const pulse = Math.sin(now * 0.008) * 0.2 + 0.8;
    ctx.fillStyle = `rgba(255,215,0,${pulse})`;
    ctx.beginPath();
    ctx.arc(0, 0, size / 5, 0, Math.PI * 2);
    ctx.fill();
    // 电弧
    ctx.strokeStyle = `rgba(255,215,0,${0.4 + Math.sin(now * 0.01) * 0.3})`;
    ctx.lineWidth = 1;
    ctx.rotate(this.angle);
    for (let i = 0; i < 3; i++) {
      const a = (i - 1) * 0.3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const mid = size / 4;
      ctx.lineTo(mid, a * 8);
      ctx.lineTo(size / 2 + 4, a * 4);
      ctx.stroke();
    }
    // 顶部电光球
    ctx.fillStyle = `rgba(255,255,200,${pulse * 0.5})`;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- 火焰塔：火山口+火焰 ---
  _drawFlameTower(ctx, size, now) {
    // 火山基座
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(-size / 2, size / 4);
    ctx.lineTo(-size / 4, -size / 3);
    ctx.lineTo(size / 4, -size / 3);
    ctx.lineTo(size / 2, size / 4);
    ctx.closePath();
    ctx.fill();
    // 熔岩纹路
    ctx.strokeStyle = 'rgba(255,100,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-size / 6, 0);
    ctx.quadraticCurveTo(0, -size / 4, size / 6, 0);
    ctx.stroke();
    // 火焰核心
    const flicker = Math.sin(now * 0.012) * 2;
    ctx.fillStyle = '#FF4500';
    ctx.beginPath();
    ctx.arc(0, -size / 4 - 2 + flicker, size / 4, 0, Math.PI * 2);
    ctx.fill();
    // 内焰
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, -size / 4 - 1 + flicker, size / 6, 0, Math.PI * 2);
    ctx.fill();
    // 火焰粒子
    for (let i = 0; i < 3; i++) {
      const fy = -size / 3 - i * 4 + Math.sin(now * 0.01 + i) * 3;
      const fx = (Math.random() - 0.5) * size * 0.4;
      const alpha = 0.4 - i * 0.1;
      ctx.fillStyle = `rgba(255,${100 + i * 50},0,${alpha})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 喷射方向
    ctx.rotate(this.angle);
    ctx.fillStyle = '#FF6347';
    ctx.beginPath();
    ctx.moveTo(size / 2 + 6, 0);
    ctx.lineTo(size / 3, -5);
    ctx.lineTo(size / 3, 5);
    ctx.closePath();
    ctx.fill();
  }

  // --- 激光塔：科技天线碟 ---
  _drawLaserTower(ctx, size, now) {
    // 底座
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 科技纹路
    ctx.strokeStyle = 'rgba(255,0,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, size / 3, 0, Math.PI * 2);
    ctx.stroke();
    // 能量环
    const ringRot = now * 0.003;
    ctx.strokeStyle = `rgba(255,0,255,${0.3 + Math.sin(now * 0.005) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2.5, ringRot, ringRot + 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, size / 2.5, ringRot + Math.PI, ringRot + Math.PI + 1.5);
    ctx.stroke();
    // 天线碟
    ctx.rotate(this.angle);
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.ellipse(size / 4, 0, size / 4, size / 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // 发射管
    ctx.fillStyle = '#FF00FF';
    ctx.fillRect(0, -2, size / 2 + 10, 4);
    // 透镜发光
    const lensGlow = Math.sin(now * 0.008) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,0,255,${lensGlow})`;
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    // 能量光圈
    ctx.fillStyle = `rgba(255,0,255,${lensGlow * 0.2})`;
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ==================== 投射物系统 ====================


class Projectile {
  constructor(data) {
    this.type = data.type;
    this.x = data.x;
    this.y = data.y;
    this.target = data.target;
    this.angle = data.angle;
    this.damage = data.damage;
    this.speed = data.speed || 400;
    this.splashRadius = data.splashRadius || 0;
    this.slowFactor = data.slowFactor || 0;
    this.slowDuration = data.slowDuration || 0;
    this.chainCount = data.chainCount || 0;
    this.chainRange = data.chainRange || 0;
    this.burnDamage = data.burnDamage || 0;
    this.burnDuration = data.burnDuration || 0;
    this.pierceCount = data.pierceCount || 0;
    this.pierced = new Set();
    this.alive = true;
    this.trail = [];
  }

  update(dt, enemies) {
    if (!this.alive) return;

    // 保存轨迹
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();

    // 激光是瞬时的
    if (this.type === 'laser') {
      this.applyLaser(enemies);
      this.alive = false;
      return;
    }

    // 电塔也是瞬时连锁
    if (this.type === 'electric') {
      this.applyChain(enemies);
      this.alive = false;
      return;
    }

    // 追踪目标
    if (this.target && this.target.alive) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      this.angle = Math.atan2(dy, dx);

      if (dist < this.speed * dt) {
        this.hit(enemies);
        return;
      }
      this.x += (dx / dist) * this.speed * dt;
      this.y += (dy / dist) * this.speed * dt;
    } else {
      // 目标已死，直线飞行
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
    }

    // 超出屏幕
    if (this.x < -50 || this.x > CANVAS_WIDTH + 50 || this.y < -50 || this.y > CANVAS_HEIGHT + 100) {
      this.alive = false;
    }
  }

  hit(enemies) {
    if (this.splashRadius > 0) {
      // 范围伤害
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        if (Math.sqrt(dx * dx + dy * dy) <= this.splashRadius) {
          e.takeDamage(this.damage);
          this.applyEffects(e);
        }
      }
      playExplosion();
    } else {
      // 单体伤害
      if (this.target && this.target.alive) {
        this.target.takeDamage(this.damage);
        this.applyEffects(this.target);
      }
    }
    this.alive = false;
  }

  applyEffects(enemy) {
    if (this.slowFactor > 0) {
      enemy.applySlow(this.slowFactor, this.slowDuration);
    }
    if (this.burnDamage > 0) {
      enemy.applyBurn(this.burnDamage, this.burnDuration);
    }
  }

  applyLaser(enemies) {
    // 直线穿透
    const dirX = Math.cos(this.angle);
    const dirY = Math.sin(this.angle);
    const range = 600;
    const hitWidth = 15;

    // 按距离排序
    const candidates = enemies
      .filter(e => e.alive)
      .map(e => {
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        const along = dx * dirX + dy * dirY;
        const perp = Math.abs(dx * (-dirY) + dy * dirX);
        return { enemy: e, along, perp };
      })
      .filter(c => c.along > 0 && c.along < range && c.perp < hitWidth + CELL_SIZE * c.enemy.size / 2)
      .sort((a, b) => a.along - b.along);

    let pierced = 0;
    for (const c of candidates) {
      if (pierced >= this.pierceCount + 1) break;
      c.enemy.takeDamage(this.damage);
      this.applyEffects(c.enemy);
      pierced++;
    }
  }

  applyChain(enemies) {
    // 连锁闪电
    const hit = [this.target];
    if (this.target && this.target.alive) {
      this.target.takeDamage(this.damage);
      this.applyEffects(this.target);
    }

    let current = this.target;
    for (let i = 0; i < this.chainCount && current; i++) {
      let nearest = null;
      let minDist = this.chainRange;
      for (const e of enemies) {
        if (!e.alive || hit.includes(e)) continue;
        const dx = e.x - current.x;
        const dy = e.y - current.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) {
          minDist = dist;
          nearest = e;
        }
      }
      if (nearest) {
        nearest.takeDamage(this.damage * 0.7);
        this.applyEffects(nearest);
        hit.push(nearest);
        current = nearest;
      }
    }
    // 存储连锁路径用于绘制
    this.chainPath = hit.map(e => ({ x: e.x, y: e.y }));
    this.chainPath.unshift({ x: this.x, y: this.y });
  }

  draw(ctx) {
    if (!this.alive && this.type !== 'electric' && this.type !== 'laser') return;

    ctx.save();

    switch (this.type) {
      case 'arrow':
        this.drawArrow(ctx);
        break;
      case 'cannon':
        this.drawCannonBall(ctx);
        break;
      case 'ice':
        this.drawIce(ctx);
        break;
      case 'electric':
        this.drawLightning(ctx);
        break;
      case 'flame':
        this.drawFlame(ctx);
        break;
      case 'laser':
        this.drawLaserBeam(ctx);
        break;
    }

    ctx.restore();
  }

  drawArrow(ctx) {
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -3);
    ctx.lineTo(-4, 3);
    ctx.closePath();
    ctx.fill();
  }

  drawCannonBall(ctx) {
    // 轨迹
    ctx.strokeStyle = 'rgba(100,100,100,0.3)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      if (i === 0) ctx.moveTo(t.x, t.y);
      else ctx.lineTo(t.x, t.y);
    }
    ctx.stroke();

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  drawIce(ctx) {
    ctx.translate(this.x, this.y);
    ctx.fillStyle = 'rgba(0,191,255,0.7)';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    // 冰晶光芒
    ctx.strokeStyle = 'rgba(0,191,255,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI * 2 / 4) * i + Date.now() * 0.003;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * 8, Math.sin(a) * 8);
      ctx.stroke();
    }
  }

  drawLightning(ctx) {
    if (!this.chainPath || this.chainPath.length < 2) return;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(this.chainPath[0].x, this.chainPath[0].y);
    for (let i = 1; i < this.chainPath.length; i++) {
      const p = this.chainPath[i];
      // 锯齿形闪电
      const prev = this.chainPath[i - 1];
      const midX = (prev.x + p.x) / 2 + (Math.random() - 0.5) * 20;
      const midY = (prev.y + p.y) / 2 + (Math.random() - 0.5) * 20;
      ctx.quadraticCurveTo(midX, midY, p.x, p.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 每个节点闪光
    for (const p of this.chainPath) {
      ctx.fillStyle = 'rgba(255,215,0,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawFlame(ctx) {
    // 火焰粒子轨迹
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = i / this.trail.length * 0.5;
      const r = 2 + (i / this.trail.length) * 3;
      ctx.fillStyle = `rgba(255,${60 + i * 15},0,${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x + (Math.random() - 0.5) * 4, t.y + (Math.random() - 0.5) * 4, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#FF6347';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  drawLaserBeam(ctx) {
    if (!this.target) return;
    const tx = this.target.x;
    const ty = this.target.y;

    // 光束
    ctx.strokeStyle = 'rgba(255,0,255,0.6)';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#FF00FF';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,200,255,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// roundRect polyfill
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = typeof radii === 'number' ? radii : (Array.isArray(radii) ? radii[0] : 0);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

let enemyIdCounter = 0;

class Enemy {
  constructor(type, waveMultiplier = 1) {
    this.id = enemyIdCounter++;
    const def = ENEMY_TYPES[type];
    this.type = type;
    this.name = def.name;
    this.maxHp = Math.floor(def.hp * waveMultiplier);
    this.hp = this.maxHp;
    this.baseSpeed = def.speed;
    this.speed = def.speed;
    this.reward = def.reward;
    this.color = def.color;
    this.size = def.size;
    this.armor = def.armor;
    this.flying = def.flying || false;
    this.healAmount = def.healAmount || 0;
    this.healRange = (def.healRange || 0) * CELL_SIZE;
    this.healInterval = def.healInterval || 0;
    this.healCooldown = 0;

    // 新敌人类型属性
    this.stealth = def.stealth || false;
    this.stealthAlpha = this.stealth ? 0.15 : 1;
    this.summonType = def.summonType || null;
    this.summonInterval = def.summonInterval || 0;
    this.summonCooldown = def.summonInterval || 0;
    this.maxSummons = def.maxSummons || 0;
    this.summonCount = 0;
    this.shieldHp = def.shieldHp || 0;
    this.maxShieldHp = def.shieldHp || 0;
    this.shieldRegen = def.shieldRegen || 0;
    this.explosionDamage = def.explosionDamage || 0;
    this.explosionRadius = (def.explosionRadius || 0) * CELL_SIZE;
    this.exploded = false;

    this.alive = true;
    this.reachedEnd = false;

    // 路径跟随
    this.pathIndex = 0;
    this.pathProgress = 0;
    this.x = pathPixels[0].x;
    this.y = pathPixels[0].y;
    this.facingX = 1;
    this.facingY = 0;

    // 状态效果
    this.slowTimer = 0;
    this.slowFactor = 1;
    this.burnTimer = 0;
    this.burnDamage = 0;
    this.burnTickTimer = 0;

    // 可视化
    this.hitFlash = 0;
    this.deathTimer = 0;
    this.walkCycle = Math.random() * Math.PI * 2;
    this.spawnTime = Date.now();
    this.trail = [];
  }

  update(dt, enemies) {
    if (!this.alive) {
      this.deathTimer += dt;
      return;
    }

    // 状态效果：减速
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.speed = this.baseSpeed * this.slowFactor;
      if (this.slowTimer <= 0) {
        this.speed = this.baseSpeed;
      }
    }

    // 状态效果：灼烧DOT
    if (this.burnTimer > 0) {
      this.burnTimer -= dt;
      this.burnTickTimer -= dt;
      if (this.burnTickTimer <= 0) {
        this.takeDamage(this.burnDamage, true);
        this.burnTickTimer = 0.5;
      }
    }

    // 治疗能力
    if (this.healAmount > 0) {
      this.healCooldown -= dt;
      if (this.healCooldown <= 0) {
        this.healNearby(enemies);
        this.healCooldown = this.healInterval;
      }
    }

    // 隐身闪烁
    if (this.stealth) {
      this.stealthAlpha = 0.1 + Math.sin(Date.now() * 0.005) * 0.05;
    }

    // 盾卫护盾回复
    if (this.maxShieldHp > 0 && this.shieldHp < this.maxShieldHp) {
      this.shieldHp = Math.min(this.maxShieldHp, this.shieldHp + this.shieldRegen * dt);
    }

    // 召唤师召唤
    if (this.summonType && this.summonCount < this.maxSummons) {
      this.summonCooldown -= dt;
      if (this.summonCooldown <= 0) {
        this.summonCooldown = this.summonInterval;
        this.summonCount++;
        this._shouldSummon = true;
      }
    }

    // 沿路径移动
    if (this.pathIndex < pathPixels.length - 1) {
      const target = pathPixels[this.pathIndex + 1];
      const dx = target.x - this.x;
      const dy = target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const moveSpeed = this.speed * CELL_SIZE * dt;

      if (dist <= moveSpeed) {
        this.x = target.x;
        this.y = target.y;
        this.pathIndex++;
        this.pathProgress = this.pathIndex / (pathPixels.length - 1);
      } else {
        this.x += (dx / dist) * moveSpeed;
        this.y += (dy / dist) * moveSpeed;
        this.pathProgress = (this.pathIndex + (1 - dist / CELL_SIZE)) / (pathPixels.length - 1);
        // 更新朝向
        this.facingX = dx / dist;
        this.facingY = dy / dist;
      }

      // 走路动画
      this.walkCycle += dt * this.speed * 8;

      // 快速敌人拖尾
      if (this.speed >= 1.5) {
        this.trail.push({ x: this.x, y: this.y, alpha: 0.4, time: Date.now() });
        if (this.trail.length > 8) this.trail.shift();
      }
    }

    // 拖尾衰减
    for (const t of this.trail) {
      t.alpha -= dt * 2;
    }
    this.trail = this.trail.filter(t => t.alpha > 0);

    // 到达终点
    if (this.pathIndex >= pathPixels.length - 1) {
      this.reachedEnd = true;
      this.alive = false;
    }

    // 受击闪烁
    if (this.hitFlash > 0) this.hitFlash -= dt * 5;
  }

  takeDamage(amount, ignoreArmor = false) {
    // 隐身被攻击时短暂现身
    if (this.stealth) {
      this.stealthAlpha = 0.8;
      this._revealTimer = 1.5;
    }

    // 护盾先承受伤害
    let dmg = amount;
    if (this.shieldHp > 0) {
      if (dmg <= this.shieldHp) {
        this.shieldHp -= dmg;
        this.hitFlash = 1;
        return;
      } else {
        dmg -= this.shieldHp;
        this.shieldHp = 0;
      }
    }

    if (!ignoreArmor && this.armor > 0) {
      dmg = Math.max(1, dmg - this.armor);
    }
    this.hp -= dmg;
    this.hitFlash = 1;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
    }
  }

  applySlow(factor, duration) {
    if (factor < this.slowFactor || this.slowTimer <= 0) {
      this.slowFactor = factor;
    }
    this.slowTimer = Math.max(this.slowTimer, duration);
  }

  applyBurn(damage, duration) {
    this.burnDamage = damage;
    this.burnTimer = duration;
    this.burnTickTimer = 0.5;
  }

  healNearby(enemies) {
    let healed = false;
    for (const e of enemies) {
      if (e === this || !e.alive) continue;
      const dx = e.x - this.x;
      const dy = e.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= this.healRange) {
        e.hp = Math.min(e.maxHp, e.hp + this.healAmount);
        healed = true;
      }
    }
    if (healed) {
      this.hp = Math.min(this.maxHp, this.hp + this.healAmount);
    }
  }

  draw(ctx) {
    const s = this.size * CELL_SIZE;
    const now = Date.now();

    ctx.save();
    ctx.translate(this.x, this.y);

    // 死亡动画
    if (!this.alive && this.deathTimer < 0.4) {
      const t = this.deathTimer / 0.4;
      ctx.globalAlpha = 1 - t;
      const scale = 1 + t * 2;
      ctx.scale(scale, scale);
      // 死亡爆炸粒子
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + t * 3;
        const r = t * s;
        ctx.fillStyle = `rgba(255,150,50,${1 - t})`;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 3 * (1 - t), 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (!this.alive) {
      ctx.restore();
      return;
    }

    // 拖尾效果
    ctx.restore();
    for (const t of this.trail) {
      ctx.fillStyle = `rgba(243,156,18,${t.alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(t.x - this.x, t.y - this.y, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.save();
    ctx.translate(this.x, this.y);

    // 地面阴影
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(2, s / 2 + 4, s * 0.6, s * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    const flash = this.hitFlash > 0;
    const bob = Math.sin(this.walkCycle) * 2;

    // 隐身透明度
    if (this.stealth) {
      if (this._revealTimer > 0) {
        this._revealTimer -= 1 / 60;
        ctx.globalAlpha = 0.8;
      } else {
        ctx.globalAlpha = this.stealthAlpha;
      }
    }

    // 按类型绘制
    switch (this.type) {
      case 'normal': this._drawSoldier(ctx, s, flash, now, bob); break;
      case 'fast': this._drawRunner(ctx, s, flash, now, bob); break;
      case 'flying': this._drawFairy(ctx, s, flash, now); break;
      case 'armored': this._drawTank(ctx, s, flash, now, bob); break;
      case 'healer': this._drawPriest(ctx, s, flash, now, bob); break;
      case 'boss': this._drawDemon(ctx, s, flash, now); break;
      case 'assassin': this._drawAssassin(ctx, s, flash, now, bob); break;
      case 'summoner': this._drawSummoner(ctx, s, flash, now, bob); break;
      case 'shield': this._drawShieldGuard(ctx, s, flash, now, bob); break;
      case 'bomber': this._drawBomber(ctx, s, flash, now, bob); break;
      default:
        ctx.fillStyle = flash ? '#fff' : this.color;
        ctx.beginPath(); ctx.arc(0, 0, s / 2, 0, Math.PI * 2); ctx.fill();
    }

    ctx.globalAlpha = 1;

    // 减速视觉效果
    if (this.slowTimer > 0) {
      ctx.strokeStyle = 'rgba(0,191,255,0.6)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const a = (now * 0.003 + i * 1.57) % (Math.PI * 2);
        const r = s / 2 + 4;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2.5, 0, Math.PI * 2);
        ctx.stroke();
      }
      // 冰霜粒子
      for (let i = 0; i < 2; i++) {
        const fx = (Math.random() - 0.5) * s;
        const fy = -s / 2 + Math.random() * s;
        ctx.fillStyle = 'rgba(100,200,255,0.5)';
        ctx.fillRect(fx, fy, 2, 2);
      }
    }

    // 灼烧视觉效果
    if (this.burnTimer > 0) {
      for (let i = 0; i < 5; i++) {
        const fx = (Math.random() - 0.5) * s * 0.8;
        const fy = -s / 3 - Math.random() * s * 0.5;
        const r = Math.random();
        ctx.fillStyle = `rgba(255,${50 + r * 150},0,${0.5 + r * 0.3})`;
        ctx.beginPath();
        ctx.arc(fx, fy, 2 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();

    // 护盾条
    if (this.alive && this.maxShieldHp > 0 && this.shieldHp > 0) {
      const sBarW = s * 1.4;
      const sBarH = 3;
      const sBarX = this.x - sBarW / 2;
      const sBarY = this.y - s / 2 - 17;
      const shieldRatio = this.shieldHp / this.maxShieldHp;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(sBarX - 1, sBarY - 1, sBarW + 2, sBarH + 2);
      ctx.fillStyle = '#3498db';
      ctx.fillRect(sBarX, sBarY, sBarW * shieldRatio, sBarH);
    }

    // 血条
    if (this.alive && this.hp < this.maxHp) {
      const barW = s * 1.4;
      const barH = 5;
      const barX = this.x - barW / 2;
      const barY = this.y - s / 2 - 12;
      const hpRatio = this.hp / this.maxHp;

      // 血条背景
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath();
      ctx.roundRect(barX - 1, barY - 1, barW + 2, barH + 2, 2);
      ctx.fill();

      // 血条颜色
      const barColor = hpRatio > 0.6 ? '#2ecc71' : hpRatio > 0.3 ? '#f39c12' : '#e74c3c';
      ctx.fillStyle = barColor;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * hpRatio, barH, 1);
      ctx.fill();

      // 血条高光
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(barX, barY, barW * hpRatio, barH / 2);
    }

    // 名称标签（Boss和精英）
    if (this.alive && (this.type === 'boss' || this.type === 'healer')) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      const tw = ctx.measureText(this.name).width;
      ctx.beginPath();
      ctx.roundRect(this.x - tw / 2 - 3, this.y - s / 2 - 26, tw + 6, 14, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(this.name, this.x, this.y - s / 2 - 15);
    }
  }

  // --- 步兵：全身人形 + 盾牌 + 头盔 + 走路动画 ---
  _drawSoldier(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const legSwing = Math.sin(this.walkCycle) * 4;

    // 腿
    ctx.fillStyle = flash ? '#ddd' : '#8B0000';
    ctx.fillRect(-4, s / 4 + bob, 3, 6 + legSwing);
    ctx.fillRect(2, s / 4 + bob, 3, 6 - legSwing);

    // 身体（躯干）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.roundRect(-s / 3, -s / 6 + bob, s * 0.65, s * 0.55, 3);
    ctx.fill();

    // 腰带
    ctx.fillStyle = flash ? '#ccc' : '#5D4037';
    ctx.fillRect(-s / 3, s / 6 + bob, s * 0.65, 3);

    // 盾牌（左手）
    ctx.fillStyle = flash ? '#ddd' : '#78909C';
    ctx.beginPath();
    ctx.ellipse(-s / 2 - 3, 2 + bob, 5, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // 盾牌纹章
    ctx.fillStyle = flash ? '#eee' : '#B0BEC5';
    ctx.beginPath();
    ctx.ellipse(-s / 2 - 3, 2 + bob, 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // 头
    ctx.fillStyle = flash ? '#eee' : '#FFCCBC';
    ctx.beginPath();
    ctx.arc(0, -s / 3 + bob, s / 4, 0, Math.PI * 2);
    ctx.fill();

    // 头盔
    ctx.fillStyle = flash ? '#ddd' : '#B71C1C';
    ctx.beginPath();
    ctx.arc(0, -s / 3 - 2 + bob, s / 3.5, Math.PI, 0);
    ctx.fill();
    // 头盔檐
    ctx.fillStyle = flash ? '#ccc' : '#880E0E';
    ctx.fillRect(-s / 3, -s / 3 - 1 + bob, s * 0.65, 3);

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3, -s / 3 + bob, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -s / 3 + bob, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-2.5, -s / 3 + bob, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3.5, -s / 3 + bob, 1.2, 0, Math.PI * 2); ctx.fill();

    // 武器（右手长矛）
    ctx.strokeStyle = flash ? '#ccc' : '#5D4037';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s / 3, -s / 4 + bob);
    ctx.lineTo(s / 2 + 6, -s / 2 - 4 + bob);
    ctx.stroke();
    // 矛头
    ctx.fillStyle = flash ? '#eee' : '#CFD8DC';
    ctx.beginPath();
    ctx.moveTo(s / 2 + 6, -s / 2 - 4 + bob);
    ctx.lineTo(s / 2 + 3, -s / 2 - 8 + bob);
    ctx.lineTo(s / 2 + 9, -s / 2 - 8 + bob);
    ctx.closePath();
    ctx.fill();
  }

  // --- 刺客：流线型 + 匕首 + 残影 ---
  _drawRunner(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const lean = 0.2; // 前倾

    ctx.save();
    ctx.rotate(lean);

    // 腿（奔跑动画）
    const legSwing = Math.sin(this.walkCycle) * 6;
    ctx.fillStyle = flash ? '#ddd' : '#222';
    ctx.fillRect(-3, s / 4 + bob, 2, 5 + legSwing);
    ctx.fillRect(2, s / 4 + bob, 2, 5 - legSwing);

    // 身体（紧身衣）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(0, bob, s / 3, s / 2.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // 斗篷
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(230,126,34,0.4)';
    ctx.beginPath();
    ctx.moveTo(-s / 3, -s / 4 + bob);
    ctx.quadraticCurveTo(-s / 2 - 4, 0 + bob, -s / 3, s / 3 + bob);
    ctx.lineTo(-s / 5, 0 + bob);
    ctx.closePath();
    ctx.fill();

    // 头（兜帽）
    ctx.fillStyle = flash ? '#eee' : '#333';
    ctx.beginPath();
    ctx.arc(0, -s / 3 + bob, s / 4, 0, Math.PI * 2);
    ctx.fill();
    // 兜帽尖角
    ctx.fillStyle = flash ? '#ddd' : '#222';
    ctx.beginPath();
    ctx.moveTo(0, -s / 2 + bob);
    ctx.lineTo(-3, -s / 3 - 2 + bob);
    ctx.lineTo(3, -s / 3 - 2 + bob);
    ctx.closePath();
    ctx.fill();

    // 发光眼睛
    ctx.fillStyle = flash ? '#fff' : '#FF5722';
    ctx.beginPath(); ctx.arc(-2, -s / 3 + bob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -s / 3 + bob, 2, 0, Math.PI * 2); ctx.fill();
    // 眼睛发光
    ctx.shadowColor = '#FF5722';
    ctx.shadowBlur = 4;
    ctx.fillStyle = '#FF5722';
    ctx.beginPath(); ctx.arc(-2, -s / 3 + bob, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -s / 3 + bob, 1, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 匕首
    ctx.fillStyle = flash ? '#eee' : '#CFD8DC';
    ctx.beginPath();
    ctx.moveTo(s / 3, -s / 6 + bob);
    ctx.lineTo(s / 2 + 5, -s / 3 + bob);
    ctx.lineTo(s / 3 + 1, 0 + bob);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  // --- 飞龙：翅膀扇动 + 龙形 + 火焰尾迹 ---
  _drawFairy(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    const wingFlap = Math.sin(now * 0.01) * 12;
    const hover = Math.sin(now * 0.004) * 3;

    ctx.save();
    ctx.translate(0, hover);

    // 翅膀（龙翼）
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.4)' : 'rgba(155,89,182,0.6)';
    // 左翼
    ctx.beginPath();
    ctx.moveTo(-s / 4, -2);
    ctx.quadraticCurveTo(-s / 2 - 8, -s / 2 - 6 + wingFlap, -s / 2 - 2, -s / 4 + wingFlap);
    ctx.quadraticCurveTo(-s / 2 - 6, s / 6 + wingFlap * 0.5, -s / 4, s / 4);
    ctx.closePath();
    ctx.fill();
    // 右翼
    ctx.beginPath();
    ctx.moveTo(s / 4, -2);
    ctx.quadraticCurveTo(s / 2 + 8, -s / 2 - 6 - wingFlap, s / 2 + 2, -s / 4 - wingFlap);
    ctx.quadraticCurveTo(s / 2 + 6, s / 6 - wingFlap * 0.5, s / 4, s / 4);
    ctx.closePath();
    ctx.fill();

    // 翅膀骨架
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(155,89,182,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-s / 4, 0);
    ctx.lineTo(-s / 2 - 4, -s / 3 + wingFlap * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s / 4, 0);
    ctx.lineTo(s / 2 + 4, -s / 3 - wingFlap * 0.7);
    ctx.stroke();

    // 身体（龙身）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(0, 0, s / 3, s / 2.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鳞片纹理
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(120,60,150,0.3)';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(-2 + i * 3, -4 + i * 4, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 头
    ctx.fillStyle = flash ? '#eee' : '#7B1FA2';
    ctx.beginPath();
    ctx.ellipse(0, -s / 3, s / 4, s / 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 龙角
    ctx.fillStyle = flash ? '#ccc' : '#4A148C';
    ctx.beginPath();
    ctx.moveTo(-3, -s / 2.5);
    ctx.lineTo(-6, -s / 2 - 6);
    ctx.lineTo(0, -s / 2.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, -s / 2.5);
    ctx.lineTo(6, -s / 2 - 6);
    ctx.lineTo(0, -s / 2.5);
    ctx.closePath();
    ctx.fill();

    // 眼睛（龙眼）
    ctx.fillStyle = flash ? '#fff' : '#FFD700';
    ctx.beginPath(); ctx.arc(-3, -s / 3, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -s / 3, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    // 竖瞳
    ctx.fillRect(-3.5, -s / 3 - 2, 1.5, 4);
    ctx.fillRect(2.5, -s / 3 - 2, 1.5, 4);

    // 魔法光环
    ctx.strokeStyle = `rgba(155,89,182,${0.3 + Math.sin(now * 0.005) * 0.2})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2 + 6, 0, Math.PI * 2);
    ctx.stroke();

    // 飞行魔法粒子
    for (let i = 0; i < 4; i++) {
      const a = now * 0.004 + i * 1.57;
      const r = s / 2 + 4 + Math.sin(now * 0.006 + i) * 3;
      ctx.fillStyle = `rgba(155,89,182,${0.3 + Math.sin(now * 0.005 + i) * 0.2})`;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // --- 重甲：全覆式装甲 + 履带 + 炮管 + 铆钉 ---
  _drawTank(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const treadOffset = (now * 0.02) % 6;

    // 履带（两侧）
    ctx.fillStyle = flash ? '#999' : '#37474F';
    // 左履带
    ctx.beginPath();
    ctx.roundRect(-s / 2 - 3, -s / 2.5, s * 0.25, s * 0.85, 3);
    ctx.fill();
    // 右履带
    ctx.beginPath();
    ctx.roundRect(s / 2 - s * 0.25 + 3, -s / 2.5, s * 0.25, s * 0.85, 3);
    ctx.fill();

    // 履带纹理
    ctx.strokeStyle = flash ? '#777' : '#263238';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const ty = -s / 2.5 + 3 + i * (s * 0.85 / 5) + treadOffset % (s * 0.85 / 5);
      if (ty > -s / 2.5 && ty < s / 3) {
        ctx.beginPath(); ctx.moveTo(-s / 2 - 1, ty); ctx.lineTo(-s / 2 + 6, ty); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s / 2 - 1, ty); ctx.lineTo(s / 2 - 6, ty); ctx.stroke();
      }
    }

    // 车身（主体装甲）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.roundRect(-s / 3, -s / 3, s * 0.65, s * 0.7, 4);
    ctx.fill();

    // 装甲高光
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(-s / 3, -s / 3, s * 0.65, s * 0.35, 4);
    ctx.fill();

    // 炮塔
    ctx.fillStyle = flash ? '#ccc' : '#546E7A';
    ctx.beginPath();
    ctx.arc(0, 0, s / 3.5, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.strokeStyle = flash ? '#aaa' : '#37474F';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s / 4, 0);
    ctx.lineTo(s / 2 + 8, 0);
    ctx.stroke();

    // 炮口
    ctx.fillStyle = flash ? '#ddd' : '#263238';
    ctx.beginPath();
    ctx.arc(s / 2 + 8, 0, 3, 0, Math.PI * 2);
    ctx.fill();

    // 铆钉
    ctx.fillStyle = flash ? '#bbb' : '#78909C';
    const rivets = [[-s/4, -s/5], [-s/4, s/5], [s/6, -s/5], [s/6, s/5], [0, -s/4], [0, s/4]];
    for (const [rx, ry] of rivets) {
      ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI * 2); ctx.fill();
    }

    // 前灯
    ctx.fillStyle = flash ? '#fff' : '#FFEB3B';
    ctx.shadowColor = '#FFEB3B';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(s / 3, -s / 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s / 3, s / 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // --- 萨满：法袍 + 法杖 + 治愈光环 + 漂浮 ---
  _drawPriest(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const hover = Math.sin(now * 0.003) * 2;
    const pulse = Math.sin(now * 0.005) * 4;

    ctx.save();
    ctx.translate(0, hover);

    // 治愈光环（双层）
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.4)' : 'rgba(46,204,113,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, this.healRange / CELL_SIZE * s + pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.15)' : 'rgba(46,204,113,0.12)';
    ctx.beginPath();
    ctx.arc(0, 0, this.healRange / CELL_SIZE * s + pulse + 6, 0, Math.PI * 2);
    ctx.stroke();

    // 法袍（梯形）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(-s / 2.5, s / 3);
    ctx.lineTo(-s / 4, -s / 4);
    ctx.quadraticCurveTo(0, -s / 3, s / 4, -s / 4);
    ctx.lineTo(s / 2.5, s / 3);
    ctx.closePath();
    ctx.fill();

    // 法袍纹饰
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(39,174,96,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-s / 5, 0);
    ctx.lineTo(0, s / 4);
    ctx.lineTo(s / 5, 0);
    ctx.stroke();

    // 头
    ctx.fillStyle = flash ? '#eee' : '#27ae60';
    ctx.beginPath(); ctx.arc(0, -s / 3 - 2, s / 4.5, 0, Math.PI * 2); ctx.fill();

    // 兜帽
    ctx.fillStyle = flash ? '#ddd' : '#1B5E20';
    ctx.beginPath();
    ctx.arc(0, -s / 3 - 4, s / 4, Math.PI + 0.3, -0.3);
    ctx.closePath();
    ctx.fill();

    // 法杖
    ctx.strokeStyle = flash ? '#ccc' : '#5D4037';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s / 3, -s / 4);
    ctx.lineTo(s / 3 + 2, s / 3 + 4);
    ctx.stroke();

    // 法杖宝石（发光）
    const gemGlow = 0.5 + Math.sin(now * 0.006) * 0.3;
    ctx.fillStyle = flash ? '#fff' : `rgba(46,204,113,${gemGlow})`;
    ctx.shadowColor = '#2ecc71';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(s / 3, -s / 4 - 4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 十字标记
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.6)' : 'rgba(46,204,113,0.7)';
    ctx.fillRect(-1, -s / 3 - 8, 2, 7);
    ctx.fillRect(-3, -s / 3 - 5, 6, 2);

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-2, -s / 3 - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -s / 3 - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-1.5, -s / 3 - 2, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2.5, -s / 3 - 2, 1, 0, Math.PI * 2); ctx.fill();

    // 治愈光点
    for (let i = 0; i < 3; i++) {
      const a = now * 0.003 + i * 2.1;
      const r = this.healRange / CELL_SIZE * s * 0.7;
      ctx.fillStyle = `rgba(46,204,113,${0.2 + Math.sin(now * 0.004 + i) * 0.15})`;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // --- 魔王：双角 + 恶魔翅膀 + 装甲 + 核心 + 威压 ---
  _drawDemon(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    const auraPulse = Math.sin(now * 0.003) * 8;
    const breathe = Math.sin(now * 0.004) * 2;

    // 威压光环（多层）
    for (let i = 3; i > 0; i--) {
      ctx.fillStyle = `rgba(192,57,43,${0.06 * i})`;
      ctx.beginPath();
      ctx.arc(0, 0, s / 2 + 12 + auraPulse + i * 6, 0, Math.PI * 2);
      ctx.fill();
    }

    // 地面裂纹效果
    ctx.strokeStyle = `rgba(255,50,0,${0.15 + Math.sin(now * 0.005) * 0.1})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const r1 = s / 2 + 5;
      const r2 = s / 2 + 15 + Math.sin(now * 0.003 + i) * 3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
      ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
      ctx.stroke();
    }

    // 恶魔翅膀
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(100,0,0,0.7)';
    // 左翼
    ctx.beginPath();
    ctx.moveTo(-s / 4, -s / 6);
    ctx.quadraticCurveTo(-s / 2 - 10, -s / 2 - 8, -s / 2 - 6, -s / 4);
    ctx.quadraticCurveTo(-s / 2 - 14, 0, -s / 2 - 4, s / 3);
    ctx.lineTo(-s / 4, s / 6);
    ctx.closePath();
    ctx.fill();
    // 右翼
    ctx.beginPath();
    ctx.moveTo(s / 4, -s / 6);
    ctx.quadraticCurveTo(s / 2 + 10, -s / 2 - 8, s / 2 + 6, -s / 4);
    ctx.quadraticCurveTo(s / 2 + 14, 0, s / 2 + 4, s / 3);
    ctx.lineTo(s / 4, s / 6);
    ctx.closePath();
    ctx.fill();

    // 翅膀骨骼
    ctx.strokeStyle = flash ? '#ddd' : '#880E0E';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-s / 4, -s / 6);
    ctx.lineTo(-s / 2 - 8, -s / 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s / 4, -s / 6);
    ctx.lineTo(s / 2 + 8, -s / 3);
    ctx.stroke();

    // 身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(0, breathe, s / 2, 0, Math.PI * 2);
    ctx.fill();

    // 装甲层（前后）
    ctx.fillStyle = flash ? '#ddd' : '#7F0000';
    ctx.beginPath();
    ctx.arc(0, breathe, s / 2, -0.7, 0.7);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, breathe, s / 2, Math.PI - 0.7, Math.PI + 0.7);
    ctx.fill();

    // 装甲铆钉
    ctx.fillStyle = flash ? '#ccc' : '#B71C1C';
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const r = s / 2 - 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r + breathe, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // 双角（更大更弯曲）
    ctx.fillStyle = flash ? '#ccc' : '#4A0000';
    // 左角
    ctx.beginPath();
    ctx.moveTo(-6, -s / 2 + 4);
    ctx.quadraticCurveTo(-14, -s / 2 - 10, -10, -s / 2 - 16);
    ctx.lineTo(-2, -s / 2 + 2);
    ctx.closePath();
    ctx.fill();
    // 右角
    ctx.beginPath();
    ctx.moveTo(6, -s / 2 + 4);
    ctx.quadraticCurveTo(14, -s / 2 - 10, 10, -s / 2 - 16);
    ctx.lineTo(2, -s / 2 + 2);
    ctx.closePath();
    ctx.fill();

    // 核心（脉动发光）
    const coreGlow = 0.5 + Math.sin(now * 0.006) * 0.4;
    ctx.fillStyle = flash ? '#fff' : `rgba(255,30,30,${coreGlow})`;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(0, breathe, s / 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 核心内环
    ctx.strokeStyle = `rgba(255,200,0,${coreGlow * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, breathe, s / 7, 0, Math.PI * 2);
    ctx.stroke();

    // 恶魔眼（发光红眼）
    ctx.fillStyle = flash ? '#fff' : '#FF0';
    ctx.shadowColor = '#FF0';
    ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(-5, -4 + breathe, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -4 + breathe, 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 竖瞳
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, -6 + breathe, 2.5, 5);
    ctx.fillRect(4, -6 + breathe, 2.5, 5);

    // 嘴（怒吼）
    ctx.strokeStyle = flash ? '#fff' : '#FF0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-4, 4 + breathe);
    ctx.quadraticCurveTo(0, 7 + breathe, 4, 4 + breathe);
    ctx.stroke();

    // 火焰粒子环绕
    for (let i = 0; i < 5; i++) {
      const a = now * 0.003 + i * 1.26;
      const r = s / 2 + 8 + Math.sin(now * 0.005 + i * 2) * 4;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r + breathe;
      const fireAlpha = 0.3 + Math.sin(now * 0.008 + i) * 0.2;
      ctx.fillStyle = `rgba(255,${80 + i * 30},0,${fireAlpha})`;
      ctx.beginPath();
      ctx.arc(px, py, 2 + Math.sin(now * 0.01 + i) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- 暗影刺客：半隐身 + 双匕 + 暗影拖尾 ---
  _drawAssassin(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const legSwing = Math.sin(this.walkCycle) * 5;

    // 暗影拖尾
    ctx.fillStyle = 'rgba(44,62,80,0.15)';
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.arc(-this.facingX * i * 4, -this.facingY * i * 4, s / 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 腿
    ctx.fillStyle = flash ? '#ddd' : '#1a1a2e';
    ctx.fillRect(-3, s / 4 + bob, 2, 5 + legSwing);
    ctx.fillRect(2, s / 4 + bob, 2, 5 - legSwing);

    // 身体（紧身忍者服）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(0, bob, s / 3.2, s / 2.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // 头（面罩）
    ctx.fillStyle = flash ? '#eee' : '#1a1a2e';
    ctx.beginPath(); ctx.arc(0, -s / 3 + bob, s / 4, 0, Math.PI * 2); ctx.fill();

    // 护额
    ctx.fillStyle = flash ? '#ccc' : '#7f8c8d';
    ctx.fillRect(-s / 3.5, -s / 3 - 2 + bob, s / 1.8, 3);

    // 发光红眼
    ctx.fillStyle = '#ff1744';
    ctx.shadowColor = '#ff1744';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(-2.5, -s / 3 + bob, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2.5, -s / 3 + bob, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 双匕首
    ctx.fillStyle = flash ? '#eee' : '#90A4AE';
    // 左匕
    ctx.beginPath();
    ctx.moveTo(-s / 3, -s / 6 + bob);
    ctx.lineTo(-s / 2 - 6, -s / 3 + bob);
    ctx.lineTo(-s / 3 + 1, 0 + bob);
    ctx.closePath();
    ctx.fill();
    // 右匕
    ctx.beginPath();
    ctx.moveTo(s / 3, -s / 6 + bob);
    ctx.lineTo(s / 2 + 6, -s / 3 + bob);
    ctx.lineTo(s / 3 - 1, 0 + bob);
    ctx.closePath();
    ctx.fill();
  }

  // --- 召唤师：法阵 + 暗能量 + 召唤光环 ---
  _drawSummoner(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const pulse = Math.sin(now * 0.004) * 3;

    // 召唤法阵
    ctx.strokeStyle = `rgba(142,68,173,${0.3 + Math.sin(now * 0.005) * 0.15})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, s / 3, s / 2 + 4 + pulse, 0, Math.PI * 2);
    ctx.stroke();
    // 法阵内圈
    ctx.beginPath();
    ctx.arc(0, s / 3, s / 3, 0, Math.PI * 2);
    ctx.stroke();
    // 法阵符号
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + now * 0.002;
      const r = s / 2 + 4 + pulse;
      ctx.fillStyle = `rgba(142,68,173,0.4)`;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, s / 3 + Math.sin(a) * r, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // 身体（长袍）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(-s / 2.5, s / 3 + bob);
    ctx.lineTo(-s / 4, -s / 4 + bob);
    ctx.quadraticCurveTo(0, -s / 3 + bob, s / 4, -s / 4 + bob);
    ctx.lineTo(s / 2.5, s / 3 + bob);
    ctx.closePath();
    ctx.fill();

    // 暗能量纹路
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(142,68,173,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-s / 5, 0 + bob);
    ctx.lineTo(0, s / 5 + bob);
    ctx.lineTo(s / 5, 0 + bob);
    ctx.stroke();

    // 头
    ctx.fillStyle = flash ? '#eee' : '#9B59B6';
    ctx.beginPath(); ctx.arc(0, -s / 3 - 2 + bob, s / 4.5, 0, Math.PI * 2); ctx.fill();

    // 兜帽
    ctx.fillStyle = flash ? '#ddd' : '#6C3483';
    ctx.beginPath();
    ctx.arc(0, -s / 3 - 4 + bob, s / 3.5, Math.PI + 0.3, -0.3);
    ctx.closePath();
    ctx.fill();

    // 发光紫眼
    ctx.fillStyle = '#E040FB';
    ctx.shadowColor = '#E040FB';
    ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(-2, -s / 3 - 2 + bob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -s / 3 - 2 + bob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 召唤计数指示
    if (this.summonCount > 0) {
      ctx.fillStyle = 'rgba(142,68,173,0.6)';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`×${this.summonCount}`, 0, s / 2 + 6);
    }
  }

  // --- 盾卫：大盾 + 全身甲 + 护盾光环 ---
  _drawShieldGuard(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const legSwing = Math.sin(this.walkCycle) * 3;

    // 腿
    ctx.fillStyle = flash ? '#ddd' : '#1565C0';
    ctx.fillRect(-4, s / 4 + bob, 3, 6 + legSwing);
    ctx.fillRect(2, s / 4 + bob, 3, 6 - legSwing);

    // 身体（重甲）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.roundRect(-s / 2.8, -s / 5 + bob, s * 0.7, s * 0.6, 3);
    ctx.fill();

    // 装甲板高光
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.roundRect(-s / 2.8, -s / 5 + bob, s * 0.7, s * 0.3, 3);
    ctx.fill();

    // 大盾牌（左手）
    const shieldPulse = this.shieldHp > 0 ? Math.sin(now * 0.006) * 2 : 0;
    ctx.fillStyle = flash ? '#ddd' : '#1E88E5';
    ctx.beginPath();
    ctx.ellipse(-s / 2 - 4, 2 + bob, 8, 12 + shieldPulse, 0, 0, Math.PI * 2);
    ctx.fill();
    // 盾牌十字
    ctx.strokeStyle = flash ? '#eee' : '#90CAF9';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-s / 2 - 4, -6 + bob);
    ctx.lineTo(-s / 2 - 4, 10 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s / 2 - 10, 2 + bob);
    ctx.lineTo(-s / 2 + 2, 2 + bob);
    ctx.stroke();

    // 护盾能量光环
    if (this.shieldHp > 0) {
      const shieldAlpha = 0.2 + (this.shieldHp / this.maxShieldHp) * 0.3;
      ctx.strokeStyle = `rgba(52,152,219,${shieldAlpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, bob, s / 2 + 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 头盔（全封闭式）
    ctx.fillStyle = flash ? '#eee' : '#0D47A1';
    ctx.beginPath(); ctx.arc(0, -s / 3 + bob, s / 3.8, 0, Math.PI * 2); ctx.fill();
    // 面罩缝
    ctx.strokeStyle = flash ? '#ccc' : '#0a3d91';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-s / 5, -s / 3 + bob);
    ctx.lineTo(s / 5, -s / 3 + bob);
    ctx.stroke();

    // 眼缝
    ctx.fillStyle = flash ? '#fff' : '#64B5F6';
    ctx.fillRect(-4, -s / 3 - 1 + bob, 3, 2);
    ctx.fillRect(2, -s / 3 - 1 + bob, 3, 2);
  }

  // --- 爆破兵：炸药包 + 火信 + 危险标记 ---
  _drawBomber(ctx, s, flash, now, bob) {
    const c = flash ? '#fff' : this.color;
    const legSwing = Math.sin(this.walkCycle) * 4;
    const fuseGlow = 0.5 + Math.sin(now * 0.01) * 0.4;

    // 腿
    ctx.fillStyle = flash ? '#ddd' : '#BF360C';
    ctx.fillRect(-3, s / 4 + bob, 2, 5 + legSwing);
    ctx.fillRect(2, s / 4 + bob, 2, 5 - legSwing);

    // 身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(0, bob, s / 3, s / 2.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 炸药包（背后）
    ctx.fillStyle = flash ? '#ddd' : '#4E342E';
    ctx.beginPath();
    ctx.roundRect(-s / 5, -s / 6 + bob, s * 0.4, s * 0.45, 3);
    ctx.fill();
    // TNT标记
    ctx.fillStyle = flash ? '#fff' : '#FF5722';
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TNT', 0.5, s / 8 + bob);

    // 头
    ctx.fillStyle = flash ? '#eee' : '#FFCCBC';
    ctx.beginPath(); ctx.arc(0, -s / 3 + bob, s / 4.5, 0, Math.PI * 2); ctx.fill();

    // 头巾
    ctx.fillStyle = flash ? '#ddd' : '#D84315';
    ctx.beginPath();
    ctx.arc(0, -s / 3 - 1 + bob, s / 4, Math.PI, 0);
    ctx.fill();

    // 火信（头顶，闪烁）
    ctx.strokeStyle = flash ? '#ccc' : '#5D4037';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -s / 2 + bob);
    ctx.lineTo(2, -s / 2 - 6 + bob);
    ctx.stroke();
    // 火花
    ctx.fillStyle = `rgba(255,${150 + Math.random() * 100},0,${fuseGlow})`;
    ctx.shadowColor = '#FF6F00';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(2, -s / 2 - 6 + bob, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 危险标记
    ctx.fillStyle = `rgba(255,87,34,${0.4 + Math.sin(now * 0.008) * 0.3})`;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚠', 0, s / 2 + 8 + bob);

    // 眼睛（疯狂）
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-2.5, -s / 3 + bob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2.5, -s / 3 + bob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-2, -s / 3 + bob, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -s / 3 + bob, 1, 0, Math.PI * 2); ctx.fill();
  }
}

// ==================== 波次系统 ====================


/** 生成30波敌人配置 */
function generateWaveConfigs() {
  const waves = [];

  for (let w = 1; w <= 30; w++) {
    const enemies = [];
    const hpMult = 1 + (w - 1) * 0.15; // 每波血量增加15%

    // 基础数量随波次增加（后期大量敌人）
    const baseCount = Math.min(8 + Math.floor(w * 2.2), 70);

    // 每5波Boss
    if (w % 5 === 0) {
      // Boss波 - Boss数量随波次增加
      const bossCount = Math.floor(w / 10) + 1;
      for (let i = 0; i < bossCount; i++) {
        enemies.push({ type: 'boss', delay: i * 2 });
      }
      // 配大量小兵护卫Boss
      const guardCount = Math.floor(baseCount * 0.8);
      for (let i = 0; i < guardCount; i++) {
        let type = 'normal';
        const roll = Math.random();
        if (w >= 15 && roll < 0.15) type = 'shield';
        else if (w >= 12 && roll < 0.2) type = 'bomber';
        else if (w >= 9 && roll < 0.25) type = 'assassin';
        else if (w >= 7 && roll < 0.3) type = 'healer';
        else if (w >= 5 && roll < 0.35) type = 'armored';
        else if (w >= 3 && roll < 0.4) type = 'flying';
        else if (w >= 2 && roll < 0.5) type = 'fast';
        enemies.push({ type, delay: i * 0.5 });
      }
    } else {
      // 根据波次解锁不同敌人
      for (let i = 0; i < baseCount; i++) {
        let type = 'normal';
        const roll = Math.random();

        if (w >= 18 && roll < 0.06) {
          type = 'summoner';
        } else if (w >= 15 && roll < 0.1) {
          type = 'shield';
        } else if (w >= 12 && roll < 0.12) {
          type = 'bomber';
        } else if (w >= 9 && roll < 0.15) {
          type = 'assassin';
        } else if (w >= 7 && roll < 0.2) {
          type = 'healer';
        } else if (w >= 5 && roll < 0.25) {
          type = 'armored';
        } else if (w >= 3 && roll < 0.3) {
          type = 'flying';
        } else if (w >= 2 && roll < 0.35) {
          type = 'fast';
        }

        enemies.push({ type, delay: i * 0.6 });
      }
    }

    waves.push({
      number: w,
      enemies,
      hpMultiplier: hpMult,
      bonusGold: w * 40
    });
  }

  return waves;
}

class WaveManager {
  constructor() {
    this.waves = generateWaveConfigs();
    this.currentWave = 0;
    this.spawnQueue = [];
    this.spawnTimer = 0;
    this.waveActive = false;
    this.allWavesComplete = false;
    this.betweenWaves = true;
    this.betweenWaveTimer = 5; // 5秒间隔
    this.pendingEnemies = [];
  }

  get totalWaves() {
    return this.waves.length;
  }

  get waveNumber() {
    return this.currentWave + 1;
  }

  get isLastWave() {
    return this.currentWave >= this.waves.length;
  }

  startNextWave() {
    if (this.currentWave >= this.waves.length) {
      this.allWavesComplete = true;
      return [];
    }

    const wave = this.waves[this.currentWave];
    this.spawnQueue = [...wave.enemies].sort((a, b) => a.delay - b.delay);
    this.spawnTimer = 0;
    this.waveActive = true;
    this.betweenWaves = false;
    this.pendingEnemies = [];

    return wave;
  }

  update(dt, spawnCallback) {
    if (this.betweenWaves && !this.allWavesComplete) {
      this.betweenWaveTimer -= dt;
      if (this.betweenWaveTimer <= 0) {
        this.startNextWave();
        return null; // 返回null表示波次刚开始
      }
      return;
    }

    if (!this.waveActive) return;

    this.spawnTimer += dt;

    // 生成敌人
    while (this.spawnQueue.length > 0 && this.spawnQueue[0].delay <= this.spawnTimer) {
      const spawn = this.spawnQueue.shift();
      const wave = this.waves[this.currentWave];
      const enemy = new Enemy(spawn.type, wave.hpMultiplier);
      spawnCallback(enemy);
    }

    // 检查波次是否结束（所有敌人已生成且场上无存活敌人）
    if (this.spawnQueue.length === 0) {
      return 'spawning_done'; // 通知main.js检查是否所有敌人已消灭
    }
  }

  waveCleared() {
    const bonus = this.waves[this.currentWave]?.bonusGold || 0;
    this.currentWave++;
    this.waveActive = false;

    if (this.currentWave >= this.waves.length) {
      this.allWavesComplete = true;
      return bonus;
    }

    this.betweenWaves = true;
    this.betweenWaveTimer = 8;
    return bonus;
  }

  skipWait() {
    if (this.betweenWaves) {
      this.betweenWaveTimer = 0;
    }
  }

  forceNextWave() {
    if (this.betweenWaves && !this.allWavesComplete) {
      return this.startNextWave();
    }
    return null;
  }
}
