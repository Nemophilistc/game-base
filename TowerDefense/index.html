  betweenWaves: false        // 是否在波次间隔中
};

// ---- 事件回调 ----
let onTowerSelect = null;
let onTowerPlace = null;
let onTowerUpgrade = null;
let onTowerSell = null;
let onStartGame = null;
let onPauseToggle = null;
let onSpeedChange = null;
let onSkipWait = null;
let onMapSelect = null;

function setCallbacks(cbs) {
  onTowerSelect = cbs.onTowerSelect;
  onTowerPlace = cbs.onTowerPlace;
  onTowerUpgrade = cbs.onTowerUpgrade;
  onTowerSell = cbs.onTowerSell;
  onStartGame = cbs.onStartGame;
  onPauseToggle = cbs.onPauseToggle;
  onSpeedChange = cbs.onSpeedChange;
  onSkipWait = cbs.onSkipWait;
  onMapSelect = cbs.onMapSelect;
}

// ---- 塔选择面板 ----
const towerPanelItems = Object.entries(TOWER_TYPES).map(([key, val]) => ({
  key,
  name: val.name,
  icon: val.icon,
  cost: val.levels[0].cost,
  desc: val.description
}));

/** 绘制塔选择面板 */
function drawTowerPanel(ctx) {
  const panelX = 0;
  const panelY = CANVAS_HEIGHT;
  const panelW = CANVAS_WIDTH;
  const panelH = 100;

  // 背景
  ctx.fillStyle = 'rgba(20,20,30,0.95)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, panelY, panelW, panelH);

  // 标题
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('建造防御塔', panelX + 10, panelY + 5);

  // 塔按钮
  const btnW = 90;
  const btnH = 65;
  const startX = 10;
  const startY = panelY + 25;

  towerPanelItems.forEach((item, i) => {
    const x = startX + i * (btnW + 8);
    const y = startY;
    const isSelected = uiState.selectedTowerType === item.key;
    const canAfford = uiState.gold >= item.cost;

    // 按钮背景
    ctx.fillStyle = isSelected ? 'rgba(52,152,219,0.5)' : 'rgba(40,40,50,0.8)';
    ctx.fillRect(x, y, btnW, btnH);
    ctx.strokeStyle = isSelected ? '#3498db' : '#555';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.strokeRect(x, y, btnW, btnH);

    // 图标
    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = canAfford ? '#fff' : '#666';
    ctx.fillText(item.icon, x + btnW / 2, y + 18);

    // 名称
    ctx.font = '11px Arial';
    ctx.fillStyle = canAfford ? '#ddd' : '#555';
    ctx.fillText(item.name, x + btnW / 2, y + 38);

    // 费用
    ctx.font = 'bold 11px Arial';
    ctx.fillStyle = canAfford ? '#f1c40f' : '#c0392b';
    ctx.fillText(`${item.cost}G`, x + btnW / 2, y + 53);

    // 存储按钮区域用于点击检测
    item._rect = { x, y, w: btnW, h: btnH };
  });

  // 速度控制
  const speedX = panelW - 200;
  const speedY = panelY + 10;
  ctx.fillStyle = '#fff';
  ctx.font = '12px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('游戏速度:', speedX, speedY + 5);

  GAME_SPEEDS.forEach((spd, i) => {
    const bx = speedX + 70 + i * 38;
    const by = speedY;
    const isActive = uiState.gameSpeed === spd;
    ctx.fillStyle = isActive ? '#3498db' : 'rgba(40,40,50,0.8)';
    ctx.fillRect(bx, by, 34, 22);
    ctx.strokeStyle = isActive ? '#5dade2' : '#555';
    ctx.strokeRect(bx, by, 34, 22);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${spd}x`, bx + 17, by + 11);
    // 存储区域
    if (!GAME_SPEEDS._rects) GAME_SPEEDS._rects = [];
    GAME_SPEEDS._rects[i] = { x: bx, y: by, w: 34, h: 22, speed: spd };
  });
}

// ---- 顶部HUD ----
function drawHUD(ctx) {
  const hudH = 32;
  ctx.fillStyle = 'rgba(20,20,30,0.85)';
  ctx.fillRect(0, 0, CANVAS_WIDTH, hudH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, hudH);
  ctx.lineTo(CANVAS_WIDTH, hudH);
  ctx.stroke();

  ctx.textBaseline = 'middle';
  const y = hudH / 2;

  // 金币
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f1c40f';
  ctx.fillText(`💰 ${uiState.gold}`, 10, y);

  // 生命
  ctx.fillStyle = '#e74c3c';
  ctx.fillText(`❤️ ${uiState.lives}`, 120, y);

  // 波次
  ctx.fillStyle = '#3498db';
  ctx.fillText(`🌊 ${uiState.waveNumber}/${uiState.totalWaves}`, 230, y);

  // 击杀
  ctx.fillStyle = '#2ecc71';
  ctx.fillText(`💀 ${uiState.killCount}`, 360, y);

  // 分数
  ctx.fillStyle = '#fff';
  ctx.fillText(`🏆 ${uiState.score}`, 460, y);

  // 暂停按钮
  const pauseX = CANVAS_WIDTH - 80;
  const pauseY = 4;
  const pauseW = 36;
  const pauseH = 24;
  ctx.fillStyle = uiState.isPaused ? '#e74c3c' : 'rgba(40,40,50,0.8)';
  ctx.fillRect(pauseX, pauseY, pauseW, pauseH);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(pauseX, pauseY, pauseW, pauseH);
  ctx.fillStyle = '#fff';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(uiState.isPaused ? '▶' : '⏸', pauseX + pauseW / 2, y);
  // 存储
  uiState._pauseRect = { x: pauseX, y: pauseY, w: pauseW, h: pauseH };

  // 下一波按钮（更大更醒目）
  const nextX = CANVAS_WIDTH - 180;
  const nextW = 95;
  const nextH = 28;
  // 脉动效果
  const pulse = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;
  ctx.fillStyle = `rgba(46,204,113,${pulse})`;
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(nextX, pauseY, nextW, nextH, 4);
  } else {
    ctx.rect(nextX, pauseY, nextW, nextH);
  }
  ctx.fill();
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 2;
  ctx.strokeRect(nextX, pauseY, nextW, nextH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶ 下一波', nextX + nextW / 2, pauseY + nextH / 2);
  uiState._nextWaveRect = { x: nextX, y: pauseY, w: nextW, h: nextH };
}

// ---- 塔信息面板（选中已建造的塔时） ----
function drawTowerInfo(ctx) {
  const tower = uiState.selectedTower;
  if (!tower) return;

  const panelW = 180;
  const panelH = 200;
  const panelX = CANVAS_WIDTH - panelW - 10;
  const panelY = 45;

  // 背景
  ctx.fillStyle = 'rgba(20,20,30,0.95)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = '#3498db';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, panelY, panelW, panelH);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // 名称和等级
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.fillText(`${tower.icon} ${tower.typeName} Lv.${tower.level + 1}`, panelX + panelW / 2, panelY + 8);

  // 属性
  const s = tower.stats;
  ctx.font = '11px Arial';
  ctx.textAlign = 'left';
  const infoX = panelX + 12;
  let infoY = panelY + 32;
  const lineH = 18;

  const infos = [
    [`⚔️ 伤害: ${s.damage}`, '#e74c3c'],
    [`🎯 射程: ${s.range}`, '#3498db'],
    [`⏱️ 射速: ${s.fireRate.toFixed(1)}s`, '#f39c12'],
  ];

  if (s.splashRadius) infos.push([`💥 溅射: ${s.splashRadius.toFixed(1)}`, '#e67e22']);
  if (s.slowFactor) infos.push([`❄️ 减速: ${Math.round((1 - s.slowFactor) * 100)}%`, '#00BFFF']);
  if (s.chainCount) infos.push([`⚡ 连锁: ${s.chainCount}个`, '#FFD700']);
  if (s.burnDamage) infos.push([`🔥 灼烧: ${s.burnDamage}/s`, '#FF4500']);
  if (s.pierceCount) infos.push([`🔫 穿透: ${s.pierceCount + 1}个`, '#FF00FF']);

  for (const [text, color] of infos) {
    ctx.fillStyle = color;
    ctx.fillText(text, infoX, infoY);
    infoY += lineH;
  }

  // 出售价值
  infoY += 5;
  ctx.fillStyle = '#f1c40f';
  ctx.fillText(`💰 出售: ${tower.sellValue}G`, infoX, infoY);
  infoY += lineH;

  // 升级按钮
  const btnY = panelY + panelH - 50;

  if (tower.canUpgrade()) {
    const cost = tower.upgradeCost;
    const canAfford = uiState.gold >= cost;
    const ubx = panelX + 10;
    const uby = btnY;
    const ubw = panelW - 20;
    const ubh = 28;

    ctx.fillStyle = canAfford ? 'rgba(46,204,113,0.8)' : 'rgba(100,100,100,0.5)';
    ctx.fillRect(ubx, uby, ubw, ubh);
    ctx.strokeStyle = canAfford ? '#2ecc71' : '#555';
    ctx.strokeRect(ubx, uby, ubw, ubh);
    ctx.fillStyle = canAfford ? '#fff' : '#888';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`⬆ 升级 (${cost}G)`, panelX + panelW / 2, uby + ubh / 2);
    uiState._upgradeRect = { x: ubx, y: uby, w: ubw, h: ubh };
  } else {
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('已满级!', panelX + panelW / 2, btnY + 14);
    uiState._upgradeRect = null;
  }

  // 出售按钮
  const sbx = panelX + 10;
  const sby = btnY + 32;
  const sbw = panelW - 20;
  const sbh = 24;
  ctx.fillStyle = 'rgba(231,76,60,0.7)';
  ctx.fillRect(sbx, sby, sbw, sbh);
  ctx.strokeStyle = '#e74c3c';
  ctx.strokeRect(sbx, sby, sbw, sbh);
  ctx.fillStyle = '#fff';
  ctx.font = '11px Arial';
  ctx.fillText(`出售 (+${tower.sellValue}G)`, panelX + panelW / 2, sby + sbh / 2);
  uiState._sellRect = { x: sbx, y: sby, w: sbw, h: sbh };
}

// ---- 鼠标交互 ----
let _canvas = null;

function initUI(canvas) {
  _canvas = canvas;

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    uiState.hoveredCell = {
      col: Math.floor(mx / CELL_SIZE),
      row: Math.floor(my / CELL_SIZE),
      x: mx,
      y: my
    };
  });

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    handleClick(mx, my);
  });

  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    // 右键取消选择
    uiState.selectedTowerType = null;
    uiState.selectedTower = null;
  });
}

function handleClick(mx, my) {
  // 开始菜单
  if (uiState.showStartMenu) {
    // 地图选择
    if (uiState._mapBtnRects) {
      for (const r of uiState._mapBtnRects) {
        if (hitTest(mx, my, r)) {
          uiState.selectedMapIndex = r.index;
          onMapSelect?.(r.index);
          return;
        }
      }
    }
    if (uiState._startBtnRect && hitTest(mx, my, uiState._startBtnRect)) {
      uiState.showStartMenu = false;
      uiState.isRunning = true;
      onStartGame?.();
    }
    return;
  }

  // 游戏结束/胜利
  if (uiState.showGameOver || uiState.showVictory) {
    if (uiState._restartBtnRect && hitTest(mx, my, uiState._restartBtnRect)) {
      // 重新加载页面
      location.reload();
    }
    return;
  }

  // 暂停按钮
  if (uiState._pauseRect && hitTest(mx, my, uiState._pauseRect)) {
    uiState.isPaused = !uiState.isPaused;
    onPauseToggle?.();
    return;
  }

  // 下一波按钮（顶部小按钮）
  if (uiState._nextWaveRect && hitTest(mx, my, uiState._nextWaveRect)) {
    onSkipWait?.();
    return;
  }

  // 下一波按钮（中央大按钮）
  if (uiState._nextWaveBigRect && hitTest(mx, my, uiState._nextWaveBigRect)) {
    onSkipWait?.();
    return;
  }

  // 塔选择面板
  for (const item of towerPanelItems) {
    if (item._rect && hitTest(mx, my, item._rect)) {
      if (uiState.selectedTowerType === item.key) {
        uiState.selectedTowerType = null;
      } else {
        uiState.selectedTowerType = item.key;
        uiState.selectedTower = null;
      }
      onTowerSelect?.(item.key);
      return;
    }
  }

  // 速度按钮
  if (GAME_SPEEDS._rects) {
    for (const r of GAME_SPEEDS._rects) {
      if (r && hitTest(mx, my, r)) {
        uiState.gameSpeed = r.speed;
        onSpeedChange?.(r.speed);
        return;
      }
    }
  }

  // 升级按钮
  if (uiState._upgradeRect && hitTest(mx, my, uiState._upgradeRect)) {
    onTowerUpgrade?.();
    return;
  }

  // 出售按钮
  if (uiState._sellRect && hitTest(mx, my, uiState._sellRect)) {
    onTowerSell?.();
    return;
  }

  // 点击地图
  if (my < CANVAS_HEIGHT) {
    const col = Math.floor(mx / CELL_SIZE);
    const row = Math.floor(my / CELL_SIZE);

    if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
      if (uiState.selectedTowerType) {
        // 建造塔
        onTowerPlace?.(col, row);
      } else {
        // 选择已建造的塔
        onTowerSelect?.(null, col, row);
      }
    }
  }
}

function hitTest(mx, my, rect) {
  return mx >= rect.x && mx <= rect.x + rect.w &&
         my >= rect.y && my <= rect.y + rect.h;
}

// ---- 悬停提示 ----
function drawHoverInfo(ctx) {
  if (!uiState.hoveredCell || uiState.showStartMenu) return;
  const { x, y, col, row } = uiState.hoveredCell;
  if (y >= CANVAS_HEIGHT) return;

  // 建造预览
  if (uiState.selectedTowerType) {
    const px = col * CELL_SIZE;
    const py = row * CELL_SIZE;
    ctx.strokeStyle = 'rgba(46,204,113,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);

    // 射程预览
    const type = TOWER_TYPES[uiState.selectedTowerType];
    const range = type.levels[0].range * CELL_SIZE;
    ctx.beginPath();
    ctx.arc(px + CELL_SIZE / 2, py + CELL_SIZE / 2, range, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.stroke();
  }
}

// ---- 波次间隔大按钮 ----
function drawNextWaveOverlay(ctx) {
  if (!uiState.betweenWaves) return;

  const btnW = 200;
  const btnH = 50;
  const btnX = CANVAS_WIDTH / 2 - btnW / 2;
  const btnY = CANVAS_HEIGHT / 2 - btnH / 2;
  const pulse = 0.7 + Math.sin(Date.now() * 0.006) * 0.3;

  // 半透明背景
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, CANVAS_HEIGHT / 2 - 40, CANVAS_WIDTH, 80);

  // 按钮
  ctx.fillStyle = `rgba(46,204,113,${pulse})`;
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(btnX, btnY, btnW, btnH, 10);
  } else {
    ctx.rect(btnX, btnY, btnW, btnH);
  }
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶ 下一波', btnX + btnW / 2, btnY + btnH / 2);

  uiState._nextWaveBigRect = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// ---- 主绘制 ----
function drawUI(ctx) {
  drawHUD(ctx);
  drawTowerPanel(ctx);
  drawTowerInfo(ctx);
  drawHoverInfo(ctx);

  // 波次间隔期间显示大按钮
  if (!uiState.showStartMenu && !uiState.showGameOver && !uiState.showVictory && uiState.isRunning && !uiState.isPaused) {
    drawNextWaveOverlay(ctx);
  }

  if (uiState.showStartMenu) {
    drawStartMenu(ctx);
  } else if (uiState.showVictory) {
    drawVictory(ctx);
  } else if (uiState.showGameOver) {
    drawGameOver(ctx);
  } else if (uiState.isPaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('已暂停', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
  }
}

// === main.js ===
// ==================== 游戏主循环 ====================


// ---- 游戏状态 ----
let canvas, ctx;
let towers = [];
let enemies = [];
let projectiles = [];
let particles = [];
let goldPopups = [];
let waveManager;
let lastTime = 0;
let gameStarted = false;

// ---- 粒子效果 ----
class Particle {
  constructor(x, y, color, life = 0.5, vx = 0, vy = 0, size = 3) {
    this.x = x;
    this.y = y;
    this.vx = vx + (Math.random() - 0.5) * 60;
    this.vy = vy + (Math.random() - 0.5) * 60;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.alive = true;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 80 * dt; // 重力
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- 金币飘字 ----
class GoldPopup {
  constructor(x, y, amount) {
    this.x = x;
    this.y = y;
    this.amount = amount;
    this.life = 1.0;
    this.alive = true;
  }

  update(dt) {
    this.y -= 40 * dt;
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life);
    ctx.fillStyle = `rgba(241,196,15,${alpha})`;
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`+${this.amount}G`, this.x, this.y);
  }
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ---- 初始化 ----
function init() {
  canvas = document.getElementById('gameCanvas');
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT + 100; // 额外100px给面板
  ctx = canvas.getContext('2d');

  // 使用默认地图初始化
  initMap(MAPS[0].path);
  initUI(canvas);
  waveManager = new WaveManager();

  setCallbacks({
    onStartGame: startGame,
    onPauseToggle: () => {},
    onSpeedChange: (spd) => { uiState.gameSpeed = spd; },
    onSkipWait: () => { waveManager.forceNextWave(); },
    onTowerSelect: handleTowerSelect,
    onTowerPlace: handleTowerPlace,
    onTowerUpgrade: handleTowerUpgrade,
    onTowerSell: handleTowerSell,
    onMapSelect: handleMapSelect
  });

  requestAnimationFrame(gameLoop);
}

// ---- 回调处理 ----
function handleMapSelect(index) {
  selectMap(index);
  // 重新初始化地图
  initMap(MAPS[index].path);
}

function startGame() {
  initAudio();
  // 使用选中的地图重新初始化
  const mapIndex = uiState.selectedMapIndex || 0;
  initMap(MAPS[mapIndex].path);
  gameStarted = true;
  waveManager = new WaveManager();
  waveManager.startNextWave();
  uiState.waveNumber = 1;
  playWaveStart();
}

function handleTowerSelect(key, col, row) {
  if (key) {
    uiState.selectedTowerType = key;
    uiState.selectedTower = null;
    return;
  }
  // 点击地图上的塔
  if (col !== undefined) {
    const tower = towers.find(t => t.col === col && t.row === row);
    if (tower) {
      uiState.selectedTower = tower;
      uiState.selectedTowerType = null;
    } else {
      uiState.selectedTower = null;
    }
  }
}

function handleTowerPlace(col, row) {
  const type = uiState.selectedTowerType;
  if (!type) return;
  const cost = TOWER_TYPES[type].levels[0].cost;
  if (uiState.gold < cost) return;
  if (!canBuild(col, row)) return;

  uiState.gold -= cost;
  placeTower(col, row);
  const tower = new Tower(type, col, row);
  towers.push(tower);
  uiState.towerCount++;
  uiState.selectedTower = tower;
  uiState.selectedTowerType = null;
  playBuild();
}

function handleTowerUpgrade() {
  const tower = uiState.selectedTower;
  if (!tower || !tower.canUpgrade()) return;
  const cost = tower.upgradeCost;
  if (uiState.gold < cost) return;

  uiState.gold -= cost;
  tower.upgrade();
  playUpgrade();
}

function handleTowerSell() {
  const tower = uiState.selectedTower;
  if (!tower) return;

  uiState.gold += tower.sellValue;
  removeTower(tower.col, tower.row);
  towers = towers.filter(t => t !== tower);
  uiState.selectedTower = null;
  uiState.towerCount--;
  playSell();
}

// ---- 游戏循环 ----
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05) * uiState.gameSpeed;
  lastTime = timestamp;

  if (gameStarted && !uiState.isPaused && !uiState.showStartMenu) {
    update(dt);
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ---- 更新逻辑 ----
function update(dt) {
  if (uiState.showGameOver || uiState.showVictory) return;

  // 更新波次
  const waveResult = waveManager.update(dt, (enemy) => {
    enemies.push(enemy);
  });

  // 更新塔（创建投射物）
  for (const tower of towers) {
    const fireData = tower.update(dt, enemies);
    if (fireData) {
      projectiles.push(new Projectile(fireData));
    }
  }

  // 更新投射物（造成伤害）
  for (const proj of projectiles) {
    proj.update(dt, enemies);
  }

  // 更新敌人（移动、状态效果、死亡动画）
  const reachedEndList = [];
  const diedList = [];
  for (const enemy of enemies) {
    const wasAlive = enemy.alive;
    enemy.update(dt, enemies);

    // 敌人到达终点
    if (enemy.reachedEnd && wasAlive) {
      reachedEndList.push(enemy);
    }

    // 敌人死亡（被击杀）
    if (!enemy.alive && !enemy.reachedEnd && wasAlive) {
      diedList.push(enemy);
    }
  }

  // 处理到达终点的敌人
  for (const _ of reachedEndList) {
    uiState.lives--;
    if (uiState.lives <= 0) {
      uiState.lives = 0;
      uiState.showGameOver = true;
      playDefeat();
      return;
    }
  }

  // 处理被击杀的敌人（奖励）
  for (const enemy of diedList) {
    uiState.gold += enemy.reward;
    uiState.score += enemy.reward;
    uiState.killCount++;
    spawnParticles(enemy.x, enemy.y, 'rgb(255,100,50)', 12);
    goldPopups.push(new GoldPopup(enemy.x, enemy.y - 20, enemy.reward));
    playEnemyDeath();

    // 爆破兵死亡爆炸
    if (enemy.explosionDamage > 0 && !enemy.exploded) {
      enemy.exploded = true;
      // 对周围塔造成伤害（减少塔的血量或直接移除低级塔）
      // 这里改为对周围敌人也造成溅射伤害
      for (const other of enemies) {
        if (other === enemy || !other.alive) continue;
        const dx = other.x - enemy.x;
        const dy = other.y - enemy.y;
        if (Math.sqrt(dx * dx + dy * dy) <= enemy.explosionRadius) {
          other.takeDamage(30, true);
        }
      }
      // 爆炸特效
      spawnParticles(enemy.x, enemy.y, 'rgb(255,150,0)', 20);
      spawnParticles(enemy.x, enemy.y, 'rgb(255,50,0)', 15);
    }
  }

  // 召唤师召唤
  for (const enemy of enemies) {
    if (enemy.alive && enemy._shouldSummon) {
      enemy._shouldSummon = false;
      const summon = new Enemy(enemy.summonType, 1);
      summon.pathIndex = Math.max(0, enemy.pathIndex - 1);
      summon.x = enemy.x + (Math.random() - 0.5) * 20;
      summon.y = enemy.y + (Math.random() - 0.5) * 20;
      enemies.push(summon);
    }
  }

  // 更新粒子和飘字
  for (const p of particles) p.update(dt);
  for (const g of goldPopups) g.update(dt);

  // 清理
  enemies = enemies.filter(e => e.alive || e.deathTimer < 0.3);
  projectiles = projectiles.filter(p => p.alive);
  particles = particles.filter(p => p.alive);
  goldPopups = goldPopups.filter(g => g.alive);

  // 波次生成完毕，检查是否全部消灭
  if (waveResult === 'spawning_done') {
    const aliveEnemies = enemies.filter(e => e.alive);
    if (aliveEnemies.length === 0) {
      const bonus = waveManager.waveCleared();
      uiState.gold += bonus;
      uiState.waveNumber = waveManager.waveNumber;

      if (waveManager.allWavesComplete) {
        uiState.showVictory = true;
        playVictory();
        return;
      }

      playWaveStart();
    }
  }

  // 更新UI状态
  uiState.enemyCount = enemies.filter(e => e.alive).length;
  uiState.betweenWaves = waveManager.betweenWaves;
}

// ---- 渲染 ----
function render() {
  // 清除画布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 暗色背景
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制地图
  drawMap(ctx);

  // 绘制塔
  for (const tower of towers) {
    tower.draw(ctx, tower === uiState.selectedTower);
  }

  // 绘制敌人
  for (const enemy of enemies) {
    enemy.draw(ctx);
  }

  // 绘制投射物
  for (const proj of projectiles) {
    proj.draw(ctx);
  }

  // 绘制粒子
  for (const p of particles) p.draw(ctx);

  // 绘制金币飘字
  for (const g of goldPopups) g.draw(ctx);

  // 绘制UI（覆盖层）
  drawUI(ctx);
}

// ---- 启动 ----
init();;


</script>
