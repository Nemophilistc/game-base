<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泡泡龙 - 经典泡泡射击</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow:
        0 0 40px rgba(255, 100, 0, 0.2),
        0 0 80px rgba(255, 50, 0, 0.1),
        0 10px 40px rgba(0, 0, 0, 0.5);
      cursor: crosshair;
    }

    .mobile-controls {
      display: none;
      text-align: center;
      margin-top: 12px;
      color: #888;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .game-container {
        max-width: 100vw;
        padding: 8px;
      }

      canvas {
        border-radius: 8px;
      }

      .mobile-controls {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="mobile-controls">触摸屏幕瞄准并发射泡泡</div>
  </div>
  <script type="module" src="js/main.js"></script>

</body>
</html>
