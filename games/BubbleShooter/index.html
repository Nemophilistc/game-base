<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泡泡龙 - 经典泡泡射击</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow:
        0 0 40px rgba(255, 100, 0, 0.2),
        0 0 80px rgba(255, 50, 0, 0.1),
        0 10px 40px rgba(0, 0, 0, 0.5);
      cursor: crosshair;
    }

    .mobile-controls {
      display: none;
      text-align: center;
      margin-top: 12px;
      color: #888;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .game-container {
        max-width: 100vw;
        padding: 8px;
      }

      canvas {
        border-radius: 8px;
      }

      .mobile-controls {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="mobile-controls">触摸屏幕瞄准并发射泡泡</div>
  </div>
  <script>
// === ./config.js ===
// config.js - Constants and shared state
const CANVAS_WIDTH = 480;
const CANVAS_HEIGHT = 720;

// Bubble grid settings
const BUBBLE_RADIUS = 18;
const BUBBLE_DIAMETER = BUBBLE_RADIUS * 2;
const COLS = 12;
const ROW_HEIGHT = BUBBLE_DIAMETER * 0.866; // sqrt(3)/2 for hex stagger
const COL_WIDTH = BUBBLE_DIAMETER;
const GRID_OFFSET_X = (CANVAS_WIDTH - COLS * COL_WIDTH) / 2 + BUBBLE_RADIUS;
const GRID_OFFSET_Y = 60;

// Game settings
const SHOOT_SPEED = 12;
const MIN_MATCH = 3;
const COMBO_TIMEOUT = 2000;
const NEW_ROW_INTERVAL = 8000; // ms between new row descents
const GAME_OVER_Y = CANVAS_HEIGHT - 120;

// Scoring
const SCORE_POP = 10;
const SCORE_FLOAT = 20;

// Colors (warm palette)
const BUBBLE_COLORS = [
  '#FF4444', // Red
  '#FF8800', // Orange
  '#FFCC00', // Yellow
  '#44CC44', // Green
  '#4488FF', // Blue
  '#CC44FF', // Purple
];

const BUBBLE_COLOR_NAMES = ['红色', '橙色', '黄色', '绿色', '蓝色', '紫色'];

// Special bubble types
const SPECIAL_NONE = 0;
const SPECIAL_BOMB = 1;
const SPECIAL_RAINBOW = 2;

// Game state
function createGameState() {
  return {
    grid: [],          // 2D array of bubble objects
    shooter: {
      x: CANVAS_WIDTH / 2,
      y: CANVAS_HEIGHT - 60,
      angle: -Math.PI / 2,
      current: null,
      next: null,
    },
    flying: null,      // Currently flying bubble
    score: 0,
    level: 1,
    combo: 0,
    lastPopTime: 0,
    newRowTimer: 0,
    state: 'menu',     // menu, playing, gameover
    particles: [],
    fallingBubbles: [],
    popAnimations: [],
    shakeTimer: 0,
    highScore: parseInt(localStorage.getItem('bubbleShooterHighScore') || '0'),
    colorCount: 4,     // starts with 4 colors, increases with level
    gameOverTimer: 0,  // time since game over (seconds), for fade-in animation
  };
}

function getRandomColor(state) {
  return BUBBLE_COLORS[Math.floor(Math.random() * state.colorCount)];
}

function getRandomBubble(state) {
  const r = Math.random();
  if (r < 0.03) return { color: '#FFFFFF', special: SPECIAL_RAINBOW };
  if (r < 0.07) return { color: '#FF0000', special: SPECIAL_BOMB };
  return { color: getRandomColor(state), special: SPECIAL_NONE };
}

// === ./sound.js ===
// sound.js - Web Audio API synthesized sounds
let audioCtx = null;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function resumeAudio() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') ctx.resume();
}

function playTone(freq, duration, type = 'sine', volume = 0.3, detune = 0) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (detune) osc.detune.setValueAtTime(detune, ctx.currentTime);
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playNoise(duration, volume = 0.15) {
  const ctx = getCtx();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.setValueAtTime(3000, ctx.currentTime);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

function playShoot() {
  playTone(280, 0.12, 'triangle', 0.25);
  playTone(360, 0.08, 'sine', 0.15);
}

function playPop() {
  playTone(600, 0.15, 'sine', 0.2);
  playTone(900, 0.1, 'sine', 0.15);
  playNoise(0.06, 0.08);
}

function playCombo(comboLevel) {
  const baseFreq = 400 + comboLevel * 100;
  playTone(baseFreq, 0.2, 'sine', 0.25);
  setTimeout(() => playTone(baseFreq * 1.25, 0.15, 'sine', 0.2), 60);
  setTimeout(() => playTone(baseFreq * 1.5, 0.2, 'triangle', 0.2), 120);
}

function playFall() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

function playBomb() {
  playNoise(0.3, 0.25);
  playTone(80, 0.4, 'sawtooth', 0.2);
  playTone(60, 0.5, 'sine', 0.15);
}

function playLevelUp() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.25, 'sine', 0.2), i * 100);
  });
}

function playGameOver() {
  const notes = [400, 350, 300, 200];
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.4, 'triangle', 0.2), i * 150);
  });
}

// === ./effects.js ===
// effects.js - Particle effects for pops and falling bubbles

function createPopParticles(x, y, color, count = 12) {
  const particles = [];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 3 + Math.random() * 4,
      color,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      type: 'circle',
    });
  }
  return particles;
}

function createBombParticles(x, y, count = 30) {
  const particles = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    const colors = ['#FF4400', '#FF8800', '#FFCC00', '#FFFFFF'];
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.015 + Math.random() * 0.015,
      type: 'fire',
    });
  }
  return particles;
}

function createRainbowParticles(x, y, count = 16) {
  const particles = [];
  const rainbowColors = ['#FF0000', '#FF8800', '#FFFF00', '#00FF00', '#0088FF', '#8800FF'];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = 3 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 4 + Math.random() * 3,
      color: rainbowColors[i % rainbowColors.length],
      life: 1,
      decay: 0.02,
      type: 'star',
    });
  }
  return particles;
}

function updateParticles(particles, dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.1 * dt * 60; // gravity
    p.life -= p.decay * dt * 60;
    if (p.type === 'fire') {
      p.radius *= 0.98;
    }
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles(ctx, particles) {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.type === 'star') {
      drawStar(ctx, p.x, p.y, p.radius, p.color);
    } else if (p.type === 'ember') {
      // Soft glowing ember
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      // Outer glow
      ctx.globalAlpha = p.life * 0.25;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.globalAlpha = p.life;
    } else if (p.type === 'fire') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      // glow
      ctx.globalAlpha = p.life * 0.4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(ctx, x, y, r, color) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](x + Math.cos(angle) * r, y + Math.sin(angle) * r);
    const innerAngle = angle + Math.PI / 5;
    ctx.lineTo(x + Math.cos(innerAngle) * r * 0.4, y + Math.sin(innerAngle) * r * 0.4);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// Game over: dramatic explosion of dark red / orange / gold particles
function createGameOverParticles(cx, cy, count = 50) {
  const particles = [];
  const colors = ['#FF2200', '#FF4400', '#FF6600', '#FF8800', '#FFAA00', '#FFCC00', '#FF0044'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 6;
    particles.push({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy + (Math.random() - 0.5) * 60,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2, // bias upward
      radius: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.005 + Math.random() * 0.01,
      type: 'fire',
    });
  }
  return particles;
}

// Slow-floating ember particles that drift upward during game-over screen
function createGameOverEmbers(canvasW, canvasH, count = 20) {
  const particles = [];
  const colors = ['#FF4400', '#FF6600', '#FF8800', '#FFAA00', '#FF2200'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvasW,
      y: canvasH + Math.random() * 100,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(0.5 + Math.random() * 1.5),
      radius: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.003 + Math.random() * 0.005,
      type: 'ember',
    });
  }
  return particles;
}

function createPopAnimation(x, y, color) {
  return {
    x, y, color,
    radius: BUBBLE_RADIUS,
    maxRadius: BUBBLE_RADIUS * 1.8,
    life: 1,
    speed: 0.05,
  };
}

function updatePopAnimations(anims, dt) {
  for (let i = anims.length - 1; i >= 0; i--) {
    const a = anims[i];
    a.life -= a.speed * dt * 60;
    a.radius = BUBBLE_RADIUS + (a.maxRadius - BUBBLE_RADIUS) * (1 - a.life);
    if (a.life <= 0) anims.splice(i, 1);
  }
}

function drawPopAnimations(ctx, anims) {
  for (const a of anims) {
    ctx.globalAlpha = a.life * 0.6;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
    ctx.fillStyle = a.color;
    ctx.fill();
    ctx.globalAlpha = a.life * 0.3;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.radius * 1.4, 0, Math.PI * 2);
    ctx.strokeStyle = a.color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// === ./bubbles.js ===
// bubbles.js - Bubble grid, matching logic, shooting

// Get pixel position for a grid cell
function getCellPos(row, col) {
  const offset = row % 2 === 1 ? BUBBLE_RADIUS : 0;
  return {
    x: GRID_OFFSET_X + col * COL_WIDTH + offset,
    y: GRID_OFFSET_Y + row * ROW_HEIGHT,
  };
}

// Get nearest grid cell from pixel position
function getNearestCell(x, y) {
  const row = Math.round((y - GRID_OFFSET_Y) / ROW_HEIGHT);
  const offset = row % 2 === 1 ? BUBBLE_RADIUS : 0;
  const col = Math.round((x - GRID_OFFSET_X - offset) / COL_WIDTH);
  return { row, col };
}

// Initialize the grid with starting rows
function initGrid(state) {
  state.grid = [];
  for (let r = 0; r < 5; r++) {
    const row = [];
    const maxCols = r % 2 === 1 ? COLS - 1 : COLS;
    for (let c = 0; c < maxCols; c++) {
      row.push({
        color: getRandomColor(state),
        special: SPECIAL_NONE,
      });
    }
    state.grid.push(row);
  }
}

// Ensure grid has enough rows
function ensureRow(state, row) {
  while (state.grid.length <= row) {
    const r = state.grid.length;
    const maxCols = r % 2 === 1 ? COLS - 1 : COLS;
    const newRow = [];
    for (let c = 0; c < maxCols; c++) {
      newRow.push(null);
    }
    state.grid.push(newRow);
  }
}

// Get neighbors of a cell (hex grid)
function getNeighbors(row, col) {
  const neighbors = [];
  const even = row % 2 === 0;
  // Same row
  neighbors.push({ row, col: col - 1 });
  neighbors.push({ row, col: col + 1 });
  // Row above
  if (even) {
    neighbors.push({ row: row - 1, col: col - 1 });
    neighbors.push({ row: row - 1, col });
  } else {
    neighbors.push({ row: row - 1, col });
    neighbors.push({ row: row - 1, col: col + 1 });
  }
  // Row below
  if (even) {
    neighbors.push({ row: row + 1, col: col - 1 });
    neighbors.push({ row: row + 1, col });
  } else {
    neighbors.push({ row: row + 1, col });
    neighbors.push({ row: row + 1, col: col + 1 });
  }
  return neighbors.filter(n => {
    const maxCols = n.row % 2 === 1 ? COLS - 1 : COLS;
    return n.row >= 0 && n.col >= 0 && n.col < maxCols;
  });
}

// Get bubble at grid position
function getBubble(grid, row, col) {
  if (row < 0 || row >= grid.length) return null;
  if (!grid[row] || col < 0 || col >= grid[row].length) return null;
  return grid[row][col];
}

// Find connected same-color bubbles (flood fill)
function findMatchingCluster(grid, row, col) {
  const target = getBubble(grid, row, col);
  if (!target) return [];

  const visited = new Set();
  const cluster = [];
  const queue = [{ row, col }];

  while (queue.length > 0) {
    const { row: r, col: c } = queue.shift();
    const key = `${r},${c}`;
    if (visited.has(key)) continue;
    visited.add(key);

    const bubble = getBubble(grid, r, c);
    if (!bubble) continue;

    // Match check: same color or rainbow target or bubble is rainbow
    const isMatch = bubble.special === SPECIAL_RAINBOW ||
                    target.special === SPECIAL_RAINBOW ||
                    bubble.color === target.color;
    if (!isMatch) continue;

    cluster.push({ row: r, col: c });

    const neighbors = getNeighbors(r, c);
    for (const n of neighbors) {
      if (!visited.has(`${n.row},${n.col}`)) {
        queue.push(n);
      }
    }
  }
  return cluster;
}

// Find all bubbles connected to the top row
function findConnectedToTop(grid) {
  const connected = new Set();
  const queue = [];

  // Start from all bubbles in row 0
  if (grid[0]) {
    for (let c = 0; c < grid[0].length; c++) {
      if (grid[0][c]) {
        queue.push({ row: 0, col: c });
        connected.add(`0,${c}`);
      }
    }
  }

  while (queue.length > 0) {
    const { row, col } = queue.shift();
    const neighbors = getNeighbors(row, col);
    for (const n of neighbors) {
      const key = `${n.row},${n.col}`;
      if (connected.has(key)) continue;
      const bubble = getBubble(grid, n.row, n.col);
      if (bubble) {
        connected.add(key);
        queue.push(n);
      }
    }
  }
  return connected;
}

// Find bomb-affected area
function findBombArea(grid, row, col) {
  const area = [{ row, col }];
  const neighbors = getNeighbors(row, col);
  for (const n of neighbors) {
    if (getBubble(grid, n.row, n.col)) {
      area.push(n);
    }
  }
  return area;
}

// Place bubble and check for matches
function placeBubble(state, row, col) {
  ensureRow(state, row);
  const maxCols = row % 2 === 1 ? COLS - 1 : COLS;
  if (col < 0 || col >= maxCols) return { popped: 0, fallen: 0 };

  const flying = state.flying;
  state.grid[row][col] = {
    color: flying.color,
    special: flying.special,
  };

  let allToRemove = [];

  // Handle special bubbles
  if (flying.special === SPECIAL_BOMB) {
    const bombArea = findBombArea(state.grid, row, col);
    allToRemove = bombArea;
    // Add bomb particles
    const pos = getCellPos(row, col);
    state.particles.push(...createBombParticles(pos.x, pos.y));
    playBomb();
  } else if (flying.special === SPECIAL_RAINBOW) {
    // Rainbow matches all adjacent colors
    const cluster = findMatchingCluster(state.grid, row, col);
    if (cluster.length >= MIN_MATCH) {
      allToRemove = cluster;
    }
  } else {
    const cluster = findMatchingCluster(state.grid, row, col);
    if (cluster.length >= MIN_MATCH) {
      allToRemove = cluster;
    }
  }

  let poppedCount = 0;
  let fallenCount = 0;

  // Remove matched bubbles
  if (allToRemove.length > 0) {
    // Combo system
    const now = Date.now();
    if (now - state.lastPopTime < 2000) {
      state.combo++;
    } else {
      state.combo = 1;
    }
    state.lastPopTime = now;

    if (state.combo > 1) {
      playCombo(state.combo);
    }

    for (const cell of allToRemove) {
      const pos = getCellPos(cell.row, cell.col);
      const bubble = getBubble(state.grid, cell.row, cell.col);
      if (bubble) {
        if (bubble.special === SPECIAL_RAINBOW) {
          state.particles.push(...createRainbowParticles(pos.x, pos.y));
        } else {
          state.particles.push(...createPopParticles(pos.x, pos.y, bubble.color));
        }
        state.popAnimations.push(createPopAnimation(pos.x, pos.y, bubble.color));
      }
      state.grid[cell.row][cell.col] = null;
      poppedCount++;
    }

    playPop();

    // Calculate score with combo multiplier
    const comboMultiplier = Math.min(state.combo, 5);
    state.score += poppedCount * SCORE_POP * comboMultiplier;

    // Find and drop floating clusters
    const connected = findConnectedToTop(state.grid);
    for (let r = 0; r < state.grid.length; r++) {
      if (!state.grid[r]) continue;
      for (let c = 0; c < state.grid[r].length; c++) {
        const key = `${r},${c}`;
        if (state.grid[r][c] && !connected.has(key)) {
          const pos = getCellPos(r, c);
          state.fallingBubbles.push({
            x: pos.x,
            y: pos.y,
            color: state.grid[r][c].color,
            special: state.grid[r][c].special,
            vy: 0,
            radius: BUBBLE_RADIUS,
          });
          state.grid[r][c] = null;
          fallenCount++;
        }
      }
    }

    if (fallenCount > 0) {
      state.score += fallenCount * SCORE_FLOAT * comboMultiplier;
      playFall();
    }

    // Clean up empty rows from the bottom
    trimGrid(state);
  }

  return { popped: poppedCount, fallen: fallenCount };
}

// Remove empty trailing rows
function trimGrid(state) {
  while (state.grid.length > 0) {
    const lastRow = state.grid[state.grid.length - 1];
    if (!lastRow || lastRow.every(b => b === null)) {
      state.grid.pop();
    } else {
      break;
    }
  }
}

// Check if game over (bubbles too low)
function checkGameOver(state) {
  for (let r = 0; r < state.grid.length; r++) {
    if (!state.grid[r]) continue;
    for (let c = 0; c < state.grid[r].length; c++) {
      if (state.grid[r][c]) {
        const pos = getCellPos(r, c);
        if (pos.y + BUBBLE_RADIUS >= GAME_OVER_Y) {
          return true;
        }
      }
    }
  }
  return false;
}

// Add new row at the top
function addNewRow(state) {
  // Shift all rows down
  state.grid.unshift(null);
  // Create new top row
  const maxCols = 0 % 2 === 0 ? COLS : COLS - 1;
  const newRow = [];
  for (let c = 0; c < maxCols; c++) {
    newRow.push({
      color: getRandomColor(state),
      special: SPECIAL_NONE,
    });
  }
  state.grid[0] = newRow;
}

// Shoot bubble
function shootBubble(state) {
  if (state.flying || state.state !== 'playing') return;

  const shooter = state.shooter;
  state.flying = {
    x: shooter.x,
    y: shooter.y,
    vx: Math.cos(shooter.angle) * SHOOT_SPEED,
    vy: Math.sin(shooter.angle) * SHOOT_SPEED,
    color: shooter.current.color,
    special: shooter.current.special,
    radius: BUBBLE_RADIUS,
  };

  shooter.current = shooter.next;
  shooter.next = getRandomBubble(state);
}

// Update flying bubble
function updateFlying(state) {
  if (!state.flying) return null;

  const f = state.flying;
  f.x += f.vx;
  f.y += f.vy;

  // Wall bounce
  if (f.x - BUBBLE_RADIUS <= 0) {
    f.x = BUBBLE_RADIUS;
    f.vx = Math.abs(f.vx);
  }
  if (f.x + BUBBLE_RADIUS >= CANVAS_WIDTH) {
    f.x = CANVAS_WIDTH - BUBBLE_RADIUS;
    f.vx = -Math.abs(f.vx);
  }

  // Ceiling collision
  if (f.y - BUBBLE_RADIUS <= GRID_OFFSET_Y - ROW_HEIGHT) {
    const cell = getNearestCell(f.x, f.y);
    const result = placeBubble(state, cell.row, cell.col);
    state.flying = null;
    return result;
  }

  // Grid collision
  for (let r = 0; r < state.grid.length; r++) {
    if (!state.grid[r]) continue;
    for (let c = 0; c < state.grid[r].length; c++) {
      const bubble = state.grid[r][c];
      if (!bubble) continue;
      const pos = getCellPos(r, c);
      const dx = f.x - pos.x;
      const dy = f.y - pos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < BUBBLE_DIAMETER * 0.9) {
        const cell = getNearestCell(f.x, f.y);
        const result = placeBubble(state, cell.row, cell.col);
        state.flying = null;
        return result;
      }
    }
  }

  // Off screen safety
  if (f.y > CANVAS_HEIGHT + 50) {
    state.flying = null;
    return null;
  }

  return null;
}

// Update falling bubbles
function updateFallingBubbles(state, dt) {
  for (let i = state.fallingBubbles.length - 1; i >= 0; i--) {
    const b = state.fallingBubbles[i];
    b.vy += 0.5 * dt * 60;
    b.y += b.vy * dt * 60;
    b.radius *= 0.99;
    if (b.y > CANVAS_HEIGHT + 50 || b.radius < 1) {
      state.fallingBubbles.splice(i, 1);
    }
  }
}

// Get trajectory points for aiming line
function getTrajectory(state, maxLength = 300) {
  const shooter = state.shooter;
  let x = shooter.x;
  let y = shooter.y;
  let vx = Math.cos(shooter.angle) * 4;
  let vy = Math.sin(shooter.angle) * 4;
  const points = [{ x, y }];
  let dist = 0;

  while (dist < maxLength) {
    x += vx;
    y += vy;
    dist += 4;

    // Wall bounce
    if (x - BUBBLE_RADIUS <= 0) { x = BUBBLE_RADIUS; vx = Math.abs(vx); }
    if (x + BUBBLE_RADIUS >= CANVAS_WIDTH) { x = CANVAS_WIDTH - BUBBLE_RADIUS; vx = -Math.abs(vx); }

    // Hit top
    if (y <= GRID_OFFSET_Y) break;

    // Hit a bubble
    let hit = false;
    for (let r = 0; r < state.grid.length; r++) {
      if (!state.grid[r]) continue;
      for (let c = 0; c < state.grid[r].length; c++) {
        if (!state.grid[r][c]) continue;
        const pos = getCellPos(r, c);
        const dx = x - pos.x;
        const dy = y - pos.y;
        if (Math.sqrt(dx * dx + dy * dy) < BUBBLE_DIAMETER * 0.9) {
          hit = true;
          break;
        }
      }
      if (hit) break;
    }
    if (hit) break;

    points.push({ x, y });
  }
  points.push({ x, y });
  return points;
}

// Draw a single bubble
function drawBubble(ctx, x, y, color, special, radius = BUBBLE_RADIUS, alpha = 1) {
  ctx.globalAlpha = alpha;

  // Main circle
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);

  if (special === SPECIAL_RAINBOW) {
    // Rainbow gradient
    const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.3, '#FF88FF');
    grad.addColorStop(0.6, '#8888FF');
    grad.addColorStop(1, '#88FFFF');
    ctx.fillStyle = grad;
  } else if (special === SPECIAL_BOMB) {
    // Bomb bubble - dark with red glow
    const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
    grad.addColorStop(0, '#666666');
    grad.addColorStop(0.7, '#333333');
    grad.addColorStop(1, '#111111');
    ctx.fillStyle = grad;
  } else {
    // Normal bubble with gradient
    const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
    grad.addColorStop(0, lightenColor(color, 60));
    grad.addColorStop(0.7, color);
    grad.addColorStop(1, darkenColor(color, 40));
    ctx.fillStyle = grad;
  }
  ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.arc(x - radius * 0.25, y - radius * 0.25, radius * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 255, 255, ${0.4 * alpha})`;
  ctx.fill();

  // Special icons
  if (special === SPECIAL_BOMB) {
    // Bomb icon - explosion symbol
    ctx.fillStyle = `rgba(255, 60, 60, ${alpha})`;
    ctx.font = `bold ${radius}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('*', x, y);
  } else if (special === SPECIAL_RAINBOW) {
    // Rainbow icon
    ctx.fillStyle = `rgba(255, 255, 255, ${0.9 * alpha})`;
    ctx.font = `bold ${radius * 0.9}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', x, y);
  }

  ctx.globalAlpha = 1;
}

function lightenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xFF) + amount);
  const b = Math.min(255, (num & 0xFF) + amount);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - amount);
  const g = Math.max(0, ((num >> 8) & 0xFF) - amount);
  const b = Math.max(0, (num & 0xFF) - amount);
  return `rgb(${r},${g},${b})`;
}

// Draw the grid
function drawGrid(ctx, state) {
  for (let r = 0; r < state.grid.length; r++) {
    if (!state.grid[r]) continue;
    for (let c = 0; c < state.grid[r].length; c++) {
      const bubble = state.grid[r][c];
      if (!bubble) continue;
      const pos = getCellPos(r, c);
      drawBubble(ctx, pos.x, pos.y, bubble.color, bubble.special);
    }
  }
}

// Draw falling bubbles
function drawFallingBubbles(ctx, state) {
  for (const b of state.fallingBubbles) {
    drawBubble(ctx, b.x, b.y, b.color, b.special, b.radius, 0.7);
  }
}

// Draw the shooter
function drawShooter(ctx, state) {
  const shooter = state.shooter;

  // Draw trajectory line
  if (state.state === 'playing' && !state.flying) {
    const points = getTrajectory(state);
    ctx.beginPath();
    ctx.setLineDash([6, 6]);
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw aiming arrow
  if (state.state === 'playing') {
    const arrowLen = 40;
    const ax = shooter.x + Math.cos(shooter.angle) * arrowLen;
    const ay = shooter.y + Math.sin(shooter.angle) * arrowLen;
    ctx.beginPath();
    ctx.moveTo(shooter.x, shooter.y);
    ctx.lineTo(ax, ay);
    ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Arrow head
    const headLen = 10;
    const headAngle = 0.4;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(
      ax - Math.cos(shooter.angle - headAngle) * headLen,
      ay - Math.sin(shooter.angle - headAngle) * headLen
    );
    ctx.moveTo(ax, ay);
    ctx.lineTo(
      ax - Math.cos(shooter.angle + headAngle) * headLen,
      ay - Math.sin(shooter.angle + headAngle) * headLen
    );
    ctx.stroke();
  }

  // Draw current bubble
  if (shooter.current) {
    drawBubble(ctx, shooter.x, shooter.y, shooter.current.color, shooter.current.special);
  }

  // Draw next bubble preview
  if (shooter.next) {
    ctx.globalAlpha = 0.7;
    drawBubble(ctx, shooter.x + 50, shooter.y + 10, shooter.next.color, shooter.next.special, BUBBLE_RADIUS * 0.7);
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('下一个', shooter.x + 50, shooter.y + 30);
  }

  // Draw flying bubble
  if (state.flying) {
    const f = state.flying;
    // Trail
    ctx.beginPath();
    ctx.arc(f.x, f.y, BUBBLE_RADIUS + 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();
    drawBubble(ctx, f.x, f.y, f.color, f.special);
  }
}

// ui.js - HUD, menus, overlays

function drawHUD(ctx, state) {
  // Top bar background
  const grad = ctx.createLinearGradient(0, 0, 0, 50);
  grad.addColorStop(0, 'rgba(0,0,0,0.6)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_WIDTH, 55);

  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 22px "Microsoft YaHei", Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`分数: ${state.score}`, 15, 30);

  // Level
  ctx.fillStyle = '#FF8800';
  ctx.font = 'bold 18px "Microsoft YaHei", Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`第 ${state.level} 关`, CANVAS_WIDTH / 2, 30);

  // Combo
  if (state.combo > 1) {
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 24px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    const comboAlpha = 0.5 + Math.sin(Date.now() / 150) * 0.5;
    ctx.globalAlpha = comboAlpha;
    ctx.fillText(`${state.combo}x 连击!`, CANVAS_WIDTH / 2, 52);
    ctx.globalAlpha = 1;
  }

  // High score
  ctx.fillStyle = '#AAA';
  ctx.font = '14px "Microsoft YaHei", Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`最高: ${state.highScore}`, CANVAS_WIDTH - 15, 28);

  // Bottom line (danger zone)
  ctx.beginPath();
  ctx.setLineDash([8, 4]);
  ctx.moveTo(0, GAME_OVER_Y);
  ctx.lineTo(CANVAS_WIDTH, GAME_OVER_Y);
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.setLineDash([]);

  // Danger zone gradient
  const dangerGrad = ctx.createLinearGradient(0, GAME_OVER_Y, 0, CANVAS_HEIGHT);
  dangerGrad.addColorStop(0, 'rgba(255, 0, 0, 0)');
  dangerGrad.addColorStop(1, 'rgba(255, 0, 0, 0.08)');
  ctx.fillStyle = dangerGrad;
  ctx.fillRect(0, GAME_OVER_Y, CANVAS_WIDTH, CANVAS_HEIGHT - GAME_OVER_Y);

  // Color legend at bottom
  ctx.globalAlpha = 0.5;
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.textAlign = 'center';
  const legendY = CANVAS_HEIGHT - 15;
  const activeColors = BUBBLE_COLORS.slice(0, state.colorCount);
  const spacing = CANVAS_WIDTH / (activeColors.length + 1);
  activeColors.forEach((color, i) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(spacing * (i + 1), legendY - 5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.fillText(BUBBLE_COLOR_NAMES[i], spacing * (i + 1), legendY + 10);
  });
  ctx.globalAlpha = 1;
}

function drawBackground(ctx) {
  // Dark gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_WIDTH; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, CANVAS_HEIGHT);
    ctx.stroke();
  }
  for (let y = 0; y < CANVAS_HEIGHT; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CANVAS_WIDTH, y);
    ctx.stroke();
  }
}

function drawGameOverOverlay(ctx, state, timer) {
  const t = timer || 0;
  const fadeDuration = 0.8;
  const overlayAlpha = Math.min(0.85, (t / fadeDuration) * 0.85);
  const flashAlpha = t < 0.3 ? Math.max(0, (0.3 - t) / 0.3) * 0.35 : 0;

  // Dark overlay with fade-in
  ctx.globalAlpha = overlayAlpha;
  ctx.fillStyle = '#0a0008';
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  ctx.globalAlpha = 1;

  // Red flash burst (brief)
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    const flashGrad = ctx.createRadialGradient(
      CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, 0,
      CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, CANVAS_WIDTH * 0.7
    );
    flashGrad.addColorStop(0, '#FF2200');
    flashGrad.addColorStop(0.6, '#880000');
    flashGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flashGrad;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.globalAlpha = 1;
  }

  // Dark vignette (always on after overlay fades in)
  if (overlayAlpha > 0.3) {
    const vigAlpha = Math.min(0.5, (overlayAlpha - 0.3) * 0.8);
    ctx.globalAlpha = vigAlpha;
    const vignette = ctx.createRadialGradient(
      CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, CANVAS_WIDTH * 0.15,
      CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, CANVAS_WIDTH * 0.65
    );
    vignette.addColorStop(0, 'transparent');
    vignette.addColorStop(1, '#000000');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.globalAlpha = 1;
  }

  // === Staggered content: each element fades in with a delay ===

  // Glass panel (appears at t=0.2)
  const panelAlpha = clamp01((t - 0.2) / 0.4);
  if (panelAlpha > 0) {
    ctx.globalAlpha = panelAlpha;
    drawGlassPanel(ctx, CANVAS_WIDTH / 2 - 170, 140, 340, 380);
    ctx.globalAlpha = 1;
  }

  // "游戏结束" title (appears at t=0.3, slides down)
  const titleAlpha = clamp01((t - 0.3) / 0.4);
  if (titleAlpha > 0) {
    const titleSlide = (1 - titleAlpha) * -30;
    ctx.globalAlpha = titleAlpha;
    ctx.fillStyle = '#FF3333';
    ctx.font = 'bold 48px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', CANVAS_WIDTH / 2, 220 + titleSlide);

    // Red glow behind title
    ctx.globalAlpha = titleAlpha * 0.15;
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 30;
    ctx.fillText('游戏结束', CANVAS_WIDTH / 2, 220 + titleSlide);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Score label (appears at t=0.5)
  const scoreLabelAlpha = clamp01((t - 0.5) / 0.3);
  if (scoreLabelAlpha > 0) {
    ctx.globalAlpha = scoreLabelAlpha;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.fillText('最终得分', CANVAS_WIDTH / 2, 275);
    ctx.globalAlpha = 1;
  }

  // Score number (appears at t=0.6, scales up)
  const scoreAlpha = clamp01((t - 0.6) / 0.35);
  if (scoreAlpha > 0) {
    const scaleUp = 0.5 + scoreAlpha * 0.5; // scales from 0.5 to 1.0
    ctx.save();
    ctx.globalAlpha = scoreAlpha;
    ctx.translate(CANVAS_WIDTH / 2, 325);
    ctx.scale(scaleUp, scaleUp);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 44px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`${state.score}`, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Level reached (appears at t=0.75)
  const levelAlpha = clamp01((t - 0.75) / 0.3);
  if (levelAlpha > 0) {
    ctx.globalAlpha = levelAlpha;
    ctx.fillStyle = '#FF8800';
    ctx.font = '18px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`到达第 ${state.level} 关`, CANVAS_WIDTH / 2, 365);
    ctx.globalAlpha = 1;
  }

  // High score / New record (appears at t=0.9)
  const hsAlpha = clamp01((t - 0.9) / 0.3);
  if (hsAlpha > 0) {
    ctx.globalAlpha = hsAlpha;
    if (state.score >= state.highScore && state.score > 0) {
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 22px "Microsoft YaHei", Arial';
      const pulse = 0.6 + Math.sin(Date.now() / 200) * 0.4;
      ctx.globalAlpha = hsAlpha * pulse;
      ctx.fillText('新纪录!', CANVAS_WIDTH / 2, 400);
    } else {
      ctx.fillStyle = '#888';
      ctx.font = '16px "Microsoft YaHei", Arial';
      ctx.fillText(`最高分: ${state.highScore}`, CANVAS_WIDTH / 2, 400);
    }
    ctx.globalAlpha = 1;
  }

  // Restart button (appears at t=1.2, with glow pulse)
  const btnAlpha = clamp01((t - 1.2) / 0.4);
  if (btnAlpha > 0) {
    const btnX = CANVAS_WIDTH / 2 - 80;
    const btnY = 430;
    const btnW = 160;
    const btnH = 50;
    const glowPulse = 0.4 + Math.sin(Date.now() / 400) * 0.3;

    // Outer glow
    ctx.globalAlpha = btnAlpha * glowPulse;
    ctx.shadowColor = '#FF6600';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.roundRect(btnX - 3, btnY - 3, btnW + 6, btnH + 6, 14);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Button body
    ctx.globalAlpha = btnAlpha;
    const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
    btnGrad.addColorStop(0, '#FF7700');
    btnGrad.addColorStop(1, '#CC3300');
    ctx.fillStyle = btnGrad;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 12);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 22px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.fillText('重新开始', CANVAS_WIDTH / 2, btnY + 33);
    ctx.globalAlpha = 1;
  }
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function drawGlassPanel(ctx, x, y, w, h) {
  ctx.fillStyle = 'rgba(20, 30, 60, 0.7)';
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 16);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 16);
  ctx.stroke();
}

// Level up notification
function drawLevelUpNotice(ctx, timer) {
  if (timer <= 0) return;
  const alpha = Math.min(1, timer / 500);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px "Microsoft YaHei", Arial';
  ctx.textAlign = 'center';
  const y = CANVAS_HEIGHT / 2 - 50 - (1 - alpha) * 30;
  ctx.fillText(`第 ${Math.floor(timer / 1000) + 2} 关!`, CANVAS_WIDTH / 2, y);
  ctx.globalAlpha = 1;
}

// === main.js ===
// main.js - Game loop, init, events

let canvas, ctx;
let state;
let lastTime = 0;
let levelUpTimer = 0;
let mouseX = 0, mouseY = 0;
let startBtnRect, overBtnRect;
let newRowCooldown = 0;

function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;

  state = createGameState();

  // Event listeners
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onClick);
  canvas.addEventListener('touchstart', onTouch, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });

  // Calculate button rects
  startBtnRect = { x: CANVAS_WIDTH / 2 - 90, y: 280, w: 180, h: 55 };
  overBtnRect = { x: CANVAS_WIDTH / 2 - 80, y: 430, w: 160, h: 50 };

  // Start game loop
  requestAnimationFrame(gameLoop);
}

function startGame() {
  state = createGameState();
  state.state = 'playing';
  state.colorCount = 4;
  initGrid(state);
  state.shooter.current = getRandomBubble(state);
  state.shooter.next = getRandomBubble(state);
  newRowCooldown = 10000; // 10 seconds before first new row
  levelUpTimer = 0;
  gameOverEmberCooldown = 0;
  resumeAudio();
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_WIDTH / rect.width;
  const scaleY = CANVAS_HEIGHT / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;

  if (state.state === 'playing' && !state.flying) {
    const dx = mouseX - state.shooter.x;
    const dy = mouseY - state.shooter.y;
    let angle = Math.atan2(dy, dx);
    // Clamp angle to upward
    if (angle > -0.15) angle = -0.15;
    if (angle < -Math.PI + 0.15) angle = -Math.PI + 0.15;
    state.shooter.angle = angle;
  }
}

function onClick(e) {
  resumeAudio();
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_WIDTH / rect.width;
  const scaleY = CANVAS_HEIGHT / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  if (state.state === 'menu') {
    if (isInRect(cx, cy, startBtnRect)) {
      startGame();
    }
  } else if (state.state === 'gameover') {
    if (isInRect(cx, cy, overBtnRect)) {
      startGame();
    }
  } else if (state.state === 'playing') {
    if (!state.flying) {
      shootBubble(state);
      playShoot();
    }
  }
}

function onTouch(e) {
  e.preventDefault();
  if (e.touches.length > 0) {
    const touch = e.touches[0];
    const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
    onMouseMove(fakeEvent);
    onClick(fakeEvent);
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length > 0) {
    const touch = e.touches[0];
    onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
  }
}

function isInRect(x, y, rect) {
  return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // Cap dt
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

let gameOverEmberCooldown = 0;

function update(dt) {
  // Always update particles (so game-over embers keep rendering)
  updateParticles(state.particles, dt);
  updatePopAnimations(state.popAnimations, dt);

  if (state.state === 'gameover') {
    state.gameOverTimer += dt;
    // Spawn ember particles periodically during game over
    gameOverEmberCooldown -= dt;
    if (gameOverEmberCooldown <= 0) {
      state.particles.push(...createGameOverEmbers(CANVAS_WIDTH, CANVAS_HEIGHT, 3));
      gameOverEmberCooldown = 0.4 + Math.random() * 0.3;
    }
    return;
  }

  if (state.state !== 'playing') return;

  // Update flying bubble
  const result = updateFlying(state);
  if (result && (result.popped > 0 || result.fallen > 0)) {
    // Check level progression
    checkLevelUp();
  }

  // Update falling bubbles
  updateFallingBubbles(state, dt);

  // New row timer
  newRowCooldown -= dt * 1000;
  if (newRowCooldown <= 0) {
    addNewRow(state);
    newRowCooldown = Math.max(4000, 10000 - state.level * 500);
    // Check if new row causes game over
    if (checkGameOver(state)) {
      gameOver();
    }
  }

  // Level up timer
  if (levelUpTimer > 0) {
    levelUpTimer -= dt * 1000;
  }

  // Check game over
  if (checkGameOver(state)) {
    gameOver();
  }

  // Shake timer
  if (state.shakeTimer > 0) {
    state.shakeTimer -= dt * 1000;
  }
}

function checkLevelUp() {
  const newLevel = Math.floor(state.score / 200) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
    state.colorCount = Math.min(6, 4 + Math.floor((state.level - 1) / 2));
    levelUpTimer = 2000;
    playLevelUp();
  }
}

function gameOver() {
  state.state = 'gameover';
  state.gameOverTimer = 0;
  if (state.score > state.highScore) {
    state.highScore = state.score;
    localStorage.setItem('bubbleShooterHighScore', String(state.score));
  }
  // Spawn dramatic burst particles at center
  state.particles.push(...createGameOverParticles(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40, 60));
  playGameOver();
}

function render() {
  ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  // Apply shake
  if (state.shakeTimer > 0) {
    const intensity = state.shakeTimer / 100;
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }

  drawBackground(ctx);

  if (state.state === 'playing' || state.state === 'gameover') {
    drawGrid(ctx, state);
    drawFallingBubbles(ctx, state);
    drawPopAnimations(ctx, state.popAnimations);
    drawShooter(ctx, state);
    drawParticles(ctx, state.particles);
    drawHUD(ctx, state);

    if (levelUpTimer > 0) {
      drawLevelUpNotice();
    }
  }

  if (state.shakeTimer > 0) {
    ctx.restore();
  }

  if (state.state === 'menu') {
    drawBackground(ctx);
    drawStartOverlay(ctx, state);
  }

  if (state.state === 'gameover') {
    drawGameOverOverlay(ctx, state, state.gameOverTimer);
    // Draw ember particles on top of the overlay
    drawParticles(ctx, state.particles);
  }
}

function drawLevelUpNotice() {
  const alpha = Math.min(1, levelUpTimer / 500);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px "Microsoft YaHei", Arial';
  ctx.textAlign = 'center';
  const y = CANVAS_HEIGHT / 2 - 50;
  ctx.fillText(`第 ${state.level} 关!`, CANVAS_WIDTH / 2, y);
  ctx.fillStyle = '#FFA500';
  ctx.font = '18px "Microsoft YaHei", Arial';
  ctx.fillText('难度提升!', CANVAS_WIDTH / 2, y + 35);
  ctx.globalAlpha = 1;
}

// Expose startGame for HTML onclick
window.startGame = startGame;

// Initialize when DOM is ready
init();;


</script>

</body>
