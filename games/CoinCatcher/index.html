<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>接金币 - Coin Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(255, 143, 0, 0.15), 0 0 80px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        @media (max-width: 820px) {
            #gameCanvas {
                width: 100vw;
                height: auto;
                border-radius: 0;
            }
        }

        @media (max-height: 620px) and (min-width: 820px) {
            #gameCanvas {
                height: 100vh;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (Array.isArray(radii) ? radii[0] : 0);
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.arcTo(x + w, y, x + w, y + r, r);
                this.lineTo(x + w, y + h - r);
                this.arcTo(x + w, y + h, x + w - r, y + h, r);
                this.lineTo(x + r, y + h);
                this.arcTo(x, y + h, x, y + h - r, r);
                this.lineTo(x, y + r);
                this.arcTo(x, y, x + r, y, r);
                this.closePath();
                return this;
            };
        }
    </script>
    <script type="module">
        import { startGame } from './js/main.js';

        window.startGame = startGame;

        // Auto-start on load
        startGame();
    </script>

</body>
</html>
