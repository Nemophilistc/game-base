// ============================================================
// ui.js - UI系统（手牌渲染、战斗动画、地图显示、商店界面）
// ============================================================


class UI {
    constructor() {
        this.cardCanvas = null;
        this.cardCtx = null;
        this.hoveredCardIndex = -1;
        this.hoveredEnemyIndex = -1;
        this.screenShake = 0;
        this.floatingTexts = [];
        this.cardWidth = 120;
        this.cardHeight = 170;
    }

    // 初始化Canvas
    initCardCanvas(canvas) {
        this.cardCanvas = canvas;
        this.cardCtx = canvas.getContext('2d');
    }

    // ---- 手牌渲染 ----
    drawHand(hand, energy, playableCheck) {
        if (!this.cardCtx) return;
        const ctx = this.cardCtx;
        const canvas = this.cardCanvas;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!hand || hand.length === 0) return;

        const cardW = this.cardWidth;
        const cardH = this.cardHeight;
        const gap = 10;
        const totalW = hand.length * (cardW + gap) - gap;
        const startX = (canvas.width - totalW) / 2;
        const y = 10;

        hand.forEach((cardId, i) => {
            const def = CARD_DEFS[cardId];
            if (!def) return;

            const x = startX + i * (cardW + gap);
            const isHovered = i === this.hoveredCardIndex;
            const isPlayable = playableCheck ? playableCheck(cardId) : def.cost <= energy;

            // 悬停时卡牌上移
            const drawY = isHovered ? y - 20 : y;

            cardSystem.drawCard(ctx, cardId, x, drawY, cardW, cardH, {
                selected: false,
                playable: isPlayable,
                hovered: isHovered,
            });
        });
    }

    // 获取悬停的手牌索引
    getHoveredCardIndex(mouseX, mouseY, handLength, canvasWidth) {
        const cardW = this.cardWidth;
        const cardH = this.cardHeight;
        const gap = 10;
        const totalW = handLength * (cardW + gap) - gap;
        const startX = (canvasWidth - totalW) / 2;
        const y = 10;

        for (let i = 0; i < handLength; i++) {
            const x = startX + i * (cardW + gap);
            const drawY = i === this.hoveredCardIndex ? y - 20 : y;
            if (mouseX >= x && mouseX <= x + cardW && mouseY >= drawY && mouseY <= drawY + cardH) {
                return i;
            }
        }
        return -1;
    }

    // ---- 敌人渲染 ----
    drawEnemies(ctx, enemies, x, y, width, hoveredEnemyIndex = -1) {
        if (!enemies || enemies.length === 0) return;

        const enemyW = 140;
        const gap = 20;
        const totalW = enemies.length * (enemyW + gap) - gap;
        const startX = x + (width - totalW) / 2;

        enemies.forEach((enemy, i) => {
            if (!enemy.isAlive()) return;

            const ex = startX + i * (enemyW + gap);
            const ey = y;
            const isHovered = i === hoveredEnemyIndex;

            this.drawEnemy(ctx, enemy, ex, ey, enemyW, 160, isHovered);
        });
    }

    // 绘制单个敌人
    drawEnemy(ctx, enemy, x, y, w, h, isHovered) {
        ctx.save();

        // 阴影
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 3;

        // 敌人背景
        cardSystem.drawRoundedRect(ctx, x, y, w, h, 10);
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        // 边框
        cardSystem.drawRoundedRect(ctx, x, y, w, h, 10);
        ctx.strokeStyle = isHovered ? '#e74c3c' : '#4a5568';
        ctx.lineWidth = isHovered ? 2 : 1;
        ctx.stroke();

        // Emoji
        ctx.font = '40px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(enemy.emoji, x + w / 2, y + 40);

        // 名字
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ecf0f1';
        ctx.fillText(enemy.name, x + w / 2, y + 70);

        // HP条
        const hpBarX = x + 10;
        const hpBarY = y + 82;
        const hpBarW = w - 20;
        const hpBarH = 12;
        const hpPercent = enemy.hp / enemy.maxHp;

        // HP条背景
        cardSystem.drawRoundedRect(ctx, hpBarX, hpBarY, hpBarW, hpBarH, 4);
        ctx.fillStyle = '#2d3748';
        ctx.fill();

        // HP条
        cardSystem.drawRoundedRect(ctx, hpBarX, hpBarY, hpBarW * hpPercent, hpBarH, 4);
        const hpColor = hpPercent > 0.5 ? '#e74c3c' : hpPercent > 0.25 ? '#e67e22' : '#c0392b';
        ctx.fillStyle = hpColor;
        ctx.fill();

        // HP数字
        ctx.font = '10px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(`${enemy.hp}/${enemy.maxHp}`, x + w / 2, hpBarY + hpBarH / 2);

        // 护甲
        if (enemy.armor > 0) {
            ctx.font = '12px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = COLORS.ARMOR_COLOR;
            ctx.fillText(`🛡${enemy.armor}`, x + w / 2, hpBarY + hpBarH + 14);
        }

        // 意图
        const intent = enemy.getIntentDisplay();
        const intentY = y + h - 25;
        ctx.font = '16px serif';
        ctx.fillText(intent.emoji, x + w / 2 - 20, intentY);
        ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
        const intentColors = {
            attack: '#e74c3c',
            defend: '#3498db',
            buff: '#27ae60',
            debuff: '#9b59b6',
            attack_defend: '#e67e22',
            special: '#e74c3c',
        };
        ctx.fillStyle = intentColors[intent.type] || '#fff';
        ctx.fillText(intent.text, x + w / 2 + 10, intentY);

        // 状态效果
        this.drawStatuses(ctx, enemy.statuses, x + w / 2, y + h - 8, true);

        ctx.restore();
    }

    // 绘制状态效果
    drawStatuses(ctx, statuses, cx, y, small = false) {
        const statusKeys = Object.keys(statuses).filter(k => statuses[k] > 0);
        if (statusKeys.length === 0) return;

        const fontSize = small ? 10 : 12;
        const gap = small ? 30 : 35;
        const startX = cx - (statusKeys.length - 1) * gap / 2;

        ctx.font = `${fontSize}px "Microsoft YaHei", sans-serif`;
        ctx.textAlign = 'center';

        statusKeys.forEach((status, i) => {
            const sx = startX + i * gap;
            const emoji = STATUS_EMOJI[status] || '?';
            ctx.font = `${fontSize + 2}px serif`;
            ctx.fillText(emoji, sx, y);
            ctx.font = `bold ${fontSize}px "Microsoft YaHei", sans-serif`;
            ctx.fillStyle = '#f1c40f';
            ctx.fillText(statuses[status].toString(), sx + 12, y);
        });
    }

    // ---- 玩家信息渲染 ----
    drawPlayerInfo(ctx, player, x, y, width) {
        ctx.save();

        // 背景
        cardSystem.drawRoundedRect(ctx, x, y, width, 90, 8);
        const grad = ctx.createLinearGradient(x, y, x, y + 90);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fill();
        cardSystem.drawRoundedRect(ctx, x, y, width, 90, 8);
        ctx.strokeStyle = '#4a5568';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 角色Emoji
        ctx.font = '30px serif';
        ctx.textAlign = 'left';
        ctx.fillText('🧙', x + 10, y + 35);

        // HP条
        const hpBarX = x + 50;
        const hpBarY = y + 12;
        const hpBarW = width - 140;
        const hpBarH = 16;
        const hpPercent = player.hp / player.maxHp;

        ctx.fillStyle = '#2d3748';
        cardSystem.drawRoundedRect(ctx, hpBarX, hpBarY, hpBarW, hpBarH, 5);
        ctx.fill();

        cardSystem.drawRoundedRect(ctx, hpBarX, hpBarY, hpBarW * hpPercent, hpBarH, 5);
        ctx.fillStyle = COLORS.HP_BAR;
        ctx.fill();

        // HP数字
        ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.fillText(`${player.hp}/${player.maxHp}`, hpBarX + hpBarW / 2, hpBarY + hpBarH / 2 + 4);

        // 能量
        ctx.textAlign = 'left';
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = COLORS.ENERGY_COLOR;
        ctx.fillText(`⚡${player.energy}/${player.maxEnergy}`, x + 50, y + 48);

        // 护甲
        if (player.armor > 0) {
            ctx.fillStyle = COLORS.ARMOR_COLOR;
            ctx.fillText(`🛡${player.armor}`, x + 130, y + 48);
        }

        // 金币
        ctx.fillStyle = COLORS.GOLD_COLOR;
        ctx.fillText(`💰${player.gold}`, x + 200, y + 48);

        // 抽牌堆/弃牌堆
        ctx.fillStyle = '#95a5a6';
        ctx.font = '11px "Microsoft YaHei", sans-serif';
        ctx.fillText(`抽牌堆: ${player.drawPile.length}`, x + 50, y + 68);
        ctx.fillText(`弃牌堆: ${player.discardPile.length}`, x + 150, y + 68);

        // 药水栏
        const potionX = x + width - 90;
        ctx.font = '12px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillText('药水:', potionX - 5, y + 20);
        player.potions.forEach((pId, i) => {
            const potion = POTIONS[pId];
            if (potion) {
                ctx.font = '18px serif';
                ctx.fillText('🧪', potionX + i * 25, y + 42);
                ctx.font = '8px "Microsoft YaHei", sans-serif';
                ctx.fillStyle = potion.color;
                ctx.fillText(potion.name.substring(0, 2), potionX + i * 25, y + 56);
            }
        });

        // 玩家状态
        this.drawStatuses(ctx, player.statuses, x + width / 2, y + 82);

        ctx.restore();
    }

    // ---- 浮动文字 ----
    addFloatingText(text, x, y, color = '#fff', duration = 1000) {
        this.floatingTexts.push({
            text, x, y, color, duration,
            startTime: Date.now(),
            startY: y,
        });
    }

    drawFloatingTexts(ctx) {
        const now = Date.now();
        this.floatingTexts = this.floatingTexts.filter(ft => {
            const elapsed = now - ft.startTime;
            if (elapsed > ft.duration) return false;

            const progress = elapsed / ft.duration;
            const alpha = 1 - progress;
            const offsetY = -40 * progress;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = ft.color;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeText(ft.text, ft.x, ft.y + offsetY);
            ctx.fillText(ft.text, ft.x, ft.y + offsetY);
            ctx.restore();

            return true;
        });
    }

    // ---- 商店界面 ----
    drawShop(ctx, shopCards, player, width, height, hoveredShopItem = -1) {
        ctx.save();

        // 标题
        ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = COLORS.GOLD_COLOR;
        ctx.textAlign = 'center';
        ctx.fillText('🛒 商店', width / 2, 40);

        // 金币
        ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = COLORS.GOLD_COLOR;
        ctx.fillText(`💰 ${player.gold}`, width / 2, 65);

        // 卡牌商品
        const cardW = 120;
        const cardH = 170;
        const gap = 20;
        const startX = (width - (shopCards.length * (cardW + gap) - gap)) / 2;

        shopCards.forEach((cardId, i) => {
            const def = CARD_DEFS[cardId];
            if (!def) return;

            const x = startX + i * (cardW + gap);
            const y = 90;
            const isHovered = i === hoveredShopItem;
            const price = this.getCardPrice(def.rarity);
            const canAfford = player.gold >= price;

            cardSystem.drawCard(ctx, cardId, x, y, cardW, cardH, {
                selected: false,
                playable: canAfford,
                hovered: isHovered,
            });

            // 价格标签
            ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = canAfford ? COLORS.GOLD_COLOR : '#e74c3c';
            ctx.fillText(`💰${price}`, x + cardW / 2, y + cardH + 18);
        });

        // 移除卡牌选项
        const removeY = 290;
        const removeHovered = hoveredShopItem === shopCards.length;
        cardSystem.drawRoundedRect(ctx, width / 2 - 100, removeY, 200, 40, 8);
        ctx.fillStyle = removeHovered ? '#c0392b' : '#922b21';
        ctx.fill();
        cardSystem.drawRoundedRect(ctx, width / 2 - 100, removeY, 200, 40, 8);
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(`移除卡牌 (💰${SHOP_PRICES.REMOVE_CARD})`, width / 2, removeY + 25);

        // 药水商品
        const potionY = 350;
        ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ecf0f1';
        ctx.fillText('药水', width / 2, potionY);

        const potionIds = Object.keys(POTIONS);
        const potionStartX = (width - (3 * 80)) / 2;
        for (let i = 0; i < 3; i++) {
            const pId = potionIds[i % potionIds.length];
            const potion = POTIONS[pId];
            const px = potionStartX + i * 80;
            const py = potionY + 15;
            const pHovered = hoveredShopItem === shopCards.length + 1 + i;
            const canBuy = player.gold >= SHOP_PRICES.POTION && player.potions.length < GAME_CONFIG.POTION_SLOTS;

            cardSystem.drawRoundedRect(ctx, px, py, 70, 50, 6);
            ctx.fillStyle = pHovered ? '#2c3e50' : '#1a1a2e';
            ctx.fill();
            cardSystem.drawRoundedRect(ctx, px, py, 70, 50, 6);
            ctx.strokeStyle = canBuy ? potion.color : '#4a5568';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.font = '20px serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('🧪', px + 35, py + 22);

            ctx.font = '10px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = potion.color;
            ctx.fillText(potion.name, px + 35, py + 38);
            ctx.fillStyle = canBuy ? COLORS.GOLD_COLOR : '#e74c3c';
            ctx.fillText(`💰${SHOP_PRICES.POTION}`, px + 35, py + 48);
        }

        // 返回按钮
        const btnY = height - 60;
        const btnHovered = hoveredShopItem === -2;
        cardSystem.drawRoundedRect(ctx, width / 2 - 60, btnY, 120, 40, 8);
        ctx.fillStyle = btnHovered ? '#2980b9' : '#2471a3';
        ctx.fill();
        ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText('离开商店', width / 2, btnY + 25);

        ctx.restore();
    }

    getCardPrice(rarity) {
        switch (rarity) {
            case 'common': return SHOP_PRICES.CARD_COMMON;
            case 'rare': return SHOP_PRICES.CARD_RARE;
            case 'legendary': return SHOP_PRICES.CARD_LEGENDARY;
            default: return SHOP_PRICES.CARD_COMMON;
        }
    }

    // 获取商店悬停项
    getShopHoverItem(mouseX, mouseY, shopCardsCount, width, height) {
        const cardW = 120;
        const cardH = 170;
        const gap = 20;
        const startX = (width - (shopCardsCount * (cardW + gap) - gap)) / 2;

        // 检查卡牌
        for (let i = 0; i < shopCardsCount; i++) {
            const x = startX + i * (cardW + gap);
            const y = 90;
            if (mouseX >= x && mouseX <= x + cardW && mouseY >= y && mouseY <= y + cardH) {
                return i;
            }
        }

        // 检查移除按钮
        const removeY = 290;
        if (mouseX >= width / 2 - 100 && mouseX <= width / 2 + 100 && mouseY >= removeY && mouseY <= removeY + 40) {
            return shopCardsCount;
        }

        // 检查药水
        const potionY = 350 + 15;
        const potionStartX = (width - (3 * 80)) / 2;
        for (let i = 0; i < 3; i++) {
            const px = potionStartX + i * 80;
            if (mouseX >= px && mouseX <= px + 70 && mouseY >= potionY && mouseY <= potionY + 50) {
                return shopCardsCount + 1 + i;
            }
        }

        // 检查返回按钮
        const btnY = height - 60;
        if (mouseX >= width / 2 - 60 && mouseX <= width / 2 + 60 && mouseY >= btnY && mouseY <= btnY + 40) {
            return -2;
        }

        return -1;
    }

    // ---- 休息界面 ----
    drawRest(ctx, player, width, height, hoveredChoice = -1) {
        ctx.save();

        // 背景氛围
        const grad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, 300);
        grad.addColorStop(0, '#1a3a1a');
        grad.addColorStop(1, '#0d1117');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // 标题
        ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#2ecc71';
        ctx.textAlign = 'center';
        ctx.fillText('🏕️ 休息营地', width / 2, 50);

        // 篝火Emoji
        ctx.font = '60px serif';
        ctx.fillText('🔥', width / 2, 120);

        // 恢复HP选项
        const healAmount = Math.floor(player.maxHp * 0.3);
        const choice1Y = 180;
        const choice1Hover = hoveredChoice === 0;
        cardSystem.drawRoundedRect(ctx, width / 2 - 150, choice1Y, 300, 50, 10);
        ctx.fillStyle = choice1Hover ? '#27ae60' : '#1e8449';
        ctx.fill();
        cardSystem.drawRoundedRect(ctx, width / 2 - 150, choice1Y, 300, 50, 10);
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(`❤️ 恢复 ${healAmount} HP`, width / 2, choice1Y + 30);

        // 升级卡牌选项
        const choice2Y = 250;
        const choice2Hover = hoveredChoice === 1;
        cardSystem.drawRoundedRect(ctx, width / 2 - 150, choice2Y, 300, 50, 10);
        ctx.fillStyle = choice2Hover ? '#2980b9' : '#2471a3';
        ctx.fill();
        cardSystem.drawRoundedRect(ctx, width / 2 - 150, choice2Y, 300, 50, 10);
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.fillText('⬆️ 升级一张卡牌 (费用-1)', width / 2, choice2Y + 30);

        // 当前HP
        ctx.font = '14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillText(`当前HP: ${player.hp}/${player.maxHp}`, width / 2, 330);

        ctx.restore();
    }

    // ---- 卡牌选择界面（升级/移除）----
    drawCardSelect(ctx, cards, title, width, height, hoveredIndex = -1) {
        ctx.save();

        // 半透明背景
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, width, height);

        // 标题
        ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ecf0f1';
        ctx.textAlign = 'center';
        ctx.fillText(title, width / 2, 35);

        // 卡牌列表
        const cardW = 100;
        const cardH = 140;
        const gap = 12;
        const cols = Math.min(6, cards.length);
        const rows = Math.ceil(cards.length / cols);
        const startX = (width - (cols * (cardW + gap) - gap)) / 2;
        const startY = 55;

        cards.forEach((cardId, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = startX + col * (cardW + gap);
            const y = startY + row * (cardH + gap + 10);
            const isHovered = i === hoveredIndex;

            cardSystem.drawCard(ctx, cardId, x, y, cardW, cardH, {
                selected: false,
                playable: true,
                hovered: isHovered,
            });
        });

        // 取消按钮
        const btnY = height - 50;
        cardSystem.drawRoundedRect(ctx, width / 2 - 50, btnY, 100, 35, 6);
        ctx.fillStyle = '#7f8c8d';
        ctx.fill();
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('取消', width / 2, btnY + 22);

        ctx.restore();
    }

    // 获取卡牌选择悬停
    getCardSelectHover(mouseX, mouseY, cardCount, width, height) {
        const cardW = 100;
        const cardH = 140;
        const gap = 12;
        const cols = Math.min(6, cardCount);
        const startX = (width - (cols * (cardW + gap) - gap)) / 2;
        const startY = 55;

        for (let i = 0; i < cardCount; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = startX + col * (cardW + gap);
            const y = startY + row * (cardH + gap + 10);
            if (mouseX >= x && mouseX <= x + cardW && mouseY >= y && mouseY <= y + cardH) {
                return i;
            }
        }

        // 检查取消按钮
        const btnY = height - 50;
        if (mouseX >= width / 2 - 50 && mouseX <= width / 2 + 50 && mouseY >= btnY && mouseY <= btnY + 35) {
            return -2;
        }

        return -1;
    }

    // ---- 事件界面 ----
    drawEvent(ctx, event, width, height, hoveredChoice = -1) {
        ctx.save();

        // 标题
        ctx.font = 'bold 26px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ecf0f1';
        ctx.textAlign = 'center';
        ctx.fillText(`${event.emoji} ${event.title}`, width / 2, 50);

        // 描述
        ctx.font = '14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#bdc3c7';
        const descLines = this.wrapTextSimple(ctx, event.description, width - 80);
        descLines.forEach((line, i) => {
            ctx.fillText(line, width / 2, 90 + i * 20);
        });

        // 选项
        const choiceStartY = 90 + descLines.length * 20 + 30;
        event.choices.forEach((choice, i) => {
            const cy = choiceStartY + i * 55;
            const isHovered = i === hoveredChoice;

            cardSystem.drawRoundedRect(ctx, width / 2 - 180, cy, 360, 45, 8);
            ctx.fillStyle = isHovered ? '#2c3e50' : '#1a252f';
            ctx.fill();
            cardSystem.drawRoundedRect(ctx, width / 2 - 180, cy, 360, 45, 8);
            ctx.strokeStyle = isHovered ? '#3498db' : '#4a5568';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.font = '14px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = isHovered ? '#fff' : '#bdc3c7';
            ctx.fillText(choice.text, width / 2, cy + 27);
        });

        ctx.restore();
    }

    // 获取事件悬停选项
    getEventHoverChoice(mouseX, mouseY, event, width) {
        if (!event) return -1;
        const descLines = this.wrapTextSimple(null, event.description, width - 80);
        const choiceStartY = 90 + descLines.length * 20 + 30;

        for (let i = 0; i < event.choices.length; i++) {
            const cy = choiceStartY + i * 55;
            if (mouseX >= width / 2 - 180 && mouseX <= width / 2 + 180 && mouseY >= cy && mouseY <= cy + 45) {
                return i;
            }
        }
        return -1;
    }

    // 简单文字换行
    wrapTextSimple(ctx, text, maxWidth) {
        const lines = [];
        let line = '';
        // 估算每个字符宽度（中文约14px）
        const charWidth = 14;
        const maxChars = Math.floor(maxWidth / charWidth);

        for (let i = 0; i < text.length; i++) {
            line += text[i];
            if (line.length >= maxChars) {
                lines.push(line);
                line = '';
            }
        }
        if (line) lines.push(line);
        return lines;
    }

    // ---- 战斗奖励界面 ----
    drawRewards(ctx, rewards, width, height, hoveredReward = -1) {
        ctx.save();

        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, width, height);

        ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = COLORS.GOLD_COLOR;
        ctx.textAlign = 'center';
        ctx.fillText('🏆 战斗胜利！', width / 2, 60);

        // 金币奖励
        ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = COLORS.GOLD_COLOR;
        ctx.fillText(`获得 ${rewards.gold} 金币`, width / 2, 100);

        // 卡牌奖励
        if (rewards.cards && rewards.cards.length > 0) {
            ctx.font = '16px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ecf0f1';
            ctx.fillText('选择一张卡牌加入牌组:', width / 2, 140);

            const cardW = 120;
            const cardH = 170;
            const gap = 20;
            const startX = (width - (rewards.cards.length * (cardW + gap) - gap)) / 2;

            rewards.cards.forEach((cardId, i) => {
                const x = startX + i * (cardW + gap);
                const y = 160;
                const isHovered = i === hoveredReward;

                cardSystem.drawCard(ctx, cardId, x, y, cardW, cardH, {
                    selected: false,
                    playable: true,
                    hovered: isHovered,
                });
            });
        }

        // 跳过按钮
        const btnY = height - 60;
        const skipHovered = hoveredReward === -2;
        cardSystem.drawRoundedRect(ctx, width / 2 - 60, btnY, 120, 40, 8);
        ctx.fillStyle = skipHovered ? '#7f8c8d' : '#636e72';
        ctx.fill();
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('跳过', width / 2, btnY + 25);

        ctx.restore();
    }

    // 获取奖励悬停
    getRewardHover(mouseX, mouseY, cardCount, width, height) {
        if (!cardCount) return -1;
        const cardW = 120;
        const cardH = 170;
        const gap = 20;
        const startX = (width - (cardCount * (cardW + gap) - gap)) / 2;

        for (let i = 0; i < cardCount; i++) {
            const x = startX + i * (cardW + gap);
            const y = 160;
            if (mouseX >= x && mouseX <= x + cardW && mouseY >= y && mouseY <= y + cardH) {
                return i;
            }
        }

        const btnY = height - 60;
        if (mouseX >= width / 2 - 60 && mouseX <= width / 2 + 60 && mouseY >= btnY && mouseY <= btnY + 40) {
            return -2;
        }

        return -1;
    }

    // ---- 通用按钮 ----
    drawButton(ctx, text, x, y, w, h, isHovered = false, color = '#2471a3') {
        cardSystem.drawRoundedRect(ctx, x, y, w, h, 8);
        ctx.fillStyle = isHovered ? '#2980b9' : color;
        ctx.fill();
        cardSystem.drawRoundedRect(ctx, x, y, w, h, 8);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, x + w / 2, y + h / 2);
        ctx.textBaseline = 'alphabetic';
    }
}

const ui = new UI();

// === main.js ===
// ============================================================
// main.js - 游戏主循环、事件监听、状态机
// ============================================================


// ---- 游戏状态 ----
const GameState = {
    MENU: 'menu',
    MAP: 'map',
    COMBAT: 'combat',
    REWARDS: 'rewards',
    SHOP: 'shop',
    REST: 'rest',
    EVENT: 'event',
    CARD_SELECT: 'card_select',
    GAME_OVER: 'game_over',
    VICTORY: 'victory',
};

class Game {
    constructor() {
        this.state = GameState.MENU;
        this.player = new Player();
        this.gameMap = new GameMap();
        this.combat = null;
        this.currentFloor = 0;
        this.currentNode = null;

        // UI状态
        this.hoveredCardIndex = -1;
        this.hoveredEnemyIndex = -1;
        this.hoveredShopItem = -1;
        this.hoveredReward = -1;
        this.hoveredChoice = -1;
        this.hoveredMapNode = null;
        this.hoveredSelectCard = -1;

        // 商店状态
        this.shopCards = [];

        // 事件状态
        this.currentEvent = null;

        // 奖励状态
        this.rewards = null;

        // 卡牌选择状态
        this.selectCards = [];
        this.selectCallback = null;
        this.selectTitle = '';

        // 升级模式
        this.isUpgradeMode = false;

        // Canvas元素
        this.mainCanvas = null;  // 战斗场景 - 敌人
        this.mainCtx = null;
        this.cardCanvas = null;  // 战斗场景 - 手牌
        this.cardCtx = null;
        this.mapCanvas = null;   // 地图
        this.mapCtx = null;
        this.shopCanvas = null;  // 商店
        this.shopCtx = null;
        this.restCanvas = null;  // 休息
        this.restCtx = null;
        this.eventCanvas = null; // 事件
        this.eventCtx = null;
        this.rewardCanvas = null; // 奖励
        this.rewardCtx = null;
        this.cardSelectCanvas = null; // 卡牌选择
        this.cardSelectCtx = null;

        // 当前活动canvas/ctx（用于鼠标事件路由）
        this.activeCanvas = null;
        this.activeCtx = null;
    }

    // 初始化
    init() {
        this.setupCanvas();
        this.setupEvents();
        this.showScreen(GameState.MENU);
        this.renderLoop();
    }

    // 设置Canvas
    setupCanvas() {
        this.mainCanvas = document.getElementById('mainCanvas');
        this.cardCanvas = document.getElementById('cardCanvas');
        this.mapCanvas = document.getElementById('mapCanvas');
        this.shopCanvas = document.getElementById('shopCanvas');
        this.restCanvas = document.getElementById('restCanvas');
        this.eventCanvas = document.getElementById('eventCanvas');
        this.rewardCanvas = document.getElementById('rewardCanvas');
        this.cardSelectCanvas = document.getElementById('cardSelectCanvas');

        if (this.mainCanvas) this.mainCtx = this.mainCanvas.getContext('2d');
        if (this.cardCanvas) {
            this.cardCtx = this.cardCanvas.getContext('2d');
            ui.initCardCanvas(this.cardCanvas);
        }
        if (this.mapCanvas) this.mapCtx = this.mapCanvas.getContext('2d');
        if (this.shopCanvas) this.shopCtx = this.shopCanvas.getContext('2d');
        if (this.restCanvas) this.restCtx = this.restCanvas.getContext('2d');
        if (this.eventCanvas) this.eventCtx = this.eventCanvas.getContext('2d');
        if (this.rewardCanvas) this.rewardCtx = this.rewardCanvas.getContext('2d');
        if (this.cardSelectCanvas) this.cardSelectCtx = this.cardSelectCanvas.getContext('2d');

        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
    }

    resizeCanvas() {
        this.screenWidth = window.innerWidth;
        this.screenHeight = window.innerHeight;

        // 战斗场景的敌人区域
        if (this.mainCanvas) {
            this.mainCanvas.width = Math.min(this.screenWidth - 220, 700);
            this.mainCanvas.height = 280;
        }
        // 手牌区域
        if (this.cardCanvas) {
            this.cardCanvas.width = Math.min(this.screenWidth - 220, 700);
            this.cardCanvas.height = 200;
        }
        // 地图
        if (this.mapCanvas) {
            this.mapCanvas.width = Math.min(this.screenWidth - 40, 900);
            this.mapCanvas.height = Math.min(this.screenHeight - 120, 520);
        }
        // 全屏canvas (shop/rest/event/reward/cardSelect)
        const fullWidth = Math.min(this.screenWidth - 40, 900);
        const fullHeight = Math.min(this.screenHeight - 40, 560);
        [this.shopCanvas, this.restCanvas, this.eventCanvas, this.rewardCanvas, this.cardSelectCanvas].forEach(c => {
            if (c) {
                c.width = fullWidth;
                c.height = fullHeight;
            }
        });
    }

    // 设置事件监听
    setupEvents() {
        // 开始按钮
        document.getElementById('startBtn')?.addEventListener('click', () => {
            sound.init();
            sound.click();
            this.startGame();
        });

        // 重新开始按钮
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            sound.click();
            this.startGame();
        });

        document.getElementById('restartBtn2')?.addEventListener('click', () => {
            sound.click();
            this.startGame();
        });

        // 结束回合按钮
        document.getElementById('endTurnBtn')?.addEventListener('click', () => {
            if (this.state === GameState.COMBAT && this.combat) {
                sound.click();
                this.combat.endPlayerTurn();
            }
        });

        // 卡牌Canvas事件 (战斗手牌)
        if (this.cardCanvas) {
            this.cardCanvas.addEventListener('mousemove', (e) => this.onCardMouseMove(e));
            this.cardCanvas.addEventListener('click', (e) => this.onCardClick(e));
        }

        // 战斗主Canvas事件 (敌人区域)
        if (this.mainCanvas) {
            this.mainCanvas.addEventListener('mousemove', (e) => this.onMainMouseMove(e));
            this.mainCanvas.addEventListener('click', (e) => this.onMainClick(e));
        }

        // 地图Canvas事件
        if (this.mapCanvas) {
            this.mapCanvas.addEventListener('mousemove', (e) => this.onMapMouseMove(e));
            this.mapCanvas.addEventListener('click', (e) => this.onMapClick(e));
        }

        // 商店/休息/事件/奖励/卡牌选择的Canvas事件
        [
            { canvas: this.shopCanvas, prefix: 'shop' },
            { canvas: this.restCanvas, prefix: 'rest' },
            { canvas: this.eventCanvas, prefix: 'event' },
            { canvas: this.rewardCanvas, prefix: 'reward' },
            { canvas: this.cardSelectCanvas, prefix: 'cardSelect' },
        ].forEach(({ canvas, prefix }) => {
            if (canvas) {
                canvas.addEventListener('mousemove', (e) => this.onOverlayMouseMove(e, canvas));
                canvas.addEventListener('click', (e) => this.onOverlayClick(e, canvas));
            }
        });

        // 药水点击
        document.querySelectorAll('.potion-slot').forEach((el, i) => {
            el.addEventListener('click', () => {
                if (this.state === GameState.COMBAT && this.combat) {
                    sound.click();
                    this.combat.usePotion(i, this.hoveredEnemyIndex);
                }
            });
        });
    }

    // ---- 屏幕切换 ----
    showScreen(screenName) {
        const screens = ['menuScreen', 'mapScreen', 'combatScreen', 'shopScreen', 'restScreen', 'eventScreen', 'gameOverScreen', 'victoryScreen', 'cardSelectScreen', 'rewardScreen'];
        screens.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });

        const screenMap = {
            [GameState.MENU]: 'menuScreen',
            [GameState.MAP]: 'mapScreen',
            [GameState.COMBAT]: 'combatScreen',
            [GameState.SHOP]: 'shopScreen',
            [GameState.REST]: 'restScreen',
            [GameState.EVENT]: 'eventScreen',
            [GameState.GAME_OVER]: 'gameOverScreen',
            [GameState.VICTORY]: 'victoryScreen',
            [GameState.CARD_SELECT]: 'cardSelectScreen',
            [GameState.REWARDS]: 'rewardScreen',
        };

        const elId = screenMap[screenName];
        if (elId) {
            const el = document.getElementById(elId);
            if (el) el.style.display = 'flex';
        }

        // 更新活动canvas
        this.updateActiveCanvas();
    }

    updateActiveCanvas() {
        switch (this.state) {
            case GameState.COMBAT:
                this.activeCanvas = this.mainCanvas;
                this.activeCtx = this.mainCtx;
                break;
            case GameState.SHOP:
                this.activeCanvas = this.shopCanvas;
                this.activeCtx = this.shopCtx;
                break;
            case GameState.REST:
                this.activeCanvas = this.restCanvas;
                this.activeCtx = this.restCtx;
                break;
            case GameState.EVENT:
                this.activeCanvas = this.eventCanvas;
                this.activeCtx = this.eventCtx;
                break;
            case GameState.REWARDS:
                this.activeCanvas = this.rewardCanvas;
                this.activeCtx = this.rewardCtx;
                break;
            case GameState.CARD_SELECT:
                this.activeCanvas = this.cardSelectCanvas;
                this.activeCtx = this.cardSelectCtx;
                break;
            default:
                this.activeCanvas = null;
                this.activeCtx = null;
        }
    }

    // ---- 开始游戏 ----
    startGame() {
        this.player.reset();
        this.gameMap.generate();
        this.currentFloor = 0;
        this.currentNode = null;
        this.state = GameState.MAP;
        this.showScreen(GameState.MAP);
        this.renderMap();
    }

    // ---- 地图交互 ----
    onMapMouseMove(e) {
        if (this.state !== GameState.MAP) return;
        const rect = this.mapCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.mapCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.mapCanvas.height / rect.height);
        this.hoveredMapNode = this.gameMap.getNodeAtPos(x, y, this.mapCanvas.width, this.mapCanvas.height);
        this.renderMap();
    }

    onMapClick(e) {
        if (this.state !== GameState.MAP) return;
        const rect = this.mapCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.mapCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.mapCanvas.height / rect.height);
        const node = this.gameMap.getNodeAtPos(x, y, this.mapCanvas.width, this.mapCanvas.height);

        if (node && node.accessible) {
            sound.click();
            this.enterNode(node);
        }
    }

    // 进入节点
    enterNode(node) {
        this.currentNode = this.gameMap.visitNode(node.id);

        switch (node.type) {
            case NODE_TYPE.BATTLE:
            case NODE_TYPE.ELITE:
            case NODE_TYPE.BOSS:
                this.startCombat(node);
                break;
            case NODE_TYPE.SHOP:
                this.enterShop();
                break;
            case NODE_TYPE.REST:
                this.enterRest();
                break;
            case NODE_TYPE.EVENT:
                this.enterEvent();
                break;
            case NODE_TYPE.TREASURE: {
                const gold = Math.floor(Math.random() * 30) + 20;
                this.player.gold += gold;
                this.showRewardsScreen({ gold, cards: [] });
                break;
            }
        }
    }

    // ---- 战斗 ----
    startCombat(node) {
        const enemyIds = node.getEnemies();
        const enemies = Enemy.createEnemies(enemyIds);

        this.combat = new CombatSystem(this.player, (victory, rewards) => {
            this.onCombatEnd(victory, rewards);
        });

        this.state = GameState.COMBAT;
        this.showScreen(GameState.COMBAT);

        const enemyNames = enemies.map(e => e.name).join(', ');
        document.getElementById('enemyNames').textContent = enemyNames;

        this.combat.startCombat(enemies);
    }

    onCombatEnd(victory, rewards) {
        if (victory) {
            const cardRewards = cardSystem.generateCardRewards(this.currentFloor);
            this.rewards = {
                gold: rewards.gold,
                cards: cardRewards,
            };
            this.state = GameState.REWARDS;
            this.showScreen(GameState.REWARDS);
        } else {
            this.state = GameState.GAME_OVER;
            this.showScreen(GameState.GAME_OVER);
            document.getElementById('finalFloor').textContent = `到达: 第${this.currentFloor + 1}层`;
        }
    }

    // ---- 战斗交互 ----
    onCardMouseMove(e) {
        if (this.state !== GameState.COMBAT || !this.combat) return;
        const rect = this.cardCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.cardCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.cardCanvas.height / rect.height);
        ui.hoveredCardIndex = ui.getHoveredCardIndex(x, y, this.player.hand.length, this.cardCanvas.width);
    }

    onCardClick(e) {
        if (this.state !== GameState.COMBAT || !this.combat) return;
        if (!this.combat.isPlayerTurn || this.combat.isProcessing) return;
        const rect = this.cardCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.cardCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.cardCanvas.height / rect.height);
        const idx = ui.getHoveredCardIndex(x, y, this.player.hand.length, this.cardCanvas.width);

        if (idx >= 0) {
            const cardId = this.player.hand[idx];
            const def = CARD_DEFS[cardId];
            if (def && def.cost <= this.player.energy) {
                this.combat.playCard(idx);
            }
        }
    }

    onMainMouseMove(e) {
        if (this.state !== GameState.COMBAT) return;
        const rect = this.mainCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.mainCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.mainCanvas.height / rect.height);
        this.hoveredEnemyIndex = this.getHoveredEnemyIndex(x, y);
    }

    onMainClick(e) {
        if (this.state !== GameState.COMBAT || !this.combat) return;
        const rect = this.mainCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.mainCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (this.mainCanvas.height / rect.height);
        const enemyIdx = this.getHoveredEnemyIndex(x, y);
        if (enemyIdx >= 0) {
            this.combat.selectedEnemyIndex = enemyIdx;
        }
    }

    // overlay canvas 通用鼠标事件路由
    onOverlayMouseMove(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const w = canvas.width;
        const h = canvas.height;

        switch (this.state) {
            case GameState.SHOP:
                this.hoveredShopItem = ui.getShopHoverItem(x, y, this.shopCards.length, w, h);
                break;
            case GameState.REST:
                this.hoveredChoice = this.getRestHover(x, y, w, h);
                break;
            case GameState.EVENT:
                if (this.currentEvent) this.hoveredChoice = ui.getEventHoverChoice(x, y, this.currentEvent, w);
                break;
            case GameState.REWARDS:
                if (this.rewards) this.hoveredReward = ui.getRewardHover(x, y, this.rewards.cards?.length || 0, w, h);
                break;
            case GameState.CARD_SELECT:
                this.hoveredSelectCard = ui.getCardSelectHover(x, y, this.selectCards.length, w, h);
                break;
        }
    }

    onOverlayClick(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const w = canvas.width;
        const h = canvas.height;

        switch (this.state) {
            case GameState.SHOP:
                this.handleShopClick(x, y, w, h);
                break;
            case GameState.REST:
                this.handleRestClick(x, y, w, h);
                break;
            case GameState.EVENT:
                this.handleEventClick(x, y, w);
                break;
            case GameState.REWARDS:
                this.handleRewardClick(x, y, w, h);
                break;
            case GameState.CARD_SELECT:
                this.handleCardSelectClick(x, y, w, h);
                break;
        }
    }

    getHoveredEnemyIndex(x, y) {
        if (!this.combat) return -1;
        const enemies = this.combat.enemies;
        const aliveEnemies = enemies.filter(e => e.isAlive());
        if (aliveEnemies.length === 0) return -1;

        const enemyW = 140;
        const gap = 20;
        const totalW = aliveEnemies.length * (enemyW + gap) - gap;
        const startX = (this.mainCanvas.width - totalW) / 2;

        for (let i = 0; i < aliveEnemies.length; i++) {
            const ex = startX + i * (enemyW + gap);
            if (x >= ex && x <= ex + enemyW && y >= 20 && y <= 200) {
                return enemies.indexOf(aliveEnemies[i]);
            }
        }
        return -1;
    }

    // ---- 商店 ----
    enterShop() {
        this.shopCards = cardSystem.getShopCards(this.currentFloor);
        this.state = GameState.SHOP;
        this.showScreen(GameState.SHOP);
    }

    handleShopClick(x, y, w, h) {
        const hovered = ui.getShopHoverItem(x, y, this.shopCards.length, w, h);

        if (hovered === -2) {
            sound.click();
            this.state = GameState.MAP;
            this.showScreen(GameState.MAP);
            this.renderMap();
            return;
        }

        if (hovered >= 0 && hovered < this.shopCards.length) {
            const cardId = this.shopCards[hovered];
            const def = CARD_DEFS[cardId];
            const price = ui.getCardPrice(def.rarity);
            if (this.player.gold >= price) {
                this.player.gold -= price;
                this.player.addCardToDeck(cardId);
                this.shopCards.splice(hovered, 1);
                sound.buy();
            }
        } else if (hovered === this.shopCards.length) {
            if (this.player.gold >= SHOP_PRICES.REMOVE_CARD && this.player.deck.length > 5) {
                this.openCardSelect('选择要移除的卡牌', this.player.deck, (cardId) => {
                    this.player.gold -= SHOP_PRICES.REMOVE_CARD;
                    this.player.removeCardFromDeck(cardId);
                    sound.skill();
                    this.state = GameState.SHOP;
                    this.showScreen(GameState.SHOP);
                });
            }
        } else if (hovered > this.shopCards.length) {
            const potionIdx = hovered - this.shopCards.length - 1;
            const potionIds = Object.keys(POTIONS);
            if (potionIdx < potionIds.length) {
                const pId = potionIds[potionIdx];
                if (this.player.gold >= SHOP_PRICES.POTION && this.player.potions.length < GAME_CONFIG.POTION_SLOTS) {
                    this.player.gold -= SHOP_PRICES.POTION;
                    this.player.addPotion(pId);
                    sound.buy();
                }
            }
        }
    }

    // ---- 休息 ----
    enterRest() {
        this.state = GameState.REST;
        this.showScreen(GameState.REST);
    }

    getRestHover(x, y, w, h) {
        const centerX = w / 2;
        if (x >= centerX - 150 && x <= centerX + 150 && y >= 180 && y <= 230) return 0;
        if (x >= centerX - 150 && x <= centerX + 150 && y >= 250 && y <= 300) return 1;
        return -1;
    }

    handleRestClick(x, y, w, h) {
        const choice = this.getRestHover(x, y, w, h);
        if (choice === 0) {
            const healAmount = Math.floor(this.player.maxHp * 0.3);
            this.player.heal(healAmount);
            sound.heal();
            this.state = GameState.MAP;
            this.showScreen(GameState.MAP);
            this.renderMap();
        } else if (choice === 1) {
            this.isUpgradeMode = true;
            this.openCardSelect('选择要升级的卡牌 (费用-1)', this.player.deck, (cardId) => {
                this.upgradeCard(cardId);
                this.isUpgradeMode = false;
                sound.upgrade();
                this.state = GameState.MAP;
                this.showScreen(GameState.MAP);
                this.renderMap();
            });
        }
    }

    upgradeCard(cardId) {
        const def = CARD_DEFS[cardId];
        if (def && def.cost > 0) {
            const upgradedId = def.id + '_upgraded';
            if (!CARD_DEFS[upgradedId]) {
                const upgraded = { ...def };
                upgraded.cost = def.cost - 1;
                upgraded.name = def.name + '+';
                upgraded.id = upgradedId;
                upgraded.description = def.description.replace(/\d+/g, (m) => Math.floor(parseInt(m) * 1.3));
                CARD_DEFS[upgradedId] = upgraded;
            }
            const idx = this.player.deck.indexOf(cardId);
            if (idx !== -1) {
                this.player.deck[idx] = upgradedId;
            }
        }
    }

    // ---- 事件 ----
    enterEvent() {
        this.currentEvent = EVENTS[Math.floor(Math.random() * EVENTS.length)];
        this.state = GameState.EVENT;
        this.showScreen(GameState.EVENT);
    }

    handleEventClick(x, y, w) {
        const choice = ui.getEventHoverChoice(x, y, this.currentEvent, w);
        if (choice < 0) return;

        const effect = this.currentEvent.choices[choice].effect;
        const value = this.currentEvent.choices[choice].value;

        sound.click();

        switch (effect) {
            case 'heal_percent':
                this.player.heal(Math.floor(this.player.maxHp * value));
                sound.heal();
                break;
            case 'buy_rare_card':
                if (this.player.gold >= value) {
                    this.player.gold -= value;
                    const rareCards = Object.keys(CARD_DEFS).filter(id => CARD_DEFS[id].rarity === 'rare' && !id.includes('_upgraded'));
                    const card = rareCards[Math.floor(Math.random() * rareCards.length)];
                    if (card) this.player.addCardToDeck(card);
                    sound.buy();
                }
                break;
            case 'max_hp_up':
                if (this.player.gold >= value) {
                    this.player.gold -= value;
                    this.player.increaseMaxHp(this.currentEvent.choices[choice].hpGain || 5);
                    sound.skill();
                }
                break;
            case 'gain_strength':
                this.player.addStatus('strength', value);
                sound.skill();
                break;
            case 'gain_dexterity':
                this.player.addStatus('dexterity', value);
                sound.skill();
                break;
            case 'sacrifice_for_card': {
                this.player.takeDamage(Math.floor(this.player.maxHp * value), true);
                const rarePool = Object.keys(CARD_DEFS).filter(id => CARD_DEFS[id].rarity === 'rare' && !id.includes('_upgraded'));
                const rareCard = rarePool[Math.floor(Math.random() * rarePool.length)];
                if (rareCard) this.player.addCardToDeck(rareCard);
                sound.hurt();
                break;
            }
            case 'gold': {
                const goldAmount = Math.floor(Math.random() * (value[1] - value[0] + 1)) + value[0];
                this.player.gold += goldAmount;
                sound.buy();
                break;
            }
            case 'random_buff': {
                const buffs = ['strength', 'dexterity'];
                const buff = buffs[Math.floor(Math.random() * buffs.length)];
                this.player.addStatus(buff, 2);
                sound.skill();
                break;
            }
            case 'none':
            default:
                break;
        }

        if (!this.player.isAlive()) {
            this.state = GameState.GAME_OVER;
            this.showScreen(GameState.GAME_OVER);
            document.getElementById('finalFloor').textContent = `到达: 第${this.currentFloor + 1}层`;
            return;
        }

        this.state = GameState.MAP;
        this.showScreen(GameState.MAP);
        this.renderMap();
    }

    // ---- 奖励 ----
    showRewardsScreen(rewards) {
        this.rewards = rewards;
        this.state = GameState.REWARDS;
        this.showScreen(GameState.REWARDS);
    }

    handleRewardClick(x, y, w, h) {
        const hovered = ui.getRewardHover(x, y, this.rewards.cards?.length || 0, w, h);

        if (hovered === -2) {
            sound.click();
            this.afterReward();
            return;
        }

        if (hovered >= 0 && hovered < (this.rewards.cards?.length || 0)) {
            const cardId = this.rewards.cards[hovered];
            this.player.addCardToDeck(cardId);
            sound.buy();
            this.afterReward();
        }
    }

    afterReward() {
        if (this.currentNode && this.currentNode.type === NODE_TYPE.BOSS) {
            if (this.currentFloor < GAME_CONFIG.MAP_LAYERS - 1) {
                this.currentFloor++;
                this.gameMap.currentFloor = this.currentFloor;
                // 标记新层前排节点为可访问
                const firstRow = this.gameMap.floors[this.currentFloor]?.[0];
                if (firstRow) firstRow.forEach(node => node.accessible = true);
            }
            if (this.currentFloor >= GAME_CONFIG.MAP_LAYERS) {
                this.state = GameState.VICTORY;
                this.showScreen(GameState.VICTORY);
                return;
            }
        }

        this.state = GameState.MAP;
        this.showScreen(GameState.MAP);
        this.renderMap();
    }

    // ---- 卡牌选择 ----
    openCardSelect(title, cards, callback) {
        this.selectCards = [...cards];
        this.selectCallback = callback;
        this.selectTitle = title;
        this.state = GameState.CARD_SELECT;
        this.showScreen(GameState.CARD_SELECT);
    }

    handleCardSelectClick(x, y, w, h) {
        const hovered = ui.getCardSelectHover(x, y, this.selectCards.length, w, h);

        if (hovered === -2) {
            sound.click();
            if (this.isUpgradeMode) {
                this.state = GameState.REST;
                this.showScreen(GameState.REST);
            } else {
                this.state = GameState.SHOP;
                this.showScreen(GameState.SHOP);
            }
            return;
        }

        if (hovered >= 0 && hovered < this.selectCards.length) {
            const cardId = this.selectCards[hovered];
            if (this.selectCallback) {
                this.selectCallback(cardId);
            }
        }
    }

    // ---- 渲染循环 ----
    renderLoop() {
        this.update();
        this.render();
        requestAnimationFrame(() => this.renderLoop());
    }

    update() {
        if (this.state === GameState.COMBAT && this.combat) {
            this.updateCombatUI();
        }
    }

    updateCombatUI() {
        if (!this.combat) return;

        const energyEl = document.getElementById('energyDisplay');
        if (energyEl) energyEl.textContent = `⚡ ${this.player.energy}/${this.player.maxEnergy}`;

        const hpEl = document.getElementById('hpDisplay');
        if (hpEl) hpEl.textContent = `❤️ ${this.player.hp}/${this.player.maxHp}`;

        const armorEl = document.getElementById('armorDisplay');
        if (armorEl) armorEl.textContent = this.player.armor > 0 ? `🛡️ ${this.player.armor}` : '';

        const turnEl = document.getElementById('turnDisplay');
        if (turnEl) turnEl.textContent = `回合 ${this.combat.turn}`;

        const logEl = document.getElementById('combatLog');
        if (logEl && this.combat.combatLog.length > 0) {
            const recentLogs = this.combat.combatLog.slice(-8);
            logEl.innerHTML = recentLogs.map(l => `<div>${l.text}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        const endTurnBtn = document.getElementById('endTurnBtn');
        if (endTurnBtn) {
            endTurnBtn.disabled = !this.combat.isPlayerTurn || this.combat.isProcessing;
            endTurnBtn.style.opacity = endTurnBtn.disabled ? '0.5' : '1';
        }

        document.querySelectorAll('.potion-slot').forEach((el, i) => {
            if (i < this.player.potions.length) {
                const potion = POTIONS[this.player.potions[i]];
                el.textContent = '🧪';
                el.title = potion ? potion.name : '';
                el.style.opacity = '1';
            } else {
                el.textContent = '';
                el.title = '';
                el.style.opacity = '0.3';
            }
        });
    }

    render() {
        switch (this.state) {
            case GameState.COMBAT:
                this.renderCombat();
                break;
            case GameState.SHOP:
                this.renderShop();
                break;
            case GameState.REST:
                this.renderRest();
                break;
            case GameState.EVENT:
                this.renderEvent();
                break;
            case GameState.REWARDS:
                this.renderRewards();
                break;
            case GameState.CARD_SELECT:
                this.renderCardSelect();
                break;
            case GameState.MAP:
                this.renderMap();
                break;
        }
    }

    renderCombat() {
        if (!this.combat) return;

        // 绘制敌人
        if (this.mainCtx) {
            const ctx = this.mainCtx;
            const w = this.mainCanvas.width;
            const h = this.mainCanvas.height;
            ctx.clearRect(0, 0, w, h);
            ui.drawEnemies(ctx, this.combat.enemies, 0, 10, w, this.hoveredEnemyIndex);
            ui.drawFloatingTexts(ctx);
        }

        // 绘制手牌
        if (this.cardCtx) {
            ui.drawHand(this.player.hand, this.player.energy, (cardId) => {
                const def = CARD_DEFS[cardId];
                return def && def.cost <= this.player.energy && this.combat.isPlayerTurn && !this.combat.isProcessing;
            });
        }
    }

    renderShop() {
        if (!this.shopCtx) return;
        const ctx = this.shopCtx;
        const w = this.shopCanvas.width;
        const h = this.shopCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ui.drawShop(ctx, this.shopCards, this.player, w, h, this.hoveredShopItem);
    }

    renderRest() {
        if (!this.restCtx) return;
        const ctx = this.restCtx;
        const w = this.restCanvas.width;
        const h = this.restCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ui.drawRest(ctx, this.player, w, h, this.hoveredChoice);
    }

    renderEvent() {
        if (!this.eventCtx || !this.currentEvent) return;
        const ctx = this.eventCtx;
        const w = this.eventCanvas.width;
        const h = this.eventCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ui.drawEvent(ctx, this.currentEvent, w, h, this.hoveredChoice);
    }

    renderRewards() {
        if (!this.rewardCtx || !this.rewards) return;
        const ctx = this.rewardCtx;
        const w = this.rewardCanvas.width;
        const h = this.rewardCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ui.drawRewards(ctx, this.rewards, w, h, this.hoveredReward);
    }

    renderCardSelect() {
        if (!this.cardSelectCtx) return;
        const ctx = this.cardSelectCtx;
        const w = this.cardSelectCanvas.width;
        const h = this.cardSelectCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ui.drawCardSelect(ctx, this.selectCards, this.selectTitle, w, h, this.hoveredSelectCard);
    }

    renderMap() {
        if (!this.mapCtx) return;
        const ctx = this.mapCtx;
        const w = this.mapCanvas.width;
        const h = this.mapCanvas.height;
        ctx.clearRect(0, 0, w, h);
        this.gameMap.drawMap(ctx, w, h, this.hoveredMapNode);

        const floorEl = document.getElementById('floorDisplay');
        if (floorEl) {
            const floorNames = ['第一层', '第二层', '第三层'];
            floorEl.textContent = floorNames[this.currentFloor] || `第${this.currentFloor + 1}层`;
        }

        const goldEl = document.getElementById('goldDisplay');
        if (goldEl) goldEl.textContent = `💰 ${this.player.gold}`;

        const mapHpEl = document.getElementById('mapHpDisplay');
        if (mapHpEl) mapHpEl.textContent = `❤️ ${this.player.hp}/${this.player.maxHp}`;
    }
}

// 启动游戏
const game = new Game();
game.init();

window.game = game;


</script>
