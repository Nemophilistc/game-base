<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尖塔卡牌 - Roguelike卡牌战斗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #ecf0f1;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ===== 菜单 ===== */
        #menuScreen {
            background: linear-gradient(135deg, #0d1117 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
        }

        .menu-title {
            font-size: 52px;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-size: 18px;
            color: #95a5a6;
            margin-bottom: 40px;
        }

        .menu-decor {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(231, 76, 60, 0.3));
        }

        .btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }

        .btn-large {
            padding: 18px 60px;
            font-size: 22px;
        }

        .menu-info {
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
        }

        /* ===== 地图 ===== */
        #mapScreen {
            justify-content: flex-start;
            padding-top: 10px;
        }

        .map-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            padding: 8px 16px;
            background: rgba(26, 26, 46, 0.9);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .map-header .info {
            font-size: 15px;
            color: #bdc3c7;
        }

        .map-header .info span {
            margin: 0 12px;
        }

        #mapCanvas {
            background: #0d1117;
            border-radius: 10px;
            border: 1px solid #2d3748;
            cursor: pointer;
        }

        /* ===== 战斗 ===== */
        #combatScreen {
            justify-content: space-between;
            padding: 8px;
        }

        .combat-top {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 8px;
        }

        .combat-top .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
        }

        .combat-top .player-info .hp { color: #e74c3c; font-weight: bold; }
        .combat-top .player-info .energy { color: #f39c12; font-weight: bold; }
        .combat-top .player-info .armor { color: #3498db; }
        .combat-top .player-info .turn { color: #95a5a6; }

        .combat-middle {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 12px;
            flex: 1;
        }

        .combat-battle-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #mainCanvas {
            border-radius: 8px;
            background: #0d1117;
        }

        .enemy-names {
            font-size: 14px;
            color: #e74c3c;
            margin-bottom: 4px;
        }

        .combat-sidebar {
            width: 180px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .combat-log-title {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 6px;
            font-weight: bold;
        }

        #combatLog {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            color: #7f8c8d;
            line-height: 1.6;
            max-height: 200px;
        }

        #combatLog div {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .combat-bottom {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .hand-area {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        #cardCanvas {
            cursor: pointer;
        }

        .combat-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .potion-bar {
            display: flex;
            gap: 6px;
        }

        .potion-slot {
            width: 36px;
            height: 36px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid #4a5568;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .potion-slot:hover {
            border-color: #f39c12;
            transform: scale(1.1);
        }

        #endTurnBtn {
            padding: 10px 28px;
            font-size: 16px;
            white-space: nowrap;
        }

        /* ===== 覆盖层通用 ===== */
        #shopScreen, #restScreen, #eventScreen, #rewardScreen, #cardSelectScreen {
            display: none;
            background: #0d1117;
        }

        #shopScreen canvas,
        #restScreen canvas,
        #eventScreen canvas,
        #rewardScreen canvas,
        #cardSelectScreen canvas {
            border-radius: 10px;
            border: 1px solid #2d3748;
            cursor: pointer;
        }

        /* ===== 游戏结束 ===== */
        #gameOverScreen {
            background: linear-gradient(135deg, #1a0000 0%, #0d1117 50%, #1a0000 100%);
        }

        #victoryScreen {
            background: linear-gradient(135deg, #0d1117 0%, #1a3a1a 50%, #0d1117 100%);
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
            margin-bottom: 10px;
        }

        .victory-title {
            font-size: 48px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
            margin-bottom: 10px;
        }

        .game-over-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .game-over-info {
            font-size: 18px;
            color: #bdc3c7;
            margin-bottom: 30px;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .menu-title { font-size: 36px; }
            .menu-decor { font-size: 60px; }
            .btn-large { padding: 14px 40px; font-size: 18px; }
            .combat-sidebar { display: none; }
        }
    </style>
</head>
<body>
    <!-- ===== 菜单画面 ===== -->
    <div id="menuScreen" class="screen">
        <div class="menu-decor">⚔️🃏🛡️</div>
        <div class="menu-title">尖塔卡牌</div>
        <div class="menu-subtitle">Roguelike卡牌战斗游戏</div>
        <button id="startBtn" class="btn btn-primary btn-large">开始冒险</button>
        <div class="menu-info">
            构建你的牌组，挑战层层敌人<br>
            收集强力卡牌，击败最终BOSS
        </div>
    </div>

    <!-- ===== 地图画面 ===== -->
    <div id="mapScreen" class="screen">
        <div class="map-header">
            <div class="info">
                <span id="floorDisplay">第一层</span>
                <span id="mapHpDisplay">❤️ 80/80</span>
                <span id="goldDisplay">💰 99</span>
            </div>
            <div class="info" style="font-size:12px; color:#7f8c8d;">点击可访问的节点前进</div>
        </div>
        <canvas id="mapCanvas"></canvas>
    </div>

    <!-- ===== 战斗画面 ===== -->
    <div id="combatScreen" class="screen">
        <div class="combat-top">
            <div class="player-info">
                <span id="hpDisplay">❤️ 80/80</span>
                <span id="energyDisplay">⚡ 3/3</span>
                <span id="armorDisplay"></span>
                <span id="turnDisplay" class="turn">回合 1</span>
            </div>
            <div class="enemy-names" id="enemyNames"></div>
        </div>

        <div class="combat-middle">
            <div class="combat-battle-area">
                <canvas id="mainCanvas"></canvas>
            </div>
            <div class="combat-sidebar">
                <div class="combat-log-title">战斗日志</div>
                <div id="combatLog"></div>
            </div>
        </div>

        <div class="combat-bottom">
            <div class="hand-area">
                <canvas id="cardCanvas"></canvas>
            </div>
            <div class="combat-actions">
                <div class="potion-bar">
                    <div class="potion-slot" title="药水槽1"></div>
                    <div class="potion-slot" title="药水槽2"></div>
                    <div class="potion-slot" title="药水槽3"></div>
                </div>
                <button id="endTurnBtn" class="btn btn-primary">结束回合</button>
            </div>
        </div>
    </div>

    <!-- ===== 商店画面 ===== -->
    <div id="shopScreen" class="screen">
        <canvas id="shopCanvas" width="900" height="500"></canvas>
    </div>

    <!-- ===== 休息画面 ===== -->
    <div id="restScreen" class="screen">
        <canvas id="restCanvas" width="900" height="400"></canvas>
    </div>

    <!-- ===== 事件画面 ===== -->
    <div id="eventScreen" class="screen">
        <canvas id="eventCanvas" width="900" height="400"></canvas>
    </div>

    <!-- ===== 奖励画面 ===== -->
    <div id="rewardScreen" class="screen">
        <canvas id="rewardCanvas" width="900" height="500"></canvas>
    </div>

    <!-- ===== 卡牌选择画面 ===== -->
    <div id="cardSelectScreen" class="screen">
        <canvas id="cardSelectCanvas" width="900" height="500"></canvas>
    </div>

    <!-- ===== 游戏结束画面 ===== -->
    <div id="gameOverScreen" class="screen">
        <div class="game-over-emoji">💀</div>
        <div class="game-over-title">游戏结束</div>
        <div class="game-over-info" id="finalFloor">到达: 第1层</div>
        <button id="restartBtn" class="btn btn-primary btn-large">再来一次</button>
    </div>

    <!-- ===== 胜利画面 ===== -->
    <div id="victoryScreen" class="screen">
        <div class="game-over-emoji">🏆</div>
        <div class="victory-title">胜利！</div>
        <div class="game-over-info">你征服了尖塔！</div>
        <button id="restartBtn2" class="btn btn-secondary btn-large">再来一次</button>
    </div>

    <script>
// === ./config.js ===
// ============================================================
// config.js - 杀戮尖塔风格卡牌Roguelike 常量配置
// ============================================================

// ---- 游戏基础常量 ----
const GAME_CONFIG = {
    STARTING_HP: 80,
    MAX_HP: 80,
    ENERGY_PER_TURN: 3,
    CARDS_PER_TURN: 5,
    STARTING_GOLD: 99,
    STARTING_DECK_SIZE: 10,
    MAP_LAYERS: 3,
    NODES_PER_ROW: [3, 4, 3, 4, 3], // 每层每行节点数
    ROWS_PER_FLOOR: 5,
    POTION_SLOTS: 3,
    CARD_REWARD_COUNT: 3,
    ELITE_GOLD_REWARD: [25, 40],
    NORMAL_GOLD_REWARD: [10, 20],
    BOSS_GOLD_REWARD: [50, 80],
};

// ---- 卡牌稀有度 ----
const RARITY = {
    COMMON: 'common',
    RARE: 'rare',
    LEGENDARY: 'legendary',
};

// ---- 卡牌类型 ----
const CARD_TYPE = {
    ATTACK: 'attack',
    DEFENSE: 'defense',
    SKILL: 'skill',
};

// ---- 状态效果 ----
const STATUS_EFFECTS = {
    STRENGTH: 'strength',       // 力量：增加攻击伤害
    DEXTERITY: 'dexterity',     // 敏捷：增加护甲获取
    POISON: 'poison',           // 中毒：回合结束受伤害，层数-1
    WEAKNESS: 'weakness',       // 虚弱：攻击伤害降低25%
    VULNERABLE: 'vulnerable',   // 易伤：受到伤害增加50%
    REGEN: 'regen',             // 回复：回合开始回复HP
    THORNS: 'thorns',           // 荆棘：受攻击时反弹伤害
    RITUAL: 'ritual',           // 仪式：回合结束获得力量
    SHARP: 'sharp',             // 锋利：下次攻击额外伤害
};

// ---- 敌人意图类型 ----
const INTENT_TYPE = {
    ATTACK: 'attack',
    DEFEND: 'defend',
    BUFF: 'buff',
    DEBUFF: 'debuff',
    ATTACK_DEFEND: 'attack_defend',
    SPECIAL: 'special',
};

// ---- 节点类型 ----
const NODE_TYPE = {
    BATTLE: 'battle',
    ELITE: 'elite',
    BOSS: 'boss',
    SHOP: 'shop',
    REST: 'rest',
    EVENT: 'event',
    START: 'start',
    TREASURE: 'treasure',
};

// ---- 药水效果 ----
const POTION_TYPE = {
    HEAL: 'heal',           // 回复药水
    ENERGY: 'energy',       // 能量药水
    STRENGTH: 'strength',   // 力量药水
    DEXTERITY: 'dexterity', // 敏捷药水
    FIRE: 'fire',           // 火焰药水（对敌伤害）
};

// ---- 药水数据 ----
const POTIONS = {
    heal_potion: {
        id: 'heal_potion',
        name: '回复药水',
        description: '回复25%最大HP',
        type: POTION_TYPE.HEAL,
        color: '#e74c3c',
        value: 0.25,
    },
    energy_potion: {
        id: 'energy_potion',
        name: '能量药水',
        description: '本回合获得2点能量',
        type: POTION_TYPE.ENERGY,
        color: '#f39c12',
        value: 2,
    },
    strength_potion: {
        id: 'strength_potion',
        name: '力量药水',
        description: '获得3点力量',
        type: POTION_TYPE.STRENGTH,
        color: '#c0392b',
        value: 3,
    },
    dexterity_potion: {
        id: 'dexterity_potion',
        name: '敏捷药水',
        description: '获得3点敏捷',
        type: POTION_TYPE.DEXTERITY,
        color: '#27ae60',
        value: 3,
    },
    fire_potion: {
        id: 'fire_potion',
        name: '火焰药水',
        description: '对所有敌人造成20伤害',
        type: POTION_TYPE.FIRE,
        color: '#e67e22',
        value: 20,
    },
};

// ---- 卡牌定义 (30+种) ----
const CARD_DEFS = {
    // ===== 攻击牌 =====
    strike: {
        id: 'strike',
        name: '斩击',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.COMMON,
        description: '造成6点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 6 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    heavy_strike: {
        id: 'heavy_strike',
        name: '重击',
        type: CARD_TYPE.ATTACK,
        cost: 2,
        rarity: RARITY.COMMON,
        description: '造成12点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 12 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    double_cut: {
        id: 'double_cut',
        name: '连斩',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.COMMON,
        description: '造成4点伤害两次',
        effect: (player, enemies, combat) => {
            const dmg = 4 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    poison_blade: {
        id: 'poison_blade',
        name: '毒刃',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.COMMON,
        description: '造成4点伤害，施加3层中毒',
        effect: (player, enemies, combat) => {
            const dmg = 4 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
            enemies[0].addStatus(STATUS_EFFECTS.POISON, 3);
        },
    },
    burning_strike: {
        id: 'burning_strike',
        name: '燃烧斩',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.COMMON,
        description: '造成4点伤害，施加2层易伤',
        effect: (player, enemies, combat) => {
            const dmg = 4 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
            enemies[0].addStatus(STATUS_EFFECTS.VULNERABLE, 2);
        },
    },
    critical_hit: {
        id: 'critical_hit',
        name: '暴击',
        type: CARD_TYPE.ATTACK,
        cost: 2,
        rarity: RARITY.COMMON,
        description: '造成14点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 14 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    whirlwind: {
        id: 'whirlwind',
        name: '旋风斩',
        type: CARD_TYPE.ATTACK,
        cost: 2,
        rarity: RARITY.RARE,
        description: '对所有敌人造成8点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 8 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            enemies.forEach(e => {
                if (e.hp > 0) combat.dealDamageToEnemy(e, dmg);
            });
        },
    },
    pierce: {
        id: 'pierce',
        name: '穿刺',
        type: CARD_TYPE.ATTACK,
        cost: 2,
        rarity: RARITY.RARE,
        description: '造成10点伤害，无视护甲',
        effect: (player, enemies, combat) => {
            const dmg = 10 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            enemies[0].takeDamage(dmg, true); // ignore armor
        },
    },
    blood_thirst: {
        id: 'blood_thirst',
        name: '嗜血斩',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.RARE,
        description: '造成6点伤害，回复2点HP',
        effect: (player, enemies, combat) => {
            const dmg = 6 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
            player.heal(2);
        },
    },
    execute: {
        id: 'execute',
        name: '处刑',
        type: CARD_TYPE.ATTACK,
        cost: 2,
        rarity: RARITY.RARE,
        description: '造成8点伤害，若敌人HP<30%则伤害翻倍',
        effect: (player, enemies, combat) => {
            let dmg = 8 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            if (enemies[0].hp / enemies[0].maxHp < 0.3) dmg *= 2;
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    cleave: {
        id: 'cleave',
        name: '横扫',
        type: CARD_TYPE.ATTACK,
        cost: 1,
        rarity: RARITY.COMMON,
        description: '对所有敌人造成5点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 5 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            enemies.forEach(e => {
                if (e.hp > 0) combat.dealDamageToEnemy(e, dmg);
            });
        },
    },
    blade_storm: {
        id: 'blade_storm',
        name: '剑刃风暴',
        type: CARD_TYPE.ATTACK,
        cost: 3,
        rarity: RARITY.LEGENDARY,
        description: '造成5点伤害五次',
        effect: (player, enemies, combat) => {
            const dmg = 5 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            for (let i = 0; i < 5; i++) {
                if (enemies[0].hp > 0) combat.dealDamageToEnemy(enemies[0], dmg);
            }
        },
    },
    heavy_swing: {
        id: 'heavy_swing',
        name: '蓄力重劈',
        type: CARD_TYPE.ATTACK,
        cost: 3,
        rarity: RARITY.RARE,
        description: '造成24点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 24 + player.getStatus(STATUS_EFFECTS.STRENGTH);
            combat.dealDamageToEnemy(enemies[0], dmg);
        },
    },
    quick_slash: {
        id: 'quick_slash',
        name: '快斩',
        type: CARD_TYPE.ATTACK,
        cost: 0,
        rarity: RARITY.RARE,
        description: '造成3点伤害',
        effect: (player, enemies, combat) => {
            const dmg = 3 + player.getStatus(STATUS_EFFECTS.STRENGTH);

function getEnemyPool(floor) {
    if (floor === 0) return ['slime', 'bat', 'fungi'];
    if (floor === 1) return ['skeleton', 'goblin', 'poison_snake', 'fungi'];
    return ['skeleton', 'goblin', 'poison_snake'];
}

function getElitePool(floor) {
    if (floor === 0) return ['elite_skeleton'];
    if (floor === 1) return ['elite_skeleton', 'shadow_assassin'];
    return ['shadow_assassin', 'gargoyle'];
}

function getBoss(floor) {
    if (floor === 0) return 'skeleton_king';
    if (floor === 1) return 'shadow_dragon';
    return 'death';
}

        this.enabled = true;
        this.initialized = false;
    }

    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch (e) {
            console.warn('Web Audio API not supported');
            this.enabled = false;
        }
    }

    ensureContext() {
        if (!this.initialized) this.init();
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    // 基础振荡器
    playTone(freq, duration, type = 'sine', volume = 0.15, delay = 0) {
        if (!this.enabled) return;
        this.ensureContext();
        if (!this.ctx) return;

        const now = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
    }

    // 噪音
    playNoise(duration, volume = 0.05, delay = 0) {
        if (!this.enabled) return;
        this.ensureContext();
        if (!this.ctx) return;

        const now = this.ctx.currentTime + delay;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const source = this.ctx.createBufferSource();
        source.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        source.connect(gain);
        gain.connect(this.ctx.destination);
        source.start(now);
    }

    // ---- 游戏音效 ----

    // 抽牌音效 - 轻快的滑动声
    drawCard() {
        this.playTone(800, 0.08, 'sine', 0.08);
        this.playTone(1200, 0.06, 'sine', 0.06, 0.04);
    }

    // 出牌音效 - 清脆的点击
    playCard() {
        this.playTone(600, 0.1, 'square', 0.06);
        this.playTone(900, 0.08, 'sine', 0.08, 0.05);
        this.playNoise(0.05, 0.03, 0.02);
    }

    // 攻击音效 - 有力的打击
    attack() {
        this.playNoise(0.12, 0.08);
        this.playTone(200, 0.15, 'sawtooth', 0.06, 0.02);
        this.playTone(100, 0.2, 'sine', 0.05, 0.08);
    }

    // 防御音效 - 沉稳的金属声
    defend() {
        this.playTone(400, 0.15, 'triangle', 0.08);
        this.playTone(500, 0.12, 'triangle', 0.06, 0.05);
        this.playNoise(0.08, 0.04, 0.03);
    }

    // 技能音效 - 魔法声
    skill() {
        this.playTone(500, 0.15, 'sine', 0.06);
        this.playTone(700, 0.15, 'sine', 0.06, 0.05);
        this.playTone(900, 0.15, 'sine', 0.06, 0.1);
        this.playTone(1100, 0.12, 'sine', 0.04, 0.15);
    }

    // 受伤音效 - 低沉的撞击
    hurt() {

    // 治疗音效 - 清新的铃声

    // 胜利音效 - 欢快的旋律
    victory() {

class Player {
    constructor() {
        this.reset();
    }

    reset() {
        this.hp = GAME_CONFIG.STARTING_HP;
        this.maxHp = GAME_CONFIG.MAX_HP;
        this.gold = GAME_CONFIG.STARTING_GOLD;
        this.energy = 0;
        this.maxEnergy = GAME_CONFIG.ENERGY_PER_TURN;
        this.armor = 0;
        this.tempStrength = 0;

        // 状态效果 { statusId: stacks }
        this.statuses = {};

        // 牌组
        this.deck = [];       // 全部卡牌ID
        this.hand = [];       // 手牌
        this.drawPile = [];   // 抽牌堆
        this.discardPile = [];// 弃牌堆
        this.exhaustPile = [];// 消耗堆

        // 药水
        this.potions = []; // 最多3个

        // 初始化牌组
        this.initDeck();
    }

    initDeck() {
        this.deck = [...STARTING_DECK];
        this.hand = [];
        this.drawPile = [];
        this.discardPile = [];
        this.exhaustPile = [];
    }

    // 准备战斗
    prepareForCombat() {
        this.armor = 0;
        this.energy = this.maxEnergy;
        this.statuses = {};
        this.tempStrength = 0;
        this.hand = [];
        this.discardPile = [];
        this.exhaustPile = [];
        this.drawPile = this.shuffleArray([...this.deck]);
    }

    // 洗牌
    shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 抽牌
    drawCards(count) {
        const drawn = [];
        for (let i = 0; i < count; i++) {
            if (this.drawPile.length === 0) {
                // 抽牌堆空了，把弃牌堆洗入
                if (this.discardPile.length === 0) break;
                this.drawPile = this.shuffleArray([...this.discardPile]);
                this.discardPile = [];
            }
            const cardId = this.drawPile.pop();
            this.hand.push(cardId);
            drawn.push(cardId);
        }
        return drawn;
    }

    // 弃掉所有手牌
    discardHand() {
        this.discardPile.push(...this.hand);
        this.hand = [];
    }

    // 弃掉指定手牌
    discardFromHand(index) {
        if (index >= 0 && index < this.hand.length) {
            const card = this.hand.splice(index, 1)[0];
            this.discardPile.push(card);
            return card;
        }
        return null;
    }

    // 使用手牌
    playCard(handIndex) {
        if (handIndex >= 0 && handIndex < this.hand.length) {
            const cardId = this.hand.splice(handIndex, 1)[0];
            this.discardPile.push(cardId);
            return cardId;
        }
        return null;
    }

    // 获取手牌数据
    getHandCards() {
        return this.hand.map(id => ({ ...CARD_DEFS[id], instanceId: Math.random() }));
    }

    // 消耗能量
    spendEnergy(amount) {
        if (this.energy >= amount) {
            this.energy -= amount;
            return true;
        }
        return false;
    }

    // 添加能量
    addEnergy(amount) {
        this.energy += amount;
    }

    // 添加护甲
    addArmor(amount) {
        this.armor += Math.max(0, amount);
    }

    // 受到伤害
    takeDamage(amount, ignoreArmor = false) {
        let actualDamage = amount;
        if (!ignoreArmor) {
            if (this.armor >= actualDamage) {
                this.armor -= actualDamage;
                actualDamage = 0;
            } else {
                actualDamage -= this.armor;
                this.armor = 0;
            }
        }
        if (this.hasStatus(STATUS_EFFECTS.VULNERABLE)) {
            actualDamage = Math.floor(actualDamage * 1.5);
        }
        this.hp = Math.max(0, this.hp - actualDamage);
        return actualDamage;
    }

    // 治疗
    heal(amount) {
        const oldHp = this.hp;
        this.hp = Math.min(this.maxHp, this.hp + amount);
        return this.hp - oldHp;
    }

    // 护甲在回合结束时清零
    clearArmor() {
        this.armor = 0;
    }

    // 状态效果管理
    addStatus(status, stacks) {
        if (!this.statuses[status]) this.statuses[status] = 0;
        this.statuses[status] += stacks;
    }

    removeStatus(status) {
        delete this.statuses[status];
    }

    getStatus(status) {
        return this.statuses[status] || 0;
    }

    hasStatus(status) {
        return (this.statuses[status] || 0) > 0;
    }

    // 回合开始处理
    onTurnStart() {
        this.energy = this.maxEnergy;
        // 中毒
        if (this.hasStatus(STATUS_EFFECTS.POISON)) {
            const poisonDmg = this.statuses[STATUS_EFFECTS.POISON];
            this.hp = Math.max(0, this.hp - poisonDmg);
            this.statuses[STATUS_EFFECTS.POISON]--;
            if (this.statuses[STATUS_EFFECTS.POISON] <= 0) delete this.statuses[STATUS_EFFECTS.POISON];
        }
        // 回复
        if (this.hasStatus(STATUS_EFFECTS.REGEN)) {
            this.heal(this.statuses[STATUS_EFFECTS.REGEN]);
            this.statuses[STATUS_EFFECTS.REGEN]--;
            if (this.statuses[STATUS_EFFECTS.REGEN] <= 0) delete this.statuses[STATUS_EFFECTS.REGEN];
        }
    }

    // 回合结束处理
    onTurnEnd() {
        // 临时力量
        if (this.tempStrength > 0) {
            this.statuses[STATUS_EFFECTS.STRENGTH] = (this.statuses[STATUS_EFFECTS.STRENGTH] || 0) - this.tempStrength;
            if (this.statuses[STATUS_EFFECTS.STRENGTH] <= 0) delete this.statuses[STATUS_EFFECTS.STRENGTH];
            this.tempStrength = 0;
        }
        // 虚弱减少
        this.reduceStatus(STATUS_EFFECTS.WEAKNESS);
        // 易伤减少
        this.reduceStatus(STATUS_EFFECTS.VULNERABLE);
    }

    reduceStatus(status) {
        if (this.statuses[status]) {
            this.statuses[status]--;
            if (this.statuses[status] <= 0) delete this.statuses[status];
        }
    }

    // 是否存活
    isAlive() {
        return this.hp > 0;
    }

    // 药水管理
    addPotion(potionId) {
        if (this.potions.length < GAME_CONFIG.POTION_SLOTS) {
            this.potions.push(potionId);
            return true;
        }
        return false;
    }

    usePotion(index) {
        if (index >= 0 && index < this.potions.length) {
            return this.potions.splice(index, 1)[0];
        }
        return null;
    }

    // 添加卡牌到牌组
    addCardToDeck(cardId) {
        this.deck.push(cardId);
    }

    // 从牌组移除卡牌
    removeCardFromDeck(cardId) {
        const idx = this.deck.indexOf(cardId);
        if (idx !== -1) {
            this.deck.splice(idx, 1);
            return true;
        }
        return false;
    }

    // 增加最大HP
    increaseMaxHp(amount) {
        this.maxHp += amount;
        this.hp += amount;
    }
}

class Enemy {
    constructor(defId) {
        const def = ENEMY_DEFS[defId];
        if (!def) throw new Error(`Unknown enemy: ${defId}`);

        this.id = def.id;
        this.name = def.name;
        this.emoji = def.emoji;
        this.type = def.type;
        this.patterns = def.patterns;
        this.gold = this.randomBetween(def.gold[0], def.gold[1]);

        this.maxHp = this.randomBetween(def.maxHp[0], def.maxHp[1]);
        this.hp = this.maxHp;
        this.armor = 0;
        this.statuses = {};
        this.lastDamageTaken = 0;

        // 当前意图
        this.currentIntent = null;
        this.chooseIntent();
    }

    randomBetween(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 选择下一个行动意图
    chooseIntent() {
        const totalWeight = this.patterns.reduce((sum, p) => sum + p.weight, 0);
        let rand = Math.random() * totalWeight;
        for (const pattern of this.patterns) {
            rand -= pattern.weight;
            if (rand <= 0) {
                this.currentIntent = { ...pattern };
                return;
            }
        }
        this.currentIntent = { ...this.patterns[0] };
    }

    // 获取意图显示文本
    getIntentDisplay() {
        if (!this.currentIntent) return { text: '?', emoji: '❓' };

        const intent = this.currentIntent;
        switch (intent.intent) {
            case INTENT_TYPE.ATTACK: {
                let dmg = intent.damage;
                if (this.hasStatus(STATUS_EFFECTS.STRENGTH)) dmg += this.statuses[STATUS_EFFECTS.STRENGTH];
                const hits = intent.hits || 1;
                if (hits > 1) return { text: `${dmg}x${hits}`, emoji: '⚔️', type: 'attack' };
                return { text: `${dmg}`, emoji: '⚔️', type: 'attack' };
            }
            case INTENT_TYPE.DEFEND:
                return { text: `${intent.armor}`, emoji: '🛡️', type: 'defend' };
            case INTENT_TYPE.BUFF:
                return { text: `${STATUS_NAMES[intent.status] || intent.status}+${intent.stacks}`, emoji: '⬆️', type: 'buff' };
            case INTENT_TYPE.DEBUFF:
                return { text: `${STATUS_NAMES[intent.status] || intent.status}+${intent.stacks}`, emoji: '⬇️', type: 'debuff' };
            case INTENT_TYPE.ATTACK_DEFEND: {
                let dmg = intent.damage;
                if (this.hasStatus(STATUS_EFFECTS.STRENGTH)) dmg += this.statuses[STATUS_EFFECTS.STRENGTH];
                return { text: `${dmg}+${intent.armor}🛡`, emoji: '⚔️🛡️', type: 'attack_defend' };
            }
            case INTENT_TYPE.SPECIAL: {
                let dmg = intent.damage || 0;
                if (this.hasStatus(STATUS_EFFECTS.STRENGTH)) dmg += this.statuses[STATUS_EFFECTS.STRENGTH];
                return { text: intent.name || `${dmg}`, emoji: '💀', type: 'special' };
            }
            default:
                return { text: '?', emoji: '❓', type: 'unknown' };
        }
    }

    // 执行意图（敌人回合）
    executeIntent(player) {
        if (!this.currentIntent) return;
        const intent = this.currentIntent;
        const results = [];

        // 中毒伤害
        if (this.hasStatus(STATUS_EFFECTS.POISON)) {
            const poisonDmg = this.statuses[STATUS_EFFECTS.POISON];
            this.hp = Math.max(0, this.hp - poisonDmg);
            this.statuses[STATUS_EFFECTS.POISON]--;
            if (this.statuses[STATUS_EFFECTS.POISON] <= 0) delete this.statuses[STATUS_EFFECTS.POISON];
            results.push({ type: 'poison', target: 'self', damage: poisonDmg });
        }

        // 回复效果
        if (this.hasStatus(STATUS_EFFECTS.REGEN)) {
            this.heal(this.statuses[STATUS_EFFECTS.REGEN]);
            this.statuses[STATUS_EFFECTS.REGEN]--;
            if (this.statuses[STATUS_EFFECTS.REGEN] <= 0) delete this.statuses[STATUS_EFFECTS.REGEN];
        }

        if (this.hp <= 0) return results;

        switch (intent.intent) {
            case INTENT_TYPE.ATTACK: {
                let dmg = intent.damage + (this.statuses[STATUS_EFFECTS.STRENGTH] || 0);
                const hits = intent.hits || 1;
                for (let i = 0; i < hits; i++) {
                    if (this.hasStatus(STATUS_EFFECTS.WEAKNESS)) dmg = Math.floor(dmg * 0.75);
                    const actualDmg = player.takeDamage(dmg);
                    results.push({ type: 'attack', damage: actualDmg, blocked: dmg - actualDmg });
                }
                break;
            }
            case INTENT_TYPE.DEFEND: {
                this.armor += intent.armor;
                results.push({ type: 'defend', armor: intent.armor });
                break;
            }
            case INTENT_TYPE.BUFF: {
                this.addStatus(intent.status, intent.stacks);
                results.push({ type: 'buff', status: intent.status, stacks: intent.stacks });
                break;
            }
            case INTENT_TYPE.DEBUFF: {
                player.addStatus(intent.status, intent.stacks);
                results.push({ type: 'debuff', status: intent.status, stacks: intent.stacks });
                break;
            }
            case INTENT_TYPE.ATTACK_DEFEND: {
                let dmg = intent.damage + (this.statuses[STATUS_EFFECTS.STRENGTH] || 0);
                if (this.hasStatus(STATUS_EFFECTS.WEAKNESS)) dmg = Math.floor(dmg * 0.75);
                this.armor += intent.armor;
                const actualDmg = player.takeDamage(dmg);
                results.push({ type: 'attack_defend', damage: actualDmg, armor: intent.armor, blocked: dmg - actualDmg });
                break;
            }
            case INTENT_TYPE.SPECIAL: {
                let dmg = (intent.damage || 0) + (this.statuses[STATUS_EFFECTS.STRENGTH] || 0);
                if (this.hasStatus(STATUS_EFFECTS.WEAKNESS)) dmg = Math.floor(dmg * 0.75);
                const actualDmg = player.takeDamage(dmg);
                results.push({ type: 'special', name: intent.name, damage: actualDmg });
                break;
            }
        }

        // 回合结束减少状态
        this.reduceStatus(STATUS_EFFECTS.WEAKNESS);
        this.reduceStatus(STATUS_EFFECTS.VULNERABLE);

        // 仪式效果
        if (this.hasStatus(STATUS_EFFECTS.RITUAL)) {
            this.addStatus(STATUS_EFFECTS.STRENGTH, this.statuses[STATUS_EFFECTS.RITUAL]);
        }

        return results;
    }

    // 受到伤害
    takeDamage(amount, ignoreArmor = false) {
        let actualDamage = amount;

        if (!ignoreArmor) {
            // 易伤
            if (this.hasStatus(STATUS_EFFECTS.VULNERABLE)) {
                actualDamage = Math.floor(actualDamage * 1.5);
            }
            if (this.armor >= actualDamage) {
                this.armor -= actualDamage;
                actualDamage = 0;
            } else {
                actualDamage -= this.armor;
                this.armor = 0;
            }
        }

        this.hp = Math.max(0, this.hp - actualDamage);
        this.lastDamageTaken = actualDamage;

        // 荆棘反伤
        if (this.hasStatus(STATUS_EFFECTS.THORNS)) {
            // 荆棘反伤由combat处理
        }

        return actualDamage;
    }

    // 治疗
    heal(amount) {
        this.hp = Math.min(this.maxHp, this.hp + amount);
    }

    // 状态管理
    addStatus(status, stacks) {
        if (!this.statuses[status]) this.statuses[status] = 0;
        this.statuses[status] += stacks;
    }

    removeStatus(status) {
        delete this.statuses[status];
    }

    getStatus(status) {
        return this.statuses[status] || 0;
    }

    hasStatus(status) {
        return (this.statuses[status] || 0) > 0;
    }

    reduceStatus(status) {
        if (this.statuses[status]) {
            this.statuses[status]--;
            if (this.statuses[status] <= 0) delete this.statuses[status];
        }
    }

    // 清除护甲（回合结束）
    clearArmor() {
        this.armor = 0;
    }

    isAlive() {
        return this.hp > 0;
    }

    // 创建敌人实例
    static createEnemies(defIds) {
        return defIds.map(id => new Enemy(id));
    }
}

class CombatSystem {
    constructor(player, onCombatEnd) {
        this.player = player;
        this.onCombatEnd = onCombatEnd;
        this.enemies = [];
        this.turn = 0;
        this.isPlayerTurn = true;
        this.keepArmor = false;
        this.combatLog = [];
        this.animations = [];
        this.selectedEnemyIndex = 0;
        this.isProcessing = false;
    }

    // 开始战斗
    startCombat(enemies) {
        this.enemies = enemies;
        this.turn = 0;
        this.isPlayerTurn = true;
        this.keepArmor = false;
        this.combatLog = [];
        this.animations = [];
        this.selectedEnemyIndex = 0;
        this.isProcessing = false;

        this.player.prepareForCombat();
        sound.enemyAppear();
        this.startPlayerTurn();
    }

    // 开始玩家回合
    startPlayerTurn() {
        this.turn++;
        this.isPlayerTurn = true;
        this.player.onTurnStart();
        this.drawCards(GAME_CONFIG.CARDS_PER_TURN);
        sound.turnStart();
        this.addLog(`--- 第${this.turn}回合 ---`);
    }

    // 抽牌
    drawCards(count) {
        const drawn = this.player.drawCards(count);
        drawn.forEach(() => sound.drawCard());
        return drawn;
    }

    // 出牌
    playCard(handIndex) {
        if (!this.isPlayerTurn || this.isProcessing) return false;

        const cardId = this.player.hand[handIndex];
        if (!cardId) return false;

        const def = CARD_DEFS[cardId];
        if (!def) return false;

        // 检查能量
        if (!this.player.spendEnergy(def.cost)) {
            sound.noEnergy();
            return false;
        }

        // 执行卡牌
        this.player.playCard(handIndex);
        sound.playCard();

        // 播放音效
        switch (def.type) {
            case 'attack': sound.attack(); break;
            case 'defense': sound.defend(); break;
            case 'skill': sound.skill(); break;
        }

        // 执行效果
        def.effect(this.player, this.getAliveEnemies(), this);
        this.addLog(`使用了 ${def.name}`);

        // 添加动画
        this.addAnimation({
            type: 'card_play',
            cardName: def.name,
            cardType: def.type,
            duration: 500,
        });

        // 检查敌人是否全部死亡
        if (this.checkEnemiesDead()) {
            this.endCombat(true);
            return true;
        }

        return true;
    }

    // 对敌人造成伤害（包含荆棘反伤）
    dealDamageToEnemy(enemy, amount) {
        if (!enemy.isAlive()) return;

        const actualDmg = enemy.takeDamage(amount);
        this.addAnimation({
            type: 'damage',
            target: 'enemy',
            enemyId: enemy.id,
            value: actualDmg,
            duration: 400,
        });

        // 荆棘反伤
        if (enemy.hasStatus(STATUS_EFFECTS.THORNS) && actualDmg > 0) {
            const thornsDmg = enemy.getStatus(STATUS_EFFECTS.THORNS);
            this.player.takeDamage(thornsDmg, true);
            this.addLog(`${enemy.name} 的荆棘反弹了 ${thornsDmg} 点伤害`);
        }
    }

    // 添加能量
    addEnergy(amount) {
        this.player.addEnergy(amount);
    }

    // 弃掉随机手牌
    discardRandom(count) {
        for (let i = 0; i < count; i++) {
            if (this.player.hand.length > 0) {
                const idx = Math.floor(Math.random() * this.player.hand.length);
                this.player.discardFromHand(idx);
            }
        }
    }

    // 使用药水
    usePotion(potionIndex, enemyIndex = 0) {
        const potionId = this.player.usePotion(potionIndex);
        if (!potionId) return;

        const potion = POTIONS[potionId];
        if (!potion) return;

        sound.skill();
        this.addLog(`使用了 ${potion.name}`);

        switch (potion.type) {
            case POTION_TYPE.HEAL:
                this.player.heal(Math.floor(this.player.maxHp * potion.value));
                break;
            case POTION_TYPE.ENERGY:
                this.player.addEnergy(potion.value);
                break;
            case POTION_TYPE.STRENGTH:
                this.player.addStatus(STATUS_EFFECTS.STRENGTH, potion.value);
                break;
            case POTION_TYPE.DEXTERITY:
                this.player.addStatus(STATUS_EFFECTS.DEXTERITY, potion.value);
                break;
            case POTION_TYPE.FIRE:
                this.enemies.forEach(e => {
                    if (e.isAlive()) this.dealDamageToEnemy(e, potion.value);
                });
                break;
        }

        if (this.checkEnemiesDead()) {
            this.endCombat(true);
        }
    }

    // 结束玩家回合
    endPlayerTurn() {
        if (!this.isPlayerTurn || this.isProcessing) return;

        this.isPlayerTurn = false;
        this.isProcessing = true;

        // 弃掉手牌
        this.player.discardHand();

        // 回合结束处理
        if (!this.keepArmor) {
            this.player.clearArmor();
        }
        this.player.onTurnEnd();

        // 敌人回合
        this.executeEnemyTurns();
    }

    // 执行敌人回合
    async executeEnemyTurns() {
        const aliveEnemies = this.getAliveEnemies();

        for (let i = 0; i < aliveEnemies.length; i++) {
            const enemy = aliveEnemies[i];
            if (!enemy.isAlive()) continue;

            await this.wait(600);

            const results = enemy.executeIntent(this.player);

            // 处理结果动画
            results.forEach(result => {
                switch (result.type) {
                    case 'attack':
                        sound.hurt();
                        this.addLog(`${enemy.name} 攻击了你，造成 ${result.damage} 点伤害`);
                        this.addAnimation({ type: 'damage', target: 'player', value: result.damage, duration: 400 });
                        break;
                    case 'defend':
                        sound.defend();
                        this.addLog(`${enemy.name} 获得了 ${result.armor} 点护甲`);
                        break;
                    case 'buff':
                        this.addLog(`${enemy.name} 强化了自身`);
                        break;
                    case 'debuff':
                        this.addLog(`${enemy.name} 对你施加了负面效果`);
                        break;
                    case 'attack_defend':
                        sound.hurt();
                        this.addLog(`${enemy.name} 攻击了你 (${result.damage}) 并获得 ${result.armor} 护甲`);
                        this.addAnimation({ type: 'damage', target: 'player', value: result.damage, duration: 400 });
                        break;
                    case 'special':
                        sound.hurt();
                        this.addLog(`${enemy.name} 使用了 ${result.name}，造成 ${result.damage} 点伤害`);
                        this.addAnimation({ type: 'damage', target: 'player', value: result.damage, duration: 500 });
                        break;
                    case 'poison':
                        sound.poison();
                        this.addLog(`${enemy.name} 受到了 ${result.damage} 点中毒伤害`);
                        break;
                }
            });

            // 敌人清除护甲
            enemy.clearArmor();

            // 敌人选择下一个意图
            enemy.chooseIntent();

            // 检查玩家是否死亡
            if (!this.player.isAlive()) {
                this.endCombat(false);
                return;
            }
        }

        await this.wait(400);

        // 检查敌人是否全部死亡（中毒等）
        if (this.checkEnemiesDead()) {
            this.endCombat(true);
            return;
        }

        // 开始新回合
        this.isProcessing = false;
        this.startPlayerTurn();
    }

    // 检查敌人是否全部死亡
    checkEnemiesDead() {
        return this.enemies.every(e => !e.isAlive());
    }

    // 获取存活敌人
    getAliveEnemies() {
        return this.enemies.filter(e => e.isAlive());
    }

    // 结束战斗
    endCombat(victory) {
        this.isProcessing = true;
        setTimeout(() => {
            if (victory) {
                sound.victory();
                const goldReward = this.calculateGoldReward();
                this.player.gold += goldReward;
                this.addLog(`胜利！获得 ${goldReward} 金币`);
            } else {
                sound.defeat();
                this.addLog('你被击败了...');
            }
            if (this.onCombatEnd) {
                this.onCombatEnd(victory, this.getRewards(victory));
            }
        }, 800);
    }

    // 计算金币奖励
    calculateGoldReward() {
        let total = 0;
        this.enemies.forEach(e => {
            total += e.gold;
        });
        return total;
    }

    // 获取战斗奖励
    getRewards(victory) {
        if (!victory) return null;
        return {
            gold: this.calculateGoldReward(),
            enemies: this.enemies,
        };
    }

    // 等待
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // 添加日志
    addLog(msg) {
        this.combatLog.push({ text: msg, time: Date.now() });
        if (this.combatLog.length > 50) this.combatLog.shift();
    }

    // 添加动画
    addAnimation(anim) {
        anim.startTime = Date.now();
        this.animations.push(anim);
    }

    // 获取当前动画
    getActiveAnimations() {
        const now = Date.now();
        this.animations = this.animations.filter(a => now - a.startTime < a.duration);
        return this.animations;
    }
}

class MapNode {
    constructor(type, row, col, floor) {
        this.type = type;
        this.row = row;
        this.col = col;
        this.floor = floor;
        this.id = `${floor}_${row}_${col}`;
        this.connections = []; // 连接到下一层的节点ID
        this.visited = false;
        this.accessible = false;
        this.enemyPool = [];
        this.isCurrentNode = false;

        // 根据类型设置敌人池
        this.setupNode();
    }

    setupNode() {
        switch (this.type) {
            case NODE_TYPE.BATTLE:
                this.enemyPool = getEnemyPool(this.floor);
                this.enemiesToSpawn = this.randomInt(1, 2);
                break;
            case NODE_TYPE.ELITE:
                this.enemyPool = getElitePool(this.floor);
                this.enemiesToSpawn = 1;
                break;
            case NODE_TYPE.BOSS:
                this.enemyPool = [getBoss(this.floor)];
                this.enemiesToSpawn = 1;
                break;
            case NODE_TYPE.EVENT:
                this.eventId = null; // 随机选择
                break;
        }
    }

    randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 获取该节点的敌人列表
    getEnemies() {
        const enemies = [];
        for (let i = 0; i < this.enemiesToSpawn; i++) {
            const idx = Math.floor(Math.random() * this.enemyPool.length);
            enemies.push(this.enemyPool[idx]);
        }
        return enemies;
    }

    // 获取节点显示信息
    getDisplayInfo() {
        switch (this.type) {
            case NODE_TYPE.BATTLE: return { emoji: '⚔️', name: '战斗', color: COLORS.NODE_BATTLE };
            case NODE_TYPE.ELITE: return { emoji: '🔥', name: '精英', color: COLORS.NODE_ELITE };
            case NODE_TYPE.BOSS: return { emoji: '💀', name: 'BOSS', color: COLORS.NODE_BOSS };
            case NODE_TYPE.SHOP: return { emoji: '🛒', name: '商店', color: COLORS.NODE_SHOP };
            case NODE_TYPE.REST: return { emoji: '🏕️', name: '休息', color: COLORS.NODE_REST };
            case NODE_TYPE.EVENT: return { emoji: '❓', name: '事件', color: COLORS.NODE_EVENT };
            case NODE_TYPE.TREASURE: return { emoji: '📦', name: '宝藏', color: COLORS.NODE_TREASURE };
            case NODE_TYPE.START: return { emoji: '🏠', name: '起点', color: COLORS.NODE_START };
            default: return { emoji: '?', name: '?', color: '#666' };
        }
    }
}

class GameMap {
    constructor() {
        this.floors = []; // 3层
        this.currentFloor = 0;
        this.currentNode = null;
        this.visitedNodes = new Set();
    }

    // 生成完整地图
    generate() {
        this.floors = [];
        for (let floor = 0; floor < GAME_CONFIG.MAP_LAYERS; floor++) {
            this.floors.push(this.generateFloor(floor));
        }
        this.currentFloor = 0;
        this.currentNode = null;
        this.visitedNodes = new Set();

        // 标记第一层前排节点为可访问
        if (this.floors[0].length > 0) {
            this.floors[0][0].forEach(node => {
                node.accessible = true;
            });
        }

        return this.floors;
    }

    // 生成单层地图
    generateFloor(floor) {
        const rows = [];
        const rowCounts = [3, 4, 3, 4, 3]; // 5行节点

        // 生成所有行
        for (let row = 0; row < rowCounts.length; row++) {
            const nodes = [];
            const count = rowCounts[row];

            for (let col = 0; col < count; col++) {
                const type = this.getNodeType(row, col, floor, rowCounts.length);
                const node = new MapNode(type, row, col, floor);
                nodes.push(node);
            }
            rows.push(nodes);
        }

        // 建立连接
        for (let row = 0; row < rows.length - 1; row++) {
            this.connectRows(rows[row], rows[row + 1]);
        }

        // 最后一行连接到BOSS
        const bossNode = new MapNode(NODE_TYPE.BOSS, rowCounts.length, 0, floor);
        rows.push([bossNode]);
        const lastRow = rows[rows.length - 2];
        lastRow.forEach(node => {
            node.connections.push(bossNode.id);
        });

        return rows;
    }

    // 确定节点类型
    getNodeType(row, col, floor, totalRows) {
        // 第一行：普通战斗
        if (row === 0) return NODE_TYPE.BATTLE;

        // 最后一行：精英或事件
        if (row === totalRows - 1) {
            return Math.random() < 0.5 ? NODE_TYPE.ELITE : NODE_TYPE.BATTLE;
        }

        // 中间行：混合
        const rand = Math.random();
        if (rand < 0.40) return NODE_TYPE.BATTLE;
        if (rand < 0.55) return NODE_TYPE.EVENT;
        if (rand < 0.65) return NODE_TYPE.ELITE;
        if (rand < 0.75) return NODE_TYPE.SHOP;
        if (rand < 0.85) return NODE_TYPE.REST;
        return NODE_TYPE.TREASURE;
    }

    // 连接两行节点
    connectRows(row1, row2) {
        // 确保每个节点至少有一个连接
        row1.forEach((node1, i1) => {
            // 计算可能的连接目标
            const ratio = row2.length / row1.length;
            const center = i1 * ratio + ratio / 2;

            // 连接1-2个下一行节点
            const connections = [];
            const mainIdx = Math.min(Math.floor(center), row2.length - 1);
            connections.push(mainIdx);

            // 有时添加第二个连接
            if (Math.random() < 0.5) {
                if (mainIdx > 0 && Math.random() < 0.5) {
                    connections.push(mainIdx - 1);
                } else if (mainIdx < row2.length - 1) {
                    connections.push(mainIdx + 1);
                }
            }

            connections.forEach(idx => {
                if (!node1.connections.includes(row2[idx].id)) {
                    node1.connections.push(row2[idx].id);
                }
            });
        });

        // 确保下一行每个节点至少被一个上一行节点连接
        row2.forEach((node2, i2) => {
            const hasConnection = row1.some(n => n.connections.includes(node2.id));
            if (!hasConnection) {
                // 找最近的上一行节点
                const closestIdx = Math.min(Math.floor(i2 * row1.length / row2.length), row1.length - 1);
                row1[closestIdx].connections.push(node2.id);
            }
        });
    }

    // 访问节点
    visitNode(nodeId) {
        const node = this.findNode(nodeId);
        if (!node) return null;

        node.visited = true;
        node.isCurrentNode = true;
        this.visitedNodes.add(nodeId);

        // 取消前一个当前节点标记
        this.getAllNodes().forEach(n => {
            if (n.id !== nodeId) n.isCurrentNode = false;
        });

        // 更新可访问节点
        this.updateAccessibility(node);

        return node;
    }

    // 更新可访问性
    updateAccessibility(currentNode) {
        // 取消所有可访问标记
        this.getAllNodes().forEach(n => n.accessible = false);

        // 设置连接的节点为可访问
        currentNode.connections.forEach(connId => {
            const node = this.findNode(connId);
            if (node) node.accessible = true;
        });
    }

    // 查找节点
    findNode(nodeId) {
        for (const floor of this.floors) {
            for (const row of floor) {
                for (const node of row) {
                    if (node.id === nodeId) return node;
                }
            }
        }
        return null;
    }

    // 获取当前楼层所有节点
    getCurrentFloorNodes() {
        return this.floors[this.currentFloor] || [];
    }

    // 获取所有节点
    getAllNodes() {
        const nodes = [];
        this.floors.forEach(floor => {
            floor.forEach(row => {
                row.forEach(node => nodes.push(node));
            });
        });
        return nodes;
    }

    // 进入下一层
    advanceFloor() {
        if (this.currentFloor < GAME_CONFIG.MAP_LAYERS - 1) {
            this.currentFloor++;
            // 标记新层前排节点为可访问
            const firstRow = this.floors[this.currentFloor][0];
            if (firstRow) {
                firstRow.forEach(node => node.accessible = true);
            }
            return true;
        }
        return false;
    }

    // 绘制地图
    drawMap(ctx, canvasWidth, canvasHeight, hoveredNode = null) {
        const floor = this.floors[this.currentFloor];
        if (!floor) return;

        const nodeSize = 40;
        const padding = 60;
        const availH = canvasHeight - padding * 2;
        const availW = canvasWidth - padding * 2;

        // 计算节点位置
        const nodePositions = {};
        const rowGap = availH / (floor.length + 1);

        floor.forEach((row, rowIdx) => {
            const colGap = availW / (row.length + 1);
            row.forEach((node, colIdx) => {
                const x = padding + colGap * (colIdx + 1);
                const y = padding + rowGap * (rowIdx + 1);
                nodePositions[node.id] = { x, y, node };
            });
        });

        // 绘制连接线
        ctx.lineWidth = 2;
        floor.forEach(row => {
            row.forEach(node => {
                const pos = nodePositions[node.id];
                if (!pos) return;

                node.connections.forEach(connId => {
                    const targetPos = nodePositions[connId];
                    if (!targetPos) return;

                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);

                    // 贝塞尔曲线
                    const midY = (pos.y + targetPos.y) / 2;
                    ctx.bezierCurveTo(pos.x, midY, targetPos.x, midY, targetPos.x, targetPos.y);

                    const isAccessible = node.visited && targetPos.node.accessible;
                    ctx.strokeStyle = isAccessible ? '#e74c3c' : '#4a5568';
                    ctx.lineWidth = isAccessible ? 3 : 1.5;
                    ctx.setLineDash(isAccessible ? [] : [5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                });
            });
        });

        // 绘制节点
        Object.values(nodePositions).forEach(({ x, y, node }) => {
            const info = node.getDisplayInfo();
            const isHovered = hoveredNode && hoveredNode.id === node.id;
            const size = isHovered ? nodeSize * 1.2 : nodeSize;

            // 节点阴影
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 2;

            // 节点背景圆
            ctx.beginPath();
            ctx.arc(x, y, size / 2, 0, Math.PI * 2);

            if (node.visited) {
                ctx.fillStyle = info.color + '80';
            } else if (node.accessible) {
                ctx.fillStyle = info.color;
            } else {
                ctx.fillStyle = '#2d3748';
            }
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 边框
            ctx.beginPath();
            ctx.arc(x, y, size / 2, 0, Math.PI * 2);
            if (node.isCurrentNode) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
            } else if (node.accessible) {
                ctx.strokeStyle = info.color;
                ctx.lineWidth = 2;
            } else if (node.visited) {
                ctx.strokeStyle = info.color + '60';
                ctx.lineWidth = 1;
            } else {
                ctx.strokeStyle = '#4a5568';
                ctx.lineWidth = 1;
            }
            ctx.stroke();

            // 节点图标
            ctx.font = `${isHovered ? 22 : 18}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.fillText(info.emoji, x, y);

            // 节点名称（悬停时显示）
            if (isHovered) {
                ctx.font = '12px "Microsoft YaHei", sans-serif';
                ctx.fillStyle = '#fff';
                ctx.fillText(info.name, x, y + size / 2 + 14);
            }
        });

        // 绘制楼层标题
        ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ecf0f1';
        ctx.textAlign = 'center';
        const floorNames = ['第一层', '第二层', '第三层'];
        ctx.fillText(floorNames[this.currentFloor] || `第${this.currentFloor + 1}层`, canvasWidth / 2, 30);
    }

    // 获取悬停的节点
    getNodeAtPos(x, y, canvasWidth, canvasHeight) {
        const floor = this.floors[this.currentFloor];
        if (!floor) return null;

        const nodeSize = 40;
        const padding = 60;
        const availH = canvasHeight - padding * 2;
        const availW = canvasWidth - padding * 2;
        const rowGap = availH / (floor.length + 1);

        for (let rowIdx = 0; rowIdx < floor.length; rowIdx++) {
            const colGap = availW / (floor[rowIdx].length + 1);
            for (let colIdx = 0; colIdx < floor[rowIdx].length; colIdx++) {
                const node = floor[rowIdx][colIdx];
                const nx = padding + colGap * (colIdx + 1);
                const ny = padding + rowGap * (rowIdx + 1);

                const dist = Math.sqrt((x - nx) ** 2 + (y - ny) ** 2);
                if (dist <= nodeSize / 2 + 5) {
                    return node;
                }
            }
        }
        return null;
    }
}

class CardSystem {
    constructor() {
        this.selectedCardIndex = -1;
    }

    // 获取卡牌定义
    getCardDef(cardId) {
        return CARD_DEFS[cardId] || null;
    }

    // 获取卡牌类型颜色
    getCardTypeColor(type) {
        switch (type) {
            case CARD_TYPE.ATTACK: return COLORS.CARD_ATTACK;
            case CARD_TYPE.DEFENSE: return COLORS.CARD_DEFENSE;
            case CARD_TYPE.SKILL: return COLORS.CARD_SKILL;
            default: return '#666';
        }
    }

    // 获取稀有度颜色
    getRarityColor(rarity) {
        switch (rarity) {
            case RARITY.COMMON: return COLORS.RARITY_COMMON;
            case RARITY.RARE: return COLORS.RARITY_RARE;
            case RARITY.LEGENDARY: return COLORS.RARITY_LEGENDARY;
            default: return '#666';
        }
    }

    // 获取卡牌类型图标
    getCardTypeIcon(type) {
        switch (type) {
            case CARD_TYPE.ATTACK: return '⚔️';
            case CARD_TYPE.DEFENSE: return '🛡️';
            case CARD_TYPE.SKILL: return '✨';
            default: return '❓';
        }
    }

    // 获取稀有度名
    getRarityName(rarity) {
        switch (rarity) {
            case RARITY.COMMON: return '普通';
            case RARITY.RARE: return '稀有';
            case RARITY.LEGENDARY: return '传说';
            default: return '';
        }
    }

    // 生成随机卡牌奖励
    generateCardRewards(floor) {
        const rewards = [];
        const pool = this.getRewardPool(floor);

        for (let i = 0; i < CARD_REWARD_COUNT; i++) {
            const cardId = this.randomFromPool(pool);
            if (cardId && !rewards.includes(cardId)) {
                rewards.push(cardId);
            } else {
                // 如果重复，再选一次
                const alt = this.randomFromPool(pool);
                rewards.push(alt);
            }
        }
        return rewards;
    }

    // 获取奖励卡牌池
    getRewardPool(floor) {
        const allCards = Object.keys(CARD_DEFS).filter(id => id !== 'strike' && id !== 'defend');
        if (floor === 0) {
            return allCards.filter(id => {
                const def = CARD_DEFS[id];
                return def.rarity === RARITY.COMMON;
            });
        } else if (floor === 1) {
            return allCards.filter(id => {
                const def = CARD_DEFS[id];
                return def.rarity === RARITY.COMMON || def.rarity === RARITY.RARE;
            });
        }
        return allCards;
    }

    // 从池中随机选一张
    randomFromPool(pool) {
        if (pool.length === 0) return null;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 获取商店可售卡牌
    getShopCards(floor) {
        const cards = [];
        const pool = [...SHOP_CARD_POOL];
        for (let i = 0; i < 5; i++) {
            const idx = Math.floor(Math.random() * pool.length);
            cards.push(pool.splice(idx, 1)[0]);
            if (pool.length === 0) break;
        }
        return cards;
    }

    // Canvas绘制卡牌
    drawCard(ctx, cardId, x, y, width, height, options = {}) {
        const def = CARD_DEFS[cardId];
        if (!def) return;

        const { selected = false, playable = true, hovered = false } = options;
        const scale = hovered ? 1.05 : 1;
        const centerX = x + width / 2;
        const centerY = y + height / 2;

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.scale(scale, scale);
        ctx.translate(-centerX, -centerY);

        const typeColor = this.getCardTypeColor(def.type);
        const rarityColor = this.getRarityColor(def.rarity);
        const alpha = playable ? 1.0 : 0.5;
        ctx.globalAlpha = alpha;

        // 卡牌阴影
        ctx.shadowColor = selected ? '#fff' : 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = selected ? 15 : 8;
        ctx.shadowOffsetY = 3;

        // 卡牌背景
        this.drawRoundedRect(ctx, x, y, width, height, 10);
        const grad = ctx.createLinearGradient(x, y, x, y + height);
        grad.addColorStop(0, '#2c3e50');
        grad.addColorStop(0.3, '#1a252f');
        grad.addColorStop(1, '#0d1117');
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        // 边框 - 稀有度颜色
        this.drawRoundedRect(ctx, x, y, width, height, 10);
        ctx.strokeStyle = selected ? '#fff' : rarityColor;
        ctx.lineWidth = selected ? 3 : 2;
        ctx.stroke();

        // 内边框 - 类型颜色
        this.drawRoundedRect(ctx, x + 4, y + 4, width - 8, height - 8, 8);
        ctx.strokeStyle = typeColor;
        ctx.lineWidth = 1;
        ctx.stroke();

        // 费用圆圈
        const costX = x + 18;
        const costY = y + 18;
        ctx.beginPath();
        ctx.arc(costX, costY, 14, 0, Math.PI * 2);
        const costGrad = ctx.createRadialGradient(costX - 3, costY - 3, 0, costX, costY, 14);
        costGrad.addColorStop(0, '#f39c12');
        costGrad.addColorStop(1, '#e67e22');
        ctx.fillStyle = costGrad;
        ctx.fill();
        ctx.strokeStyle = '#d35400';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 费用数字
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(def.cost.toString(), costX, costY);

        // 类型图标
        const typeIcon = this.getCardTypeIcon(def.type);
        ctx.font = '16px serif';
        ctx.textAlign = 'right';
        ctx.fillText(typeIcon, x + width - 10, y + 22);

        // 卡牌图画区域
        const artY = y + 38;
        const artH = height * 0.35;
        this.drawRoundedRect(ctx, x + 8, artY, width - 16, artH, 5);
        const artGrad = ctx.createLinearGradient(x, artY, x, artY + artH);
        artGrad.addColorStop(0, typeColor + '40');
        artGrad.addColorStop(1, typeColor + '15');
        ctx.fillStyle = artGrad;
        ctx.fill();
        ctx.strokeStyle = typeColor + '60';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 卡牌图画 - 根据类型绘制图案
        this.drawCardArt(ctx, def.type, x + width / 2, artY + artH / 2, Math.min(width, artH) * 0.35);

        // 卡牌名称
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        const nameY = artY + artH + 18;
        ctx.fillText(def.name, x + width / 2, nameY);

        // 稀有度标签
        ctx.font = '10px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = rarityColor;
        const rarityText = this.getRarityName(def.rarity);
        ctx.fillText(rarityText, x + width / 2, nameY + 14);

        // 描述文字 - 多行
        ctx.fillStyle = '#bdc3c7';
        ctx.font = '11px "Microsoft YaHei", sans-serif';
        const descY = nameY + 30;
        const maxWidth = width - 20;
        this.wrapText(ctx, def.description, x + width / 2, descY, maxWidth, 14);

        // 底部类型色条
        this.drawRoundedRect(ctx, x + 8, y + height - 14, width - 16, 6, 3);
        ctx.fillStyle = typeColor;
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // 绘制卡牌图案
    drawCardArt(ctx, type, cx, cy, size) {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;

        switch (type) {
            case CARD_TYPE.ATTACK:
                // 剑
                ctx.beginPath();
                ctx.moveTo(cx, cy - size);
                ctx.lineTo(cx + size * 0.3, cy);
                ctx.lineTo(cx, cy + size * 0.8);
                ctx.lineTo(cx - size * 0.3, cy);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                // 剑柄
                ctx.beginPath();
                ctx.moveTo(cx - size * 0.4, cy + size * 0.3);
                ctx.lineTo(cx + size * 0.4, cy + size * 0.3);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, cy + size * 0.3);
                ctx.lineTo(cx, cy + size);
                ctx.stroke();
                break;
            case CARD_TYPE.DEFENSE:
                // 盾牌
                ctx.beginPath();
                ctx.moveTo(cx, cy - size);
                ctx.lineTo(cx + size * 0.8, cy - size * 0.5);
                ctx.lineTo(cx + size * 0.7, cy + size * 0.3);
                ctx.lineTo(cx, cy + size);
                ctx.lineTo(cx - size * 0.7, cy + size * 0.3);
                ctx.lineTo(cx - size * 0.8, cy - size * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                break;
            case CARD_TYPE.SKILL:
                // 星形/魔法
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    const angle = (i * Math.PI) / 2;
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle) * size, cy + Math.sin(angle) * size);
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.arc(cx, cy, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                break;
        }
        ctx.restore();
    }

    // 文字换行
    wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const chars = text.split('');
        let line = '';
        let lineY = y;

        for (let i = 0; i < chars.length; i++) {
            const testLine = line + chars[i];
            const metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && line !== '') {
                ctx.fillText(line, x, lineY);
                line = chars[i];
                lineY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, lineY);
    }

    // 圆角矩形
    drawRoundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
}
