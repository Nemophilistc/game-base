<body>

<script>
// === ./config.js ===
// 躲避球 - 常量配置
const W = 500;
const H = 600;

// 玩家
const PLAYER_RADIUS = 14;
const PLAYER_SPEED = 5;
const TRAIL_LENGTH = 12;

// 障碍物类型与权重
const OBSTACLE_TYPES = ['normal', 'fast', 'wide', 'homing'];
const OBSTACLE_WEIGHTS = [50, 25, 15, 10];

// 能量球
const ENERGY_ORB_RADIUS = 10;
const ENERGY_ORB_SCORE = 50;
const ENERGY_SPAWN_INTERVAL = 180; // 帧

// 难度递增
const BASE_SPAWN_RATE = 40;   // 初始生成间隔（帧）
const MIN_SPAWN_RATE = 10;    // 最小生成间隔
const SPAWN_RATE_DECREASE_INTERVAL = 300; // 每N帧加速一次

// === ./sound.js ===
// 躲避球 - Web Audio API 音效系统
const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'collect':
                o.type = 'sine';
                o.frequency.setValueAtTime(600, t);
                o.frequency.setValueAtTime(900, t + 0.05);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;

            case 'die':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                o.start(t);
                o.stop(t + 0.3);
                break;

            case 'warn':
                o.type = 'square';
                o.frequency.value = 200;
                g.gain.setValueAtTime(0.04, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.start(t);
                o.stop(t + 0.08);
                break;
        }
    }
};

// === ./player.js ===
// 躲避球 - 玩家角色

/**
 * 创建新的玩家对象
 */
function createPlayer() {
    return {
        x: W / 2,
        y: H - 60,
        r: PLAYER_RADIUS,
        speed: PLAYER_SPEED,
        trail: []
    };
}

/**
 * 更新玩家位置与拖尾
 * @param {object} player - 玩家对象
 * @param {number} dx - 水平方向 (-1/0/1)
 * @param {number} dy - 垂直方向 (-1/0/1)
 */
function updatePlayer(player, dx, dy) {
    if (dx || dy) {
        const len = Math.sqrt(dx * dx + dy * dy);
        player.x += (dx / len) * player.speed;
        player.y += (dy / len) * player.speed;
    }

    // 边界限制
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    // 拖尾
    player.trail.push({ x: player.x, y: player.y });
    if (player.trail.length > TRAIL_LENGTH) player.trail.shift();
}

// === ./obstacles.js ===
// 躲避球 - 障碍物与能量球系统

/**
 * 生成一个障碍物（4种类型，加权随机）
 */
function spawnObstacle(obstacles) {
    let r = Math.random() * 100;
    let type = 'normal';
    for (let i = 0; i < OBSTACLE_TYPES.length; i++) {
        r -= OBSTACLE_WEIGHTS[i];
        if (r <= 0) { type = OBSTACLE_TYPES[i]; break; }
    }

    const obs = {
        x: Math.random() * (W - 40) + 20,
        y: -20,
        type,
        flash: 0
    };

    switch (type) {
        case 'normal':
            obs.w = 20; obs.h = 20;
            obs.vy = 2 + Math.random() * 2;
            obs.vx = 0;
            obs.color = '#f44336';
            break;
        case 'fast':
            obs.w = 12; obs.h = 24;
            obs.vy = 5 + Math.random() * 2;
            obs.vx = (Math.random() - 0.5) * 2;
            obs.color = '#ff9800';
            break;
        case 'wide':
            obs.w = 50; obs.h = 15;
            obs.vy = 1.5;
            obs.vx = (Math.random() - 0.5) * 1;
            obs.color = '#9c27b0';
            break;
        case 'homing':
            obs.w = 16; obs.h = 16;
            obs.vy = 2;
            obs.vx = 0;
            obs.color = '#f44336';
            break;
    }

    obstacles.push(obs);
}

/**
 * 生成一个能量球
 */
function spawnEnergy(energyOrbs) {
    energyOrbs.push({
        x: Math.random() * (W - 40) + 20,
        y: -15,
        r: ENERGY_ORB_RADIUS,
        vy: 1.5 + Math.random(),
        pulse: 0
    });
}

/**
 * 更新所有障碍物，检测碰撞
 * @returns {boolean} true = 发生碰撞（玩家死亡）
 */
function updateObstacles(obstacles, player) {
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += o.vy;
        o.x += o.vx;

        // 追踪型障碍物追踪玩家
        if (o.type === 'homing') {
            const hdx = player.x - o.x;
            o.vx += hdx * 0.002;
            o.vx = Math.max(-3, Math.min(3, o.vx));
        }

        if (o.flash > 0) o.flash--;

        // 移除越界障碍物
        if (o.y > H + 30 || o.x < -50 || o.x > W + 50) {
            obstacles.splice(i, 1);
            continue;
        }

        // === BUG FIX #2: 碰撞检测使用中心坐标，与绘制坐标统一 ===
        // o.x, o.y 是左上角；矩形中心 = (o.x + o.w/2, o.y + o.h/2)
        const cx = o.x + o.w / 2;
        const cy = o.y + o.h / 2;
        const closestX = Math.max(-o.w / 2, Math.min(o.w / 2, player.x - cx));
        const closestY = Math.max(-o.h / 2, Math.min(o.h / 2, player.y - cy));
        const distX = player.x - cx - closestX;
        const distY = player.y - cy - closestY;

        if (distX * distX + distY * distY < player.r * player.r) {
            return true; // 碰撞！
        }
    }
    return false;
}

/**
 * 更新能量球，检测拾取
 * @returns {number} 拾取获得的分数（0 = 未拾取）
 */
function updateEnergyOrbs(energyOrbs, player, particles) {
    for (let i = energyOrbs.length - 1; i >= 0; i--) {
        const e = energyOrbs[i];
        e.y += e.vy;
        e.pulse += 0.05;

        if (e.y > H + 20) {
            energyOrbs.splice(i, 1);
            continue;
        }

        const dx = player.x - e.x;
        const dy = player.y - e.y;
        if (dx * dx + dy * dy < (player.r + e.r) * (player.r + e.r)) {
            Sound.play('collect');
            spawnCollectParticles(particles, e.x, e.y);
            energyOrbs.splice(i, 1);
            return ENERGY_ORB_SCORE;
        }
    }
    return 0;
}

/**
 * 生成死亡粒子效果
 */
function spawnDeathParticles(particles, player) {
    const colors = ['#00e5ff', '#fff', '#f44336'];
    for (let i = 0; i < 25; i++) {
        particles.push({
            x: player.x,
            y: player.y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10 - 3,
            life: 30 + Math.random() * 20,
            color: colors[Math.floor(Math.random() * 3)]
        });
    }
}

/**
 * 生成拾取粒子效果
 */
function spawnCollectParticles(particles, x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 20 + Math.random() * 10,
            color: '#00ff96'
        });
    }
}

/**
 * 更新粒子系统，移除死亡粒子
 */
function updateParticles(particles) {
    return particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        return p.life > 0;
    });
}

// === ./ui.js ===
// 躲避球 - Canvas渲染与HUD

/**
 * 主绘制函数
 * === BUG FIX #1: player未定义时安全返回，防止startGame前crash ===
 */
function draw(ctx, player, obstacles, energyOrbs, particles, shakeX, shakeY) {
    if (!player) return;

    ctx.save();
    ctx.translate((Math.random() - 0.5) * shakeX, (Math.random() - 0.5) * shakeY);

    // 背景
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);

    // 网格线
    ctx.strokeStyle = 'rgba(0,229,255,0.03)';
    for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 能量球
    energyOrbs.forEach(e => {
        const pr = Math.sin(e.pulse) * 0.2 + 1;
        ctx.fillStyle = '#00ff9630';
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * pr * 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#00ff96';
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * pr, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e.x - 3, e.y - 3, 3, 0, Math.PI * 2); ctx.fill();
    });

    // 障碍物
    obstacles.forEach(o => {
        const cx = o.x + o.w / 2;
        const cy = o.y + o.h / 2;
        const hw = o.w / 2;
        const hh = o.h / 2;

        if (o.type === 'normal') {
            // 普通：红色尖刺球
            ctx.fillStyle = o.color;
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const a = Math.PI / 4 * i + Date.now() * 0.002;
                const r = i % 2 === 0 ? hw : hw * 0.65;
                ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            }
            ctx.closePath(); ctx.fill();
            // 核心
            ctx.fillStyle = '#ff8a80';
            ctx.beginPath(); ctx.arc(cx, cy, hw * 0.4, 0, Math.PI * 2); ctx.fill();
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cx - 3, cy - 2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 3, cy - 2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(cx - 2, cy - 2, 1.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 4, cy - 2, 1.2, 0, Math.PI * 2); ctx.fill();
        } else if (o.type === 'fast') {
            // 快速：橙色箭头形
            ctx.fillStyle = o.color;
            ctx.beginPath();
            ctx.moveTo(cx, cy - hh);
            ctx.lineTo(cx + hw, cy + hh * 0.3);
            ctx.lineTo(cx + hw * 0.3, cy + hh * 0.3);
            ctx.lineTo(cx + hw * 0.3, cy + hh);
            ctx.lineTo(cx - hw * 0.3, cy + hh);
            ctx.lineTo(cx - hw * 0.3, cy + hh * 0.3);
            ctx.lineTo(cx - hw, cy + hh * 0.3);
            ctx.closePath(); ctx.fill();
            // 速度线
            ctx.strokeStyle = 'rgba(255,152,0,0.4)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 3; i++) {
                const ly = cy + hh + 3 + i * 4;
                ctx.beginPath(); ctx.moveTo(cx - 4 + i * 2, ly); ctx.lineTo(cx + 4 - i * 2, ly); ctx.stroke();
            }
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cx - 2, cy - hh * 0.2, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 2, cy - hh * 0.2, 2, 0, Math.PI * 2); ctx.fill();
        } else if (o.type === 'wide') {
            // 宽型：紫色横条+铆钉
            ctx.fillStyle = o.color;
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(o.x, o.y, o.w, o.h, 4);
            else ctx.rect(o.x, o.y, o.w, o.h);
            ctx.fill();
            // 铆钉
            ctx.fillStyle = '#ce93d8';
            ctx.beginPath(); ctx.arc(o.x + 5, cy, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(o.x + o.w - 5, cy, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
            // 警告标记
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
            ctx.fillText('⚠', cx, cy + 3);
        } else if (o.type === 'homing') {
            // 追踪：红色机械眼
            ctx.fillStyle = '#f44336';
            ctx.beginPath(); ctx.arc(cx, cy, hw, 0, Math.PI * 2); ctx.fill();
            // 外环
            ctx.strokeStyle = '#d32f2f';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, hw + 2, 0, Math.PI * 2); ctx.stroke();
            // 大眼
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cx, cy, hw * 0.55, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#d32f2f';
            ctx.beginPath(); ctx.arc(cx, cy, hw * 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(cx, cy, hw * 0.15, 0, Math.PI * 2); ctx.fill();
            // 扫描线
            const scanAngle = Date.now() * 0.005;
            ctx.strokeStyle = 'rgba(244,67,54,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(scanAngle) * hw * 1.5, cy + Math.sin(scanAngle) * hw * 1.5);
            ctx.stroke();
        }
    });

    // 玩家拖尾
    player.trail.forEach((t, i) => {
        const alpha = (i / player.trail.length) * 0.25;
        ctx.fillStyle = `rgba(0,229,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, player.r * 0.8 * (i / player.trail.length), 0, Math.PI * 2);
        ctx.fill();
    });

    // 玩家角色
    const px = player.x, py = player.y, pr = player.r;
    // 外发光
    ctx.fillStyle = 'rgba(0,229,255,0.15)';
    ctx.beginPath(); ctx.arc(px, py, pr + 6, 0, Math.PI * 2); ctx.fill();
    // 身体
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill();
    // 身体高光
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(px - 3, py - 3, pr * 0.5, 0, Math.PI * 2); ctx.fill();
    // 面罩
    ctx.fillStyle = 'rgba(0,229,255,0.3)';
    ctx.beginPath(); ctx.arc(px, py - 1, pr * 0.7, 0, Math.PI * 2); ctx.fill();
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 4, py - 2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 4, py - 2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a0a2e';
    ctx.beginPath(); ctx.arc(px - 3, py - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 5, py - 2, 2, 0, Math.PI * 2); ctx.fill();
    // 眼睛高光
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 4, py - 3, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 4, py - 3, 1, 0, Math.PI * 2); ctx.fill();
    // 嘴巴
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px, py + 3, 3, 0.1, Math.PI - 0.1); ctx.stroke();

    // 粒子
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();
}

/**
 * 更新HUD显示
 */
function updateHUD(score, highScore, frameCount) {
    document.getElementById('score').textContent = score;
    document.getElementById('time').textContent = Math.floor(frameCount / 60) + 's';
    document.getElementById('high').textContent = Math.max(highScore, score);
}

// === main.js ===
// 躲避球 - 游戏入口（ES Module）

// Canvas 初始化
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// ========== 游戏状态 ==========
let player = null;
let obstacles = [];
let energyOrbs = [];
let particles = [];
let score = 0;
let highScore = parseInt(localStorage.getItem('dodger_high')) || 0;
let gameActive = false;
let frameCount = 0;
let spawnTimer = 0;
let energyTimer = 0;
let shakeX = 0;
let shakeY = 0;

// ========== 输入状态 ==========
let keys = {};
let mouseX;  // undefined = 鼠标不在canvas上
let mouseY;

// 供HTML onclick使用
window.startGame = startGame;

// ========== 游戏生命周期 ==========

function startGame() {
    Sound.init();
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');

    player = createPlayer();
    obstacles = [];
    energyOrbs = [];
    particles = [];
    score = 0;
    gameActive = true;
    frameCount = 0;
    spawnTimer = 0;
    energyTimer = 0;
    shakeX = 0;
    shakeY = 0;
    // BUG FIX #3: 开始新游戏时重置鼠标状态，防止旧状态干扰
    mouseX = undefined;
    mouseY = undefined;

    updateHUD(score, highScore, frameCount);
}

// ========== 更新逻辑 ==========

function update() {
    if (!gameActive) return;
    frameCount++;

    // 键盘输入
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
    if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

    // 鼠标/触摸输入（仅在鼠标位于canvas内时生效）
    if (mouseX !== undefined) {
        const mdx = mouseX - player.x;
        const mdy = mouseY - player.y;
        const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (mdist > 5) {
            dx = mdx / mdist;
            dy = mdy / mdist;
        }
    }

    // 更新玩家
    updatePlayer(player, dx, dy);

    // 生成障碍物（难度递增）
    spawnTimer++;
    const spawnRate = Math.max(
        MIN_SPAWN_RATE,
        BASE_SPAWN_RATE - Math.floor(frameCount / SPAWN_RATE_DECREASE_INTERVAL)
    );
    if (spawnTimer >= spawnRate) {
        spawnTimer = 0;
        spawnObstacle(obstacles);
    }

    // 生成能量球
    energyTimer++;
    if (energyTimer >= ENERGY_SPAWN_INTERVAL) {
        energyTimer = 0;
        spawnEnergy(energyOrbs);
    }

    // 更新障碍物 & 碰撞检测
    if (updateObstacles(obstacles, player)) {
        gameActive = false;
        Sound.play('die');
        shakeX = 10;
        shakeY = 10;
        spawnDeathParticles(particles, player);
        highScore = Math.max(highScore, score);
        localStorage.setItem('dodger_high', highScore);
        setTimeout(() => {
            document.getElementById('goStats').innerHTML =
                `分数: ${score}<br>存活: ${Math.floor(frameCount / 60)}秒<br>最高: ${highScore}`;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }, 500);
        return;
    }

    // 能量球拾取
    const orbScore = updateEnergyOrbs(energyOrbs, player, particles);
    if (orbScore > 0) {
        score += orbScore;
        updateHUD(score, highScore, frameCount);
    }

    // 存活计分
    if (frameCount % 60 === 0) {
        score++;
        updateHUD(score, highScore, frameCount);
    }

    // 屏幕震动衰减
    shakeX *= 0.9;
    shakeY *= 0.9;

    // 粒子更新
    particles = updateParticles(particles);
}

// ========== 游戏主循环 ==========

function gameLoop() {
    requestAnimationFrame(gameLoop);
    update();
    draw(ctx, player, obstacles, energyOrbs, particles, shakeX, shakeY);
}

// ========== 事件监听 ==========

// 键盘
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
    }
    if (e.code === 'KeyR') {
        e.preventDefault();
        startGame();
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// 鼠标移动
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top) * (H / r.height);
});

// BUG FIX #3: 鼠标离开canvas时清除状态，恢复键盘控制
canvas.addEventListener('mouseleave', () => {
    mouseX = undefined;
    mouseY = undefined;
});

// 触摸
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
    mouseY = (e.touches[0].clientY - r.top) * (H / r.height);
});

// ========== 启动 ==========
updateHUD(score, highScore, frameCount);
gameLoop();


</script>

</body>
</html>
