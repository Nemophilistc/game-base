<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>涂鸦跳跃 - Doodle Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 120px rgba(74, 144, 217, 0.15);
      image-rendering: auto;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 100%);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-left, .hud-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hud-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-value {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .hud-hp {
      font-size: 16px;
      letter-spacing: 2px;
    }

    .hud-powerup {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      color: #ff6;
      font-size: 14px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      display: none;
      white-space: nowrap;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 100%);
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
    }

    .overlay.active {
      display: flex;
    }

    .glass-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .game-title {
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 0 #4a90d9, 0 6px 12px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }

    .game-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 2px;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: #fff;
      box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(74, 144, 217, 0.6);
    }

    .help-box {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 14px;
      margin-top: 20px;
      text-align: left;
    }

    .help-box h3 {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .help-box p {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      line-height: 1.7;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .stat-label {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .stat-value {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .stat-value.highlight {
      color: #f1c40f;
    }

    .game-over-title {
      font-size: 32px;
      font-weight: 900;
      color: #e74c3c;
      text-shadow: 0 3px 8px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    .new-high {
      color: #f1c40f;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .platform-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .game-title { font-size: 32px; }
      .glass-box { padding: 24px 20px; }
      #hud { padding: 6px 10px; }
      .hud-value { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-label">分数</div>
        <div class="hud-value" id="hud-score">0</div>
        <div class="hud-hp" id="hud-hp"></div>
      </div>
      <div class="hud-powerup" id="hud-powerup"></div>
      <div class="hud-right">
        <div class="hud-label">高度</div>
        <div class="hud-value" id="hud-height">0m</div>
        <div class="hud-label" style="margin-top:4px">最高</div>
        <div class="hud-value" id="hud-high" style="font-size:14px;color:#f1c40f;">0</div>
      </div>
    </div>

    <!-- Start Overlay -->
    <div class="overlay active" id="start-overlay">
      <div class="glass-box">
        <div class="game-title">涂鸦跳跃</div>
        <div class="game-subtitle">Doodle Jump</div>
        <button class="btn btn-primary" id="btn-start">开始游戏</button>
        <div class="help-box">
          <h3>玩法说明</h3>
          <p>
            ← → 或 A D 键左右移动<br>
            点击/触屏向上射击<br>
            踩踏平台不断向上跳跃<br>
            收集金币和道具获得加分<br>
            注意躲避尖刺平台和怪物！
          </p>
          <div class="platform-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#5cb85c"></div>普通</div>
            <div class="legend-item"><div class="legend-dot" style="background:#5bc0de"></div>移动</div>
            <div class="legend-item"><div class="legend-dot" style="background:#d4a843"></div>易碎</div>
            <div class="legend-item"><div class="legend-dot" style="background:#5cb85c;border:2px solid #f0ad4e"></div>弹簧</div>
            <div class="legend-item"><div class="legend-dot" style="background:#d9534f"></div>尖刺</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay" id="gameover-overlay">
      <div class="glass-box">
        <div class="game-over-title">游戏结束</div>
        <div class="new-high" id="new-high" style="display:none">新纪录!</div>
        <div class="stat-row">
          <span class="stat-label">总分</span>
          <span class="stat-value highlight" id="final-score">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">攀爬高度</span>
          <span class="stat-value" id="final-height">0 米</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">收集金币</span>
          <span class="stat-value" id="final-coins">0</span>
        </div>
        <div class="stat-row" style="border:none">
          <span class="stat-label">历史最高</span>
          <span class="stat-value highlight" id="final-high">0</span>
        </div>
        <button class="btn btn-primary" id="btn-restart" style="margin-top:20px">再来一次</button>
      </div>
    </div>
  </div>

  <script>
// === ./config.js ===
// Game configuration constants
const CONFIG = {
  // Canvas
  WIDTH: 400,
  HEIGHT: 700,

  // Player
  PLAYER_WIDTH: 36,
  PLAYER_HEIGHT: 42,
  PLAYER_SPEED: 5,
  JUMP_VELOCITY: -12,
  SPRING_JUMP_VELOCITY: -20,
  GRAVITY: 0.45,
  MAX_FALL_SPEED: 15,

  // Shooting
  BULLET_SPEED: 10,
  BULLET_RADIUS: 4,
  SHOOT_COOLDOWN: 250, // ms

  // Platforms
  PLATFORM_WIDTH: 70,
  PLATFORM_HEIGHT: 14,
  PLATFORM_GAP_MIN: 60,
  PLATFORM_GAP_MAX: 110,
  MOVING_PLATFORM_SPEED: 1.5,

  // Collectibles
  COIN_RADIUS: 10,
  JETPACK_WIDTH: 20,
  JETPACK_HEIGHT: 30,
  PROPELLER_WIDTH: 24,
  PROPELLER_HEIGHT: 20,

  // Jetpack / Propeller
  JETPACK_DURATION: 3000,
  JETPACK_SPEED: -8,
  PROPELLER_DURATION: 5000,
  PROPELLER_SPEED: -5,

  // Enemies
  ENEMY_WIDTH: 30,
  ENEMY_HEIGHT: 28,
  ENEMY_SPEED: 1.2,

  // Camera
  CAMERA_OFFSET: 300, // player stays above this line

  // Difficulty scaling
  DIFFICULTY_INTERVAL: 2000, // height units per difficulty step

  // Colors - doodle style
  COLORS: {
    BG: '#f5f0e1',
    BG_LINES: '#c8d8e8',
    PLATFORM_NORMAL: '#5cb85c',
    PLATFORM_NORMAL_DARK: '#4a9a4a',
    PLATFORM_FRAGILE: '#d4a843',
    PLATFORM_FRAGILE_DARK: '#b8922e',
    PLATFORM_MOVING: '#5bc0de',
    PLATFORM_MOVING_DARK: '#46a5c0',
    PLATFORM_SPIKE: '#d9534f',
    PLATFORM_SPIKE_DARK: '#c43c38',
    SPRING: '#f0ad4e',
    SPRING_DARK: '#d4932a',
    PLAYER_BODY: '#4a90d9',
    PLAYER_DARK: '#3672b0',
    PLAYER_EYES: '#ffffff',
    PLAYER_PUPIL: '#333333',
    ENEMY: '#e74c3c',
    ENEMY_DARK: '#c0392b',
    ENEMY_EYES: '#ffffff',
    COIN: '#f1c40f',
    COIN_DARK: '#d4a90b',
    BULLET: '#e74c3c',
    JETPACK: '#7f8c8d',
    JETPACK_FLAME: '#e67e22',
    PROPELLER: '#9b59b6',
    UI_TEXT: '#2c3e50',
    UI_SCORE: '#e74c3c',
    OVERLAY_BG: 'rgba(0,0,0,0.55)',
    OVERLAY_GLASS: 'rgba(255,255,255,0.12)',
  }
};

// === ./sound.js ===
// Web Audio API sound effects

let audioCtx = null;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.15, ramp = true) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    if (ramp) {
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    }
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* ignore audio errors */ }
}

function playNoise(duration, volume = 0.1) {
  try {
    const ctx = getCtx();
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / bufferSize);
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = buffer;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  } catch (e) { /* ignore */ }
}

const Sound = {
  jump() {
    playTone(400, 0.12, 'sine', 0.1);
    playTone(600, 0.1, 'sine', 0.08);
  },

  springBounce() {
    playTone(300, 0.08, 'sine', 0.12);
    setTimeout(() => playTone(500, 0.08, 'sine', 0.12), 40);
    setTimeout(() => playTone(800, 0.15, 'sine', 0.1), 80);
  },

  platformBreak() {
    playNoise(0.2, 0.15);
    playTone(200, 0.15, 'sawtooth', 0.06);
  },

  shoot() {
    playTone(800, 0.06, 'square', 0.08);
    playTone(600, 0.08, 'square', 0.06);
  },

  enemyDie() {
    playTone(500, 0.08, 'square', 0.1);
    setTimeout(() => playTone(300, 0.1, 'square', 0.08), 60);
    setTimeout(() => playTone(150, 0.15, 'sawtooth', 0.06), 120);
  },

  coinCollect() {
    playTone(880, 0.08, 'sine', 0.12);
    setTimeout(() => playTone(1100, 0.12, 'sine', 0.1), 60);
  },

  jetpackActivate() {
    playTone(300, 0.3, 'sawtooth', 0.08);
    playTone(200, 0.3, 'sawtooth', 0.06);
  },

  propellerActivate() {
    playTone(400, 0.15, 'triangle', 0.1);
    setTimeout(() => playTone(500, 0.15, 'triangle', 0.08), 80);
  },

  gameOver() {
    playTone(400, 0.2, 'square', 0.1, false);
    setTimeout(() => playTone(300, 0.2, 'square', 0.1, false), 200);
    setTimeout(() => playTone(200, 0.4, 'square', 0.08), 400);
  },

  spikeHit() {
    playTone(200, 0.15, 'sawtooth', 0.12);
    playNoise(0.1, 0.12);
  },

  // Resume audio context on user interaction
  resume() {
    try {
      const ctx = getCtx();
      if (ctx.state === 'suspended') ctx.resume();
    } catch (e) { /* ignore */ }
  }
};

// === ./player.js ===
// Player entity

class Player {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.w = CONFIG.PLAYER_WIDTH;
    this.h = CONFIG.PLAYER_HEIGHT;
    this.vx = 0;
    this.vy = 0;
    this.onGround = false;
    this.facing = 1; // 1 = right, -1 = left
    this.alive = true;
    this.hp = 3;
    this.maxHp = 3;
    this.invincibleTimer = 0; // ms of invincibility after hit

    // Shooting
    this.lastShotTime = 0;

    // Power-ups
    this.jetpackTimer = 0;
    this.propellerTimer = 0;

    // Visual
    this.eyeBlink = 0;
    this.squashTimer = 0; // squash-and-stretch on landing
    this.legWalkFrame = 0;

    // Bullets
    this.bullets = [];
  }

  jump(velocity) {
    this.vy = velocity || CONFIG.JUMP_VELOCITY;
    this.onGround = false;
    this.squashTimer = 8;
  }

  shoot(targetX, targetY, now) {
    if (now - this.lastShotTime < CONFIG.SHOOT_COOLDOWN) return;
    this.lastShotTime = now;

    // Shoot upward toward the target
    const dx = targetX - (this.x + this.w / 2);
    const dy = targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    this.bullets.push({
      x: this.x + this.w / 2,
      y: this.y,
      vx: (dx / dist) * CONFIG.BULLET_SPEED,
      vy: (dy / dist) * CONFIG.BULLET_SPEED,
      life: 60
    });
  }

  update(keys, dt) {
    // Horizontal movement
    const speed = CONFIG.PLAYER_SPEED;
    if (keys.left) {
      this.vx = -speed;
      this.facing = -1;
    } else if (keys.right) {
      this.vx = speed;
      this.facing = 1;
    } else {
      this.vx *= 0.85; // friction
    }

    this.x += this.vx;

    // Screen wrapping
    if (this.x + this.w < 0) this.x = CONFIG.WIDTH;
    if (this.x > CONFIG.WIDTH) this.x = -this.w;

    // Power-up timers
    if (this.jetpackTimer > 0) {
      this.jetpackTimer -= dt;
      this.vy = CONFIG.JETPACK_SPEED;
    } else if (this.propellerTimer > 0) {
      this.propellerTimer -= dt;
      this.vy = CONFIG.PROPELLER_SPEED;
    } else {
      // Normal gravity
      this.vy += CONFIG.GRAVITY;
      if (this.vy > CONFIG.MAX_FALL_SPEED) this.vy = CONFIG.MAX_FALL_SPEED;
    }

    this.y += this.vy;

    // Invincibility timer
    if (this.invincibleTimer > 0) {
      this.invincibleTimer -= dt;
    }

    // Animation
    this.eyeBlink = Math.max(0, this.eyeBlink - 1);
    if (Math.random() < 0.005) this.eyeBlink = 8; // random blink
    if (this.squashTimer > 0) this.squashTimer--;
    if (Math.abs(this.vx) > 1) {
      this.legWalkFrame += 0.3;
    }

    // Update bullets
    for (let i = this.bullets.length - 1; i >= 0; i--) {
      const b = this.bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.x < -10 || b.x > CONFIG.WIDTH + 10 || b.y < -1000) {
        this.bullets.splice(i, 1);
      }
    }
  }

  hit() {
    if (this.invincibleTimer > 0 || this.jetpackTimer > 0 || this.propellerTimer > 0) return false;
    this.hp--;
    this.invincibleTimer = 1500;
    if (this.hp <= 0) {
      this.alive = false;
      return true; // dead
    }
    return false;
  }

  activateJetpack() {
    this.jetpackTimer = CONFIG.JETPACK_DURATION;
    this.propellerTimer = 0;
  }

  activatePropeller() {
    this.propellerTimer = CONFIG.PROPELLER_DURATION;
    this.jetpackTimer = 0;
  }

  get isFlying() {
    return this.jetpackTimer > 0 || this.propellerTimer > 0;
  }

  draw(ctx, cameraY) {
    const sx = this.x;
    const sy = this.y - cameraY;
    const w = this.w;
    const h = this.h;

    // Skip if off-screen
    if (sy + h < -50 || sy > CONFIG.HEIGHT + 50) return;

    ctx.save();

    // Invincibility flash
    if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer / 80) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    const cx = sx + w / 2;
    const cy = sy + h / 2;

    // Squash and stretch
    let scaleX = 1, scaleY = 1;
    if (this.squashTimer > 0) {
      const t = this.squashTimer / 8;
      scaleX = 1 + t * 0.3;
      scaleY = 1 - t * 0.2;
    } else if (this.vy < -5) {
      scaleY = 1.15;
      scaleX = 0.88;
    }

    ctx.translate(cx, cy);
    ctx.scale(scaleX * this.facing, scaleY);
    ctx.translate(-cx, -cy);

    // Draw jetpack behind player
    if (this.jetpackTimer > 0) {
      this._drawJetpack(ctx, sx, sy, w, h);
    }

    // Body (rounded rectangle with doodle style)
    ctx.fillStyle = CONFIG.COLORS.PLAYER_BODY;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';

    const bx = sx + 4;
    const by = sy + 6;
    const bw = w - 8;
    const bh = h - 16;
    this._drawSketchyRect(ctx, bx, by, bw, bh);

    // Belly patch
    ctx.fillStyle = '#7bb3e0';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, bw * 0.3, bh * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    const eyeY = sy + 16;
    const eyeSpacing = 7;
    const eyeSize = this.eyeBlink > 4 ? 1 : 5;

    // Left eye
    ctx.fillStyle = CONFIG.COLORS.PLAYER_EYES;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx - eyeSpacing, eyeY, 5, eyeSize, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Right eye
    ctx.beginPath();
    ctx.ellipse(cx + eyeSpacing, eyeY, 5, eyeSize, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pupils
    if (this.eyeBlink <= 4) {
      ctx.fillStyle = CONFIG.COLORS.PLAYER_PUPIL;
      ctx.beginPath();
      ctx.arc(cx - eyeSpacing + 1, eyeY, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + eyeSpacing + 1, eyeY, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Nose (small circle)
    ctx.fillStyle = '#e8a0a0';
    ctx.beginPath();
    ctx.arc(cx, eyeY + 7, 3, 0, Math.PI * 2);
    ctx.fill();

    // Mouth (smile)
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, eyeY + 8, 5, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Legs (animated when walking)
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    const legBase = sy + h - 6;
    const legLen = 8;
    const walkOffset = Math.sin(this.legWalkFrame) * 4;

    // Left leg
    ctx.beginPath();
    ctx.moveTo(cx - 6, legBase);
    ctx.lineTo(cx - 6 + (this.onGround ? walkOffset : -3), legBase + legLen);
    ctx.stroke();

    // Right leg
    ctx.beginPath();
    ctx.moveTo(cx + 6, legBase);
    ctx.lineTo(cx + 6 + (this.onGround ? -walkOffset : 3), legBase + legLen);
    ctx.stroke();

    // Propeller hat
    if (this.propellerTimer > 0) {
      this._drawPropeller(ctx, cx, sy - 2);
    }

    // Arms
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 2.5;
    const armY = sy + 22;
    ctx.beginPath();
    ctx.moveTo(sx + 4, armY);
    ctx.lineTo(sx - 4, armY + (this.isFlying ? -8 : 6));
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx + w - 4, armY);
    ctx.lineTo(sx + w + 4, armY + (this.isFlying ? -8 : 6));
    ctx.stroke();

    ctx.restore();

    // Bullets
    for (const b of this.bullets) {
      const bx2 = b.x;
      const by2 = b.y - cameraY;
      ctx.fillStyle = CONFIG.COLORS.BULLET;
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(bx2, by2, CONFIG.BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Trail
      ctx.fillStyle = 'rgba(231,76,60,0.3)';
      ctx.beginPath();
      ctx.arc(bx2 - b.vx * 0.5, by2 - b.vy * 0.5, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  _drawSketchyRect(ctx, x, y, w, h) {
    const r = 5;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    // Slightly wobbly lines for doodle feel
    ctx.lineTo(x + w - r + Math.random(), y + Math.random());
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w + Math.random(), y + h - r + Math.random());
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r + Math.random(), y + h + Math.random());
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x + Math.random(), y + r + Math.random());
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  _drawJetpack(ctx, sx, sy, w, h) {
    const jx = sx + w / 2 - 10;
    const jy = sy + 8;

    // Jetpack body
    ctx.fillStyle = CONFIG.COLORS.JETPACK;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.fillRect(jx, jy, 20, 24);
    ctx.strokeRect(jx, jy, 20, 24);

    // Nozzles
    ctx.fillStyle = '#555';
    ctx.fillRect(jx + 2, jy + 24, 6, 4);
    ctx.fillRect(jx + 12, jy + 24, 6, 4);

    // Flame
    const flameH = 10 + Math.random() * 12;
    const gradient = ctx.createLinearGradient(0, jy + 28, 0, jy + 28 + flameH);
    gradient.addColorStop(0, '#fff');
    gradient.addColorStop(0.2, '#ff6');
    gradient.addColorStop(0.5, CONFIG.COLORS.JETPACK_FLAME);
    gradient.addColorStop(1, 'rgba(231,76,60,0)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.moveTo(jx + 2, jy + 28);
    ctx.quadraticCurveTo(jx + 5 + Math.random() * 3, jy + 28 + flameH, jx + 8, jy + 28);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(jx + 12, jy + 28);
    ctx.quadraticCurveTo(jx + 15 + Math.random() * 3, jy + 28 + flameH, jx + 18, jy + 28);
    ctx.fill();
  }

  _drawPropeller(ctx, cx, y) {
    const time = Date.now() * 0.02;

    // Hat base
    ctx.fillStyle = CONFIG.COLORS.PROPELLER;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - 14, y + 6);
    ctx.lineTo(cx + 14, y + 6);
    ctx.lineTo(cx + 8, y);
    ctx.lineTo(cx - 8, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Propeller blades (spinning)
    ctx.save();
    ctx.translate(cx, y - 2);
    ctx.rotate(time);

    ctx.fillStyle = '#e74c3c';
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1;
    // Blade 1
    ctx.beginPath();
    ctx.ellipse(0, 0, 16, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Blade 2 (perpendicular)
    ctx.beginPath();
    ctx.ellipse(0, 0, 3, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Center
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// === ./platforms.js ===
// Platform types, generation, scrolling

const PLATFORM_TYPE = {
  NORMAL: 'normal',
  MOVING: 'moving',
  FRAGILE: 'fragile',
  SPRING: 'spring',
  SPIKE: 'spike',
};

class Platform {
  constructor(x, y, type = PLATFORM_TYPE.NORMAL) {
    this.x = x;
    this.y = y;
    this.w = CONFIG.PLATFORM_WIDTH;
    this.h = CONFIG.PLATFORM_HEIGHT;
    this.type = type;
    this.alive = true;

    // Moving platform
    this.moveDir = Math.random() < 0.5 ? 1 : -1;
    this.moveSpeed = CONFIG.MOVING_PLATFORM_SPEED;

    // Fragile platform
    this.shaking = false;
    this.shakeTimer = 0;
    this.breaking = false;
    this.breakTimer = 0;

    // Spring
    this.springBounce = 0; // animation timer

    // Spike
    this.spikeHitCooldown = 0;

    // Visual wobble for doodle feel
    this.wobble = Math.random() * Math.PI * 2;
  }

  update(dt) {
    if (this.type === PLATFORM_TYPE.MOVING && this.alive) {
      this.x += this.moveSpeed * this.moveDir;
      if (this.x <= 0 || this.x + this.w >= CONFIG.WIDTH) {
        this.moveDir *= -1;
      }
    }

    if (this.shaking) {
      this.shakeTimer -= dt;
      if (this.shakeTimer <= 0) {
        this.breaking = true;
        this.shakeTimer = 0;
      }
    }

    if (this.breaking) {
      this.breakTimer += dt;
      if (this.breakTimer > 300) {
        this.alive = false;
      }
    }

    if (this.springBounce > 0) this.springBounce -= dt;
    if (this.spikeHitCooldown > 0) this.spikeHitCooldown -= dt;
  }

  onLand() {
    if (this.type === PLATFORM_TYPE.FRAGILE && !this.shaking) {
      this.shaking = true;
      this.shakeTimer = 300;
      return 'break';
    }
    if (this.type === PLATFORM_TYPE.SPRING) {
      this.springBounce = 200;
      return 'spring';
    }
    if (this.type === PLATFORM_TYPE.SPIKE) {
      return 'spike';
    }
    return 'land';
  }

  draw(ctx, cameraY) {
    if (!this.alive) return;

    const sy = this.y - cameraY;
    if (sy > CONFIG.HEIGHT + 20 || sy + this.h < -20) return;

    let sx = this.x;

    // Shake offset for fragile
    if (this.shaking) {
      sx += (Math.random() - 0.5) * 6;
    }

    ctx.save();

    // Breaking animation: fade out and split
    if (this.breaking) {
      const progress = this.breakTimer / 300;
      ctx.globalAlpha = 1 - progress;
      // Split into fragments
      const fragY = sy + progress * 40;
      this._drawFragments(ctx, sx, fragY);
      ctx.restore();
      return;
    }

    const colors = this._getColors();
    ctx.fillStyle = colors.fill;
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';

    // Draw platform with doodle style
    switch (this.type) {
      case PLATFORM_TYPE.NORMAL:
        this._drawNormal(ctx, sx, sy);
        break;
      case PLATFORM_TYPE.MOVING:
        this._drawMoving(ctx, sx, sy);
        break;
      case PLATFORM_TYPE.FRAGILE:
        this._drawFragile(ctx, sx, sy);
        break;
      case PLATFORM_TYPE.SPRING:
        this._drawSpring(ctx, sx, sy);
        break;
      case PLATFORM_TYPE.SPIKE:
        this._drawSpike(ctx, sx, sy);
        break;
    }

    ctx.restore();
  }

  _getColors() {
    switch (this.type) {
      case PLATFORM_TYPE.NORMAL: return { fill: CONFIG.COLORS.PLATFORM_NORMAL, stroke: CONFIG.COLORS.PLATFORM_NORMAL_DARK };
      case PLATFORM_TYPE.MOVING: return { fill: CONFIG.COLORS.PLATFORM_MOVING, stroke: CONFIG.COLORS.PLATFORM_MOVING_DARK };
      case PLATFORM_TYPE.FRAGILE: return { fill: CONFIG.COLORS.PLATFORM_FRAGILE, stroke: CONFIG.COLORS.PLATFORM_FRAGILE_DARK };
      case PLATFORM_TYPE.SPRING: return { fill: CONFIG.COLORS.PLATFORM_NORMAL, stroke: CONFIG.COLORS.PLATFORM_NORMAL_DARK };
      case PLATFORM_TYPE.SPIKE: return { fill: '#888', stroke: '#555' };
      default: return { fill: '#888', stroke: '#555' };
    }
  }

  _drawNormal(ctx, x, y) {
    // Rounded rectangle with sketch lines
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_NORMAL;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_NORMAL_DARK;
    ctx.lineWidth = 2;

    this._sketchyRect(ctx, x, y, this.w, this.h, 4);

    // Grass tufts on top
    ctx.strokeStyle = '#3d8b3d';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      const gx = x + 8 + i * 14 + Math.sin(this.wobble + i) * 2;
      ctx.beginPath();
      ctx.moveTo(gx, y);
      ctx.lineTo(gx - 3, y - 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx, y);
      ctx.lineTo(gx + 3, y - 4);
      ctx.stroke();
    }
  }

  _drawMoving(ctx, x, y) {
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_MOVING;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_MOVING_DARK;
    ctx.lineWidth = 2;

    this._sketchyRect(ctx, x, y, this.w, this.h, 4);

    // Arrows showing movement direction
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    const arrowY = y + this.h / 2;
    for (let i = 0; i < 2; i++) {
      const ax = x + 15 + i * 30;
      ctx.beginPath();
      ctx.moveTo(ax, arrowY - 3);
      ctx.lineTo(ax + 6, arrowY);
      ctx.lineTo(ax, arrowY + 3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  _drawFragile(ctx, x, y) {
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_FRAGILE;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_FRAGILE_DARK;
    ctx.lineWidth = 2;

    this._sketchyRect(ctx, x, y, this.w, this.h, 3);

    // Crack lines
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + this.w * 0.3, y + 2);
    ctx.lineTo(x + this.w * 0.45, y + this.h - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + this.w * 0.65, y + 3);
    ctx.lineTo(x + this.w * 0.55, y + this.h - 1);
    ctx.stroke();
  }

  _drawSpring(ctx, x, y) {
    // Platform base
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_NORMAL;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_NORMAL_DARK;
    ctx.lineWidth = 2;
    this._sketchyRect(ctx, x, y, this.w, this.h, 4);

    // Spring coil on top
    const sx = x + this.w / 2;
    const springH = 12 + (this.springBounce > 0 ? -4 : 0);
    const sy = y - springH;

    ctx.strokeStyle = CONFIG.COLORS.SPRING;
    ctx.fillStyle = CONFIG.COLORS.SPRING;
    ctx.lineWidth = 3;

    // Coil
    ctx.beginPath();
    const coils = 3;
    for (let i = 0; i <= coils; i++) {
      const t = i / coils;
      const cx = sx + (i % 2 === 0 ? -6 : 6);
      const cy = y - t * springH;
      if (i === 0) ctx.moveTo(sx, y);
      else ctx.lineTo(cx, cy);
    }
    ctx.lineTo(sx, sy);
    ctx.stroke();

    // Spring top cap
    ctx.fillStyle = CONFIG.COLORS.SPRING_DARK;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  _drawSpike(ctx, x, y) {
    // Gray platform base
    ctx.fillStyle = '#888';
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    this._sketchyRect(ctx, x, y, this.w, this.h, 3);

    // Spikes on top
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_SPIKE;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_SPIKE_DARK;
    ctx.lineWidth = 1.5;
    const spikes = 4;
    for (let i = 0; i < spikes; i++) {
      const sx2 = x + (i + 0.5) * (this.w / spikes);
      ctx.beginPath();
      ctx.moveTo(sx2 - 5, y);
      ctx.lineTo(sx2, y - 10);
      ctx.lineTo(sx2 + 5, y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }

  _drawFragments(ctx, x, y) {
    ctx.fillStyle = CONFIG.COLORS.PLATFORM_FRAGILE;
    ctx.strokeStyle = CONFIG.COLORS.PLATFORM_FRAGILE_DARK;
    ctx.lineWidth = 1.5;
    // Draw 4 small fragments
    const frags = [
      { ox: -5, oy: -3 }, { ox: 15, oy: 2 },
      { ox: 35, oy: -1 }, { ox: 50, oy: 4 }
    ];
    for (const f of frags) {
      ctx.save();
      ctx.translate(x + f.ox, y + f.oy);
      ctx.rotate(Math.random() * 0.5);
      ctx.fillRect(-6, -4, 12, 8);
      ctx.strokeRect(-6, -4, 12, 8);
      ctx.restore();
    }
  }

  _sketchyRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y + Math.random());
    ctx.lineTo(x + w - r + Math.random(), y + Math.random());
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w + Math.random(), y + h - r + Math.random());
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r + Math.random(), y + h + Math.random());
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x + Math.random(), y + r + Math.random());
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

class PlatformManager {
  constructor() {
    this.platforms = [];
    this.highestGenerated = 0;
    this.score = 0;
  }

  init() {
    this.platforms = [];
    this.highestGenerated = CONFIG.HEIGHT;
    this.score = 0;

    // Ground platform
    this.platforms.push(new Platform(CONFIG.WIDTH / 2 - CONFIG.PLATFORM_WIDTH / 2, CONFIG.HEIGHT - 50, PLATFORM_TYPE.NORMAL));

    // Generate initial platforms
    let y = CONFIG.HEIGHT - 120;
    while (y > -200) {
      this._generatePlatform(y);
      y -= this._getGap(0);
    }
    this.highestGenerated = y;
  }

  _getGap(difficulty) {
    const minGap = CONFIG.PLATFORM_GAP_MIN + difficulty * 3;
    const maxGap = CONFIG.PLATFORM_GAP_MAX + difficulty * 8;
    return minGap + Math.random() * (maxGap - minGap);
  }

  _generatePlatform(y) {
    const difficulty = Math.min(this.score / CONFIG.DIFFICULTY_INTERVAL, 10);
    const x = Math.random() * (CONFIG.WIDTH - CONFIG.PLATFORM_WIDTH);

    // Type probability based on difficulty
    const r = Math.random();
    let type = PLATFORM_TYPE.NORMAL;

    if (difficulty > 1 && r < 0.12 + difficulty * 0.02) {
      type = PLATFORM_TYPE.MOVING;
    } else if (difficulty > 2 && r < 0.20 + difficulty * 0.03) {
      type = PLATFORM_TYPE.FRAGILE;
    } else if (r < 0.28) {
      type = PLATFORM_TYPE.SPRING;
    } else if (difficulty > 3 && r < 0.32) {
      type = PLATFORM_TYPE.SPIKE;
    }

    this.platforms.push(new Platform(x, y, type));
  }

  update(dt, cameraY) {
    // Update all platforms
    for (const p of this.platforms) {
      p.update(dt);
    }

    // Remove dead or off-screen platforms
    this.platforms = this.platforms.filter(p => p.alive && p.y - cameraY < CONFIG.HEIGHT + 100);

    // Generate new platforms above
    const generateAbove = cameraY - 300;
    while (this.highestGenerated > generateAbove) {
      const gap = this._getGap(Math.min(this.score / CONFIG.DIFFICULTY_INTERVAL, 10));
      this.highestGenerated -= gap;
      this._generatePlatform(this.highestGenerated);
    }
  }

  draw(ctx, cameraY) {
    for (const p of this.platforms) {
      p.draw(ctx, cameraY);
    }
  }
}

// === ./enemies.js ===
// Enemies on platforms and collectibles

class Enemy {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.w = CONFIG.ENEMY_WIDTH;
    this.h = CONFIG.ENEMY_HEIGHT;
    this.alive = true;
    this.vx = (Math.random() < 0.5 ? 1 : -1) * CONFIG.ENEMY_SPEED;
    this.baseY = y;
    this.floatPhase = Math.random() * Math.PI * 2;
    this.animFrame = 0;
    this.eyePhase = Math.random() * Math.PI * 2;
    // Type: 0 = blob, 1 = flying eye
    this.type = Math.random() < 0.5 ? 0 : 1;
  }

  update(dt) {
    this.x += this.vx;
    if (this.x <= 0 || this.x + this.w >= CONFIG.WIDTH) {
      this.vx *= -1;
    }
    this.floatPhase += 0.04;
    this.y = this.baseY + Math.sin(this.floatPhase) * 6;
    this.animFrame += 0.08;
    this.eyePhase += 0.03;
  }

  draw(ctx, cameraY) {
    if (!this.alive) return;
    const sy = this.y - cameraY;
    if (sy > CONFIG.HEIGHT + 30 || sy + this.h < -30) return;

    const cx = this.x + this.w / 2;
    const cy = sy + this.h / 2;

    ctx.save();

    if (this.type === 0) {
      this._drawBlob(ctx, cx, cy);
    } else {
      this._drawFlyingEye(ctx, cx, cy);
    }

    ctx.restore();
  }

  _drawBlob(ctx, cx, cy) {
    const r = this.w / 2;
    // Body
    ctx.fillStyle = CONFIG.COLORS.ENEMY;
    ctx.strokeStyle = CONFIG.COLORS.ENEMY_DARK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    // Blobby shape
    for (let a = 0; a < Math.PI * 2; a += 0.2) {
      const wobble = Math.sin(a * 3 + this.animFrame) * 2;
      const px = cx + Math.cos(a) * (r + wobble);
      const py = cy + Math.sin(a) * (r * 0.8 + wobble);
      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Eyes
    const eyeOff = 5;
    ctx.fillStyle = CONFIG.COLORS.ENEMY_EYES;
    ctx.beginPath();
    ctx.arc(cx - eyeOff, cy - 3, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + eyeOff, cy - 3, 5, 0, Math.PI * 2);
    ctx.fill();

    // Pupils (looking at player direction)
    const lookX = Math.sin(this.eyePhase) * 2;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(cx - eyeOff + lookX, cy - 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + eyeOff + lookX, cy - 3, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Angry eyebrows
    ctx.strokeStyle = CONFIG.COLORS.ENEMY_DARK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - eyeOff - 5, cy - 9);
    ctx.lineTo(cx - eyeOff + 3, cy - 7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + eyeOff + 5, cy - 9);
    ctx.lineTo(cx + eyeOff - 3, cy - 7);
    ctx.stroke();
  }

  _drawFlyingEye(ctx, cx, cy) {
    // Wings
    const wingFlap = Math.sin(this.animFrame * 2) * 8;
    ctx.fillStyle = '#c0392b';
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1.5;
    // Left wing
    ctx.beginPath();
    ctx.moveTo(cx - 6, cy);
    ctx.quadraticCurveTo(cx - 20, cy - 10 + wingFlap, cx - 18, cy + 5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Right wing
    ctx.beginPath();
    ctx.moveTo(cx + 6, cy);
    ctx.quadraticCurveTo(cx + 20, cy - 10 + wingFlap, cx + 18, cy + 5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Eye body (white)
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pupil
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Inner pupil
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

class EnemyManager {
  constructor() {
    this.enemies = [];
    this.collectibles = []; // { x, y, type: 'coin'|'jetpack'|'propeller', collected: false }
    this.spawnTimer = 0;
  }

  init() {
    this.enemies = [];
    this.collectibles = [];
    this.spawnTimer = 0;
  }

  trySpawn(platforms, score) {
    const difficulty = Math.min(score / CONFIG.DIFFICULTY_INTERVAL, 10);

    // Spawn enemies near platforms
    for (const p of platforms) {
      if (p._enemySpawned) continue;
      if (p.y > 0) continue; // don't spawn near start

      const chance = 0.04 + difficulty * 0.025;
      if (Math.random() < chance) {
        this.enemies.push(new Enemy(
          p.x + Math.random() * (p.w - CONFIG.ENEMY_WIDTH),
          p.y - 40 - Math.random() * 20
        ));
        p._enemySpawned = true;
      }
    }

    // Spawn collectibles
    for (const p of platforms) {
      if (p._collectSpawned) continue;
      if (p.y > 0) continue;

      const r = Math.random();
      if (r < 0.06) {
        // Coin
        this.collectibles.push({
          x: p.x + p.w / 2,
          y: p.y - 25,
          type: 'coin',
          collected: false,
          animPhase: Math.random() * Math.PI * 2
        });
        p._collectSpawned = true;
      } else if (r < 0.068) {
        // Jetpack (rare)
        this.collectibles.push({
          x: p.x + p.w / 2,
          y: p.y - 30,
          type: 'jetpack',
          collected: false,
          animPhase: 0
        });
        p._collectSpawned = true;
      } else if (r < 0.076) {
        // Propeller hat (rare)
        this.collectibles.push({
          x: p.x + p.w / 2,
          y: p.y - 28,
          type: 'propeller',
          collected: false,
          animPhase: 0
        });
        p._collectSpawned = true;
      }
    }
  }

  update(dt, cameraY) {
    for (const e of this.enemies) {
      if (e.alive) e.update(dt);
    }
    // Remove off-screen enemies
    this.enemies = this.enemies.filter(e => e.alive && e.y - cameraY < CONFIG.HEIGHT + 100);

    // Update collectible animation
    for (const c of this.collectibles) {
      if (!c.collected) c.animPhase += 0.05;
    }
    this.collectibles = this.collectibles.filter(c => !c.collected && c.y - cameraY < CONFIG.HEIGHT + 100);
  }

  draw(ctx, cameraY) {
    // Draw enemies
    for (const e of this.enemies) {
      e.draw(ctx, cameraY);
    }

    // Draw collectibles
    for (const c of this.collectibles) {
      if (c.collected) continue;
      const sy = c.y - cameraY + Math.sin(c.animPhase) * 3;
      if (sy > CONFIG.HEIGHT + 20 || sy < -20) continue;

      ctx.save();

      if (c.type === 'coin') {
        this._drawCoin(ctx, c.x, sy);
      } else if (c.type === 'jetpack') {
        this._drawJetpackItem(ctx, c.x, sy);
      } else if (c.type === 'propeller') {
        this._drawPropellerItem(ctx, c.x, sy);
      }

      ctx.restore();
    }
  }

  _drawCoin(ctx, x, y) {
    const r = CONFIG.COIN_RADIUS;
    // Coin body
    ctx.fillStyle = CONFIG.COLORS.COIN;
    ctx.strokeStyle = CONFIG.COLORS.COIN_DARK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Dollar sign
    ctx.fillStyle = CONFIG.COLORS.COIN_DARK;
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', x, y + 1);

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(x - 3, y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  _drawJetpackItem(ctx, x, y) {
    // Glow
    ctx.fillStyle = 'rgba(231,76,60,0.15)';
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = CONFIG.COLORS.JETPACK;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.fillRect(x - 8, y - 12, 16, 24);
    ctx.strokeRect(x - 8, y - 12, 16, 24);

    // Flame icon
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.moveTo(x - 4, y + 12);
    ctx.quadraticCurveTo(x, y + 20, x + 4, y + 12);
    ctx.fill();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('J', x, y + 2);
  }

  _drawPropellerItem(ctx, x, y) {
    // Glow
    ctx.fillStyle = 'rgba(155,89,182,0.15)';
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.fill();

    // Hat
    ctx.fillStyle = CONFIG.COLORS.PROPELLER;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 12, y + 6);
    ctx.lineTo(x + 12, y + 6);
    ctx.lineTo(x + 8, y - 4);
    ctx.lineTo(x - 8, y - 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Spinning blades
    const angle = Date.now() * 0.015;
    ctx.save();
    ctx.translate(x, y - 6);
    ctx.rotate(angle);
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 2, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// === ./effects.js ===
// Visual effects: particles, break effects, spring effects

class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size || 3;
    this.alive = true;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15; // gravity
    this.life--;
    if (this.life <= 0) this.alive = false;
  }

  draw(ctx, cameraY) {
    if (!this.alive) return;
    const sy = this.y - cameraY;
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, sy, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class EffectsManager {
  constructor() {
    this.particles = [];
    this.floatingTexts = []; // { x, y, text, color, life, maxLife }
  }

  init() {
    this.particles = [];
    this.floatingTexts = [];
  }

  // Jump dust effect
  emitJumpDust(x, y) {
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 1.2;
      const speed = 1.5 + Math.random() * 2;
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 20,
        y,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed - 1,
        '#c8b98a',
        15 + Math.random() * 10,
        2 + Math.random() * 2
      ));
    }
  }

  // Spring bounce effect
  emitSpringBounce(x, y) {
    for (let i = 0; i < 12; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.5;
      const speed = 3 + Math.random() * 4;
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 15,
        y,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        Math.random() < 0.5 ? '#f0ad4e' : '#ff6',
        20 + Math.random() * 15,
        3 + Math.random() * 3
      ));
    }
    // Stars
    for (let i = 0; i < 5; i++) {
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 20,
        y - 5,
        (Math.random() - 0.5) * 3,
        -3 - Math.random() * 3,
        '#fff',
        25 + Math.random() * 10,
        4
      ));
    }
  }

  // Platform break effect
  emitPlatformBreak(x, y, w) {
    for (let i = 0; i < 15; i++) {
      this.particles.push(new Particle(
        x + Math.random() * w,
        y + Math.random() * 8,
        (Math.random() - 0.5) * 4,
        Math.random() * 3 + 1,
        Math.random() < 0.5 ? CONFIG.COLORS.PLATFORM_FRAGILE : CONFIG.COLORS.PLATFORM_FRAGILE_DARK,
        25 + Math.random() * 15,
        3 + Math.random() * 4
      ));
    }
  }

  // Jetpack flame particles
  emitJetpackFlame(x, y) {
    for (let i = 0; i < 3; i++) {
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 10,
        y + 30,
        (Math.random() - 0.5) * 2,
        2 + Math.random() * 3,
        Math.random() < 0.3 ? '#fff' : (Math.random() < 0.5 ? '#ff6' : CONFIG.COLORS.JETPACK_FLAME),
        12 + Math.random() * 8,
        4 + Math.random() * 4
      ));
    }
  }

  // Coin collect effect
  emitCoinCollect(x, y) {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      this.particles.push(new Particle(
        x, y,
        Math.cos(angle) * 3,
        Math.sin(angle) * 3,
        '#f1c40f',
        15 + Math.random() * 10,
        2 + Math.random() * 2
      ));
    }
    this.addFloatingText(x, y - 10, '+10', '#f1c40f');
  }

  // Enemy die effect
  emitEnemyDie(x, y) {
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const speed = 2 + Math.random() * 3;
      this.particles.push(new Particle(
        x, y,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        Math.random() < 0.5 ? CONFIG.COLORS.ENEMY : CONFIG.COLORS.ENEMY_DARK,
        20 + Math.random() * 10,
        3 + Math.random() * 3
      ));
    }
    this.addFloatingText(x, y - 15, '+50', '#e74c3c');
  }

  // Shoot effect
  emitShoot(x, y) {
    for (let i = 0; i < 4; i++) {
      this.particles.push(new Particle(
        x, y,
        (Math.random() - 0.5) * 2,
        -1 - Math.random() * 2,
        '#ff6',
        8 + Math.random() * 5,
        2
      ));
    }
  }

  // Spike hit effect
  emitSpikeHit(x, y) {
    for (let i = 0; i < 10; i++) {
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 20,
        y,
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 4,
        CONFIG.COLORS.PLATFORM_SPIKE,
        15 + Math.random() * 10,
        3
      ));
    }
    this.addFloatingText(x, y - 20, '-1 HP', '#e74c3c');
  }

  // Propeller wind effect
  emitPropellerWind(x, y) {
    if (Math.random() < 0.3) {
      this.particles.push(new Particle(
        x + (Math.random() - 0.5) * 20,
        y + 20,
        (Math.random() - 0.5) * 1,
        1 + Math.random() * 2,
        'rgba(255,255,255,0.4)',
        10 + Math.random() * 8,
        2 + Math.random() * 2
      ));
    }
  }

  // Floating text
  addFloatingText(x, y, text, color) {
    this.floatingTexts.push({ x, y, text, color, life: 40, maxLife: 40 });
  }

  update() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update();
      if (!this.particles[i].alive) this.particles.splice(i, 1);
    }

    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.y -= 1.2;
      ft.life--;
      if (ft.life <= 0) this.floatingTexts.splice(i, 1);
    }

    // Cap particles
    if (this.particles.length > 300) {
      this.particles.splice(0, this.particles.length - 300);
    }
  }

  draw(ctx, cameraY) {
    for (const p of this.particles) {
      p.draw(ctx, cameraY);
    }

    for (const ft of this.floatingTexts) {
      const sy = ft.y - cameraY;
      const alpha = ft.life / ft.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = ft.color;
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 2;
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(ft.text, ft.x, sy);
      ctx.fillText(ft.text, ft.x, sy);
      ctx.globalAlpha = 1;
    }
  }
}

class UI {

    this.finalCoins = document.getElementById('final-coins');
    this.finalHigh = document.getElementById('final-high');
    this.newHighEl = document.getElementById('new-high');
  }

  showStart() {
    this.startOverlay.classList.add('active');
    this.gameOverOverlay.classList.remove('active');
  }

  hideStart() {
    this.startOverlay.classList.remove('active');
  }

  showGameOver(height, coins, highScore, isNewHigh) {
    this.finalScore.textContent = Math.floor(height + coins * 10);
    this.finalHeight.textContent = Math.floor(height) + ' 米';
    this.finalCoins.textContent = coins;
    this.finalHigh.textContent = Math.floor(highScore);
    this.newHighEl.style.display = isNewHigh ? 'block' : 'none';
    this.gameOverOverlay.classList.add('active');
  }

  hideGameOver() {
    this.gameOverOverlay.classList.remove('active');
  }

  updateHUD(height, coins, highScore, hp, maxHp, powerup) {
    this.hudScore.textContent = Math.floor(height + coins * 10);
    this.hudHeight.textContent = Math.floor(height) + 'm';
    this.hudHigh.textContent = Math.floor(highScore);

    // HP display
    let hpStr = '';
    for (let i = 0; i < maxHp; i++) {
      hpStr += i < hp ? '❤ ' : '♡ ';
    }
    this.hudHp.textContent = hpStr;

    // Power-up indicator
    if (powerup) {
      this.hudPowerup.textContent = powerup;
      this.hudPowerup.style.display = 'block';
    } else {
      this.hudPowerup.style.display = 'none';
    }
  }
}

// Main game loop

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.WIDTH;
canvas.height = CONFIG.HEIGHT;

const ui = new UI(canvas);
const platformMgr = new PlatformManager();
const enemyMgr = new EnemyManager();
const effects = new EffectsManager();

let player = null;
let cameraY = 0;
let maxHeight = 0;
let coins = 0;
let highScore = parseInt(localStorage.getItem('doodlejump_high') || '0');
let gameState = 'menu'; // menu | playing | gameover
let lastTime = 0;
let bgOffset = 0;

// Input state
const keys = { left: false, right: false };
let shootTarget = null;

// Background grid lines (notebook paper effect)
const bgLines = [];
for (let i = 0; i < 30; i++) {
  bgLines.push({
    y: i * 50,
    width: 1 + Math.random() * 0.5
  });
}

function drawBackground() {
  // Paper background
  ctx.fillStyle = CONFIG.COLORS.BG;
  ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

  // Horizontal grid lines (notebook style)
  ctx.strokeStyle = CONFIG.COLORS.BG_LINES;
  ctx.lineWidth = 0.8;
  const lineSpacing = 50;
  const startY = (cameraY % lineSpacing);
  for (let y = -startY; y < CONFIG.HEIGHT + lineSpacing; y += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CONFIG.WIDTH, y);
    ctx.stroke();
  }

  // Left margin line (red)
  ctx.strokeStyle = 'rgba(220,80,80,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(50, 0);
  ctx.lineTo(50, CONFIG.HEIGHT);
  ctx.stroke();

  // Subtle doodles in background (very faint)
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  const doodleY = (-cameraY * 0.3) % 800;
  for (let i = 0; i < 5; i++) {
    const dx = 60 + i * 70;
    const dy = doodleY + i * 180;
    if (dy > -50 && dy < CONFIG.HEIGHT + 50) {
      // Small star doodle
      drawStarDoodle(ctx, dx, dy, 8 + i * 2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawStarDoodle(ctx, x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const px = x + Math.cos(a) * r;
    const py = y + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
}

function initGame() {
  player = new Player(CONFIG.WIDTH / 2 - CONFIG.PLAYER_WIDTH / 2, CONFIG.HEIGHT - 100);
  cameraY = 0;
  maxHeight = 0;
  coins = 0;
  platformMgr.init();
  enemyMgr.init();
  effects.init();
  player.jump(CONFIG.JUMP_VELOCITY);
}

function startGame() {
  Sound.resume();
  initGame();
  gameState = 'playing';
  ui.hideStart();
  ui.hideGameOver();
  document.getElementById('hud').style.display = 'flex';
  lastTime = performance.now();
}

function gameOver() {
  gameState = 'gameover';
  Sound.gameOver();
  gameOverDelay = 800; // 800ms delay before showing game over screen
  const totalScore = maxHeight + coins * 10;
  const isNewHigh = totalScore > highScore;
  if (isNewHigh) {
    highScore = totalScore;
    localStorage.setItem('doodlejump_high', String(Math.floor(highScore)));
  }

  // Death particle effect
  if (player) {
    for (let i = 0; i < 15; i++) {
      effects.particles.push(new Particle(
        player.x + player.w / 2 + (Math.random() - 0.5) * 20,
        player.y + player.h / 2,
        (Math.random() - 0.5) * 5,
        (Math.random() - 0.5) * 5,
        Math.random() < 0.5 ? '#4a90d9' : '#e74c3c',
        30 + Math.random() * 20,
        3 + Math.random() * 3
      ));
    }
    player.vy = -8; // bounce up briefly before falling
  }

  // Show game over screen after delay
  setTimeout(() => {
    ui.showGameOver(maxHeight, coins, highScore, isNewHigh);
  }, 800);
}

function handleClick(e) {
  if (gameState !== 'playing') return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = CONFIG.WIDTH / rect.width;
  const scaleY = CONFIG.HEIGHT / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Shoot toward click position (convert to world coords)
  shootTarget = { x: mx, y: my + cameraY };
  Sound.shoot();
  effects.emitShoot(player.x + player.w / 2, player.y);
  player.shoot(shootTarget.x, shootTarget.y, performance.now());
}

function handleTouch(e) {
  if (gameState !== 'playing') return;
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = CONFIG.WIDTH / rect.width;
  const scaleY = CONFIG.HEIGHT / rect.height;
  const mx = (touch.clientX - rect.left) * scaleX;
  const my = (touch.clientY - rect.top) * scaleY;

  shootTarget = { x: mx, y: my + cameraY };
  Sound.shoot();
  effects.emitShoot(player.x + player.w / 2, player.y);
  player.shoot(shootTarget.x, shootTarget.y, performance.now());
}

function handleKeyDown(e) {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
}

function handleKeyUp(e) {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
}

// Mobile tilt support
let tiltX = 0;
function handleDeviceOrientation(e) {
  if (e.gamma !== null) {
    tiltX = e.gamma; // -90 to 90
    // Map tilt to keys
    keys.left = tiltX < -5;
    keys.right = tiltX > 5;
  }
}

// Touch left/right movement
function handleTouchMove(e) {
  // handled by touch start/click
}

function checkCollisions() {
  if (!player || !player.alive) return;

  const px = player.x;
  const py = player.y;
  const pw = player.w;
  const ph = player.h;
  const playerBottom = py + ph;
  const playerCenterX = px + pw / 2;

  // Platform collisions (only when falling)
  if (player.vy >= 0) {
    for (const p of platformMgr.platforms) {
      if (!p.alive || p.breaking) continue;

      // Check if player feet are near platform top
      const platTop = p.y;
      const prevBottom = playerBottom - player.vy;

      if (
        playerBottom >= platTop &&
        prevBottom <= platTop + 10 &&
        playerCenterX > p.x - 5 &&
        playerCenterX < p.x + p.w + 5 &&
        player.vy >= 0
      ) {
        // Land on platform
        const result = p.onLand();

        if (result === 'break') {
          Sound.platformBreak();
          effects.emitPlatformBreak(p.x, p.y, p.w);
          player.jump(CONFIG.JUMP_VELOCITY);
          effects.emitJumpDust(playerCenterX, playerBottom);
        } else if (result === 'spring') {
          Sound.springBounce();
          player.jump(CONFIG.SPRING_JUMP_VELOCITY);
          effects.emitSpringBounce(playerCenterX, playerBottom);
        } else if (result === 'spike') {
          if (p.spikeHitCooldown <= 0) {
            Sound.spikeHit();
            effects.emitSpikeHit(playerCenterX, playerBottom);
            p.spikeHitCooldown = 1000;
            player.hit();
            if (!player.alive) {
              gameOver();
              return;
            }
          }
          player.jump(CONFIG.JUMP_VELOCITY);
          effects.emitJumpDust(playerCenterX, playerBottom);
        } else {
          // Normal land
          player.y = platTop - ph;
          Sound.jump();
          player.jump(CONFIG.JUMP_VELOCITY);
          effects.emitJumpDust(playerCenterX, playerBottom);
        }
        break;
      }
    }
  }

  // Enemy collisions
  for (const e of enemyMgr.enemies) {
    if (!e.alive) continue;

    // Player hits enemy
    if (
      px + pw > e.x + 4 &&
      px < e.x + e.w - 4 &&
      py + ph > e.y + 4 &&
      py < e.y + e.h - 4
    ) {
      // If player is falling on top of enemy, kill it
      if (player.vy > 0 && py + ph < e.y + e.h / 2 + 5) {
        e.alive = false;
        Sound.enemyDie();
        effects.emitEnemyDie(e.x + e.w / 2, e.y + e.h / 2);
        player.jump(CONFIG.JUMP_VELOCITY);
      } else {
        // Player takes damage
        const dead = player.hit();
        if (dead) {
          gameOver();
          return;
        }
      }
    }
  }

  // Bullet-enemy collisions
  for (const b of player.bullets) {
    for (const e of enemyMgr.enemies) {
      if (!e.alive) continue;
      if (
        b.x > e.x && b.x < e.x + e.w &&
        b.y > e.y && b.y < e.y + e.h
      ) {
        e.alive = false;
        b.life = 0;
        Sound.enemyDie();
        effects.emitEnemyDie(e.x + e.w / 2, e.y + e.h / 2);
        break;
      }
    }
  }

  // Collectible collisions
  for (const c of enemyMgr.collectibles) {
    if (c.collected) continue;
    const dx = playerCenterX - c.x;
    const dy = (py + ph / 2) - c.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      c.collected = true;
      if (c.type === 'coin') {
        coins += 1;
        Sound.coinCollect();
        effects.emitCoinCollect(c.x, c.y);
      } else if (c.type === 'jetpack') {
        player.activateJetpack();
        Sound.jetpackActivate();
        effects.addFloatingText(c.x, c.y - 15, 'JETPACK!', '#e67e22');
      } else if (c.type === 'propeller') {
        player.activatePropeller();
        Sound.propellerActivate();
        effects.addFloatingText(c.x, c.y - 15, 'PROPELLER!', '#9b59b6');
      }
    }
  }
}

function updateCamera() {
  if (!player) return;
  const playerScreenY = player.y - cameraY;

  // Camera follows player upward
  if (playerScreenY < CONFIG.CAMERA_OFFSET) {
    cameraY = player.y - CONFIG.CAMERA_OFFSET;
  }

  // Update max height
  const height = -player.y + CONFIG.HEIGHT;
  if (height > maxHeight) {
    maxHeight = height;
    platformMgr.score = maxHeight;
  }
}

function checkGameOver() {
  if (!player || !player.alive) return;
  // Game over if player falls below camera
  if (player.y - cameraY > CONFIG.HEIGHT + 50) {
    player.alive = false;
    gameOver();
  }
}

let gameOverDelay = 0; // delay before showing game over screen

function update(now) {
  const dt = Math.min(now - lastTime, 50); // cap delta
  lastTime = now;

  if (!player) return;

  // Allow player to continue falling after death (for animation)
  if (gameState === 'gameover') {
    player.vy += CONFIG.GRAVITY;
    player.y += player.vy;
    effects.update();
    gameOverDelay -= dt;
    if (gameOverDelay <= 0) {
      // Show game over screen after delay
    }
    return;
  }

  if (gameState !== 'playing') return;

  player.update(keys, dt);
  platformMgr.update(dt, cameraY);
  enemyMgr.trySpawn(platformMgr.platforms, maxHeight);
  enemyMgr.update(dt, cameraY);
  effects.update();

  // Jetpack/propeller particles
  if (player.jetpackTimer > 0) {
    effects.emitJetpackFlame(player.x + player.w / 2, player.y + player.h);
  }
  if (player.propellerTimer > 0) {
    effects.emitPropellerWind(player.x + player.w / 2, player.y);
  }

  checkCollisions();
  updateCamera();
  checkGameOver();

  // Update HUD
  let powerupText = null;
  if (player.jetpackTimer > 0) {
    powerupText = '🚀 ' + Math.ceil(player.jetpackTimer / 1000) + 's';
  } else if (player.propellerTimer > 0) {
    powerupText = '🚁 ' + Math.ceil(player.propellerTimer / 1000) + 's';
  }
  ui.updateHUD(maxHeight, coins, highScore, player.hp, player.maxHp, powerupText);
}

function draw() {
  drawBackground();

  if (gameState === 'playing' || gameState === 'gameover') {
    platformMgr.draw(ctx, cameraY);
    enemyMgr.draw(ctx, cameraY);
    if (player) player.draw(ctx, cameraY);
    effects.draw(ctx, cameraY);
  }
}

function gameLoop(now) {
  update(now);
  draw();
  requestAnimationFrame(gameLoop);
}

// Event listeners
canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleTouch, { passive: false });
document.addEventListener('keydown', handleKeyDown);
document.addEventListener('keyup', handleKeyUp);

// Try device orientation for mobile tilt
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', handleDeviceOrientation);
}

// Start/restart button handlers
document.getElementById('btn-start').addEventListener('click', () => {
  startGame();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  startGame();
});

// Expose startGame globally
window.startGame = startGame;

// Initial state
ui.showStart();
document.getElementById('hud').style.display = 'none';

// Start game loop
requestAnimationFrame(gameLoop);


</script>
