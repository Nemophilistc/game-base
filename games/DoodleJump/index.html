<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>涂鸦跳跃 - Doodle Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 120px rgba(74, 144, 217, 0.15);
      image-rendering: auto;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 100%);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-left, .hud-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hud-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-value {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .hud-hp {
      font-size: 16px;
      letter-spacing: 2px;
    }

    .hud-powerup {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      color: #ff6;
      font-size: 14px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      display: none;
      white-space: nowrap;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 100%);
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
    }

    .overlay.active {
      display: flex;
    }

    .glass-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .game-title {
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 0 #4a90d9, 0 6px 12px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }

    .game-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 2px;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: #fff;
      box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(74, 144, 217, 0.6);
    }

    .help-box {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 14px;
      margin-top: 20px;
      text-align: left;
    }

    .help-box h3 {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .help-box p {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      line-height: 1.7;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .stat-label {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .stat-value {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .stat-value.highlight {
      color: #f1c40f;
    }

    .game-over-title {
      font-size: 32px;
      font-weight: 900;
      color: #e74c3c;
      text-shadow: 0 3px 8px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    .new-high {
      color: #f1c40f;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .platform-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .game-title { font-size: 32px; }
      .glass-box { padding: 24px 20px; }
      #hud { padding: 6px 10px; }
      .hud-value { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-label">分数</div>
        <div class="hud-value" id="hud-score">0</div>
        <div class="hud-hp" id="hud-hp"></div>
      </div>
      <div class="hud-powerup" id="hud-powerup"></div>
      <div class="hud-right">
        <div class="hud-label">高度</div>
        <div class="hud-value" id="hud-height">0m</div>
        <div class="hud-label" style="margin-top:4px">最高</div>
        <div class="hud-value" id="hud-high" style="font-size:14px;color:#f1c40f;">0</div>
      </div>
    </div>

    <!-- Start Overlay -->
    <div class="overlay active" id="start-overlay">
      <div class="glass-box">
        <div class="game-title">涂鸦跳跃</div>
        <div class="game-subtitle">Doodle Jump</div>
        <button class="btn btn-primary" id="btn-start">开始游戏</button>
        <div class="help-box">
          <h3>玩法说明</h3>
          <p>
            ← → 或 A D 键左右移动<br>
            点击/触屏向上射击<br>
            踩踏平台不断向上跳跃<br>
            收集金币和道具获得加分<br>
            注意躲避尖刺平台和怪物！
          </p>
          <div class="platform-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#5cb85c"></div>普通</div>
            <div class="legend-item"><div class="legend-dot" style="background:#5bc0de"></div>移动</div>
            <div class="legend-item"><div class="legend-dot" style="background:#d4a843"></div>易碎</div>
            <div class="legend-item"><div class="legend-dot" style="background:#5cb85c;border:2px solid #f0ad4e"></div>弹簧</div>
            <div class="legend-item"><div class="legend-dot" style="background:#d9534f"></div>尖刺</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay" id="gameover-overlay">
      <div class="glass-box">
        <div class="game-over-title">游戏结束</div>
        <div class="new-high" id="new-high" style="display:none">新纪录!</div>
        <div class="stat-row">
          <span class="stat-label">总分</span>
          <span class="stat-value highlight" id="final-score">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">攀爬高度</span>
          <span class="stat-value" id="final-height">0 米</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">收集金币</span>
          <span class="stat-value" id="final-coins">0</span>
        </div>
        <div class="stat-row" style="border:none">
          <span class="stat-label">历史最高</span>
          <span class="stat-value highlight" id="final-high">0</span>
        </div>
        <button class="btn btn-primary" id="btn-restart" style="margin-top:20px">再来一次</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
