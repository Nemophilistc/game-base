<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地牢探险 - Roguelike Dungeon RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', monospace;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      border: 2px solid rgba(80, 120, 180, 0.4);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 50, 100, 0.3);
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      cursor: default;
    }

    #controls {
      position: absolute;
      bottom: 90px;
      left: 10px;
      font-size: 11px;
      color: rgba(150, 170, 190, 0.6);
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    #title-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3366cc, #cc3366, #33cc66);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="title-bar"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">WASD/方向键:移动 | I:背包 | Q:属性 | F:远程 | 数字键:道具 | Enter:下楼</div>
  </div>
  <script type="module" src="js/main.js"></script>

</body>
</html>
