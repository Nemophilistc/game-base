<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农场模拟游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0e06;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', sans-serif;
      color: #F5DEB3;
      overflow: hidden;
    }

    h1 {
      font-size: 28px;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #8B6914;
      margin-bottom: 10px;
    }

    #gameCanvas {
      border: 3px solid #8B6914;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(139,105,20,0.3);
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 80vh;
    }

    .controls {
      margin-top: 10px;
      font-size: 12px;
      color: #8B6914;
      text-align: center;
      line-height: 1.8;
    }

    .controls span {
      color: #DAA520;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🌾 农场模拟游戏 🌾</h1>
  <div class="subtitle">耕种 · 养殖 · 经营你的梦想农场</div>

  <canvas id="gameCanvas"></canvas>

  <div class="controls">
    <span>左键</span> 使用当前工具 &nbsp;|&nbsp;
    <span>右键</span> 取消/关闭面板 &nbsp;|&nbsp;
    <span>B</span> 商店 &nbsp;|&nbsp;
    <span>N</span> 动物管理 &nbsp;|&nbsp;
    <span>空格</span> 跳到下一天 &nbsp;|&nbsp;
    <span>ESC</span> 关闭面板
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
