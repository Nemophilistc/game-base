<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>模拟飞行 - Flight Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1628;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading .text {
            color: #88aacc;
            font-size: 24px;
            text-align: center;
        }

        #loading .text .title {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4488ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="text">
            <div class="title">模拟飞行</div>
            <div>正在加载...</div>
            <div class="spinner"></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
// === ./config.js ===
// ============================================================
// config.js - Game constants and physics parameters
// ============================================================

const PHYSICS = {
    GRAVITY: 0.15,
    AIR_DENSITY: 0.01,
    LIFT_COEFFICIENT: 0.08,
    DRAG_COEFFICIENT: 0.003,
    THRUST_MAX: 0.35,
    THRUST_ACCEL: 0.008,
    PITCH_SPEED: 0.04,
    FINE_PITCH_SPEED: 0.015,
    MAX_VELOCITY: 12,
    MIN_STALL_SPEED: 2.5,
    STALL_PENALTY: 0.12,
    BOUNCE_FACTOR: 0.4,
    GROUND_FRICTION: 0.92,
};

const PLANE = {
    WIDTH: 60,
    HEIGHT: 20,
    START_X: 200,
    START_Y: 300,
    START_FUEL: 100,
    FUEL_CONSUMPTION_BASE: 0.02,
    FUEL_CONSUMPTION_BOOST: 0.08,
    BOOST_SPEED_MULT: 2.0,
    BOOST_DURATION: 180,
    SHIELD_DURATION: 300,
};

const TERRAIN = {
    GROUND_Y: 0.75,
    MOUNTAIN_COUNT: 8,
    MOUNTAIN_MIN_HEIGHT: 80,
    MOUNTAIN_MAX_HEIGHT: 280,
    MOUNTAIN_MIN_WIDTH: 150,
    MOUNTAIN_MAX_WIDTH: 400,
    CLOUD_COUNT: 12,
    CLOUD_MIN_Y: 0.08,
    CLOUD_MAX_Y: 0.45,
    SCROLL_SPEED: 0.3,
    MOUNTAIN_COLORS: ['#4a6741', '#3d5a35', '#5a7a50', '#6b8b60'],

// === ./sound.js ===
// ============================================================
// sound.js - Web Audio API sound effects
// ============================================================

class SoundManager {
    constructor() {
        this.ctx = null;
        this.initialized = false;
        this.engineOsc = null;
        this.engineGain = null;
        this.windGain = null;
        this.masterGain = null;
        this.muted = false;
    }

    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 0.4;
            this.masterGain.connect(this.ctx.destination);

            this._initEngine();
            this._initWind();
            this.initialized = true;
        } catch (e) {
            console.warn('Web Audio not supported:', e);
        }
    }

    _initEngine() {
        this.engineOsc = this.ctx.createOscillator();
        this.engineOsc.type = 'sawtooth';
        this.engineOsc.frequency.value = 80;

        const engineFilter = this.ctx.createBiquadFilter();
        engineFilter.type = 'lowpass';
        engineFilter.frequency.value = 400;
        this.engineFilter = engineFilter;

        this.engineGain = this.ctx.createGain();
        this.engineGain.gain.value = 0;

        this.engineOsc.connect(engineFilter);
        engineFilter.connect(this.engineGain);
        this.engineGain.connect(this.masterGain);
        this.engineOsc.start();
    }

    _initWind() {
        const bufferSize = 2 * this.ctx.sampleRate;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        this.windSource = this.ctx.createBufferSource();
        this.windSource.buffer = buffer;
        this.windSource.loop = true;

        const windFilter = this.ctx.createBiquadFilter();
        windFilter.type = 'bandpass';
        windFilter.frequency.value = 600;
        windFilter.Q.value = 0.5;
        this.windFilter = windFilter;

        this.windGain = this.ctx.createGain();
        this.windGain.gain.value = 0;

        this.windSource.connect(windFilter);
        windFilter.connect(this.windGain);
        this.windGain.connect(this.masterGain);
        this.windSource.start();
    }

    updateEngine(thrust, speed) {
        if (!this.initialized || this.muted) return;
        const freq = 60 + thrust * 120 + speed * 8;
        const vol = 0.05 + thrust * 0.25;
        this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05);
        this.engineGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.05);
        this.engineFilter.frequency.setTargetAtTime(300 + thrust * 500, this.ctx.currentTime, 0.05);
    }

    updateWind(speed) {
        if (!this.initialized || this.muted) return;
        const vol = Math.min(0.15, speed * 0.012);
        this.windGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
        this.windFilter.frequency.setTargetAtTime(400 + speed * 40, this.ctx.currentTime, 0.1);
    }

    playCollect() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, this.ctx.currentTime);
        osc.frequency.setValueAtTime(659, this.ctx.currentTime + 0.08);
        osc.frequency.setValueAtTime(784, this.ctx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
    }

    playCollectFuel() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(600, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.25);
    }

    playBoost() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.4);
    }

    playShield() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.15);
        osc.frequency.setValueAtTime(900, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    }

    playCollision() {
        if (!this.initialized || this.muted) return;
        const bufferSize = this.ctx.sampleRate * 0.3;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
        }
        const source = this.ctx.createBufferSource();
        source.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.35, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        source.start();
    }

    playExplosion() {
        if (!this.initialized || this.muted) return;
        const bufferSize = this.ctx.sampleRate * 0.6;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.25));
        }
        const source = this.ctx.createBufferSource();
        source.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1200, this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.6);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        source.start();
    }

    playStall() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    }

    playShoot() {
        if (!this.initialized || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
    }

    toggleMute() {
        this.muted = !this.muted;
        if (this.masterGain) {
            this.masterGain.gain.value = this.muted ? 0 : 0.4;
        }
        return this.muted;
    }

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }
}

// ============================================================
// plane.js - Aircraft class with physics simulation
// ============================================================


class Plane {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = PLANE.START_X;
        this.y = PLANE.START_Y;
        this.vx = 3;
        this.vy = 0;
        this.angle = 0;
        this.thrust = 0.3;
        this.targetThrust = 0.3;
        this.fuel = PLANE.START_FUEL;
        this.alive = true;
        this.stalling = false;
        this.boosted = false;
        this.boostTimer = 0;
        this.shielded = false;
        this.shieldTimer = 0;
        this.invincible = false;
        this.invincibleTimer = 0;
        this.hitFlash = 0;
        this.trailTimer = 0;
        this.shooting = false;
        this.shootCooldown = 0;
        this.projectiles = [];
        this.distance = 0;
    }

    get speed() {
        return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    }

    get speedRatio() {
        return this.speed / PHYSICS.MAX_VELOCITY;
    }

    get thrustRatio() {
        return this.thrust;
    }

    get screenX() {
        return this.x;
    }

    get screenY() {
        return this.y;
    }

    shoot() {
        if (this.shootCooldown <= 0 && this.alive) {
            const cosA = Math.cos(this.angle);
            const sinA = Math.sin(this.angle);
            this.projectiles.push({
                x: this.x + cosA * PLANE.WIDTH * 0.6,
                y: this.y + sinA * PLANE.WIDTH * 0.6,
                vx: cosA * 10 + this.vx * 0.5,
                vy: sinA * 10 + this.vy * 0.5,
                life: 60,
            });
            this.shootCooldown = 8;
        }
    }

    update(keys, groundY, dt) {
        if (!this.alive) return;

        // Update invincibility
        if (this.invincible) {
            this.invincibleTimer--;
            if (this.invincibleTimer <= 0) this.invincible = false;
        }

        // Hit flash
        if (this.hitFlash > 0) this.hitFlash--;

        // Boost timer
        if (this.boosted) {
            this.boostTimer--;
            if (this.boostTimer <= 0) this.boosted = false;
        }

        // Shield timer
        if (this.shielded) {
            this.shieldTimer--;
            if (this.shieldTimer <= 0) this.shielded = false;
        }

        // Shoot cooldown
        if (this.shootCooldown > 0) this.shootCooldown--;

        // Update projectiles
        this.projectiles = this.projectiles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            return p.life > 0;
        });

        // Fuel consumption
        const fuelRate = PLANE.FUEL_CONSUMPTION_BASE + this.thrust * 0.04;
        const boostRate = this.boosted ? PLANE.FUEL_CONSUMPTION_BOOST : 0;
        this.fuel -= (fuelRate + boostRate);
        if (this.fuel <= 0) {
            this.fuel = 0;
            this.targetThrust = 0;
        }

        // Keyboard input
        if (keys['ArrowUp'] || keys['KeyW']) {
            this.angle -= PHYSICS.PITCH_SPEED;
        }
        if (keys['ArrowDown'] || keys['KeyS']) {
            this.angle += PHYSICS.PITCH_SPEED;
        }
        if (keys['ArrowLeft'] || keys['KeyA']) {
            this.angle -= PHYSICS.FINE_PITCH_SPEED;
        }
        if (keys['ArrowRight'] || keys['KeyD']) {
            this.angle += PHYSICS.FINE_PITCH_SPEED;
        }

        // Clamp angle
        this.angle = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, this.angle));

        // Thrust control
        if (this.fuel > 0) {
            const maxThrust = this.boosted ? 1.0 : 0.7;
            if (keys['ShiftLeft'] || keys['ShiftRight']) {
                this.targetThrust = Math.min(maxThrust, this.thrust + PHYSICS.THRUST_ACCEL);
            } else {
                this.targetThrust = 0.3;
            }
        } else {
            this.targetThrust = 0;
        }
        this.thrust += (this.targetThrust - this.thrust) * 0.05;

        // === Four forces ===
        const speed = this.speed;
        const cosA = Math.cos(this.angle);
        const sinA = Math.sin(this.angle);

        // Thrust (along plane's forward direction)
        const thrustMult = this.boosted ? PLANE.BOOST_SPEED_MULT : 1.0;
        let fx = cosA * this.thrust * PHYSICS.THRUST_MAX * thrustMult;
        let fy = sinA * this.thrust * PHYSICS.THRUST_MAX * thrustMult;

        // Gravity
        fy += PHYSICS.GRAVITY;

        // Lift (perpendicular to velocity, proportional to speed^2 and angle of attack)
        if (speed > 0.5) {
            const velAngle = Math.atan2(this.vy, this.vx);
            const aoa = this.angle - velAngle;
            const liftMag = PHYSICS.LIFT_COEFFICIENT * speed * speed * Math.sin(aoa * 2);
            fx += -sinA * liftMag;
            fy += cosA * liftMag;
        }

        // Drag (opposite to velocity)
        if (speed > 0.1) {
            const dragMag = PHYSICS.DRAG_COEFFICIENT * speed * speed;
            fx -= (this.vx / speed) * dragMag;
            fy -= (this.vy / speed) * dragMag;
        }

        // Apply forces
        this.vx += fx;
        this.vy += fy;

        // Speed cap
        const maxV = this.boosted ? PHYSICS.MAX_VELOCITY * 1.5 : PHYSICS.MAX_VELOCITY;
        const currentSpeed = this.speed;
        if (currentSpeed > maxV) {
            this.vx = (this.vx / currentSpeed) * maxV;
            this.vy = (this.vy / currentSpeed) * maxV;
        }

        // Stall check
        this.stalling = false;
        if (speed < PHYSICS.MIN_STALL_SPEED && this.y < groundY - 30) {
            this.stalling = true;
            this.vy += PHYSICS.STALL_PENALTY;
        }

        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Track distance
        this.distance += Math.abs(this.vx) * 0.1;

        // Ground collision
        if (this.y > groundY - PLANE.HEIGHT / 2) {
            this.y = groundY - PLANE.HEIGHT / 2;
            if (this.vy > 3) {
                this.alive = false;
            } else {
                this.vy *= -PHYSICS.BOUNCE_FACTOR;
                this.vx *= PHYSICS.GROUND_FRICTION;
                if (Math.abs(this.vy) < 0.5) this.vy = 0;
            }
        }

        // Ceiling
        if (this.y < WORLD.CEILING) {
            this.y = WORLD.CEILING;
            this.vy = Math.max(0, this.vy);
        }

        // Keep on screen horizontally
        if (this.x < 50) {
            this.x = 50;
            this.vx = Math.max(0, this.vx);
        }
        if (this.x > WORLD.WIDTH - 50) {
            this.x = WORLD.WIDTH - 50;
            this.vx = Math.min(0, this.vx);
        }

        this.trailTimer++;
    }

    hit(damage) {
        if (this.invincible) return false;
        if (this.shielded) {
            this.shielded = false;
            this.shieldTimer = 0;
            this.invincible = true;
            this.invincibleTimer = 60;
            return false;
        }
        this.alive = false;
        return true;
    }

    addBoost() {
        this.boosted = true;
        this.boostTimer = PLANE.BOOST_DURATION;
        this.fuel = Math.min(100, this.fuel + 5);
    }

    addShield() {
        this.shielded = true;
        this.shieldTimer = PLANE.SHIELD_DURATION;
    }

    addFuel(amount) {
        this.fuel = Math.min(100, this.fuel + amount);
    }

    draw(ctx, cameraX) {
        const sx = this.x - cameraX;
        const sy = this.y;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);

        // Invincibility blink
        if (this.invincible && Math.floor(this.invincibleTimer / 4) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }

        // Shield glow
        if (this.shielded) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, 0, PLANE.WIDTH * 0.55, 0, Math.PI * 2);
            const shieldGrad = ctx.createRadialGradient(0, 0, PLANE.WIDTH * 0.2, 0, 0, PLANE.WIDTH * 0.55);
            shieldGrad.addColorStop(0, 'rgba(68, 255, 255, 0)');
            shieldGrad.addColorStop(0.8, 'rgba(68, 255, 255, 0.15)');
            shieldGrad.addColorStop(1, 'rgba(68, 255, 255, 0.3)');
            ctx.fillStyle = shieldGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(68, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }

        // Hit flash
        if (this.hitFlash > 0) {
            ctx.globalAlpha = 0.5 + Math.sin(this.hitFlash * 0.5) * 0.3;
        }

        // --- Draw plane body ---
        // Fuselage
        ctx.fillStyle = '#c0c0c0';
        ctx.beginPath();
        ctx.ellipse(0, 0, PLANE.WIDTH * 0.45, PLANE.HEIGHT * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cockpit
        ctx.fillStyle = '#4488ff';
        ctx.beginPath();
        ctx.ellipse(PLANE.WIDTH * 0.15, -PLANE.HEIGHT * 0.12, PLANE.WIDTH * 0.1, PLANE.HEIGHT * 0.18, -0.2, 0, Math.PI * 2);
        ctx.fill();

        // Wings
        ctx.fillStyle = '#888888';
        ctx.beginPath();
        ctx.moveTo(-PLANE.WIDTH * 0.05, -PLANE.HEIGHT * 0.1);
        ctx.lineTo(PLANE.WIDTH * 0.05, -PLANE.HEIGHT * 0.8);
        ctx.lineTo(PLANE.WIDTH * 0.15, -PLANE.HEIGHT * 0.7);
        ctx.lineTo(PLANE.WIDTH * 0.05, -PLANE.HEIGHT * 0.1);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-PLANE.WIDTH * 0.05, PLANE.HEIGHT * 0.1);
        ctx.lineTo(PLANE.WIDTH * 0.05, PLANE.HEIGHT * 0.8);
        ctx.lineTo(PLANE.WIDTH * 0.15, PLANE.HEIGHT * 0.7);
        ctx.lineTo(PLANE.WIDTH * 0.05, PLANE.HEIGHT * 0.1);
        ctx.fill();

        // Tail
        ctx.fillStyle = '#999999';
        ctx.beginPath();
        ctx.moveTo(-PLANE.WIDTH * 0.35, -PLANE.HEIGHT * 0.05);
        ctx.lineTo(-PLANE.WIDTH * 0.45, -PLANE.HEIGHT * 0.5);
        ctx.lineTo(-PLANE.WIDTH * 0.3, -PLANE.HEIGHT * 0.05);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-PLANE.WIDTH * 0.35, PLANE.HEIGHT * 0.05);
        ctx.lineTo(-PLANE.WIDTH * 0.45, PLANE.HEIGHT * 0.35);
        ctx.lineTo(-PLANE.WIDTH * 0.3, PLANE.HEIGHT * 0.05);
        ctx.fill();

        // Nose stripe
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.moveTo(PLANE.WIDTH * 0.35, -PLANE.HEIGHT * 0.08);
        ctx.lineTo(PLANE.WIDTH * 0.45, 0);
        ctx.lineTo(PLANE.WIDTH * 0.35, PLANE.HEIGHT * 0.08);
        ctx.fill();

        // Engine exhaust glow
        if (this.thrust > 0.1) {
            const exhaustLen = this.thrust * 30 + (this.boosted ? 20 : 0);
            const grad = ctx.createLinearGradient(-PLANE.WIDTH * 0.4, 0, -PLANE.WIDTH * 0.4 - exhaustLen, 0);
            grad.addColorStop(0, this.boosted ? '#44aaff' : '#ff8800');
            grad.addColorStop(0.5, this.boosted ? '#2266cc' : '#ff4400');
            grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(-PLANE.WIDTH * 0.35, -PLANE.HEIGHT * 0.08);
            ctx.lineTo(-PLANE.WIDTH * 0.4 - exhaustLen, 0);
            ctx.lineTo(-PLANE.WIDTH * 0.35, PLANE.HEIGHT * 0.08);
            ctx.fill();
        }

        // Stall warning
        if (this.stalling) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(0, 0, PLANE.WIDTH * 0.5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.restore();

        // Draw projectiles
        this.projectiles.forEach(p => {
            const px = p.x - cameraX;
            const py = p.y;
            ctx.fillStyle = '#ffff44';
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Trail
            ctx.fillStyle = 'rgba(255, 200, 0, 0.4)';
            ctx.beginPath();
            ctx.arc(px - p.vx * 0.3, py - p.vy * 0.3, 2, 0, Math.PI * 2);
            ctx.fill();
        });
    }
}

// terrain.js - Procedural terrain generation
// ============================================================


class Terrain {
    constructor(canvasWidth, canvasHeight) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.groundY = canvasHeight * TERRAIN.GROUND_Y;
        this.mountains = [];
        this.clouds = [];
        this.bgStars = [];
        this.offset = 0;

        this._generateMountains();
        this._generateClouds();
        this._generateStars();
    }

    _generateMountains() {
        this.mountains = [];
        const totalWidth = WORLD.WIDTH + 800;
        let x = -200;
        while (x < totalWidth) {
            const w = TERRAIN.MOUNTAIN_MIN_WIDTH + Math.random() * (TERRAIN.MOUNTAIN_MAX_WIDTH - TERRAIN.MOUNTAIN_MIN_WIDTH);
            const h = TERRAIN.MOUNTAIN_MIN_HEIGHT + Math.random() * (TERRAIN.MOUNTAIN_MAX_HEIGHT - TERRAIN.MOUNTAIN_MIN_HEIGHT);
            const peaks = 1 + Math.floor(Math.random() * 3);
            const color = TERRAIN.MOUNTAIN_COLORS[Math.floor(Math.random() * TERRAIN.MOUNTAIN_COLORS.length)];
            this.mountains.push({
                x, width: w, height: h, peaks, color,
                snowLine: 0.65 + Math.random() * 0.15,
                ridge: Array.from({ length: 8 }, () => Math.random() * 0.4 - 0.2),
            });
            x += w * 0.6 + Math.random() * w * 0.4;
        }
    }

    _generateClouds() {
        this.clouds = [];
        for (let i = 0; i < TERRAIN.CLOUD_COUNT; i++) {
            this.clouds.push({
                x: Math.random() * WORLD.WIDTH,
                y: this.canvasHeight * (TERRAIN.CLOUD_MIN_Y + Math.random() * (TERRAIN.CLOUD_MAX_Y - TERRAIN.CLOUD_MIN_Y)),
                width: 80 + Math.random() * 180,
                height: 30 + Math.random() * 50,
                opacity: 0.3 + Math.random() * 0.4,
                speed: 0.2 + Math.random() * 0.5,
                puffs: Array.from({ length: 3 + Math.floor(Math.random() * 4) }, () => ({
                    ox: (Math.random() - 0.5) * 0.8,
                    oy: (Math.random() - 0.5) * 0.5,
                    r: 0.3 + Math.random() * 0.4,
                })),
            });
        }
    }

    _generateStars() {
        this.bgStars = [];
        for (let i = 0; i < 80; i++) {
            this.bgStars.push({
                x: Math.random() * this.canvasWidth,
                y: Math.random() * this.canvasHeight * 0.4,
                size: 0.5 + Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.03,
            });
        }
    }

    getGroundY() {
        return this.groundY;
    }

    getMountainHitboxes() {
        return this.mountains.map(m => ({
            x: m.x,
            y: this.groundY - m.height,
            width: m.width,
            height: m.height,
        }));
    }

    update(cameraX) {
        this.offset = cameraX;
        // Move clouds
        this.clouds.forEach(c => {
            c.x += c.speed;
            if (c.x > WORLD.WIDTH + 200) c.x = -200;
        });
    }

    drawSky(ctx, frame) {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, this.canvasHeight);
        grad.addColorStop(0, TERRAIN.SKY_TOP);
        grad.addColorStop(0.6, TERRAIN.SKY_BOTTOM);
        grad.addColorStop(1, '#b8d4e8');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Stars (visible at top)
        this.bgStars.forEach(s => {
            const twinkle = Math.sin(frame * s.speed + s.twinkle) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.5})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    drawClouds(ctx, cameraX, layer) {
        // layer: 0 = far (behind mountains), 1 = near (in front)
        const parallax = layer === 0 ? 0.15 : 0.4;
        this.clouds.forEach((c, i) => {
            if (layer === 0 && i % 2 !== 0) return;
            if (layer === 1 && i % 2 === 0) return;

            const sx = c.x - cameraX * parallax;
            const wrapped = ((sx % (this.canvasWidth + 400)) + this.canvasWidth + 400) % (this.canvasWidth + 400) - 200;

            ctx.save();
            ctx.globalAlpha = c.opacity * (layer === 0 ? 0.6 : 0.8);
            ctx.fillStyle = '#ffffff';

            c.puffs.forEach(p => {
                ctx.beginPath();
                ctx.ellipse(
                    wrapped + p.ox * c.width,
                    c.y + p.oy * c.height,
                    c.width * p.r * 0.5,
                    c.height * p.r,
                    0, 0, Math.PI * 2
                );
                ctx.fill();
            });
            ctx.restore();
        });
    }

    drawMountains(ctx, cameraX) {
        const parallax = 0.5;
        this.mountains.forEach(m => {
            const sx = m.x - cameraX * parallax;
            if (sx + m.width < -100 || sx > this.canvasWidth + 100) return;

            const baseY = this.groundY;
            const topY = baseY - m.height;

            // Mountain body
            ctx.fillStyle = m.color;
            ctx.beginPath();
            ctx.moveTo(sx, baseY);

            // Ridge with variation
            const steps = 20;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const px = sx + t * m.width;
                const peakFactor = Math.sin(t * Math.PI * m.peaks);
                const ridgeNoise = m.ridge[Math.floor(t * (m.ridge.length - 1))] || 0;
                const py = baseY - m.height * (peakFactor * (1 - Math.abs(t - 0.5) * 0.5) + ridgeNoise * 0.3);
                ctx.lineTo(px, py);
            }
            ctx.lineTo(sx + m.width, baseY);
            ctx.closePath();
            ctx.fill();

            // Snow caps
            ctx.fillStyle = TERRAIN.SNOW_COLOR;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.moveTo(sx, baseY);
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const px = sx + t * m.width;
                const peakFactor = Math.sin(t * Math.PI * m.peaks);
                const ridgeNoise = m.ridge[Math.floor(t * (m.ridge.length - 1))] || 0;
                const fullPy = baseY - m.height * (peakFactor * (1 - Math.abs(t - 0.5) * 0.5) + ridgeNoise * 0.3);
                const py = baseY - m.height * m.snowLine;
                if (fullPy < py) {
                    ctx.lineTo(px, fullPy);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.lineTo(sx + m.width, baseY);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.beginPath();
            ctx.moveTo(sx + m.width * 0.3, baseY);
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const px = sx + m.width * 0.3 + t * m.width * 0.7;
                const peakFactor = Math.sin(t * Math.PI * m.peaks);
                const ridgeNoise = m.ridge[Math.floor(t * (m.ridge.length - 1))] || 0;
                const py = baseY - m.height * (peakFactor * (1 - Math.abs(t - 0.5) * 0.5) + ridgeNoise * 0.3) * 0.7;
                ctx.lineTo(px, py);
            }
            ctx.lineTo(sx + m.width, baseY);
            ctx.closePath();
            ctx.fill();
        });
    }

    drawGround(ctx, cameraX) {
        const parallax = 0.8;
        const gx = -cameraX * parallax;

        // Main ground
        const groundGrad = ctx.createLinearGradient(0, this.groundY, 0, this.canvasHeight);
        groundGrad.addColorStop(0, TERRAIN.GROUND_TOP);
        groundGrad.addColorStop(1, TERRAIN.GROUND_BOTTOM);
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, this.groundY, this.canvasWidth, this.canvasHeight - this.groundY);

        // Ground details - stripes
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
            const y = this.groundY + 10 + i * 12;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(this.canvasWidth, y);
            ctx.stroke();
        }

        // Ground texture dots
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        for (let i = 0; i < 40; i++) {
            const dx = ((i * 73 + gx) % this.canvasWidth + this.canvasWidth) % this.canvasWidth;
            const dy = this.groundY + 5 + (i * 37) % 40;
            ctx.beginPath();
            ctx.arc(dx, dy, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Runway markers
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        for (let i = 0; i < 5; i++) {
            const rx = ((i * 120 + gx * 0.5) % this.canvasWidth + this.canvasWidth) % this.canvasWidth;
            ctx.fillRect(rx, this.groundY + 2, 30, 3);
        }
    }

    draw(ctx, cameraX, frame) {
        this.drawSky(ctx, frame);
        this.drawClouds(ctx, cameraX, 0);
        this.drawMountains(ctx, cameraX);
        this.drawGround(ctx, cameraX);
        this.drawClouds(ctx, cameraX, 1);
    }
}

// ============================================================
// obstacles.js - Obstacles: balloons, birds, storm clouds
// ============================================================


class ObstacleManager {
    constructor(canvasWidth, canvasHeight, groundY) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.groundY = groundY;
        this.balloons = [];
        this.birds = [];
        this.storms = [];
        this.frame = 0;

        this._spawnBalloons();
        this._spawnBirds();
        this._spawnStorms();
    }

    _spawnBalloons() {
        this.balloons = [];
        const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff'];
        for (let i = 0; i < OBSTACLES.BALLOON_COUNT; i++) {
            this.balloons.push({
                x: 400 + Math.random() * (WORLD.WIDTH - 800),
                y: this.canvasHeight * 0.15 + Math.random() * this.canvasHeight * 0.5,
                baseY: 0,
                size: OBSTACLES.BALLOON_SIZE + Math.random() * 10,
                color: colors[i % colors.length],
                bobPhase: Math.random() * Math.PI * 2,
                bobSpeed: 0.02 + Math.random() * 0.02,
                bobAmp: 8 + Math.random() * 12,
                stringLen: 20 + Math.random() * 15,
                hit: false,
                hitTimer: 0,
            });
            this.balloons[i].baseY = this.balloons[i].y;
        }
    }

    _spawnBirds() {
        this.birds = [];
        for (let i = 0; i < OBSTACLES.BIRD_COUNT; i++) {
            const cx = 300 + Math.random() * (WORLD.WIDTH - 600);
            const cy = this.canvasHeight * 0.12 + Math.random() * this.canvasHeight * 0.55;
            this.birds.push({
                x: cx,
                y: cy,
                centerX: cx,
                centerY: cy,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 1,
                size: OBSTACLES.BIRD_SIZE + Math.random() * 8,
                wingPhase: Math.random() * Math.PI * 2,
                wingSpeed: 0.15 + Math.random() * 0.1,
                wanderTimer: Math.random() * 100,
                wanderDir: Math.random() * Math.PI * 2,
            });
        }
    }

    _spawnStorms() {
        this.storms = [];
        for (let i = 0; i < OBSTACLES.STORM_COUNT; i++) {
            this.storms.push({
                x: 600 + Math.random() * (WORLD.WIDTH - 1200),
                y: this.canvasHeight * 0.1 + Math.random() * this.canvasHeight * 0.35,
                radius: OBSTACLES.STORM_RADIUS + Math.random() * 40,
                phase: Math.random() * Math.PI * 2,
                lightningTimer: 0,
                lightningFlash: 0,
                darkening: 0,
            });
        }
    }

    reset() {
        this._spawnBalloons();
        this._spawnBirds();
        this._spawnStorms();
    }

    update(planeX, planeY) {
        this.frame++;

        // Update balloons
        this.balloons.forEach(b => {
            if (b.hit) {
                b.hitTimer--;
                if (b.hitTimer <= 0) {
                    b.hit = false;
                    b.x = planeX + (Math.random() > 0.5 ? 1 : -1) * (400 + Math.random() * 600);
                    b.y = this.canvasHeight * 0.15 + Math.random() * this.canvasHeight * 0.5;
                    b.baseY = b.y;
                }
                return;
            }
            b.y = b.baseY + Math.sin(this.frame * b.bobSpeed + b.bobPhase) * b.bobAmp;
        });

        // Update birds
        this.birds.forEach(bird => {
            bird.wingPhase += bird.wingSpeed;
            bird.wanderTimer--;

            if (bird.wanderTimer <= 0) {
                bird.wanderDir = Math.random() * Math.PI * 2;
                bird.wanderTimer = 60 + Math.random() * 120;
            }

            bird.vx += Math.cos(bird.wanderDir) * 0.05;
            bird.vy += Math.sin(bird.wanderDir) * 0.05;

            // Pull back to center
            const dx = bird.centerX - bird.x;
            const dy = bird.centerY - bird.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > OBSTACLES.BIRD_WANDER_RANGE) {
                bird.vx += dx * 0.003;
                bird.vy += dy * 0.003;
            }

            // Speed limit
            const spd = Math.sqrt(bird.vx * bird.vx + bird.vy * bird.vy);
            const maxSpd = OBSTACLES.BIRD_SPEED_MAX;
            if (spd > maxSpd) {
                bird.vx = (bird.vx / spd) * maxSpd;
                bird.vy = (bird.vy / spd) * maxSpd;
            }

            bird.x += bird.vx;
            bird.y += bird.vy;

            // Keep in bounds
            if (bird.y < 30) { bird.y = 30; bird.vy = Math.abs(bird.vy); }
            if (bird.y > this.groundY - 20) { bird.y = this.groundY - 20; bird.vy = -Math.abs(bird.vy); }
        });

        // Update storms
        this.storms.forEach(storm => {
            storm.phase += 0.01;
            storm.lightningTimer--;
            if (storm.lightningFlash > 0) storm.lightningFlash--;

            if (storm.lightningTimer <= 0) {
                storm.lightningTimer = OBSTACLES.STORM_INTERVAL_MIN +
                    Math.random() * (OBSTACLES.STORM_INTERVAL_MAX - OBSTACLES.STORM_INTERVAL_MIN);
                storm.lightningFlash = 6;
            }
        });
    }

    checkBalloonCollision(planeX, planeY, planeW, planeH) {
        for (const b of this.balloons) {
            if (b.hit) continue;
            const dx = planeX - b.x;
            const dy = planeY - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < b.size + planeW * 0.4) {
                b.hit = true;
                b.hitTimer = 120;
                return b;
            }
        }
        return null;
    }

    checkBirdCollision(planeX, planeY, planeW, planeH) {
        for (const bird of this.birds) {
            const dx = planeX - bird.x;
            const dy = planeY - bird.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < bird.size + planeW * 0.3) {
                // Move bird away
                bird.vx = (dx / dist) * 5;
                bird.vy = (dy / dist) * 5;
                return bird;
            }
        }
        return null;
    }

    isInStorm(planeX, planeY) {
        for (const storm of this.storms) {
            const dx = planeX - storm.x;
            const dy = planeY - storm.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < storm.radius) {
                return storm;
            }
        }
        return null;
    }

    draw(ctx, cameraX) {
        // Draw storms
        this.storms.forEach(storm => {
            const sx = storm.x - cameraX;
            const sy = storm.y;

            // Storm cloud body
            ctx.save();
            const stormGrad = ctx.createRadialGradient(sx, sy, storm.radius * 0.2, sx, sy, storm.radius);
            stormGrad.addColorStop(0, 'rgba(40, 40, 60, 0.7)');
            stormGrad.addColorStop(0.6, 'rgba(60, 60, 80, 0.5)');
            stormGrad.addColorStop(1, 'rgba(80, 80, 100, 0)');
            ctx.fillStyle = stormGrad;
            ctx.beginPath();
            ctx.arc(sx, sy, storm.radius, 0, Math.PI * 2);
            ctx.fill();

            // Dark puffs
            ctx.fillStyle = 'rgba(30, 30, 50, 0.5)';
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 + storm.phase;
                const r = storm.radius * 0.5;
                const px = sx + Math.cos(a) * r;
                const py = sy + Math.sin(a) * r * 0.6;
                ctx.beginPath();
                ctx.ellipse(px, py, storm.radius * 0.25, storm.radius * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Lightning
            if (storm.lightningFlash > 0) {
                ctx.strokeStyle = `rgba(255, 255, 200, ${storm.lightningFlash / 6})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                let lx = sx, ly = sy;
                for (let j = 0; j < 5; j++) {
                    lx += (Math.random() - 0.5) * 30;
                    ly += 20 + Math.random() * 20;
                    ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                // Flash overlay
                ctx.fillStyle = `rgba(255, 255, 255, ${storm.lightningFlash * 0.03})`;
                ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);
            }

            // Rain
            ctx.strokeStyle = 'rgba(150, 180, 220, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 15; i++) {
                const rx = sx + (Math.random() - 0.5) * storm.radius * 1.5;
                const ry = sy + (Math.random() - 0.5) * storm.radius;
                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx - 2, ry + 8);
                ctx.stroke();
            }

            ctx.restore();
        });

        // Draw balloons
        this.balloons.forEach(b => {
            if (b.hit && b.hitTimer > 90) return;
            const sx = b.x - cameraX;
            const sy = b.y;

            ctx.save();
            if (b.hit) {
                ctx.globalAlpha = b.hitTimer / 120;
            }

            // String
            ctx.strokeStyle = '#888888';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx, sy + b.size);
            ctx.quadraticCurveTo(sx + Math.sin(this.frame * 0.03) * 5, sy + b.size + b.stringLen * 0.5, sx, sy + b.size + b.stringLen);
            ctx.stroke();

            // Balloon body
            const grad = ctx.createRadialGradient(sx - b.size * 0.2, sy - b.size * 0.2, b.size * 0.1, sx, sy, b.size);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, b.color);
            grad.addColorStop(1, b.color);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(sx, sy, b.size * 0.7, b.size, 0, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.ellipse(sx - b.size * 0.2, sy - b.size * 0.3, b.size * 0.15, b.size * 0.2, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Knot
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.moveTo(sx - 3, sy + b.size);
            ctx.lineTo(sx, sy + b.size + 5);
            ctx.lineTo(sx + 3, sy + b.size);
            ctx.fill();

            ctx.restore();
        });

        // Draw birds
        this.birds.forEach(bird => {
            const sx = bird.x - cameraX;
            const sy = bird.y;
            const wing = Math.sin(bird.wingPhase) * 0.6;
            const s = bird.size;

            ctx.save();
            ctx.translate(sx, sy);

            // Body
            ctx.fillStyle = '#333333';
            ctx.beginPath();
            ctx.ellipse(0, 0, s * 0.5, s * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wings
            ctx.strokeStyle = '#444444';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-s * 0.2, 0);
            ctx.quadraticCurveTo(-s * 0.1, -s * wing, -s * 0.7, -s * wing * 0.5);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(s * 0.2, 0);
            ctx.quadraticCurveTo(s * 0.1, -s * wing, s * 0.7, -s * wing * 0.5);
            ctx.stroke();

            // Beak
            ctx.fillStyle = '#ff8800';
            const dir = bird.vx > 0 ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(dir * s * 0.5, 0);
            ctx.lineTo(dir * s * 0.7, -s * 0.05);
            ctx.lineTo(dir * s * 0.7, s * 0.05);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(dir * s * 0.25, -s * 0.05, s * 0.06, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(dir * s * 0.27, -s * 0.05, s * 0.03, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        });
    }
}

// ============================================================
// collectibles.js - Stars, fuel, boost, shield collectibles
// ============================================================


class CollectibleManager {
    constructor(canvasWidth, canvasHeight, groundY) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.groundY = groundY;
        this.items = [];
        this.frame = 0;
        this.respawnTimers = [];

        this._spawnAll();
    }

    _spawnAll() {
        this.items = [];
        this.respawnTimers = [];

        // Stars
        for (let i = 0; i < COLLECTIBLES.STAR_COUNT; i++) {
            this.items.push(this._createItem('star', i));
        }
        // Fuel
        for (let i = 0; i < COLLECTIBLES.FUEL_COUNT; i++) {
            this.items.push(this._createItem('fuel', i));
        }
        // Boost
        for (let i = 0; i < COLLECTIBLES.BOOST_COUNT; i++) {
            this.items.push(this._createItem('boost', i));
        }
        // Shield
        for (let i = 0; i < COLLECTIBLES.SHIELD_COUNT; i++) {
            this.items.push(this._createItem('shield', i));
        }
    }

    _createItem(type, index) {
        const yMin = this.canvasHeight * COLLECTIBLES.SPAWN_RANGE_Y_MIN;
        const yMax = this.canvasHeight * COLLECTIBLES.SPAWN_RANGE_Y_MAX;
        return {
            type,
            x: 300 + index * (WORLD.WIDTH - 600) / 8 + Math.random() * 200,
            y: yMin + Math.random() * (yMax - yMin),
            collected: false,
            respawnTimer: 0,
            phase: Math.random() * Math.PI * 2,
            glowPhase: Math.random() * Math.PI * 2,
        };
    }

    reset() {
        this._spawnAll();
    }

    update(planeX) {
        this.frame++;

        this.items.forEach((item, idx) => {
            if (item.collected) {
                item.respawnTimer--;
                if (item.respawnTimer <= 0) {
                    // Respawn near the plane
                    const yMin = this.canvasHeight * COLLECTIBLES.SPAWN_RANGE_Y_MIN;
                    const yMax = this.canvasHeight * COLLECTIBLES.SPAWN_RANGE_Y_MAX;
                    item.x = planeX + (Math.random() > 0.5 ? 1 : -1) * (300 + Math.random() * 400);
                    item.y = yMin + Math.random() * (yMax - yMin);
                    item.collected = false;
                    item.phase = Math.random() * Math.PI * 2;
                }
            }
        });
    }

    checkCollision(planeX, planeY, planeW, planeH) {
        const collected = [];
        this.items.forEach(item => {
            if (item.collected) return;
            const dx = planeX - item.x;
            const dy = planeY - item.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const hitSize = item.type === 'star' ? COLLECTIBLES.STAR_SIZE :
                           item.type === 'fuel' ? COLLECTIBLES.FUEL_SIZE :
                           item.type === 'boost' ? COLLECTIBLES.BOOST_SIZE :
                           COLLECTIBLES.SHIELD_SIZE;
            if (dist < hitSize + planeW * 0.3) {
                item.collected = true;
                item.respawnTimer = COLLECTIBLES.RESPAWN_INTERVAL;
                collected.push(item.type);
            }
        });
        return collected;
    }

    draw(ctx, cameraX) {
        this.items.forEach(item => {
            if (item.collected) return;

            const sx = item.x - cameraX;
            const sy = item.y + Math.sin(this.frame * 0.04 + item.phase) * 5;

            ctx.save();

            switch (item.type) {
                case 'star':
                    this._drawStar(ctx, sx, sy);
                    break;
                case 'fuel':
                    this._drawFuel(ctx, sx, sy);
                    break;
                case 'boost':
                    this._drawBoost(ctx, sx, sy);
                    break;
                case 'shield':
                    this._drawShield(ctx, sx, sy);
                    break;
            }

            ctx.restore();
        });
    }

    _drawStar(ctx, x, y) {
        const s = COLLECTIBLES.STAR_SIZE;
        const glow = Math.sin(this.frame * 0.06 + y * 0.01) * 0.3 + 0.7;

        // Glow
        ctx.shadowColor = '#ffdd00';
        ctx.shadowBlur = 12 * glow;

        // Star shape
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
            const px = x + Math.cos(angle) * s * 0.5;
            const py = y + Math.sin(angle) * s * 0.5;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();

        // Inner highlight
        ctx.fillStyle = '#fff8cc';
        ctx.beginPath();
        ctx.arc(x - s * 0.08, y - s * 0.08, s * 0.12, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
    }

    _drawFuel(ctx, x, y) {
        const s = COLLECTIBLES.FUEL_SIZE;
        const glow = Math.sin(this.frame * 0.05) * 0.2 + 0.8;

        // Glow
        ctx.shadowColor = '#44ff44';
        ctx.shadowBlur = 10 * glow;

        // Barrel body
        ctx.fillStyle = '#44aa44';
        ctx.beginPath();
        ctx.roundRect(x - s * 0.35, y - s * 0.45, s * 0.7, s * 0.9, 3);
        ctx.fill();

        // Barrel stripes
        ctx.fillStyle = '#338833';
        ctx.fillRect(x - s * 0.35, y - s * 0.15, s * 0.7, s * 0.08);
        ctx.fillRect(x - s * 0.35, y + s * 0.1, s * 0.7, s * 0.08);

        // Label
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${s * 0.3}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('F', x, y + s * 0.05);

        // Cap
        ctx.fillStyle = '#66cc66';
        ctx.fillRect(x - s * 0.1, y - s * 0.5, s * 0.2, s * 0.1);

        ctx.shadowBlur = 0;
    }

    _drawBoost(ctx, x, y) {
        const s = COLLECTIBLES.BOOST_SIZE;
        const glow = Math.sin(this.frame * 0.08) * 0.3 + 0.7;

        ctx.shadowColor = '#4488ff';
        ctx.shadowBlur = 12 * glow;

        // Lightning bolt
        ctx.fillStyle = '#4488ff';
        ctx.beginPath();
        ctx.moveTo(x + s * 0.1, y - s * 0.5);
        ctx.lineTo(x - s * 0.2, y - s * 0.05);
        ctx.lineTo(x + s * 0.05, y - s * 0.05);
        ctx.lineTo(x - s * 0.1, y + s * 0.5);
        ctx.lineTo(x + s * 0.2, y + s * 0.05);
        ctx.lineTo(x - s * 0.05, y + s * 0.05);
        ctx.closePath();
        ctx.fill();

        // Highlight
        ctx.fillStyle = '#88ccff';
        ctx.beginPath();
        ctx.moveTo(x + s * 0.05, y - s * 0.35);
        ctx.lineTo(x - s * 0.1, y - s * 0.05);
        ctx.lineTo(x + s * 0.02, y - s * 0.05);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
    }

    _drawShield(ctx, x, y) {
        const s = COLLECTIBLES.SHIELD_SIZE;
        const glow = Math.sin(this.frame * 0.07) * 0.3 + 0.7;
        const pulse = Math.sin(this.frame * 0.04) * 0.1 + 0.9;

        ctx.shadowColor = '#44ffff';
        ctx.shadowBlur = 12 * glow;

        // Shield shape
        ctx.fillStyle = '#44cccc';
        ctx.beginPath();
        ctx.moveTo(x, y - s * 0.5 * pulse);
        ctx.quadraticCurveTo(x + s * 0.45, y - s * 0.3, x + s * 0.4, y + s * 0.1);
        ctx.quadraticCurveTo(x + s * 0.2, y + s * 0.45, x, y + s * 0.5 * pulse);
        ctx.quadraticCurveTo(x - s * 0.2, y + s * 0.45, x - s * 0.4, y + s * 0.1);
        ctx.quadraticCurveTo(x - s * 0.45, y - s * 0.3, x, y - s * 0.5 * pulse);
        ctx.fill();

        // Inner shine
        ctx.fillStyle = '#88ffff';
        ctx.beginPath();
        ctx.moveTo(x, y - s * 0.3 * pulse);
        ctx.quadraticCurveTo(x + s * 0.2, y - s * 0.15, x + s * 0.15, y + s * 0.05);
        ctx.quadraticCurveTo(x + s * 0.05, y + s * 0.2, x, y + s * 0.25 * pulse);
        ctx.quadraticCurveTo(x - s * 0.05, y + s * 0.1, x - s * 0.1, y);
        ctx.quadraticCurveTo(x - s * 0.15, y - s * 0.1, x, y - s * 0.3 * pulse);
        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

// ============================================================
// effects.js - Particle systems: trails, explosions, sparks
// ============================================================


class EffectsManager {
    constructor() {
        this.trails = [];
        this.explosions = [];
        this.sparks = [];
        this.collectEffects = [];
        this.stormEffects = [];
    }

    reset() {
        this.trails = [];
        this.explosions = [];
        this.sparks = [];
        this.collectEffects = [];
        this.stormEffects = [];
    }

    addTrail(x, y, vx, vy, boosted) {
        if (this.trails.length > EFFECTS.TRAIL_PARTICLES * 3) return;
        this.trails.push({
            x: x - vx * 0.5 + (Math.random() - 0.5) * 4,
            y: y + (Math.random() - 0.5) * 4,
            vx: -vx * 0.1 + (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.3 + 0.2,
            life: EFFECTS.TRAIL_LIFETIME + Math.random() * 10,
            maxLife: EFFECTS.TRAIL_LIFETIME + 10,
            size: EFFECTS.TRAIL_SIZE_MIN + Math.random() * (EFFECTS.TRAIL_SIZE_MAX - EFFECTS.TRAIL_SIZE_MIN),
            boosted,
        });
    }

    addExplosion(x, y, color = '#ff6600') {
        for (let i = 0; i < EFFECTS.EXPLOSION_PARTICLES; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 5;
            const colors = ['#ff4400', '#ff8800', '#ffcc00', '#ff2200', '#ffaa00', '#ffffff'];
            this.explosions.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: EFFECTS.EXPLOSION_LIFETIME + Math.random() * 20,
                maxLife: EFFECTS.EXPLOSION_LIFETIME + 20,
                size: 3 + Math.random() * 6,
                color: colors[Math.floor(Math.random() * colors.length)],
                gravity: 0.02 + Math.random() * 0.03,
            });
        }
        // Central flash
        this.explosions.push({
            x, y,
            vx: 0, vy: 0,
            life: 10,
            maxLife: 10,
            size: 40,
            color: '#ffffff',
            gravity: 0,
            flash: true,
        });
    }

    addSparks(x, y, count = EFFECTS.SPARK_PARTICLES) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            this.sparks.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: EFFECTS.SPARK_LIFETIME + Math.random() * 10,
                maxLife: EFFECTS.SPARK_LIFETIME + 10,
                size: 1.5 + Math.random() * 2,
            });
        }
    }

    addCollectEffect(x, y, type) {
        const color = type === 'star' ? '#ffdd00' :
                     type === 'fuel' ? '#44ff44' :
                     type === 'boost' ? '#4488ff' : '#44ffff';
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const speed = 1.5 + Math.random() * 2;
            this.collectEffects.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 25,
                maxLife: 25,
                size: 3 + Math.random() * 3,
                color,
            });
        }
    }

    addStormEffect(x, y) {
        if (this.stormEffects.length > 30) return;
        this.stormEffects.push({
            x: x + (Math.random() - 0.5) * 60,
            y: y + (Math.random() - 0.5) * 40,
            vx: (Math.random() - 0.5) * 2,
            vy: 1 + Math.random() * 2,
            life: 20 + Math.random() * 20,
            maxLife: 40,
            size: 2 + Math.random() * 3,
        });
    }

    update() {
        // Trails
        this.trails = this.trails.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            p.size *= 0.97;
            return p.life > 0;
        });

        // Explosions
        this.explosions = this.explosions.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity || 0;
            p.vx *= 0.98;
            p.vy *= 0.98;
            p.life--;
            if (!p.flash) p.size *= 0.97;
            return p.life > 0;
        });

        // Sparks
        this.sparks = this.sparks.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life--;
            return p.life > 0;
        });

        // Collect effects
        this.collectEffects = this.collectEffects.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.95;
            p.vy *= 0.95;
            p.life--;
            return p.life > 0;
        });

        // Storm effects
        this.stormEffects = this.stormEffects.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            return p.life > 0;
        });
    }

    draw(ctx, cameraX) {
        // Trails
        this.trails.forEach(p => {
            const sx = p.x - cameraX;
            const alpha = (p.life / p.maxLife) * 0.6;
            if (p.boosted) {
                ctx.fillStyle = `rgba(68, 170, 255, ${alpha})`;
            } else {
                ctx.fillStyle = `rgba(200, 200, 200, ${alpha})`;
            }
            ctx.beginPath();
            ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Explosions
        this.explosions.forEach(p => {
            const sx = p.x - cameraX;
            const alpha = p.life / p.maxLife;
            if (p.flash) {
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(sx, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        });

        // Sparks
        this.sparks.forEach(p => {
            const sx = p.x - cameraX;
            const alpha = p.life / p.maxLife;
            ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
            ctx.beginPath();
            ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Collect effects
        this.collectEffects.forEach(p => {
            const sx = p.x - cameraX;
            const alpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        // Storm effects
        this.stormEffects.forEach(p => {
            const sx = p.x - cameraX;
            const alpha = p.life / p.maxLife;
            ctx.fillStyle = `rgba(150, 180, 220, ${alpha * 0.5})`;
            ctx.beginPath();
            ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }
}
