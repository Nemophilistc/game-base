// ============================================================
// ui.js - HUD display and overlay screens
// ============================================================


class UIOverlay {
    constructor(canvasWidth, canvasHeight) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.messages = [];
        this.screenShake = 0;
    }

    showMessage(text, duration = 120, color = '#ffffff') {
        this.messages.push({ text, timer: duration, maxTimer: duration, color });
    }

    triggerShake(intensity = 8) {
        this.screenShake = intensity;
    }

    getShakeOffset() {
        if (this.screenShake > 0) {
            this.screenShake *= 0.9;
            if (this.screenShake < 0.5) this.screenShake = 0;
            return {
                x: (Math.random() - 0.5) * this.screenShake * 2,
                y: (Math.random() - 0.5) * this.screenShake * 2,
            };
        }
        return { x: 0, y: 0 };
    }

    update() {
        this.messages = this.messages.filter(m => {
            m.timer--;
            return m.timer > 0;
        });
    }

    drawHUD(ctx, plane, score, distance) {
        ctx.save();

        // HUD background bar
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, this.canvasWidth, 60);

        const fontBase = `bold 16px ${UI.FONT_FAMILY}`;
        const fontSmall = `13px ${UI.FONT_FAMILY}`;

        // Fuel gauge
        const fuelX = 20;
        const fuelY = 15;
        const fuelW = 160;
        const fuelH = 14;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(fuelX, fuelY, fuelW, fuelH);
        const fuelColor = plane.fuel > 30 ? UI.FUEL_COLOR :
                         plane.fuel > 15 ? UI.FUEL_LOW_COLOR : UI.WARNING_COLOR;
        ctx.fillStyle = fuelColor;
        ctx.fillRect(fuelX, fuelY, fuelW * (plane.fuel / 100), fuelH);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.strokeRect(fuelX, fuelY, fuelW, fuelH);

        ctx.fillStyle = UI.HUD_COLOR;
        ctx.font = fontBase;
        ctx.textAlign = 'left';
        ctx.fillText(`燃料: ${Math.ceil(plane.fuel)}%`, fuelX, fuelY + fuelH + 16);

        // Low fuel warning
        if (plane.fuel < 20 && Math.floor(Date.now() / 300) % 2 === 0) {
            ctx.fillStyle = UI.WARNING_COLOR;
            ctx.font = `bold 18px ${UI.FONT_FAMILY}`;
            ctx.fillText('! 燃料不足 !', fuelX + fuelW + 20, fuelY + 12);
        }

        // Speed indicator
        const speedX = 220;
        ctx.fillStyle = UI.HUD_COLOR;
        ctx.font = fontBase;
        ctx.fillText(`速度: ${plane.speed.toFixed(1)}`, speedX, 28);

        // Altitude
        const altX = 380;
        const altitude = Math.max(0, Math.floor((this.canvasHeight * 0.75 - plane.y) / 3));
        ctx.fillText(`高度: ${altitude}m`, altX, 28);

        // Thrust / Boost / Shield status
        const statusX = this.canvasWidth - 250;
        ctx.font = fontSmall;

        // Thrust bar
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(statusX, 10, 100, 8);
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(statusX, 10, 100 * plane.thrust, 8);
        ctx.fillStyle = UI.HUD_COLOR;
        ctx.fillText('推力', statusX, 30);

        // Status icons
        let iconX = statusX + 80;
        if (plane.boosted) {
            ctx.fillStyle = UI.BOOST_COLOR;
            ctx.fillText('加速', iconX, 30);
            iconX += 50;
        }
        if (plane.shielded) {
            ctx.fillStyle = UI.SHIELD_COLOR;
            ctx.fillText('护盾', iconX, 30);
            iconX += 50;
        }
        if (plane.stalling) {
            ctx.fillStyle = UI.WARNING_COLOR;
            ctx.font = `bold 16px ${UI.FONT_FAMILY}`;
            ctx.fillText('失速!', iconX, 30);
        }

        // Score and distance (right side)
        ctx.textAlign = 'right';
        ctx.font = `bold 20px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = '#ffdd00';
        ctx.fillText(`${Math.floor(score)}`, this.canvasWidth - 20, 25);
        ctx.font = fontSmall;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.fillText(`距离: ${Math.floor(distance)}m`, this.canvasWidth - 20, 48);

        // Bottom bar - controls hint
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, this.canvasHeight - 35, this.canvasWidth, 35);
        ctx.textAlign = 'center';
        ctx.font = `12px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.fillText('W/↑拉起  S/↓俯冲  A/D微调  Shift加速  空格射击  M静音  P暂停', this.canvasWidth / 2, this.canvasHeight - 12);

        ctx.restore();
    }

    drawMessages(ctx) {
        ctx.save();
        this.messages.forEach(m => {
            const alpha = Math.min(1, m.timer / 30);
            const y = this.canvasHeight * 0.3 + (m.maxTimer - m.timer) * 0.5;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = m.color;
            ctx.font = `bold 28px ${UI.FONT_FAMILY}`;
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 6;
            ctx.fillText(m.text, this.canvasWidth / 2, y);
            ctx.shadowBlur = 0;
        });
        ctx.restore();
    }

    drawStartScreen(ctx) {
        ctx.save();
        // Overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Title
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold 52px ${UI.FONT_FAMILY}`;
        ctx.textAlign = 'center';
        ctx.shadowColor = '#4488ff';
        ctx.shadowBlur = 20;
        ctx.fillText('模拟飞行', this.canvasWidth / 2, this.canvasHeight * 0.3);
        ctx.shadowBlur = 0;

        ctx.font = `22px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.fillText('Flight Simulator', this.canvasWidth / 2, this.canvasHeight * 0.3 + 40);

        // Instructions
        const instructions = [
            'W / ↑ — 拉起机头',
            'S / ↓ — 俯冲',
            'A / D / ← → — 微调方向',
            'Shift — 加速推进',
            '空格 — 发射攻击',
            'M — 静音 / P — 暂停',
        ];
        ctx.font = `18px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        instructions.forEach((line, i) => {
            ctx.fillText(line, this.canvasWidth / 2, this.canvasHeight * 0.48 + i * 30);
        });

        // Collect info
        ctx.font = `16px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = '#ffdd00';
        ctx.fillText('收集星星得分，燃料桶补充燃料，闪电加速，护盾保护', this.canvasWidth / 2, this.canvasHeight * 0.78);
        ctx.fillStyle = '#ff6666';
        ctx.fillText('躲避气球、鸟群、山脉和雷暴云！', this.canvasWidth / 2, this.canvasHeight * 0.78 + 28);

        // Start prompt
        const blink = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
        ctx.globalAlpha = blink;
        ctx.fillStyle = '#44aaff';
        ctx.font = `bold 26px ${UI.FONT_FAMILY}`;
        ctx.fillText('按任意键开始', this.canvasWidth / 2, this.canvasHeight * 0.92);
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    drawPauseScreen(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        ctx.fillStyle = '#ffffff';
        ctx.font = `bold 42px ${UI.FONT_FAMILY}`;
        ctx.textAlign = 'center';
        ctx.fillText('暂停', this.canvasWidth / 2, this.canvasHeight / 2 - 20);

        ctx.font = `20px ${UI.FONT_FAMILY}`;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.fillText('按 P 继续', this.canvasWidth / 2, this.canvasHeight / 2 + 25);

        ctx.restore();
    }

    drawGameOver(ctx, score, distance) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        ctx.fillStyle = '#ff4444';
        ctx.font = `bold 48px ${UI.FONT_FAMILY}`;
        ctx.textAlign = 'center';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 15;
        ctx.fillText('坠毁!', this.canvasWidth / 2, this.canvasHeight * 0.3);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffffff';
        ctx.font = `24px ${UI.FONT_FAMILY}`;
        ctx.fillText(`最终得分: ${Math.floor(score)}`, this.canvasWidth / 2, this.canvasHeight * 0.45);
        ctx.fillText(`飞行距离: ${Math.floor(distance)}m`, this.canvasWidth / 2, this.canvasHeight * 0.52);

        // Rating
        let rating = '新手飞行员';
        if (score > 5000) rating = '王牌飞行员';
        else if (score > 3000) rating = '资深机长';
        else if (score > 1500) rating = '副驾驶';
        else if (score > 500) rating = '学员飞行员';

        ctx.fillStyle = '#ffdd00';
        ctx.font = `bold 22px ${UI.FONT_FAMILY}`;
        ctx.fillText(`评级: ${rating}`, this.canvasWidth / 2, this.canvasHeight * 0.62);

        const blink = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
        ctx.globalAlpha = blink;
        ctx.fillStyle = '#44aaff';
        ctx.font = `bold 24px ${UI.FONT_FAMILY}`;
        ctx.fillText('按 R 重新开始', this.canvasWidth / 2, this.canvasHeight * 0.78);
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    drawMinimap(ctx, plane, mountains, obstacles, collectibles, cameraX) {
        const mw = 150;
        const mh = 50;
        const mx = this.canvasWidth - mw - 15;
        const my = 70;
        const scaleX = mw / 3000;

        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(mx, my, mw, mh);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.strokeRect(mx, my, mw, mh);

        // Plane dot
        ctx.fillStyle = '#44ff44';
        ctx.beginPath();
        ctx.arc(mx + plane.x * scaleX, my + mh * 0.5, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Camera view
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.strokeRect(mx + cameraX * scaleX, my, (this.canvasWidth / 3000) * mw * 3, mh);

        ctx.restore();
    }
}

// === main.js ===
// ============================================================
// main.js - Game loop, event listeners, camera system
// ============================================================


// === Game State ===
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };

let canvas, ctx;
let gameState = STATE.MENU;
let plane, terrain, obstacles, collectibles, effects, ui, sound;
let cameraX = 0;
let score = 0;
let distanceTraveled = 0;
let frame = 0;
let keys = {};
let shakeOffset = { x: 0, y: 0 };

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();

    sound = new SoundManager();
    plane = new Plane();
    terrain = new Terrain(canvas.width, canvas.height);
    obstacles = new ObstacleManager(canvas.width, canvas.height, terrain.getGroundY());
    collectibles = new CollectibleManager(canvas.width, canvas.height, terrain.getGroundY());
    effects = new EffectsManager();
    ui = new UIOverlay(canvas.width, canvas.height);

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);

    // Click to start/restart
    canvas.addEventListener('click', () => {
        if (gameState === STATE.MENU) {
            sound.init();
            sound.resume();
            startGame();
        } else if (gameState === STATE.GAMEOVER) {
            startGame();
        }
    });

    // Touch controls for mobile
    setupTouchControls();

    requestAnimationFrame(gameLoop);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (terrain) {
        terrain.canvasWidth = canvas.width;
        terrain.canvasHeight = canvas.height;
        terrain.groundY = canvas.height * 0.75;
    }
    if (ui) {
        ui.canvasWidth = canvas.width;
        ui.canvasHeight = canvas.height;
    }
}

function onKeyDown(e) {
    keys[e.code] = true;

    if (gameState === STATE.MENU) {
        sound.init();
        sound.resume();
        startGame();
        return;
    }

    if (e.code === 'KeyP') {
        if (gameState === STATE.PLAYING) {
            gameState = STATE.PAUSED;
        } else if (gameState === STATE.PAUSED) {
            gameState = STATE.PLAYING;
        }
    }

    if (e.code === 'KeyM') {
        const muted = sound.toggleMute();
        ui.showMessage(muted ? '已静音' : '已取消静音', 60);
    }

    if (e.code === 'KeyR' && gameState === STATE.GAMEOVER) {
        startGame();
    }

    if (e.code === 'Space' && gameState === STATE.PLAYING) {
        plane.shoot();
        sound.playShoot();
    }
}

function onKeyUp(e) {
    keys[e.code] = false;
}

function setupTouchControls() {
    let touchStartY = 0;
    let touchStartX = 0;

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameState === STATE.MENU) {
            sound.init();
            sound.resume();
            startGame();
            return;
        }
        if (gameState === STATE.GAMEOVER) {
            startGame();
            return;
        }
        const touch = e.touches[0];
        touchStartY = touch.clientY;
        touchStartX = touch.clientX;

        // Right side tap = shoot
        if (touch.clientX > canvas.width * 0.7) {
            keys['Space'] = true;
            setTimeout(() => keys['Space'] = false, 100);
        }
        // Left side tap = boost
        if (touch.clientX < canvas.width * 0.3) {
            keys['ShiftLeft'] = true;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (gameState !== STATE.PLAYING) return;
        const touch = e.touches[0];
        const dy = touch.clientY - touchStartY;
        const dx = touch.clientX - touchStartX;

        keys['ArrowUp'] = dy < -20;
        keys['ArrowDown'] = dy > 20;
        keys['ArrowLeft'] = dx < -20;
        keys['ArrowRight'] = dx > 20;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys['ArrowUp'] = false;
        keys['ArrowDown'] = false;
        keys['ArrowLeft'] = false;
        keys['ArrowRight'] = false;
        keys['ShiftLeft'] = false;
        keys['Space'] = false;
    }, { passive: false });
}

function startGame() {
    // Resume AudioContext before any sound calls (browser may have suspended it)
    sound.init();
    sound.resume();

    // Clear stale input state from previous game
    keys = {};

    plane.reset();
    effects.reset();
    score = 0;
    distanceTraveled = 0;
    cameraX = 0;
    frame = 0;
    terrain = new Terrain(canvas.width, canvas.height);
    obstacles = new ObstacleManager(canvas.width, canvas.height, terrain.getGroundY());
    collectibles = new CollectibleManager(canvas.width, canvas.height, terrain.getGroundY());

    // Clear UI state from previous game
    ui.screenShake = 0;
    ui.messages = [];

    gameState = STATE.PLAYING;
    ui.showMessage('起飞!', 90, '#44ff44');
}

function updateCamera() {
    const targetX = plane.x - canvas.width * 0.3;
    cameraX += (targetX - cameraX) * 0.08;
    cameraX = Math.max(0, Math.min(WORLD.WIDTH - canvas.width, cameraX));
}

function gameLoop(timestamp) {
    frame++;

    if (gameState === STATE.PLAYING) {
        update();
    }

    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    const groundY = terrain.getGroundY();

    // Update plane
    plane.update(keys, groundY, 1);

    // Sound
    sound.updateEngine(plane.thrust, plane.speed);
    sound.updateWind(plane.speed);

    // Trail particles
    if (frame % 2 === 0 && plane.alive) {
        effects.addTrail(
            plane.x - Math.cos(plane.angle) * PLANE.WIDTH * 0.4,
            plane.y - Math.sin(plane.angle) * PLANE.WIDTH * 0.4,
            plane.vx, plane.vy, plane.boosted
        );
    }

    // Camera
    updateCamera();

    // Terrain
    terrain.update(cameraX);

    // Obstacles
    obstacles.update(plane.x, plane.y);

    // Collectibles
    collectibles.update(plane.x);

    // Effects
    effects.update();
    ui.update();

    // Score from distance
    distanceTraveled += Math.abs(plane.vx) * 0.1;
    score += Math.abs(plane.vx) * SCORING.DISTANCE_RATE;

    // === Collisions ===
    if (plane.alive && !plane.invincible) {
        // Balloon collision
        const balloon = obstacles.checkBalloonCollision(plane.x, plane.y, PLANE.WIDTH, PLANE.HEIGHT);
        if (balloon) {
            score += OBSTACLES.BALLOON_PENALTY;
            effects.addSparks(plane.x, plane.y, 10);
            sound.playCollision();
            ui.showMessage(`气球! ${OBSTACLES.BALLOON_PENALTY}`, 60, '#ff4444');
            ui.triggerShake(6);
            plane.hitFlash = 15;
        }

        // Bird collision
        const bird = obstacles.checkBirdCollision(plane.x, plane.y, PLANE.WIDTH, PLANE.HEIGHT);
        if (bird) {
            const dead = plane.hit(1);
            effects.addSparks(plane.x, plane.y, 15);
            sound.playCollision();
            ui.triggerShake(10);
            if (dead) {
                effects.addExplosion(plane.x, plane.y);
                sound.playExplosion();
                gameState = STATE.GAMEOVER;
            }
            plane.hitFlash = 20;
        }

        // Storm
        const storm = obstacles.isInStorm(plane.x, plane.y);
        if (storm) {
            plane.vx += (Math.random() - 0.5) * OBSTACLES.STORM_TURBULENCE;
            plane.vy += (Math.random() - 0.5) * OBSTACLES.STORM_TURBULENCE;
            if (frame % 5 === 0) {
                effects.addStormEffect(plane.x, plane.y);
            }
            if (frame % 30 === 0) {
                ui.triggerShake(4);
            }
        }

        // Mountain collision
        const mountainHitboxes = terrain.getMountainHitboxes();
        for (const m of mountainHitboxes) {
            const shrink = OBSTACLES.MOUNTAIN_HITBOX_SHRINK;
            if (plane.x > m.x + shrink && plane.x < m.x + m.width - shrink &&
                plane.y > m.y + shrink && plane.y < m.y + m.height) {
                const dead = plane.hit(1);
                effects.addExplosion(plane.x, plane.y);
                sound.playExplosion();
                ui.triggerShake(15);
                if (dead) {
                    gameState = STATE.GAMEOVER;
                }
                break;
            }
        }
    }

    // Projectile vs obstacles
    plane.projectiles.forEach(p => {
        // Check birds
        for (const bird of obstacles.birds) {
            const dx = p.x - bird.x;
            const dy = p.y - bird.y;
            if (Math.sqrt(dx * dx + dy * dy) < bird.size + 5) {
                effects.addSparks(bird.x, bird.y, 8);
                sound.playCollect();
                score += 50;
                ui.showMessage('+50 击中!', 60, '#ffdd00');
                bird.centerX = plane.x + (Math.random() > 0.5 ? 1 : -1) * 500;
                bird.centerY = canvas.height * 0.1 + Math.random() * canvas.height * 0.5;
                p.life = 0;
                break;
            }
        }
    });

    // Collectible collision
    const collected = collectibles.checkCollision(plane.x, plane.y, PLANE.WIDTH, PLANE.HEIGHT);
    collected.forEach(type => {
        switch (type) {
            case 'star':
                score += COLLECTIBLES.STAR_SCORE;
                sound.playCollect();
                ui.showMessage(`+${COLLECTIBLES.STAR_SCORE} 星星!`, 60, '#ffdd00');
                break;
            case 'fuel':
                plane.addFuel(COLLECTIBLES.FUEL_AMOUNT);
                sound.playCollectFuel();
                ui.showMessage(`+${COLLECTIBLES.FUEL_AMOUNT} 燃料!`, 60, '#44ff44');
                break;
            case 'boost':
                plane.addBoost();
                sound.playBoost();
                ui.showMessage('加速!', 90, '#4488ff');
                break;
            case 'shield':
                plane.addShield();
                sound.playShield();
                ui.showMessage('护盾激活!', 90, '#44ffff');
                break;
        }
        effects.addCollectEffect(plane.x, plane.y, type);
    });

    // Stall warning
    if (plane.stalling && frame % 60 === 0) {
        sound.playStall();
        ui.showMessage('失速!', 40, '#ff4444');
    }

    // Ground death
    if (!plane.alive && gameState === STATE.PLAYING) {
        effects.addExplosion(plane.x, plane.y);
        sound.playExplosion();
        gameState = STATE.GAMEOVER;
    }

    // Shake
    shakeOffset = ui.getShakeOffset();
}

function draw() {
    ctx.save();
    ctx.translate(shakeOffset.x, shakeOffset.y);

    // Clear
    ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);

    // Terrain background
    terrain.draw(ctx, cameraX, frame);

    // Obstacles
    obstacles.draw(ctx, cameraX);

    // Collectibles
    collectibles.draw(ctx, cameraX);

    // Effects
    effects.draw(ctx, cameraX);

    // Plane
    if (plane.alive || gameState === STATE.GAMEOVER) {
        plane.draw(ctx, cameraX);
    }

    ctx.restore();

    // UI (not affected by camera shake)
    if (gameState === STATE.PLAYING || gameState === STATE.PAUSED) {
        ui.drawHUD(ctx, plane, score, distanceTraveled);
        ui.drawMinimap(ctx, plane, terrain.mountains, obstacles, collectibles, cameraX);
        ui.drawMessages(ctx);
    }

    if (gameState === STATE.MENU) {
        ui.drawStartScreen(ctx);
    } else if (gameState === STATE.PAUSED) {
        ui.drawPauseScreen(ctx);
    } else if (gameState === STATE.GAMEOVER) {
        ui.drawGameOver(ctx, score, distanceTraveled);
    }
}

// Start
init();;

        
        // Hide loading screen once module is loaded
        setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(() => loading.remove(), 500);
                }
            }, 300);;;
    
</script>
