<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 — Gomoku</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
}

.game-container {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
}

/* 左侧面板 */
.panel-left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 260px;
    flex-shrink: 0;
}

/* 棋盘区 */
.board-wrapper {
    position: relative;
    flex-shrink: 0;
}

canvas#board {
    display: block;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

/* 右侧面板 */
.panel-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 220px;
    flex-shrink: 0;
}

/* 卡片样式 */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
}

.card h3 {
    font-size: 14px;
    color: #90caf9;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* 状态栏 */
#status {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    text-shadow: 0 0 10px rgba(100,181,246,0.4);
}

/* 按钮 */
.btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.btn {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    min-width: 0;
    text-align: center;
}

.btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
}

.btn.active {
    background: rgba(66,165,245,0.25);
    border-color: #42a5f5;
    color: #90caf9;
    font-weight: bold;
}

.btn-action {
    background: rgba(76,175,80,0.2);
    border-color: rgba(76,175,80,0.4);
    color: #81c784;
}

.btn-action:hover {
    background: rgba(76,175,80,0.35);
    color: #a5d6a7;
}

.btn-warn {
    background: rgba(255,152,0,0.2);
    border-color: rgba(255,152,0,0.4);
    color: #ffb74d;
}

.btn-warn:hover {
    background: rgba(255,152,0,0.35);
    color: #ffcc80;
}

/* 下拉框 */
select {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    width: 100%;
}

select:focus {
    border-color: #42a5f5;
}

option {
    background: #1a1a2e;
    color: #ccc;
}

/* 历史记录 */
#history {
    max-height: 300px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.8;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
}

#history::-webkit-scrollbar {
    width: 5px;
}

#history::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
}

.history-empty {
    color: #666;
    text-align: center;
    padding: 16px;
}

.history-item {
    padding: 2px 6px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.history-item:nth-child(odd) {
    background: rgba(255,255,255,0.02);
}

.h-num {
    color: #666;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    min-width: 24px;
}

.h-stone {
    font-size: 12px;
    width: 16px;
    text-align: center;
}

.h-stone.black { color: #aaa; }
.h-stone.white { color: #fff; }

/* 覆盖层 */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.overlay.show {
    opacity: 1;
    pointer-events: auto;
}

.overlay-msg {
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    text-align: center;
}

/* 空行分隔 */
.spacer { height: 4px; }

/* 响应式 */
@media (max-width: 800px) {
    .game-container {
        flex-direction: column;
        align-items: center;
    }
    .panel-left, .panel-right {
        width: 100%;
        max-width: 540px;
    }
}
</style>
</head>
<body>

<div class="game-container">
    <!-- 左侧面板 -->
    <div class="panel-left">
        <div id="status" class="card">黑棋落子</div>

        <div class="card">
            <h3>游戏模式</h3>
            <div class="btn-group">
                <button class="btn" id="btn-pvp">双人对弈</button>
                <button class="btn active" id="btn-pve">人机对弈</button>
            </div>
        </div>

        <div class="card" id="color-group">
            <h3>先手选择</h3>
            <div class="btn-group">
                <button class="btn active" id="btn-black">执黑（先手）</button>
                <button class="btn" id="btn-white">执白（后手）</button>
            </div>
        </div>

        <div class="card" id="difficulty-group">
            <h3>AI 难度</h3>
            <select id="difficulty">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难</option>
            </select>
        </div>

        <div class="card">
            <h3>操作</h3>
            <div class="btn-group" style="flex-direction:column">
                <button class="btn btn-warn" id="btn-undo">⏪ 悔棋</button>
                <button class="btn btn-action" id="btn-restart">🔄 新局</button>
            </div>
        </div>
    </div>

    <!-- 棋盘 -->
    <div class="board-wrapper">
        <canvas id="board"></canvas>
        <div class="overlay" id="overlay">
            <div class="overlay-msg" id="overlay-msg"></div>
            <button class="btn btn-action" id="btn-play-again">再来一局</button>
        </div>
    </div>

    <!-- 右侧面板 -->
    <div class="panel-right">
        <div class="card">
            <h3>走法记录</h3>
            <div id="history">
                <div class="history-empty">暂无走法</div>
            </div>
        </div>

        <div class="card">
            <h3>规则说明</h3>
            <div style="font-size:13px; line-height:1.7; color:#aaa;">
                <p>15×15 棋盘，黑先白后</p>
                <p>先连成五子者获胜</p>
                <p>支持横/竖/斜方向</p>
                <p class="spacer"></p>
                <p><b>快捷操作：</b></p>
                <p>点击棋盘落子</p>
                <p>支持悔棋撤回</p>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 五子棋 — 完整游戏逻辑（合并自 ES Module 多文件架构）
// ============================================================
(function() {
'use strict';

// ---------- config.js ----------

const BOARD_SIZE = 15;
const WIN_COUNT = 5;
const CELL_SIZE = 40;
const PADDING = 30;
const BOARD_PX = CELL_SIZE * (BOARD_SIZE - 1) + PADDING * 2;

const EMPTY = 0;
const BLACK = 1;
const WHITE = 2;

const DIFFICULTY = { easy: 2, medium: 4, hard: 6 };

const SCORE = {
    FIVE:       1000000,
    LIVE_FOUR:   100000,
    RUSH_FOUR:    10000,
    LIVE_THREE:    1000,
    SLEEP_THREE:   100,
    LIVE_TWO:       10,
    SLEEP_TWO:       1,
};

const COLOR_NAME = { [BLACK]: '黑棋', [WHITE]: '白棋' };

// ---------- sound.js ----------

let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playSound(freq, duration, type, volume) {
    type = type || 'sine'; volume = volume || 0.3;
    try {
        const c = getAudioCtx();
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, c.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(c.currentTime);
        osc.stop(c.currentTime + duration);
    } catch (_) { /* 静默失败 */ }
}

function playPlace() {
    playSound(800, 0.12, 'sine', 0.25);
    setTimeout(function() { playSound(1200, 0.08, 'sine', 0.15); }, 30);
}

function playWin() {
    playSound(523, 0.3, 'sine', 0.3);
    setTimeout(function() { playSound(659, 0.3, 'sine', 0.3); }, 150);
    setTimeout(function() { playSound(784, 0.4, 'sine', 0.35); }, 300);
    setTimeout(function() { playSound(1047, 0.6, 'sine', 0.3); }, 500);
}

function playLose() {
    playSound(400, 0.3, 'sawtooth', 0.15);
    setTimeout(function() { playSound(300, 0.4, 'sawtooth', 0.12); }, 200);
    setTimeout(function() { playSound(200, 0.6, 'sawtooth', 0.1); }, 450);
}

// ---------- rules.js ----------

const DIRS = [[1, 0], [0, 1], [1, 1], [1, -1]];

function checkWin(board, row, col, player) {
    for (var d = 0; d < DIRS.length; d++) {
        var dr = DIRS[d][0], dc = DIRS[d][1];
        var cells = [[row, col]];
        for (var i = 1; i < WIN_COUNT; i++) {
            var r = row + dr * i, c = col + dc * i;
            if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
            if (board[r][c] !== player) break;
            cells.push([r, c]);
        }
        for (var i = 1; i < WIN_COUNT; i++) {
            var r = row - dr * i, c = col - dc * i;
            if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
            if (board[r][c] !== player) break;
            cells.push([r, c]);
        }
        if (cells.length >= WIN_COUNT) return cells;
    }
    return null;
}

function isValidMove(board, row, col) {
    return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE
        && board[row][col] === EMPTY;
}

function isBoardFull(board) {
    for (var r = 0; r < BOARD_SIZE; r++)
        for (var c = 0; c < BOARD_SIZE; c++)
            if (board[r][c] === EMPTY) return false;
    return true;
}

// ---------- board.js ----------

function Board() {
    this.reset();
}

Board.prototype.reset = function() {
    this.grid = [];
    for (var r = 0; r < BOARD_SIZE; r++) {
        this.grid[r] = [];
        for (var c = 0; c < BOARD_SIZE; c++) this.grid[r][c] = EMPTY;
    }
    this.history = [];
    this.current = BLACK;
};

Board.prototype.place = function(row, col, player) {
    if (this.grid[row][col] !== EMPTY) return false;
    this.grid[row][col] = player;
    this.history.push({ row: row, col: col, player: player });
    this.current = player === BLACK ? WHITE : BLACK;
    return true;
};

Board.prototype.undo = function() {
    if (this.history.length === 0) return null;
    var last = this.history.pop();
    this.grid[last.row][last.col] = EMPTY;
    this.current = last.player;
    return last;
};

Board.prototype.get = function(row, col) { return this.grid[row][col]; };

Board.prototype.isEmpty = function(row, col) { return this.grid[row][col] === EMPTY; };

Object.defineProperty(Board.prototype, 'moveCount', {
    get: function() { return this.history.length; }
});

Object.defineProperty(Board.prototype, 'lastMove', {
    get: function() { return this.history.length > 0 ? this.history[this.history.length - 1] : null; }
});

Board.prototype.clone = function() {
    var b = new Board();
    b.grid = this.grid.map(function(row) { return row.slice(); });
    b.history = this.history.slice();
    b.current = this.current;
    return b;
};

// ---------- ui.js ----------

function Renderer(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.hoverPos = null;
    this.winLine = null;

    var dpr = window.devicePixelRatio || 1;
    this.dpr = dpr;
    canvas.width = BOARD_PX * dpr;
    canvas.height = BOARD_PX * dpr;
    canvas.style.width = BOARD_PX + 'px';
    canvas.style.height = BOARD_PX + 'px';
    this.ctx.scale(dpr, dpr);
}

Renderer.prototype.pxToBoard = function(px, py) {
    var col = Math.round((px - PADDING) / CELL_SIZE);
    var row = Math.round((py - PADDING) / CELL_SIZE);
    if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return null;
    return { row: row, col: col };
};

Renderer.prototype.boardToPx = function(row, col) {
    return { x: PADDING + col * CELL_SIZE, y: PADDING + row * CELL_SIZE };
};

Renderer.prototype.draw = function(board, lastMove, winLine) {
    var ctx = this.ctx;
    this.winLine = winLine;
    this._drawBoardBg(ctx);
    this._drawGrid(ctx);
    this._drawStars(ctx);

    for (var r = 0; r < BOARD_SIZE; r++) {
        for (var c = 0; c < BOARD_SIZE; c++) {
            if (board[r][c] !== EMPTY) {
                this._drawStone(ctx, r, c, board[r][c],
                    lastMove && lastMove.row === r && lastMove.col === c);
            }
        }
    }

    if (this.hoverPos && board[this.hoverPos.row][this.hoverPos.col] === EMPTY) {
        this._drawHover(ctx, this.hoverPos.row, this.hoverPos.col);
    }

    if (winLine && winLine.length >= 2) {
        this._drawWinLine(ctx, winLine);
    }
};

Renderer.prototype._drawBoardBg = function(ctx) {
    var grad = ctx.createLinearGradient(0, 0, BOARD_PX, BOARD_PX);
    grad.addColorStop(0, '#e8c878');
    grad.addColorStop(0.3, '#dcb560');
    grad.addColorStop(0.5, '#e2be6a');
    grad.addColorStop(0.7, '#d4a84a');
    grad.addColorStop(1, '#ddb85c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BOARD_PX, BOARD_PX);

    ctx.globalAlpha = 0.08;
    for (var i = 0; i < BOARD_PX; i += 3) {
        var offset = Math.sin(i * 0.05) * 4;
        ctx.fillStyle = i % 6 === 0 ? '#b08030' : '#c09040';
        ctx.fillRect(0, i + offset, BOARD_PX, 1);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, BOARD_PX - 2, BOARD_PX - 2);
};

Renderer.prototype._drawGrid = function(ctx) {
    ctx.strokeStyle = '#5a3a10';
    ctx.lineWidth = 1;
    for (var i = 0; i < BOARD_SIZE; i++) {
        var pos = PADDING + i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(PADDING, pos);
        ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, pos);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos, PADDING);
        ctx.lineTo(pos, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
        ctx.stroke();
    }
};

Renderer.prototype._drawStars = function(ctx) {
    var stars = [[3, 3], [3, 11], [7, 7], [11, 3], [11, 11]];
    ctx.fillStyle = '#5a3a10';
    for (var i = 0; i < stars.length; i++) {
        var p = this.boardToPx(stars[i][0], stars[i][1]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
    }
};

Renderer.prototype._drawStone = function(ctx, row, col, player, isLast) {
    var p = this.boardToPx(row, col);
    var r = CELL_SIZE * 0.43;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;

    if (player === BLACK) {
        var grad = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.1, p.x, p.y, r);
        grad.addColorStop(0, '#606060');
        grad.addColorStop(0.5, '#303030');
        grad.addColorStop(1, '#0a0a0a');
        ctx.fillStyle = grad;
    } else {
        var grad = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.1, p.x, p.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.6, '#f0f0f0');
        grad.addColorStop(1, '#d0d0d0');
        ctx.fillStyle = grad;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (isLast) {
        ctx.fillStyle = '#e02020';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
    }
};

Renderer.prototype._drawHover = function(ctx, row, col) {
    var p = this.boardToPx(row, col);
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(p.x, p.y, CELL_SIZE * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
};

Renderer.prototype._drawWinLine = function(ctx, cells) {
    if (cells.length < 2) return;
    var sorted = cells.slice().sort(function(a, b) {
        return a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1];
    });
    var first = this.boardToPx(sorted[0][0], sorted[0][1]);
    var last = this.boardToPx(sorted[sorted.length - 1][0], sorted[sorted.length - 1][1]);

    ctx.save();
    ctx.strokeStyle = 'rgba(255, 50, 50, 0.85)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(255, 0, 0, 0.6)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(first.x, first.y);
    ctx.lineTo(last.x, last.y);
    ctx.stroke();

    for (var i = 0; i < cells.length; i++) {
        var pp = this.boardToPx(cells[i][0], cells[i][1]);
        ctx.strokeStyle = 'rgba(255, 80, 80, 0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, CELL_SIZE * 0.45, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();
};

// ---------- ai.js ----------

function countLine(grid, row, col, dr, dc, player) {
    var count = 1, openEnds = 0;
    var r, c;
    r = row + dr; c = col + dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === player) {
        count++; r += dr; c += dc;
    }
    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === EMPTY) openEnds++;
    r = row - dr; c = col - dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === player) {
        count++; r -= dr; c -= dc;
    }
    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && grid[r][c] === EMPTY) openEnds++;
    return { count: count, openEnds: openEnds };
}

function evaluatePoint(grid, row, col, player) {
    var total = 0;
    for (var d = 0; d < DIRS.length; d++) {
        var line = countLine(grid, row, col, DIRS[d][0], DIRS[d][1], player);
        if (line.count >= 5) total += SCORE.FIVE;
        else if (line.count === 4) {
            if (line.openEnds === 2) total += SCORE.LIVE_FOUR;
            else if (line.openEnds === 1) total += SCORE.RUSH_FOUR;
        } else if (line.count === 3) {
            if (line.openEnds === 2) total += SCORE.LIVE_THREE;
            else if (line.openEnds === 1) total += SCORE.SLEEP_THREE;
        } else if (line.count === 2) {
            if (line.openEnds === 2) total += SCORE.LIVE_TWO;
            else if (line.openEnds === 1) total += SCORE.SLEEP_TWO;
        }
    }
    return total;
}

function evaluateBoard(grid, aiColor) {
    var humanColor = aiColor === BLACK ? WHITE : BLACK;
    var aiScore = 0, humanScore = 0;
    for (var r = 0; r < BOARD_SIZE; r++) {
        for (var c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] === aiColor) aiScore += evaluatePoint(grid, r, c, aiColor);
            else if (grid[r][c] === humanColor) humanScore += evaluatePoint(grid, r, c, humanColor);
        }
    }
    return aiScore - humanScore * 1.1;
}

function getCandidates(grid, range) {
    range = range || 2;
    var set = {}, hasStone = false;
    for (var r = 0; r < BOARD_SIZE; r++) {
        for (var c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] !== EMPTY) {
                hasStone = true;
                for (var dr = -range; dr <= range; dr++) {
                    for (var dc = -range; dc <= range; dc++) {
                        var nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE
                            && grid[nr][nc] === EMPTY) {
                            set[nr * BOARD_SIZE + nc] = true;
                        }
                    }
                }
            }
        }
    }
    if (!hasStone) {
        var mid = Math.floor(BOARD_SIZE / 2);
        return [{ row: mid, col: mid }];
    }
    var result = [];
    for (var key in set) {
        var v = parseInt(key);
        result.push({ row: Math.floor(v / BOARD_SIZE), col: v % BOARD_SIZE });
    }
    return result;
}

function scoreCandidate(grid, row, col, aiColor) {
    var humanColor = aiColor === BLACK ? WHITE : BLACK;
    grid[row][col] = aiColor;
    var atk = evaluatePoint(grid, row, col, aiColor);
    grid[row][col] = humanColor;
    var def = evaluatePoint(grid, row, col, humanColor);
    grid[row][col] = EMPTY;
    return atk + def;
}

function quickWinCheck(grid, aiColor) {
    for (var r = 0; r < BOARD_SIZE; r++) {
        for (var c = 0; c < BOARD_SIZE; c++) {
            if (grid[r][c] !== EMPTY) {
                var w = checkWin(grid, r, c, grid[r][c]);
                if (w) return grid[r][c];
            }
        }
    }
    return null;
}

function minimax(grid, depth, alpha, beta, isMaximizing, aiColor) {
    var winner = quickWinCheck(grid, aiColor);
    if (winner === aiColor) return SCORE.FIVE * 10;
    if (winner !== null) return -SCORE.FIVE * 10;
    if (depth === 0) return evaluateBoard(grid, aiColor);

    var currentColor = isMaximizing ? aiColor : (aiColor === BLACK ? WHITE : BLACK);
    var candidates = getCandidates(grid);
    if (candidates.length === 0) return 0;

    var scored = candidates.map(function(p) {
        return { row: p.row, col: p.col, s: scoreCandidate(grid, p.row, p.col, aiColor) };
    });
    scored.sort(function(a, b) { return b.s - a.s; });

    var limit = depth >= 4 ? 15 : 20;
    var top = scored.slice(0, limit);

    if (isMaximizing) {
        var maxEval = -Infinity;
        for (var i = 0; i < top.length; i++) {
            grid[top[i].row][top[i].col] = currentColor;
            var ev = minimax(grid, depth - 1, alpha, beta, false, aiColor);
            grid[top[i].row][top[i].col] = EMPTY;
            if (ev > maxEval) maxEval = ev;
            if (ev > alpha) alpha = ev;
            if (beta <= alpha) break;
        }
        return maxEval;
    } else {
        var minEval = Infinity;
        for (var i = 0; i < top.length; i++) {
            grid[top[i].row][top[i].col] = currentColor;
            var ev = minimax(grid, depth - 1, alpha, beta, true, aiColor);
            grid[top[i].row][top[i].col] = EMPTY;
            if (ev < minEval) minEval = ev;
            if (ev < beta) beta = ev;
            if (beta <= alpha) break;
        }
        return minEval;
    }
}

function getAIMove(board, aiColor, difficulty) {
    difficulty = difficulty || 'medium';
    var depth = DIFFICULTY[difficulty] || DIFFICULTY.medium;
    var grid = board.grid;

    if (board.moveCount === 0) {
        var mid = Math.floor(BOARD_SIZE / 2);
        return { row: mid, col: mid };
    }
    if (board.moveCount === 1) {
        var mid = Math.floor(BOARD_SIZE / 2);
        if (grid[mid][mid] !== EMPTY) {
            var offsets = [[0, 1], [1, 0], [1, 1], [-1, 1]];
            var off = offsets[Math.floor(Math.random() * offsets.length)];
            return { row: mid + off[0], col: mid + off[1] };
        }
        return { row: mid, col: mid };
    }

    var candidates = getCandidates(grid);
    var scored = candidates.map(function(p) {
        return { row: p.row, col: p.col, s: scoreCandidate(grid, p.row, p.col, aiColor) };
    });
    scored.sort(function(a, b) { return b.s - a.s; });

    var humanColor = aiColor === BLACK ? WHITE : BLACK;

    // 直接获胜
    for (var i = 0; i < scored.length; i++) {
        grid[scored[i].row][scored[i].col] = aiColor;
        if (checkWin(grid, scored[i].row, scored[i].col, aiColor)) {
            grid[scored[i].row][scored[i].col] = EMPTY;
            return { row: scored[i].row, col: scored[i].col };
        }
        grid[scored[i].row][scored[i].col] = EMPTY;
    }

    // 阻止对手获胜
    for (var i = 0; i < scored.length; i++) {
        grid[scored[i].row][scored[i].col] = humanColor;
        if (checkWin(grid, scored[i].row, scored[i].col, humanColor)) {
            grid[scored[i].row][scored[i].col] = EMPTY;
            return { row: scored[i].row, col: scored[i].col };
        }
        grid[scored[i].row][scored[i].col] = EMPTY;
    }

    var bestMove = scored[0];
    var bestScore = -Infinity;
    var limit = depth >= 4 ? 12 : 15;
    var top = scored.slice(0, limit);

    for (var i = 0; i < top.length; i++) {
        grid[top[i].row][top[i].col] = aiColor;
        var score = minimax(grid, depth - 1, -Infinity, Infinity, false, aiColor);
        grid[top[i].row][top[i].col] = EMPTY;
        if (score > bestScore) {
            bestScore = score;
            bestMove = { row: top[i].row, col: top[i].col };
        }
    }

    return bestMove;
}

// ---------- main.js — 游戏主逻辑 ----------

var board = new Board();
var renderer;
var gameMode = 'pve';
var playerColor = BLACK;
var aiColor = WHITE;
var difficulty = 'medium';
var gameOver = false;
var winLine = null;
var aiThinking = false;

var $ = function(sel) { return document.querySelector(sel); };

function init() {
    var canvas = $('#board');
    renderer = new Renderer(canvas);
    bindEvents(canvas);
    render();
    updateStatus();
    updateHistory();
}

function bindEvents(canvas) {
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('mousemove', onCanvasMove);
    canvas.addEventListener('mouseleave', function() {
        renderer.hoverPos = null;
        render();
    });

    $('#btn-pvp').addEventListener('click', function() { setMode('pvp'); });
    $('#btn-pve').addEventListener('click', function() { setMode('pve'); });
    $('#difficulty').addEventListener('change', function(e) { difficulty = e.target.value; });
    $('#btn-black').addEventListener('click', function() { setPlayerColor(BLACK); });
    $('#btn-white').addEventListener('click', function() { setPlayerColor(WHITE); });
    $('#btn-undo').addEventListener('click', undoMove);
    $('#btn-restart').addEventListener('click', restart);
    $('#btn-play-again').addEventListener('click', function() {
        hideOverlay();
        restart();
    });
}

function onCanvasClick(e) {
    if (gameOver || aiThinking) return;
    var rect = e.target.getBoundingClientRect();
    var px = e.clientX - rect.left;
    var py = e.clientY - rect.top;
    var pos = renderer.pxToBoard(px, py);
    if (!pos) return;
    if (gameMode === 'pve' && board.current !== playerColor) return;
    if (!isValidMove(board.grid, pos.row, pos.col)) return;
    doMove(pos.row, pos.col);
}

function onCanvasMove(e) {
    if (gameOver || aiThinking) return;
    var rect = e.target.getBoundingClientRect();
    var px = e.clientX - rect.left;
    var py = e.clientY - rect.top;
    var pos = renderer.pxToBoard(px, py);
    renderer.hoverPos = pos;
    render();
}

function doMove(row, col) {
    var player = board.current;
    board.place(row, col, player);
    playPlace();

    var win = checkWin(board.grid, row, col, player);
    if (win) {
        winLine = win;
        gameOver = true;
        render();
        onGameEnd(player);
        return;
    }

    if (isBoardFull(board.grid)) {
        gameOver = true;
        render();
        onDraw();
        return;
    }

    render();
    updateStatus();
    updateHistory();

    if (gameMode === 'pve' && board.current === aiColor && !gameOver) {
        aiThinking = true;
        updateStatus('AI 思考中...');
        setTimeout(function() {
            var move = getAIMove(board, aiColor, difficulty);
            aiThinking = false;
            doMove(move.row, move.col);
        }, 100);
    }
}

function onGameEnd(winner) {
    var isPlayerWin = gameMode === 'pvp' || winner === playerColor;
    if (isPlayerWin) {
        playWin();
        showOverlay(COLOR_NAME[winner] + '获胜！', '#4CAF50');
    } else {
        playLose();
        showOverlay(COLOR_NAME[winner] + '获胜！', '#e53935');
    }
    updateStatus('游戏结束 — ' + COLOR_NAME[winner] + '获胜！');
}

function onDraw() {
    showOverlay('平局！', '#FF9800');
    updateStatus('平局！');
}

function undoMove() {
    if (gameOver || board.moveCount === 0) return;
    if (gameMode === 'pve') {
        board.undo();
        if (board.moveCount > 0 && board.current !== playerColor) board.undo();
    } else {
        board.undo();
    }
    winLine = null;
    gameOver = false;
    hideOverlay();
    render();
    updateStatus();
    updateHistory();
}

function restart() {
    board.reset();
    gameOver = false;
    winLine = null;
    aiThinking = false;
    hideOverlay();
    render();
    updateStatus();
    updateHistory();

    if (gameMode === 'pve' && playerColor === WHITE) {
        aiThinking = true;
        updateStatus('AI 思考中...');
        setTimeout(function() {
            var move = getAIMove(board, aiColor, difficulty);
            aiThinking = false;
            doMove(move.row, move.col);
        }, 200);
    }
}

function setMode(mode) {
    gameMode = mode;
    $('#btn-pvp').classList.toggle('active', mode === 'pvp');
    $('#btn-pve').classList.toggle('active', mode === 'pve');
    $('#difficulty-group').style.display = mode === 'pve' ? 'flex' : 'none';
    $('#color-group').style.display = mode === 'pve' ? 'flex' : 'none';
    restart();
}

function setPlayerColor(color) {
    playerColor = color;
    aiColor = color === BLACK ? WHITE : BLACK;
    $('#btn-black').classList.toggle('active', color === BLACK);
    $('#btn-white').classList.toggle('active', color === WHITE);
    restart();
}

function render() {
    renderer.draw(board.grid, board.lastMove, winLine);
}

function updateStatus(text) {
    var el = $('#status');
    if (text) { el.textContent = text; return; }
    if (gameOver) return;
    var name = COLOR_NAME[board.current];
    if (gameMode === 'pve') {
        el.textContent = board.current === playerColor ? '轮到你（' + name + '）' : 'AI（' + name + '）思考中...';
    } else {
        el.textContent = name + '落子';
    }
}

function updateHistory() {
    var el = $('#history');
    if (board.moveCount === 0) {
        el.innerHTML = '<div class="history-empty">暂无走法</div>';
        return;
    }
    var html = '';
    for (var i = 0; i < board.history.length; i++) {
        var m = board.history[i];
        var colLabel = String.fromCharCode(65 + m.col);
        var rowLabel = BOARD_SIZE - m.row;
        var color = m.player === BLACK ? '●' : '○';
        var num = String(i + 1);
        if (num.length < 2) num = ' ' + num;
        html += '<div class="history-item"><span class="h-num">' + num + '.</span> <span class="h-stone ' + (m.player === BLACK ? 'black' : 'white') + '">' + color + '</span> ' + colLabel + rowLabel + '</div>';
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

function showOverlay(msg, color) {
    var overlay = $('#overlay');
    var msgEl = $('#overlay-msg');
    msgEl.textContent = msg;
    msgEl.style.color = color;
    overlay.classList.add('show');
}

function hideOverlay() {
    $('#overlay').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', init);

})();
</script>

</body>
