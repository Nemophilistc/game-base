<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>三消传奇 - Match-3 Legend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    #gameCanvas {
      display: block;
      margin: 0 auto;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 16px;
      image-rendering: pixelated;
    }

    /* 加载提示 */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a2e;
      z-index: 999;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 移动端优化 */
    @media (max-width: 640px) {
      #gameCanvas {
        border-radius: 8px;
      }
    }
  </style>
</head>

  <div id="loading"><div class="spinner"></div></div>
  <canvas id="gameCanvas" width="552" height="652"></canvas>
  <script>
// === ./config.js ===
// ============================================================
// config.js - 游戏常量配置
// ============================================================

const GRID_ROWS = 8;
const GRID_COLS = 8;
const CELL_SIZE = 64;
const GEM_PADDING = 4;

// 7种宝石颜色及符号
const GEM_TYPES = [
  { id: 0, name: '红宝石',   color: '#ff3b5c', symbol: '♥', glow: '#ff6b8a' }, // ♥
  { id: 1, name: '蓝宝石',   color: '#3b8bff', symbol: '♦', glow: '#6bafff' }, // ♦
  { id: 2, name: '绿宝石',   color: '#3bff6b', symbol: '♣', glow: '#6bff9a' }, // ♣
  { id: 3, name: '黄宝石',   color: '#ffd93b', symbol: '☀', glow: '#ffe56b' }, // ☀
  { id: 4, name: '紫宝石',   color: '#b83bff', symbol: '★', glow: '#d06bff' }, // ★
  { id: 5, name: '橙宝石',   color: '#ff8c3b', symbol: '◆', glow: '#ffb06b' }, // ◆
  { id: 6, name: '青宝石',   color: '#3bffe0', symbol: '♠', glow: '#6bfff0' }, // ♠
];

// 特殊宝石类型
const SPECIAL = {
  NONE:      'none',
  CROSS:     'cross',      // 十字炸弹：4连 → 消除整行+整列
  RAINBOW:   'rainbow',    // 彩虹宝石：5连 → 消除所有同色
  RANGE:     'range',      // 范围炸弹：L/T形 → 3×3消除
};

const SPECIAL_SYMBOLS = {
  [SPECIAL.CROSS]:   '✚', // ✚
  [SPECIAL.RAINBOW]: '⚗', // ⚗
  [SPECIAL.RANGE]:   '✦', // ✦
};

// 计分
const BASE_SCORE_PER_GEM = 10;
const CHAIN_MULTIPLIERS = [1, 2, 4, 8, 16, 32, 64, 128];

// 动画时间（毫秒）
const SWAP_DURATION     = 250;
const FALL_DURATION     = 200;
const DESTROY_DURATION  = 300;
const SPAWN_DURATION    = 200;
const CHAIN_DELAY       = 150;

// 50关配置
// type: 'score'=达到目标分, 'clear'=消除指定数量
// target: 目标分数 或 消除数量
// moves: 限制步数
// colors: 可用宝石颜色数（3-7）
const LEVELS = [];
(function buildLevels() {
  for (let i = 0; i < 50; i++) {
    const lv = i + 1;
    const isScoreLevel = lv % 3 !== 0;  // 每3关一个消除关
    const colors = Math.min(7, 3 + Math.floor(i / 8));
    const moves  = Math.max(12, 35 - Math.floor(i * 0.4));
    let target, type, clearColor;
    if (isScoreLevel) {
      type = 'score';
      target = 500 + i * 300 + Math.floor(i / 5) * 500;
    } else {
      type = 'clear';
      target = 10 + Math.floor(i * 0.8);
      clearColor = i % 7; // 要消除的颜色id
    }
    LEVELS.push({ level: lv, type, target, moves, colors, clearColor });
  }
})();

// === ./gems.js ===
// ============================================================
// gems.js - 宝石类定义与特殊宝石逻辑
// ============================================================


class Gem {
  constructor(type, special = SPECIAL.NONE) {
    this.type = type;           // 颜色id (0-6)
    this.special = special;     // 特殊类型
    this.row = 0;
    this.col = 0;

    // 动画状态
    this.x = 0;                // 渲染x（像素）
    this.y = 0;                // 渲染y（像素）
    this.scale = 1;
    this.alpha = 1;
    this.selected = false;
    this.matched = false;       // 标记即将被消除
    this.falling = false;
    this.spawning = false;
    this.spawnTimer = 0;
  }

  get info() {
    return GEM_TYPES[this.type] || GEM_TYPES[0];
  }

  get color()    { return this.info.color; }
  get glow()     { return this.info.glow; }
  get symbol()   { return this.info.symbol; }
  get name()     { return this.info.name; }

  get specialSymbol() {
    if (this.special === SPECIAL.CROSS)   return '✚';
    if (this.special === SPECIAL.RAINBOW) return '🌈';
    if (this.special === SPECIAL.RANGE)   return '✦';
    return '';
  }

  get isSpecial() {
    return this.special !== SPECIAL.NONE;
  }
}

// 生成指定颜色数的随机宝石
function randomGemType(colorCount) {
  return Math.floor(Math.random() * colorCount);
}

// === ./board.js ===
// ============================================================
// board.js - 棋盘逻辑：交换、匹配检测、消除、下落、填充
// ============================================================


class Board {
  constructor(colorCount = 7) {
    this.colorCount = colorCount;
    this.grid = [];           // grid[row][col] = Gem | null
    this.chainLevel = 0;      // 当前连锁等级
    this.pendingSpecials = []; // 本轮待生成的特殊宝石 [{row,col,special}]
    this.clearStats = {};     // 消除统计 { colorId: count }
  }

  // --- 初始化棋盘（无初始匹配） ---
  init() {
    this.grid = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      this.grid[r] = [];
      for (let c = 0; c < GRID_COLS; c++) {
        const gem = new Gem(this._safeRandomType(r, c));
        gem.row = r;
        gem.col = c;
        this.grid[r][c] = gem;
      }
    }
    this.chainLevel = 0;
    this.clearStats = {};
    return this.grid;
  }

  // 生成不会造成初始匹配的颜色
  _safeRandomType(r, c) {
    let type;
    let attempts = 0;
    do {
      type = randomGemType(this.colorCount);
      attempts++;
    } while (attempts < 50 && this._wouldMatch(r, c, type));
    return type;
  }

  _wouldMatch(r, c, type) {
    // 检查左边两个
    if (c >= 2 &&
        this.grid[r][c - 1] && this.grid[r][c - 1].type === type &&
        this.grid[r][c - 2] && this.grid[r][c - 2].type === type) {
      return true;
    }
    // 检查上面两个
    if (r >= 2 &&
        this.grid[r - 1] && this.grid[r - 1][c] && this.grid[r - 1][c].type === type &&
        this.grid[r - 2] && this.grid[r - 2][c] && this.grid[r - 2][c].type === type) {
      return true;
    }
    return false;
  }

  // --- 获取宝石 ---
  getGem(r, c) {
    if (r < 0 || r >= GRID_ROWS || c < 0 || c >= GRID_COLS) return null;
    return this.grid[r][c];
  }

  // --- 交换两个宝石 ---
  swap(r1, c1, r2, c2) {
    const gem1 = this.grid[r1][c1];
    const gem2 = this.grid[r2][c2];
    if (!gem1 || !gem2) return false;
    this.grid[r1][c1] = gem2;
    this.grid[r2][c2] = gem1;
    gem1.row = r2; gem1.col = c2;
    gem2.row = r1; gem2.col = c1;
    return true;
  }

  // 检查两个位置是否相邻
  isAdjacent(r1, c1, r2, c2) {
    return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
  }

  // --- 匹配检测 ---
  // 返回所有匹配组 [{ cells: [{r,c}...], length, shape }]
  findAllMatches() {
    const hRuns = this._findHorizontalRuns();
    const vRuns = this._findVerticalRuns();
    // 合并重叠的横纵匹配，形成L/T/十字形
    return this._mergeMatches(hRuns, vRuns);
  }

  _findHorizontalRuns() {
    const runs = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      let c = 0;
      while (c < GRID_COLS) {
        const gem = this.grid[r][c];
        if (!gem) { c++; continue; }
        const type = gem.type;
        let end = c + 1;
        while (end < GRID_COLS && this.grid[r][end] && this.grid[r][end].type === type) {
          end++;
        }
        const len = end - c;
        if (len >= 3) {
          const cells = [];
          for (let k = c; k < end; k++) cells.push({ r, c: k });
          runs.push({ cells, length: len, dir: 'h' });
        }
        c = end;
      }
    }
    return runs;
  }

  _findVerticalRuns() {
    const runs = [];
    for (let c = 0; c < GRID_COLS; c++) {
      let r = 0;
      while (r < GRID_ROWS) {
        const gem = this.grid[r][c];
        if (!gem) { r++; continue; }
        const type = gem.type;
        let end = r + 1;
        while (end < GRID_ROWS && this.grid[end][c] && this.grid[end][c].type === type) {
          end++;
        }
        const len = end - r;
        if (len >= 3) {
          const cells = [];
          for (let k = r; k < end; k++) cells.push({ r: k, c });
          runs.push({ cells, length: len, dir: 'v' });
        }
        r = end;
      }
    }
    return runs;
  }

  // 合并横纵匹配，检测L/T/十字形
  _mergeMatches(hRuns, vRuns) {
    const allRuns = [...hRuns, ...vRuns];
    if (allRuns.length === 0) return [];

    // 建立cell -> run索引
    const cellMap = new Map(); // "r,c" -> [runIndex...]
    allRuns.forEach((run, idx) => {
      run.cells.forEach(({ r, c }) => {
        const key = `${r},${c}`;
        if (!cellMap.has(key)) cellMap.set(key, []);
        cellMap.get(key).push(idx);
      });
    });

    // 合并有共享cell的run
    const used = new Set();
    const merged = [];

    for (let i = 0; i < allRuns.length; i++) {
      if (used.has(i)) continue;
      used.add(i);

      const group = new Set();
      const queue = [i];
      const dirs = new Set();
      let maxLen = allRuns[i].length;

      while (queue.length > 0) {
        const idx = queue.shift();
        dirs.add(allRuns[idx].dir);
        maxLen = Math.max(maxLen, allRuns[idx].length);
        allRuns[idx].cells.forEach(({ r, c }) => {
          const key = `${r},${c}`;
          group.add(key);
          const neighbors = cellMap.get(key) || [];
          for (const ni of neighbors) {
            if (!used.has(ni)) {
              used.add(ni);
              queue.push(ni);
            }
          }
        });
      }

      const cells = [...group].map(k => {
        const [r, c] = k.split(',').map(Number);
        return { r, c };
      });

      // 判断形状
      let shape = 'line';
      if (dirs.size > 1) {
        shape = 'lt';  // L/T形
      } else if (maxLen >= 5) {
        shape = 'five';
      } else if (maxLen >= 4) {
        shape = 'four';
      }

      merged.push({ cells, length: cells.length, shape, maxRunLen: maxLen });
    }

    return merged;
  }

  // --- 消除匹配的宝石 ---
  // 返回 { cleared: [{r,c,color}], specials, totalScore, multiplier, totalCleared }
  clearMatches(matches) {
    this.pendingSpecials = [];
    const toClear = new Set();
    let totalCleared = 0;
    const cleared = [];

    for (const match of matches) {
      // 决定特殊宝石生成位置和类型
      let special = SPECIAL.NONE;
      let specialPos = null;

      if (match.shape === 'lt') {
        special = SPECIAL.RANGE;
        specialPos = this._findIntersection(match);
      } else if (match.shape === 'five') {
        special = SPECIAL.RAINBOW;
        specialPos = match.cells[Math.floor(match.cells.length / 2)];
      } else if (match.shape === 'four') {
        special = SPECIAL.CROSS;
        specialPos = match.cells[Math.floor(match.cells.length / 2)];
      }

      for (const { r, c } of match.cells) {
        const key = `${r},${c}`;
        if (!toClear.has(key)) {
          toClear.add(key);
          const gem = this.grid[r][c];
          if (gem) {
            this.clearStats[gem.type] = (this.clearStats[gem.type] || 0) + 1;
            cleared.push({ r, c, color: gem.color, type: gem.type });
            if (gem.special !== SPECIAL.NONE) {
              this._activateSpecial(gem, toClear, cleared);
            }
          }
          totalCleared++;
        }
      }

      // 在匹配位置放置特殊宝石
      if (special !== SPECIAL.NONE && specialPos) {
        this.pendingSpecials.push({
          r: specialPos.r,
          c: specialPos.c,
          special,
          type: this.grid[specialPos.r]?.[specialPos.c]?.type ?? 0,
        });
      }
    }

    // 标记宝石为matched（不立即移除，等动画播放完再清除）
    for (const key of toClear) {
      const [r, c] = key.split(',').map(Number);
      const gem = this.grid[r][c];
      if (gem) {
        gem.matched = true;
        gem.matchTime = Date.now();
      }
    }

    const multiplier = CHAIN_MULTIPLIERS[Math.min(this.chainLevel, CHAIN_MULTIPLIERS.length - 1)];
    const finalCount = cleared.length;
    const totalScore = finalCount * BASE_SCORE_PER_GEM * multiplier;

    return { cleared, specials: this.pendingSpecials, totalScore, multiplier, totalCleared: finalCount };
  }

  // 查找L/T形的交叉点
  _findIntersection(match) {
    // 选择有最多邻居的cell
    const cellSet = new Set(match.cells.map(({ r, c }) => `${r},${c}`));
    let best = match.cells[0];
    let bestCount = -1;
    for (const { r, c } of match.cells) {
      let count = 0;
      const neighbors = [
        { r: r - 1, c }, { r: r + 1, c },
        { r, c: c - 1 }, { r, c: c + 1 },
      ];
      for (const n of neighbors) {
        if (cellSet.has(`${n.r},${n.c}`)) count++;
      }
      if (count > bestCount) {
        bestCount = count;
        best = { r, c };
      }
    }
    return best;
  }

  // 激活特殊宝石效果
  _activateSpecial(gem, toClear, cleared) {
    const { row: r, col: c, special } = gem;
    const addCell = (nr, nc) => {
      const key = `${nr},${nc}`;
      if (!toClear.has(key) && nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS) {
        toClear.add(key);
        const g = this.grid[nr][nc];
        if (g) {
          this.clearStats[g.type] = (this.clearStats[g.type] || 0) + 1;
          cleared.push({ r: nr, c: nc, color: g.color, type: g.type });
        }
      }
    };

    if (special === SPECIAL.CROSS) {
      for (let k = 0; k < GRID_COLS; k++) addCell(r, k);
      for (let k = 0; k < GRID_ROWS; k++) addCell(k, c);
    } else if (special === SPECIAL.RANGE) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          addCell(r + dr, c + dc);
        }
      }
    } else if (special === SPECIAL.RAINBOW) {
      const targetType = gem.type;
      for (let rr = 0; rr < GRID_ROWS; rr++) {
        for (let cc = 0; cc < GRID_COLS; cc++) {
          if (this.grid[rr][cc] && this.grid[rr][cc].type === targetType) {
            addCell(rr, cc);
          }
        }
      }
    }
  }

  // 处理彩虹宝石被交换时触发
  activateRainbowAt(r, c, targetType) {
    const toClear = new Set();
    toClear.add(`${r},${c}`);
    for (let rr = 0; rr < GRID_ROWS; rr++) {
      for (let cc = 0; cc < GRID_COLS; cc++) {
        const g = this.grid[rr][cc];
        if (g && g.type === targetType) {
          toClear.add(`${rr},${cc}`);
        }
      }
    }
    // 标记为matched（不立即移除，等动画播放完再清除）
    const cleared = [];
    for (const key of toClear) {
      const [cr, cc] = key.split(',').map(Number);
      const gem = this.grid[cr][cc];
      if (gem) {
        this.clearStats[gem.type] = (this.clearStats[gem.type] || 0) + 1;
        cleared.push({ r: cr, c: cc, color: gem.color, type: gem.type });
        gem.matched = true;
        gem.matchTime = Date.now();
      } else {
        cleared.push({ r: cr, c: cc, color: '#fff', type: 0 });
      }
    }
    const multiplier = CHAIN_MULTIPLIERS[Math.min(this.chainLevel, CHAIN_MULTIPLIERS.length - 1)];
    const totalScore = cleared.length * BASE_SCORE_PER_GEM * multiplier;
    return { cleared, totalScore, multiplier, totalCleared: cleared.length };
  }

  // --- 放置特殊宝石到棋盘 ---
  placeSpecials() {
    for (const sp of this.pendingSpecials) {
      const { r, c, special, type } = sp;
      if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
        const gem = new Gem(type, special);
        gem.row = r;
        gem.col = c;
        gem.spawning = true;
        this.grid[r][c] = gem;
      }
    }
    this.pendingSpecials = [];
  }

  // --- 重力下落 ---
  // 返回下落信息 [{ fromR, toR, c, gem }]
  applyGravity() {
    const drops = [];
    for (let c = 0; c < GRID_COLS; c++) {
      let writeRow = GRID_ROWS - 1;
      for (let r = GRID_ROWS - 1; r >= 0; r--) {
        if (this.grid[r][c] !== null) {
          if (r !== writeRow) {
            const gem = this.grid[r][c];
            drops.push({ fromR: r, toR: writeRow, c, gem });
            this.grid[writeRow][c] = gem;
            this.grid[r][c] = null;
            gem.row = writeRow;
            gem.col = c;
          }
          writeRow--;
        }
      }
    }
    return drops;
  }

  // --- 填充空位 ---
  // 返回新生成的宝石 [{ r, c, gem }]
  fillEmpty() {
    const newGems = [];
    for (let c = 0; c < GRID_COLS; c++) {
      let emptyCount = 0;
      for (let r = 0; r < GRID_ROWS; r++) {
        if (this.grid[r][c] === null) emptyCount++;
      }
      let fillIdx = 0;
      for (let r = 0; r < GRID_ROWS; r++) {
        if (this.grid[r][c] === null) {
          const gem = new Gem(randomGemType(this.colorCount));
          gem.row = r;
          gem.col = c;
          gem.spawning = true;
          this.grid[r][c] = gem;
          newGems.push({ r, c, gem, fromAbove: emptyCount - fillIdx });
          fillIdx++;
        }
      }
    }
    return newGems;
  }

  // --- 检查是否还有可用移动 ---
  hasValidMoves() {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        // 尝试右交换
        if (c < GRID_COLS - 1) {
          this.swap(r, c, r, c + 1);
          const matches = this.findAllMatches();
          this.swap(r, c, r, c + 1);
          if (matches.length > 0) return true;
        }
        // 尝试下交换
        if (r < GRID_ROWS - 1) {
          this.swap(r, c, r + 1, c);
          const matches = this.findAllMatches();
          this.swap(r, c, r + 1, c);
          if (matches.length > 0) return true;
        }
      }
    }
    return false;
  }

  // 最终清除已标记matched的宝石（动画播放完后调用）
  finalizeClear() {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const gem = this.grid[r][c];
        if (gem && gem.matched) {
          this.grid[r][c] = null;
        }
      }
    }
  }

  // 重置连锁等级
  resetChain() {
    this.chainLevel = 0;
    this.clearStats = {};
  }

  incrementChain() {
    this.chainLevel++;
  }
}

// ============================================================
// effects.js - 特效系统（粒子、闪光、背景脉冲）
// ============================================================


// --- 粒子类 ---
class Particle {
  constructor(x, y, color, opts = {}) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = opts.angle ?? Math.random() * Math.PI * 2;
    const speed = opts.speed ?? (2 + Math.random() * 4);
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = opts.life ?? 1;
    this.decay = opts.decay ?? (0.02 + Math.random() * 0.02);
    this.size = opts.size ?? (2 + Math.random() * 3);
    this.gravity = opts.gravity ?? 0.05;
    this.shape = opts.shape ?? 'circle'; // circle | star | line
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98;
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    if (this.shape === 'star') {
      this._drawStar(ctx, this.x, this.y, 5, this.size, this.size * 0.5);
    } else if (this.shape === 'line') {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  _drawStar(ctx, cx, cy, spikes, outerR, innerR) {
    let rot = Math.PI / 2 * 3;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
      rot += step;
    }
    ctx.closePath();
    ctx.fill();
  }
}

// --- 闪光效果类 ---
class Flash {
  constructor(x, y, color, maxRadius = 30) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.radius = 5;
    this.maxRadius = maxRadius;
    this.life = 1;
    this.decay = 0.06;
  }

  update() {
    this.radius += (this.maxRadius - this.radius) * 0.3;
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.5;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    grad.addColorStop(0, 'rgba(255,255,255,0.8)');
    grad.addColorStop(0.5, this.color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// --- 连锁闪电类 ---
class Lightning {
  constructor(x1, y1, x2, y2, color) {
    this.segments = this._generate(x1, y1, x2, y2);
    this.color = color;
    this.life = 1;
    this.decay = 0.08;
  }

  _generate(x1, y1, x2, y2) {
    const segs = [];
    const steps = 8;
    const dx = (x2 - x1) / steps;
    const dy = (y2 - y1) / steps;
    let px = x1, py = y1;
    for (let i = 0; i < steps; i++) {
      const nx = x1 + dx * (i + 1) + (Math.random() - 0.5) * 15;
      const ny = y1 + dy * (i + 1) + (Math.random() - 0.5) * 15;
      segs.push({ x1: px, y1: py, x2: nx, y2: ny });
      px = nx;
      py = ny;
    }
    return segs;
  }

  update() {
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    for (const s of this.segments) {
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// --- 背景脉冲 ---
class PulseRing {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.radius = 10;
    this.life = 1;
    this.decay = 0.04;
    this.maxRadius = 80;
  }

  update() {
    this.radius += (this.maxRadius - this.radius) * 0.15;
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.3;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// --- 特效管理器 ---
class EffectsManager {
  constructor() {
    this.particles = [];
    this.flashes = [];
    this.lightnings = [];
    this.pulses = [];
  }

  clear() {
    this.particles = [];
    this.flashes = [];
    this.lightnings = [];
    this.pulses = [];
  }

  // 消除特效：在指定位置生成粒子+闪光
  spawnDestroyEffect(cellX, cellY, color) {
    const cx = cellX + CELL_SIZE / 2;
    const cy = cellY + CELL_SIZE / 2;
    // 粒子
    for (let i = 0; i < 10; i++) {
      this.particles.push(new Particle(cx, cy, color));
    }
    // 星形粒子
    for (let i = 0; i < 3; i++) {
      this.particles.push(new Particle(cx, cy, '#fff', {
        shape: 'star', size: 3, speed: 1 + Math.random() * 2, life: 0.8,
      }));
    }
    // 闪光
    this.flashes.push(new Flash(cx, cy, color));
  }

  // 连锁特效：闪电连线
  spawnChainEffect(x1, y1, x2, y2, color) {
    this.lightnings.push(new Lightning(x1, y1, x2, y2, color));
  }

  // 背景脉冲
  spawnPulse(cellX, cellY, color) {
    const cx = cellX + CELL_SIZE / 2;
    const cy = cellY + CELL_SIZE / 2;
    this.pulses.push(new PulseRing(cx, cy, color));
  }

  // 特殊宝石激活大特效
  spawnSpecialEffect(cellX, cellY, color) {
    const cx = cellX + CELL_SIZE / 2;
    const cy = cellY + CELL_SIZE / 2;
    for (let i = 0; i < 20; i++) {
      this.particles.push(new Particle(cx, cy, color, {
        speed: 4 + Math.random() * 6,
        size: 3 + Math.random() * 4,
        life: 1.2,
        shape: i % 3 === 0 ? 'star' : 'circle',
      }));
    }
    this.flashes.push(new Flash(cx, cy, '#fff', 50));
    this.pulses.push(new PulseRing(cx, cy, color));
  }

  // 分数飞字（返回一个对象给UI使用）
  createScorePopup(cellX, cellY, score, multiplier) {
    const cx = cellX + CELL_SIZE / 2;
    const cy = cellY + CELL_SIZE / 2;
    return { x: cx, y: cy, score, multiplier, life: 1, vy: -2 };
  }

  update() {
    this.particles = this.particles.filter(p => p.update());
    this.flashes   = this.flashes.filter(f => f.update());
    this.lightnings = this.lightnings.filter(l => l.update());
    this.pulses    = this.pulses.filter(p => p.update());
  }

  draw(ctx) {
    this.pulses.forEach(p => p.draw(ctx));
    this.lightnings.forEach(l => l.draw(ctx));
    this.flashes.forEach(f => f.draw(ctx));
    this.particles.forEach(p => p.draw(ctx));
  }
}

// ============================================================
// ui.js - Canvas渲染、分数动画、覆盖层UI
// ============================================================


const BOARD_OFFSET_X = 20;
const BOARD_OFFSET_Y = 100;

class UI {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.scorePopups = [];    // 分数飞字
    this.shakeTimer = 0;
    this.shakeIntensity = 0;
    this.selectedGem = null;  // { row, col }
    this.hintCells = null;    // 提示闪烁
    this.hintTimer = 0;
  }

  get boardX() { return BOARD_OFFSET_X; }
  get boardY() { return BOARD_OFFSET_Y; }

  cellToPixel(row, col) {
    return {
      x: BOARD_OFFSET_X + col * CELL_SIZE,
      y: BOARD_OFFSET_Y + row * CELL_SIZE,
    };
  }

  pixelToCell(px, py) {
    const col = Math.floor((px - BOARD_OFFSET_X) / CELL_SIZE);
    const row = Math.floor((py - BOARD_OFFSET_Y) / CELL_SIZE);
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return null;
    return { row, col };
  }

  // 屏幕震动
  triggerShake(intensity = 4) {
    this.shakeTimer = 10;
    this.shakeIntensity = intensity;
  }

  // 添加分数飞字
  addScorePopup(cellX, cellY, score, multiplier) {
    this.scorePopups.push({
      x: cellX + CELL_SIZE / 2,
      y: cellY,
      text: `+${score}`,
      sub: multiplier > 1 ? `x${multiplier}` : '',
      life: 1,
      vy: -1.5,
    });
  }

  // --- 主绘制 ---
  draw(board, effects, score, moves, level, chainLevel, state, levelConfig, clearCount) {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;

    // 屏幕震动偏移
    let sx = 0, sy = 0;
    if (this.shakeTimer > 0) {
      sx = (Math.random() - 0.5) * this.shakeIntensity;
      sy = (Math.random() - 0.5) * this.shakeIntensity;
      this.shakeTimer--;
    }

    ctx.save();
    ctx.translate(sx, sy);

    // 背景
    this._drawBackground(ctx, w, h);

    // 棋盘背景
    this._drawBoardBg(ctx);

    // 宝石
    this._drawGems(ctx, board);

    // 选中高亮
    if (this.selectedGem) {
      const { x, y } = this.cellToPixel(this.selectedGem.row, this.selectedGem.col);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.strokeRect(x + 3, y + 3, CELL_SIZE - 6, CELL_SIZE - 6);
      ctx.shadowBlur = 0;
    }

    // 特效
    effects.draw(ctx);

    // 分数飞字
    this._drawScorePopups(ctx);

    // HUD
    this._drawHUD(ctx, score, moves, level, chainLevel, levelConfig, clearCount);

    // 游戏状态覆盖层
    if (state === 'levelComplete') {
      this._drawOverlay(ctx, '关卡通过!', '#4CAF50', w, h);
    } else if (state === 'gameOver') {
      this._drawOverlay(ctx, '游戏结束', '#ff3b5c', w, h);
    } else if (state === 'menu') {
      this._drawMenu(ctx, w, h);
    }

    ctx.restore();
  }

  _drawBackground(ctx, w, h) {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#1a1a4e');
    grad.addColorStop(1, '#0a0a2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // 装饰星星
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let i = 0; i < 30; i++) {
      const sx = (Math.sin(i * 137.5 + Date.now() * 0.0001) * 0.5 + 0.5) * w;
      const sy = (Math.cos(i * 97.3 + Date.now() * 0.00008) * 0.5 + 0.5) * h;
      const sr = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  _drawBoardBg(ctx) {
    const bx = BOARD_OFFSET_X - 4;
    const by = BOARD_OFFSET_Y - 4;
    const bw = GRID_COLS * CELL_SIZE + 8;
    const bh = GRID_ROWS * CELL_SIZE + 8;

    // 毛玻璃背景
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.stroke();

    // 网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= GRID_ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(BOARD_OFFSET_X, BOARD_OFFSET_Y + r * CELL_SIZE);
      ctx.lineTo(BOARD_OFFSET_X + GRID_COLS * CELL_SIZE, BOARD_OFFSET_Y + r * CELL_SIZE);
      ctx.stroke();
    }
    for (let c = 0; c <= GRID_COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(BOARD_OFFSET_X + c * CELL_SIZE, BOARD_OFFSET_Y);
      ctx.lineTo(BOARD_OFFSET_X + c * CELL_SIZE, BOARD_OFFSET_Y + GRID_ROWS * CELL_SIZE);
      ctx.stroke();
    }
    ctx.restore();
  }

  _drawGems(ctx, board) {
    if (!board || !board.grid) return;
    const time = Date.now();

    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const gem = board.grid[r][c];
        if (!gem) continue;

        const { x, y } = this.cellToPixel(r, c);
        const cx = x + CELL_SIZE / 2;
        const cy = y + CELL_SIZE / 2;
        const pad = GEM_PADDING + 2;
        const radius = (CELL_SIZE - pad * 2) / 2;

        // 缩放动画
        let scale = gem.scale;
        if (gem.spawning) {
          scale = 0.3 + Math.sin(time * 0.01) * 0.1;
        }

        // matched宝石：闪烁+缩小动画
        let matchAlpha = 1;
        let matchScale = 1;
        let matchGlowBoost = 0;
        if (gem.matched) {
          const elapsed = time - (gem.matchTime || time);
          const t = Math.min(elapsed / 400, 1); // 400ms动画
          // 快速闪烁
          matchGlowBoost = (0.5 + Math.sin(elapsed * 0.03) * 0.5) * 20;
          // 逐渐缩小并淡出
          matchScale = 1 - t * 0.5;
          matchAlpha = 1 - t * 0.6;
          scale = matchScale;
        }

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.globalAlpha = gem.alpha * matchAlpha;

        // 发光背景
        const glowGrad = ctx.createRadialGradient(0, 0, radius * 0.3, 0, 0, radius * 1.2);
        glowGrad.addColorStop(0, gem.glow + '40');
        glowGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.2, 0, Math.PI * 2);
        ctx.fill();

        // 宝石主体 - 圆角矩形
        ctx.fillStyle = gem.matched ? '#fff' : gem.color;
        ctx.shadowColor = gem.matched ? '#fff' : gem.glow;
        ctx.shadowBlur = (gem.selected ? 15 : 8) + matchGlowBoost;
        ctx.beginPath();
        ctx.roundRect(-radius, -radius, radius * 2, radius * 2, radius * 0.4);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 高光
        const hlGrad = ctx.createLinearGradient(-radius, -radius, radius, radius);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
        hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.1)');
        hlGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
        ctx.fillStyle = hlGrad;
        ctx.beginPath();
        ctx.roundRect(-radius, -radius, radius * 2, radius * 2, radius * 0.4);
        ctx.fill();

        // 符号
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${radius * 1.1}px "Segoe UI Symbol", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        ctx.fillText(gem.symbol, 0, 1);
        ctx.shadowBlur = 0;

        // 特殊标记
        if (gem.isSpecial) {
          ctx.font = `bold ${radius * 0.7}px sans-serif`;
          ctx.fillStyle = '#ffd700';
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 8;
          ctx.fillText(gem.specialSymbol, 0, radius * 0.8);
          ctx.shadowBlur = 0;

          // 特殊宝石边框
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(-radius - 1, -radius - 1, (radius + 1) * 2, (radius + 1) * 2, radius * 0.4);
          ctx.stroke();
        }

        // 选中脉冲
        if (gem.selected || (this.selectedGem && this.selectedGem.row === r && this.selectedGem.col === c)) {
          const pulse = 0.5 + Math.sin(time * 0.008) * 0.5;
          ctx.strokeStyle = `rgba(255,255,255,${0.3 + pulse * 0.4})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(-radius - 2, -radius - 2, (radius + 2) * 2, (radius + 2) * 2, radius * 0.4);
          ctx.stroke();
        }

        ctx.restore();
      }
    }
  }

  _drawScorePopups(ctx) {
    ctx.save();
    for (let i = this.scorePopups.length - 1; i >= 0; i--) {
      const p = this.scorePopups[i];
      p.y += p.vy;
      p.life -= 0.015;
      if (p.life <= 0) {
        this.scorePopups.splice(i, 1);
        continue;
      }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 20px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 4;
      ctx.fillText(p.text, p.x, p.y);
      if (p.sub) {
        ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ff9800';
        ctx.fillText(p.sub, p.x, p.y + 18);
      }
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  _drawHUD(ctx, score, moves, level, chainLevel, levelConfig, clearCount) {
    ctx.save();
    const w = this.canvas.width;

    // 标题
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`三消传奇`, 20, 30);

    // 关卡 + 目标
    ctx.font = '16px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`第 ${level} 关`, 20, 55);
    if (levelConfig) {
      let goalText = '';
      if (levelConfig.type === 'score') {
        goalText = `目标: ${levelConfig.target}分`;
      } else {
        goalText = `消除: ${clearCount}/${levelConfig.target}`;
      }
      ctx.fillStyle = '#888';
      ctx.font = '13px "Microsoft YaHei", sans-serif';
      ctx.fillText(goalText, 20, 75);
    }

    // 分数
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
    ctx.fillText(`${score}`, w - 20, 30);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px "Microsoft YaHei", sans-serif';
    ctx.fillText(`分数`, w - 20, 50);

    // 步数
    ctx.textAlign = 'center';
    const movesColor = moves <= 5 ? '#ff3b5c' : moves <= 10 ? '#ff9800' : '#4CAF50';
    ctx.fillStyle = movesColor;
    ctx.font = 'bold 20px "Microsoft YaHei", sans-serif';
    ctx.fillText(`${moves}`, w / 2, 30);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px "Microsoft YaHei", sans-serif';
    ctx.fillText(`剩余步数`, w / 2, 50);

    // 连锁指示
    if (chainLevel > 0) {
      const chainText = `连锁 x${Math.pow(2, chainLevel)}`;
      ctx.fillStyle = '#ff9800';
      ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(chainText, w / 2, 80);
    }

    // 底部目标信息
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px "Microsoft YaHei", sans-serif';
    ctx.fillText('点击宝石选中，再点击相邻宝石交换', w / 2, BOARD_OFFSET_Y + GRID_ROWS * CELL_SIZE + 25);

    ctx.restore();
  }

  _drawOverlay(ctx, text, color, w, h) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = color;
    ctx.font = 'bold 36px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.fillText(text, w / 2, h / 2 - 30);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '18px "Microsoft YaHei", sans-serif';
    ctx.fillText('点击任意位置继续', w / 2, h / 2 + 20);
    ctx.restore();
  }

  _drawMenu(ctx, w, h) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, w, h);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 标题
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 48px "Microsoft YaHei", sans-serif';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 30;
    ctx.fillText('三消传奇', w / 2, h / 2 - 80);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '20px "Microsoft YaHei", sans-serif';
    ctx.fillText('Match-3 Legend', w / 2, h / 2 - 40);

    // 开始按钮
    const btnW = 200, btnH = 50;
    const btnX = w / 2 - btnW / 2, btnY = h / 2 + 10;
    ctx.fillStyle = '#4CAF50';
    ctx.shadowColor = '#4CAF50';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 25);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
    ctx.fillText('开始游戏', w / 2, btnY + btnH / 2);

    // 提示
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '14px "Microsoft YaHei", sans-serif';
    ctx.fillText('50个关卡 | 特殊宝石 | 连锁反应', w / 2, h / 2 + 100);

    ctx.restore();

    // 保存按钮区域供点击检测
    this.menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  }

  // 检查菜单按钮点击
  isMenuButtonClick(px, py) {
    if (!this.menuBtn) return false;
    const b = this.menuBtn;
    return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h;
  }
}

// ============================================================
// sound.js - Web Audio API 音效系统
// ============================================================

let audioCtx = null;
let masterGain = null;

function ensureContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// --- 工具函数 ---
function playTone(freq, duration, type = 'sine', volume = 0.3) {
  ensureContext();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume = 0.15) {
  ensureContext();
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 3000;
  src.buffer = buffer;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

// --- 音效接口 ---
const Sound = {
  swap() {
    playTone(440, 0.12, 'sine', 0.2);
    setTimeout(() => playTone(550, 0.1, 'sine', 0.15), 60);
  },

  match(chainLevel = 0) {
    const baseFreq = 520 + chainLevel * 80;
    playTone(baseFreq, 0.15, 'triangle', 0.25);
    setTimeout(() => playTone(baseFreq * 1.25, 0.15, 'triangle', 0.2), 80);
    setTimeout(() => playTone(baseFreq * 1.5, 0.2, 'triangle', 0.15), 160);
    playNoise(0.1, 0.08);
  },

  chain(chainLevel) {
    const baseFreq = 600 + chainLevel * 120;
    playTone(baseFreq, 0.1, 'square', 0.15);
    setTimeout(() => playTone(baseFreq * 1.5, 0.15, 'square', 0.12), 50);
    setTimeout(() => playTone(baseFreq * 2, 0.2, 'sine', 0.2), 100);
  },

  special() {
    playTone(300, 0.3, 'sawtooth', 0.15);
    playTone(600, 0.2, 'sine', 0.2);
    setTimeout(() => playTone(900, 0.3, 'sine', 0.15), 100);
    setTimeout(() => playNoise(0.15, 0.1), 150);
  },

  fail() {
    playTone(300, 0.15, 'square', 0.2);
    setTimeout(() => playTone(220, 0.25, 'square', 0.15), 100);
  },

  levelComplete() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => playTone(freq, 0.3, 'sine', 0.25), i * 120);
    });
  },

  gameOver() {
    const notes = [400, 350, 300, 250];
    notes.forEach((freq, i) => {
      setTimeout(() => playTone(freq, 0.4, 'triangle', 0.2), i * 200);
    });
  },

  click() {
    playTone(800, 0.06, 'sine', 0.15);
  },
};

// === main.js ===
// ============================================================
// main.js - 游戏主循环、事件监听、状态机
// ============================================================


// --- 游戏状态 ---
const STATE = {
  MENU:          'menu',
  IDLE:          'idle',        // 等待玩家操作
  SWAPPING:      'swapping',    // 交换动画中
  CHECKING:      'checking',    // 匹配检测中
  DESTROYING:    'destroying',  // 消除动画中
  FALLING:       'falling',     // 下落动画中
  LEVEL_COMPLETE:'levelComplete',
  GAME_OVER:     'gameOver',
};

class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.board = null;
    this.effects = new EffectsManager();
    this.ui = new UI(this.canvas);

    // 游戏数据
    this.state = STATE.MENU;
    this.level = 1;
    this.score = 0;
    this.moves = 0;
    this.targetScore = 0;
    this.targetClear = 0;
    this.clearCount = 0;
    this.levelConfig = null;

    // 选择
    this.selected = null;       // { row, col }
    this.swapFrom = null;
    this.swapTo = null;

    // 动画计时器
    this.animTimer = 0;
    this.animDuration = 0;
    this.animCallback = null;

    // 连锁
    this.chainLevel = 0;
    this.chainQueue = [];

    // 触摸
    this.touchStart = null;

    // 布局
    this._resize();
    this._bindEvents();
    this._loop();
  }

  // --- 调整画布大小 ---
  _resize() {
    const boardW = GRID_COLS * CELL_SIZE + 40;
    const boardH = GRID_ROWS * CELL_SIZE + 140;
    // 适配屏幕
    const maxW = Math.min(window.innerWidth, 600);
    const maxH = window.innerHeight;
    const scale = Math.min(maxW / boardW, maxH / boardH, 1.5);
    this.canvas.width = boardW;
    this.canvas.height = boardH;
    this.canvas.style.width = `${boardW * scale}px`;
    this.canvas.style.height = `${boardH * scale}px`;
    this.scale = scale;
  }

  // --- 事件绑定 ---
  _bindEvents() {
    // 鼠标点击
    this.canvas.addEventListener('click', (e) => this._handleClick(e));
    // 触摸
    this.canvas.addEventListener('touchstart', (e) => this._handleTouchStart(e), { passive: false });
    this.canvas.addEventListener('touchend', (e) => this._handleTouchEnd(e), { passive: false });
    // 窗口大小变化
    window.addEventListener('resize', () => this._resize());
  }

  _getPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width / rect.width;
    const scaleY = this.canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY,
    };
  }

  _handleClick(e) {
    const { x, y } = this._getPos(e);

    if (this.state === STATE.MENU) {
      if (this.ui.isMenuButtonClick(x, y)) {
        Sound.click();
        this._startLevel(1);
      }
      return;
    }

    if (this.state === STATE.LEVEL_COMPLETE) {
      Sound.click();
      this._nextLevel();
      return;
    }

    if (this.state === STATE.GAME_OVER) {
      Sound.click();
      this.state = STATE.MENU;
      return;
    }

    if (this.state !== STATE.IDLE) return;

    const cell = this.ui.pixelToCell(x, y);
    if (!cell) return;

    Sound.click();
    this._selectOrSwap(cell.row, cell.col);
  }

  _handleTouchStart(e) {
    e.preventDefault();
    if (e.touches.length === 0) return;
    const { x, y } = this._getPos(e.touches[0]);
    this.touchStart = { x, y, time: Date.now() };
  }

  _handleTouchEnd(e) {
    e.preventDefault();
    if (!this.touchStart) return;
    const { x, y } = this._getPos(e.changedTouches[0]);
    const dx = x - this.touchStart.x;
    const dy = y - this.touchStart.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const elapsed = Date.now() - this.touchStart.time;

    // 视为滑动
    if (dist > 20 && elapsed < 500 && this.state === STATE.IDLE) {
      const cell = this.ui.pixelToCell(this.touchStart.x, this.touchStart.y);
      if (cell) {
        let dr = 0, dc = 0;
        if (Math.abs(dx) > Math.abs(dy)) {
          dc = dx > 0 ? 1 : -1;
        } else {
          dr = dy > 0 ? 1 : -1;
        }
        const tr = cell.row + dr;
        const tc = cell.col + dc;
        if (tr >= 0 && tr < GRID_ROWS && tc >= 0 && tc < GRID_COLS) {
          this.selected = { row: cell.row, col: cell.col };
          this._trySwap(cell.row, cell.col, tr, tc);
        }
      }
      this.touchStart = null;
      return;
    }

    // 视为点击
    this.touchStart = null;
    this._handleClick({ clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY });
  }

  // --- 选择/交换逻辑 ---
  _selectOrSwap(row, col) {
    if (this.selected) {
      const { row: sr, col: sc } = this.selected;
      if (sr === row && sc === col) {
        // 取消选择
        this.selected = null;
        this.ui.selectedGem = null;
        return;
      }
      if (this.board.isAdjacent(sr, sc, row, col)) {
        this._trySwap(sr, sc, row, col);
      } else {
        // 重新选择
        this.selected = { row, col };
        this.ui.selectedGem = { row, col };
      }
    } else {
      this.selected = { row, col };
      this.ui.selectedGem = { row, col };
    }
  }

  _trySwap(r1, c1, r2, c2) {
    this.selected = null;
    this.ui.selectedGem = null;

    // 检查彩虹宝石交互
    const gem1 = this.board.getGem(r1, c1);
    const gem2 = this.board.getGem(r2, c2);

    this.state = STATE.SWAPPING;
    this.swapFrom = { row: r1, col: c1 };
    this.swapTo = { row: r2, col: c2 };

    Sound.swap();

    // 执行交换
    this.board.swap(r1, c1, r2, c2);
    this.moves--;

    // 彩虹宝石特殊处理
    if (gem1 && gem1.special === SPECIAL.RAINBOW) {
      const targetType = gem2 ? gem2.type : 0;
      this._startAnim(250, () => {
        const result = this.board.activateRainbowAt(r2, c2, targetType);
        this._processClearResult(result);
      });
      return;
    }
    if (gem2 && gem2.special === SPECIAL.RAINBOW) {
      const targetType = gem1 ? gem1.type : 0;
      this._startAnim(250, () => {
        const result = this.board.activateRainbowAt(r1, c1, targetType);
        this._processClearResult(result);
      });
      return;
    }

    // 检查匹配
    this._startAnim(250, () => {
      const matches = this.board.findAllMatches();
      if (matches.length === 0) {
        // 无匹配，交换回来
        Sound.fail();
        this.board.swap(r1, c1, r2, c2);
        this.moves++; // 恢复步数
        this.state = STATE.IDLE;
      } else {
        this.chainLevel = 0;
        this.board.resetChain();
        this._processMatches(matches);
      }
    });
  }

  // --- 处理匹配结果 ---
  _processMatches(matches) {
    this.state = STATE.CHECKING;

    // 放置上一轮的特殊宝石
    this.board.placeSpecials();

    this.board.chainLevel = this.chainLevel;
    const result = this.board.clearMatches(matches);
    this._processClearResult(result);
  }

  _processClearResult(result) {
    const { cleared, totalScore, multiplier, totalCleared } = result;

    this.score += totalScore;
    if (this.levelConfig && this.levelConfig.type === 'clear') {
      this.clearCount += totalCleared;
    }

    // 特效
    for (const cell of cleared) {
      const { x, y } = this.ui.cellToPixel(cell.r, cell.c);
      const color = cell.color || '#fff';
      this.effects.spawnDestroyEffect(x, y, color);
      if (totalCleared > 5) {
        this.effects.spawnPulse(x, y, color);
      }
    }

    // 分数飞字
    if (cleared.length > 0) {
      const mid = cleared[Math.floor(cleared.length / 2)];
      const { x, y } = this.ui.cellToPixel(mid.r, mid.c);
      this.ui.addScorePopup(x, y, totalScore, multiplier);
    }

    if (this.chainLevel > 0) {
      Sound.chain(this.chainLevel);
      this.ui.triggerShake(2 + this.chainLevel);
    } else {
      Sound.match(this.chainLevel);
    }

    if (totalCleared >= 5) {
      Sound.special();
    }

    // 消除动画后下落
    this.state = STATE.DESTROYING;
    this._startAnim(400, () => {
      // 动画播放完毕，现在真正移除matched宝石
      this.board.finalizeClear();
      this._doGravity();
    });
  }

  // --- 重力下落 ---
  _doGravity() {
    this.state = STATE.FALLING;
    const drops = this.board.applyGravity();
    const newGems = this.board.fillEmpty();

    this._startAnim(250, () => {
      // 检查新匹配
      this.chainLevel++;
      this.board.incrementChain();
      const newMatches = this.board.findAllMatches();
      if (newMatches.length > 0) {
        setTimeout(() => this._processMatches(newMatches), CHAIN_DELAY);
      } else {
        this._endTurn();
      }
    });
  }

  // --- 回合结束 ---
  _endTurn() {
    this.chainLevel = 0;
    this.board.resetChain();

    // 检查胜负
    if (this._checkWin()) {
      this.state = STATE.LEVEL_COMPLETE;
      Sound.levelComplete();
      return;
    }

    if (this.moves <= 0) {
      this.state = STATE.GAME_OVER;
      Sound.gameOver();
      return;
    }

    // 检查是否还有可用移动
    if (!this.board.hasValidMoves()) {
      // 打乱棋盘
      this.board.init();
      this.board.resetChain();
    }

    this.state = STATE.IDLE;
  }

  _checkWin() {
    const cfg = this.levelConfig;
    if (!cfg) return false;
    if (cfg.type === 'score') return this.score >= cfg.target;
    if (cfg.type === 'clear') return this.clearCount >= cfg.target;
    return false;
  }

  // --- 关卡管理 ---
  _startLevel(lv) {
    this.level = lv;
    this.levelConfig = LEVELS[lv - 1];
    this.board = new Board(this.levelConfig.colors);
    this.board.init();
    this.score = 0;
    this.moves = this.levelConfig.moves;
    this.clearCount = 0;
    this.chainLevel = 0;
    this.selected = null;
    this.ui.selectedGem = null;
    this.ui.scorePopups = [];
    this.effects.clear();
    this.state = STATE.IDLE;
  }

  _nextLevel() {
    if (this.level < 50) {
      this._startLevel(this.level + 1);
    } else {
      // 通关
      this.state = STATE.MENU;
    }
  }

  // --- 动画计时 ---
  _startAnim(duration, callback) {
    this.animTimer = 0;
    this.animDuration = duration;
    this.animCallback = callback;
  }

  // --- 主循环 ---
  _loop() {
    const now = Date.now();

    // 动画更新
    if (this.animCallback) {
      this.animTimer += 16; // ~60fps
      if (this.animTimer >= this.animDuration) {
        const cb = this.animCallback;
        this.animCallback = null;
        cb();
      }
    }

    // 特效更新
    this.effects.update();

    // 绘制
    this.ui.draw(
      this.board,
      this.effects,
      this.score,
      this.moves,
      this.level,
      this.chainLevel,
      this.state,
      this.levelConfig,
      this.clearCount,
    );

    requestAnimationFrame(() => this._loop());
  }
}

new Game();;;
