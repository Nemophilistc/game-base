<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迷宫逃脱 - Maze Escape</title>
    <style>
        /* ============================================================
           Global Reset & Base
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0f0a;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e0ffe0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ============================================================
           Glassmorphism Mixin via Classes
           ============================================================ */
        .glass {
            background: rgba(10, 40, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 12px;
        }

        /* ============================================================
           Overlay (Start / GameOver / Win)
           ============================================================ */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 0, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.4s ease;
        }

        #overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #overlay-content {
            max-width: 520px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px 28px;
            background: rgba(10, 40, 10, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(46, 204, 113, 0.35);
            border-radius: 18px;
            box-shadow:
                0 0 40px rgba(46, 204, 113, 0.1),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        #overlay-content::-webkit-scrollbar {
            width: 6px;
        }
        #overlay-content::-webkit-scrollbar-track {
            background: transparent;
        }
        #overlay-content::-webkit-scrollbar-thumb {
            background: rgba(46, 204, 113, 0.3);
            border-radius: 3px;
        }

        /* Title */
        .title-area {
            margin-bottom: 28px;
        }

        .game-title {
            font-size: 52px;
            font-weight: 900;
            color: #2ecc71;
            text-shadow:
                0 0 20px rgba(46, 204, 113, 0.5),
                0 0 40px rgba(46, 204, 113, 0.2);
            letter-spacing: 8px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(46, 204, 113, 0.5);
            letter-spacing: 12px;
            font-weight: 300;
        }

        /* Sections */
        .menu-section {
            margin-bottom: 22px;
        }

        .section-title {
            font-size: 15px;
            color: rgba(46, 204, 113, 0.7);
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* Difficulty Buttons */
        .diff-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diff-btn {
            padding: 12px 22px;
            font-size: 15px;
            font-weight: 600;
            color: #e0ffe0;
            background: rgba(46, 204, 113, 0.12);
            border: 1px solid rgba(46, 204, 113, 0.4);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .diff-btn:hover {
            background: rgba(46, 204, 113, 0.25);
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
            transform: translateY(-2px);
        }

        .diff-btn:active {
            transform: translateY(0);
            background: rgba(46, 204, 113, 0.35);
        }

        /* High Scores */
        .hs-table {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hs-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            font-size: 14px;
            color: rgba(224, 255, 224, 0.7);
            border-bottom: 1px solid rgba(46, 204, 113, 0.1);
        }

        .hs-val {
            color: #f1c40f;
            font-weight: 600;
        }

        /* Help Box */
        .help-box {
            text-align: left;
            padding: 14px 16px;
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 10px;
            margin-top: 8px;
        }

        .help-box h3 {
            font-size: 13px;
            color: rgba(46, 204, 113, 0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .help-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .help-item {
            font-size: 13px;
            color: rgba(224, 255, 224, 0.65);
            line-height: 1.5;
        }

        .key {
            display: inline-block;
            padding: 1px 6px;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 4px;
            font-size: 12px;
            color: #2ecc71;
            font-weight: 600;
        }

        /* ============================================================
           Result Screens (Game Over / Win)
           ============================================================ */
        .result-screen {
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .result-title.danger {
            color: #e74c3c;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
        }

        .result-title.gold {
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }

        .result-sub {
            font-size: 14px;
            color: rgba(224, 255, 224, 0.4);
            letter-spacing: 6px;
            margin-bottom: 24px;
        }

        .new-high {
            font-size: 18px;
            color: #f1c40f;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            margin-bottom: 16px;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-item {
            padding: 12px;
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(224, 255, 224, 0.5);
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 700;
            color: #e0ffe0;
        }

        .stat-val.gold {
            color: #f1c40f;
        }

        .restart-btn {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            color: #0a0f0a;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
            transform: translateY(-2px);
        }

        /* ============================================================
           HUD
           ============================================================ */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 10px 20px;
            background: rgba(0, 15, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(46, 204, 113, 0.2);
            z-index: 50;
            font-size: 14px;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud-icon {
            font-size: 16px;
        }

        .hud-val {
            font-weight: 600;
            color: #e0ffe0;
            font-size: 15px;
        }

        .hud-item.lives .hud-val {
            font-size: 16px;
            letter-spacing: 2px;
        }

        .hud-item.diff .hud-val {
            font-size: 12px;
            color: rgba(46, 204, 113, 0.6);
        }

        /* ============================================================
           Minimap
           ============================================================ */
        #minimap {
            position: fixed;
            bottom: 12px;
            right: 12px;
            width: 160px;
            height: 160px;
            border-radius: 10px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            background: rgba(0, 10, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        /* ============================================================
           Notification
           ============================================================ */
        #notification {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 10px 24px;
            background: rgba(10, 40, 10, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.4);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #2ecc71;
            z-index: 60;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            display: none;
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============================================================
           Responsive
           ============================================================ */
        @media (max-width: 600px) {
            .game-title {
                font-size: 36px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 12px;
                letter-spacing: 8px;
            }

            #overlay-content {
                padding: 22px 18px;
            }

            .diff-btn {
                padding: 10px 16px;
                font-size: 13px;
            }

            .result-title {
                font-size: 32px;
            }

            .stat-val {
                font-size: 18px;
            }

            #hud {
                gap: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            .hud-val {
                font-size: 13px;
            }

            #minimap {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud"></div>

    <!-- Minimap -->
    <canvas id="minimap" width="160" height="160"></canvas>

    <!-- Notification -->
    <div id="notification"></div>

    <!-- Overlay -->
    <div id="overlay">
        <div id="overlay-content"></div>
    </div>

    <!-- Game Modules -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
