<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .header{font-size:42px;color:#ab47bc;text-shadow:0 0 30px rgba(171,71,188,0.5);margin-bottom:12px;letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:10px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#ab47bc}
        #board{display:inline-grid;gap:8px;padding:10px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.08)}
        .card{width:90px;height:90px;border-radius:12px;cursor:pointer;transition:all 0.3s;perspective:800px;user-select:none}
        .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
        .card:not(.flipped):not(.matched):hover .card-inner{transform:rotateY(15deg) scale(1.05)}
        .card.flipped .card-inner{transform:rotateY(180deg)}
        .card.matched .card-inner{transform:rotateY(180deg) scale(1.05)}
        .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center}
        .card-front{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid rgba(171,71,188,0.3);font-size:36px}
        .card-back{background:linear-gradient(135deg,#2a1a3e,#1a1040);border:2px solid rgba(171,71,188,0.2);transform:rotateY(180deg);font-size:42px}
        .card:not(.flipped):not(.matched):hover .card-inner{transform:rotateY(10deg)}
        .card.matched{opacity:0.7;pointer-events:none;animation:matchPop 0.4s ease-out}
        .card.matched .card-back{border-color:#4caf50;background:linear-gradient(135deg,#1a2e1a,#104020);box-shadow:0 0 15px rgba(76,175,80,0.3)}
        @keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(171,71,188,0.5)}
        .menu-btn{background:linear-gradient(135deg,#ab47bc 0%,#8e24aa 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(171,71,188,0.5)}
        .diff-btns{display:flex;gap:10px;margin-bottom:15px}
        .diff-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .diff-btn:hover,.diff-btn.active{border-color:#ab47bc;color:#ab47bc;background:rgba(171,71,188,0.1)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ab47bc;font-size:14px;margin-bottom:6px;text-align:center}
        .ctrl-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 14px;font-size:12px;color:#888;cursor:pointer;transition:all 0.2s;margin-top:10px}
        .ctrl-btn:hover{background:rgba(171,71,188,0.2);color:#ab47bc;border-color:#ab47bc}
    </style>
</head>
<body>
    <div class="header">记忆翻牌</div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">步数</div><div class="info-val" id="moves">0</div></div>
        <div class="info-box"><div class="info-label">配对</div><div class="info-val" id="pairs">0/0</div></div>
        <div class="info-box"><div class="info-label">时间</div><div class="info-val" id="timer">0</div></div>
    </div>
    <div id="board"></div>
    <button class="ctrl-btn" id="btnRestart">↺ 重新开始 (R)</button>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#ab47bc">记忆翻牌</div>
        <div class="diff-btns">
            <button class="diff-btn active" data-cols="4" data-rows="3">4×3 简单</button>
            <button class="diff-btn" data-cols="4" data-rows="4">4×4 中等</button>
            <button class="diff-btn" data-cols="6" data-rows="5">6×5 困难</button>
        </div>
        <button class="menu-btn" id="btnStart">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击翻开卡牌，找到相同的两张即配对成功</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>记住卡牌位置，用最少步数完成所有配对</div>
            <div>步数越少、时间越短，分数越高</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">全部配对！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" id="btnAgain">再来一局</button>
    </div>

<script>
// === ./sound.js ===
// js/sound.js - Web Audio API音效

const Sound = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    play(type) {
        if (!this.ctx) return;
        const c = this.ctx, o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        const t = c.currentTime;
        switch (type) {
            case 'flip':
                o.type = 'sine'; o.frequency.value = 400;
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.start(t); o.stop(t + 0.08); break;
            case 'match':
                o.type = 'sine';
                o.frequency.setValueAtTime(600, t);
                o.frequency.setValueAtTime(800, t + 0.08);
                o.frequency.setValueAtTime(1000, t + 0.16);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                o.start(t); o.stop(t + 0.25); break;
            case 'mismatch':
                o.type = 'square'; o.frequency.value = 200;
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                o.start(t); o.stop(t + 0.15); break;
            case 'win':
                o.type = 'sine';
                o.frequency.setValueAtTime(500, t);
                o.frequency.setValueAtTime(700, t + 0.1);
                o.frequency.setValueAtTime(900, t + 0.2);
                o.frequency.setValueAtTime(1200, t + 0.3);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                o.start(t); o.stop(t + 0.5); break;
        }
    }
};

// === ./config.js ===
// js/config.js - 常量配置（主题、难度参数）

const THEMES = {
    fruits: ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍌','🍉','🫐','🥭','🍍','🥑','🍈'],
    animals: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
    gems: ['💎','💍','🔮','💠','🪩','⭐','🌟','✨','💫','🎆','🎇','🌈','☄️','🔥','❄️']
};

const DEFAULT_GRID = { cols: 4, rows: 3 };

// === ./cards.js ===
// js/cards.js - 卡牌逻辑（翻转、配对检测）


// 游戏状态
let gridCols = DEFAULT_GRID.cols;
let gridRows = DEFAULT_GRID.rows;
let totalPairs = 0;
let cards = [];
let flipped = [];
let matched = [];
let moves = 0;
let gameActive = false;
let timerInterval = null;
let elapsed = 0;
let bestScores = {};

// 翻牌状态
let firstFlip = -1;
let secondFlip = -1;
let lockBoard = false;

function getGridCols() { return gridCols; }
function getGridRows() { return gridRows; }
function getTotalPairs() { return totalPairs; }
function getCards() { return cards; }
function getFlipped() { return flipped; }
function getMatched() { return matched; }
function getMoves() { return moves; }
function getElapsed() { return elapsed; }
function getBestScores() { return bestScores; }
function isGameActive() { return gameActive; }

function setDifficulty(cols, rows) {
    gridCols = cols;
    gridRows = rows;
}

function loadBestScores() {
    bestScores = JSON.parse(localStorage.getItem('memory_best')) || {};
}

function initGame(callbacks = {}) {
    totalPairs = Math.floor(gridCols * gridRows / 2);

    const themeKeys = Object.keys(THEMES);
    const theme = THEMES[themeKeys[Math.floor(Math.random() * themeKeys.length)]];
    const symbols = [];
    for (let i = 0; i < totalPairs; i++) {
        symbols.push(theme[i % theme.length], theme[i % theme.length]);
    }
    // Fisher-Yates shuffle
    for (let i = symbols.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [symbols[i], symbols[j]] = [symbols[j], symbols[i]];
    }

    cards = symbols;
    flipped = Array(symbols.length).fill(false);
    matched = Array(symbols.length).fill(false);
    moves = 0;
    gameActive = true;
    elapsed = 0;
    firstFlip = -1;
    secondFlip = -1;
    lockBoard = false;

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        elapsed++;
        if (callbacks.onTimerTick) callbacks.onTimerTick(elapsed);
    }, 1000);
}

function onCardClick(idx, callbacks = {}) {
    if (!gameActive || lockBoard || flipped[idx] || matched[idx]) return;
    if (idx === firstFlip) return;

    flipped[idx] = true;
    if (callbacks.onFlip) callbacks.onFlip();

    if (firstFlip === -1) {
        firstFlip = idx;
        if (callbacks.onUpdateUI) callbacks.onUpdateUI();
    } else {
        secondFlip = idx;
        moves++;
        lockBoard = true;
        if (callbacks.onUpdateUI) callbacks.onUpdateUI();

        if (cards[firstFlip] === cards[secondFlip]) {
            matched[firstFlip] = true;
            matched[secondFlip] = true;
            const matchCount = matched.filter(m => m).length / 2;
            if (callbacks.onMatch) callbacks.onMatch(matchCount);
            firstFlip = -1;
            secondFlip = -1;
            lockBoard = false;
            if (callbacks.onUpdateUI) callbacks.onUpdateUI();

            if (matched.every(m => m)) {
                gameActive = false;
                clearInterval(timerInterval);
                const key = gridCols + 'x' + gridRows;
                if (!bestScores[key] || moves < bestScores[key]) {
                    bestScores[key] = moves;
                    localStorage.setItem('memory_best', JSON.stringify(bestScores));
                }
                if (callbacks.onWin) {
                    setTimeout(() => callbacks.onWin(moves, elapsed, bestScores[key] || moves), 400);
                }
            }
        } else {
            setTimeout(() => {
                flipped[firstFlip] = false;
                flipped[secondFlip] = false;
                if (callbacks.onMismatch) callbacks.onMismatch();
                firstFlip = -1;
                secondFlip = -1;
                lockBoard = false;
                if (callbacks.onUpdateUI) callbacks.onUpdateUI();
            }, 800);
        }
    }
}

// === ./ui.js ===
// js/ui.js - DOM渲染、菜单

function renderBoard(cardsArr, flippedArr, matchedArr, cols, onCardClick) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${cols},90px)`;
    for (let i = 0; i < cardsArr.length; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        if (flippedArr[i] || matchedArr[i]) {
            card.classList.add(flippedArr[i] && !matchedArr[i] ? 'flipped' : 'matched');
        }
        card.innerHTML = `<div class="card-inner"><div class="card-front">?</div><div class="card-back">${cardsArr[i]}</div></div>`;
        card.addEventListener('click', () => onCardClick(i));
        board.appendChild(card);
    }
}

function updateInfo(moves, matchCount, totalPairs) {
    document.getElementById('moves').textContent = moves;
    document.getElementById('pairs').textContent = `${matchCount}/${totalPairs}`;
}

function updateTimer(seconds) {
    document.getElementById('timer').textContent = seconds;
}

function showStartOverlay() {
    document.getElementById('startOverlay').classList.remove('hidden');
    document.getElementById('winOverlay').classList.add('hidden');
}

function hideOverlays() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('winOverlay').classList.add('hidden');
}

function showWinOverlay(moves, elapsed, best) {
    document.getElementById('winStats').innerHTML =
        `步数: ${moves}<br>时间: ${elapsed}秒<br>最佳: ${best}步`;
    document.getElementById('winOverlay').classList.remove('hidden');
}

function setActiveDiffBtn(el) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
}

// === main.js ===
// js/main.js - 游戏初始化、事件监听


// 渲染当前游戏状态
function render() {
    renderBoard(getCards(), getFlipped(), getMatched(), getGridCols(), handleCardClick);
}

// 翻牌点击处理
function handleCardClick(idx) {
    onCardClick(idx, {
        onFlip() { Sound.play('flip'); },
        onUpdateUI() {
            const m = getMatched();
            const matchCount = m.filter(v => v).length / 2;
            updateInfo(getMoves(), matchCount, getTotalPairs());
            render();
        },
        onMatch(matchCount) { Sound.play('match'); },
        onMismatch() { Sound.play('mismatch'); },
        onWin(moves, elapsed, best) {
            Sound.play('win');
            showWinOverlay(moves, elapsed, best);
        }
    });
}

// 开始新游戏
function startGame() {
    Sound.init();
    hideOverlays();
    initGame({
        onTimerTick(elapsed) { updateTimer(elapsed); }
    });
    updateInfo(0, 0, getTotalPairs());
    updateTimer(0);
    render();
}

// 设置难度
function setDiff(cols, rows, el) {
    setDifficulty(cols, rows);
    setActiveDiffBtn(el);
}

// 初始化
loadBestScores();

// 难度按钮事件
document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', function () {
        const c = parseInt(this.dataset.cols);
        const r = parseInt(this.dataset.rows);
        setDiff(c, r, this);
    });
});

// 开始/重来按钮事件
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', startGame);
document.getElementById('btnAgain').addEventListener('click', startGame);

// 键盘快捷键
window.addEventListener('keydown', e => {
    if (e.code === 'KeyR') { e.preventDefault(); startGame(); }
});


</script>

</body>
</html>
