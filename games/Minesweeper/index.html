<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        .header{display:flex;align-items:center;gap:20px;margin-bottom:12px}
        .title{font-size:42px;color:#42a5f5;text-shadow:0 0 30px rgba(66,165,245,0.5);letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:10px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#42a5f5}
        #board{display:inline-grid;gap:2px;background:rgba(255,255,255,0.03);padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1)}
        .cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;border-radius:4px;cursor:pointer;transition:all 0.1s;user-select:none}
        .cell.hidden{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.08)}
        .cell.hidden:hover{background:rgba(66,165,245,0.25);border-color:rgba(66,165,245,0.4)}
        .cell.revealed{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.03)}
        .cell.flagged{background:rgba(255,152,0,0.2);border:1px solid rgba(255,152,0,0.3)}
        .cell.mine-hit{background:rgba(244,67,54,0.4);border:1px solid rgba(244,67,54,0.5)}
        .cell.mine-show{background:rgba(244,67,54,0.15)}
        .n1{color:#42a5f5}.n2{color:#66bb6a}.n3{color:#f44336}.n4{color:#7e57c2}
        .n5{color:#ff7043}.n6{color:#26c6da}.n7{color:#fff}.n8{color:#bdbdbd}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(66,165,245,0.5)}
        .menu-btn{background:linear-gradient(135deg,#42a5f5 0%,#1e88e5 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(66,165,245,0.5)}
        .diff-btns{display:flex;gap:10px;margin-bottom:15px}
        .diff-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .diff-btn:hover,.diff-btn.active{border-color:#42a5f5;color:#42a5f5;background:rgba(66,165,245,0.1)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#42a5f5;font-size:14px;margin-bottom:6px;text-align:center}
        .controls-row{display:flex;gap:10px;margin-top:10px}
        .ctrl-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 14px;font-size:12px;color:#888;cursor:pointer;transition:all 0.2s}
        .ctrl-btn:hover{background:rgba(66,165,245,0.2);color:#42a5f5;border-color:#42a5f5}
    </style>
</head>
<body>
    <div class="header"><div class="title">扫雷</div></div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">地雷</div><div class="info-val" id="minesLeft">10</div></div>
        <div class="info-box"><div class="info-label">时间</div><div class="info-val" id="timer">0</div></div>
        <div class="info-box"><div class="info-label">最高</div><div class="info-val" id="high">--</div></div>
    </div>
    <div id="board"></div>
    <div class="controls-row">
        <button class="ctrl-btn" id="restartBtn">↺ 重新开始 (R)</button>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#42a5f5">扫雷</div>
        <div class="diff-btns">
            <button class="diff-btn active" data-diff="easy">简单 9×9</button>
            <button class="diff-btn" data-diff="medium">中等 16×16</button>
            <button class="diff-btn" data-diff="hard">困难 30×16</button>
        </div>
        <button class="menu-btn" id="startBtn">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>左键：揭开格子</div>
            <div>右键：标记/取消旗帜</div>
            <div>数字表示周围8格的地雷数</div>
            <div>R：重新开始 | P：暂停</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>揭开所有非雷格子即获胜</div>
            <div>踩到地雷则游戏结束</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">恭喜通关！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" id="winRestartBtn">再来一局</button>
    </div>
    <div id="loseOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">踩雷了！</div>
        <div id="loseStats" class="stats"></div>
        <button class="menu-btn" id="loseRestartBtn">再来一局</button>
    </div>

    <script>
// === ./config.js ===
// 扫雷游戏配置常量
const DIFFS = {
    easy:   { cols: 9,  rows: 9,  mines: 10 },
    medium: { cols: 16, rows: 16, mines: 40 },
    hard:   { cols: 30, rows: 16, mines: 99 }
};

const CELL_SIZE = 32;

// 难度中文名映射
const DIFF_NAMES = {
    easy: '简单',
    medium: '中等',
    hard: '困难'
};

// === ./sound.js ===
// Web Audio API 音效模块
const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'reveal':
                o.type = 'sine';
                o.frequency.value = 300;
                g.gain.setValueAtTime(0.04, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                o.start(t);
                o.stop(t + 0.05);
                break;
            case 'flag':
                o.type = 'sine';
                o.frequency.value = 500;
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.start(t);
                o.stop(t + 0.08);
                break;
            case 'boom':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(200, t);
                o.frequency.exponentialRampToValueAtTime(30, t + 0.4);
                g.gain.setValueAtTime(0.15, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                o.start(t);
                o.stop(t + 0.4);
                break;
            case 'win':
                o.type = 'sine';
                o.frequency.setValueAtTime(500, t);
                o.frequency.setValueAtTime(700, t + 0.1);
                o.frequency.setValueAtTime(900, t + 0.2);
                o.frequency.setValueAtTime(1100, t + 0.3);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                o.start(t);
                o.stop(t + 0.5);
                break;
        }
    }
};

Sound;

// === ./board.js ===
// 棋盘逻辑：生成地雷、flood-fill揭开、标记、胜负判断

/**
 * 创建空白棋盘状态
 * @returns {{ grid: number[][], revealed: boolean[][], flagged: boolean[][] }}
 */
function createBoard(rows, cols) {
    const grid     = Array.from({ length: rows }, () => Array(cols).fill(0));
    const revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    const flagged  = Array.from({ length: rows }, () => Array(cols).fill(false));
    return { grid, revealed, flagged };
}

/**
 * 放置地雷并计算数字（首次点击安全区域保护）
 */
function placeMines(grid, rows, cols, totalMines, safeR, safeC) {
    let placed = 0;
    while (placed < totalMines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (grid[r][c] === -1) continue;
        if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
        grid[r][c] = -1;
        placed++;
    }
    // 计算每格周围地雷数
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (grid[r][c] === -1) continue;
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
                }
            }
            grid[r][c] = count;
        }
    }
}

/**
 * flood-fill 揭开格子（递归）
 */
function reveal(r, c, rows, cols, grid, revealed, flagged) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (grid[r][c] === 0) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                reveal(r + dr, c + dc, rows, cols, grid, revealed, flagged);
            }
        }
    }
}

/**
 * 左键点击处理
 * @returns {{ hit: boolean, gameActive: boolean }} hit=true 表示踩雷
 */
function cellClick(r, c, state) {
    const { grid, revealed, flagged } = state;
    if (!state.gameActive || flagged[r][c] || revealed[r][c]) return { hit: false, gameActive: state.gameActive };

    if (state.firstClick) {
        state.firstClick = false;
        placeMines(grid, state.rows, state.cols, state.totalMines, r, c);
        state.gameStarted = true;
    }

    if (grid[r][c] === -1) {
        revealed[r][c] = true;
        state.mineHit = { r, c };
        state.gameActive = false;
        // 揭开所有地雷
        for (let rr = 0; rr < state.rows; rr++) {
            for (let cc = 0; cc < state.cols; cc++) {
                if (grid[rr][cc] === -1 && !flagged[rr][cc]) revealed[rr][cc] = true;
            }
        }
        return { hit: true, gameActive: false };
    }

    reveal(r, c, state.rows, state.cols, grid, revealed, flagged);
    return { hit: false, gameActive: state.gameActive };
}

/**
 * 右键标记/取消旗帜
 * @returns {number} 当前旗帜数
 */
function cellRightClick(r, c, state) {
    const { revealed, flagged } = state;
    if (!state.gameActive || revealed[r][c]) return flagged.flat().filter(f => f).length;
    flagged[r][c] = !flagged[r][c];
    return flagged.flat().filter(f => f).length;
}

/**
 * 检查是否获胜
 * @returns {boolean}
 */
function checkWin(state) {
    const { grid, revealed, flagged } = state;
    let unrevealed = 0;
    for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
            if (!revealed[r][c]) unrevealed++;
        }
    }
    return unrevealed === state.totalMines;
}

// === ./ui.js ===
// DOM 渲染、菜单、覆盖层管理

/**
 * 渲染棋盘到 DOM
 */
function renderBoard(state, onCellClick, onCellRightClick) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${state.cols}, ${CELL_SIZE}px)`;

    for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';

            if (state.revealed[r][c]) {
                cell.classList.add('revealed');
                if (state.mineHit && state.mineHit.r === r && state.mineHit.c === c) {
                    cell.classList.add('mine-hit');
                } else if (state.grid[r][c] === -1) {
                    cell.classList.add('mine-show');
                }
                if (state.grid[r][c] === -1) {
                    cell.textContent = '💣';
                } else if (state.grid[r][c] > 0) {
                    cell.textContent = state.grid[r][c];
                    cell.classList.add('n' + state.grid[r][c]);
                }
            } else {
                cell.classList.add('hidden');
                if (state.flagged[r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = '🚩';
                }
            }

            cell.addEventListener('click', () => onCellClick(r, c));
            cell.addEventListener('contextmenu', e => { e.preventDefault(); onCellRightClick(r, c); });
            board.appendChild(cell);
        }
    }
}

/**
 * 更新信息栏
 */
function updateInfoBar(minesLeft, elapsed, highScore) {
    document.getElementById('minesLeft').textContent = minesLeft;
    document.getElementById('timer').textContent = elapsed;
    document.getElementById('high').textContent = highScore;
}

/**
 * 隐藏所有覆盖层
 */
function hideAllOverlays() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('winOverlay').classList.add('hidden');
    document.getElementById('loseOverlay').classList.add('hidden');
}

/**
 * 显示胜利覆盖层
 */
function showWinOverlay(elapsed, diff) {
    const diffName = DIFF_NAMES[diff] || diff;
    document.getElementById('winStats').innerHTML = `时间: ${elapsed}秒<br>难度: ${diffName}`;
    document.getElementById('winOverlay').classList.remove('hidden');
}

/**
 * 显示失败覆盖层
 */
function showLoseOverlay(elapsed) {
    document.getElementById('loseStats').innerHTML = `时间: ${elapsed}秒`;
    document.getElementById('loseOverlay').classList.remove('hidden');
}

/**
 * 设置难度按钮激活状态
 */
function setActiveDiffBtn(diff) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.diff-btn').forEach(b => {
        if (b.dataset.diff === diff) b.classList.add('active');
    });
}

// === main.js ===
// 游戏初始化、事件监听、主循环

// ── 游戏状态 ──
let diff = 'easy';
let state = {};
let timerInterval = null;
let elapsed = 0;
let highScores = JSON.parse(localStorage.getItem('minesweeper_high')) || { easy: '--', medium: '--', hard: '--' };

// ── 难度选择 ──
function setDiff(d) {
    diff = d;
    setActiveDiffBtn(d);
}

// ── 开始游戏 ──
function startGame() {
    Sound.init();
    hideAllOverlays();

    const d = DIFFS[diff];
    const { grid, revealed, flagged } = createBoard(d.rows, d.cols);

    state = {
        cols: d.cols,
        rows: d.rows,
        totalMines: d.mines,
        grid,
        revealed,
        flagged,
        mineHit: null,
        gameActive: true,
        gameStarted: false,
        firstClick: true
    };

    elapsed = 0;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;

    updateInfoBar(state.totalMines, 0, highScores[diff]);
    render();
}

// ── 渲染 ──
function render() {
    renderBoard(state, onCellClick, onCellRightClick);
}

// ── 左键点击 ──
function onCellClick(r, c) {
    if (!state.gameActive) return;

    // 首次点击启动计时器
    if (state.firstClick) {
        timerInterval = setInterval(() => {
            elapsed++;
            document.getElementById('timer').textContent = elapsed;
        }, 1000);
    }

    const result = boardCellClick(r, c, state);

    if (result.hit) {
        clearInterval(timerInterval);
        Sound.play('boom');
        render();
        setTimeout(() => showLoseOverlay(elapsed), 500);
        return;
    }

    Sound.play('reveal');

    if (checkWin(state)) {
        state.gameActive = false;
        clearInterval(timerInterval);
        Sound.play('win');
        if (!highScores[diff] || highScores[diff] === '--' || elapsed < highScores[diff]) {
            highScores[diff] = elapsed;
            localStorage.setItem('minesweeper_high', JSON.stringify(highScores));
        }
        render();
        setTimeout(() => showWinOverlay(elapsed, diff), 300);
        return;
    }

    render();
}

// ── 右键标记 ──
function onCellRightClick(r, c) {
    const flagCount = boardRightClick(r, c, state);
    document.getElementById('minesLeft').textContent = state.totalMines - flagCount;
    Sound.play('flag');
    render();
}

// ── 键盘事件 ──
window.addEventListener('keydown', e => {
    if (e.code === 'KeyR') { e.preventDefault(); startGame(); }
});

// ── 全局右键禁用 ──
document.addEventListener('contextmenu', e => e.preventDefault());

// ── 难度按钮事件绑定 ──
document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => setDiff(btn.dataset.diff));
});

// ── 开始/重来按钮事件绑定 ──
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('winRestartBtn').addEventListener('click', startGame);
document.getElementById('loseRestartBtn').addEventListener('click', startGame);

// ── 初始化显示 ──
document.getElementById('high').textContent = highScores[diff];


</script>

</body>
</html>
