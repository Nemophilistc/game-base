<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迷你高尔夫 - Mini Golf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        #gameCanvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.15), 0 0 80px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }
        .overlay {
            position: fixed;
            left: 0; top: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 26, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.4s;
            padding: 20px;
        }
        .overlay.fade-out { opacity: 0; pointer-events: none; }
        .overlay.fade-fast { animation: fadeInOut 1.2s ease-in-out; }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .overlay-content {
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            color: #fff;
        }
        .course-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .course-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .course-btn.active {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ADE80;
            color: #4ADE80;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5) !important; }
        button:active { transform: translateY(0); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(74,222,128,0.3); border-radius: 3px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="js/main.js"></script>

</body>
</html>
