<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.3);background:#111}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#ffd700;font-weight:bold}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(255,215,0,0.5)}
        .menu-btn{background:linear-gradient(135deg,#ffd700 0%,#ff9800 100%);border:none;padding:14px 40px;font-size:18px;color:#000;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px;font-weight:bold}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(255,215,0,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ffd700;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">球数: <span id="balls">3</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#ffd700">弹球</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>← / A：左挡板</div>
            <div>→ / D：右挡板</div>
            <div>空格：发射球</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>用挡板弹球击中目标得分</div>
            <div>弹珠掉出底部失去一球</div>
            <div>击中不同目标获得不同分数</div>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script>
// === ./config.js ===
const W = 420, H = 650;

// 物理参数
const GRAVITY = 0.15;
const WALL_BOUNCE = 0.8;
const BUMPER_BOUNCE = 1.1;
const MAX_SPEED = 15;
const FLIPPER_LEN = 70;
const FLIPPER_LERP = 0.4;
const FLIP_SPEED_UP = -0.5;
const FLIP_SPEED_REST = 0.4;
const FLIPPER_COOLDOWN = 10; // 碰撞冷却帧数

// 墙壁边界
const WALL_L = 20;
const WALL_R = W - 20;
const WALL_T = 10;

// 球初始位置
const BALL_START_X = W / 2;
const BALL_START_Y = H - 80;
const BALL_R = 8;

// 挡板初始位置
const FLIPPER_Y = H - 60;
const FLIPPER_LX = 120;
const FLIPPER_RX = 300;

// === ./sound.js ===
const Sound = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    play(type) {
        if (!this.ctx) return;
        const c = this.ctx, o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        const t = c.currentTime;
        switch (type) {
            case 'bounce':
                o.type = 'sine'; o.frequency.value = 400;
                g.gain.setValueAtTime(0.08, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                o.start(t); o.stop(t + 0.05);
                break;
            case 'flipper':
                o.type = 'sine'; o.frequency.value = 600;
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
                o.start(t); o.stop(t + 0.04);
                break;
            case 'target':
                o.type = 'sine';
                o.frequency.setValueAtTime(800, t);
                o.frequency.setValueAtTime(1000, t + 0.05);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t); o.stop(t + 0.1);
                break;
            case 'die':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(200, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                o.start(t); o.stop(t + 0.3);
                break;
        }
    }
};

// === ./physics.js ===

function createBall() {
    return { x: BALL_START_X, y: BALL_START_Y, vx: 0, vy: 0, r: BALL_R, launched: false };
}

function launchBall(ball) {
    if (ball.launched) return;
    ball.launched = true;
    ball.vy = -10 - Math.random() * 3;
    ball.vx = (Math.random() - 0.5) * 4;
}

function updateBallPhysics(ball) {
    ball.vy += GRAVITY;
    ball.x += ball.vx;
    ball.y += ball.vy;
}

function collideWalls(ball) {
    if (ball.x - ball.r < WALL_L) {
        ball.x = WALL_L + ball.r;
        ball.vx = Math.abs(ball.vx) * WALL_BOUNCE;
        Sound.play('bounce');
    }
    if (ball.x + ball.r > WALL_R) {
        ball.x = WALL_R - ball.r;
        ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE;
        Sound.play('bounce');
    }
    if (ball.y - ball.r < WALL_T) {
        ball.y = WALL_T + ball.r;
        ball.vy = Math.abs(ball.vy) * WALL_BOUNCE;
        Sound.play('bounce');
    }
}

function collideBumpers(ball, bumpers, particles, addScore) {
    bumpers.forEach(b => {
        const dx = ball.x - b.x, dy = ball.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < ball.r + b.r) {
            const nx = dx / dist, ny = dy / dist;
            ball.x = b.x + nx * (ball.r + b.r);
            ball.y = b.y + ny * (ball.r + b.r);
            const dot = ball.vx * nx + ball.vy * ny;
            ball.vx = (ball.vx - 2 * dot * nx) * BUMPER_BOUNCE;
            ball.vy = (ball.vy - 2 * dot * ny) * BUMPER_BOUNCE;
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed > MAX_SPEED) {
                ball.vx = ball.vx / speed * MAX_SPEED;
                ball.vy = ball.vy / speed * MAX_SPEED;
            }
            b.flash = 10;
            addScore(b.points);
            Sound.play('target');
            spawnParticles(particles, b.x, b.y, b.color, 8);
        }
        if (b.flash > 0) b.flash--;
    });
}

function collideTargets(ball, targets, particles, addScore) {
    targets.forEach(t => {
        if (!t.alive) return;
        if (ball.x + ball.r > t.x && ball.x - ball.r < t.x + t.w &&
            ball.y + ball.r > t.y && ball.y - ball.r < t.y + t.h) {
            t.alive = false;
            addScore(t.points);
            ball.vy = Math.abs(ball.vy) * 0.5 + 2;
            Sound.play('target');
            spawnParticles(particles, t.x + t.w / 2, t.y + t.h / 2, t.color, 12);
        }
    });
}

function spawnParticles(particles, x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6 - 2,
            life: 25 + Math.random() * 15,
            color
        });
    }
}

function updateParticles(particles) {
    return particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        return p.life > 0;
    });
}

function isBallLost(ball) {
    return ball.y > H + 20;
}

// === ./flipper.js ===

function createFlippers() {
    return {
        left:  { x: FLIPPER_LX, y: FLIPPER_Y, angle:  FLIP_SPEED_REST, target:  FLIP_SPEED_REST, cooldown: 0 },
        right: { x: FLIPPER_RX, y: FLIPPER_Y, angle: -FLIP_SPEED_REST, target: -FLIP_SPEED_REST, cooldown: 0 }
    };
}

function updateFlippers(flippers, keys) {
    const { left, right } = flippers;
    if (keys['ArrowLeft'] || keys['KeyA']) {
        left.target = FLIP_SPEED_UP;
        Sound.play('flipper');
    } else {
        left.target = FLIP_SPEED_REST;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        right.target = -FLIP_SPEED_UP;
        Sound.play('flipper');
    } else {
        right.target = -FLIP_SPEED_REST;
    }
    left.angle  += (left.target  - left.angle)  * FLIPPER_LERP;
    right.angle += (right.target - right.angle) * FLIPPER_LERP;
}

function collideFlippers(flippers, ball) {
    const list = [flippers.left, flippers.right];
    list.forEach((f, i) => {
        // 冷却递减
        if (f.cooldown > 0) { f.cooldown--; return; }

        const isLeft = i === 0;
        const fLen = FLIPPER_LEN;
        const endX = f.x + (isLeft ? 1 : -1) * Math.cos(f.angle) * fLen;
        const endY = f.y - Math.sin(f.angle) * fLen;

        const dx = endX - f.x, dy = endY - f.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len, ny = dx / len;
        const px = ball.x - f.x, py = ball.y - f.y;
        const dist = Math.abs(px * nx + py * ny);
        const proj = (px * dx + py * dy) / (len * len);

        if (dist < ball.r + 5 && proj >= 0 && proj <= 1) {
            const flip = isLeft ? -1 : 1;
            ball.vy = -8 - Math.abs(f.angle) * 4;
            ball.vx = flip * (f.angle) * 6 + ball.vx * 0.3;
            ball.y = f.y - ball.r - 6;
            f.cooldown = FLIPPER_COOLDOWN;
            Sound.play('flipper');
        }
    });
}

// === ./ui.js ===

function draw(ctx, ball, bumpers, targets, flippers, particles) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);

    // 墙壁
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(WALL_L - 2, WALL_T - 2); ctx.lineTo(WALL_L - 2, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(WALL_R + 2, WALL_T - 2); ctx.lineTo(WALL_R + 2, H); ctx.stroke();
    ctx.beginPath(); ctx.arc(W / 2, WALL_T - 2, W / 2 - WALL_L + 2, Math.PI, 0); ctx.stroke();

    // 圆形碰撞器
    bumpers.forEach(b => {
        ctx.fillStyle = b.color + '40';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = b.flash > 0 ? '#fff' : b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
        ctx.fillText(b.points, b.x, b.y + 5);
    });

    // 方形靶
    targets.forEach(t => {
        if (!t.alive) return;
        ctx.fillStyle = t.color;
        ctx.fillRect(t.x, t.y, t.w, t.h);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(t.x, t.y, t.w, t.h / 2);
    });

    // 挡板
    [flippers.left, flippers.right].forEach((f, i) => {
        const isLeft = i === 0;
        const fLen = FLIPPER_LEN;
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(isLeft ? -f.angle : f.angle);
        ctx.fillStyle = '#aaa';
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(isLeft ? 0 : -fLen, -6, fLen, 12, 6);
        else ctx.rect(isLeft ? 0 : -fLen, -6, fLen, 12);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(isLeft ? 0 : -fLen, -6, fLen, 6);
        ctx.restore();
    });

    // 球
    if (ball) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath(); ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.4, 0, Math.PI * 2); ctx.fill();
    }

    // 粒子
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // 发射提示
    if (ball && !ball.launched) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '14px Arial'; ctx.textAlign = 'center';
        ctx.fillText('按 空格 发射', W / 2, H - 40);
    }
}

function updateHUD(score, lives, highScore) {
    document.getElementById('score').textContent = score;
    document.getElementById('balls').textContent = lives;
    document.getElementById('high').textContent = Math.max(highScore, score);
}

// === main.js ===

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// 游戏状态
let ball, bumpers, targets, flippers;
let score, lives, highScore, gameActive;
let keys = {};
let particles = [];

highScore = parseInt(localStorage.getItem('pinball_high')) || 0;

function createBumpers() {
    return [
        { x: 140, y: 180, r: 25, color: '#f44336', points: 100, flash: 0 },
        { x: 280, y: 180, r: 25, color: '#4caf50', points: 100, flash: 0 },
        { x: 210, y: 130, r: 30, color: '#2196f3', points: 200, flash: 0 },
        { x: 120, y: 300, r: 20, color: '#ff9800', points: 150, flash: 0 },
        { x: 300, y: 300, r: 20, color: '#9c27b0', points: 150, flash: 0 },
        { x: 210, y: 260, r: 22, color: '#e91e63', points: 250, flash: 0 }
    ];
}

function createTargets() {
    return [
        { x: 60,  y: 120, w: 30, h: 12, color: '#ffd700', points: 500,  alive: true },
        { x: 330, y: 120, w: 30, h: 12, color: '#ffd700', points: 500,  alive: true },
        { x: 60,  y: 400, w: 30, h: 12, color: '#00ff96', points: 300,  alive: true },
        { x: 330, y: 400, w: 30, h: 12, color: '#00ff96', points: 300,  alive: true },
        { x: 170, y: 70,  w: 80, h: 12, color: '#e040fb', points: 1000, alive: true }
    ];
}

function addScore(pts) { score += pts; }

function startGame() {
    Sound.init();
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');

    score = 0; lives = 3; gameActive = true; particles = [];
    bumpers = createBumpers(); targets = createTargets();
    ball = createBall();
    flippers = createFlippers();
    updateHUD(score, lives, highScore);
}

// 暴露给 HTML onclick
window.startGame = startGame;

function update() {
    if (!gameActive) return;

    // 挡板控制与角度插值
    updateFlippers(flippers, keys);

    // 球未发射：吸附在发射位
    if (!ball.launched) return;

    // 球物理
    updateBallPhysics(ball);
    collideWalls(ball);
    collideBumpers(ball, bumpers, particles, addScore);
    collideTargets(ball, targets, particles, addScore);
    collideFlippers(flippers, ball);
    updateHUD(score, lives, highScore);

    // 全部靶被摧毁后 3 秒重生
    if (targets.every(t => !t.alive)) {
        targets = createTargets();
    }

    // 球掉落
    if (isBallLost(ball)) {
        lives--;
        Sound.play('die');
        if (lives <= 0) {
            gameActive = false;
            highScore = Math.max(highScore, score);
            localStorage.setItem('pinball_high', highScore);
            setTimeout(() => {
                document.getElementById('goStats').innerHTML = `分数: ${score}<br>最高: ${highScore}`;
                document.getElementById('gameOverOverlay').classList.remove('hidden');
            }, 500);
            return;
        }
        ball = createBall();
        updateHUD(score, lives, highScore);
    }

    // 粒子更新
    particles = updateParticles(particles);
}

function gameLoop() {
    requestAnimationFrame(gameLoop);
    update();
    draw(ctx, ball, bumpers, targets, flippers, particles);
}

// 事件监听
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (ball) launchBall(ball); }
    if (e.code === 'KeyR')  { e.preventDefault(); startGame(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// 初始化
particles = [];
updateHUD(score, lives, highScore);

// Bug Fix #1: 启动游戏主循环
gameLoop();


</script>

</body>
</html>
