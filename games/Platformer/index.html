// === ./config.js ===
// config.js - Game constants and configuration
const TILE = 32;
const W = 800;
const H = 600;

// Physics
const GRAVITY = 0.55;
const FRICTION = 0.82;
const AIR_FRICTION = 0.94;
const ICE_FRICTION = 0.985;
const SPEED = 4.2;
const JUMP = -11.5;
const WALL_JUMP_X = 7;
const WALL_JUMP_Y = -10;
const DASH_SPEED = 16;
const DASH_DUR = 8;
const DASH_CD = 120;
const WALL_SLIDE = 2.2;
const PW = 20;
const PH = 28;

// Tile types
const T = {
    AIR: 0, SOLID: 1, PLATFORM: 2, SPIKE: 3,
    HAZARD: 4, ICE: 5, SAND: 6, DOOR: 7, GOAL: 8,
};

// Game states
const ST = {
    MENU: 0, SELECT: 1, PLAY: 2, PAUSE: 3, WIN: 4, DEAD: 5,
};

// World themes
const WORLDS = [
    {
        name: '草地世界', bg: ['#87CEEB', '#E0F0FF'],
        tile: { top: '#5B8C3E', body: '#7B6B3A', topH: '#4A7A30', bodyH: '#6B5B2A' },
        plat: { top: '#A08050', body: '#8B6B40' },

        plat: { top: '#CD853F', body: '#A0693D' },

const KEYS = {

// === ./sound.js ===
// sound.js - Web Audio API sound effects
let ctx = null;
let muted = false;

function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
}

function osc(freq, type, dur, vol = 0.15, delay = 0) {
    if (muted) return;
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    o.connect(g).connect(c.destination);
    o.start(c.currentTime + delay);
    o.stop(c.currentTime + delay + dur + 0.05);
}

function noise(dur, vol = 0.1, delay = 0) {
    if (muted) return;
    const c = getCtx();
    const bufSize = c.sampleRate * dur;
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    const s = c.createBufferSource();
    s.buffer = buf;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    s.connect(g).connect(c.destination);
    s.start(c.currentTime + delay);
    s.stop(c.currentTime + delay + dur + 0.05);
}

const Sound = {

// === ./effects.js ===
// effects.js - Particle system
class Particle {
    constructor(x, y, vx, vy, life, color, size, shrink = true) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = this.maxLife = life;
        this.color = color;
        this.size = size;
        this.shrink = shrink;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life--;
        return this.life > 0;
    }
    draw(ctx, camX, camY) {
        const a = this.life / this.maxLife;
        const s = this.shrink ? this.size * a : this.size;
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - camX - s / 2, this.y - camY - s / 2, s, s);
        ctx.globalAlpha = 1;
    }
}

class Effects {
    constructor() { this.particles = []; }
    add(p) { this.particles.push(p); }
    update() { this.particles = this.particles.filter(p => p.update()); }
    draw(ctx, camX, camY) { this.particles.forEach(p => p.draw(ctx, camX, camY)); }

    burst(x, y, count, color, speed = 3, size = 4, life = 20) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = Math.random() * speed;
            this.add(new Particle(x, y, Math.cos(a) * s, Math.sin(a) * s, life + Math.random() * 10, color, size + Math.random() * 2));
        }
    }

    dust(x, y) { this.burst(x, y, 5, '#9B8B6B', 2, 3, 15); }
    land(x, y) { this.burst(x, y, 8, '#9B8B6B', 3, 4, 18); }
    dashTrail(x, y) { this.burst(x, y, 3, '#AADDFF', 1, 3, 10); }
    death(x, y) { this.burst(x, y, 25, '#FF6B6B', 5, 5, 30); }
    starCollect(x, y) { this.burst(x, y, 15, '#FFD700', 4, 4, 25); }
    coinCollect(x, y) { this.burst(x, y, 8, '#FFD700', 2, 3, 15); }
    goalEffect(x, y) { this.burst(x, y, 30, '#7FFF7F', 5, 5, 35); }
}

// === ./player.js ===
// player.js - Player class

class Player {
    constructor(x, y) {
        this.spawnX = x; this.spawnY = y;
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.w = PW; this.h = PH;
        this.onGround = false;
        this.onWall = 0; // -1 left, 0 none, 1 right
        this.facing = 1;
        this.dashTimer = 0;
        this.dashCooldown = 0;
        this.dashDir = 1;
        this.crouching = false;
        this.slideTimer = 0;
        this.wallSlideTimer = 0;
        this.jumpBuffer = 0;
        this.coyoteTime = 0;
        this.alive = true;
        this.health = 3;
        this.maxHealth = 3;
        this.invincible = 0;
        this.coins = 0;
        this.stars = [false, false, false];
        this.keys = 0;
        this.animFrame = 0;
        this.animTimer = 0;
        this.runParticles = 0;
        this.h = PH;
    }

    respawn() {
        this.x = this.spawnX; this.y = this.spawnY;
        this.vx = 0; this.vy = 0;
        this.alive = true;
        this.dashTimer = 0; this.dashCooldown = 0;
        this.crouching = false; this.slideTimer = 0;
        this.onWall = 0; this.wallSlideTimer = 0;
        this.invincible = 60;
        this.h = PH;
    }

    takeDamage(effects) {
        if (this.invincible > 0) return;
        this.health--;
        this.invincible = 90;
        effects.burst(this.x + this.w / 2, this.y + this.h / 2, 10, '#FF4444', 4, 4, 20);
        if (this.health <= 0) {
            this.alive = false;
            Sound.die();
            effects.death(this.x + this.w / 2, this.y + this.h / 2);
        }
    }

    update(input, level, effects) {
        if (!this.alive) return;
        if (this.invincible > 0) this.invincible--;
        if (this.dashCooldown > 0) this.dashCooldown--;

        const onIce = this._checkSurface(level) === 'ice';
        const onSand = this._checkSurface(level) === 'sand';
        const fric = onIce ? ICE_FRICTION : (this.onGround ? FRICTION : AIR_FRICTION);
        const spd = onSand ? SPEED * 0.5 : SPEED;

        // Crouch
        const wantCrouch = input.down && this.onGround;
        if (wantCrouch && !this.crouching) {
            this.crouching = true;
            this.h = PH * 0.6;
            this.y += PH * 0.4;
            if (Math.abs(this.vx) > 3) this.slideTimer = 15;
        } else if (!wantCrouch && this.crouching) {
            this.crouching = false;
            this.y -= PH * 0.4;
            this.h = PH;
        }

        // Slide
        if (this.slideTimer > 0) this.slideTimer--;

        // Dash
        if (this.dashTimer > 0) {
            this.vx = this.dashDir * DASH_SPEED;
            this.vy = 0;
            this.dashTimer--;
            effects.dashTrail(this.x + this.w / 2, this.y + this.h / 2);
            if (this.dashTimer === 0) this.vx *= 0.5;
        } else {
            // Movement
            if (input.left && this.slideTimer === 0) { this.vx -= spd * 0.3; this.facing = -1; }
            if (input.right && this.slideTimer === 0) { this.vx += spd * 0.3; this.facing = 1; }

            // Clamp speed
            const maxV = this.crouching ? spd * 0.3 : spd;
            if (Math.abs(this.vx) > maxV) this.vx = Math.sign(this.vx) * maxV;

            // Friction
            if (!input.left && !input.right) this.vx *= fric;
            if (Math.abs(this.vx) < 0.1) this.vx = 0;

            // Wall slide
            this.onWall = 0;
            if (!this.onGround && this.vy > 0) {
                if (this._wallCheck(level, -1)) this.onWall = -1;
                else if (this._wallCheck(level, 1)) this.onWall = 1;
            }
            if (this.onWall !== 0 && this.vy > WALL_SLIDE) {
                this.vy = WALL_SLIDE;
                this.wallSlideTimer++;
            } else {
                this.wallSlideTimer = 0;
            }

            // Gravity
            this.vy += GRAVITY;
            if (this.vy > 14) this.vy = 14;

            // Coyote time
            if (this.onGround) this.coyoteTime = 6;
            else if (this.coyoteTime > 0) this.coyoteTime--;

            // Jump buffer
            if (input.jumpPressed) this.jumpBuffer = 8;
            else if (this.jumpBuffer > 0) this.jumpBuffer--;

            // Jump
            if (this.jumpBuffer > 0) {
                if (this.onWall !== 0) {
                    this.vx = -this.onWall * WALL_JUMP_X;
                    this.vy = WALL_JUMP_Y;
                    this.facing = -this.onWall;
                    this.jumpBuffer = 0;
                    this.onWall = 0;
                    Sound.wallJump();
                    effects.dust(this.x + this.w / 2, this.y + this.h);
                } else if (this.coyoteTime > 0) {
                    this.vy = JUMP * (this.crouching ? 0.7 : 1);
                    this.jumpBuffer = 0;
                    this.coyoteTime = 0;
                    Sound.jump();
                    effects.dust(this.x + this.w / 2, this.y + this.h);
                }
            }

            // Variable jump height
            if (!input.jump && this.vy < -3) this.vy *= 0.7;

            // Dash
            if (input.dashPressed && this.dashCooldown === 0 && this.dashTimer === 0) {
                this.dashTimer = DASH_DUR;
                this.dashCooldown = DASH_CD;
                this.dashDir = this.facing;
                this.vy = 0;
                Sound.dash();
            }
        }

        // Apply velocity and collide
        const wasOnGround = this.onGround;
        this._moveX(level);
        this._moveY(level, effects);

        // Run particles
        if (this.onGround && Math.abs(this.vx) > 2) {
            this.runParticles++;
            if (this.runParticles % 4 === 0) effects.dust(this.x + this.w / 2, this.y + this.h);
        } else {
            this.runParticles = 0;
        }

        // Animation
        this.animTimer++;
        if (this.animTimer > 6) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
    }

    _checkSurface(level) {
        const ty = Math.floor((this.y + this.h + 1) / TILE);
        const tx1 = Math.floor(this.x / TILE);
        const tx2 = Math.floor((this.x + this.w) / TILE);
        for (let tx = tx1; tx <= tx2; tx++) {
            const t = level.getTile(tx, ty);
            if (t === T.ICE) return 'ice';
            if (t === T.SAND) return 'sand';
        }
        return null;
    }

    _wallCheck(level, dir) {
        const cx = dir < 0 ? this.x - 1 : this.x + this.w;
        const ty1 = Math.floor((this.y + 2) / TILE);
        const ty2 = Math.floor((this.y + this.h - 2) / TILE);
        const tx = Math.floor(cx / TILE);
        for (let ty = ty1; ty <= ty2; ty++) {
            const t = level.getTile(tx, ty);
            if (t === T.SOLID || t === T.ICE || t === T.SAND) return true;
        }
        return false;
    }

    _moveX(level) {
        this.x += this.vx;
        const left = Math.floor(this.x / TILE);
        const right = Math.floor((this.x + this.w) / TILE);
        const top = Math.floor(this.y / TILE);
        const bot = Math.floor((this.y + this.h - 1) / TILE);
        for (let ty = top; ty <= bot; ty++) {
            for (let tx of [left, right]) {
                const t = level.getTile(tx, ty);
                if (t === T.SOLID || t === T.ICE || t === T.SAND) {
                    if (this.vx > 0) { this.x = tx * TILE - this.w; this.vx = 0; }
                    else if (this.vx < 0) { this.x = (tx + 1) * TILE; this.vx = 0; }
                }
            }
        }
    }

    _moveY(level, effects) {
        this.y += this.vy;
        this.onGround = false;
        const left = Math.floor(this.x / TILE);
        const right = Math.floor((this.x + this.w - 1) / TILE);
        const top = Math.floor(this.y / TILE);
        const bot = Math.floor((this.y + this.h) / TILE);
        for (let tx = left; tx <= right; tx++) {
            for (let ty of [top, bot]) {
                const t = level.getTile(tx, ty);
                const isSolid = t === T.SOLID || t === T.ICE || t === T.SAND;
                const isPlat = t === T.PLATFORM && this.vy >= 0 && (this.y + this.h - this.vy) <= ty * TILE + 4;
                if (isSolid || isPlat) {
                    if (this.vy > 0) {
                        this.y = ty * TILE - this.h;
                        if (this.vy > 6) { Sound.land(); effects.land(this.x + this.w / 2, this.y + this.h); }
                        this.vy = 0;
                        this.onGround = true;
                    } else if (this.vy < 0 && isSolid) {
                        this.y = (ty + 1) * TILE;
                        this.vy = 0;
                    }
                }
                // Hazards
                if (t === T.SPIKE || t === T.HAZARD) {
                    if (this._overlapsTile(tx, ty)) this.takeDamage(effects);
                }
            }
        }
        // Moving platform support
        for (const mp of level.movingPlatforms) {
            if (this.vy >= 0 && this._overlapsMovingPlatform(mp)) {
                this.y = mp.y - this.h;
                if (this.vy > 6) { Sound.land(); effects.land(this.x + this.w / 2, this.y + this.h); }
                this.vy = 0;
                this.onGround = true;
                this.x += mp.vx || 0;
            }
        }
    }

    _overlapsTile(tx, ty) {
        return this.x + this.w > tx * TILE + 2 && this.x < (tx + 1) * TILE - 2 &&
               this.y + this.h > ty * TILE + 2 && this.y < (ty + 1) * TILE - 2;
    }

    _overlapsMovingPlatform(mp) {
        return this.x + this.w > mp.x && this.x < mp.x + mp.w &&
               this.y + this.h >= mp.y && this.y + this.h <= mp.y + mp.h + 6 && this.y + this.h > mp.y;
    }

    draw(ctx, camX, camY) {
        if (!this.alive) return;
        if (this.invincible > 0 && this.invincible % 6 < 3) return;
        const x = this.x - camX;
        const y = this.y - camY;
        const c = this.dashTimer > 0 ? '#88DDFF' : '#44AAFF';

        // Body
        ctx.fillStyle = c;
        const bh = this.crouching ? PH * 0.6 : PH;
        const by = this.crouching ? y + PH * 0.4 : y;
        ctx.beginPath();
        ctx.roundRect(x + 2, by + 2, this.w - 4, bh - 4, 4);
        ctx.fill();

        // Face
        const ey = by + 6;
        const ex1 = this.facing > 0 ? x + 8 : x + 5;
        const ex2 = this.facing > 0 ? x + 14 : x + 11;
        ctx.fillStyle = '#FFF';
        ctx.fillRect(ex1, ey, 4, 4);
        ctx.fillRect(ex2, ey, 4, 4);
        ctx.fillStyle = '#222';
        ctx.fillRect(ex1 + (this.facing > 0 ? 1 : 0), ey + 1, 2, 2);
        ctx.fillRect(ex2 + (this.facing > 0 ? 1 : 0), ey + 1, 2, 2);

        // Legs animation
        if (this.onGround && Math.abs(this.vx) > 0.5 && !this.crouching) {
            ctx.fillStyle = '#3388DD';
            const legOff = Math.sin(this.animFrame * Math.PI / 2) * 3;
            ctx.fillRect(x + 4, y + bh - 2, 4, 2 + legOff);
            ctx.fillRect(x + this.w - 8, y + bh - 2, 4, 2 - legOff);
        }

        // Wall slide indicator
        if (this.onWall !== 0 && !this.onGround) {
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            const wx = this.onWall < 0 ? x - 2 : x + this.w;
            ctx.fillRect(wx, y + 4, 2, this.h - 8);
        }
    }

    getBounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
}

// === ./enemies.js ===
// enemies.js - Enemy system

class Enemy {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.vx = 0; this.vy = 0;
        this.alive = true;
        this.health = 1;
        this.animTimer = 0;
        this.facing = 1;
    }
    getBounds() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
    update() { this.animTimer++; }
    stomped(effects) {
        this.health--;
        if (this.health <= 0) { this.alive = false; effects.burst(this.x + this.w / 2, this.y + this.h / 2, 12, '#FF8844', 4, 4, 20); }
    }
}

// Patrol enemy - walks back and forth
class PatrolEnemy extends Enemy {
    constructor(x, y, range = 80) {
        super(x, y, 26, 26);
        this.startX = x; this.range = range;
        this.speed = 1.2;
        this.vx = this.speed;
    }
    update(level) {
        super.update();
        this.x += this.vx;
        this.vy += GRAVITY;
        this.y += this.vy;
        // Ground collision
        const bot = Math.floor((this.y + this.h) / TILE);
        const left = Math.floor(this.x / TILE);
        const right = Math.floor((this.x + this.w) / TILE);
        for (let tx = left; tx <= right; tx++) {
            const t = level.getTile(tx, bot);
            if (t === T.SOLID || t === T.ICE) { this.y = bot * TILE - this.h; this.vy = 0; }
        }
        // Turn at edges or range
        if (this.x < this.startX - this.range || this.x > this.startX + this.range) { this.vx = -this.vx; this.facing = -this.facing; }
        // Turn at walls
        const wallX = this.vx > 0 ? this.x + this.w + 1 : this.x - 1;
        const wallT = level.getTile(Math.floor(wallX / TILE), Math.floor((this.y + this.h / 2) / TILE));
        if (wallT === T.SOLID || wallT === T.ICE) { this.vx = -this.vx; this.facing = -this.facing; }
    }
    draw(ctx, cx, cy) {
        if (!this.alive) return;
        const x = this.x - cx, y = this.y - cy;
        ctx.fillStyle = '#E05555';
        ctx.beginPath(); ctx.roundRect(x, y, this.w, this.h, 4); ctx.fill();
        // Eyes
        const ex = this.facing > 0 ? x + 14 : x + 4;
        ctx.fillStyle = '#FFF'; ctx.fillRect(ex, y + 6, 6, 6);
        ctx.fillStyle = '#222'; ctx.fillRect(ex + (this.facing > 0 ? 2 : 0), y + 7, 3, 4);
    }
}

// Flying enemy - flies in a sine pattern
class FlyingEnemy extends Enemy {
    constructor(x, y) {
        super(x, y, 24, 20);
        this.startX = x; this.startY = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 1.5;
        this.range = 60;
    }
    update() {
        super.update();
        this.x = this.startX + Math.sin(this.animTimer * 0.02 + this.phase) * this.range;
        this.y = this.startY + Math.cos(this.animTimer * 0.03 + this.phase) * 30;
    }
    draw(ctx, cx, cy) {
        if (!this.alive) return;
        const x = this.x - cx, y = this.y - cy;
        ctx.fillStyle = '#5588DD';
        ctx.beginPath(); ctx.moveTo(x + 12, y); ctx.lineTo(x, y + this.h); ctx.lineTo(x + 24, y + this.h); ctx.closePath(); ctx.fill();
        // Wings
        const wingY = Math.sin(this.animTimer * 0.2) * 3;
        ctx.fillStyle = '#77AAFF';
        ctx.fillRect(x - 4, y + 6 + wingY, 8, 4);
        ctx.fillRect(x + 20, y + 6 - wingY, 8, 4);
        // Eye
        ctx.fillStyle = '#FFF'; ctx.fillRect(x + 9, y + 8, 5, 4);
        ctx.fillStyle = '#222'; ctx.fillRect(x + 11, y + 9, 2, 2);
    }
    stomped(effects) {
        this.health--;
        if (this.health <= 0) { this.alive = false; effects.burst(this.x + this.w / 2, this.y + this.h / 2, 12, '#5588DD', 4, 4, 20); }
    }
}

// Bouncing enemy - bounces around
class BouncingEnemy extends Enemy {
    constructor(x, y) {
        super(x, y, 22, 22);
        this.vx = (Math.random() < 0.5 ? 1 : -1) * 2;
        this.vy = -6;
        this.bounce = 0.8;
    }
    update(level) {
        super.update();
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        // Ground bounce
        const bot = Math.floor((this.y + this.h) / TILE);
        const left = Math.floor(this.x / TILE);
        const right = Math.floor((this.x + this.w) / TILE);
        for (let tx = left; tx <= right; tx++) {
            const t = level.getTile(tx, bot);
            if (t === T.SOLID || t === T.ICE) {
                this.y = bot * TILE - this.h;
                this.vy = -Math.abs(this.vy) * this.bounce;
                if (Math.abs(this.vy) < 1) this.vy = -6;
            }
        }
        // Wall bounce
        const wallY = Math.floor((this.y + this.h / 2) / TILE);
        if (this.vx > 0) {
            const t = level.getTile(Math.floor((this.x + this.w) / TILE), wallY);
            if (t === T.SOLID || t === T.ICE) { this.vx = -this.vx; }
        } else {
            const t = level.getTile(Math.floor((this.x - 1) / TILE), wallY);
            if (t === T.SOLID || t === T.ICE) { this.vx = -this.vx; }
        }
    }
    draw(ctx, cx, cy) {
        if (!this.alive) return;
        const x = this.x - cx, y = this.y - cy;
        ctx.fillStyle = '#55BB55';
        ctx.beginPath(); ctx.arc(x + 11, y + 11, 11, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FFF'; ctx.fillRect(x + 5, y + 6, 5, 5); ctx.fillRect(x + 13, y + 6, 5, 5);
        ctx.fillStyle = '#222'; ctx.fillRect(x + 7, y + 7, 2, 3); ctx.fillRect(x + 15, y + 7, 2, 3);
    }
    stomped(effects) {
        this.health--;
        if (this.health <= 0) { this.alive = false; effects.burst(this.x + this.w / 2, this.y + this.h / 2, 12, '#55BB55', 4, 4, 20); }
    }
}

// Turret enemy - shoots projectiles
class TurretEnemy extends Enemy {
    constructor(x, y) {
        super(x, y, 28, 24);
        this.shootTimer = 0;
        this.shootInterval = 120;
        this.projectiles = [];
        this.dir = -1;
    }
    update(level, playerX) {
        super.update();
        this.dir = playerX < this.x + this.w / 2 ? -1 : 1;
        this.shootTimer++;
        if (this.shootTimer >= this.shootInterval) {
            this.shootTimer = 0;
            this.projectiles.push({
                x: this.x + (this.dir > 0 ? this.w : 0),
                y: this.y + this.h / 2 - 3,
                vx: this.dir * 4,
                w: 8, h: 6, life: 120,
            });
        }
        // Update projectiles
        this.projectiles = this.projectiles.filter(p => {
            p.x += p.vx; p.life--;
            const tx = Math.floor(p.x / TILE);
            const ty = Math.floor(p.y / TILE);
            const t = level.getTile(tx, ty);
            return p.life > 0 && t !== T.SOLID && t !== T.ICE;
        });
    }
    draw(ctx, cx, cy) {
        if (!this.alive) return;
        const x = this.x - cx, y = this.y - cy;
        ctx.fillStyle = '#888';
        ctx.fillRect(x, y + 4, this.w, this.h - 4);
        ctx.fillStyle = '#666';
        const bx = this.dir > 0 ? x + this.w - 4 : x;
        ctx.fillRect(bx, y + 8, 8, 8);
        // Eye
        ctx.fillStyle = '#F44'; ctx.fillRect(x + 10, y + 8, 6, 4);
        // Projectiles
        ctx.fillStyle = '#FF6644';
        for (const p of this.projectiles) {
            ctx.fillRect(p.x - cx, p.y - cy, p.w, p.h);
        }
    }
    getProjectiles() { return this.projectiles; }
    stomped(effects) {
        this.health--;
        if (this.health <= 0) { this.alive = false; effects.burst(this.x + this.w / 2, this.y + this.h / 2, 12, '#888888', 4, 4, 20); }
    }
}

// collectibles.js - Collectible system

class Collectible {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.collected = false;
        this.animTimer = Math.random() * 100;
    }
    update() { if (!this.collected) this.animTimer++; }
    getBounds() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
    overlaps(rect) {
        return !this.collected &&
            this.x < rect.x + rect.w && this.x + this.w > rect.x &&
            this.y < rect.y + rect.h && this.y + this.h > rect.y;
    }
}

class Star extends Collectible {
    constructor(x, y, index) {
        super(x, y, 20, 20);
        this.index = index;
    }
    draw(ctx, cx, cy) {
        if (this.collected) return;
        const x = this.x - cx + 10, y = this.y - cy + 10 + Math.sin(this.animTimer * 0.05) * 3;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const a = (i * 72 - 90) * Math.PI / 180;
            const r = i === 0 ? 0 : 10;
            const px = x + Math.cos(a) * 10;
            const py = y + Math.sin(a) * 10;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            const a2 = ((i * 72 + 36) - 90) * Math.PI / 180;
            ctx.lineTo(x + Math.cos(a2) * 5, y + Math.sin(a2) * 5);
        }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#FFF8DC';
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    }
}

class Coin extends Collectible {
    constructor(x, y) {
        super(x, y, 16, 16);
        this.value = 1;
    }
    draw(ctx, cx, cy) {
        if (this.collected) return;
        const x = this.x - cx, y = this.y - cy + Math.sin(this.animTimer * 0.06) * 2;
        const squeeze = Math.abs(Math.cos(this.animTimer * 0.04));
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.ellipse(x + 8, y + 8, 6 * squeeze + 1, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        if (squeeze > 0.3) {
            ctx.fillStyle = '#DAA520';
            ctx.beginPath();
            ctx.ellipse(x + 8, y + 8, 3 * squeeze, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

class Key extends Collectible {
    constructor(x, y) {
        super(x, y, 18, 18);
    }
    draw(ctx, cx, cy) {
        if (this.collected) return;
        const x = this.x - cx, y = this.y - cy + Math.sin(this.animTimer * 0.04) * 2;
        // Key head
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(x + 7, y + 6, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#B8860B';
        ctx.beginPath(); ctx.arc(x + 7, y + 6, 2.5, 0, Math.PI * 2); ctx.fill();
        // Key shaft
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x + 6, y + 10, 3, 8);
        ctx.fillRect(x + 9, y + 14, 3, 2);
        ctx.fillRect(x + 9, y + 17, 4, 2);
    }
}

class Door extends Collectible {
    constructor(x, y) {
        super(x, y, TILE, TILE * 2);
        this.open = false;
    }
    tryOpen(player) {
        if (this.open) return false;
        if (player.keys > 0) {
            player.keys--;
            this.open = true;
            return true;
        }
        return false;
    }
    draw(ctx, cx, cy) {
        const x = this.x - cx, y = this.y - cy;
        if (this.open) {
            ctx.fillStyle = '#553311';
            ctx.fillRect(x, y, this.w, this.h);
            ctx.fillStyle = '#332200';
            ctx.fillRect(x + 4, y + 4, this.w - 8, this.h - 8);
            return;
        }
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(x, y, this.w, this.h);
        ctx.fillStyle = '#6B3A1B';
        ctx.fillRect(x + 2, y + 2, this.w - 4, this.h - 4);
        // Planks
        ctx.strokeStyle = '#5B2A0B';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 4, y + 4, this.w / 2 - 5, this.h / 2 - 5);
        ctx.strokeRect(x + this.w / 2 + 1, y + 4, this.w / 2 - 5, this.h / 2 - 5);
        ctx.strokeRect(x + 4, y + this.h / 2 + 1, this.w - 8, this.h / 2 - 5);
        // Keyhole
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(x + this.w / 2, y + this.h * 0.6, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(x + this.w / 2 - 1.5, y + this.h * 0.6, 3, 6);
        // Handle
        ctx.fillStyle = '#DAA520';
        ctx.beginPath(); ctx.arc(x + this.w - 8, y + this.h * 0.5, 3, 0, Math.PI * 2); ctx.fill();
    }
    getBounds() { return this.open ? null : { x: this.x, y: this.y, w: this.w, h: this.h }; }
}

// === ./level.js ===
// level.js - Level system with procedural generation

// Seeded random
function mulberry32(seed) {
    return function () {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

class Level {
    constructor(worldIdx, levelIdx) {
        this.worldIdx = worldIdx;
        this.levelIdx = levelIdx;
        this.world = WORLDS[worldIdx];
        this.enemies = [];
        this.collectibles = [];
        this.movingPlatforms = [];
        this.lavaY = -1; // For lava world rising lava
        this.lavaSpeed = 0;
        this.playerSpawn = { x: 0, y: 0 };
        this.goal = { x: 0, y: 0 };
        this.door = null;
        this.tiles = [];
        this.cols = 0;
        this.rows = 0;
        this._generate();
    }

    _generate() {
        const world = this.worldIdx;
        const lvl = this.levelIdx;
        const diff = world * 5 + lvl; // 0-19
        const rng = mulberry32(world * 1000 + lvl * 137 + 42);

        const cols = 50 + diff * 3;
        const rows = 18;
        this.cols = cols; this.rows = rows;

        // Initialize empty grid
        const grid = Array.from({ length: rows }, () => new Uint8Array(cols));

        // Ground: bottom 3 rows
        for (let x = 0; x < cols; x++) {
            for (let y = rows - 3; y < rows; y++) grid[y][x] = T.SOLID;
        }

        // Terrain variation: raise/lower ground
        let groundLevel = rows - 3;
        for (let x = 0; x < cols; x++) {
            if (rng() < 0.15 && x > 4 && x < cols - 4) {
                groundLevel += rng() < 0.5 ? -1 : 1;
                groundLevel = Math.max(rows - 6, Math.min(rows - 2, groundLevel));
            }
            for (let y = groundLevel; y < rows; y++) grid[y][x] = T.SOLID;
        }

        // Add gaps (require jumps)
        const numGaps = 3 + Math.floor(diff * 0.5);
        for (let i = 0; i < numGaps; i++) {
            const gx = 8 + Math.floor(rng() * (cols - 16));
            const gw = 2 + Math.floor(rng() * Math.min(3, 1 + diff * 0.15));
            for (let x = gx; x < Math.min(gx + gw, cols - 2); x++) {
                for (let y = 0; y < rows; y++) grid[y][x] = T.AIR;
            }
            // Add spikes at bottom of some gaps
            if (rng() < 0.4 + diff * 0.02) {
                for (let x = gx; x < Math.min(gx + gw, cols - 2); x++) {
                    grid[rows - 1][x] = T.SPIKE;
                }
            }
        }

        // Add platforms over gaps
        for (let x = 6; x < cols - 6; x++) {
            if (grid[rows - 1][x] === T.AIR && grid[rows - 1][x - 1] === T.SOLID) {
                // Gap start - add platform above
                let gapEnd = x;
                while (gapEnd < cols && grid[rows - 1][gapEnd] === T.AIR) gapEnd++;
                const px = x;
                const py = rows - 5 - Math.floor(rng() * 2);
                for (let j = 0; j < gapEnd - x; j++) {
                    if (px + j < cols) grid[py][px + j] = T.PLATFORM;
                }
            }
        }

        // Add floating platforms
        const numPlats = 5 + Math.floor(diff * 0.4);
        for (let i = 0; i < numPlats; i++) {
            const pw = 3 + Math.floor(rng() * 4);
            const px = 4 + Math.floor(rng() * (cols - pw - 8));
            const py = 4 + Math.floor(rng() * (rows - 8));
            let blocked = false;
            for (let dx = 0; dx < pw; dx++) {
                if (grid[py][px + dx] !== T.AIR) { blocked = true; break; }
            }
            if (!blocked) {
                for (let dx = 0; dx < pw; dx++) grid[py][px + dx] = T.PLATFORM;
            }
        }

        // Add walls for wall-jumping sections
        const numWalls = 2 + Math.floor(diff * 0.3);
        for (let i = 0; i < numWalls; i++) {
            const wx = 6 + Math.floor(rng() * (cols - 12));
            const wh = 3 + Math.floor(rng() * 4);
            const wy = rows - 3 - wh;
            for (let dy = 0; dy < wh; dy++) {
                if (wy + dy >= 0 && wy + dy < rows) grid[wy + dy][wx] = T.SOLID;
            }
        }

        // World-specific tiles
        if (world === 1) { // Desert: sand tiles
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    if (grid[y][x] === T.SOLID && rng() < 0.3) grid[y][x] = T.SAND;
                }
            }
        } else if (world === 2) { // Ice: ice tiles
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    if (grid[y][x] === T.SOLID && y < rows - 3 && rng() < 0.4) grid[y][x] = T.ICE;
                }
            }
        } else if (world === 3) { // Lava: hazard tiles at bottom
            for (let x = 0; x < cols; x++) {
                if (grid[rows - 1][x] === T.SPIKE) grid[rows - 1][x] = T.HAZARD;
            }
        }

        // Additional spikes/hazards
        const numHazards = 2 + Math.floor(diff * 0.3);
        for (let i = 0; i < numHazards; i++) {
            const hx = 8 + Math.floor(rng() * (cols - 16));
            const hy = rows - 4 - Math.floor(rng() * 3);
            if (grid[hy][hx] === T.AIR) {
                grid[hy][hx] = world === 3 ? T.HAZARD : T.SPIKE;
            }
        }

        this.tiles = grid;

        // Player spawn (left side)
        this.playerSpawn = { x: 3 * TILE, y: 0 };
        for (let y = 0; y < rows; y++) {
            if (grid[y][3] === T.SOLID) { this.playerSpawn.y = (y - 1) * TILE - 28; break; }
        }

        // Goal (right side)
        this.goal = { x: (cols - 4) * TILE, y: 0 };
        for (let y = 0; y < rows; y++) {
            if (grid[y][cols - 4] === T.SOLID) { this.goal.y = (y - 1) * TILE - 32; break; }
        }

        // Moving platforms (grass world feature, but available in all)
        const numMP = world === 0 ? 3 + lvl : Math.floor(1 + diff * 0.2);
        for (let i = 0; i < numMP; i++) {
            const mx = 10 + Math.floor(rng() * (cols - 20));
            const my = 5 + Math.floor(rng() * (rows - 10));
            const horizontal = rng() < 0.7;
            const dist = 60 + Math.floor(rng() * 100);
            const mp = {
                x: mx * TILE, y: my * TILE,
                w: 3 * TILE, h: 8,
                x1: mx * TILE, y1: my * TILE,
                x2: horizontal ? mx * TILE + dist : mx * TILE,
                y2: horizontal ? my * TILE : my * TILE - dist,
                speed: 0.8 + rng() * 0.6,
                t: 0, vx: 0, vy: 0,
                px: mx * TILE, py: my * TILE,
            };
            this.movingPlatforms.push(mp);
        }

        // Enemies
        const enemyTypes = [PatrolEnemy, FlyingEnemy, BouncingEnemy, TurretEnemy];
        const numEnemies = 3 + Math.floor(diff * 0.6);
        for (let i = 0; i < numEnemies; i++) {
            const etype = Math.floor(rng() * Math.min(1 + world, 4));
            const ex = 12 + Math.floor(rng() * (cols - 16));
            let ey = 0;
            for (let y = 0; y < rows; y++) {
                if (grid[y][ex] === T.SOLID) { ey = (y - 1) * TILE; break; }
            }
            if (etype === 0) this.enemies.push(new PatrolEnemy(ex * TILE, ey, 60 + rng() * 80));
            else if (etype === 1) this.enemies.push(new FlyingEnemy(ex * TILE, ey - 80 - rng() * 60));
            else if (etype === 2) this.enemies.push(new BouncingEnemy(ex * TILE, ey - 20));
            else this.enemies.push(new TurretEnemy(ex * TILE, ey - 24));
        }

        // Collectibles - Coins along the path
        const numCoins = 10 + diff * 2;
        for (let i = 0; i < numCoins; i++) {
            const cx = 5 + Math.floor(rng() * (cols - 10));
            let cy = 0;
            for (let y = 0; y < rows - 1; y++) {
                if (grid[y + 1][cx] === T.SOLID && grid[y][cx] === T.AIR) { cy = y; break; }
            }
            this.collectibles.push(new Coin(cx * TILE + 8, cy * TILE + 4));
        }

        // Stars - 3 per level, in hard-to-reach places
        for (let i = 0; i < 3; i++) {
            let sx, sy;
            let attempts = 0;
            do {
                sx = 10 + Math.floor(rng() * (cols - 20));
                sy = 2 + Math.floor(rng() * (rows - 8));
                attempts++;
            } while (attempts < 50 && grid[sy][sx] !== T.AIR);
            if (grid[sy][sx] === T.AIR) {
                this.collectibles.push(new Star(sx * TILE + 6, sy * TILE + 6, i));
            }
        }

        // Key and door (every few levels)
        if (lvl % 2 === 0) {
            const kx = 10 + Math.floor(rng() * (cols / 2));
            let ky = 0;
            for (let y = 0; y < rows - 1; y++) {
                if (grid[y + 1][kx] === T.SOLID && grid[y][kx] === T.AIR) { ky = y; break; }
            }
            this.collectibles.push(new Key(kx * TILE, ky * TILE));

            const dx = Math.floor(cols / 2) + Math.floor(rng() * (cols / 4));
            let dy = 0;
            for (let y = 0; y < rows - 2; y++) {
                if (grid[y + 2][dx] === T.SOLID && grid[y][dx] === T.AIR) { dy = y; break; }
            }
            this.door = new Door(dx * TILE, dy * TILE);
            this.collectibles.push(this.door);
        }

        // Rising lava for lava world
        if (world === 3) {
            this.lavaY = rows * TILE + 100;
            this.lavaSpeed = 0.15 + lvl * 0.05;
        }
    }

    getTile(x, y) {
        if (x < 0 || x >= this.cols || y < 0 || y >= this.rows) return T.AIR;
        return this.tiles[y][x];
    }

    updateMovingPlatforms() {
        for (const mp of this.movingPlatforms) {
            mp.t += mp.speed * 0.01;
            const s = (Math.sin(mp.t) + 1) / 2;
            const newX = mp.x1 + (mp.x2 - mp.x1) * s;
            const newY = mp.y1 + (mp.y2 - mp.y1) * s;
            mp.vx = newX - mp.x;
            mp.vy = newY - mp.y;
            mp.px = mp.x; mp.py = mp.y;
            mp.x = newX; mp.y = newY;
        }
    }

    updateLava() {
        if (this.worldIdx === 3 && this.lavaY > 0) {
            this.lavaY -= this.lavaSpeed;
        }
    }

    drawBackground(ctx, camX, camY) {
        const w = this.world;
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, w.bg[0]);
        grad.addColorStop(1, w.bg[1]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Parallax layer 3 (far)
        ctx.fillStyle = w.bg3;
        for (let i = 0; i < 8; i++) {
            const bx = (i * 200 - camX * 0.1) % (W + 200) - 100;
            ctx.beginPath();
            ctx.moveTo(bx, H); ctx.lineTo(bx + 40, H - 120 - (i % 3) * 40);
            ctx.lineTo(bx + 80, H); ctx.fill();
        }

        // Parallax layer 2 (mid)
        ctx.fillStyle = w.bg2;
        for (let i = 0; i < 10; i++) {
            const bx = (i * 150 - camX * 0.3) % (W + 150) - 75;
            ctx.beginPath();
            ctx.moveTo(bx, H); ctx.lineTo(bx + 30, H - 70 - (i % 3) * 25);
            ctx.lineTo(bx + 60, H); ctx.fill();
        }

        // Parallax layer 1 (near)
        ctx.fillStyle = w.bg1;
        for (let i = 0; i < 12; i++) {
            const bx = (i * 120 - camX * 0.5) % (W + 120) - 60;
            ctx.beginPath();
            ctx.moveTo(bx, H); ctx.lineTo(bx + 20, H - 40 - (i % 2) * 15);
            ctx.lineTo(bx + 40, H); ctx.fill();
        }
    }

    drawTiles(ctx, camX, camY) {
        const startCol = Math.max(0, Math.floor(camX / TILE));
        const endCol = Math.min(this.cols, Math.ceil((camX + W) / TILE) + 1);
        const startRow = Math.max(0, Math.floor(camY / TILE));
        const endRow = Math.min(this.rows, Math.ceil((camY + H) / TILE) + 1);

        for (let y = startRow; y < endRow; y++) {
            for (let x = startCol; x < endCol; x++) {
                const t = this.tiles[y][x];
                const px = x * TILE - camX;
                const py = y * TILE - camY;

                if (t === T.SOLID) {
                    const above = y > 0 && this.tiles[y - 1][x] !== T.SOLID && this.tiles[y - 1][x] !== T.ICE && this.tiles[y - 1][x] !== T.SAND;
                    ctx.fillStyle = above ? this.world.tile.top : this.world.tile.body;
                    ctx.fillRect(px, py, TILE, TILE);
                    if (above) {
                        ctx.fillStyle = this.world.tile.topH;
                        ctx.fillRect(px, py, TILE, 4);
                    }
                } else if (t === T.PLATFORM) {
                    ctx.fillStyle = this.world.plat.top;
                    ctx.fillRect(px, py, TILE, 6);
                    ctx.fillStyle = this.world.plat.body;
                    ctx.fillRect(px, py + 6, TILE, 4);
                } else if (t === T.SPIKE) {
                    ctx.fillStyle = this.world.spike;
                    for (let s = 0; s < 3; s++) {
                        ctx.beginPath();
                        ctx.moveTo(px + s * 11, py + TILE);
                        ctx.lineTo(px + s * 11 + 5.5, py + 8);
                        ctx.lineTo(px + s * 11 + 11, py + TILE);
                        ctx.fill();
                    }
                } else if (t === T.HAZARD) {
                    ctx.fillStyle = this.world.hazard;
                    ctx.fillRect(px, py, TILE, TILE);
                    // Animated surface
                    ctx.fillStyle = '#FF8800';
                    const wave = Math.sin(Date.now() * 0.003 + x * 0.5) * 3;
                    ctx.fillRect(px, py + wave, TILE, 4);
                } else if (t === T.ICE) {
                    ctx.fillStyle = this.world.tile.top;
                    ctx.fillRect(px, py, TILE, TILE);
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(px + 2, py + 2, TILE / 2, TILE / 2);
                } else if (t === T.SAND) {
                    ctx.fillStyle = this.world.tile.body;
                    ctx.fillRect(px, py, TILE, TILE);
                    ctx.fillStyle = 'rgba(180,150,100,0.3)';
                    for (let d = 0; d < 3; d++) {
                        ctx.fillRect(px + (d * 10 + x * 3) % TILE, py + (d * 8 + y * 2) % TILE, 3, 2);
                    }
                }
            }
        }
    }

    drawMovingPlatforms(ctx, camX, camY) {
        for (const mp of this.movingPlatforms) {
            ctx.fillStyle = this.world.plat.top;
            ctx.fillRect(mp.x - camX, mp.y - camY, mp.w, mp.h);
            ctx.fillStyle = this.world.plat.body;
            ctx.fillRect(mp.x - camX + 2, mp.y - camY + 2, mp.w - 4, mp.h - 2);
        }
    }

    drawGoal(ctx, camX, camY) {
        const x = this.goal.x - camX;
        const y = this.goal.y - camY;
        // Flag pole
        ctx.fillStyle = '#888';
        ctx.fillRect(x + 2, y, 4, 40);
        // Flag
        ctx.fillStyle = '#44FF44';
        ctx.beginPath();
        ctx.moveTo(x + 6, y + 2);
        ctx.lineTo(x + 28, y + 10);
        ctx.lineTo(x + 6, y + 18);
        ctx.fill();
        // Glow
        ctx.fillStyle = 'rgba(68,255,68,0.15)';
        ctx.beginPath();
        ctx.arc(x + 15, y + 20, 20 + Math.sin(Date.now() * 0.005) * 5, 0, Math.PI * 2);
        ctx.fill();
    }

    drawLava(ctx, camX, camY) {
        if (this.worldIdx !== 3 || this.lavaY < 0) return;
        const y = this.lavaY - camY;
        if (y > H) return;
        ctx.fillStyle = '#FF4500';
        ctx.fillRect(0, y, W, H - y + 50);
        ctx.fillStyle = '#FF6600';
        for (let x = 0; x < W; x += 8) {
            const wave = Math.sin(Date.now() * 0.004 + x * 0.05) * 4;
            ctx.fillRect(x, y + wave, 8, 6);
        }
        ctx.fillStyle = '#FFAA00';
        for (let x = 0; x < W; x += 20) {
            const wave = Math.sin(Date.now() * 0.003 + x * 0.1) * 3;
            ctx.fillRect(x + 2, y + wave + 2, 16, 3);
        }
    }

    checkLavaDeath(player) {
        if (this.worldIdx !== 3) return false;
        return player.y + player.h > this.lavaY;
    }
}

function getLevelName(worldIdx, levelIdx) {
    return `${WORLDS[worldIdx].name} - 第${levelIdx + 1}关`;
}

function getTotalLevels() { return 20; }

// ui.js - HUD, menus, level select

class UI {
    constructor() {
        this.selectedWorld = 0;
        this.selectedLevel = 0;
        this.menuAnim = 0;
        this.scrollY = 0;
        this.starRating = {}; // { "0-0": 2, "0-1": 3, ... }
        this.completedLevels = new Set();
        this.unlockedLevels = new Set([0]); // Level 0 always unlocked
        this.loadProgress();
    }

    loadProgress() {
        try {
            const d = JSON.parse(localStorage.getItem('platformer_save') || '{}');
            this.starRating = d.stars || {};
            this.completedLevels = new Set(d.completed || [0]);
            this.unlockedLevels = new Set(d.unlocked || [0]);
        } catch { }
    }

    saveProgress() {
        try {
            localStorage.setItem('platformer_save', JSON.stringify({
                stars: this.starRating,
                completed: [...this.completedLevels],
                unlocked: [...this.unlockedLevels],
            }));
        } catch { }
    }

    completeLevel(worldIdx, levelIdx, stars) {
        const key = `${worldIdx}-${levelIdx}`;
        const prev = this.starRating[key] || 0;
        if (stars > prev) this.starRating[key] = stars;
        this.completedLevels.add(key);
        const nextKey = worldIdx * 5 + levelIdx + 1;
        if (nextKey < getTotalLevels()) this.unlockedLevels.add(nextKey);
        this.saveProgress();
    }

    isLevelUnlocked(worldIdx, levelIdx) {
        return this.unlockedLevels.has(worldIdx * 5 + levelIdx);
    }

    getStarRating(worldIdx, levelIdx) {
        return this.starRating[`${worldIdx}-${levelIdx}`] || 0;
    }

    drawMenu(ctx) {
        this.menuAnim++;

    drawLevelSelect(ctx, progress) {

            // Card background
            ctx.fillStyle = unlocked ? (completed ? 'rgba(76,175,80,0.3)' : 'rgba(255,255,255,0.1)') : 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.roundRect(lx - 45, ly - 30, 90, 100, 10); ctx.fill();
            ctx.strokeStyle = unlocked ? (completed ? '#4CAF50' : '#555') : '#333';

            ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${i + 1}`, lx, ly + 10);

    drawHUD(ctx, player, level) {

            ctx.fillStyle = player.stars[i] ? '#FFD700' : '#444';

        if (player.dashCooldown > 0) {

            ctx.font = '12px "Microsoft YaHei", sans-serif';

        // Level name

    drawPause(ctx) {

        ctx.font = 'bold 40px "Microsoft YaHei", sans-serif';

        ctx.fillText('暂停', W / 2, H / 2 - 40);

    drawLevelComplete(ctx, stars, coins) {

        ctx.font = '40px sans-serif';

            ctx.fillStyle = i < stars ? '#FFD700' : '#444';
            ctx.fillText('★', W / 2 - 60 + i * 60, H / 2 - 20);
        }

        ctx.fillStyle = '#FFD700';
        ctx.font = '22px "Microsoft YaHei", sans-serif';
        ctx.fillText(`金币: ${coins}`, W / 2, H / 2 + 30);

        this._drawBtn(ctx, W / 2, H / 2 + 80, 180, 44, '下一关', '#4CAF50', '#66BB6A');
        this._drawBtn(ctx, W / 2, H / 2 + 135, 180, 44, '返回菜单', '#2196F3', '#42A5F5');
        ctx.textAlign = 'left';
    }

    drawGameOver(ctx) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 44px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', W / 2, H / 2 - 40);
        this._drawBtn(ctx, W / 2, H / 2 + 20, 180, 44, '重试', '#FF9800', '#FFA726');
        this._drawBtn(ctx, W / 2, H / 2 + 80, 180, 44, '返回菜单', '#F44336', '#EF5350');
        ctx.font = '14px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#AAA';
        ctx.fillText('按 Enter 重试 | ESC 返回菜单', W / 2, H / 2 + 125);
        ctx.textAlign = 'left';
    }

    _drawBtn(ctx, x, y, w, h, text, color, hoverColor) {
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.roundRect(x - w / 2, y - h / 2, w, h, 10); ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = '18px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(text, x, y + 6);
        ctx.textAlign = 'left';
    }

    getButtonAt(state, mx, my) {
        if (state === ST.MENU) {
            if (this._inBtn(W / 2, 300, 220, 50, mx, my)) return 'play';
            if (this._inBtn(W / 2, 370, 220, 50, mx, my)) return 'select';
        } else if (state === ST.SELECT) {
            for (let i = 0; i < 4; i++) {
                if (this._inBtn(120 + i * 155, 88, 120, 36, mx, my)) return `world_${i}`;
            }
            for (let i = 0; i < 5; i++) {
                if (this._inBtn(120 + i * 130, 190, 90, 100, mx, my)) return `level_${this.selectedWorld}_${i}`;
            }
            if (this._inBtn(W / 2, H - 50, 160, 40, mx, my)) return 'back';
        } else if (state === ST.PAUSE) {
            if (this._inBtn(W / 2, H / 2 + 60, 180, 44, mx, my)) return 'menu';
        } else if (state === ST.WIN) {
            if (this._inBtn(W / 2, H / 2 + 80, 180, 44, mx, my)) return 'next';
            if (this._inBtn(W / 2, H / 2 + 135, 180, 44, mx, my)) return 'menu';
        } else if (state === ST.DEAD) {
            if (this._inBtn(W / 2, H / 2 + 20, 180, 44, mx, my)) return 'retry';
            if (this._inBtn(W / 2, H / 2 + 80, 180, 44, mx, my)) return 'menu';
        }
        return null;
    }

    _inBtn(x, y, w, h, mx, my) {
        return mx >= x - w / 2 && mx <= x + w / 2 && my >= y - h / 2 && my <= y + h / 2;
    }
}

// === main.js ===
// main.js - Game engine and main loop

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = W;
        this.canvas.height = H;

        this.ui = new UI();
        this.effects = new Effects();
        this.state = ST.MENU;
        this.level = null;
        this.player = null;
        this.camX = 0;
        this.camY = 0;
        this.currentWorld = 0;
        this.currentLevel = 0;
        this.winTimer = 0;
        this.deathTimer = 0;
        this.frameCount = 0;

        // Input
        this.input = {
            left: false, right: false, up: false, down: false,
            jump: false, jumpPressed: false, dashPressed: false,
        };
        this._prevJump = false;
        this._prevDash = false;

        this._bindEvents();
        this._loop();
    }

    _bindEvents() {
        window.addEventListener('keydown', e => {
            this._key(e, true);
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        });
        window.addEventListener('keyup', e => this._key(e, false));
        this.canvas.addEventListener('click', e => this._click(e));
        this.canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const r = this.canvas.getBoundingClientRect();
            const sx = W / r.width, sy = H / r.height;
            const t = e.touches[0];
            this._clickAt((t.clientX - r.left) * sx, (t.clientY - r.top) * sy);
        });
    }

    _key(e, down) {
        const k = e.key;
        if (KEYS.LEFT.includes(k)) this.input.left = down;
        if (KEYS.RIGHT.includes(k)) this.input.right = down;
        if (KEYS.UP.includes(k)) this.input.up = down;
        if (KEYS.DOWN.includes(k)) this.input.down = down;
        if (KEYS.JUMP.includes(k)) this.input.jump = down;
        if (KEYS.DASH.includes(k)) this.input.dashPressed = down;
        if (down && KEYS.PAUSE.includes(k)) this._handlePause();
        if (down && k === 'Enter' && this.state === ST.DEAD) this._restartFromDead('retry');
    }

    _click(e) {
        const r = this.canvas.getBoundingClientRect();
        const sx = W / r.width, sy = H / r.height;
        this._clickAt((e.clientX - r.left) * sx, (e.clientY - r.top) * sy);
    }

    _clickAt(mx, my) {
        Sound.click();
        const btn = this.ui.getButtonAt(this.state, mx, my);
        if (!btn) return;

        switch (this.state) {
            case ST.MENU:
                if (btn === 'play') { this.currentWorld = 0; this.currentLevel = 0; this._startLevel(0, 0); }
                if (btn === 'select') this.state = ST.SELECT;
                break;
            case ST.SELECT:
                if (btn === 'back') { this.state = ST.MENU; break; }
                if (btn.startsWith('world_')) { this.ui.selectedWorld = +btn.split('_')[1]; break; }
                if (btn.startsWith('level_')) {
                    const [, w, l] = btn.split('_').map(Number);
                    if (this.ui.isLevelUnlocked(w, l)) this._startLevel(w, l);
                }
                break;
            case ST.PAUSE:
                if (btn === 'menu') { this.state = ST.MENU; }
                break;
            case ST.WIN:
                if (btn === 'next') {
                    const next = this.currentWorld * 5 + this.currentLevel + 1;
                    if (next < getTotalLevels()) {
                        this._startLevel(Math.floor(next / 5), next % 5);
                    } else {
                        this.state = ST.MENU;
                    }
                }
                if (btn === 'menu') this.state = ST.MENU;
                break;
            case ST.DEAD:
                if (btn === 'retry') this._startLevel(this.currentWorld, this.currentLevel);
                if (btn === 'menu') this.state = ST.MENU;
                break;
        }
    }

    _handlePause() {
        if (this.state === ST.PLAY) this.state = ST.PAUSE;
        else if (this.state === ST.PAUSE) this.state = ST.PLAY;
        else if (this.state === ST.DEAD) this._restartFromDead('menu');
    }

    _restartFromDead(action) {
        if (action === 'retry') this._startLevel(this.currentWorld, this.currentLevel);
        else if (action === 'menu') this.state = ST.MENU;
    }

    _startLevel(world, level) {
        this.currentWorld = world;
        this.currentLevel = level;
        this.level = new Level(world, level);
        this.player = new Player(this.level.playerSpawn.x, this.level.playerSpawn.y);
        this.effects = new Effects();
        this.camX = 0; this.camY = 0;
        this.winTimer = 0; this.deathTimer = 0;
        this.state = ST.PLAY;
    }

    _loop() {
        this.frameCount++;
        this._update();
        this._draw();
        requestAnimationFrame(() => this._loop());
    }

    _update() {
        if (this.state !== ST.PLAY) return;

        // Process input edges
        this.input.jumpPressed = this.input.jump && !this._prevJump;
        this.input.dashPressed = this.input.dashPressed && !this._prevDash;

        // Update player
        this.player.update(this.input, this.level, this.effects);

        // Reset edge flags after player update
        this._prevJump = this.input.jump;
        this._prevDash = this.input.dashPressed;

        // Update level
        this.level.updateMovingPlatforms();
        this.level.updateLava();

        // Update enemies
        for (const e of this.level.enemies) {
            if (!e.alive) continue;
            if (e.update.length === 2) e.update(this.level, this.player.x);
            else e.update(this.level);

            // Turret projectiles vs player
            if (e.getProjectiles) {
                for (const p of e.getProjectiles()) {
                    if (this._rectsOverlap(p, this.player.getBounds())) {
                        this.player.takeDamage(this.effects);
                        p.life = 0;
                    }
                }
            }

            // Enemy vs player collision
            if (this._rectsOverlap(e.getBounds(), this.player.getBounds())) {
                // Stomp check: player falling and above enemy center
                if (this.player.vy > 0 && this.player.y + this.player.h < e.y + e.h * 0.5) {
                    e.stomped(this.effects);
                    this.player.vy = -8;
                    Sound.coin();
                } else if (this.player.dashTimer > 0) {
                    // Dash through enemy
                    e.stomped(this.effects);
                } else {
                    this.player.takeDamage(this.effects);
                }
            }
        }

        // Collectibles
        for (const c of this.level.collectibles) {
            c.update();
            if (c.overlaps(this.player.getBounds())) {
                if (c.constructor.name === 'Star') {
                    c.collected = true;
                    this.player.stars[c.index] = true;
                    Sound.star();
                    this.effects.starCollect(c.x + c.w / 2, c.y + c.h / 2);
                } else if (c.constructor.name === 'Coin') {
                    c.collected = true;
                    this.player.coins += c.value;
                    Sound.coin();
                    this.effects.coinCollect(c.x + c.w / 2, c.y + c.h / 2);
                } else if (c.constructor.name === 'Key') {
                    c.collected = true;
                    this.player.keys++;
                    Sound.key();
                    this.effects.coinCollect(c.x + c.w / 2, c.y + c.h / 2);
                } else if (c.constructor.name === 'Door') {
                    if (!c.open && this.player.keys > 0) {
                        c.tryOpen(this.player);
                        Sound.door();
                    }
                }
            }
        }

        // Goal check
        const goalBounds = { x: this.level.goal.x, y: this.level.goal.y, w: 32, h: 40 };
        if (this._rectsOverlap(this.player.getBounds(), goalBounds)) {
            this.winTimer++;
            if (this.winTimer === 1) {
                Sound.win();
                this.effects.goalEffect(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2);
            }
            if (this.winTimer > 60) {
                const starCount = this.player.stars.filter(Boolean).length;
                this.ui.completeLevel(this.currentWorld, this.currentLevel, starCount);
                this.state = ST.WIN;
            }
        } else {
            this.winTimer = 0;
        }

        // Lava death (only trigger once)
        if (this.player.alive && this.level.checkLavaDeath(this.player)) {
            this.player.health = 0;
            this.player.alive = false;
            Sound.die();
            this.effects.death(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2);
        }

        // Death
        if (!this.player.alive) {
            this.deathTimer++;
            if (this.deathTimer > 90) this.state = ST.DEAD;
        }

        // Fall off map (only trigger once — without guard, deathTimer resets every frame and the game freezes)
        if (this.player.alive && this.player.y > this.level.rows * TILE + 100) {
            this.player.health = 0;
            this.player.alive = false;
            Sound.die();
            this.deathTimer = 60;
        }

        // Camera
        this._updateCamera();

        // Effects
        this.effects.update();
    }

    _updateCamera() {
        const targetX = this.player.x + this.player.w / 2 - W / 2;
        const targetY = this.player.y + this.player.h / 2 - H / 2;
        this.camX += (targetX - this.camX) * 0.1;
        this.camY += (targetY - this.camY) * 0.1;
        this.camX = Math.max(0, Math.min(this.level.cols * TILE - W, this.camX));
        this.camY = Math.max(0, Math.min(this.level.rows * TILE - H, this.camY));
    }

    _rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + (a.w || 0) > b.x &&
               a.y < b.y + b.h && a.y + (a.h || 0) > b.y;
    }

    _draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, W, H);

        switch (this.state) {
            case ST.MENU:
                this.ui.drawMenu(ctx);
                break;
            case ST.SELECT:
                this.ui.drawLevelSelect(ctx);
                break;
            case ST.PLAY:
            case ST.PAUSE:
            case ST.WIN:
            case ST.DEAD:
                this._drawGame(ctx);
                if (this.state === ST.PAUSE) this.ui.drawPause(ctx);
                if (this.state === ST.WIN) this.ui.drawLevelComplete(ctx, this.player.stars.filter(Boolean).length, this.player.coins);
                if (this.state === ST.DEAD) this.ui.drawGameOver(ctx);
                break;
        }
    }

    _drawGame(ctx) {
        // Background
        this.level.drawBackground(ctx, this.camX, this.camY);

        // Tiles
        this.level.drawTiles(ctx, this.camX, this.camY);

        // Moving platforms
        this.level.drawMovingPlatforms(ctx, this.camX, this.camY);

        // Lava (rising)
        this.level.drawLava(ctx, this.camX, this.camY);

        // Goal
        this.level.drawGoal(ctx, this.camX, this.camY);

        // Collectibles
        for (const c of this.level.collectibles) c.draw(ctx, this.camX, this.camY);

        // Enemies
        for (const e of this.level.enemies) {
            if (e.alive) e.draw(ctx, this.camX, this.camY);
        }

        // Player
        this.player.draw(ctx, this.camX, this.camY);

        // Effects
        this.effects.draw(ctx, this.camX, this.camY);

        // HUD
        this.ui.drawHUD(ctx, this.player, this.level);
    }
}

// Start
new Game());


</script>
