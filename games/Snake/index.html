<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(76,175,80,0.3);background:#111}
        #hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#4caf50;font-weight:bold}
        .hud-restart{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);padding:8px 14px;border-radius:8px;font-size:12px;color:#aaa;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px)}
        .hud-restart:hover{background:rgba(76,175,80,0.3);color:#4caf50;border-color:#4caf50}
        .screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
        .screen.hidden{display:none}
        #startScreen{background:linear-gradient(135deg,#0a0a0a 0%,#0a2a0a 50%,#0a0a0a 100%)}
        #gameOverScreen{background:rgba(0,0,0,0.9)}
        .title{font-size:56px;color:#4caf50;text-shadow:0 0 30px rgba(76,175,80,0.6);margin-bottom:10px;letter-spacing:6px}
        .subtitle{font-size:16px;color:#666;margin-bottom:20px}
        .menu-btn{background:linear-gradient(135deg,#4caf50 0%,#388e3c 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(76,175,80,0.5)}
        .mode-btns{display:flex;gap:12px;margin-top:15px}
        .mode-btn{background:rgba(255,255,255,0.1);border:2px solid #333;padding:12px 24px;font-size:15px;color:#aaa;border-radius:8px;cursor:pointer;transition:all 0.3s}
        .mode-btn:hover,.mode-btn.active{border-color:#4caf50;color:#4caf50;background:rgba(76,175,80,0.1)}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 24px;max-width:420px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#4caf50;font-size:14px;margin-bottom:6px;text-align:center}
        .food-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;justify-content:center}
        .food-item{font-size:12px;color:#888;display:flex;align-items:center;gap:4px}
        .food-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
        #gameOverStats{font-size:20px;color:#aaa;margin-bottom:25px;text-align:center;line-height:1.6}
        #pauseOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:150;flex-direction:column}
        #pauseOverlay.active{display:flex}
        #pauseText{font-size:48px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5)}
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">长度: <span id="length">3</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
        <button class="hud-restart" onclick="startGame()" title="重新开始 (R)">↺ 重新开始</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="screen">
        <div class="title">贪吃蛇</div>
        <div class="subtitle">大作战</div>
        <div class="mode-btns">
            <button class="mode-btn active" data-mode="classic" onclick="setMode('classic',this)">经典</button>
            <button class="mode-btn" data-mode="nowrap" onclick="setMode('nowrap',this)">穿墙</button>
            <button class="mode-btn" data-mode="maze" onclick="setMode('maze',this)">迷宫</button>
        </div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>🎮 操作说明</h3>
            <div>WASD / 方向键 控制蛇的移动方向</div>
            <div>P 暂停游戏</div>
            <div>R 重新开始</div>
            <h3 style="margin-top:8px">🎯 游戏规则</h3>
            <div>吃食物让蛇变长 | 不要撞墙或撞到自己</div>
            <div><b>经典</b>：撞墙死亡 | <b>穿墙</b>：从对面穿出 | <b>迷宫</b>：有障碍墙</div>
            <h3 style="margin-top:8px">🍎 食物类型</h3>
            <div class="food-legend">
                <div class="food-item"><span class="food-dot" style="background:#f44336"></span>普通+1</div>
                <div class="food-item"><span class="food-dot" style="background:#ffeb3b"></span>加速</div>
                <div class="food-item"><span class="food-dot" style="background:#2196f3"></span>减速</div>
                <div class="food-item"><span class="food-dot" style="background:#ffd700"></span>双倍分</div>
                <div class="food-item"><span class="food-dot" style="background:#9c27b0"></span>毒食物-2</div>
            </div>
        </div>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <div class="title" style="color:#f44336;text-shadow:0 0 30px rgba(244,67,54,0.6)">游戏结束</div>
        <div id="gameOverStats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
        <button class="menu-btn" style="background:#555" onclick="showMenu()">返回菜单</button>
    </div>

    <div id="pauseOverlay"><div id="pauseText">⏸ 暂停</div><div style="color:#888;margin-top:10px">按 P 继续</div></div>

<script type="module" src="js/main.js"></script>

</body>
</html>
