<!DOCTYPE html>
<html lang="zh-CN">

    <style>

        #startScreen{background:linear-gradient(135deg,#0a0a0a 0%,#0a2a0a 50%,#0a0a0a 100%)}

<body>
    <div id="hud">

            <div><b>经典</b>：撞墙死亡 | <b>穿墙</b>：从对面穿出 | <b>迷宫</b>：有障碍墙</div>

            <div class="food-legend">
                <div class="food-item"><span class="food-dot" style="background:#f44336"></span>普通+1</div>

                <div class="food-item"><span class="food-dot" style="background:#2196f3"></span>减速</div>

<script>
// === ./config.js ===
/** 常量配置 */
const CELL = 20;
const COLS = 30;
const ROWS = 25;

/** 食物类型定义 */
const FOOD_TYPES = [
    { type: 'normal', color: '#f44336', weight: 50 },
    { type: 'speed',  color: '#ffeb3b', weight: 15 },
    { type: 'slow',   color: '#2196f3', weight: 15 },
    { type: 'double', color: '#ffd700', weight: 10 },
    { type: 'poison', color: '#9c27b0', weight: 10 }
];

/** 基础移动间隔（毫秒） */
const BASE_MOVE_INTERVAL = 80;

// === ./sound.js ===
/** Web Audio API 音效系统 */
const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'eat':
                o.type = 'sine';
                o.frequency.setValueAtTime(500, t);
                o.frequency.exponentialRampToValueAtTime(1000, t + 0.08);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;
            case 'die':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.4);
                g.gain.setValueAtTime(0.15, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                o.start(t);
                o.stop(t + 0.4);
                break;
            case 'special':
                o.type = 'sine';
                o.frequency.setValueAtTime(800, t);
                o.frequency.setValueAtTime(1000, t + 0.05);
                o.frequency.setValueAtTime(1200, t + 0.1);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                o.start(t);
                o.stop(t + 0.15);
                break;
        }
    }
};

// === ./snake.js ===

/**
 * 蛇类：管理蛇的状态、移动、碰撞检测和渲染
 */
class Snake {
    constructor() {
        /** @type {{x:number, y:number}[]} */
        this.body = [];
        /** @type {{x:number, y:number}} */
        this.dir = { x: 1, y: 0 };
        /** @type {{x:number, y:number}} */
        this.nextDir = { x: 1, y: 0 };
        /** @type {{x:number, y:number}[]} */
        this.mazeWalls = [];
        /** 道具计时器（帧数） */
        this.speedBoost = 0;
        this.speedSlow = 0;
        this.doubleScore = 0;
    }

    /** 初始化蛇到地图中央 */
    init() {
        const cx = Math.floor(COLS / 2);
        const cy = Math.floor(ROWS / 2);
        this.body = [
            { x: cx,     y: cy },
            { x: cx - 1, y: cy },
            { x: cx - 2, y: cy }
        ];
        this.dir = { x: 1, y: 0 };
        this.nextDir = { x: 1, y: 0 };
        this.speedBoost = 0;
        this.speedSlow = 0;
        this.doubleScore = 0;
        this.mazeWalls = [];
    }

    /** 生成迷宫墙壁 */
    generateMaze() {
        this.mazeWalls = [];
        const midX = Math.floor(COLS / 2);
        const midY = Math.floor(ROWS / 2);

        // 上下横墙
        for (let x = 5; x < COLS - 5; x++) {
            if (x !== midX) {
                this.mazeWalls.push({ x, y: 5 });
                this.mazeWalls.push({ x, y: ROWS - 6 });
            }
        }
        // 左右竖墙
        for (let y = 5; y < ROWS - 5; y++) {
            if (y !== midY) {
                this.mazeWalls.push({ x: 5, y });
                this.mazeWalls.push({ x: COLS - 6, y });
            }
        }
        // 中间横墙
        for (let x = 10; x < 20; x++) {
            if (x !== 15) this.mazeWalls.push({ x, y: 12 });
        }
    }

    /** 蛇头位置 */
    get head() {
        return this.body[0];
    }

    /** 蛇长度 */
    get length() {
        return this.body.length;
    }

    /** 设置下一步方向（防止180度反转和快速双键） */
    setDirection(dx, dy) {
        if (this.dir.y !== -dy && this.nextDir.y !== -dy &&
            this.dir.x !== -dx && this.nextDir.x !== -dx) {
            this.nextDir = { x: dx, y: dy };
        }
    }

    /** 检查坐标是否是迷宫墙壁 */
    isMazeWall(x, y) {
        return this.mazeWalls.some(w => w.x === x && w.y === y);
    }

    /** 检查坐标是否在蛇身上（可选排除尾部，因为尾部本帧会移走） */
    isBody(x, y, excludeTail = false) {
        const len = excludeTail ? this.body.length - 1 : this.body.length;
        for (let i = 0; i < len; i++) {
            if (this.body[i].x === x && this.body[i].y === y) return true;
        }
        return false;
    }

    /**
     * 移动一步，返回碰撞结果
     * @param {'classic'|'nowrap'|'maze'} mode
     * @returns {'ok'|'wall'|'self'|'maze_wall'}
     */
    move(mode) {
        this.dir = { ...this.nextDir };
        const newHead = {
            x: this.head.x + this.dir.x,
            y: this.head.y + this.dir.y
        };

        // 穿墙模式：坐标回绕
        if (mode === 'nowrap') {
            if (newHead.x < 0) newHead.x = COLS - 1;
            if (newHead.x >= COLS) newHead.x = 0;
            if (newHead.y < 0) newHead.y = ROWS - 1;
            if (newHead.y >= ROWS) newHead.y = 0;
        }

        // 碰撞检测
        const hitWall = mode !== 'nowrap' &&
            (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS);
        const hitMaze = this.isMazeWall(newHead.x, newHead.y);
        const hitSelf = this.isBody(newHead.x, newHead.y, true);

        if (hitWall) return 'wall';
        if (hitMaze) return 'maze_wall';
        if (hitSelf) return 'self';

        this.body.unshift(newHead);
        return 'ok';
    }

    /** 移除蛇尾（不吃食物时调用） */
    removeTail() {
        this.body.pop();
    }

    /** 缩短蛇身（毒食物效果，保证最少3节） */
    shrink(count) {
        for (let i = 0; i < count && this.body.length > 3; i++) {
            this.body.pop();
        }
    }

    /** 每帧递减道具计时器 */
    tickPowerups() {
        if (this.speedBoost > 0) this.speedBoost--;
        if (this.speedSlow > 0) this.speedSlow--;
        if (this.doubleScore > 0) this.doubleScore--;
    }

    /** 计算当前移动间隔 */
    getMoveInterval(baseInterval) {
        let interval = baseInterval;
        if (this.speedBoost > 0) interval *= 0.6;
        if (this.speedSlow > 0) interval *= 1.5;
        return interval;
    }

    /** 绘制蛇和迷宫墙壁 */
    draw(ctx) {
        // 迷宫墙壁
        for (const w of this.mazeWalls) {
            ctx.fillStyle = '#455a64';
            ctx.fillRect(w.x * CELL, w.y * CELL, CELL, CELL);
            ctx.fillStyle = '#37474f';
            ctx.fillRect(w.x * CELL + 2, w.y * CELL + 2, CELL - 4, CELL - 4);
        }

        // 蛇身
        this.body.forEach((seg, i) => {
            const t = i / this.body.length;
            ctx.fillStyle = `rgb(${Math.floor(76 + t * 50)},${Math.floor(175 - t * 80)},${Math.floor(80 + t * 30)})`;
            const px = seg.x * CELL;
            const py = seg.y * CELL;
            const pad = i === 0 ? 1 : 2;

            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, 4);
            } else {
                ctx.rect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2);
            }
            ctx.fill();

            // 蛇头眼睛
            if (i === 0) {
                ctx.fillStyle = '#fff';
                const ex1 = px + CELL / 2 + this.dir.x * 4 - this.dir.y * 3;
                const ey1 = py + CELL / 2 + this.dir.y * 4 - this.dir.x * 3;
                const ex2 = px + CELL / 2 + this.dir.x * 4 + this.dir.y * 3;
                const ey2 = py + CELL / 2 + this.dir.y * 4 + this.dir.x * 3;
                ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(ex1 + this.dir.x, ey1 + this.dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(ex2 + this.dir.x, ey2 + this.dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
            }
        });

        // 道具特效覆盖层
        if (this.speedBoost > 0) {
            ctx.fillStyle = 'rgba(255,235,59,0.1)';
            ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        }
        if (this.speedSlow > 0) {
            ctx.fillStyle = 'rgba(33,150,243,0.1)';
            ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        }
        if (this.doubleScore > 0) {
            ctx.fillStyle = 'rgba(255,215,0,0.08)';
            ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        }
    }
}

// === ./food.js ===

/**
 * 食物系统：生成、存储和渲染食物
 */
class Food {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.type = 'normal';
        this.color = '#f44336';
        this.pulse = 0;
    }

    /**
     * 生成新食物
     * @param {(x:number,y:number)=>boolean} isBlocked 检查坐标是否被占用
     */
    spawn(isBlocked) {
        // 按权重随机选择类型
        const total = FOOD_TYPES.reduce((s, t) => s + t.weight, 0);
        let r = Math.random() * total;
        let chosen = FOOD_TYPES[0];
        for (const t of FOOD_TYPES) {
            r -= t.weight;
            if (r <= 0) { chosen = t; break; }
        }

        // 寻找空位
        let fx, fy, tries = 0;
        do {
            fx = Math.floor(Math.random() * COLS);
            fy = Math.floor(Math.random() * ROWS);
            tries++;
        } while (isBlocked(fx, fy) && tries < 1000);

        this.x = fx;
        this.y = fy;
        this.type = chosen.type;
        this.color = chosen.color;
        this.pulse = 0;
    }

    /**
     * 绘制食物（含脉冲动画）
     * @param {CanvasRenderingContext2D} ctx
     */
    draw(ctx) {
        this.pulse += 0.05;
        const pr = Math.sin(this.pulse) * 0.2 + 1;
        const cx = this.x * CELL + CELL / 2;
        const cy = this.y * CELL + CELL / 2;

        // 光晕
        ctx.fillStyle = this.color + '30';
        ctx.beginPath();
        ctx.arc(cx, cy, CELL * pr * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // 实体
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(cx, cy, CELL / 2 * pr * 0.8, 0, Math.PI * 2);
        ctx.fill();
    }
}

// === ./ui.js ===
/** UI 管理：HUD、菜单、模式选择、游戏结束画面 */

const els = {
    score:       () => document.getElementById('score'),
    length:      () => document.getElementById('length'),
    high:        () => document.getElementById('high'),
    startScreen: () => document.getElementById('startScreen'),
    overScreen:  () => document.getElementById('gameOverScreen'),
    overStats:   () => document.getElementById('gameOverStats'),
    pauseOverlay:() => document.getElementById('pauseOverlay'),
};

/** 更新 HUD 数值 */
function updateHUD(score, length, highScore) {
    els.score().textContent  = score;
    els.length().textContent = length;
    els.high().textContent   = highScore || localStorage.getItem('snake_high') || 0;
}

/** 设置游戏模式并高亮按钮 */
function setMode(mode, el) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    return mode;
}

/** 显示开始菜单 */
function showStartScreen() {
    els.overScreen().classList.add('hidden');
    els.startScreen().classList.remove('hidden');
}

/** 隐藏所有覆盖层，准备开始游戏 */
function hideAllScreens() {
    els.startScreen().classList.add('hidden');
    els.overScreen().classList.add('hidden');
    els.pauseOverlay().classList.remove('active');
}

/** 切换暂停覆盖层 */
function togglePause(paused) {
    els.pauseOverlay().classList.toggle('active', paused);
}

/** 显示游戏结束画面 */
function showGameOver(score, length, highScore) {
    els.overScreen().classList.remove('hidden');
    els.overStats().innerHTML =
        `分数: ${score}<br>长度: ${length}<br>最高: ${highScore || 0}`;
}

// === main.js ===

// ── Canvas 初始化 ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// ── 游戏状态 ──
let mode = 'classic';
let snake = new Snake();
let food  = new Food();
let score = 0;
let highScore = parseInt(localStorage.getItem('snake_high')) || 0;
let alive = true;
let paused = false;
let gameTimer = 0;
let lastTimestamp = 0;
let moveAccum = 0;
let gameOverTimeout = null;

// ── 模式选择 ──
window.setMode = function (m, el) {
    mode = UI.setMode(m, el);
};

// ── 开始游戏 ──
window.startGame = function () {
    try { Sound.init(); } catch (e) { /* AudioContext 不可用时静默跳过 */ }

    // 清除上一局的 game-over 定时器，防止它覆盖新游戏
    if (gameOverTimeout) { clearTimeout(gameOverTimeout); gameOverTimeout = null; }

    // 停止旧的游戏循环，重新启动
    if (gameTimer) { cancelAnimationFrame(gameTimer); gameTimer = 0; }

    UI.hideAllScreens();

    snake.init();
    if (mode === 'maze') snake.generateMaze();
    food.spawn((x, y) => snake.isBody(x, y, false) || snake.isMazeWall(x, y));

    score = 0;
    alive = true;
    paused = false;
    lastTimestamp = 0;
    moveAccum = 0;
    UI.updateHUD(score, snake.length, highScore);

    gameTimer = requestAnimationFrame(gameLoop);
};

// ── 返回菜单 ──
window.showMenu = function () {
    UI.showStartScreen();
};

// ── 键盘事件 ──
window.addEventListener('keydown', e => {
    if (e.code === 'KeyP') {
        paused = !paused;
        UI.togglePause(paused);
        return;
    }
    if (e.code === 'KeyR') {
        window.startGame();
        return;
    }
    if (paused) return;

    switch (e.code) {
        case 'ArrowUp':    case 'KeyW': snake.setDirection( 0, -1); e.preventDefault(); break;
        case 'ArrowDown':  case 'KeyS': snake.setDirection( 0,  1); e.preventDefault(); break;
        case 'ArrowLeft':  case 'KeyA': snake.setDirection(-1,  0); e.preventDefault(); break;
        case 'ArrowRight': case 'KeyD': snake.setDirection( 1,  0); e.preventDefault(); break;
    }
});

// ── 游戏主循环（使用 timestamp 计算 delta-time） ──
function gameLoop(timestamp) {
    gameTimer = requestAnimationFrame(gameLoop);

    if (!alive || paused) return;

    // 首帧初始化 timestamp
    if (lastTimestamp === 0) lastTimestamp = timestamp;
    const delta = timestamp - lastTimestamp;
    lastTimestamp = timestamp;

    const interval = snake.getMoveInterval(BASE_MOVE_INTERVAL);

    // 累积时间，处理可能的多次移动（防止极低帧率时蛇变慢）
    moveAccum += delta;
    let moved = false;

    while (moveAccum >= interval) {
        moveAccum -= interval;
        moved = true;

        // ── 移动 ──
        const result = snake.move(mode);

        if (result !== 'ok') {
            alive = false;
            Sound.play('die');
            highScore = Math.max(highScore, score);
            localStorage.setItem('snake_high', highScore);
            gameOverTimeout = setTimeout(() => UI.showGameOver(score, snake.length, highScore), 500);
            moveAccum = 0;
            return;
        }

        // ── 吃食物 ──
        const head = snake.head;
        if (head.x === food.x && head.y === food.y) {
            let pts = 1;
            switch (food.type) {
                case 'normal': pts = 1; Sound.play('eat'); break;
                case 'speed':  snake.speedBoost  = 120; Sound.play('special'); break;
                case 'slow':   snake.speedSlow   = 120; Sound.play('special'); break;
                case 'double': snake.doubleScore = 120; Sound.play('special'); break;
                case 'poison': pts = -2; Sound.play('die'); snake.shrink(2); break;
            }
            if (snake.doubleScore > 0) pts *= 2;
            score = Math.max(0, score + pts);
            food.spawn((x, y) => snake.isBody(x, y, false) || snake.isMazeWall(x, y));
        } else {
            snake.removeTail();
        }

        snake.tickPowerups();
    }

    // ── 绘制 ──
    if (moved) UI.updateHUD(score, snake.length, highScore);
    draw();
}

// ── 绘制场景 ──
function draw() {
    // 背景
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 网格
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // 食物和蛇
    food.draw(ctx);
    snake.draw(ctx);
}

// ── 初始 HUD 显示 ──
UI.updateHUD(0, 3, highScore);


</script>
