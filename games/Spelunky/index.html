<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矿洞探险 - Cave Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0503;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', monospace;
        }
        #gameContainer {
            position: relative;
            border: 2px solid rgba(180,140,60,0.3);
            border-radius: 4px;
            box-shadow:
                0 0 20px rgba(180,140,60,0.1),
                0 0 60px rgba(10,5,2,0.8),
                inset 0 0 20px rgba(10,5,2,0.5);
        }
        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4a040;
            font-size: 18px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="loading" id="loading">加载中...</div>
    </div>
    <script type="module">
        import './js/main.js';
        document.getElementById('loading').style.display = 'none';
    </script>

</body>
</html>
