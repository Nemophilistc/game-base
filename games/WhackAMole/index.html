<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff;user-select:none}
        .header{font-size:42px;color:#ff9800;text-shadow:0 0 30px rgba(255,152,0,0.5);margin-bottom:10px;letter-spacing:4px}
        .info-bar{display:flex;gap:15px;margin-bottom:12px}
        .info-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
        .info-label{font-size:11px;color:#888;margin-bottom:4px}
        .info-val{font-size:20px;font-weight:bold;color:#ff9800}
        #board{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px}
        .hole{width:120px;height:120px;border-radius:50%;background:radial-gradient(ellipse,#1a1a0a,#0a0a00);border:3px solid #333;position:relative;cursor:pointer;overflow:hidden;transition:border-color 0.2s}
        .hole:hover{border-color:#555}
        .mole{position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);font-size:56px;transition:bottom 0.2s ease-out;pointer-events:none}
        .mole.up{bottom:10px}
        .mole.normal{filter:none}
        .mole.golden{filter:hue-rotate(40deg) brightness(1.5)}
        .mole.bomb{filter:hue-rotate(0deg) brightness(0.8)}
        .hole.hit{animation:hitFlash 0.3s}
        @keyframes hitFlash{0%{border-color:#4caf50;box-shadow:0 0 20px #4caf50}100%{border-color:#333;box-shadow:none}}
        .score-popup{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:bold;pointer-events:none;animation:floatUp 0.8s forwards;z-index:10}
        @keyframes floatUp{0%{opacity:1;top:10px}100%{opacity:0;top:-40px}}
        .combo-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.8);pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:20}
        .combo-text.active{opacity:1}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(255,152,0,0.5)}
        .menu-btn{background:linear-gradient(135deg,#ff9800 0%,#f57c00 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(255,152,0,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#ff9800;font-size:14px;margin-bottom:6px;text-align:center}
        .time-bar{width:400px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin-bottom:10px;overflow:hidden}
        .time-fill{height:100%;background:linear-gradient(90deg,#ff9800,#f44336);border-radius:4px;transition:width 0.5s}
    </style>
</head>
<body>
    <div class="header">打地鼠</div>
    <div class="info-bar">
        <div class="info-box"><div class="info-label">分数</div><div class="info-val" id="score">0</div></div>
        <div class="info-box"><div class="info-label">连击</div><div class="info-val" id="combo">0</div></div>
        <div class="info-box"><div class="info-label">最高</div><div class="info-val" id="high">0</div></div>
    </div>
    <div class="time-bar"><div class="time-fill" id="timeFill"></div></div>
    <div id="board"></div>
    <div class="combo-text" id="comboText"></div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#ff9800">打地鼠</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击冒出的地鼠得分</div>
            <div>🐀 普通地鼠 +10分</div>
            <div>⭐ 金色地鼠 +30分</div>
            <div>💣 炸弹地鼠 -20分（别点！）</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>限时30秒，连续命中增加连击倍率</div>
            <div>连击越高分数越多！</div>
        </div>
    </div>

    <div id="endOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#ff9800">时间到！</div>
        <div id="endStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script type="module" src="js/main.js"></script>

</body>
</html>
