class UI {
    constructor(canvas) {
        this.canvas = canvas;
        this.upgradeOptions = [];
        this.showingUpgrades = false;
        this.selectedOption = -1;
        this.rerollsAvailable = 0;
        this.onSelect = null;
        this.onReroll = null;
        this.showingGameOver = false;
        this.gameOverStats = null;
        this.showingStart = true;
        this.showingPause = false;
        this.showingWeaponPanel = false;
    }

    showUpgradeOptions(options, rerolls, onSelect, onReroll) {
        this.upgradeOptions = options;
        this.showingUpgrades = true;
        this.selectedOption = -1;
        this.rerollsAvailable = rerolls;
        this.onSelect = onSelect;
        this.onReroll = onReroll;
    }

    hideUpgradeOptions() {
        this.showingUpgrades = false;
        this.upgradeOptions = [];
    }

    showGameOver(stats) {
        this.showingGameOver = true;
        this.gameOverStats = stats;
    }

    handleClick(mx, my) {
        if (this.showingUpgrades) {
            const cw = this.canvas.width;
            const ch = this.canvas.height;
            const cardW = 200;
            const cardH = 280;
            const gap = 30;
            const totalW = this.upgradeOptions.length * cardW + (this.upgradeOptions.length - 1) * gap;
            const startX = (cw - totalW) / 2;
            const startY = (ch - cardH) / 2;

            for (let i = 0; i < this.upgradeOptions.length; i++) {
                const cx = startX + i * (cardW + gap);
                if (mx >= cx && mx <= cx + cardW && my >= startY && my <= startY + cardH) {
                    this.onSelect(i);
                    return true;
                }
            }

            // 重随按钮
            if (this.rerollsAvailable > 0) {
                const rerollBtnX = cw / 2 - 60;
                const rerollBtnY = startY + cardH + 30;
                if (mx >= rerollBtnX && mx <= rerollBtnX + 120 && my >= rerollBtnY && my <= rerollBtnY + 40) {
                    this.onReroll();
                    return true;
                }
            }
        }

        if (this.showingGameOver) {
            const cw = this.canvas.width;
            const ch = this.canvas.height;
            const btnX = cw / 2 - 100;
            const btnY = ch / 2 + 120;
            if (mx >= btnX && mx <= btnX + 200 && my >= btnY && my <= btnY + 50) {
                return 'restart';
            }
        }

        if (this.showingStart) {
            const cw = this.canvas.width;
            const ch = this.canvas.height;
            const btnX = cw / 2 - 120;
            const btnY = ch / 2 + 60;
            if (mx >= btnX && mx <= btnX + 240 && my >= btnY && my <= btnY + 60) {
                return 'start';
            }
        }

        return false;
    }

    draw(ctx, player, gameTime, enemyCount, weaponSystem) {
        const cw = this.canvas.width;
        const ch = this.canvas.height;

        // HUD
        this._drawHUD(ctx, player, gameTime, enemyCount, cw, ch, weaponSystem);

        // 升级选择界面
        if (this.showingUpgrades) {
            this._drawUpgradePanel(ctx, cw, ch);
        }

        // 游戏结束界面
        if (this.showingGameOver) {
            this._drawGameOver(ctx, cw, ch);
        }

        // 开始界面
        if (this.showingStart) {
            this._drawStartScreen(ctx, cw, ch);
        }
    }

    _drawHUD(ctx, player, gameTime, enemyCount, cw, ch, weaponSystem) {
        ctx.save();

        // HP条
        const hpBarW = 250;
        const hpBarH = 16;
        const hpX = 20;
        const hpY = 20;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(hpX - 2, hpY - 2, hpBarW + 4, hpBarH + 4);
        ctx.fillStyle = '#333';
        ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
        const hpRatio = player.hp / player.maxHp;
        const hpColor = hpRatio > 0.5 ? '#44ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff4444';
        ctx.fillStyle = hpColor;
        ctx.fillRect(hpX, hpY, hpBarW * hpRatio, hpBarH);
        ctx.font = 'bold 12px Arial';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.ceil(player.hp)} / ${player.maxHp}`, hpX + hpBarW / 2, hpY + 13);

        // XP条
        const xpBarW = 250;
        const xpBarH = 8;
        const xpY = hpY + hpBarH + 6;
        const nextXP = XP_TABLE[player.level] || (XP_TABLE[XP_TABLE.length - 1] + (player.level - XP_TABLE.length + 1) * 500);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(hpX - 2, xpY - 2, xpBarW + 4, xpBarH + 4);
        ctx.fillStyle = '#222';
        ctx.fillRect(hpX, xpY, xpBarW, xpBarH);
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(hpX, xpY, xpBarW * (player.xp / nextXP), xpBarH);

        // 等级
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = '#ffcc00';
        ctx.textAlign = 'left';
        ctx.fillText(`Lv.${player.level}`, hpX, xpY + xpBarH + 18);

        // 时间
        const minutes = Math.floor(gameTime / 60);
        const seconds = Math.floor(gameTime % 60);
        ctx.font = 'bold 20px Arial';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(`${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`, cw / 2, 35);

        // 敌人数量
        ctx.font = '14px Arial';
        ctx.fillStyle = '#ff8888';
        ctx.textAlign = 'right';
        ctx.fillText(`敌人: ${enemyCount}`, cw - 20, 30);

        // 击杀数
        if (this.gameOverStats) {
            ctx.fillText(`击杀: ${this.gameOverStats.kills}`, cw - 20, 50);
        }

        // 武器列表
        const weaponKeys = Object.keys(weaponSystem.weapons);
        const weaponStartX = 20;
        const weaponStartY = ch - 50;
        ctx.font = '12px Arial';
        for (let i = 0; i < weaponKeys.length; i++) {
            const id = weaponKeys[i];
            const level = weaponSystem.weapons[id];
            const cfg = WEAPONS[id];
            const x = weaponStartX + i * 40;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(x, weaponStartY, 36, 36);
            ctx.strokeStyle = cfg.color;
            ctx.lineWidth = 1;
            ctx.strokeRect(x, weaponStartY, 36, 36);
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(cfg.icon, x + 18, weaponStartY + 22);
            ctx.font = 'bold 10px Arial';
            ctx.fillStyle = '#ffcc00';
            ctx.fillText(`${level}`, x + 18, weaponStartY + 34);
        }

        // 操作提示
        ctx.font = '12px Arial';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'right';
        ctx.fillText('WASD移动', cw - 20, ch - 20);

        ctx.restore();
    }

    _drawUpgradePanel(ctx, cw, ch) {
        // 半透明遮罩
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, cw, ch);

        // 标题
        ctx.font = 'bold 32px Arial';
        ctx.fillStyle = '#ffcc00';
        ctx.textAlign = 'center';
        ctx.fillText('选择升级', cw / 2, ch / 2 - 170);

        const cardW = 200;
        const cardH = 280;
        const gap = 30;
        const totalW = this.upgradeOptions.length * cardW + (this.upgradeOptions.length - 1) * gap;
        const startX = (cw - totalW) / 2;
        const startY = (ch - cardH) / 2;

        for (let i = 0; i < this.upgradeOptions.length; i++) {
            const opt = this.upgradeOptions[i];
            const cx = startX + i * (cardW + gap);

            // 卡片背景
            ctx.fillStyle = 'rgba(30,30,60,0.9)';
            ctx.strokeStyle = opt.color || '#ffcc00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(cx, startY, cardW, cardH, 12);
            ctx.fill();
            ctx.stroke();

            // 图标
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(opt.icon, cx + cardW / 2, startY + 70);

            // 名称
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = opt.color || '#ffcc00';
            ctx.fillText(opt.name, cx + cardW / 2, startY + 120);

            // 类型标签
            ctx.font = '12px Arial';
            ctx.fillStyle = '#aaa';
            const typeLabel = opt.type === 'new_weapon' ? '新武器' :
                opt.type === 'upgrade_weapon' ? '武器升级' : '属性强化';
            ctx.fillText(typeLabel, cx + cardW / 2, startY + 145);

            // 描述
            ctx.font = '14px Arial';
            ctx.fillStyle = '#ccc';
            // 简单的换行
            const words = opt.desc;
            const lines = [];
            let line = '';
            for (const char of words) {
                line += char;
                if (line.length >= 10) {
                    lines.push(line);
                    line = '';
                }
            }
            if (line) lines.push(line);
            for (let j = 0; j < lines.length; j++) {
                ctx.fillText(lines[j], cx + cardW / 2, startY + 175 + j * 20);
            }

            // 快捷键提示
            ctx.font = 'bold 16px Arial';
            ctx.fillStyle = '#ffcc00';
            ctx.fillText(`[${i + 1}]`, cx + cardW / 2, startY + cardH - 20);
        }

        // 重随按钮
        if (this.rerollsAvailable > 0) {
            const rerollBtnX = cw / 2 - 60;
            const rerollBtnY = startY + cardH + 30;
            ctx.fillStyle = 'rgba(60,60,100,0.9)';
            ctx.strokeStyle = '#8888ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(rerollBtnX, rerollBtnY, 120, 40, 8);
            ctx.fill();
            ctx.stroke();
            ctx.font = 'bold 16px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(`重随 (${this.rerollsAvailable})`, cw / 2, rerollBtnY + 27);
        }

        ctx.restore();
    }

    _drawGameOver(ctx, cw, ch) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, cw, ch);

        const stats = this.gameOverStats;
        ctx.font = 'bold 48px Arial';
        ctx.fillStyle = '#ff4444';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', cw / 2, ch / 2 - 100);

        ctx.font = '20px Arial';
        ctx.fillStyle = '#fff';
        const minutes = Math.floor(stats.time / 60);
        const seconds = Math.floor(stats.time % 60);
        ctx.fillText(`存活时间: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`, cw / 2, ch / 2 - 40);
        ctx.fillText(`击杀数: ${stats.kills}`, cw / 2, ch / 2 - 10);
        ctx.fillText(`达到等级: ${stats.level}`, cw / 2, ch / 2 + 20);

        // 重新开始按钮
        const btnX = cw / 2 - 100;
        const btnY = ch / 2 + 60;
        ctx.fillStyle = 'rgba(40,80,40,0.9)';
        ctx.strokeStyle = '#44ff44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, 200, 50, 10);
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 22px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText('重新开始', cw / 2, btnY + 34);

        ctx.restore();
    }

    _drawStartScreen(ctx, cw, ch) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, cw, ch);

        ctx.font = 'bold 56px Arial';
        ctx.fillStyle = '#ff4400';
        ctx.textAlign = 'center';
        ctx.fillText('弹幕天堂', cw / 2, ch / 2 - 100);

        ctx.font = '20px Arial';
        ctx.fillStyle = '#aaa';
        ctx.fillText('类吸血鬼幸存者弹幕生存游戏', cw / 2, ch / 2 - 60);
        ctx.fillText('WASD移动 | 武器自动攻击', cw / 2, ch / 2 - 30);

        // 开始按钮
        const btnX = cw / 2 - 120;
        const btnY = ch / 2 + 20;
        ctx.fillStyle = 'rgba(80,20,20,0.9)';
        ctx.strokeStyle = '#ff4400';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, 240, 60, 12);
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 28px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText('开始游戏', cw / 2, btnY + 42);

        ctx.font = '14px Arial';
        ctx.fillStyle = '#666';
        ctx.fillText('点击按钮或按任意键开始', cw / 2, ch / 2 + 120);

        ctx.restore();
    }
}

// === main.js ===
// ============================================================
// main.js - 游戏主循环、事件监听、相机系统
// ============================================================


class Camera {
    constructor() {
        this.x = 0;
        this.y = 0;
    }

    follow(target, canvasW, canvasH) {
        this.x = target.x - canvasW / 2;
        this.y = target.y - canvasH / 2;

        // 世界边界限制
        this.x = Math.max(0, Math.min(GAME.WORLD_WIDTH - canvasW, this.x));
        this.y = Math.max(0, Math.min(GAME.WORLD_HEIGHT - canvasH, this.y));
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();

        this.camera = new Camera();
        this.ui = new UI(this.canvas);
        this.effects = new EffectsSystem();
        this.keys = {};

        this.state = 'start'; // start, playing, paused, upgrading, gameover
        this.gameTime = 0;
        this.kills = 0;
        this.lastTime = 0;
        this.running = false;

        this._bindEvents();
        this._loop = this._loop.bind(this);
        requestAnimationFrame(this._loop);
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    _bindEvents() {
        window.addEventListener('resize', () => this.resize());

        window.addEventListener('keydown', (e) => {
            this.keys[e.key.toLowerCase()] = true;

            if (this.state === 'start') {
                this._startGame();
                return;
            }

            if (this.state === 'upgrading') {
                const num = parseInt(e.key);
                if (num >= 1 && num <= 3 && this._upgradeOptions) {
                    this._selectUpgrade(num - 1);
                }
                if (e.key.toLowerCase() === 'r' && this._upgradeOptions) {
                    this._rerollUpgrade();
                }
            }

            if (e.key === 'Escape') {
                if (this.state === 'playing') {
                    this.state = 'paused';
                } else if (this.state === 'paused') {
                    this.state = 'playing';
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            this.keys[e.key.toLowerCase()] = false;
        });

        this.canvas.addEventListener('click', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            sound.init();

            if (this.state === 'start') {
                const result = this.ui.handleClick(mx, my);
                if (result === 'start') {
                    this._startGame();
                }
                return;
            }

            if (this.state === 'upgrading') {
                const result = this.ui.handleClick(mx, my);
                if (typeof result === 'number') {
                    // handled by keyboard
                }
                return;
            }

            if (this.state === 'gameover') {
                const result = this.ui.handleClick(mx, my);
                if (result === 'restart') {
                    this._startGame();
                }
            }
        });
    }

    _startGame() {
        sound.init();
        this.player = new Player();
        this.weaponSystem = new WeaponSystem(this.player);
        this.enemySpawner = new EnemySpawner();
        this.itemSystem = new ItemSystem();
        this.upgradeSystem = new UpgradeSystem();
        this.effects = new EffectsSystem();
        this.gameTime = 0;
        this.kills = 0;
        this._upgradeOptions = null;
        this._gameOverTimer = 0;

        // 初始武器：剑气
        this.weaponSystem.addWeapon('sword_wave');

        this.state = 'playing';
        this.ui.showingStart = false;
        this.ui.showingGameOver = false;
    }

    _selectUpgrade(index) {
        if (!this._upgradeOptions || index >= this._upgradeOptions.length) return;
        this.upgradeSystem.applyOption(this._upgradeOptions[index], this.player, this.weaponSystem);
        this.upgradeSystem.pendingLevelUps--;
        this.ui.hideUpgradeOptions();
        this._upgradeOptions = null;

        if (this.upgradeSystem.pendingLevelUps > 0) {
            this._showUpgradeUI();
        } else {
            this.state = 'playing';
        }
    }

    _rerollUpgrade() {
        if (this.player.rerolls <= 0) return;
        this.player.rerolls--;
        this._upgradeOptions = this.upgradeSystem.generateOptions(this.player, this.weaponSystem);
        this.ui.showUpgradeOptions(
            this._upgradeOptions,
            this.player.rerolls,
            (i) => this._selectUpgrade(i),
            () => this._rerollUpgrade()
        );
    }

    _showUpgradeUI() {
        this._upgradeOptions = this.upgradeSystem.generateOptions(this.player, this.weaponSystem);
        this.state = 'upgrading';
        this.ui.showUpgradeOptions(
            this._upgradeOptions,
            this.player.rerolls,
            (i) => this._selectUpgrade(i),
            () => this._rerollUpgrade()
        );
    }

    _loop(timestamp) {
        const dt = this.lastTime ? Math.min(timestamp - this.lastTime, 50) : 16;
        this.lastTime = timestamp;

        this._update(dt);
        this._render();

        requestAnimationFrame(this._loop);
    }

    _update(dt) {
        if (this.state !== 'playing') return;

        this.gameTime += dt / 1000;

        // 更新玩家输入
        this.player.input.up = this.keys['w'] || this.keys['arrowup'];
        this.player.input.down = this.keys['s'] || this.keys['arrowdown'];
        this.player.input.left = this.keys['a'] || this.keys['arrowleft'];
        this.player.input.right = this.keys['d'] || this.keys['arrowright'];

        this.player.update(dt);

        // 更新敌人
        this.enemySpawner.update(dt, this.player, this.player.curseLevel);

        // 更新武器
        this.weaponSystem.setEnemies(this.enemySpawner.enemies);
        this.weaponSystem.update(dt, this.enemySpawner.enemies);

        // 检测敌人死亡 & 掉落
        for (const enemy of this.enemySpawner.enemies) {
            if (!enemy.alive && enemy._deathProcessed) continue;
            if (!enemy.alive) {
                enemy._deathProcessed = true;
                this.kills++;
                this.effects.enemyDeath(enemy.x, enemy.y, enemy.color);
                this.effects.addDamageNumber(enemy.x, enemy.y, `💀`, '#ff4444');
                this.itemSystem.spawnGems(enemy.x, enemy.y, enemy.xp);
                sound.enemyDeath();

                // 分裂行为
                if (enemy.splitCount > 0) {
                    for (let i = 0; i < enemy.splitCount; i++) {
                        const angle = (Math.PI * 2 / enemy.splitCount) * i;
                        const splitEnemy = new Enemy('swarm',
                            enemy.x + Math.cos(angle) * 20,
                            enemy.y + Math.sin(angle) * 20,
                            this.player.curseLevel
                        );
                        this.enemySpawner.enemies.push(splitEnemy);
                    }
                }

                // Boss击杀特效
                if (enemy.type === 'boss') {
                    this.effects.shake(15);
                    this.effects.spawnParticles(enemy.x, enemy.y, '#ff0000', 30, 6, 6, 1000);
                    this.effects.spawnParticles(enemy.x, enemy.y, '#ffcc00', 20, 4, 4, 800);
                }
            }
        }

        // 碰撞伤害（玩家 vs 敌人）
        for (const enemy of this.enemySpawner.enemies) {
            if (!enemy.alive) continue;
            if (enemy.behavior === 'phase' && !enemy.visible) continue;
            const dx = enemy.x - this.player.x;
            const dy = enemy.y - this.player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < enemy.radius + this.player.radius) {
                const dead = this.player.takeDamage(enemy.damage);
                if (dead) {
                    this._gameOver();
                    return;
                }
                this.effects.shake(5);
            }
        }

        // Boss弹幕碰撞
        for (const enemy of this.enemySpawner.enemies) {
            for (const bp of enemy.bossProjectiles) {
                if (!bp.alive) continue;
                const dx = bp.x - this.player.x;
                const dy = bp.y - this.player.y;
                if (Math.hypot(dx, dy) < this.player.radius + 5) {
                    const dead = this.player.takeDamage(bp.damage);
                    bp.alive = false;
                    if (dead) {
                        this._gameOver();
                        return;
                    }
                    this.effects.shake(3);
                }
            }
        }

        // 远程敌人弹幕碰撞
        for (const enemy of this.enemySpawner.enemies) {
            if (enemy.behavior !== 'ranged') continue;
            for (const bp of enemy.bossProjectiles) {
                if (!bp.alive) continue;
                const dx = bp.x - this.player.x;
                const dy = bp.y - this.player.y;
                if (Math.hypot(dx, dy) < this.player.radius + 4) {
                    const dead = this.player.takeDamage(bp.damage);
                    bp.alive = false;
                    if (dead) {
                        this._gameOver();
                        return;
                    }
                }
            }
        }

        // 收集经验
        const xpGained = this.itemSystem.update(dt, this.player);
        if (xpGained > 0) {
            this.player.addXP(xpGained);
            this.effects.addDamageNumber(this.player.x, this.player.y - 20, `+${xpGained}XP`, '#44aaff');
        }

        // 升级检查
        if (this.upgradeSystem.checkLevelUp(this.player)) {
            this.effects.levelUpEffect(this.player.x, this.player.y);
            this._showUpgradeUI();
        }

        // 更新特效
        this.effects.update(dt);

        // 相机跟随
        this.camera.follow(this.player, this.canvas.width, this.canvas.height);
    }

    _gameOver() {
        this.state = 'gameover';
        this.ui.showGameOver({
            time: this.gameTime,
            kills: this.kills,
            level: this.player.level,
        });
        sound.gameOver();
    }

    _render() {
        const ctx = this.ctx;
        const cw = this.canvas.width;
        const ch = this.canvas.height;

        ctx.save();

        // 应用屏幕震动
        ctx.translate(this.effects.screenShake.x, this.effects.screenShake.y);

        // 清屏
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, cw, ch);

        if (this.state === 'start') {
            this._drawBackground(ctx);
            this.ui.draw(ctx, null, 0, 0, { weapons: {} });
            ctx.restore();
            return;
        }

        // 绘制背景
        this._drawBackground(ctx);

        // 绘制游戏对象
        this.enemySpawner.draw(ctx, this.camera);
        this.itemSystem.draw(ctx, this.camera);
        this.weaponSystem.draw(ctx, this.camera);
        this.player.draw(ctx, this.camera);
        this.effects.draw(ctx, this.camera);

        // UI
        this.ui.draw(
            ctx,
            this.player,
            this.gameTime,
            this.enemySpawner.enemies.length,
            this.weaponSystem
        );

        // 暂停遮罩
        if (this.state === 'paused') {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, cw, ch);
            ctx.font = 'bold 48px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('暂停', cw / 2, ch / 2);
            ctx.font = '20px Arial';
            ctx.fillStyle = '#aaa';
            ctx.fillText('按 ESC 继续', cw / 2, ch / 2 + 40);
        }

        ctx.restore();
    }

    _drawBackground(ctx) {
        const cw = this.canvas.width;
        const ch = this.canvas.height;
        const tile = GAME.GROUND_TILE;
        const startX = Math.floor(this.camera.x / tile) * tile;
        const startY = Math.floor(this.camera.y / tile) * tile;

        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, cw, ch);

        // 网格线
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = startX; x < this.camera.x + cw + tile; x += tile) {
            const sx = x - this.camera.x;
            ctx.beginPath();
            ctx.moveTo(sx, 0);
            ctx.lineTo(sx, ch);
            ctx.stroke();
        }
        for (let y = startY; y < this.camera.y + ch + tile; y += tile) {
            const sy = y - this.camera.y;
            ctx.beginPath();
            ctx.moveTo(0, sy);
            ctx.lineTo(cw, sy);
            ctx.stroke();
        }

        // 世界边界
        ctx.strokeStyle = 'rgba(255,0,0,0.3)';
        ctx.lineWidth = 3;
        ctx.strokeRect(
            -this.camera.x, -this.camera.y,
            GAME.WORLD_WIDTH, GAME.WORLD_HEIGHT
        );
    }
}

// 启动游戏
window.addEventListener('DOMContentLoaded', () => {
    new Game();
});


</script>
