<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色排序</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(156,39,176,0.3);background:#111}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:15px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 14px;border-radius:8px;font-size:13px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#9c27b0;font-weight:bold}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(156,39,176,0.5);color:#9c27b0}
        .menu-btn{background:linear-gradient(135deg,#9c27b0 0%,#7b1fa2 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px;font-weight:bold}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(156,39,176,0.5)}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#9c27b0;font-size:14px;margin-bottom:6px;text-align:center}
        #levelGrid{display:grid;grid-template-columns:repeat(10,40px);gap:6px;margin:15px 0;max-height:200px;overflow-y:auto}
        .level-btn{width:40px;height:40px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.2}
        .level-btn:hover{background:rgba(156,39,176,0.3);border-color:#9c27b0}
        .level-btn.locked{opacity:0.3;cursor:not-allowed}
        .bottom-btns{display:flex;gap:8px;margin-top:10px}
        .small-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 16px;font-size:13px;color:#888;cursor:pointer;transition:all 0.2s}
        .small-btn:hover{background:rgba(156,39,176,0.2);color:#9c27b0;border-color:#9c27b0}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">关卡: <span id="level">1</span></div>
        <div class="hud-item">步数: <span id="moves">0</span></div>
        <div class="hud-item">撤销: <span id="undos">3</span></div>
        <div class="hud-item">时间: <span id="timer">0:00</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="bottom-btns">
        <button class="small-btn" id="btnUndo">↩ 撤销</button>
        <button class="small-btn" id="btnRestart">↺ 重新开始</button>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title">颜色排序</div>
        <div id="levelGrid"></div>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击试管选择顶部颜色</div>
            <div>再点击另一试管倒入</div>
            <div>Z：撤销 | R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>将彩色液体排序，使每管只有一种颜色</div>
            <div>只能倒入同色或空管</div>
            <div>步数越少，星级越高</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,0.5)">完成！</div>
        <div id="winStats" class="stats"></div>
        <button class="menu-btn" id="btnNext">下一关</button>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="location.reload()">返回选关</button>
    </div>

    <script>
// === ./config.js ===
const TUBE_CAPACITY = 4;
const COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
  '#9b59b6', '#1abc9c', '#e67e22', '#e91e63',
  '#00bcd4', '#ff5722', '#795548', '#607d8b'
];
const COLOR_NAMES = [
  '红', '蓝', '绿', '黄', '紫', '青', '橙', '粉', '靛', '深橙', '棕', '灰'
];

const LEVELS = [];
for (let i = 0; i < 60; i++) {
  const colorCount = Math.min(3 + Math.floor(i / 5), 12);
  const emptyTubes = i < 10 ? 2 : i < 30 ? 2 : 3;
  LEVELS.push({ colorCount, emptyTubes });
}

const state = {
  currentLevel: 0,
  tubes: [],
  selectedTube: -1,
  pouring: false,
  pourFrom: -1,
  pourTo: -1,
  pourProgress: 0,
  moves: 0,
  undosLeft: 3,
  timer: 0,
  gameActive: false,
  completedTubes: 0,
  highScores: JSON.parse(localStorage.getItem('colorsort_scores') || '{}'),
  stars: JSON.parse(localStorage.getItem('colorsort_stars') || '{}')
};

function saveHighScore(level, moves, time) {
  const key = `l${level}`;
  const prev = state.highScores[key];
  if (!prev || moves < prev.moves || (moves === prev.moves && time < prev.time)) {
    state.highScores[key] = { moves, time };
    localStorage.setItem('colorsort_scores', JSON.stringify(state.highScores));
  }
  const starKey = key;
  const starCount = moves <= LEVELS[level].colorCount * 3 ? 3 :
                    moves <= LEVELS[level].colorCount * 5 ? 2 : 1;
  const prevStars = state.stars[starKey] || 0;
  if (starCount > prevStars) {
    state.stars[starKey] = starCount;
    localStorage.setItem('colorsort_stars', JSON.stringify(state.stars));
  }
  return starCount;
}

// === ./sound.js ===
class SoundManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  play(type) {
    if (!this.enabled) return;
    this.init();
    const c = this.ctx;
    const now = c.currentTime;
    const g = c.createGain();
    g.connect(c.destination);
    const o = c.createOscillator();
    o.connect(g);
    switch(type) {
      case 'pour':
        o.type = 'sine';
        o.frequency.setValueAtTime(400, now);
        o.frequency.linearRampToValueAtTime(600, now + 0.15);
        g.gain.setValueAtTime(0.15, now);
        g.gain.linearRampToValueAtTime(0, now + 0.2);
        o.start(now); o.stop(now + 0.2);
        break;
      case 'select':
        o.type = 'sine';
        o.frequency.setValueAtTime(800, now);
        g.gain.setValueAtTime(0.1, now);
        g.gain.linearRampToValueAtTime(0, now + 0.1);
        o.start(now); o.stop(now + 0.1);
        break;
      case 'invalid':
        o.type = 'square';
        o.frequency.setValueAtTime(200, now);
        g.gain.setValueAtTime(0.08, now);
        g.gain.linearRampToValueAtTime(0, now + 0.15);
        o.start(now); o.stop(now + 0.15);
        break;
      case 'complete':
        o.type = 'sine';
        o.frequency.setValueAtTime(523, now);
        o.frequency.setValueAtTime(659, now + 0.1);
        o.frequency.setValueAtTime(784, now + 0.2);
        g.gain.setValueAtTime(0.15, now);
        g.gain.linearRampToValueAtTime(0, now + 0.4);
        o.start(now); o.stop(now + 0.4);
        break;
      case 'level':
        for (let i = 0; i < 5; i++) {
          const osc = c.createOscillator();
          const gn = c.createGain();
          osc.connect(gn); gn.connect(c.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440 * Math.pow(2, i/4), now + i*0.1);
          gn.gain.setValueAtTime(0.1, now + i*0.1);
          gn.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.2);
          osc.start(now + i*0.1); osc.stop(now + i*0.1 + 0.2);
        }
        return;
      case 'undo':
        o.type = 'triangle';
        o.frequency.setValueAtTime(600, now);
        o.frequency.linearRampToValueAtTime(300, now + 0.15);
        g.gain.setValueAtTime(0.1, now);
        g.gain.linearRampToValueAtTime(0, now + 0.15);
        o.start(now); o.stop(now + 0.15);
        break;
      default: return;
    }
  }
}

// === ./tubes.js ===

function generateLevel(levelIdx) {
  const level = LEVELS[levelIdx];
  const colorCount = level.colorCount;
  const totalTubes = colorCount + level.emptyTubes;
  const segments = [];
  for (let c = 0; c < colorCount; c++) {
    for (let i = 0; i < TUBE_CAPACITY; i++) {
      segments.push(c);
    }
  }
  // Shuffle
  for (let i = segments.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [segments[i], segments[j]] = [segments[j], segments[i]];
  }
  const tubes = [];
  for (let t = 0; t < totalTubes; t++) {
    const tube = [];
    for (let i = 0; i < TUBE_CAPACITY; i++) {
      const idx = t * TUBE_CAPACITY + i;
      if (idx < segments.length) tube.push(segments[idx]);
    }
    tubes.push(tube);
  }
  return tubes;
}

function canPour(fromTube, toTube) {
  if (fromTube.length === 0) return false;
  if (toTube.length >= TUBE_CAPACITY) return false;
  if (toTube.length === 0) return true;
  return fromTube[fromTube.length - 1] === toTube[toTube.length - 1];
}

function pour(fromTube, toTube) {
  const color = fromTube.pop();
  toTube.push(color);
  return color;
}

function isTubeComplete(tube) {
  if (tube.length === 0) return true;
  if (tube.length !== TUBE_CAPACITY) return false;
  return tube.every(c => c === tube[0]);
}

function isAllComplete(tubes) {
  return tubes.every(t => t.length === 0 || isTubeComplete(t));
}

function getTopColorCount(tube) {
  if (tube.length === 0) return 0;
  const topColor = tube[tube.length - 1];
  let count = 0;
  for (let i = tube.length - 1; i >= 0; i--) {
    if (tube[i] === topColor) count++;
    else break;
  }
  return count;
}

function drawTube(ctx, x, y, w, h, tube, selected, hover, pourAnim) {
  const cap = TUBE_CAPACITY;
  const segH = h / cap;
  const radius = 8;

  // Tube glass
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.strokeStyle = selected ? '#fff' : hover ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = selected ? 2.5 : 1.5;
  ctx.stroke();

  // Clips for liquid
  ctx.beginPath();
  ctx.moveTo(x + 2, y + 2);
  ctx.lineTo(x + w - 2, y + 2);
  ctx.lineTo(x + w - 2, y + h - 2);
  ctx.lineTo(x + 2, y + h - 2);
  ctx.closePath();
  ctx.clip();

  // Liquid segments
  for (let i = 0; i < tube.length; i++) {
    const segY = y + h - (i + 1) * segH;
    const color = COLORS[tube[i]];
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, segY + 1, w - 4, segH - 2);
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x + 4, segY + 2, w * 0.3, segH - 4);
  }

  // Pour animation overlay
  if (pourAnim && pourAnim.tubeIdx === tube.length) {
    // handled in main
  }

  ctx.restore();

  // Glow for selected
  if (selected) {
    ctx.save();
    ctx.shadowColor = COLORS[tube[tube.length-1]] || '#fff';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  }
}

// === ./effects.js ===

class EffectManager {
  constructor() {
    this.particles = [];
    this.texts = [];
  }
  addComplete(x, y, colorIdx) {
    const color = COLORS[colorIdx];
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      this.particles.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1, decay: 0.02 + Math.random() * 0.02, size: 3 + Math.random() * 4,
        color
      });
    }
  }
  addScore(x, y, text, color = '#fff') {
    this.texts.push({ x, y, text, color, life: 1, vy: -1.5 });
  }
  update() {
    this.particles = this.particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
      return p.life > 0;
    });
    this.texts = this.texts.filter(t => {
      t.y += t.vy; t.life -= 0.02;
      return t.life > 0;
    });
  }
  draw(ctx) {
    this.particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    this.texts.forEach(t => {
      ctx.globalAlpha = t.life;
      ctx.fillStyle = t.color;
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(t.text, t.x, t.y);
    });
    ctx.globalAlpha = 1;
  }
}

// === ./ui.js ===

function updateHUD() {
  const el = document.getElementById('level');
  if (el) el.textContent = state.currentLevel + 1;
  const mv = document.getElementById('moves');
  if (mv) mv.textContent = state.moves;
  const un = document.getElementById('undos');
  if (un) un.textContent = state.undosLeft;
  const tm = document.getElementById('timer');
  if (tm) tm.textContent = formatTime(state.timer);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showStartOverlay() {
  document.getElementById('startOverlay').classList.remove('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
  buildLevelGrid();
}

function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const stars = state.stars[`l${i}`] || 0;
    const locked = i > 0 && !state.stars[`l${i-1}`] && i > Object.keys(state.stars).length;
    btn.innerHTML = `${i + 1}${stars ? '<br>' + '★'.repeat(stars) + '☆'.repeat(3-stars) : ''}`;
    if (locked) btn.classList.add('locked');
    btn.onclick = () => {
      if (!locked) {
        document.getElementById('startOverlay').classList.add('hidden');
        if (window.startLevel) window.startLevel(i);
      }
    };
    grid.appendChild(btn);
  }
}

function showWinOverlay(stars, moves, time) {
  const el = document.getElementById('winOverlay');
  el.classList.remove('hidden');
  document.getElementById('winStats').innerHTML =
    `步数: ${moves} | 时间: ${formatTime(time)}<br>评级: ${'★'.repeat(stars)}${'☆'.repeat(3-stars)}`;
}

function showGameOverOverlay() {
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

// === main.js ===

const sound = new SoundManager();
const effects = new EffectManager();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

let tubeRects = [];
let hoverTube = -1;
let history = [];
let gameTime = 0;

function layoutTubes() {
  const count = state.tubes.length;
  const cols = Math.min(count, 8);
  const rows = Math.ceil(count / cols);
  const tubeW = 60;
  const tubeH = 160;
  const gap = 16;
  const totalW = cols * tubeW + (cols - 1) * gap;
  const startX = (canvas.width - totalW) / 2;
  const startY = canvas.height - rows * (tubeH + gap) - 40;

  tubeRects = [];
  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    tubeRects.push({
      x: startX + col * (tubeW + gap),
      y: startY + row * (tubeH + gap),
      w: tubeW, h: tubeH
    });
  }
}

function startLevel(levelIdx) {
  state.currentLevel = levelIdx;
  state.tubes = generateLevel(levelIdx);
  state.selectedTube = -1;
  state.moves = 0;
  state.undosLeft = 3;
  state.timer = 0;
  state.gameActive = true;
  state.pouring = false;
  history = [];
  gameTime = 0;
  layoutTubes();
  updateHUD();
}

window.startLevel = startLevel;

function getTubeAt(mx, my) {
  for (let i = 0; i < tubeRects.length; i++) {
    const r = tubeRects[i];
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) return i;
  }
  return -1;
}

function handleClick(mx, my) {
  if (!state.gameActive || state.pouring) return;
  const idx = getTubeAt(mx, my);
  if (idx === -1) { state.selectedTube = -1; return; }

  if (state.selectedTube === -1) {
    if (state.tubes[idx].length > 0) {
      state.selectedTube = idx;
      sound.play('select');
    }
  } else if (state.selectedTube === idx) {
    state.selectedTube = -1;
  } else {
    const from = state.tubes[state.selectedTube];
    const to = state.tubes[idx];
    if (canPour(from, to)) {
      // Save undo
      history.push({
        from: state.selectedTube,
        to: idx,
        fromState: [...from],
        toState: [...to]
      });
      const count = getTopColorCount(from);
      const maxPour = TUBE_CAPACITY - to.length;
      const actual = Math.min(count, maxPour);
      for (let i = 0; i < actual; i++) pour(from, to);

      state.moves++;
      state.selectedTube = -1;
      sound.play('pour');

      if (isTubeComplete(state.tubes[idx])) {
        const r = tubeRects[idx];
        effects.addComplete(r.x + r.w/2, r.y + r.h/2, state.tubes[idx][0]);
        sound.play('complete');
      }

      if (isAllComplete(state.tubes)) {
        state.gameActive = false;
        const stars = saveHighScore(state.currentLevel, state.moves, state.timer);
        sound.play('level');
        setTimeout(() => showWinOverlay(stars, state.moves, state.timer), 500);
      }
      updateHUD();
    } else {
      sound.play('invalid');
      state.selectedTube = -1;
    }
  }
}

function undo() {
  if (!state.gameActive || history.length === 0 || state.undosLeft <= 0) return;
  const h = history.pop();
  state.tubes[h.from] = h.fromState;
  state.tubes[h.to] = h.toState;
  state.undosLeft--;
  state.moves--;
  state.selectedTube = -1;
  sound.play('undo');
  updateHUD();
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  handleClick((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  hoverTube = getTubeAt((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  handleClick((touch.clientX - rect.left) * scaleX, (touch.clientY - rect.top) * scaleY);
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') startLevel(state.currentLevel);
  if (e.key === 'z' || e.key === 'Z') undo();
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRestart').addEventListener('click', () => startLevel(state.currentLevel));
document.getElementById('btnNext')?.addEventListener('click', () => {
  if (state.currentLevel < LEVELS.length - 1) {
    document.getElementById('winOverlay').classList.add('hidden');
    startLevel(state.currentLevel + 1);
  }
});

let lastTime = 0;
function gameLoop(ts) {
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;
  if (state.gameActive) {
    state.timer += dt;
    gameTime += dt;
    if (Math.floor(gameTime) !== Math.floor(gameTime - dt)) updateHUD();
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw tubes
  for (let i = 0; i < state.tubes.length; i++) {
    const r = tubeRects[i];
    if (!r) continue;
    drawTube(ctx, r.x, r.y, r.w, r.h, state.tubes[i],
      state.selectedTube === i, hoverTube === i, null);
  }

  effects.update();
  effects.draw(ctx);

  requestAnimationFrame(gameLoop);
}

showStartOverlay();
requestAnimationFrame(gameLoop);


</script>

</body>
