// 农场模拟游戏 - Web Audio API 音效系统
// ============================================

let audioCtx = null;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.3) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playNoise(duration, volume = 0.1) {
  const ctx = getCtx();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

// ============================================
// 农场模拟游戏 - 作物系统
// ============================================


class Crop {
  constructor(type, row, col) {
    this.type = type;
    this.data = CROPS[type];
    this.row = row;
    this.col = col;
    this.stage = GROWTH_STAGES.SEED;
    this.growthProgress = 0;    // 0~100 当前阶段进度
    this.watered = false;        // 今天是否已浇水
    this.waterLevel = 0;         // 连续浇水天数
    this.daysGrown = 0;          // 已生长天数
    this.witherChance = 0;       // 枯萎概率
    this.pestDamage = 0;         // 虫害损伤
    this.alive = true;
  }

  // 浇水
  water() {
    if (!this.alive) return false;
    if (this.watered) return false;
    if (this.stage >= GROWTH_STAGES.MATURE) return false;
    this.watered = true;
    this.waterLevel++;
    return true;
  }

  // 每天更新
  updateDay(weather) {
    if (!this.alive) return;

    // 暴风雨可能直接毁坏作物
    if (weather === 'storm' && Math.random() < 0.15) {
      this.alive = false;
      this.stage = GROWTH_STAGES.WITHERED;
      return;
    }

    // 干旱增加枯萎概率
    if (weather === 'drought') {
      this.witherChance += 0.2;
      if (!this.watered) {
        this.witherChance += 0.15;
      }
    }

    // 虫害减产
    if (weather === 'bug') {
      this.pestDamage += 0.15;
    }

    // 下雨自动浇水
    if (weather === 'rain') {
      this.watered = true;
      this.waterLevel++;
    }

    // 检查是否需要浇水（每天需要至少浇水 waterNeed 次中的1次）
    if (!this.watered && this.stage < GROWTH_STAGES.MATURE) {
      this.witherChance += 0.1;
    }

    // 枯萎判定
    if (this.witherChance > 0 && Math.random() < this.witherChance) {
      this.alive = false;
      this.stage = GROWTH_STAGES.WITHERED;
      return;
    }

    // 生长推进
    if (this.watered && this.stage < GROWTH_STAGES.MATURE) {
      const growPerDay = 100 / this.data.growTime; // 每天生长百分比
      this.growthProgress += growPerDay;

      // 检查是否进入下一阶段
      if (this.growthProgress >= 100) {
        this.growthProgress = 0;
        this.stage++;
        if (this.stage > GROWTH_STAGES.MATURE) {
          this.stage = GROWTH_STAGES.MATURE;
        }
      }
    }

    this.daysGrown++;

    // 成熟后如果太久不收获可能掉落品质
    if (this.stage === GROWTH_STAGES.MATURE && this.daysGrown > this.data.growTime + 5) {
      this.pestDamage += 0.05;
    }

    // 重置每日状态
    this.watered = false;
  }

  // 收获
  harvest() {
    if (!this.alive || this.stage !== GROWTH_STAGES.MATURE) return null;

    const [minYield, maxYield] = this.data.yield;
    let amount = Math.floor(Math.random() * (maxYield - minYield + 1)) + minYield;

    // 虫害减少产量
    if (this.pestDamage > 0) {
      const loss = Math.floor(amount * Math.min(this.pestDamage, 0.5));
      amount = Math.max(1, amount - loss);
    }

    return {
      type: this.type,
      name: this.data.name,
      amount,
      sellPrice: this.data.sellPrice,
      icon: this.data.icon,
    };
  }

  // 获取阶段名称
  getStageName() {
    return STAGE_NAMES[this.stage];
  }

  // 获取阶段颜色
  getStageColor() {
    return STAGE_COLORS[this.stage];
  }

  // 是否可收获
  isHarvestable() {
    return this.alive && this.stage === GROWTH_STAGES.MATURE;
  }

  // 是否需要浇水
  needsWater() {
    return this.alive && !this.watered && this.stage < GROWTH_STAGES.MATURE;
  }
}

// ============================================
// 农场模拟游戏 - 农田系统
// ============================================


// 地块状态
const TILE_STATES = {
  GRASS: 0,    // 草地
  TILLED: 1,   // 已翻地
  PLANTED: 2,  // 已种植
};

class Farm {
  constructor() {
    // 地块状态
    this.tiles = Array.from({ length: GRID_ROWS }, () =>
      Array.from({ length: GRID_COLS }, () => TILE_STATES.GRASS)
    );
    // 作物数据
    this.crops = Array.from({ length: GRID_ROWS }, () =>
      Array.from({ length: GRID_COLS }, () => null)
    );
    // 库存：收获的作物
    this.inventory = {};
    // 背包中的种子
    this.seeds = {};
  }

  // 翻地
  till(row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return false;
    if (this.tiles[row][col] !== TILE_STATES.GRASS) return false;
    this.tiles[row][col] = TILE_STATES.TILLED;
    return true;
  }

  // 种植
  plant(row, col, cropType) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return false;
    if (this.tiles[row][col] !== TILE_STATES.TILLED) return false;
    if (!this.seeds[cropType] || this.seeds[cropType] <= 0) return false;

    this.tiles[row][col] = TILE_STATES.PLANTED;
    this.crops[row][col] = new Crop(cropType, row, col);
    this.seeds[cropType]--;
    if (this.seeds[cropType] <= 0) delete this.seeds[cropType];
    return true;
  }

  // 浇水
  water(row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return false;
    const crop = this.crops[row][col];
    if (!crop) return false;
    return crop.water();
  }

  // 收获
  harvest(row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return null;
    const crop = this.crops[row][col];
    if (!crop) return null;

    const result = crop.harvest();
    if (result) {
      // 添加到库存
      if (!this.inventory[result.type]) {
        this.inventory[result.type] = { ...result, amount: 0 };
      }
      this.inventory[result.type].amount += result.amount;

      // 清除地块
      this.crops[row][col] = null;
      this.tiles[row][col] = TILE_STATES.TILLED; // 翻回可种植状态
    }
    return result;
  }

  // 清除枯萎作物
  clearWithered(row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return false;
    const crop = this.crops[row][col];
    if (!crop || crop.alive) return false;

    this.crops[row][col] = null;
    this.tiles[row][col] = TILE_STATES.TILLED;
    return true;
  }

  // 每日更新所有作物
  updateDay(weather) {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const crop = this.crops[r][c];
        if (crop) {
          crop.updateDay(weather);
        }
      }
    }
  }

  // 添加种子
  addSeeds(type, amount) {
    this.seeds[type] = (this.seeds[type] || 0) + amount;
  }

  // 出售库存
  sellInventory(type) {
    if (!this.inventory[type] || this.inventory[type].amount <= 0) return 0;
    const item = this.inventory[type];
    const total = item.amount * item.sellPrice;
    const amount = item.amount;
    delete this.inventory[type];
    return { total, amount };
  }

  // 获取地块信息
  getTileInfo(row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return null;
    return {
      state: this.tiles[row][col],
      crop: this.crops[row][col],
    };
  }
}

let nextAnimalId = 1;

class Animal {
  constructor(type) {
    this.id = nextAnimalId++;
    this.type = type;
    this.data = ANIMALS[type];
    this.name = this.data.name + '#' + this.id;
    this.hunger = 100;         // 0=饿死 100=饱
    this.cleanliness = 100;    // 0=脏 100=干净
    this.happiness = 100;      // 幸福度影响产出
    this.lastFed = 0;          // 上次喂养天数
    this.lastCleaned = 0;      // 上次清洁天数
    this.lastProduct = 0;      // 上次产出天数
    this.lastBreed = 0;        // 上次繁殖天数
    this.daysAlive = 0;
    this.alive = true;
    this.hasProduct = false;   // 是否有产品可收集
  }

  // 喂养
  feed(currentDay) {
    if (!this.alive) return false;
    this.hunger = Math.min(100, this.hunger + 40);
    this.lastFed = currentDay;
    this.happiness = Math.min(100, this.happiness + 10);
    return true;
  }

  // 清洁
  clean(currentDay) {
    if (!this.alive) return false;
    this.cleanliness = 100;
    this.lastCleaned = currentDay;
    this.happiness = Math.min(100, this.happiness + 15);
    return true;
  }

  // 收集产品
  collectProduct() {
    if (!this.alive || !this.hasProduct) return null;
    this.hasProduct = false;
    this.lastProduct = this.daysAlive;
    return {
      type: this.type,
      product: this.data.product,
      price: this.data.productPrice,
      icon: this.data.icon,
    };
  }

  // 每日更新
  updateDay(currentDay) {
    if (!this.alive) return;

    this.daysAlive++;

    // 饥饿下降
    this.hunger -= 15;
    if (this.hunger < 0) this.hunger = 0;

    // 清洁度下降
    this.cleanliness -= 10;
    if (this.cleanliness < 0) this.cleanliness = 0;

    // 幸福度下降
    if (this.hunger < 30) this.happiness -= 5;
    if (this.cleanliness < 30) this.happiness -= 3;
    if (this.happiness < 0) this.happiness = 0;

    // 饿死或跑掉
    if (this.hunger <= 0) {
      this.alive = false;
      return;
    }

    // 产出产品
    if (this.hunger > 30 && this.cleanliness > 20) {
      const daysSinceProduct = this.daysAlive - this.lastProduct;
      if (daysSinceProduct >= this.data.productInterval) {
        this.hasProduct = true;
      }
    }
  }

  // 尝试繁殖
  tryBreed(currentDay) {
    if (!this.alive) return false;
    if (this.happiness < 60) return false;
    if (this.hunger < 50) return false;
    if (currentDay - this.lastBreed < this.data.breedCooldown) return false;
    if (Math.random() < this.data.breedChance) {
      this.lastBreed = currentDay;
      return true;
    }
    return false;
  }
}

class AnimalManager {
  constructor() {
    this.animals = [];
    this.products = {}; // 收集的产品库存
  }

  // 购买动物
  buy(type) {
    const data = ANIMALS[type];
    if (!data) return null;
    const animal = new Animal(type);
    this.animals.push(animal);
    return animal;
  }

  // 每日更新
  updateDay(currentDay) {
    const newAnimals = [];
    for (const animal of this.animals) {
      animal.updateDay(currentDay);

      // 检查繁殖
      if (animal.alive && animal.tryBreed(currentDay)) {
        const baby = new Animal(animal.type);
        newAnimals.push(baby);
      }
    }
    // 移除死亡动物
    this.animals = this.animals.filter(a => a.alive);
    // 添加新生动物
    this.animals.push(...newAnimals);
    return newAnimals.length;
  }

  // 获取动物总数
  getCount() {
    return this.animals.length;
  }

  // 按类型获取动物
  getByType(type) {
    return this.animals.filter(a => a.type === type);
  }

  // 收集所有产品
  collectAllProducts() {
    const collected = [];
    for (const animal of this.animals) {
      const product = animal.collectProduct();
      if (product) {
        if (!this.products[product.product]) {
          this.products[product.product] = { ...product, amount: 0 };
        }
        this.products[product.product].amount++;
        collected.push(product);
      }
    }
    return collected;
  }

  // 出售产品
  sellProducts(productName) {
    for (const key of Object.keys(this.products)) {
      if (this.products[key].product === productName) {
        const item = this.products[key];
        const total = item.amount * item.price;
        const amount = item.amount;
        delete this.products[key];
        return { total, amount };
      }
    }
    return null;
  }

  // 获取所有可出售产品
  getProductList() {
    return Object.values(this.products).filter(p => p.amount > 0);
  }
}

class Market {
  constructor() {
    // 今日价格倍率 (1.0 = 原价)
    this.priceMultiplier = {};
    // 价格历史
    this.priceHistory = {};
    // 初始化价格
    this.resetPrices();
  }

  resetPrices() {
    for (const [key, crop] of Object.entries(CROPS)) {
      this.priceMultiplier[key] = 1.0;
      if (!this.priceHistory[key]) this.priceHistory[key] = [];
    }
    for (const [key, animal] of Object.entries(ANIMALS)) {
      this.priceMultiplier[key] = 1.0;
      if (!this.priceHistory[key]) this.priceHistory[key] = [];
    }
  }

  // 每日更新价格
  updatePrices() {
    for (const key of Object.keys(this.priceMultiplier)) {
      // 随机波动 ±30%
      const change = (Math.random() - 0.5) * 2 * PRICE_FLUCTUATION;
      this.priceMultiplier[key] = Math.max(0.5, Math.min(1.5, this.priceMultiplier[key] + change));
      this.priceHistory[key].push(this.priceMultiplier[key]);
      // 只保留最近7天
      if (this.priceHistory[key].length > 7) {
        this.priceHistory[key].shift();
      }
    }
  }

  // 获取种子购买价格
  getSeedPrice(cropType) {
    const base = CROPS[cropType].seedPrice;
    const mult = this.priceMultiplier[cropType] || 1.0;
    return Math.round(base * mult);
  }

  // 获取作物出售价格
  getCropSellPrice(cropType) {
    const base = CROPS[cropType].sellPrice;
    const mult = this.priceMultiplier[cropType] || 1.0;
    return Math.round(base * mult);
  }

  // 获取动物购买价格
  getAnimalPrice(animalType) {
    const base = ANIMALS[animalType].price;
    const mult = this.priceMultiplier[animalType] || 1.0;
    return Math.round(base * mult);
  }

  // 获取动物产品出售价格
  getProductPrice(animalType) {
    const base = ANIMALS[animalType].productPrice;
    const mult = this.priceMultiplier[animalType] || 1.0;
    return Math.round(base * mult);
  }

  // 买种子
  buySeed(cropType, money) {
    const price = this.getSeedPrice(cropType);
    if (money < price) return { success: false, reason: '资金不足' };
    return { success: true, price };
  }

  // 买动物
  buyAnimal(animalType, money) {
    const price = this.getAnimalPrice(animalType);
    if (money < price) return { success: false, reason: '资金不足' };
    return { success: true, price };
  }

  // 获取所有可购买种子
  getSeedList() {
    return Object.entries(CROPS).map(([key, crop]) => ({
      type: key,
      name: crop.name,
      icon: crop.icon,
      price: this.getSeedPrice(key),
      seasons: crop.seasons,
      growTime: crop.growTime,
    }));
  }

  // 获取所有可购买动物
  getAnimalList() {
    return Object.entries(ANIMALS).map(([key, animal]) => ({
      type: key,
      name: animal.name,
      icon: animal.icon,
      price: this.getAnimalPrice(key),
      product: animal.product,
      productPrice: this.getProductPrice(key),
    }));
  }
}

class Weather {
  constructor() {
    this.current = 'sunny';
    this.forecast = []; // 未来3天预报
    this.history = [];
  }

  // 根据季节生成天气
  generateWeather(season) {
    const weights = { ...WEATHER_TYPES };

    // 根据季节调整概率
    switch (season) {
      case '春':
        weights.rain.chance = 0.25;
        weights.sunny.chance = 0.35;
        weights.drought.chance = 0.05;
        weights.storm.chance = 0.05;
        weights.bug.chance = 0.05;
        weights.cloudy.chance = 0.25;
        break;
      case '夏':
        weights.sunny.chance = 0.35;
        weights.drought.chance = 0.15;
        weights.rain.chance = 0.15;
        weights.storm.chance = 0.10;
        weights.bug.chance = 0.10;
        weights.cloudy.chance = 0.15;
        break;
      case '秋':
        weights.sunny.chance = 0.30;
        weights.rain.chance = 0.25;
        weights.cloudy.chance = 0.25;
        weights.bug.chance = 0.10;
        weights.drought.chance = 0.05;
        weights.storm.chance = 0.05;
        break;
      case '冬':
        weights.sunny.chance = 0.20;
        weights.cloudy.chance = 0.40;
        weights.rain.chance = 0.15;
        weights.storm.chance = 0.10;
        weights.drought.chance = 0.05;
        weights.bug.chance = 0.10;
        break;
    }

    // 加权随机选择
    const total = Object.values(weights).reduce((s, w) => s + w.chance, 0);
    let rand = Math.random() * total;
    for (const [type, data] of Object.entries(weights)) {
      rand -= data.chance;
      if (rand <= 0) return type;
    }
    return 'sunny';
  }

  // 推进一天
  advanceDay(season) {
    this.history.push(this.current);
    if (this.history.length > 30) this.history.shift();

    // 生成新天气
    this.current = this.generateWeather(season);

    // 更新预报
    this.forecast = [];
    for (let i = 0; i < 3; i++) {
      this.forecast.push(this.generateWeather(season));
    }

    return this.current;
  }

  // 获取当前天气信息
  getCurrent() {
    return {
      type: this.current,
      ...WEATHER_TYPES[this.current],
    };
  }

  // 获取预报
  getForecast() {
    return this.forecast.map(type => ({
      type,
      ...WEATHER_TYPES[type],
    }));
  }
}

// ============================================
// 农场模拟游戏 - Canvas渲染 + HUD + 商店界面
// ============================================


const GRID_PX_W = GRID_COLS * TILE_SIZE;
const GRID_PX_H = GRID_ROWS * TILE_SIZE;
const HUD_HEIGHT = 160;

class UI {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    canvas.width = GRID_PX_W;
    canvas.height = GRID_PX_H + HUD_HEIGHT;

    // 交互状态
    this.hoveredTile = null;    // { row, col }
    this.selectedTool = 'hoe';
    this.selectedSeed = null;   // 选中的种子类型
    this.selectedTab = 'seeds'; // 商店标签: seeds / animals / inventory
    this.showShop = false;
    this.showAnimalPanel = false;
    this.message = '';
    this.messageTimer = 0;
    this.messageColor = '#FFF';

    // 颜色
    this.COLORS = {
      grass: '#4A7C2E',
      grassDark: '#3D6B25',
      tilled: '#8B6914',
      tilledDark: '#7A5C10',
      planted: '#6B4E0A',
      hudBg: '#2C1810',
      hudText: '#F5DEB3',
      hudAccent: '#FFD700',
      buttonBg: '#5C3A1E',
      buttonHover: '#7A4E2A',
      buttonActive: '#FFD700',
      shopBg: 'rgba(20, 10, 5, 0.95)',
      tileHighlight: 'rgba(255, 255, 200, 0.3)',
      tileDanger: 'rgba(255, 50, 50, 0.3)',
      waterOverlay: 'rgba(30, 100, 200, 0.3)',
    };
  }

  // 显示消息
  showMessage(text, color = '#FFF', duration = 120) {
    this.message = text;
    this.messageTimer = duration;
    this.messageColor = color;
  }

  // ============ 绘制农田 ============
  drawFarm(farm, weatherType) {
    const ctx = this.ctx;

    // 背景色根据天气变化
    let bg = '#6BAF5B'; // 晴天草地
    if (weatherType === 'rain') bg = '#5A9F4B';
    if (weatherType === 'storm') bg = '#4A7A3B';
    if (weatherType === 'drought') bg = '#8AAF6B';
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, GRID_PX_W, GRID_PX_H);

    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const x = c * TILE_SIZE;
        const y = r * TILE_SIZE;
        const tile = farm.tiles[r][c];
        const crop = farm.crops[r][c];

        // 画地块
        if (tile === TILE_STATES.GRASS) {
          ctx.fillStyle = (r + c) % 2 === 0 ? this.COLORS.grass : this.COLORS.grassDark;
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          // 草地纹理
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          for (let i = 0; i < 3; i++) {
            const gx = x + 10 + Math.sin(r * 7 + c * 13 + i * 17) * 20 + 20;
            const gy = y + 15 + Math.cos(r * 11 + c * 7 + i * 23) * 15 + 15;
            ctx.fillRect(gx, gy, 2, 6);
          }
        } else if (tile === TILE_STATES.TILLED) {
          ctx.fillStyle = (r + c) % 2 === 0 ? this.COLORS.tilled : this.COLORS.tilledDark;
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          // 犁沟纹理
          ctx.strokeStyle = 'rgba(0,0,0,0.15)';
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(x + 5, y + 10 + i * 14);
            ctx.lineTo(x + TILE_SIZE - 5, y + 10 + i * 14);
            ctx.stroke();
          }
        } else if (tile === TILE_STATES.PLANTED) {
          ctx.fillStyle = (r + c) % 2 === 0 ? this.COLORS.planted : '#5C4208';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

          // 浇水效果
          if (crop && crop.watered) {
            ctx.fillStyle = this.COLORS.waterOverlay;
            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          }

          // 画作物
          if (crop) {
            this.drawCrop(ctx, x, y, crop);
          }
        }

        // 地块边框
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);

        // 悬停高亮
        if (this.hoveredTile && this.hoveredTile.row === r && this.hoveredTile.col === c) {
          ctx.fillStyle = this.COLORS.tileHighlight;
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        }
      }
    }

    // 下雨粒子效果
    if (weatherType === 'rain' || weatherType === 'storm') {
      this.drawRain(ctx, weatherType === 'storm');
    }
  }

  // 画作物
  drawCrop(ctx, x, y, crop) {
    const cx = x + TILE_SIZE / 2;
    const cy = y + TILE_SIZE / 2;

    if (!crop.alive) {
      // 枯萎 - 灰色
      ctx.fillStyle = '#696969';
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💀', cx, cy);
      return;
    }

    switch (crop.stage) {
      case 0: // 种子
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(cx, cy + 8, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#654321';
        ctx.fillRect(cx - 1, cy + 4, 2, 6);
        break;

      case 1: // 幼苗
        ctx.fillStyle = '#228B22';
        ctx.fillRect(cx - 1, cy - 2, 2, 18);
        // 小叶子
        ctx.fillStyle = '#32CD32';
        ctx.beginPath();
        ctx.ellipse(cx - 6, cy + 2, 6, 3, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 6, cy - 2, 6, 3, 0.3, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 2: // 生长中
        ctx.fillStyle = '#228B22';
        ctx.fillRect(cx - 1, cy - 10, 2, 28);
        // 多片叶子
        ctx.fillStyle = '#32CD32';
        for (let i = 0; i < 3; i++) {
          const ly = cy - 4 + i * 8;
          const dir = i % 2 === 0 ? -1 : 1;
          ctx.beginPath();
          ctx.ellipse(cx + dir * 10, ly, 8, 4, dir * 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
        // 顶部小果实/花苞
        ctx.fillStyle = crop.data.color;
        ctx.beginPath();
        ctx.arc(cx, cy - 12, 4, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 3: // 成熟
        // 茎
        ctx.fillStyle = '#228B22';
        ctx.fillRect(cx - 2, cy - 12, 4, 30);
        // 大叶子
        ctx.fillStyle = '#32CD32';
        for (let i = 0; i < 3; i++) {
          const ly = cy + i * 6;
          const dir = i % 2 === 0 ? -1 : 1;
          ctx.beginPath();
          ctx.ellipse(cx + dir * 12, ly, 10, 5, dir * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
        // 果实/花朵
        ctx.fillStyle = crop.data.color;
        ctx.beginPath();
        ctx.arc(cx, cy - 14, 8, 0, Math.PI * 2);
        ctx.fill();
        // 高光
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(cx - 2, cy - 16, 3, 0, Math.PI * 2);
        ctx.fill();
        // 成熟提示
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✓', cx + 16, cy - 18);
        break;
    }
  }

  // 下雨效果
  drawRain(ctx, heavy) {
    const count = heavy ? 60 : 30;
    ctx.strokeStyle = 'rgba(150, 200, 255, 0.5)';
    ctx.lineWidth = 1;
    const time = Date.now() * 0.01;
    for (let i = 0; i < count; i++) {
      const rx = (Math.sin(i * 37.7 + time) * 0.5 + 0.5) * GRID_PX_W;
      const ry = ((time * 3 + i * 47.3) % GRID_PX_H);
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - 2, ry + heavy ? 12 : 8);
      ctx.stroke();
    }
  }

  // ============ 绘制HUD ============
  drawHUD(gameState) {
    const ctx = this.ctx;
    const y0 = GRID_PX_H;

    // HUD背景
    ctx.fillStyle = this.COLORS.hudBg;
    ctx.fillRect(0, y0, GRID_PX_W, HUD_HEIGHT);

    // 顶部装饰线
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(0, y0, GRID_PX_W, 3);

    // === 第一行：状态信息 ===
    ctx.fillStyle = this.COLORS.hudText;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const { season, day, hour, money, weather, seasonProgress } = gameState;

    // 季节+日期
    ctx.fillText(`${season} 第${day}天  ${hour}:00`, 10, y0 + 8);

    // 季节进度条
    const barX = 170;
    const barW = 80;
    ctx.fillStyle = '#3A2510';
    ctx.fillRect(barX, y0 + 8, barW, 14);
    const seasonColors = { '春': '#90EE90', '夏': '#FFD700', '秋': '#FF8C00', '冬': '#87CEEB' };
    ctx.fillStyle = seasonColors[season] || '#FFD700';
    ctx.fillRect(barX, y0 + 8, barW * seasonProgress, 14);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, y0 + 8, barW, 14);

    // 天气
    ctx.fillStyle = this.COLORS.hudText;
    ctx.fillText(`${weather.icon} ${weather.name}`, 265, y0 + 8);

    // 资金
    ctx.fillStyle = this.COLORS.hudAccent;
    ctx.fillText(`💰 ${money} 金币`, 380, y0 + 8);

    // 动物数量
    ctx.fillStyle = this.COLORS.hudText;
    ctx.fillText(`🐾 动物: ${gameState.animalCount}`, 530, y0 + 8);

    // === 第二行：工具栏 ===
    const toolY = y0 + 32;
    const toolKeys = Object.keys(TOOLS);
    const toolW = 70;
    const toolGap = 6;
    const totalToolW = toolKeys.length * toolW + (toolKeys.length - 1) * toolGap;
    const toolStartX = (GRID_PX_W - totalToolW) / 2;

    ctx.font = '13px sans-serif';
    toolKeys.forEach((key, i) => {
      const tx = toolStartX + i * (toolW + toolGap);
      const isSelected = this.selectedTool === key;
      const isHovered = this._isInRect(this._mx, this._my, tx, toolY, toolW, 28);

      ctx.fillStyle = isSelected ? '#8B6914' : isHovered ? this.COLORS.buttonHover : this.COLORS.buttonBg;
      ctx.fillRect(tx, toolY, toolW, 28);
      ctx.strokeStyle = isSelected ? '#FFD700' : '#6B4E0A';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.strokeRect(tx, toolY, toolW, 28);

      ctx.fillStyle = isSelected ? '#FFD700' : this.COLORS.hudText;
      ctx.textAlign = 'center';
      ctx.fillText(`${TOOLS[key].icon} ${TOOLS[key].name}`, tx + toolW / 2, toolY + 9);
    });

    // === 第三行：种子选择栏（仅种植模式） ===
    if (this.selectedTool === 'plant' && this.selectedSeed) {
      ctx.fillStyle = this.COLORS.hudText;
      ctx.textAlign = 'left';
      ctx.font = '12px sans-serif';
      ctx.fillText(`当前种子: ${CROPS[this.selectedSeed].icon} ${CROPS[this.selectedSeed].name}`, 10, toolY + 34);
    }

    // === 第四行：功能按钮 ===
    const btnY = y0 + 68;
    const buttons = [
      { key: 'shop',   label: '🏪 商店 (B)', w: 90 },
      { key: 'animal', label: '🐾 动物 (N)', w: 90 },
      { key: 'collect', label: '📦 收集产品', w: 90 },
      { key: 'nextDay', label: '🌅 下一天 (Space)', w: 110 },
    ];
    const btnGap = 8;
    const totalBtnW = buttons.reduce((s, b) => s + b.w, 0) + (buttons.length - 1) * btnGap;
    let btnX = (GRID_PX_W - totalBtnW) / 2;

    buttons.forEach(btn => {
      const isHovered = this._isInRect(this._mx, this._my, btnX, btnY, btn.w, 30);
      ctx.fillStyle = isHovered ? this.COLORS.buttonHover : this.COLORS.buttonBg;
      ctx.fillRect(btnX, btnY, btn.w, 30);
      ctx.strokeStyle = '#6B4E0A';
      ctx.lineWidth = 1;
      ctx.strokeRect(btnX, btnY, btn.w, 30);

      ctx.fillStyle = isHovered ? '#FFD700' : this.COLORS.hudText;
      ctx.textAlign = 'center';
      ctx.font = 'bold 12px sans-serif';
      ctx.fillText(btn.label, btnX + btn.w / 2, btnY + 10);
      btn.btnX = btnX;
      btnX += btn.w + btnGap;
    });

    // === 消息 ===
    if (this.message && this.messageTimer > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const msgW = ctx.measureText(this.message).width + 30;
      const msgX = (GRID_PX_W - msgW) / 2;
      ctx.fillRect(msgX, y0 + 105, msgW, 24);
      ctx.fillStyle = this.messageColor;
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.message, GRID_PX_W / 2, y0 + 111);
      this.messageTimer--;
    }

    // 保存按钮区域供点击检测
    this._toolbarBtns = toolKeys.map((key, i) => ({
      key, x: toolStartX + i * (toolW + toolGap), y: toolY, w: toolW, h: 28
    }));
    this._funcBtns = buttons.map(b => ({ ...b, y: btnY, h: 30 }));
  }

  // ============ 绘制商店面板 ============
  drawShop(market, money, season, inventory, seeds, farmInventory) {
    const ctx = this.ctx;
    const panelW = 700;
    const panelH = 500;
    const px = (GRID_PX_W - panelW) / 2;
    const py = 20;

    // 半透明背景
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GRID_PX_W, GRID_PX_H + HUD_HEIGHT);

    // 面板背景
    ctx.fillStyle = this.COLORS.shopBg;
    ctx.fillRect(px, py, panelW, panelH);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 3;
    ctx.strokeRect(px, py, panelW, panelH);

    // 标题
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏪 农场商店', GRID_PX_W / 2, py + 30);

    // 标签页
    const tabs = [
      { key: 'seeds', label: '🌱 种子' },
      { key: 'animals', label: '🐾 动物' },
      { key: 'sell', label: '💰 出售' },
    ];
    const tabW = 120;
    const tabY = py + 45;
    tabs.forEach((tab, i) => {
      const tx = GRID_PX_W / 2 - (tabs.length * tabW) / 2 + i * tabW;
      const isActive = this.selectedTab === tab.key;
      ctx.fillStyle = isActive ? '#8B6914' : '#3A2510';
      ctx.fillRect(tx, tabY, tabW - 4, 30);
      ctx.strokeStyle = isActive ? '#FFD700' : '#6B4E0A';
      ctx.lineWidth = isActive ? 2 : 1;
      ctx.strokeRect(tx, tabY, tabW - 4, 30);
      ctx.fillStyle = isActive ? '#FFD700' : '#D2B48C';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(tab.label, tx + (tabW - 4) / 2, tabY + 10);
    });

    // 内容区
    const contentY = tabY + 40;
    ctx.fillStyle = '#1A0E06';
    ctx.fillRect(px + 10, contentY, panelW - 20, panelH - 100);
    ctx.strokeStyle = '#6B4E0A';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 10, contentY, panelW - 20, panelH - 100);

    // 显示资金
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`💰 ${money} 金币`, px + panelW - 20, py + 30);

    // 当前季节
    ctx.fillStyle = '#90EE90';
    ctx.textAlign = 'left';
    ctx.fillText(`当前: ${season}`, px + 20, py + 30);

    this._shopItems = [];

    if (this.selectedTab === 'seeds') {
      this._drawSeedTab(ctx, market, money, season, seeds, px, contentY, panelW);
    } else if (this.selectedTab === 'animals') {
      this._drawAnimalTab(ctx, market, money, px, contentY, panelW);
    } else if (this.selectedTab === 'sell') {
      this._drawSellTab(ctx, market, farmInventory, px, contentY, panelW);
    }

    // 关闭按钮
    const closeX = px + panelW - 35;
    const closeY = py + 5;
    ctx.fillStyle = '#CC3333';
    ctx.fillRect(closeX, closeY, 28, 28);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('X', closeX + 14, closeY + 9);
    this._closeBtn = { x: closeX, y: closeY, w: 28, h: 28 };
  }

  _drawSeedTab(ctx, market, money, season, seeds, px, contentY, panelW) {
    const items = market.getSeedList();
    const itemH = 40;
    ctx.font = '13px sans-serif';

    items.forEach((item, i) => {
      const iy = contentY + 10 + i * itemH;
      const canPlant = item.seasons.includes(season);
      const canBuy = money >= item.price;
      const owned = seeds[item.type] || 0;

      // 行背景
      ctx.fillStyle = i % 2 === 0 ? 'rgba(60,30,10,0.5)' : 'rgba(40,20,5,0.5)';
      ctx.fillRect(px + 15, iy, panelW - 30, itemH - 2);

      // 图标+名称
      ctx.fillStyle = canPlant ? '#FFF' : '#888';
      ctx.textAlign = 'left';
      ctx.fillText(`${item.icon} ${item.name}`, px + 20, iy + 14);

      // 季节标签
      ctx.font = '11px sans-serif';
      ctx.fillStyle = canPlant ? '#90EE90' : '#FF6666';
      ctx.fillText(`适合: ${item.seasons.join('/')}`, px + 140, iy + 14);

      // 生长时间
      ctx.fillStyle = '#AAA';
      ctx.fillText(`生长: ${item.growTime}天`, px + 260, iy + 14);

      // 持有数量
      ctx.fillStyle = '#FFD700';
      ctx.fillText(`持有: ${owned}`, px + 350, iy + 14);

      // 购买按钮
      ctx.font = '13px sans-serif';
      const btnX = px + panelW - 130;
      const btnW = 100;
      const isHovered = this._isInRect(this._mx, this._my, btnX, iy + 2, btnW, 24);
      ctx.fillStyle = !canBuy ? '#555' : isHovered ? '#7A4E2A' : '#5C3A1E';
      ctx.fillRect(btnX, iy + 2, btnW, 24);
      ctx.strokeStyle = canBuy ? '#8B6914' : '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(btnX, iy + 2, btnW, 24);
      ctx.fillStyle = canBuy ? '#FFD700' : '#888';
      ctx.textAlign = 'center';
      ctx.fillText(`购买 ${item.price}💰`, btnX + btnW / 2, iy + 13);

      this._shopItems.push({ type: 'seed', cropType: item.type, x: btnX, y: iy + 2, w: btnW, h: 24, price: item.price });
    });
  }

  _drawAnimalTab(ctx, market, money, px, contentY, panelW) {
    const items = market.getAnimalList();
    const itemH = 55;

    items.forEach((item, i) => {
      const iy = contentY + 10 + i * itemH;
      const canBuy = money >= item.price;

      ctx.fillStyle = i % 2 === 0 ? 'rgba(60,30,10,0.5)' : 'rgba(40,20,5,0.5)';
      ctx.fillRect(px + 15, iy, panelW - 30, itemH - 2);

      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'left';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText(`${item.icon} ${item.name}`, px + 20, iy + 12);

      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#CCC';
      ctx.fillText(`产出: ${item.product} (${item.price}💰/个)`, px + 20, iy + 32);

      const btnX = px + panelW - 130;
      const btnW = 100;
      const isHovered = this._isInRect(this._mx, this._my, btnX, iy + 10, btnW, 28);
      ctx.fillStyle = !canBuy ? '#555' : isHovered ? '#7A4E2A' : '#5C3A1E';
      ctx.fillRect(btnX, iy + 10, btnW, 28);
      ctx.strokeStyle = canBuy ? '#8B6914' : '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(btnX, iy + 10, btnW, 28);
      ctx.fillStyle = canBuy ? '#FFD700' : '#888';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`购买 ${item.price}💰`, btnX + btnW / 2, iy + 18);

      this._shopItems.push({ type: 'animal', animalType: item.type, x: btnX, y: iy + 10, w: btnW, h: 28, price: item.price });
    });
  }

  _drawSellTab(ctx, market, farmInventory, px, contentY, panelW) {
    const items = [];
    // 农作物库存
    for (const [key, inv] of Object.entries(farmInventory)) {
      if (inv.amount > 0) {
        items.push({
          category: 'crop', type: key, name: inv.name, icon: inv.icon,
          amount: inv.amount, price: market.getCropSellPrice(key),
        });
      }
    }

    if (items.length === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂无可出售物品', GRID_PX_W / 2, contentY + 60);
      return;
    }

    const itemH = 40;
    items.forEach((item, i) => {
      const iy = contentY + 10 + i * itemH;

      ctx.fillStyle = i % 2 === 0 ? 'rgba(60,30,10,0.5)' : 'rgba(40,20,5,0.5)';
      ctx.fillRect(px + 15, iy, panelW - 30, itemH - 2);

      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'left';
      ctx.font = '13px sans-serif';
      ctx.fillText(`${item.icon} ${item.name} x${item.amount}`, px + 20, iy + 14);
      ctx.fillStyle = '#FFD700';
      ctx.fillText(`单价: ${item.price}💰  总价: ${item.price * item.amount}💰`, px + 200, iy + 14);

      const btnX = px + panelW - 130;
      const btnW = 100;
      const isHovered = this._isInRect(this._mx, this._my, btnX, iy + 2, btnW, 24);
      ctx.fillStyle = isHovered ? '#7A4E2A' : '#5C3A1E';
      ctx.fillRect(btnX, iy + 2, btnW, 24);
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 1;
      ctx.strokeRect(btnX, iy + 2, btnW, 24);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('出售全部', btnX + btnW / 2, iy + 13);

      this._shopItems.push({ type: 'sell', category: item.category, itemType: item.type, x: btnX, y: iy + 2, w: btnW, h: 24 });
    });
  }

  // ============ 动物面板 ============
  drawAnimalPanel(animalMgr) {
    const ctx = this.ctx;
    const panelW = 600;
    const panelH = 450;
    const px = (GRID_PX_W - panelW) / 2;
    const py = 30;

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GRID_PX_W, GRID_PX_H + HUD_HEIGHT);

    ctx.fillStyle = this.COLORS.shopBg;
    ctx.fillRect(px, py, panelW, panelH);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 3;
    ctx.strokeRect(px, py, panelW, panelH);

    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🐾 动物管理', GRID_PX_W / 2, py + 30);

    const animals = animalMgr.animals;
    if (animals.length === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '14px sans-serif';
      ctx.fillText('还没有动物，去商店购买吧！', GRID_PX_W / 2, py + 100);
    } else {
      const itemH = 50;
      animals.forEach((animal, i) => {
        const iy = py + 50 + i * itemH;
        if (iy + itemH > py + panelH - 50) return;

        ctx.fillStyle = i % 2 === 0 ? 'rgba(60,30,10,0.5)' : 'rgba(40,20,5,0.5)';
        ctx.fillRect(px + 10, iy, panelW - 20, itemH - 2);

        ctx.fillStyle = '#FFF';
        ctx.textAlign = 'left';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(`${animal.data.icon} ${animal.name}`, px + 15, iy + 8);

        ctx.font = '11px sans-serif';
        // 饥饿条
        this._drawBar(ctx, px + 15, iy + 26, 80, 10, animal.hunger / 100,
          animal.hunger > 50 ? '#4CAF50' : animal.hunger > 20 ? '#FF9800' : '#F44336', '饱');
        // 清洁条
        this._drawBar(ctx, px + 105, iy + 26, 80, 10, animal.cleanliness / 100,
          animal.cleanliness > 50 ? '#2196F3' : '#FF9800', '洁');
        // 幸福条
        this._drawBar(ctx, px + 195, iy + 26, 80, 10, animal.happiness / 100,
          animal.happiness > 50 ? '#E91E63' : '#FF9800', '乐');

        // 产品状态
        ctx.fillStyle = animal.hasProduct ? '#FFD700' : '#888';
        ctx.textAlign = 'left';
        ctx.fillText(animal.hasProduct ? `有${animal.data.product}可收集` : '暂无产品', px + 290, iy + 30);

        // 喂养按钮
        const feedX = px + panelW - 170;
        const isHoveredFeed = this._isInRect(this._mx, this._my, feedX, iy + 5, 60, 22);
        ctx.fillStyle = isHoveredFeed ? '#7A4E2A' : '#5C3A1E';
        ctx.fillRect(feedX, iy + 5, 60, 22);
        ctx.fillStyle = '#FFD700';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('喂养', feedX + 30, iy + 14);

        // 清洁按钮
        const cleanX = px + panelW - 100;
        const isHoveredClean = this._isInRect(this._mx, this._my, cleanX, iy + 5, 60, 22);
        ctx.fillStyle = isHoveredClean ? '#7A4E2A' : '#5C3A1E';
        ctx.fillRect(cleanX, iy + 5, 60, 22);
        ctx.fillStyle = '#FFD700';
        ctx.textAlign = 'center';
        ctx.fillText('清洁', cleanX + 30, iy + 14);

        if (!this._animalActions) this._animalActions = [];
        this._animalActions.push({ id: animal.id, feedX, cleanX, y: iy + 5 });
      });
    }

    // 关闭按钮
    const closeX = px + panelW - 35;
    const closeY = py + 5;
    ctx.fillStyle = '#CC3333';
    ctx.fillRect(closeX, closeY, 28, 28);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('X', closeX + 14, closeY + 9);
    this._closeBtn = { x: closeX, y: closeY, w: 28, h: 28 };
  }

  _drawBar(ctx, x, y, w, h, ratio, color, label) {
    ctx.fillStyle = '#1A0E06';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * Math.max(0, Math.min(1, ratio)), h);
    ctx.strokeStyle = '#6B4E0A';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#FFF';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${label} ${Math.round(ratio * 100)}%`, x + w / 2, y + 8);
  }

  // ============ 绘制种子选择面板 ============
  drawSeedSelectPanel(seeds, season) {
    const ctx = this.ctx;
    const panelW = 350;
    const panelH = 300;
    const px = (GRID_PX_W - panelW) / 2;
    const py = 80;

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GRID_PX_W, GRID_PX_H + HUD_HEIGHT);

    ctx.fillStyle = this.COLORS.shopBg;
    ctx.fillRect(px, py, panelW, panelH);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, panelW, panelH);

    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('选择种子', GRID_PX_W / 2, py + 25);

    const seedList = Object.entries(seeds).filter(([_, count]) => count > 0);
    if (seedList.length === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '14px sans-serif';
      ctx.fillText('没有种子，请先去商店购买', GRID_PX_W / 2, py + 80);
    }

    this._seedSelectItems = [];
    const itemH = 35;
    seedList.forEach(([type, count], i) => {
      const iy = py + 40 + i * itemH;
      const crop = CROPS[type];
      const canPlant = crop.seasons.includes(season);

      ctx.fillStyle = i % 2 === 0 ? 'rgba(60,30,10,0.5)' : 'rgba(40,20,5,0.5)';
      ctx.fillRect(px + 10, iy, panelW - 20, itemH - 2);

      ctx.fillStyle = canPlant ? '#FFF' : '#888';
      ctx.textAlign = 'left';
      ctx.font = '13px sans-serif';
      ctx.fillText(`${crop.icon} ${crop.name} x${count}`, px + 20, iy + 12);

      ctx.fillStyle = canPlant ? '#90EE90' : '#FF6666';
      ctx.font = '11px sans-serif';
      ctx.fillText(canPlant ? `${season}可种` : `${season}不可种`, px + 180, iy + 12);

      this._seedSelectItems.push({ type, x: px + 10, y: iy, w: panelW - 20, h: itemH - 2, canPlant });
    });

    // 关闭按钮
    const closeX = px + panelW - 30;
    const closeY = py + 3;
    ctx.fillStyle = '#CC3333';
    ctx.fillRect(closeX, closeY, 24, 24);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('X', closeX + 12, closeY + 7);
    this._closeBtn = { x: closeX, y: closeY, w: 24, h: 24 };
  }

  // ============ 绘制信息提示（悬停地块） ============
  drawTooltip(farm, row, col) {
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return;
    const info = farm.getTileInfo(row, col);
    if (!info) return;

    const ctx = this.ctx;
    const x = col * TILE_SIZE + TILE_SIZE / 2;
    const y = row * TILE_SIZE;

    let lines = [];
    if (info.state === TILE_STATES.GRASS) {
      lines = ['草地', '使用锄头翻地'];
    } else if (info.state === TILE_STATES.TILLED) {
      lines = ['已翻地', '可种植作物'];
    } else if (info.crop) {
      const crop = info.crop;
      lines = [
        `${crop.data.icon} ${crop.data.name}`,
        `阶段: ${crop.getStageName()}`,
        crop.watered ? '已浇水 ✓' : '需要浇水!',
      ];
      if (crop.isHarvestable()) {
        lines.push('可收获! 使用镰刀');
      }
      if (!crop.alive) {
        lines = [`${crop.data.icon} ${crop.data.name}`, '已枯萎', '使用锄头清除'];
      }
    }

    if (lines.length === 0) return;

    ctx.font = '12px sans-serif';
    const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
    const tw = maxW + 20;
    const th = lines.length * 18 + 10;
    let tx = Math.min(x - tw / 2, GRID_PX_W - tw - 5);
    let ty = y - th - 5;
    if (ty < 5) ty = y + TILE_SIZE + 5;
    tx = Math.max(5, tx);

    ctx.fillStyle = 'rgba(20, 10, 5, 0.9)';
    ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, ty, tw, th);

    ctx.fillStyle = '#F5DEB3';
    ctx.textAlign = 'left';
    lines.forEach((line, i) => {
      ctx.fillText(line, tx + 10, ty + 16 + i * 18);
    });
  }

  // ============ 辅助方法 ============
  _isInRect(mx, my, x, y, w, h) {
    return mx >= x && mx <= x + w && my >= y && my <= y + h;
  }

  getClickedTool(mx, my) {
    if (!this._toolbarBtns) return null;
    for (const btn of this._toolbarBtns) {
      if (this._isInRect(mx, my, btn.x, btn.y, btn.w, btn.h)) return btn.key;
    }
    return null;
  }

  getClickedFuncBtn(mx, my) {
    if (!this._funcBtns) return null;
    for (const btn of this._funcBtns) {
      if (this._isInRect(mx, my, btn.btnX, btn.y, btn.w, btn.h)) return btn.key;
    }
    return null;
  }

  getClickedShopItem(mx, my) {
    if (!this._shopItems) return null;
    for (const item of this._shopItems) {
      if (this._isInRect(mx, my, item.x, item.y, item.w, item.h)) return item;
    }
    return null;
  }

  getClickedSeedSelect(mx, my) {
    if (!this._seedSelectItems) return null;
    for (const item of this._seedSelectItems) {
      if (this._isInRect(mx, my, item.x, item.y, item.w, item.h)) return item;
    }
    return null;
  }

  getClickedCloseBtn(mx, my) {
    if (!this._closeBtn) return false;
    return this._isInRect(mx, my, this._closeBtn.x, this._closeBtn.y, this._closeBtn.w, this._closeBtn.h);
  }

  getClickedAnimalAction(mx, my) {
    if (!this._animalActions) return null;
    for (const act of this._animalActions) {
      if (this._isInRect(mx, my, act.feedX, act.y, 60, 22)) return { id: act.id, action: 'feed' };
      if (this._isInRect(mx, my, act.cleanX, act.y, 60, 22)) return { id: act.id, action: 'clean' };
    }
    return null;
  }

  getClickedTile(mx, my) {
    const col = Math.floor(mx / TILE_SIZE);
    const row = Math.floor(my / TILE_SIZE);
    if (row >= 0 && row < GRID_ROWS && col >= 0 && col < GRID_COLS) {
      return { row, col };
    }
    return null;
  }

  updateMouse(mx, my) {
    this._mx = mx;
    this._my = my;
    if (my < GRID_PX_H) {
      this.hoveredTile = this.getClickedTile(mx, my);
    } else {
      this.hoveredTile = null;
    }
  }
}

// ============ 游戏状态 ============
const state = {
  // 时间
  seasonIndex: 0,       // 0=春 1=夏 2=秋 3=冬
  day: 1,
  hour: DAY_START_HOUR,
  totalDays: 0,
  paused: false,        // 晚上休息暂停
  dayOver: false,

  // 经济
  money: INITIAL_MONEY,

  // 选择的种子类型（种植模式下）
  selectedSeedType: null,

  // 种子面板打开状态
  showSeedSelect: false,
};

// ============ 初始化系统 ============
const canvas = document.getElementById('gameCanvas');
const ui = new UI(canvas);
const farm = new Farm();
const animalMgr = new AnimalManager();
const market = new Market();
const weather = new Weather();

// 初始天气
weather.advanceDay(SEASONS[state.seasonIndex]);

// ============ 时间系统 ============
function getSeason() {
  return SEASONS[state.seasonIndex];
}

function advanceHour() {
  state.hour++;
  if (state.hour >= DAY_END_HOUR) {
    endDay();
  }
}

function endDay() {
  state.dayOver = true;
  state.paused = true;

  // 收集动物产品
  const products = animalMgr.collectAllProducts();
  if (products.length > 0) {
    const productNames = products.map(p => p.product).join('、');
    ui.showMessage(`收集到: ${productNames}`, '#FFD700', 180);
  }

  // 更新作物
  farm.updateDay(weather.current);

  // 更新动物
  const newBorn = animalMgr.updateDay(state.totalDays);
  if (newBorn > 0) {
    Sound.breed();
    ui.showMessage(`有${newBorn}只新动物诞生！`, '#FF69B4', 150);
  }

  // 更新市场价格
  market.updatePrices();

  // 推进天气
  weather.advanceDay(getSeason());

  // 推进日期
  state.totalDays++;
  state.day++;
  if (state.day > DAYS_PER_SEASON) {
    state.day = 1;
    state.seasonIndex = (state.seasonIndex + 1) % 4;
    Sound.seasonChange();
    ui.showMessage(`季节变换 - 现在是${getSeason()}！`, '#90EE90', 180);
  }

  state.hour = DAY_START_HOUR;
  state.dayOver = false;
  state.paused = false;
  Sound.newDay();
}

// ============ 绘制主循环 ============
function render() {
  const weatherInfo = weather.getCurrent();

  // 更新鼠标位置（悬停效果）
  // ui.updateMouse 在事件监听中设置

  // 绘制农场
  ui.drawFarm(farm, weatherInfo.type);

  // 绘制HUD
  const seasonProgress = (state.day - 1) / DAYS_PER_SEASON;
  ui.drawHUD({
    season: getSeason(),
    day: state.day,
    hour: state.hour,
    money: state.money,
    weather: weatherInfo,
    animalCount: animalMgr.getCount(),
    seasonProgress,
  });

  // 绘制悬停提示
  if (ui.hoveredTile && !ui.showShop && !ui.showAnimalPanel && !state.showSeedSelect) {
    ui.drawTooltip(farm, ui.hoveredTile.row, ui.hoveredTile.col);
  }

  // 绘制面板
  if (ui.showShop) {
    ui.drawShop(market, state.money, getSeason(), animalMgr.products, farm.seeds, farm.inventory);
  } else if (ui.showAnimalPanel) {
    ui._animalActions = [];
    ui.drawAnimalPanel(animalMgr);
  } else if (state.showSeedSelect) {
    ui.drawSeedSelectPanel(farm.seeds, getSeason());
  }

  requestAnimationFrame(render);
}

// ============ 事件处理 ============
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

canvas.addEventListener('mousemove', (e) => {
  const { x, y } = getMousePos(e);
  ui.updateMouse(x, y);
});

canvas.addEventListener('click', (e) => {
  initAudio();
  const { x, y } = getMousePos(e);

  // 商店面板打开
  if (ui.showShop) {
    handleShopClick(x, y);
    return;
  }

  // 动物面板打开
  if (ui.showAnimalPanel) {
    handleAnimalPanelClick(x, y);
    return;
  }

  // 种子选择面板打开
  if (state.showSeedSelect) {
    handleSeedSelectClick(x, y);
    return;
  }

  // 工具栏点击
  const tool = ui.getClickedTool(x, y);
  if (tool) {
    ui.selectedTool = tool;
    if (tool === 'plant') {
      // 如果有种子，打开种子选择面板
      const seedTypes = Object.keys(farm.seeds).filter(k => farm.seeds[k] > 0);
      if (seedTypes.length > 0) {
        state.showSeedSelect = true;
      } else {
        ui.showMessage('没有种子，请先去商店购买', '#FF6666');
        Sound.error();
      }
    }
    return;
  }

  // 功能按钮点击
  const funcBtn = ui.getClickedFuncBtn(x, y);
  if (funcBtn) {
    switch (funcBtn) {
      case 'shop':
        ui.showShop = true;
        break;
      case 'animal':
        ui.showAnimalPanel = true;
        break;
      case 'collect':
        handleCollect();
        break;
      case 'nextDay':
        if (!state.dayOver) {
          state.hour = DAY_END_HOUR;
          endDay();
        }
        break;
    }
    return;
  }

  // 农田点击 (网格区域: 8行 × 64px = 512)
  if (y < 512) {
    handleFarmClick(x, y);
  }
});

// 右键取消选择
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  state.selectedSeedType = null;
  state.showSeedSelect = false;
  ui.showShop = false;
  ui.showAnimalPanel = false;
});

// ============ 农田点击处理 ============
function handleFarmClick(mx, my) {
  const tile = ui.getClickedTile(mx, my);
  if (!tile) return;
  const { row, col } = tile;

  switch (ui.selectedTool) {
    case 'hoe': {
      const info = farm.getTileInfo(row, col);
      if (!info) break;
      if (info.state === 0) { // GRASS
        if (farm.till(row, col)) {
          Sound.hoe();
          ui.showMessage('翻地成功');
          advanceHour();
        }
      } else if (info.crop && !info.crop.alive) {
        if (farm.clearWithered(row, col)) {
          Sound.hoe();
          ui.showMessage('清除了枯萎作物');
          advanceHour();
        }
      } else {
        ui.showMessage('这里不需要锄头', '#FF6666');
        Sound.error();
      }
      break;
    }

    case 'water': {
      const info = farm.getTileInfo(row, col);
      if (!info || !info.crop) {
        ui.showMessage('这里没有作物', '#FF6666');
        Sound.error();
        break;
      }
      if (farm.water(row, col)) {
        Sound.water();
        ui.showMessage('浇水成功');
        advanceHour();
      } else {
        ui.showMessage('今天已经浇过水了', '#FF9900');
        Sound.error();
      }
      break;
    }

    case 'sickle': {
      const info = farm.getTileInfo(row, col);
      if (!info || !info.crop) {
        ui.showMessage('这里没有作物', '#FF6666');
        Sound.error();
        break;
      }
      if (info.crop.isHarvestable()) {
        const result = farm.harvest(row, col);
        if (result) {
          Sound.harvest();
          ui.showMessage(`收获了 ${result.amount} 个 ${result.name}！`, '#FFD700');
          advanceHour();
        }
      } else if (!info.crop.alive) {
        ui.showMessage('作物已枯萎，用锄头清除', '#FF6666');
        Sound.error();
      } else {
        ui.showMessage('作物还没成熟', '#FF9900');
        Sound.error();
      }
      break;
    }

    case 'plant': {
      if (!state.selectedSeedType) {
        state.showSeedSelect = true;
        ui.showMessage('请先选择种子', '#FF9900');
        break;
      }
      const info = farm.getTileInfo(row, col);
      if (!info || info.state !== 1) { // TILLED
        ui.showMessage('需要先翻地才能种植', '#FF6666');
        Sound.error();
        break;
      }
      const cropData = CROPS[state.selectedSeedType];
      if (!cropData.seasons.includes(getSeason())) {
        ui.showMessage(`${cropData.name}不适合在${getSeason()}种植`, '#FF6666');
        Sound.error();
        break;
      }
      if (farm.plant(row, col, state.selectedSeedType)) {
        Sound.plant();
        ui.showMessage(`种下了${cropData.name}`);
        advanceHour();
      } else {
        ui.showMessage('种植失败（没有种子）', '#FF6666');
        Sound.error();
      }
      break;
    }

    case 'feed': {
      ui.showMessage('饲料工具用于动物，请打开动物面板', '#FF9900');
      break;
    }
  }
}

// ============ 商店点击处理 ============
function handleShopClick(mx, my) {
  // 关闭按钮
  if (ui.getClickedCloseBtn(mx, my)) {
    ui.showShop = false;
    return;
  }

  // 标签页切换 (面板中心 x = 768/2 = 384)
  const tabArea = { y: 65, h: 30 };
  const tabW = 120;
  const tabs = ['seeds', 'animals', 'sell'];
  tabs.forEach((tab, i) => {
    const tx = 384 - (tabs.length * tabW) / 2 + i * tabW;
    if (ui._isInRect(mx, my, tx, tabArea.y, tabW - 4, tabArea.h)) {
      ui.selectedTab = tab;
    }
  });

  // 商品点击
  const item = ui.getClickedShopItem(mx, my);
  if (!item) return;

  if (item.type === 'seed') {
    const result = market.buySeed(item.cropType, state.money);
    if (result.success) {
      state.money -= result.price;
      farm.addSeeds(item.cropType, 1);
      Sound.buy();
      ui.showMessage(`购买了1个${CROPS[item.cropType].name}种子 (-${result.price}💰)`, '#90EE90');
    } else {
      Sound.error();
      ui.showMessage(result.reason, '#FF6666');
    }
  } else if (item.type === 'animal') {
    const result = market.buyAnimal(item.animalType, state.money);
    if (result.success) {
      state.money -= result.price;
      animalMgr.buy(item.animalType);
      Sound.buy();
      ui.showMessage(`购买了${ANIMALS[item.animalType].name} (-${result.price}💰)`, '#90EE90');
    } else {
      Sound.error();
      ui.showMessage(result.reason, '#FF6666');
    }
  } else if (item.type === 'sell') {
    if (item.category === 'crop') {
      const result = farm.sellInventory(item.itemType);
      if (result && result.total > 0) {
        state.money += result.total;
        Sound.sell();
        ui.showMessage(`出售了 ${result.amount} 个 ${CROPS[item.itemType].name} (+${result.total}💰)`, '#FFD700');
      }
    }
  }
}

// ============ 动物面板点击处理 ============
function handleAnimalPanelClick(mx, my) {
  if (ui.getClickedCloseBtn(mx, my)) {
    ui.showAnimalPanel = false;
    return;
  }

  const action = ui.getClickedAnimalAction(mx, my);
  if (action) {
    const animal = animalMgr.animals.find(a => a.id === action.id);
    if (!animal) return;

    if (action.action === 'feed') {
      const feedCost = animal.data.feedCost;
      if (state.money < feedCost) {
        Sound.error();
        ui.showMessage('资金不足', '#FF6666');
        return;
      }
      state.money -= feedCost;
      animal.feed(state.totalDays);
      Sound.feed();
      ui.showMessage(`喂养了${animal.name} (-${feedCost}💰)`);
    } else if (action.action === 'clean') {
      const cleanCost = animal.data.cleanCost;
      if (state.money < cleanCost) {
        Sound.error();
        ui.showMessage('资金不足', '#FF6666');
        return;
      }
      state.money -= cleanCost;
      animal.clean(state.totalDays);
      Sound.water();
      ui.showMessage(`清洁了${animal.name} (-${cleanCost}💰)`);
    }
  }
}

// ============ 种子选择面板点击处理 ============
function handleSeedSelectClick(mx, my) {
  if (ui.getClickedCloseBtn(mx, my)) {
    state.showSeedSelect = false;
    return;
  }

  const item = ui.getClickedSeedSelect(mx, my);
  if (item && item.canPlant) {
    state.selectedSeedType = item.type;
    state.showSeedSelect = false;
    ui.showMessage(`已选择 ${CROPS[item.type].name} 种子`, '#90EE90');
  } else if (item && !item.canPlant) {
    Sound.error();
    ui.showMessage(`${CROPS[item.type].name}不适合在${getSeason()}种植`, '#FF6666');
  }
}

// ============ 收集产品 ============
function handleCollect() {
  const products = animalMgr.collectAllProducts();
  if (products.length > 0) {
    Sound.harvest();
    const summary = products.map(p => p.product).join('、');
    ui.showMessage(`收集到: ${summary}`, '#FFD700');
  } else {
    ui.showMessage('暂无可收集的产品', '#FF9900');
  }
}

// ============ 键盘快捷键 ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    ui.showShop = false;
    ui.showAnimalPanel = false;
    state.showSeedSelect = false;
  }
  if (e.key === 'b' || e.key === 'B') {
    ui.showShop = !ui.showShop;
    ui.showAnimalPanel = false;
    state.showSeedSelect = false;
  }
  if (e.key === 'n' || e.key === 'N') {
    ui.showAnimalPanel = !ui.showAnimalPanel;
    ui.showShop = false;
    state.showSeedSelect = false;
  }
  if (e.key === ' ' && !ui.showShop && !ui.showAnimalPanel) {
    e.preventDefault();
    if (!state.dayOver) {
      state.hour = DAY_END_HOUR;
      endDay();
    }
  }
});

// ============ 启动游戏 ============
console.log('农场模拟游戏启动！');
render();


</script>

</body>
</html>
