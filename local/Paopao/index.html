<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡堂 - MIMO Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #gameCanvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5),
                        0 0 60px rgba(0, 212, 255, 0.3);
            background: #000;
        }

        #hud {
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingText {
            color: #00d4ff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-spinner"></div>
        <div id="loadingText">加载中...</div>
    </div>

    <div id="gameContainer">
        <div id="hud">
            <div class="hud-item">❤️ <span id="lives">3</span></div>
            <div class="hud-item">💣 <span id="bombs">1</span></div>
            <div class="hud-item">🔥 <span id="fire">1</span></div>
            <div class="hud-item">⚡ <span id="speed">1</span></div>
            <div class="hud-item">🏆 <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        方向键移动 | 空格键放炸弹 | ESC暂停
    </div>

    <script>
// === ./config.js ===
// ============================================================
// 泡泡堂 - 全局配置和共享状态
// ============================================================

const COLS = 15;
const ROWS = 13;
const CELL = 48;
const W = COLS * CELL;
const H = ROWS * CELL;

const TILE_EMPTY = 0;
const TILE_HARD = 1;
const TILE_SOFT = 2;

// 道具类型
const ITEM_FLAME = 0;
const ITEM_SPEED = 1;
const ITEM_BOMB = 2;
const ITEM_SHIELD = 3;
const ITEM_FULLFIRE = 4;
const ITEM_WALLPASS = 5;

const ITEM_NAMES = ['火焰', '速度', '炸弹', '护盾', '全火', '穿墙'];
const ITEM_MAX_COUNT = 8; // 地图上同时存在的道具上限

const COLORS = {
  bg: '#2d5a27',
  grass1: '#3a7a32',
  grass2: '#2d6a28',
  hard: '#5a4a3a',
  hardLight: '#6a5a4a',
  hardDark: '#4a3a2a',
  soft: '#c4a882',
  softLight: '#d4b892',
  softDark: '#a48862',
  bomb: '#222',
  fuse: '#ff4444',
  explosion: ['#ff0', '#ff8800', '#ff4400', '#ff0000', '#cc0000'],
};

// 共享游戏状态
const game = {
  canvas: null,
  ctx: null,
  state: 'menu', // menu, playing, paused, win, lose
  difficulty: 'easy',
  level: 1,
  score: 0,
  frame: 0,
};

const state = {
  map: [],
  player: null,
  enemies: [],
  bombs: [],
  explosions: [],
  items: [],
};

const keys = {};

// === ./map.js ===
// ============================================================
// 泡泡堂 - 地图生成与渲染
// ============================================================


function generateMap(stage) {
  state.map = [];
  for (let r = 0; r < ROWS; r++) {
    state.map[r] = [];
    for (let c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
        state.map[r][c] = TILE_HARD;
      } else if (r % 2 === 0 && c % 2 === 0) {
        state.map[r][c] = TILE_HARD;
      } else {
        state.map[r][c] = TILE_EMPTY;
      }
    }
  }
  // 放置软墙
  const softCount = 30 + stage * 5;
  let placed = 0;
  const spawnPoints = [[1, 1], [COLS - 2, ROWS - 2], [COLS - 2, 1], [1, ROWS - 2],
    [COLS - 2, Math.floor(ROWS / 2)], [Math.floor(COLS / 2), 1], [Math.floor(COLS / 2), ROWS - 2]];
  const safeSet = new Set();
  for (const [sc, sr] of spawnPoints) {
    for (const [dr, dc] of [[0, 0], [0, 1], [0, -1], [1, 0], [-1, 0]]) {
      const nr = sr + dr, nc = sc + dc;
      if (nr > 0 && nr < ROWS - 1 && nc > 0 && nc < COLS - 1) {
        safeSet.add(`${nr},${nc}`);
      }
    }
  }
  let attempts = 0;
  while (placed < softCount && attempts < 500) {
    const r = 1 + Math.floor(Math.random() * (ROWS - 2));
    const c = 1 + Math.floor(Math.random() * (COLS - 2));
    if (state.map[r][c] === TILE_EMPTY && !safeSet.has(`${r},${c}`)) {
      state.map[r][c] = TILE_SOFT;
      placed++;
    }
    attempts++;
  }
}

function drawMap() {
  const ctx = game.ctx;
  if (!state.map || state.map.length === 0) return;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL;
      const y = r * CELL;
      ctx.fillStyle = (r + c) % 2 === 0 ? COLORS.grass1 : COLORS.grass2;
      ctx.fillRect(x, y, CELL, CELL);
      if (state.map[r][c] === TILE_HARD) {
        drawHardWall(x, y);
      } else if (state.map[r][c] === TILE_SOFT) {
        drawSoftWall(x, y);
      }
    }
  }
}

function drawHardWall(x, y) {
  const ctx = game.ctx;
  ctx.fillStyle = COLORS.hard;
  ctx.fillRect(x, y, CELL, CELL);
  ctx.fillStyle = COLORS.hardLight;
  ctx.fillRect(x + 2, y + 2, CELL / 2 - 3, CELL / 2 - 3);
  ctx.fillRect(x + CELL / 2 + 1, y + CELL / 2 + 1, CELL / 2 - 3, CELL / 2 - 3);
  ctx.fillStyle = COLORS.hardDark;
  ctx.fillRect(x + CELL / 2 + 1, y + 2, CELL / 2 - 3, CELL / 2 - 3);
  ctx.fillRect(x + 2, y + CELL / 2 + 1, CELL / 2 - 3, CELL / 2 - 3);
  ctx.strokeStyle = COLORS.hardDark;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
}

function drawSoftWall(x, y) {
  const ctx = game.ctx;
  ctx.fillStyle = COLORS.soft;
  ctx.fillRect(x, y, CELL, CELL);
  ctx.fillStyle = COLORS.softLight;
  ctx.fillRect(x + 4, y + 4, CELL - 8, CELL - 8);
  ctx.fillStyle = COLORS.softDark;
  ctx.fillRect(x + CELL / 2 - 2, y + 4, 4, CELL - 8);
  ctx.fillRect(x + 4, y + CELL / 2 - 2, CELL - 8, 4);
  ctx.strokeStyle = COLORS.softDark;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
}

// === ./character.js ===
// ============================================================
// 泡泡堂 - 角色类
// ============================================================


class Character {
  constructor(col, row, isPlayer) {
    this.x = col * CELL + CELL / 2;
    this.y = row * CELL + CELL / 2;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 3 : 0;
    this.maxBombs = isPlayer ? 1 : 1;
    this.activeBombs = 0;
    this.flameRange = isPlayer ? 1 : 1;
    this.alive = true;
    this.dir = 0; // 0=down, 1=left, 2=right, 3=up
    this.animFrame = 0;
    this.animTimer = 0;
    this.invincible = 0;
    // 护盾层数
    this.shield = 0;
    // 全火效果（下一颗炸弹覆盖整条走廊）
    this.fullFire = false;
    // 穿墙效果（可穿越软墙）
    this.wallPassTimer = 0;
    // AI
    this.aiTimer = 0;
    this.aiState = 'patrol';
    this.aiTarget = null;
    this.aiDir = -1;
    this.bombCooldown = 0;
    this.passThroughBombs = new Set();
  }

  get col() { return Math.floor(this.x / CELL); }
  get row() { return Math.floor(this.y / CELL); }

  getSpeed() {
    if (this.isPlayer) return 3 + this.speed * 0.5;
    const base = game.difficulty === 'hard' ? 2.8 : game.difficulty === 'normal' ? 2.2 : 1.6;
    return base;
  }

  canPlaceBomb() {
    return this.activeBombs < this.maxBombs && this.bombCooldown <= 0;
  }

  update() {
    if (!this.alive) return;
    if (this.invincible > 0) this.invincible--;
    if (this.bombCooldown > 0) this.bombCooldown--;
    if (this.wallPassTimer > 0) this.wallPassTimer--;

    // 检查是否已离开可穿越的炸弹格子
    for (const bomb of this.passThroughBombs) {
      const bx = bomb.col * CELL + CELL / 2;
      const by = bomb.row * CELL + CELL / 2;
      if (Math.abs(this.x - bx) >= CELL * 0.9 || Math.abs(this.y - by) >= CELL * 0.9) {
        this.passThroughBombs.delete(bomb);
      }
    }

    this.animTimer++;
    if (this.animTimer > 8) {
      this.animTimer = 0;
      this.animFrame = (this.animFrame + 1) % 4;
    }
  }

  move(dx, dy) {
    if (!this.alive) return;
    const spd = this.getSpeed();
    let nx = this.x + dx * spd;
    let ny = this.y + dy * spd;

    if (dx !== 0) this.dir = dx > 0 ? 2 : 1;
    if (dy !== 0) this.dir = dy > 0 ? 0 : 3;

    const halfSize = CELL * 0.35;
    const bombThresh = CELL * 0.7;
    let canMoveX = true;
    let canMoveY = true;

    // 移动前自动对齐垂直轴
    if (dx !== 0) {
      const centerRow = Math.round((this.y - CELL / 2) / CELL) * CELL + CELL / 2;
      const diff = centerRow - this.y;
      if (Math.abs(diff) > 1) this.y += Math.sign(diff) * Math.min(Math.abs(diff), this.getSpeed());
    }
    if (dy !== 0) {
      const centerCol = Math.round((this.x - CELL / 2) / CELL) * CELL + CELL / 2;
      const diff = centerCol - this.x;
      if (Math.abs(diff) > 1) this.x += Math.sign(diff) * Math.min(Math.abs(diff), this.getSpeed());
    }

    // X方向碰撞
    if (dx !== 0) {
      const newX = dx > 0 ? nx + halfSize : nx - halfSize;
      const c = Math.floor(newX / CELL);
      const topR = Math.floor((this.y - halfSize) / CELL);
      const botR = Math.floor((this.y + halfSize) / CELL);
      if (c < 0 || c >= COLS) {
        canMoveX = false;
      } else {
        const topTile = state.map[topR]?.[c];
        const botTile = state.map[botR]?.[c];
        // 穿墙模式下可穿越软墙
        const wallPass = this.wallPassTimer > 0;
        const topBlocked = topTile === TILE_EMPTY ? false : (wallPass && topTile === TILE_SOFT) ? false : true;
        const botBlocked = botTile === TILE_EMPTY ? false : (wallPass && botTile === TILE_SOFT) ? false : true;
        if (topR < 0 || topR >= ROWS || botR < 0 || botR >= ROWS || topBlocked || botBlocked) {
          canMoveX = false;
        }
      }
    }

    // Y方向碰撞
    if (dy !== 0) {
      const newY = dy > 0 ? ny + halfSize : ny - halfSize;
      const r = Math.floor(newY / CELL);
      const leftC = Math.floor((this.x - halfSize) / CELL);
      const rightC = Math.floor((this.x + halfSize) / CELL);
      if (r < 0 || r >= ROWS) {
        canMoveY = false;
      } else {
        const leftTile = state.map[r]?.[leftC];
        const rightTile = state.map[r]?.[rightC];
        const wallPass = this.wallPassTimer > 0;
        const leftBlocked = leftTile === TILE_EMPTY ? false : (wallPass && leftTile === TILE_SOFT) ? false : true;
        const rightBlocked = rightTile === TILE_EMPTY ? false : (wallPass && rightTile === TILE_SOFT) ? false : true;
        if (leftC < 0 || leftC >= COLS || rightC < 0 || rightC >= COLS || leftBlocked || rightBlocked) {
          canMoveY = false;
        }
      }
    }

    // 炸弹碰撞
    if (canMoveX || canMoveY) {
      for (const bomb of state.bombs) {
        if (this.passThroughBombs.has(bomb)) continue;
        const bx = bomb.col * CELL + CELL / 2;
        const by = bomb.row * CELL + CELL / 2;
        if (canMoveX && Math.abs(nx - bx) < bombThresh && Math.abs(this.y - by) < bombThresh) {
          canMoveX = false;
        }
        if (canMoveY && Math.abs(this.x - bx) < bombThresh && Math.abs(ny - by) < bombThresh) {
          canMoveY = false;
        }
      }
    }

    if (canMoveX) this.x = nx;
    if (canMoveY) this.y = ny;
  }

  draw() {
    if (!this.alive) return;
    const ctx = game.ctx;
    const x = Math.round(this.x);
    const y = Math.round(this.y);
    const s = CELL * 0.9;

    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

    ctx.save();
    ctx.translate(x, y);

    const bounce = this.animFrame % 2 === 0 ? 0 : -2;

    if (this.isPlayer) {
      this.drawPlayerCharacter(ctx, s, bounce);
    } else {
      this.drawEnemyCharacter(ctx, s, bounce);
    }

    // 护盾光环
    if (this.shield > 0) {
      ctx.strokeStyle = '#00ccff';
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.6 + Math.sin(game.frame * 0.1) * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  drawPlayerCharacter(ctx, s, bounce) {
    // 身体
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.ellipse(0, 2 + bounce, s * 0.45, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // 头
    ctx.fillStyle = '#ffcc88';
    ctx.beginPath();
    ctx.arc(0, -6 + bounce, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
    // 头盔
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.arc(0, -10 + bounce, s * 0.3, Math.PI, 0);
    ctx.fill();
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, -8 + bounce, 3.5, 0, Math.PI * 2);
    ctx.arc(4, -8 + bounce, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // 瞳孔
    const eyeOffX = this.dir === 1 ? -1 : this.dir === 2 ? 1 : 0;
    const eyeOffY = this.dir === 3 ? -1 : this.dir === 0 ? 1 : 0;
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-4 + eyeOffX, -8 + bounce + eyeOffY, 2, 0, Math.PI * 2);
    ctx.arc(4 + eyeOffX, -8 + bounce + eyeOffY, 2, 0, Math.PI * 2);
    ctx.fill();
    // 嘴巴
    ctx.fillStyle = '#ff6666';
    ctx.beginPath();
    ctx.arc(0, -3 + bounce, 2, 0, Math.PI);
    ctx.fill();
    // 腿
    ctx.fillStyle = '#3366cc';
    const legOff = this.animFrame % 2 === 0 ? 2 : -2;
    ctx.fillRect(-5, 8 + bounce, 4, 4 + legOff);
    ctx.fillRect(1, 8 + bounce, 4, 4 - legOff);
  }

  drawEnemyCharacter(ctx, s, bounce) {
    // 身体
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.ellipse(0, 2 + bounce, s * 0.45, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // 头
    ctx.fillStyle = '#ffcc88';
    ctx.beginPath();
    ctx.arc(0, -6 + bounce, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
    // 恶魔角
    ctx.fillStyle = '#cc0000';
    ctx.beginPath();
    ctx.moveTo(-6, -14 + bounce);
    ctx.lineTo(-3, -8 + bounce);
    ctx.lineTo(-9, -8 + bounce);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(6, -14 + bounce);
    ctx.lineTo(3, -8 + bounce);
    ctx.lineTo(9, -8 + bounce);
    ctx.fill();
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, -8 + bounce, 3, 0, Math.PI * 2);
    ctx.arc(4, -8 + bounce, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cc0000';
    ctx.beginPath();
    ctx.arc(-4, -8 + bounce, 1.5, 0, Math.PI * 2);
    ctx.arc(4, -8 + bounce, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // 邪恶笑容
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, -3 + bounce, 3, 0.1, Math.PI - 0.1);
    ctx.stroke();
    // 腿
    ctx.fillStyle = '#cc2222';
    const legOff = this.animFrame % 2 === 0 ? 2 : -2;
    ctx.fillRect(-5, 8 + bounce, 4, 4 + legOff);
    ctx.fillRect(1, 8 + bounce, 4, 4 - legOff);
  }
}

// === ./item.js ===
// ============================================================
// 泡泡堂 - 道具系统（6种道具 + 随机生成）
// ============================================================


// 随机生成计时器
let spawnTimer = 0;
const SPAWN_INTERVAL_MIN = 180; // 3秒
const SPAWN_INTERVAL_MAX = 300; // 5秒
let nextSpawn = SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN));

// 软墙爆炸时掉落道具（已有逻辑）
function spawnItemOnExplosion(col, row) {
  if (Math.random() < 0.35) {
    const type = randomItemType();
    state.items.push({ col, row, type, timer: 600 });
  }
}

// 随机在空格子上生成道具
function updateItemSpawner() {
  if (game.state !== 'playing') return;
  spawnTimer++;
  if (spawnTimer < nextSpawn) return;
  spawnTimer = 0;
  nextSpawn = SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN));

  // 超过上限不再生成
  if (state.items.length >= ITEM_MAX_COUNT) return;

  // 找空格子（避开炸弹、已有道具、角色位置）
  const occupied = new Set();
  for (const item of state.items) occupied.add(`${item.col},${item.row}`);
  for (const bomb of state.bombs) occupied.add(`${bomb.col},${bomb.row}`);
  if (state.player?.alive) occupied.add(`${state.player.col},${state.player.row}`);
  for (const e of state.enemies) {
    if (e.alive) occupied.add(`${e.col},${e.row}`);
  }

  const candidates = [];
  for (let r = 1; r < ROWS - 1; r++) {
    for (let c = 1; c < COLS - 1; c++) {
      if (state.map[r][c] === TILE_EMPTY && !occupied.has(`${c},${r}`)) {
        candidates.push([c, r]);
      }
    }
  }
  if (candidates.length === 0) return;

  const [col, row] = candidates[Math.floor(Math.random() * candidates.length)];
  const type = randomItemType();
  state.items.push({ col, row, type, timer: 900 }); // 15秒后消失
}

function randomItemType() {
  // 权重：火焰25%、速度20%、炸弹20%、护盾15%、全火10%、穿墙10%
  const roll = Math.random();
  if (roll < 0.25) return ITEM_FLAME;
  if (roll < 0.45) return ITEM_SPEED;
  if (roll < 0.65) return ITEM_BOMB;
  if (roll < 0.80) return ITEM_SHIELD;
  if (roll < 0.90) return ITEM_FULLFIRE;
  return ITEM_WALLPASS;
}

function drawItems() {
  const ctx = game.ctx;
  for (const item of state.items) {
    const x = item.col * CELL + CELL / 2;
    const y = item.row * CELL + CELL / 2;
    const bob = Math.sin(game.frame * 0.05) * 3;

    // 即将消失时闪烁
    if (item.timer < 120 && Math.floor(item.timer / 8) % 2 === 0) continue;

    ctx.save();
    ctx.translate(x, y + bob);

    // 背景光晕
    const glowColors = {
      [ITEM_FLAME]: 'rgba(255,68,68,0.3)',
      [ITEM_SPEED]: 'rgba(68,170,255,0.3)',
      [ITEM_BOMB]: 'rgba(68,255,68,0.3)',
      [ITEM_SHIELD]: 'rgba(0,204,255,0.3)',
      [ITEM_FULLFIRE]: 'rgba(255,170,0,0.3)',
      [ITEM_WALLPASS]: 'rgba(170,100,255,0.3)',
    };
    ctx.fillStyle = glowColors[item.type] || 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(0, 0, CELL * 0.35, 0, Math.PI * 2);
    ctx.fill();

    const s = CELL * 0.25;

    if (item.type === ITEM_FLAME) {
      drawFlameIcon(ctx, s);
    } else if (item.type === ITEM_SPEED) {
      drawSpeedIcon(ctx, s);
    } else if (item.type === ITEM_BOMB) {
      drawBombIcon(ctx, s);
    } else if (item.type === ITEM_SHIELD) {
      drawShieldIcon(ctx, s);
    } else if (item.type === ITEM_FULLFIRE) {
      drawFullFireIcon(ctx, s);
    } else if (item.type === ITEM_WALLPASS) {
      drawWallPassIcon(ctx, s);
    }

    ctx.restore();
  }
}

function drawFlameIcon(ctx, s) {
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.quadraticCurveTo(s, 0, 0, s);
  ctx.quadraticCurveTo(-s, 0, 0, -s);
  ctx.fill();
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.5);
  ctx.quadraticCurveTo(s * 0.5, 0, 0, s * 0.5);
  ctx.quadraticCurveTo(-s * 0.5, 0, 0, -s * 0.5);
  ctx.fill();
}

function drawSpeedIcon(ctx, s) {
  ctx.fillStyle = '#44aaff';
  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `${s}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', 0, 0);
}

function drawBombIcon(ctx, s) {
  ctx.fillStyle = '#44ff44';
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', 0, 1);
}

function drawShieldIcon(ctx, s) {
  // 盾牌形状
  ctx.fillStyle = '#00ccff';
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(s * 0.8, -s * 0.4);
  ctx.lineTo(s * 0.8, s * 0.2);
  ctx.lineTo(0, s);
  ctx.lineTo(-s * 0.8, s * 0.2);
  ctx.lineTo(-s * 0.8, -s * 0.4);
  ctx.closePath();
  ctx.fill();
  // 盾牌高光
  ctx.fillStyle = '#66eeff';
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.7);
  ctx.lineTo(s * 0.4, -s * 0.3);
  ctx.lineTo(s * 0.3, s * 0.1);
  ctx.lineTo(0, s * 0.3);
  ctx.lineTo(-s * 0.1, s * 0.1);
  ctx.lineTo(-s * 0.2, -s * 0.3);
  ctx.closePath();
  ctx.fill();
}

function drawFullFireIcon(ctx, s) {
  // 星星
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 72 - 90) * Math.PI / 180;
    const innerAngle = ((i * 72) + 36 - 90) * Math.PI / 180;
    ctx.lineTo(Math.cos(angle) * s, Math.sin(angle) * s);
    ctx.lineTo(Math.cos(innerAngle) * s * 0.4, Math.sin(innerAngle) * s * 0.4);
  }
  ctx.closePath();
  ctx.fill();
  // 中心闪光
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawWallPassIcon(ctx, s) {
  // 幽灵形状
  ctx.fillStyle = '#aa66ff';
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.arc(0, -s * 0.2, s * 0.6, Math.PI, 0);
  ctx.lineTo(s * 0.6, s * 0.5);
  // 波浪底部
  ctx.quadraticCurveTo(s * 0.3, s * 0.2, 0, s * 0.5);
  ctx.quadraticCurveTo(-s * 0.3, s * 0.2, -s * 0.6, s * 0.5);
  ctx.closePath();
  ctx.fill();
  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.arc(-s * 0.2, -s * 0.2, s * 0.15, 0, Math.PI * 2);
  ctx.arc(s * 0.2, -s * 0.2, s * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-s * 0.15, -s * 0.15, s * 0.08, 0, Math.PI * 2);
  ctx.arc(s * 0.25, -s * 0.15, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
}

function checkItemPickup(char) {
  for (let i = state.items.length - 1; i >= 0; i--) {
    const item = state.items[i];
    if (char.col === item.col && char.row === item.row) {
      applyItemEffect(char, item.type);
      if (char.isPlayer) game.score += 50;
      state.items.splice(i, 1);
    }
  }
}

function applyItemEffect(char, type) {
  if (type === ITEM_FLAME) char.flameRange = Math.min(char.flameRange + 1, 6);
  if (type === ITEM_SPEED) char.speed = Math.min(char.speed + 1, 5);
  if (type === ITEM_BOMB) char.maxBombs = Math.min(char.maxBombs + 1, 5);
  if (type === ITEM_SHIELD) char.shield = Math.min(char.shield + 1, 3);
  if (type === ITEM_FULLFIRE) char.fullFire = true;
  if (type === ITEM_WALLPASS) char.wallPassTimer = 600; // 10秒
}

function updateItemTimers() {
  for (let i = state.items.length - 1; i >= 0; i--) {
    state.items[i].timer--;
    if (state.items[i].timer <= 0) state.items.splice(i, 1);
  }
}

// ============================================================
// 泡泡堂 - 炸弹与爆炸系统
// ============================================================


class Bomb {
  constructor(col, row, range, owner) {
    this.col = col;
    this.row = row;
    this.range = range + Math.floor(Math.random() * 3);
    this.owner = owner;
    this.timer = 180; // 3秒 @ 60fps
    this.pulse = 0;
    // 全火效果：覆盖整条走廊
    this.isFullFire = owner.fullFire;
  }

  update() {
    this.timer--;
    this.pulse = (this.pulse + 1) % 20;
    if (this.timer <= 0) {
      this.explode();
      return true;
    }
    return false;
  }

  explode() {
    this.owner.activeBombs--;
    // 全火效果只对当前炸弹生效，消耗掉
    if (this.isFullFire) {
      this.owner.fullFire = false;
    }
    createExplosion(this.col, this.row, this.range, this.isFullFire);
  }

  draw() {
    const ctx = game.ctx;
    const x = this.col * CELL + CELL / 2;
    const y = this.row * CELL + CELL / 2;
    const pulseSize = 1 + Math.sin(this.pulse * Math.PI / 10) * 0.08;
    const urgency = this.timer < 60 ? (Math.floor(this.timer / 8) % 2 === 0 ? 1.2 : 1) : 1;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(pulseSize * urgency, pulseSize * urgency);

    // 全火炸弹外观（金色）
    if (this.isFullFire) {
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(0, 2, CELL * 0.34, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(0, 2, CELL * 0.22, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 普通炸弹
      ctx.fillStyle = COLORS.bomb;
      ctx.beginPath();
      ctx.arc(0, 2, CELL * 0.32, 0, Math.PI * 2);
      ctx.fill();
    }

    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(-4, -2, 4, 0, Math.PI * 2);
    ctx.fill();

    // 引线
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(6, -16, 3, -20);
    ctx.stroke();

    // 火花
    if (this.timer < 120) {
      ctx.fillStyle = Math.random() > 0.5 ? '#ff0' : '#f80';
      ctx.beginPath();
      ctx.arc(3, -20, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

function createExplosion(col, row, range, isFullFire) {
  const cells = [[col, row]];
  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];

  for (const [dc, dr] of dirs) {
    if (isFullFire) {
      // 全火模式：覆盖整条走廊直到遇到硬墙
      for (let i = 1; i < 20; i++) {
        const nc = col + dc * i;
        const nr = row + dr * i;
        if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) break;
        if (state.map[nr][nc] === TILE_HARD) break;
        cells.push([nc, nr]);
        if (state.map[nr][nc] === TILE_SOFT) {
          state.map[nr][nc] = TILE_EMPTY;
          game.score += 10;
          spawnItemOnExplosion(nc, nr);
          break;
        }
      }
    } else {
      // 普通模式
      for (let i = 1; i <= range; i++) {
        const nc = col + dc * i;
        const nr = row + dr * i;
        if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) break;
        if (state.map[nr][nc] === TILE_HARD) break;
        cells.push([nc, nr]);
        if (state.map[nr][nc] === TILE_SOFT) {
          state.map[nr][nc] = TILE_EMPTY;
          game.score += 10;
          spawnItemOnExplosion(nc, nr);
          break;
        }
      }
    }
  }
  state.explosions.push({ cells, timer: 40, maxTimer: 40 });
}

function updateExplosions() {
  for (let i = state.explosions.length - 1; i >= 0; i--) {
    state.explosions[i].timer--;
    if (state.explosions[i].timer <= 0) {
      state.explosions.splice(i, 1);
    }
  }
}

function drawExplosions() {
  const ctx = game.ctx;
  for (const exp of state.explosions) {
    const progress = 1 - exp.timer / exp.maxTimer;
    const colorIdx = Math.min(Math.floor(progress * COLORS.explosion.length), COLORS.explosion.length - 1);
    for (const [c, r] of exp.cells) {
      const x = c * CELL;
      const y = r * CELL;
      const alpha = 0.3 + (1 - progress) * 0.7;
      ctx.fillStyle = COLORS.explosion[colorIdx];
      ctx.globalAlpha = alpha;
      ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = alpha * 0.5;
      const s = CELL * 0.3 * (1 - progress);
      ctx.beginPath();
      ctx.arc(x + CELL / 2, y + CELL / 2, s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function checkExplosionHit(col, row) {
  for (const exp of state.explosions) {
    if (exp.cells.some(([c, r]) => c === col && r === row)) return true;
  }
  return false;
}

function placeBomb(char) {
  if (!char.canPlaceBomb()) return;
  const col = char.col;
  const row = char.row;
  if (state.bombs.some(b => b.col === col && b.row === row)) return;
  const bomb = new Bomb(col, row, char.flameRange, char);
  state.bombs.push(bomb);
  char.activeBombs++;
  char.bombCooldown = 15;
  char.passThroughBombs.add(bomb);
}

// === ./ai.js ===
// ============================================================
// 泡泡堂 - AI 系统
// ============================================================


function findNearestTarget(enemy) {
  let best = null;
  let bestDist = Infinity;
  if (state.player.alive) {
    const d = Math.abs(enemy.col - state.player.col) + Math.abs(enemy.row - state.player.row);
    if (d < bestDist) { bestDist = d; best = state.player; }
  }
  for (const e of state.enemies) {
    if (e === enemy || !e.alive) continue;
    const d = Math.abs(enemy.col - e.col) + Math.abs(enemy.row - e.row);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best ? { target: best, dist: bestDist } : null;
}

function updateAI(enemy) {
  if (!enemy.alive) return;
  enemy.update();

  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
  const inDanger = isInBlastZoneHitbox(enemy);

  // === 最高优先级：逃跑 ===
  if (inDanger || enemy.aiState === 'flee') {
    if (!inDanger) {
      if (enemy.aiState === 'flee') {
        enemy._fleeFromCol = -1;
        enemy._fleeFromRow = -1;
        enemy._fleeStuck = false;
      }
      enemy.aiState = (state.bombs.length > 0 || state.explosions.length > 0) ? 'wait' : 'idle';
    } else {
      enemy.aiState = 'flee';
      const reachedNewCell = (enemy.col !== enemy._fleeFromCol || enemy.row !== enemy._fleeFromRow);
      const needRecalc = reachedNewCell || enemy._fleeStuck || enemy.aiDir < 0;
      if (needRecalc) {
        enemy._fleeFromCol = enemy.col;
        enemy._fleeFromRow = enemy.row;
        enemy._fleeStuck = false;
        const escapeDir = findEscapeDir(enemy);
        if (escapeDir >= 0) {
          enemy.aiDir = escapeDir;
        } else {
          let bestDir = -1, bestDist = -1;
          for (let d = 0; d < 4; d++) {
            const nc = enemy.col + dirs[d][0];
            const nr = enemy.row + dirs[d][1];
            if (isWalkableFor(nc, nr, enemy)) {
              let minD = Infinity;
              for (const bomb of state.bombs) minD = Math.min(minD, Math.abs(bomb.col - nc) + Math.abs(bomb.row - nr));
              if (minD > bestDist) { bestDist = minD; bestDir = d; }
            }
          }
          enemy.aiDir = bestDir >= 0 ? bestDir : enemy.aiDir;
        }
      }
      if (enemy.aiDir >= 0) {
        const oldX = enemy.x, oldY = enemy.y;
        tryMove(enemy, dirs[enemy.aiDir][0], dirs[enemy.aiDir][1]);
        if (enemy.x === oldX && enemy.y === oldY) {
          enemy._fleeStuck = true;
        }
      }
      return;
    }
  }

  // === 等待状态 ===
  if (enemy.aiState === 'wait') {
    if (inDanger) {
      enemy.aiState = 'flee';
    } else if (state.bombs.length === 0 && state.explosions.length === 0) {
      enemy.aiState = 'idle';
    }
    if (enemy.aiState === 'wait') return;
  }

  // === 以下：不在危险区 ===
  const hasActiveBomb = state.bombs.length > 0;
  function safeTryMove(e, dc, dr) {
    if (hasActiveBomb) {
      const nc = e.col + dc;
      const nr = e.row + dr;
      for (let dr2 = 0; dr2 <= 1; dr2++) {
        for (let dc2 = 0; dc2 <= 1; dc2++) {
          const tc = nc + dc2;
          const tr = nr + dr2;
          if (tc >= 0 && tc < COLS && tr >= 0 && tr < ROWS && isInBlastZone(tc, tr)) return false;
        }
      }
    }
    return tryMove(e, dc, dr);
  }

  const nearest = findNearestTarget(enemy);
  const nearSoftWall = hasAdjacentSoftWall(enemy.col, enemy.row);
  const attackRange = game.difficulty === 'hard' ? 10 : game.difficulty === 'normal' ? 8 : 6;
  const bombChance = game.difficulty === 'hard' ? 0.6 : game.difficulty === 'normal' ? 0.4 : 0.25;
  const destroyChance = game.difficulty === 'hard' ? 0.8 : game.difficulty === 'normal' ? 0.6 : 0.4;

  // 确定当前状态
  if (nearSoftWall) {
    enemy.aiState = 'destroy';
  } else if (nearest && nearest.dist <= attackRange) {
    enemy.aiState = 'attack';
    enemy.aiTarget = nearest.target;
  } else {
    enemy.aiState = 'seekWall';
  }

  // --- destroy ---
  if (enemy.aiState === 'destroy') {
    for (let d = 0; d < 4; d++) {
      const nc = enemy.col + dirs[d][0];
      const nr = enemy.row + dirs[d][1];
      if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && state.map[nr][nc] === TILE_SOFT) {
        enemy.aiDir = d;
        break;
      }
    }
    if (enemy.canPlaceBomb() && Math.random() < destroyChance) {
      placeBomb(enemy);
      enemy.aiState = 'flee';
      enemy._fleeFromCol = enemy.col;
      enemy._fleeFromRow = enemy.row;
      const escapeDir = findEscapeDir(enemy);
      if (escapeDir >= 0) {
        enemy.aiDir = escapeDir;
      }
      tryMove(enemy, dirs[enemy.aiDir][0], dirs[enemy.aiDir][1]);
      return;
    }
    let moved = safeTryMove(enemy, dirs[enemy.aiDir][0], dirs[enemy.aiDir][1]);
    if (!moved && hasActiveBomb) {
      for (let d = 0; d < 4; d++) {
        const nc = enemy.col + dirs[d][0];
        const nr = enemy.row + dirs[d][1];
        if (canStep(enemy, dirs[d][0], dirs[d][1]) && !isInBlastZone(nc, nr)) {
          enemy.aiDir = d;
          safeTryMove(enemy, dirs[d][0], dirs[d][1]);
          break;
        }
      }
    }

  } else if (enemy.aiState === 'attack' && enemy.aiTarget) {
    // --- attack ---
    const dx = enemy.aiTarget.col - enemy.col;
    const dy = enemy.aiTarget.row - enemy.row;
    let moveDir = -1;
    if (Math.abs(dx) >= Math.abs(dy)) {
      moveDir = dx > 0 ? 3 : 2;
      if (!canStep(enemy, dirs[moveDir][0], dirs[moveDir][1]) || (hasActiveBomb && isInBlastZone(enemy.col + dirs[moveDir][0], enemy.row + dirs[moveDir][1]))) moveDir = dy > 0 ? 1 : 0;
    } else {
      moveDir = dy > 0 ? 1 : 0;
      if (!canStep(enemy, dirs[moveDir][0], dirs[moveDir][1]) || (hasActiveBomb && isInBlastZone(enemy.col + dirs[moveDir][0], enemy.row + dirs[moveDir][1]))) moveDir = dx > 0 ? 3 : 2;
    }
    if (!canStep(enemy, dirs[moveDir][0], dirs[moveDir][1]) || (hasActiveBomb && isInBlastZone(enemy.col + dirs[moveDir][0], enemy.row + dirs[moveDir][1]))) {
      let found = false;
      for (let d = 0; d < 4; d++) {
        if (canStep(enemy, dirs[d][0], dirs[d][1]) && !(hasActiveBomb && isInBlastZone(enemy.col + dirs[d][0], enemy.row + dirs[d][1]))) { moveDir = d; found = true; break; }
      }
      if (!found) moveDir = -1;
    }
    enemy.aiDir = moveDir;
    if (moveDir >= 0) safeTryMove(enemy, dirs[moveDir][0], dirs[moveDir][1]);

    if (enemy.canPlaceBomb() && nearest && nearest.dist <= 4 && hasAnyWalkableAdjacent(enemy) && Math.random() < bombChance) {
      placeBomb(enemy);
      enemy.aiState = 'flee';
      enemy._fleeFromCol = enemy.col;
      enemy._fleeFromRow = enemy.row;
      const escapeDir2 = findEscapeDir(enemy);
      if (escapeDir2 >= 0) {
        enemy.aiDir = escapeDir2;
        tryMove(enemy, dirs[escapeDir2][0], dirs[escapeDir2][1]);
      }
      return;
    }

  } else {
    // --- seekWall ---
    let dir = findNearestSoftWall(enemy.col, enemy.row);
    if (dir >= 0 && hasActiveBomb && isInBlastZone(enemy.col + dirs[dir][0], enemy.row + dirs[dir][1])) {
      let bestDir = -1, bestDist = -1;
      for (let d = 0; d < 4; d++) {
        const nc = enemy.col + dirs[d][0];
        const nr = enemy.row + dirs[d][1];
        if (canStep(enemy, dirs[d][0], dirs[d][1]) && !isInBlastZone(nc, nr)) {
          let minD = Infinity;
          for (const bomb of state.bombs) minD = Math.min(minD, Math.abs(bomb.col - nc) + Math.abs(bomb.row - nr));
          if (minD > bestDist) { bestDist = minD; bestDir = d; }
        }
      }
      if (bestDir >= 0) dir = bestDir;
    }
    if (dir >= 0) {
      enemy.aiDir = dir;
      safeTryMove(enemy, dirs[dir][0], dirs[dir][1]);
    }
  }
}

// --- 辅助函数 ---

function allHitboxCellsEmpty(x, y, dc, dr) {
  const halfSize = CELL * 0.35;
  if (dc !== 0) {
    const newX = dc > 0 ? x + halfSize : x - halfSize;
    const topR = Math.floor((y - halfSize) / CELL);
    const botR = Math.floor((y + halfSize) / CELL);
    const c = Math.floor(newX / CELL);
    if (c < 0 || c >= COLS) return false;
    if (topR < 0 || topR >= ROWS || state.map[topR][c] !== TILE_EMPTY) return false;
    if (botR < 0 || botR >= ROWS || state.map[botR][c] !== TILE_EMPTY) return false;
  }
  if (dr !== 0) {
    const newY = dr > 0 ? y + halfSize : y - halfSize;
    const leftC = Math.floor((x - halfSize) / CELL);
    const rightC = Math.floor((x + halfSize) / CELL);
    const r = Math.floor(newY / CELL);
    if (r < 0 || r >= ROWS) return false;
    if (leftC < 0 || leftC >= COLS || state.map[r][leftC] !== TILE_EMPTY) return false;
    if (rightC < 0 || rightC >= COLS || state.map[r][rightC] !== TILE_EMPTY) return false;
  }
  return true;
}

function tryMove(enemy, dc, dr) {
  const nextCol = enemy.col + dc;
  const nextRow = enemy.row + dr;
  const blocked = nextCol < 0 || nextCol >= COLS || nextRow < 0 || nextRow >= ROWS ||
    state.map[nextRow][nextCol] !== TILE_EMPTY ||
    state.bombs.some(b => b.col === nextCol && b.row === nextRow && !enemy.passThroughBombs.has(b));
  if (blocked) return false;

  if (dc !== 0) {
    const centerRow = Math.round((enemy.y - CELL / 2) / CELL) * CELL + CELL / 2;
    enemy.y = centerRow;
  }
  if (dr !== 0) {
    const centerCol = Math.round((enemy.x - CELL / 2) / CELL) * CELL + CELL / 2;
    enemy.x = centerCol;
  }

  const spd = enemy.getSpeed();
  const testX = enemy.x + dc * spd;
  const testY = enemy.y + dr * spd;
  if (!allHitboxCellsEmpty(testX, testY, dc, dr)) {
    if (dc !== 0) {
      const centerRow = Math.round((enemy.y - CELL / 2) / CELL) * CELL + CELL / 2;
      if (Math.abs(centerRow - enemy.y) > 1) {
        enemy.y = centerRow;
        if (allHitboxCellsEmpty(enemy.x + dc * spd, enemy.y, dc, dr)) {
          const oldX = enemy.x, oldY = enemy.y;
          enemy.move(dc, dr);
          return (enemy.x !== oldX || enemy.y !== oldY);
        }
      }
    }
    if (dr !== 0) {
      const centerCol = Math.round((enemy.x - CELL / 2) / CELL) * CELL + CELL / 2;
      if (Math.abs(centerCol - enemy.x) > 1) {
        enemy.x = centerCol;
        if (allHitboxCellsEmpty(enemy.x, enemy.y + dr * spd, dc, dr)) {
          const oldX = enemy.x, oldY = enemy.y;
          enemy.move(dc, dr);
          return (enemy.x !== oldX || enemy.y !== oldY);
        }
      }
    }
    return false;
  }

  const oldX = enemy.x, oldY = enemy.y;
  enemy.move(dc, dr);
  return (enemy.x !== oldX || enemy.y !== oldY);
}

function canStep(enemy, dc, dr) {
  const nc = enemy.col + dc;
  const nr = enemy.row + dr;
  return nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS &&
    state.map[nr][nc] === TILE_EMPTY &&
    !state.bombs.some(b => b.col === nc && b.row === nr && !enemy.passThroughBombs.has(b));
}

function hasAdjacentSoftWall(col, row) {
  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
  for (const [dc, dr] of dirs) {
    const nc = col + dc, nr = row + dr;
    if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && state.map[nr][nc] === TILE_SOFT) {
      return true;
    }
  }
  return false;
}

function findNearestSoftWall(col, row) {
  const visited = new Set();
  const queue = [[col, row, -1]];
  visited.add(`${col},${row}`);
  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
  while (queue.length > 0) {
    const [c, r, firstDir] = queue.shift();
    for (let d = 0; d < 4; d++) {
      const nc = c + dirs[d][0];
      const nr = r + dirs[d][1];
      const key = `${nc},${nr}`;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
      if (visited.has(key)) continue;
      if (state.map[nr][nc] === TILE_HARD) continue;
      visited.add(key);
      const fd = firstDir === -1 ? d : firstDir;
      if (state.map[nr][nc] === TILE_SOFT) return fd;
      if (state.map[nr][nc] === TILE_EMPTY) queue.push([nc, nr, fd]);
    }
  }
  return -1;
}

function isInBlastZone(col, row) {
  for (const bomb of state.bombs) {
    if (bomb.col === col && Math.abs(bomb.row - row) <= bomb.range) {
      const step = bomb.row < row ? 1 : -1;
      let blocked = false;
      for (let r = bomb.row + step; r !== row + step; r += step) {
        if (r === row) break;
        if (state.map[r][col] === TILE_HARD || state.map[r][col] === TILE_SOFT) { blocked = true; break; }
      }
      if (!blocked) return true;
    }
    if (bomb.row === row && Math.abs(bomb.col - col) <= bomb.range) {
      const step = bomb.col < col ? 1 : -1;
      let blocked = false;
      for (let c = bomb.col + step; c !== col + step; c += step) {
        if (c === col) break;
        if (state.map[row][c] === TILE_HARD || state.map[row][c] === TILE_SOFT) { blocked = true; break; }
      }
      if (!blocked) return true;
    }
  }
  return false;
}

function isInBlastZoneHitbox(char) {
  const halfSize = CELL * 0.35;
  const corners = [
    [Math.floor((char.x - halfSize) / CELL), Math.floor((char.y - halfSize) / CELL)],
    [Math.floor((char.x + halfSize) / CELL), Math.floor((char.y - halfSize) / CELL)],
    [Math.floor((char.x - halfSize) / CELL), Math.floor((char.y + halfSize) / CELL)],
    [Math.floor((char.x + halfSize) / CELL), Math.floor((char.y + halfSize) / CELL)],
  ];
  for (const [c, r] of corners) {
    if (c >= 0 && c < COLS && r >= 0 && r < ROWS && isInBlastZone(c, r)) return true;
  }
  return false;
}

function findEscapeDir(char) {
  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
  const visited = new Set();
  const queue = [[char.col, char.row, -1]];
  visited.add(`${char.col},${char.row}`);

  function isSafeCell(c, r) {
    for (let dr = 0; dr <= 1; dr++) {
      for (let dc = 0; dc <= 1; dc++) {
        const tc = c + dc;
        const tr = r + dr;
        if (tc >= 0 && tc < COLS && tr >= 0 && tr < ROWS && isInBlastZone(tc, tr)) return false;
      }
    }
    return true;
  }

  while (queue.length > 0) {
    const [c, r, firstDir] = queue.shift();
    for (let d = 0; d < 4; d++) {
      const nc = c + dirs[d][0];
      const nr = r + dirs[d][1];
      const key = `${nc},${nr}`;
      if (visited.has(key)) continue;
      if (!isWalkableFor(nc, nr, char)) continue;
      visited.add(key);
      const fd = firstDir === -1 ? d : firstDir;
      if (isSafeCell(nc, nr)) return fd;
      queue.push([nc, nr, fd]);
    }
  }
  return -1;
}

function hasAnyWalkableAdjacent(enemy) {
  const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
  for (const [dc, dr] of dirs) {
    const nc = enemy.col + dc;
    const nr = enemy.row + dr;
    if (isWalkableFor(nc, nr, enemy)) return true;
  }
  return false;
}

function isWalkableFor(c, r, char) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (state.map[r][c] !== TILE_EMPTY) return false;
  for (const bomb of state.bombs) {
    if (bomb.col === c && bomb.row === r) {
      if (!char.passThroughBombs.has(bomb)) return false;
    }
  }
  return true;
}


// === main.js ===
// ============================================================
// 泡泡堂 - 主入口（游戏循环、初始化、UI）
// ============================================================


// DOM 引用
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
game.canvas = canvas;
game.ctx = ctx;
canvas.width = COLS * CELL;
canvas.height = 13 * CELL;

// ============================================================
// 输入
// ============================================================
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' && game.state === 'playing') {
    pauseGame();
    e.preventDefault();
  }
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// 游戏初始化
// ============================================================
function initGame() {
  generateMap(game.level);
  state.player = new Character(1, 1, true);
  state.player.speed = 0;

  const enemyCount = 3;
  const spawnPoints = [[COLS - 2, ROWS - 2], [COLS - 2, 1], [1, ROWS - 2], [COLS - 2, Math.floor(ROWS / 2)],
    [Math.floor(COLS / 2), 1], [Math.floor(COLS / 2), ROWS - 2]];
  state.enemies = [];
  for (let i = 0; i < enemyCount; i++) {
    const [sc, sr] = spawnPoints[i % spawnPoints.length];
    state.enemies.push(new Character(sc, sr, false));
  }

  state.bombs = [];
  state.explosions = [];
  state.items = [];
  game.frame = 0;
  game.score = 0;
}

// ============================================================
// 游戏主循环
// ============================================================
function gameLoop() {
  requestAnimationFrame(gameLoop);
  game.frame++;

  if (game.state === 'playing') {
    try {
      updateGame();
      drawGame();
    } catch(e) {
      console.error('[MIMO] gameLoop error:', e);
      game.state = 'error';
    }
  } else {
    try {
      drawGame();
    } catch(e) {
      // Ignore draw errors in non-playing states
    }
  }
}

function updateGame() {
  // 玩家输入
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;
  if (dx !== 0 || dy !== 0) {
    state.player.move(dx, dy);
    state.player.dir = dy > 0 ? 0 : dy < 0 ? 3 : dx < 0 ? 1 : 2;
  }
  if (keys['Space']) {
    placeBomb(state.player);
    keys['Space'] = false;
  }

  state.player.update();

  // 更新炸弹
  for (let i = state.bombs.length - 1; i >= 0; i--) {
    if (state.bombs[i].update()) {
      state.bombs.splice(i, 1);
    }
  }

  // 更新爆炸
  updateExplosions();

  // 更新敌人AI
  for (const enemy of state.enemies) {
    updateAI(enemy);
  }

  // 检查爆炸伤害 - 玩家
  if (state.player.alive && state.player.invincible <= 0) {
    if (checkExplosionHit(state.player.col, state.player.row)) {
      if (state.player.shield > 0) {
        // 护盾抵挡一次伤害
        state.player.shield--;
        state.player.invincible = 90; // 1.5秒无敌
      } else {
        state.player.alive = false;
        game.state = 'lose';
        showMenu('lose');
      }
    }
  }

  // 检查爆炸伤害 - 敌人
  for (const enemy of state.enemies) {
    if (enemy.alive && enemy.invincible <= 0) {
      if (checkExplosionHit(enemy.col, enemy.row)) {
        enemy.alive = false;
        game.score += 100;
      }
    }
  }

  // 道具拾取
  checkItemPickup(state.player);
  for (const enemy of state.enemies) {
    checkItemPickup(enemy);
  }

  // 道具计时器
  updateItemTimers();

  // 随机道具生成
  updateItemSpawner();

  // 胜利检查
  if (state.enemies.every(e => !e.alive)) {
    game.state = 'win';
    showMenu('win');
  }

  // 更新HUD
  updateHUD();
}

// ============================================================
// 渲染
// ============================================================
function drawGame() {
  drawMap();
  if (!state.map || state.map.length === 0) return;

  drawItems();
  for (const bomb of state.bombs) bomb.draw();
  drawExplosions();
  for (const enemy of state.enemies) enemy.draw();
  if (state.player) state.player.draw();
}

// ============================================================
// UI 系统
// ============================================================
function showMenu(type) {
  document.getElementById('ui').classList.add('active');
  document.querySelectorAll('.menu').forEach(m => m.classList.remove('show'));

  if (type === 'start') {
    document.getElementById('startMenu').classList.add('show');
  } else if (type === 'pause') {
    document.getElementById('pauseMenu').classList.add('show');
  } else if (type === 'win') {
    document.getElementById('winMsg').textContent = `得分: ${game.score} · 剩余敌人: 0`;
    document.getElementById('winMenu').classList.add('show');
  } else if (type === 'lose') {
    const alive = state.enemies.filter(e => !e.alive).length;
    document.getElementById('loseMsg').textContent = `击败了 ${alive} 个敌人，得分: ${game.score}`;
    document.getElementById('loseMenu').classList.add('show');
  }
}

function hideMenu() {
  document.getElementById('ui').classList.remove('active');
  document.querySelectorAll('.menu').forEach(m => m.classList.remove('show'));
}

function updateHUD() {
  const hud = document.getElementById('hud');
  hud.style.display = 'flex';
  const p = state.player;
  let status = `炸弹: ${p.maxBombs} | 威力: ${p.flameRange} | 速度: ${p.speed}`;
  if (p.shield > 0) status += ` | 🛡️ ${p.shield}`;
  if (p.fullFire) status += ' | ⭐全火';
  if (p.wallPassTimer > 0) status += ' | 👻穿墙';
  document.getElementById('hudLives').textContent = status;
  document.getElementById('hudScore').textContent = `得分: ${game.score}`;
  const alive = state.enemies.filter(e => e.alive).length;
  document.getElementById('hudEnemies').textContent = `敌人: ${alive}`;
}

function pauseGame() {
  game.state = 'paused';
  showMenu('pause');
}

// ============================================================
// 事件绑定
// ============================================================
try {
console.log('[MIMO] Registering event listeners...');
document.getElementById('btnStart').addEventListener('click', () => {
  console.log('[MIMO] btnStart clicked');
  try {
    game.level = 1;
    initGame();
    game.state = 'playing';
    hideMenu();
    console.log('[MIMO] Game started OK');
  } catch(e) {
    console.error('[MIMO] initGame error:', e);
  }
});

document.getElementById('btnResume').addEventListener('click', () => {
  game.state = 'playing';
  hideMenu();
});

document.getElementById('btnQuit').addEventListener('click', () => {
  game.state = 'menu';
  document.getElementById('hud').style.display = 'none';
  showMenu('start');
});

document.getElementById('btnNext').addEventListener('click', () => {
  game.level++;
  initGame();
  game.state = 'playing';
  hideMenu();
});

document.getElementById('btnWinMenu').addEventListener('click', () => {
  game.state = 'menu';
  document.getElementById('hud').style.display = 'none';
  showMenu('start');
});

document.getElementById('btnRetry').addEventListener('click', () => {
  initGame();
  game.state = 'playing';
  hideMenu();
});

document.getElementById('btnLoseMenu').addEventListener('click', () => {
  game.state = 'menu';
  document.getElementById('hud').style.display = 'none';
  showMenu('start');
});

// 难度选择
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    game.difficulty = btn.dataset.diff;
    console.log('[MIMO] difficulty set to', game.difficulty);
  });
});
console.log('[MIMO] All event listeners registered');
} catch(e) {
  console.error('[MIMO] Event listener error:', e);
}

// ============================================================
// 启动
// ============================================================
console.log('[MIMO] main.js loaded, game.state =', game.state);
showMenu('start');
gameLoop();
console.log('[MIMO] gameLoop started');
