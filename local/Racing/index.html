    <script>
// === ./config.js ===
// ============================================================
// config.js - 游戏常量配置
// ============================================================

const W = 350;
const H = 600;
const LANE_W = 70;
const LANES = 5;
const ROAD_LEFT = (W - LANES * LANE_W) / 2;

const CAR_COLORS = [
    '#f44336', '#2196f3', '#4caf50', '#ff9800',
    '#9c27b0', '#00bcd4', '#e91e63'
];

// 玩家初始生命值
const INITIAL_LIVES = 3;

// 碰撞箱尺寸
const COLLISION_X = 35;
const COLLISION_Y = 60;

// 变道冷却帧数（用于触屏拖拽，键盘直接响应）
const LANE_CHANGE_COOLDOWN = 8;

// === ./sound.js ===
// ============================================================
// sound.js - Web Audio API 音效系统
// ============================================================

const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'pass':
                o.type = 'sine';
                o.frequency.value = 300;
                g.gain.setValueAtTime(0.04, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                o.start(t);
                o.stop(t + 0.05);
                break;
            case 'collect':
                o.type = 'sine';
                o.frequency.setValueAtTime(600, t);
                o.frequency.setValueAtTime(900, t + 0.05);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;
            case 'crash':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(30, t + 0.4);
                g.gain.setValueAtTime(0.15, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                o.start(t);
                o.stop(t + 0.4);
                break;
        }
    }
};

// === ./car.js ===
// ============================================================
// car.js - 车辆绘制与创建
// ============================================================


// roundRect 兼容性 polyfill
function ensureRoundRect(ctx) {
    if (!ctx.roundRect) {
        ctx.roundRect = function (x, y, w, h, radii) {
            const r = typeof radii === 'number' ? radii : (Array.isArray(radii) ? radii[0] : 0);
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
        };
    }
}

/**
 * 绘制一辆车
 * @param {CanvasRenderingContext2D} ctx
 * @param {number} x
 * @param {number} y
 * @param {string} color
 * @param {boolean} isPlayer
 */
function drawCar(ctx, x, y, color, isPlayer) {
    ensureRoundRect(ctx);
    ctx.save();
    ctx.translate(x, y);

    // 车身
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(-18, -30, 36, 60, 8);
    ctx.fill();

    // 挡风玻璃
    ctx.fillStyle = isPlayer ? 'rgba(100,200,255,0.5)' : 'rgba(0,0,0,0.4)';
    ctx.fillRect(-14, -20, 28, 15);

    // 车顶
    ctx.fillStyle = isPlayer ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
    ctx.fillRect(-12, -5, 24, 20);

    // 轮胎
    ctx.fillStyle = '#222';
    ctx.fillRect(-20, -25, 6, 14);
    ctx.fillRect(14, -25, 6, 14);
    ctx.fillRect(-20, 12, 6, 14);
    ctx.fillRect(14, 12, 6, 14);

    // 前灯（仅玩家）
    if (isPlayer) {
        ctx.fillStyle = '#ffeb3b';
        ctx.beginPath(); ctx.arc(-10, -30, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, -30, 4, 0, Math.PI * 2); ctx.fill();
    }

    // 尾灯
    ctx.fillStyle = '#f44336';
    ctx.fillRect(-14, 26, 8, 4);
    ctx.fillRect(6, 26, 8, 4);

    ctx.restore();
}

/**
 * 创建玩家对象
 * @returns {object}
 */
function createPlayer() {
    const lane = 2;
    return {
        lane,
        x: ROAD_LEFT + lane * LANE_W + LANE_W / 2,
        y: H - 100,
        w: 40,
        h: 70,
        color: '#fff',
        invincible: 0
    };
}

/**
 * 创建敌车
 * @param {number} roadSpeed
 * @param {Array} existingCars
 * @returns {object|null}
 */
function spawnCar(roadSpeed, existingCars) {
    const lane = Math.floor(Math.random() * LANES);
    if (existingCars.some(c => c.lane === lane && c.y < 100)) return null;
    const color = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
    return {
        lane,
        x: ROAD_LEFT + lane * LANE_W + LANE_W / 2,
        y: -80,
        w: 40,
        h: 65,
        color,
        speed: roadSpeed * 0.3 + Math.random() * 0.5,
        passed: false
    };
}

/**
 * 创建道具
 * @param {Array} existingPickups
 * @returns {object|null}
 */
function spawnPickup(existingPickups) {
    const lane = Math.floor(Math.random() * LANES);
    if (existingPickups.some(p => p.lane === lane && p.y < 100)) return null;
    const type = Math.random() < 0.3 ? 'heal' : 'boost';
    return {
        lane,
        x: ROAD_LEFT + lane * LANE_W + LANE_W / 2,
        y: -30,
        type,
        r: 12
    };
}

// === ./road.js ===
// ============================================================
// road.js - 道路渲染（沉浸式场景：天空、山脉、树木、护栏、路面）
// ============================================================


// 路边场景元素（只生成一次）
const sceneryLeft = [];
const sceneryRight = [];
for (let i = 0; i < 20; i++) {
    sceneryLeft.push({ y: i * 50, type: Math.random() < 0.5 ? 'tree' : 'bush', size: 0.7 + Math.random() * 0.6 });
    sceneryRight.push({ y: i * 50, type: Math.random() < 0.4 ? 'tree' : Math.random() < 0.6 ? 'bush' : 'pole', size: 0.7 + Math.random() * 0.6 });
}

function drawScenery(ctx, items, baseX, offset) {
    items.forEach(item => {
        const y = ((item.y + offset) % (H + 100)) - 50;
        const s = item.size;
        if (item.type === 'tree') {
            // 树干
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(baseX - 3 * s, y - 5 * s, 6 * s, 20 * s);
            // 树冠
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath(); ctx.arc(baseX, y - 10 * s, 12 * s, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#388e3c';
            ctx.beginPath(); ctx.arc(baseX - 5 * s, y - 5 * s, 8 * s, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(baseX + 5 * s, y - 7 * s, 9 * s, 0, Math.PI * 2); ctx.fill();
        } else if (item.type === 'bush') {
            ctx.fillStyle = '#33691e';
            ctx.beginPath(); ctx.ellipse(baseX, y, 10 * s, 7 * s, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#558b2f';
            ctx.beginPath(); ctx.ellipse(baseX + 4 * s, y - 2 * s, 7 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
        } else if (item.type === 'pole') {
            ctx.fillStyle = '#757575';
            ctx.fillRect(baseX - 1, y - 15, 2, 30);
            ctx.fillStyle = '#ffc107';
            ctx.beginPath(); ctx.arc(baseX, y - 15, 3, 0, Math.PI * 2); ctx.fill();
        }
    });
}

function drawRoad(ctx, frameCount, roadSpeed, pickups) {
    const offset = (frameCount * roadSpeed * 2) % 50;

    // === 天空渐变 ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.35);
    skyGrad.addColorStop(0, '#0d1b2a');
    skyGrad.addColorStop(0.5, '#1b2838');
    skyGrad.addColorStop(1, '#2d4a3e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.35);

    // 星星
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 30; i++) {
        const sx = (i * 47 + frameCount * 0.02) % W;
        const sy = (i * 31) % (H * 0.3);
        ctx.fillRect(sx, sy, 1, 1);
    }

    // === 远山 ===
    ctx.fillStyle = '#1a3a2a';
    ctx.beginPath(); ctx.moveTo(0, H * 0.35);
    for (let x = 0; x <= W; x += 20) {
        const mh = Math.sin(x * 0.015 + 1) * 25 + Math.sin(x * 0.03) * 15;
        ctx.lineTo(x, H * 0.35 - mh);
    }
    ctx.lineTo(W, H * 0.35); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#243b2f';
    ctx.beginPath(); ctx.moveTo(0, H * 0.35);
    for (let x = 0; x <= W; x += 15) {
        const mh = Math.sin(x * 0.02 + 3) * 18 + Math.sin(x * 0.04 + 1) * 10;
        ctx.lineTo(x, H * 0.35 - mh + 15);
    }
    ctx.lineTo(W, H * 0.35); ctx.closePath(); ctx.fill();

    // === 路边草地 ===
    ctx.fillStyle = '#2d5a1e';
    ctx.fillRect(0, H * 0.35, ROAD_LEFT - 8, H * 0.65);
    ctx.fillRect(ROAD_LEFT + LANES * LANE_W + 8, H * 0.35, W - ROAD_LEFT - LANES * LANE_W - 8, H * 0.65);

    // 草地纹理
    ctx.fillStyle = '#3a6b28';
    for (let y = H * 0.35; y < H; y += 12) {
        const lx = Math.sin(y * 0.1 + offset * 0.3) * 3;
        ctx.fillRect(ROAD_LEFT - 30 + lx, y, 18, 2);
        ctx.fillRect(ROAD_LEFT + LANES * LANE_W + 12 + lx, y, 18, 2);
    }

    // === 路边场景 ===
    drawScenery(ctx, sceneryLeft, ROAD_LEFT - 40, offset);
    drawScenery(ctx, sceneryRight, ROAD_LEFT + LANES * LANE_W + 40, offset);

    // === 路面 ===
    // 路肩（灰色）
    ctx.fillStyle = '#555';
    ctx.fillRect(ROAD_LEFT - 8, 0, 8, H);
    ctx.fillRect(ROAD_LEFT + LANES * LANE_W, 0, 8, H);
    // 路肩纹理（坑洼标记）
    ctx.fillStyle = '#666';
    for (let y = 0; y < H; y += 15) {
        const ry = (y + offset * 0.5) % H;
        ctx.fillRect(ROAD_LEFT - 8, ry, 8, 2);
        ctx.fillRect(ROAD_LEFT + LANES * LANE_W, ry, 8, 2);
    }

    // 主路面
    const roadGrad = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_LEFT + LANES * LANE_W, 0);
    roadGrad.addColorStop(0, '#2a2a2a');
    roadGrad.addColorStop(0.1, '#333');
    roadGrad.addColorStop(0.5, '#383838');
    roadGrad.addColorStop(0.9, '#333');
    roadGrad.addColorStop(1, '#2a2a2a');
    ctx.fillStyle = roadGrad;
    ctx.fillRect(ROAD_LEFT, 0, LANES * LANE_W, H);

    // 路面噪点纹理
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    for (let i = 0; i < 60; i++) {
        const nx = ROAD_LEFT + Math.random() * LANES * LANE_W;
        const ny = Math.random() * H;
        ctx.fillRect(nx, ny, 2, 1);
    }

    // === 车道虚线 ===
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 20]);
    for (let i = 1; i < LANES; i++) {
        ctx.beginPath();
        ctx.moveTo(ROAD_LEFT + i * LANE_W, -20 + offset);
        ctx.lineTo(ROAD_LEFT + i * LANE_W, H + 20);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // === 路边白线 ===
    ctx.fillStyle = '#fff';
    ctx.fillRect(ROAD_LEFT - 2, 0, 2, H);
    ctx.fillRect(ROAD_LEFT + LANES * LANE_W, 0, 2, H);

    // === 护栏 ===
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 3;
    // 左护栏
    for (let y = 0; y < H; y += 30) {
        const ry = (y + offset) % H;
        ctx.fillStyle = '#aaa';
        ctx.fillRect(ROAD_LEFT - 14, ry, 3, 18);
    }
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ROAD_LEFT - 12, 0); ctx.lineTo(ROAD_LEFT - 12, H); ctx.stroke();
    // 右护栏
    for (let y = 0; y < H; y += 30) {
        const ry = (y + offset) % H;
        ctx.fillStyle = '#aaa';
        ctx.fillRect(ROAD_LEFT + LANES * LANE_W + 11, ry, 3, 18);
    }
    ctx.beginPath(); ctx.moveTo(ROAD_LEFT + LANES * LANE_W + 12, 0); ctx.lineTo(ROAD_LEFT + LANES * LANE_W + 12, H); ctx.stroke();

    // === 道具 ===
    pickups.forEach(p => {
        const pulse = Math.sin(frameCount * 0.1) * 0.2 + 1;
        ctx.fillStyle = p.type === 'heal' ? '#4caf5060' : '#ffeb3b60';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * pulse * 1.3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = p.type === 'heal' ? '#4caf50' : '#ffeb3b';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '14px Arial'; ctx.textAlign = 'center';
        ctx.fillText(p.type === 'heal' ? '❤' : '⚡', p.x, p.y + 5);
    });
}

// === ./ui.js ===
// ============================================================
// ui.js - HUD 与菜单覆盖层管理
// ============================================================

/**
 * 更新 HUD 显示
 * @param {number} score
 * @param {number} roadSpeed
 * @param {number} highScore
 * @param {number} lives
 */
function updateHUD(score, roadSpeed, highScore, lives) {
    document.getElementById('score').textContent = score;
    document.getElementById('speed').textContent = Math.floor(roadSpeed * 20) + 'km/h';
    document.getElementById('high').textContent = Math.max(highScore, score);
    const livesEl = document.getElementById('lives');
    if (livesEl) {
        livesEl.textContent = '❤'.repeat(Math.max(0, lives));
    }
}

/**
 * 隐藏开始菜单
 */
function hideStartOverlay() {
    document.getElementById('startOverlay').classList.add('hidden');
}

/**
 * 隐藏游戏结束菜单
 */
function hideGameOverOverlay() {
    document.getElementById('gameOverOverlay').classList.add('hidden');
}

/**
 * 显示游戏结束菜单
 * @param {number} score
 * @param {number} highScore
 * @param {number} lives - 剩余生命（用于判断是碰撞结束还是生命耗尽）
 */
function showGameOver(score, highScore, lives) {
    const title = document.querySelector('#gameOverOverlay .overlay-title');
    if (lives <= 0) {
        title.textContent = '生命耗尽！';
    } else {
        title.textContent = '车祸！';
    }
    document.getElementById('goStats').innerHTML =
        `分数: ${score}<br>最高: ${highScore}`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
}

// === main.js ===
// ============================================================
// main.js - 游戏初始化、事件监听、主循环
// ============================================================


// ---- Canvas 初始化 ----
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// ---- 游戏状态 ----
let player, cars, pickups, particles;
let score, highScore, gameActive, lives;
let roadSpeed, baseSpeed, frameCount;
let keys = {};
let shakeX, shakeY;

highScore = parseInt(localStorage.getItem('racing_high')) || 0;

// ---- 粒子生成 ----
function spawnCrashParticles() {
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: player.x, y: player.y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10 - 3,
            life: 30 + Math.random() * 20,
            color: ['#f44336', '#ff9800', '#ffeb3b'][Math.floor(Math.random() * 3)]
        });
    }
}

function spawnCollectParticles(x, y, color) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 20 + Math.random() * 10,
            color
        });
    }
}

// ---- 游戏初始化 ----
function startGame() {
    Sound.init();
    hideStartOverlay();
    hideGameOverOverlay();

    player = createPlayer();
    cars = [];
    pickups = [];
    particles = [];
    score = 0;
    gameActive = true;
    frameCount = 0;
    lives = INITIAL_LIVES;
    baseSpeed = 3;
    roadSpeed = baseSpeed;
    shakeX = 0;
    shakeY = 0;
    updateHUD(score, roadSpeed, highScore, lives);
}

// ---- 碰撞处理 ----
function handleCollision() {
    lives--;
    Sound.play('crash');
    shakeX = 15;
    shakeY = 15;
    spawnCrashParticles();

    if (lives <= 0) {
        gameActive = false;
        highScore = Math.max(highScore, score);
        localStorage.setItem('racing_high', highScore);
        setTimeout(() => {
            showGameOver(score, highScore, lives);
        }, 500);
    } else {
        // 还有命：短暂无敌后继续
        player.invincible = 120;
        updateHUD(score, roadSpeed, highScore, lives);
    }
}

// ---- 逻辑更新 ----
function update() {
    if (!gameActive) return;
    frameCount++;

    // 玩家平滑移动到目标车道
    const targetX = ROAD_LEFT + player.lane * LANE_W + LANE_W / 2;
    player.x += (targetX - player.x) * 0.2;

    // 速度递增
    baseSpeed = 3 + frameCount * 0.0005;
    roadSpeed = baseSpeed;

    // 分数
    if (frameCount % 5 === 0) score += Math.floor(roadSpeed);
    if (player.invincible > 0) player.invincible--;

    // 生成敌车和道具
    if (frameCount % Math.max(20, 50 - Math.floor(frameCount / 200)) === 0) {
        const newCar = spawnCar(roadSpeed, cars);
        if (newCar) cars.push(newCar);
    }
    if (frameCount % 200 === 0) {
        const newPickup = spawnPickup(pickups);
        if (newPickup) pickups.push(newPickup);
    }

    // 更新敌车
    for (let i = cars.length - 1; i >= 0; i--) {
        const c = cars[i];
        c.y += roadSpeed + c.speed;
        if (c.y > H + 100) { cars.splice(i, 1); continue; }

        // 碰撞检测
        if (player.invincible <= 0 &&
            Math.abs(player.x - c.x) < COLLISION_X &&
            Math.abs(player.y - c.y) < COLLISION_Y) {
            handleCollision();
            if (!gameActive) return;
            cars.splice(i, 1);
            continue;
        }

        // 超越得分
        if (!c.passed && c.y > player.y + 40) {
            c.passed = true;
            score += 10;
            Sound.play('pass');
            updateHUD(score, roadSpeed, highScore, lives);
        }
    }

    // 更新道具
    for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.y += roadSpeed;
        if (p.y > H + 30) { pickups.splice(i, 1); continue; }
        if (Math.abs(player.x - p.x) < 30 && Math.abs(player.y - p.y) < 30) {
            if (p.type === 'heal') {
                // 修复道具：恢复1点生命（上限为初始生命值）
                if (lives < INITIAL_LIVES) {
                    lives++;
                }
                // 同时给短暂无敌保护
                player.invincible = 60;
            } else {
                score += 100;
            }
            Sound.play('collect');
            spawnCollectParticles(p.x, p.y, p.type === 'heal' ? '#4caf50' : '#ffeb3b');
            pickups.splice(i, 1);
            updateHUD(score, roadSpeed, highScore, lives);
        }
    }

    // 屏幕震动衰减
    shakeX *= 0.9;
    shakeY *= 0.9;

    // 粒子更新
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        return p.life > 0;
    });
}

// ---- 渲染 ----
function draw() {
    ctx.save();
    ctx.translate(
        (Math.random() - 0.5) * shakeX,
        (Math.random() - 0.5) * shakeY
    );

    // 道路
    drawRoad(ctx, frameCount, roadSpeed, pickups);

    // 敌车
    cars.forEach(c => drawCar(ctx, c.x, c.y, c.color, false));

    // 玩家（无敌闪烁）
    if (player.invincible > 0 && player.invincible % 6 < 3) {
        ctx.globalAlpha = 0.5;
    }
    drawCar(ctx, player.x, player.y, player.color, true);
    ctx.globalAlpha = 1;

    // 粒子
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // 生命值显示（画布内）
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('❤'.repeat(Math.max(0, lives)), 10, H - 10);

    ctx.restore();
}

// ---- 主循环 ----
function gameLoop() {
    requestAnimationFrame(gameLoop);
    update();
    draw();
}

// ---- 事件监听 ----
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    if (e.code === 'KeyR') { e.preventDefault(); startGame(); }

    // 直接响应按键变道（修复Bug：不再依赖帧计数）
    if (gameActive) {
        if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && player.lane > 0) {
            player.lane--;
        }
        if ((e.code === 'ArrowRight' || e.code === 'KeyD') && player.lane < LANES - 1) {
            player.lane++;
        }
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// 触屏控制
let touchStartX;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const dx = e.touches[0].clientX - touchStartX;
    if (Math.abs(dx) > 30) {
        if (dx > 0 && player.lane < LANES - 1) {
            player.lane++;
            touchStartX = e.touches[0].clientX;
        }
        if (dx < 0 && player.lane > 0) {
            player.lane--;
            touchStartX = e.touches[0].clientX;
        }
    }
});

// 暴露 startGame 给 HTML 按钮的 onclick
window.startGame = startGame;

// 初始 HUD
updateHUD(score || 0, roadSpeed || 3, highScore, lives || INITIAL_LIVES);

// Bug修复：启动游戏主循环（原代码定义了 gameLoop 但从未调用）
gameLoop();


</script>

</body>
</html>
