<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空侵略者</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        #gameCanvas{border:2px solid #333;border-radius:8px;box-shadow:0 0 30px rgba(0,255,150,0.3);background:#0a0a0a}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#00ff96;font-weight:bold}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;color:#00ff96;text-shadow:0 0 20px rgba(0,255,150,0.5);margin-bottom:15px}
        .menu-btn{background:linear-gradient(135deg,#00ff96 0%,#00cc77 100%);border:none;padding:14px 40px;font-size:18px;color:#000;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px;font-weight:bold}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(0,255,150,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:400px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#00ff96;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">关卡: <span id="level">1</span></div>
        <div class="hud-item">生命: <span id="lives">3</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title">太空侵略者</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>← → 或 A/D：移动飞船</div>
            <div>空格 或 ↑：射击</div>
            <div>R：重新开始 | P：暂停</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>消灭所有外星侵略者过关</div>
            <div>外星人会逐渐下移并加速射击</div>
            <div>击中 UFO 获得随机道具</div>
            <h3 style="margin-top:8px">道具</h3>
            <div>🛡️护盾 | ⚡三叉弹 | 🔥速射 | ❤️回血</div>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">游戏结束</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script>
// === ./config.js ===
// 常量配置
const W = 600;
const H = 700;

// 敌人参数
const ENEMY_ROWS = 5;
const ENEMY_COLS = 8;
const ENEMY_W = 36;
const ENEMY_H = 28;
const ENEMY_PAD = 8;
const ENEMY_COLORS = ['#f44336', '#ff9800', '#ffeb3b', '#4caf50', '#2196f3'];

// 玩家参数
const PLAYER_W = 40;
const PLAYER_H = 20;
const PLAYER_SPEED = 5;
const PLAYER_Y_BASE = H - 50; // 玩家基线Y

// 子弹
const BULLET_SPEED = 8;
const TRIPLE_SIDE_VX = 2;
const TRIPLE_SIDE_VY = -8; // 修复Bug#1: 统一为-8

// 无敌时间（帧数，60fps下1.5秒=90帧）
const INVINCIBLE_FRAMES = 90;

// 道具
const POWERUP_FALL_SPEED = 2;
const TRIPLE_DURATION = 300; // 帧
const RAPID_DURATION = 300;
const RAPID_COOLDOWN = 8;
const NORMAL_COOLDOWN = 18;
const MAX_SHIELD = 3;
const MAX_LIVES = 5;

// === ./sound.js ===
// Web Audio API 音效系统
const Sound = {
    ctx: null,

    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },

    play(type) {
        if (!this.ctx) return;
        const c = this.ctx;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;

        switch (type) {
            case 'shoot':
                o.type = 'square';
                o.frequency.setValueAtTime(800, t);
                o.frequency.exponentialRampToValueAtTime(400, t + 0.06);
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                o.start(t);
                o.stop(t + 0.06);
                break;
            case 'hit':
                o.type = 'sine';
                o.frequency.setValueAtTime(500, t);
                o.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;
            case 'die':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                o.start(t);
                o.stop(t + 0.3);
                break;
            case 'powerup':
                o.type = 'sine';
                o.frequency.setValueAtTime(800, t);
                o.frequency.setValueAtTime(1000, t + 0.05);
                o.frequency.setValueAtTime(1200, t + 0.1);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                o.start(t);
                o.stop(t + 0.15);
                break;
            case 'ufo':
                o.type = 'sine';
                o.frequency.setValueAtTime(300, t);
                o.frequency.setValueAtTime(500, t + 0.1);
                o.frequency.setValueAtTime(300, t + 0.2);
                g.gain.setValueAtTime(0.08, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                o.start(t);
                o.stop(t + 0.3);
                break;
        }
    }
};

// === ./player.js ===
// 玩家飞船

class Player {
    constructor() {
        this.x = W / 2;
        this.w = PLAYER_W;
        this.speed = PLAYER_SPEED;
        this.shootCooldown = 0;
        this.invincibleTimer = 0; // Bug#4: 无敌帧计时器
    }

    reset() {
        this.x = W / 2;
        this.shootCooldown = 0;
        this.invincibleTimer = 0;
    }

    // 是否处于无敌状态
    isInvincible() {
        return this.invincibleTimer > 0;
    }

    // 进入无敌状态
    startInvincible() {
        this.invincibleTimer = INVINCIBLE_FRAMES;
    }

    update(keys) {
        if (keys['ArrowLeft'] || keys['KeyA']) this.x -= this.speed;
        if (keys['ArrowRight'] || keys['KeyD']) this.x += this.speed;
        this.x = Math.max(this.w / 2, Math.min(W - this.w / 2, this.x));

        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.invincibleTimer > 0) this.invincibleTimer--;
    }

    shoot(bullets, triple, rapid) {
        if (this.shootCooldown > 0) return;
        this.shootCooldown = rapid > 0 ? RAPID_COOLDOWN : NORMAL_COOLDOWN;
        Sound.play('shoot');

        if (triple > 0) {
            bullets.push({ x: this.x, y: PLAYER_Y_BASE, vx: 0, vy: -BULLET_SPEED });
            bullets.push({ x: this.x - 15, y: PLAYER_Y_BASE, vx: -TRIPLE_SIDE_VX, vy: TRIPLE_SIDE_VY });
            bullets.push({ x: this.x + 15, y: PLAYER_Y_BASE, vx: TRIPLE_SIDE_VX, vy: TRIPLE_SIDE_VY });
        } else {
            bullets.push({ x: this.x, y: PLAYER_Y_BASE, vx: 0, vy: -BULLET_SPEED });
        }
    }

    draw(ctx, shield, triple) {
        // 无敌时闪烁效果
        if (this.isInvincible() && Math.floor(this.invincibleTimer / 4) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }

        const cx = this.x;
        const baseY = H - 50;
        const hw = this.w / 2;

        // 引擎火焰
        const flicker = Math.random() * 6;
        ctx.fillStyle = '#ff6b35';
        ctx.beginPath();
        ctx.moveTo(cx - 8, baseY + 6);
        ctx.lineTo(cx, baseY + 18 + flicker);
        ctx.lineTo(cx + 8, baseY + 6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.moveTo(cx - 4, baseY + 6);
        ctx.lineTo(cx, baseY + 12 + flicker * 0.6);
        ctx.lineTo(cx + 4, baseY + 6);
        ctx.closePath();
        ctx.fill();

        // 主机身（深蓝渐变）
        const bodyGrad = ctx.createLinearGradient(cx - hw, baseY, cx + hw, baseY);
        bodyGrad.addColorStop(0, '#1565c0');
        bodyGrad.addColorStop(0.5, '#42a5f5');
        bodyGrad.addColorStop(1, '#1565c0');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(cx, baseY - 18);
        ctx.lineTo(cx - hw, baseY + 6);
        ctx.lineTo(cx - hw * 0.6, baseY + 6);
        ctx.lineTo(cx - hw * 0.3, baseY + 2);
        ctx.lineTo(cx + hw * 0.3, baseY + 2);
        ctx.lineTo(cx + hw * 0.6, baseY + 6);
        ctx.lineTo(cx + hw, baseY + 6);
        ctx.closePath();
        ctx.fill();

        // 左翼
        ctx.fillStyle = '#0d47a1';
        ctx.beginPath();
        ctx.moveTo(cx - hw * 0.5, baseY - 2);
        ctx.lineTo(cx - hw - 6, baseY + 8);
        ctx.lineTo(cx - hw * 0.6, baseY + 6);
        ctx.closePath();
        ctx.fill();
        // 右翼
        ctx.beginPath();
        ctx.moveTo(cx + hw * 0.5, baseY - 2);
        ctx.lineTo(cx + hw + 6, baseY + 8);
        ctx.lineTo(cx + hw * 0.6, baseY + 6);
        ctx.closePath();
        ctx.fill();

        // 驾驶舱
        ctx.fillStyle = '#90caf9';
        ctx.beginPath();
        ctx.ellipse(cx, baseY - 6, 5, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e3f2fd';
        ctx.beginPath();
        ctx.ellipse(cx - 1, baseY - 8, 2, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // 翼尖灯
        ctx.fillStyle = '#00e5ff';
        ctx.beginPath(); ctx.arc(cx - hw - 4, baseY + 7, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + hw + 4, baseY + 7, 2, 0, Math.PI * 2); ctx.fill();

        ctx.globalAlpha = 1;

        // 护盾
        if (shield > 0) {
            ctx.strokeStyle = 'rgba(0,200,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, baseY - 4, 30, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0,200,255,0.08)';
            ctx.fill();
        }
    }
}

// === ./particles.js ===
// 粒子系统
let particles = [];

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 20 + Math.random() * 15,
            color
        });
    }
}

function resetParticles() {
    particles = [];
}

function updateParticles() {
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        return p.life > 0;
    });
}

function drawParticles(ctx) {
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 35;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
}

// === ./enemies.js ===
// 敌人系统（5×8敌人阵列 + UFO）

class EnemyManager {
    constructor() {
        this.enemies = [];
        this.enemyDir = 1;
        this.enemyStepTimer = 0;
        this.enemyShootTimer = 0;
        this.ufo = null;
        this.ufoTimer = 0;
    }

    initLevel(level) {
        this.enemies = [];
        this.enemyDir = 1;
        this.enemyStepTimer = 0;
        this.enemyShootTimer = 0;
        this.ufo = null;
        this.ufoTimer = 0;

        for (let r = 0; r < ENEMY_ROWS; r++) {
            for (let c = 0; c < ENEMY_COLS; c++) {
                this.enemies.push({
                    x: 60 + c * (ENEMY_W + ENEMY_PAD),
                    y: 50 + r * (ENEMY_H + ENEMY_PAD),
                    w: ENEMY_W,
                    h: ENEMY_H,
                    hp: ENEMY_ROWS - r,
                    color: ENEMY_COLORS[r % ENEMY_COLORS.length],
                    points: (ENEMY_ROWS - r) * 10,
                    alive: true
                });
            }
        }
    }

    // 检查子弹是否击中敌人或UFO，返回 {hit, scoreAdd, powerupType}
    checkBulletHit(bx, by) {
        // 击中敌人
        for (let j = 0; j < this.enemies.length; j++) {
            const e = this.enemies[j];
            if (!e.alive) continue;
            if (bx > e.x && bx < e.x + e.w && by > e.y && by < e.y + e.h) {
                e.hp--;
                if (e.hp <= 0) {
                    e.alive = false;
                    spawnParticles(e.x + e.w / 2, e.y + e.h / 2, e.color, 10);
                    Sound.play('hit');
                    return { hit: true, scoreAdd: e.points, powerupType: null, spawnX: 0, spawnY: 0 };
                }
                return { hit: true, scoreAdd: 0, powerupType: null, spawnX: 0, spawnY: 0 };
            }
        }

        // 击中UFO
        if (this.ufo && bx > this.ufo.x && bx < this.ufo.x + 40 && by > this.ufo.y && by < this.ufo.y + 20) {
            const ux = this.ufo.x + 20, uy = this.ufo.y + 10;
            spawnParticles(ux, uy, '#ffd700', 15);
            const types = ['shield', 'triple', 'rapid', 'heal'];
            const type = types[Math.floor(Math.random() * types.length)];
            this.ufo = null;
            Sound.play('powerup');
            return { hit: true, scoreAdd: 100, powerupType: type, spawnX: ux, spawnY: uy };
        }

        return { hit: false, scoreAdd: 0, powerupType: null, spawnX: 0, spawnY: 0 };
    }

    update(level) {
        // 敌人移动
        this.enemyStepTimer++;
        const stepRate = Math.max(10, 40 - level * 2 - Math.floor((ENEMY_ROWS * ENEMY_COLS - this.enemies.filter(e => e.alive).length) * 0.5));
        if (this.enemyStepTimer >= stepRate) {
            this.enemyStepTimer = 0;
            let hitEdge = false;
            const alive = this.enemies.filter(e => e.alive);
            for (const e of alive) {
                if ((this.enemyDir > 0 && e.x + e.w + 8 > W) || (this.enemyDir < 0 && e.x - 8 < 0)) {
                    hitEdge = true;
                    break;
                }
            }
            if (hitEdge) {
                this.enemyDir *= -1;
                for (const e of alive) e.y += 15;
            } else {
                for (const e of alive) e.x += 8 * this.enemyDir;
            }
        }

        // 敌人射击
        this.enemyShootTimer++;
        const shootRate = Math.max(20, 60 - level * 3);
        if (this.enemyShootTimer >= shootRate) {
            this.enemyShootTimer = 0;
            const alive = this.enemies.filter(e => e.alive);
            if (alive.length > 0) {
                const e = alive[Math.floor(Math.random() * alive.length)];
                return { x: e.x + e.w / 2, y: e.y + e.h, vy: 3 + level * 0.3 };
            }
        }
        return null;
    }

    // Bug#3: UFO随机左右方向
    updateUFO() {
        this.ufoTimer++;
        if (!this.ufo && this.ufoTimer > 600) {
            const dir = Math.random() < 0.5 ? 1 : -1;
            const startX = dir > 0 ? -40 : W + 40;
            this.ufo = { x: startX, y: 25, dir };
            this.ufoTimer = 0;
            Sound.play('ufo');
        }
        if (this.ufo) {
            this.ufo.x += 1.5 * this.ufo.dir;
            // 从左进检查右边界，从右进检查左边界
            if ((this.ufo.dir > 0 && this.ufo.x > W + 40) || (this.ufo.dir < 0 && this.ufo.x < -40)) {
                this.ufo = null;
            }
        }
    }

    // 检查敌人是否到达底部（Bug#2: 调整为H-55）
    reachedBottom() {
        return this.enemies.some(e => e.alive && e.y + e.h >= H - 55);
    }

    allDead() {
        return this.enemies.every(e => !e.alive);
    }

    draw(ctx) {
        // 绘制敌人
        this.enemies.forEach(e => {
            if (!e.alive) return;
            const cx = e.x + e.w / 2;
            const cy = e.y + e.h / 2;
            const hw = e.w / 2;
            const hh = e.h / 2;

            // 根据颜色类型绘制不同形状的敌人
            if (e.color === '#f44336' || e.color === '#e53935') {
                // 顶层：恶魔型（尖角+翅膀）
                ctx.fillStyle = e.color;
                // 身体
                ctx.beginPath();
                ctx.moveTo(cx, cy + hh);
                ctx.lineTo(cx - hw, cy - hh * 0.3);
                ctx.lineTo(cx - hw * 0.7, cy - hh);
                ctx.lineTo(cx - hw * 0.2, cy - hh * 0.6);
                ctx.lineTo(cx, cy - hh);
                ctx.lineTo(cx + hw * 0.2, cy - hh * 0.6);
                ctx.lineTo(cx + hw * 0.7, cy - hh);
                ctx.lineTo(cx + hw, cy - hh * 0.3);
                ctx.closePath();
                ctx.fill();
                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(cx - 6, cy - 2, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 6, cy - 2, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(cx - 5, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 7, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
            } else if (e.color === '#ff9800' || e.color === '#fb8c00') {
                // 第二层：甲虫型（圆壳+触角）
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2);
                ctx.fill();
                // 壳纹
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(cx, cy - hh); ctx.lineTo(cx, cy + hh); ctx.stroke();
                // 触角
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(cx - 8, cy - hh); ctx.lineTo(cx - 14, cy - hh - 8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 8, cy - hh); ctx.lineTo(cx + 14, cy - hh - 8); ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(cx - 14, cy - hh - 8, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 14, cy - hh - 8, 2, 0, Math.PI * 2); ctx.fill();
                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(cx - 7, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 7, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(cx - 6, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 8, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
            } else if (e.color === '#ffeb3b' || e.color === '#fdd835') {
                // 第三层：水母型（波浪边+触手）
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(cx, cy - hh * 0.3, hw, Math.PI, 0);
                ctx.lineTo(cx + hw, cy + hh * 0.3);
                // 波浪底边
                for (let i = 0; i < 5; i++) {
                    const wx = cx + hw - (i + 1) * (e.w / 5);
                    const wy = cy + hh * 0.3 + (i % 2 === 0 ? 5 : 0);
                    ctx.lineTo(wx, wy);
                }
                ctx.closePath();
                ctx.fill();
                // 眼睛
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(cx - 6, cy - hh * 0.2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 6, cy - hh * 0.2, 3, 0, Math.PI * 2); ctx.fill();
                // 发光
                ctx.fillStyle = 'rgba(255,235,59,0.3)';
                ctx.beginPath(); ctx.arc(cx, cy, hw * 0.5, 0, Math.PI * 2); ctx.fill();
            } else if (e.color === '#4caf50' || e.color == '#43a047') {
                // 第四层：水晶型（菱形+光芒）
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(cx, cy - hh);
                ctx.lineTo(cx + hw, cy);
                ctx.lineTo(cx, cy + hh);
                ctx.lineTo(cx - hw, cy);
                ctx.closePath();
                ctx.fill();
                // 内部菱形
                ctx.fillStyle = '#81c784';
                ctx.beginPath();
                ctx.moveTo(cx, cy - hh * 0.5);
                ctx.lineTo(cx + hw * 0.5, cy);
                ctx.lineTo(cx, cy + hh * 0.5);
                ctx.lineTo(cx - hw * 0.5, cy);
                ctx.closePath();
                ctx.fill();
                // 核心
                ctx.fillStyle = '#c8e6c9';
                ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
                // 眼睛
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(cx - 5, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 5, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
            } else {
                // 底层：机械型（方形+铆钉+装甲）
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x + 2, e.y, e.w - 4, e.h);
                ctx.fillRect(e.x, e.y + 3, e.w, e.h - 6);
                // 装甲板
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(e.x + 4, e.y + 2, e.w - 8, e.h / 2 - 2);
                // 铆钉
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(e.x + 6, e.y + 5, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x + e.w - 6, e.y + 5, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x + 6, e.y + e.h - 5, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x + e.w - 6, e.y + e.h - 5, 1.5, 0, Math.PI * 2); ctx.fill();
                // 眼睛（发光）
                ctx.fillStyle = '#ff1744';
                ctx.beginPath(); ctx.arc(cx - 7, cy - 2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 7, cy - 2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(255,23,68,0.3)';
                ctx.beginPath(); ctx.arc(cx - 7, cy - 2, 5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 7, cy - 2, 5, 0, Math.PI * 2); ctx.fill();
            }

            if (e.hp > 1) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(e.hp, cx, e.y + e.h + 10);
            }
        });

        // 绘制UFO
        if (this.ufo) {
            const ux = this.ufo.x + 20;
            const uy = this.ufo.y + 10;
            const t = Date.now() * 0.003;

            // 光环
            ctx.strokeStyle = 'rgba(255,215,0,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(ux, uy, 25 + Math.sin(t) * 3, 0, Math.PI * 2); ctx.stroke();

            // 主体
            const ufoGrad = ctx.createLinearGradient(ux - 20, uy, ux + 20, uy);
            ufoGrad.addColorStop(0, '#ffd700');
            ufoGrad.addColorStop(0.5, '#fff176');
            ufoGrad.addColorStop(1, '#ffd700');
            ctx.fillStyle = ufoGrad;
            ctx.beginPath();
            ctx.ellipse(ux, uy, 22, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // 顶盖
            ctx.fillStyle = '#ffb300';
            ctx.beginPath();
            ctx.ellipse(ux, uy - 4, 12, 8, 0, Math.PI, 0);
            ctx.fill();

            // 顶灯
            ctx.fillStyle = '#ff0';
            ctx.beginPath(); ctx.arc(ux, uy - 8, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,0,0.4)';
            ctx.beginPath(); ctx.arc(ux, uy - 8, 8, 0, Math.PI * 2); ctx.fill();

            // 底部灯
            const lights = [-12, -4, 4, 12];
            for (const lx of lights) {
                ctx.fillStyle = `hsl(${(t * 50 + lx * 10) % 360},100%,60%)`;
                ctx.beginPath(); ctx.arc(ux + lx, uy + 5, 2, 0, Math.PI * 2); ctx.fill();
            }
        }
    }
}

// === ./items.js ===
// 道具系统（护盾/三叉弹/速射/回血）

const ICONS = { shield: '🛡', triple: '⚡', rapid: '🔥', heal: '❤️' };

class ItemManager {
    constructor() {
        this.powerups = [];
        this.shield = 0;
        this.triple = 0;
        this.rapid = 0;
    }

    reset() {
        this.powerups = [];
        this.shield = 0;
        this.triple = 0;
        this.rapid = 0;
    }

    spawn(x, y, type) {
        this.powerups.push({ x, y, type, vy: POWERUP_FALL_SPEED });
    }

    // 检查玩家是否拾取道具，返回 {picked, shield, triple, rapid}
    checkPickup(playerX, playerW) {
        for (let i = this.powerups.length - 1; i >= 0; i--) {
            const p = this.powerups[i];
            if (p.y >= H - 50 && p.x > playerX - playerW / 2 && p.x < playerX + playerW / 2) {
                switch (p.type) {
                    case 'shield':
                        this.shield = Math.min(MAX_SHIELD, this.shield + 1);
                        break;
                    case 'triple':
                        this.triple = TRIPLE_DURATION;
                        break;
                    case 'rapid':
                        this.rapid = RAPID_DURATION;
                        break;
                    case 'heal':
                        // 回血由外部处理（需要访问lives）
                        break;
                }
                Sound.play('powerup');
                this.powerups.splice(i, 1);
                return { picked: true, type: p.type };
            }
        }
        return { picked: false, type: null };
    }

    update() {
        for (let i = this.powerups.length - 1; i >= 0; i--) {
            const p = this.powerups[i];
            p.y += p.vy;
            if (p.y > H + 20) {
                this.powerups.splice(i, 1);
            }
        }

        if (this.triple > 0) this.triple--;
        if (this.rapid > 0) this.rapid--;
    }

    draw(ctx) {
        this.powerups.forEach(p => {
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(ICONS[p.type] || '?', p.x, p.y);
        });
    }
}

// === ./ui.js ===
// UI系统（HUD、菜单覆盖层）

class UI {
    constructor() {
        this.scoreEl = document.getElementById('score');
        this.levelEl = document.getElementById('level');
        this.livesEl = document.getElementById('lives');
        this.highEl = document.getElementById('high');
        this.startOverlay = document.getElementById('startOverlay');
        this.gameOverOverlay = document.getElementById('gameOverOverlay');
        this.goStats = document.getElementById('goStats');
    }

    updateHUD(score, level, lives, highScore) {
        this.scoreEl.textContent = score;
        this.levelEl.textContent = level;
        this.livesEl.textContent = lives;
        this.highEl.textContent = Math.max(highScore, score);
    }

    showStart() {
        this.startOverlay.classList.remove('hidden');
        this.gameOverOverlay.classList.add('hidden');
    }

    hideStart() {
        this.startOverlay.classList.add('hidden');
        this.gameOverOverlay.classList.add('hidden');
    }

    showGameOver(score, level, highScore) {
        this.goStats.innerHTML = `分数: ${score}<br>关卡: ${level}<br>最高: ${highScore}`;
        this.gameOverOverlay.classList.remove('hidden');
    }

    hideGameOver() {
        this.gameOverOverlay.classList.add('hidden');
    }
}

// === main.js ===
// 游戏主循环、初始化、事件监听

// Canvas初始化
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// 游戏状态
let score, lives, level, highScore, gameActive, paused;
let keys = {};
let bullets, enemyBullets;

// 模块实例
const player = new Player();
const enemies = new EnemyManager();
const items = new ItemManager();
const ui = new UI();

// 加载最高分
highScore = parseInt(localStorage.getItem('invaders_high')) || 0;

function initLevel(lv) {
    player.reset();
    bullets = [];
    enemyBullets = [];
    enemies.initLevel(lv);
    items.reset();
    resetParticles();
}

function startGame() {
    Sound.init();
    ui.hideStart();
    score = 0;
    lives = 3;
    level = 1;
    gameActive = true;
    paused = false;
    initLevel(level);
    ui.updateHUD(score, level, lives, highScore);
}

function endGame() {
    gameActive = false;
    highScore = Math.max(highScore, score);
    localStorage.setItem('invaders_high', highScore);
    setTimeout(() => {
        ui.showGameOver(score, level, highScore);
    }, 500);
}

function shoot() {
    player.shoot(bullets, items.triple, items.rapid);
}

function update() {
    // 玩家移动
    player.update(keys);

    // 射击
    if (keys['Space'] || keys['ArrowUp']) shoot();

    // 玩家子弹
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -10 || b.x < -10 || b.x > W + 10) {
            bullets.splice(i, 1);
            continue;
        }

        // 击中敌人/UFO
        const result = enemies.checkBulletHit(b.x, b.y);
        if (result.hit) {
            bullets.splice(i, 1);
            score += result.scoreAdd;
            if (result.powerupType) {
                items.spawn(result.spawnX, result.spawnY, result.powerupType);
            }
            ui.updateHUD(score, level, lives, highScore);
        }
    }

    // 敌人移动和射击
    const enemyShot = enemies.update(level);
    if (enemyShot) {
        enemyBullets.push(enemyShot);
    }

    // UFO
    enemies.updateUFO();

    // 敌人子弹
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += b.vy;
        if (b.y > H + 10) {
            enemyBullets.splice(i, 1);
            continue;
        }
        // Bug#4: 被击中检测 - 增加无敌帧判断
        if (b.y >= H - 50 && b.x > player.x - player.w / 2 && b.x < player.x + player.w / 2) {
            if (player.isInvincible()) {
                // 无敌状态，忽略伤害
                enemyBullets.splice(i, 1);
                continue;
            }
            if (items.shield > 0) {
                items.shield--;
                Sound.play('powerup');
            } else {
                lives--;
                Sound.play('die');
                spawnParticles(player.x, H - 45, '#00ff96', 15);
                player.startInvincible(); // Bug#4: 进入无敌状态
                if (lives <= 0) {
                    endGame();
                    return;
                }
            }
            enemyBullets.splice(i, 1);
            ui.updateHUD(score, level, lives, highScore);
        }
    }

    // 道具拾取
    const pickup = items.checkPickup(player.x, player.w);
    if (pickup.picked) {
        if (pickup.type === 'heal') {
            lives = Math.min(MAX_LIVES, lives + 1);
        }
        ui.updateHUD(score, level, lives, highScore);
    }

    // 更新道具
    items.update();

    // 更新粒子
    updateParticles();

    // 胜利检查
    if (enemies.allDead()) {
        level++;
        initLevel(level);
        ui.updateHUD(score, level, lives, highScore);
    }

    // 失败检查 - Bug#2: 调整为H-55
    if (enemies.reachedBottom()) {
        endGame();
    }
}

function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // 星星背景
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 60; i++) {
        const sx = (i * 97 + Date.now() * 0.01) % W;
        const sy = (i * 131) % H;
        ctx.fillRect(sx, sy, 1, 1);
    }

    // 敌人和UFO
    enemies.draw(ctx);

    // 玩家
    player.draw(ctx, items.shield, items.triple);

    // 玩家子弹
    bullets.forEach(b => {
        const color = items.triple > 0 ? '#ff0' : '#00ff96';
        ctx.fillStyle = color;
        ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
        // 子弹发光
        ctx.fillStyle = color + '40';
        ctx.beginPath(); ctx.arc(b.x, b.y - 2, 6, 0, Math.PI * 2); ctx.fill();
    });

    // 敌人子弹
    enemyBullets.forEach(b => {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(b.x - 2, b.y, 4, 10);
        // 子弹发光
        ctx.fillStyle = 'rgba(255,68,68,0.3)';
        ctx.beginPath(); ctx.arc(b.x, b.y + 5, 5, 0, Math.PI * 2); ctx.fill();
    });

    // 道具
    items.draw(ctx);

    // 粒子
    drawParticles(ctx);
}

function gameLoop() {
    requestAnimationFrame(gameLoop);
    if (!gameActive || paused) return;
    update();
    if (gameActive) draw();
}

// 事件监听
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
    }
    if (e.code === 'KeyR') startGame();
    if (e.code === 'KeyP' && gameActive) paused = !paused;
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

// 初始HUD
ui.updateHUD(0, 1, 3, highScore);

// 暴露startGame到全局（HTML按钮onclick需要）
window.startGame = startGame;

// 启动游戏循环
gameLoop();


</script>
