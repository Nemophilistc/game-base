            const sy = Math.round(this.shopkeeper.y);

            // Body
            ctx.fillStyle = COLORS.shopkeeper;
            ctx.fillRect(sx - 6, sy + 6, 12, 14);
            // Head
            ctx.fillStyle = COLORS.playerSkin;
            ctx.fillRect(sx - 5, sy - 2, 10, 10);
            // Hat
            ctx.fillStyle = '#654';
            ctx.fillRect(sx - 6, sy - 4, 12, 4);
            ctx.fillRect(sx - 4, sy - 8, 8, 5);
            // Eyes
            ctx.fillStyle = '#222';
            ctx.fillRect(sx + this.shopkeeper.facing * 2 - 1, sy + 2, 2, 2);
            ctx.fillRect(sx + this.shopkeeper.facing * 2 + 2, sy + 2, 2, 2);
            // Shotgun
            ctx.fillStyle = COLORS.shopkeeperShotgun;
            ctx.fillRect(sx + this.shopkeeper.facing * 6, sy + 8, this.shopkeeper.facing * 12, 3);
        }
    }

    _renderShopItem(ctx, item, x, y) {
        switch (item.type) {
            case 'rope':
                ctx.fillStyle = COLORS.ropePickup;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = COLORS.hudText;
                ctx.font = 'bold 8px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('R', x, y + 3);
                ctx.textAlign = 'left';
                break;
            case 'bomb':
                ctx.fillStyle = COLORS.bomb;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = COLORS.hudText;
                ctx.font = 'bold 8px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('B', x, y + 3);
                ctx.textAlign = 'left';
                break;
            case 'health':
                ctx.fillStyle = COLORS.health;
                ctx.beginPath();
                ctx.arc(x - 2, y - 1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 2, y - 1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(x - 5, y);
                ctx.lineTo(x, y + 5);
                ctx.lineTo(x + 5, y);
                ctx.fill();
                break;
            case 'compass':
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#cc3333';
                ctx.beginPath();
                ctx.moveTo(x, y - 3);
                ctx.lineTo(x + 1, y);
                ctx.lineTo(x, y + 3);
                ctx.lineTo(x - 1, y);
                ctx.closePath();
                ctx.fill();
                break;
            case 'gloves':
                ctx.fillStyle = '#8b6914';
                ctx.fillRect(x - 5, y - 4, 10, 8);
                ctx.fillStyle = '#a07818';
                ctx.fillRect(x - 3, y - 6, 6, 3);
                break;
            case 'shoes':
                ctx.fillStyle = '#cc3333';
                ctx.fillRect(x - 5, y - 3, 10, 7);
                ctx.fillStyle = '#aa2222';
                ctx.fillRect(x - 6, y + 2, 12, 3);
                break;
        }
    }

    tryBuy(item, player) {
        if (item.purchased) {
            Sound.shopDeny();
            return false;
        }
        if (player.gold < item.cost) {
            Sound.shopDeny();
            return false;
        }

        player.gold -= item.cost;
        item.purchased = true;
        Sound.shopBuy();

        switch (item.type) {
            case 'rope': player.ropes += item.amount; break;
            case 'bomb': player.bombs += item.amount; break;
            case 'health': player.heal(item.amount); break;
            case 'compass': player.hasCompass = true; break;
            case 'gloves': player.hasGloves = true; break;
            case 'shoes': player.hasShoes = true; break;
        }
        return true;
    }
}

// effects.js - Particles, screen shake, visual effects

class Particle {
    constructor(x, y, vx, vy, color, size, life, gravity = true) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
        this.gravity = gravity;
        this.dead = false;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
    }

    update(dt) {
        const dtScale = dt / 16.667;
        this.x += this.vx * dtScale;
        this.y += this.vy * dtScale;
        if (this.gravity) this.vy += 0.15 * dtScale;
        this.life -= dt;
        this.rotation += this.rotSpeed * dtScale;
        if (this.life <= 0) this.dead = true;
    }

    render(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;

        const s = this.size * (0.5 + alpha * 0.5);
        ctx.save();
        ctx.translate(Math.round(this.x), Math.round(this.y));
        ctx.rotate(this.rotation);
        ctx.fillRect(-s / 2, -s / 2, s, s);
        ctx.restore();

        ctx.globalAlpha = 1;
    }
}

class Effects {
    constructor() {
        this.particles = [];
        this.shakeX = 0;
        this.shakeY = 0;
        this.shakeIntensity = 0;
        this.shakeDuration = 0;
        this.flashAlpha = 0;
        this.flashColor = '#fff';
        this.dustParticles = [];
    }

    update(dt) {
        for (const p of this.particles) {
            p.update(dt);
        }
        this.particles = this.particles.filter(p => !p.dead);

        // Screen shake
        if (this.shakeDuration > 0) {
            this.shakeDuration -= dt;
            const intensity = this.shakeIntensity * (this.shakeDuration / 500);
            this.shakeX = (Math.random() - 0.5) * intensity * 2;
            this.shakeY = (Math.random() - 0.5) * intensity * 2;
        } else {
            this.shakeX = 0;
            this.shakeY = 0;
        }

        // Flash
        if (this.flashAlpha > 0) {
            this.flashAlpha -= dt * 0.003;
        }
    }

    getShakeOffset() {
        return { x: this.shakeX, y: this.shakeY };
    }

    // Explosion effect
    explosion(x, y, intensity = 1) {
        const count = Math.floor(20 * intensity);
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 4 * intensity;
            const colors = ['#ff4400', '#ff8800', '#ffcc00', '#ff6600', '#cc3300'];
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 10,
                y + (Math.random() - 0.5) * 10,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                colors[Math.floor(Math.random() * colors.length)],
                3 + Math.random() * 4,
                300 + Math.random() * 400
            ));
        }
        // Debris
        for (let i = 0; i < Math.floor(8 * intensity); i++) {
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
            const speed = 2 + Math.random() * 3;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                '#5c3a1e',
                2 + Math.random() * 3,
                500 + Math.random() * 500
            ));
        }
        // Smoke
        for (let i = 0; i < Math.floor(10 * intensity); i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.3 + Math.random() * 1.5;
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 16,
                y + (Math.random() - 0.5) * 16,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 0.5,
                `rgba(100,80,60,${0.3 + Math.random() * 0.3})`,
                6 + Math.random() * 8,
                400 + Math.random() * 300,
                false
            ));
        }

        this.shake(8 * intensity, 300 * intensity);
        this.flash('#ff6600', 0.3 * intensity);
    }

    // Gold collect effect
    goldCollect(x, y) {
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 2;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 1,
                COLORS.gold,
                2 + Math.random() * 2,
                300 + Math.random() * 200
            ));
        }
    }

    // Gem collect effect
    gemCollect(x, y, color) {
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const speed = 1.5 + Math.random();
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                i % 2 === 0 ? color : COLORS.gemShine,
                2 + Math.random() * 2,
                400 + Math.random() * 200
            ));
        }
    }

    // Enemy death effect
    enemyDeath(x, y, color) {
        for (let i = 0; i < 15; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 1,
                color,
                2 + Math.random() * 3,
                300 + Math.random() * 300
            ));
        }
        this.shake(3, 150);
    }

    // Player hurt effect
    playerHurt(x, y) {
        for (let i = 0; i < 10; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 2;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                '#ff4444',
                2 + Math.random() * 2,
                300 + Math.random() * 200
            ));
        }
        this.flash('#ff0000', 0.3);
        this.shake(5, 200);
    }

    // Rope throw dust
    ropeThrowDust(x, y) {
        for (let i = 0; i < 4; i++) {
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 8,
                y,
                (Math.random() - 0.5) * 2,
                -Math.random() * 1.5,
                '#c8a050',
                2 + Math.random() * 2,
                200 + Math.random() * 150
            ));
        }
    }

    // Landing dust
    landingDust(x, y) {
        for (let i = 0; i < 5; i++) {
            const dir = i < 2.5 ? -1 : 1;
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 10,
                y,
                dir * (0.5 + Math.random()),
                -Math.random() * 0.5,
                'rgba(150,120,80,0.5)',
                2 + Math.random() * 2,
                200 + Math.random() * 100,
                false
            ));
        }
    }

    // Walk dust
    walkDust(x, y, dir) {
        if (Math.random() > 0.3) return;
        this.particles.push(new Particle(
            x, y,
            -dir * (0.3 + Math.random() * 0.5),
            -Math.random() * 0.3,
            'rgba(120,100,70,0.3)',
            1.5 + Math.random(),
            150 + Math.random() * 100,
            false
        ));
    }

    // Whip trail
    whipTrail(x, y) {
        this.particles.push(new Particle(
            x + (Math.random() - 0.5) * 6,
            y + (Math.random() - 0.5) * 6,
            (Math.random() - 0.5) * 0.5,
            (Math.random() - 0.5) * 0.5,
            'rgba(200,160,80,0.5)',
            2,
            100,
            false
        ));
    }

    // Key collect sparkle
    keyCollect(x, y) {
        for (let i = 0; i < 20; i++) {
            const angle = (i / 20) * Math.PI * 2;
            const speed = 1.5 + Math.random() * 2;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                i % 3 === 0 ? COLORS.gold : i % 3 === 1 ? COLORS.goldShine : '#fff',
                2 + Math.random() * 3,
                500 + Math.random() * 300
            ));
        }
        this.flash(COLORS.gold, 0.2);
    }

    // Door open effect
    doorOpen(x, y) {
        for (let i = 0; i < 25; i++) {
            const angle = (i / 25) * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 1,
                COLORS.gold,
                3 + Math.random() * 3,
                600 + Math.random() * 400
            ));
        }
    }

    // Level complete effect
    levelComplete(x, y) {
        for (let i = 0; i < 40; i++) {
            const angle = (i / 40) * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            const colors = ['#ffd700', '#ff8800', '#ffcc00', '#fff'];
            this.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 2,
                colors[i % colors.length],
                3 + Math.random() * 4,
                800 + Math.random() * 400
            ));
        }
        this.flash(COLORS.gold, 0.4);
    }

    shake(intensity, duration) {
        this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
        this.shakeDuration = Math.max(this.shakeDuration, duration);
    }

    flash(color, alpha) {
        this.flashColor = color;
        this.flashAlpha = Math.max(this.flashAlpha, alpha);
    }

    renderFlash(ctx, w, h) {
        if (this.flashAlpha > 0) {
            ctx.globalAlpha = Math.min(1, this.flashAlpha);
            ctx.fillStyle = this.flashColor;
            ctx.fillRect(0, 0, w, h);
            ctx.globalAlpha = 1;
        }
    }

    renderParticles(ctx) {
        for (const p of this.particles) {
            p.render(ctx);
        }
    }
}

// ui.js - UI overlays and HUD

class UI {
    constructor(canvas) {
        this.canvas = canvas;
        this.overlay = 'start'; // 'start', 'gameover', 'shop', 'none'
        this.selectedShopItem = 0;
        this.transitionAlpha = 0;
        this.transitionDir = 0; // 1 = fading in, -1 = fading out
        this.transitionCallback = null;
        this.shopItems = [];
        this.shopPlayer = null;
        this.shopMessage = '';
        this.shopMessageTimer = 0;
        this.deathStats = null;
        this.levelStartTimer = 0;
        this.levelStartText = '';
        this.compassAngle = 0;
        this.tutorialText = '';
        this.tutorialTimer = 0;
    }

    showStart() {
        this.overlay = 'start';
    }

    showGameOver(stats) {
        this.overlay = 'gameover';
        this.deathStats = stats;
    }

    showShop(items, player) {
        this.overlay = 'shop';
        this.shopItems = items;
        this.shopPlayer = player;
        this.selectedShopItem = 0;
    }

    hideShop() {
        this.overlay = 'none';
    }

    hide() {
        this.overlay = 'none';
    }

    showLevelStart(text) {
        this.levelStartText = text;
        this.levelStartTimer = 2000;
    }

    showTutorial(text) {
        this.tutorialText = text;
        this.tutorialTimer = 3000;
    }

    update(dt) {
        if (this.levelStartTimer > 0) this.levelStartTimer -= dt;
        if (this.tutorialTimer > 0) this.tutorialTimer -= dt;
        if (this.shopMessageTimer > 0) this.shopMessageTimer -= dt;
        if (this.transitionDir !== 0) {
            this.transitionAlpha += this.transitionDir * dt * 0.003;
            if (this.transitionAlpha >= 1 && this.transitionDir === 1) {
                this.transitionAlpha = 1;
                if (this.transitionCallback) {
                    this.transitionCallback();
                    this.transitionCallback = null;
                }
                this.transitionDir = -1;
            }
            if (this.transitionAlpha <= 0 && this.transitionDir === -1) {
                this.transitionAlpha = 0;
                this.transitionDir = 0;
            }
        }
    }

    transition(callback) {
        this.transitionDir = 1;
        this.transitionAlpha = 0;
        this.transitionCallback = callback;
    }

    renderHUD(ctx, player, level, timeBonus, viewW, viewH) {
        const pad = 8;
        const barH = 36;

        // HUD background
        ctx.fillStyle = COLORS.hudBg;
        ctx.fillRect(0, 0, viewW, barH);
        ctx.strokeStyle = COLORS.hudBorder;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, barH);
        ctx.lineTo(viewW, barH);
        ctx.stroke();

        ctx.font = 'bold 11px monospace';

        // HP
        const hpX = pad;
        for (let i = 0; i < player.maxHp; i++) {
            const hx = hpX + i * 16;
            ctx.fillStyle = i < player.hp ? '#cc3333' : '#331111';
            ctx.beginPath();
            ctx.arc(hx + 5, 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(hx + 11, 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(hx + 1, 14);
            ctx.lineTo(hx + 8, 22);
            ctx.lineTo(hx + 15, 14);
            ctx.fill();
        }

        // Gold/Score
        const scoreX = hpX + player.maxHp * 16 + 20;
        ctx.fillStyle = COLORS.gold;
        ctx.fillRect(scoreX, 10, 8, 8);
        ctx.fillStyle = COLORS.hudText;
        ctx.fillText(`${player.gold}`, scoreX + 12, 18);

        // Ropes
        const ropeX = scoreX + 80;
        ctx.fillStyle = COLORS.ropePickup;
        ctx.beginPath();
        ctx.arc(ropeX + 5, 14, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.hudText;
        ctx.fillText(`${player.ropes}`, ropeX + 12, 18);

        // Bombs
        const bombX = ropeX + 40;
        ctx.fillStyle = COLORS.bomb;
        ctx.beginPath();
        ctx.arc(bombX + 5, 14, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.hudText;
        ctx.fillText(`${player.bombs}`, bombX + 12, 18);

        // Key indicator
        if (player.hasKey) {
            const keyX = bombX + 40;
            ctx.fillStyle = COLORS.gold;
            ctx.beginPath();
            ctx.arc(keyX + 4, 12, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.bg;
            ctx.beginPath();
            ctx.arc(keyX + 4, 12, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.gold;
            ctx.fillRect(keyX + 6, 11, 6, 2);
            ctx.fillRect(keyX + 10, 13, 2, 2);
        }

        // Level depth
        ctx.fillStyle = COLORS.uiAccent;
        ctx.textAlign = 'right';
        ctx.fillText(`深度 ${level.depth}`, viewW - pad, 14);

        // Time bonus
        if (timeBonus > 0) {
            ctx.fillStyle = COLORS.hudText;
            ctx.fillText(`时间奖励: ${timeBonus}`, viewW - pad, 28);
        }
        ctx.textAlign = 'left';

        // Compass indicator (if player has compass)
        if (player.hasCompass) {
            this._renderCompass(ctx, player, level, viewW, viewH);
        }

        // Level start text
        if (this.levelStartTimer > 0) {
            const alpha = Math.min(1, this.levelStartTimer / 300);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = COLORS.uiAccent;
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(this.levelStartText, viewW / 2, viewH / 2);
            ctx.textAlign = 'left';
            ctx.globalAlpha = 1;
        }

        // Tutorial text
        if (this.tutorialTimer > 0) {
            const alpha = Math.min(1, this.tutorialTimer / 500);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(15,8,3,0.85)';
            const tw = ctx.measureText(this.tutorialText).width + 20;
            ctx.fillRect(viewW / 2 - tw / 2, viewH - 60, tw, 24);
            ctx.strokeStyle = COLORS.uiAccent;
            ctx.lineWidth = 1;
            ctx.strokeRect(viewW / 2 - tw / 2, viewH - 60, tw, 24);
            ctx.fillStyle = COLORS.hudText;
            ctx.font = '11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(this.tutorialText, viewW / 2, viewH - 44);
            ctx.textAlign = 'left';
            ctx.globalAlpha = 1;
        }
    }

    _renderCompass(ctx, player, level, viewW, viewH) {
        const doorX = level.exitDoor.x;
        const doorY = level.exitDoor.y;
        const dx = doorX - player.x;
        const dy = doorY - player.y;
        const angle = Math.atan2(dy, dx);
        const dist = Math.hypot(dx, dy);

        const cx = viewW - 40;
        const cy = viewH - 40;
        const r = 12;

        ctx.fillStyle = 'rgba(15,8,3,0.7)';
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COLORS.uiAccent;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.stroke();

        // Arrow
        ctx.fillStyle = level.doorOpen ? COLORS.uiSuccess : COLORS.gold;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(-4, -4);
        ctx.lineTo(-2, 0);
        ctx.lineTo(-4, 4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Distance
        ctx.fillStyle = COLORS.hudText;
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.floor(dist / TILE)}`, cx, cy + r + 12);
        ctx.textAlign = 'left';
    }

    renderStartOverlay(ctx, viewW, viewH) {
        // Background
        ctx.fillStyle = 'rgba(10,5,2,0.95)';
        ctx.fillRect(0, 0, viewW, viewH);

        // Title
        const titleY = viewH * 0.25;
        ctx.fillStyle = COLORS.gold;
        ctx.font = 'bold 42px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('矿洞探险', viewW / 2, titleY);

        // Subtitle
        ctx.fillStyle = COLORS.uiAccent;
        ctx.font = '16px monospace';
        ctx.fillText('CAVE EXPLORER', viewW / 2, titleY + 30);

        // Decorative line
        ctx.strokeStyle = COLORS.uiAccent;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(viewW / 2 - 120, titleY + 42);
        ctx.lineTo(viewW / 2 + 120, titleY + 42);
        ctx.stroke();

        // Character preview
        const charY = titleY + 70;
        ctx.fillStyle = COLORS.playerBandana;
        ctx.fillRect(viewW / 2 - 8, charY, 16, 4);
        ctx.fillStyle = COLORS.playerSkin;
        ctx.fillRect(viewW / 2 - 7, charY + 4, 14, 10);
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(viewW / 2 - 7, charY + 14, 14, 16);
        ctx.fillStyle = COLORS.playerEye;
        ctx.fillRect(viewW / 2 + 1, charY + 7, 2, 3);
        ctx.fillRect(viewW / 2 + 4, charY + 7, 2, 3);

        // Start button
        const btnY = titleY + 140;
        const btnW = 180;
        const btnH = 40;
        const pulse = 0.8 + Math.sin(Date.now() / 400) * 0.2;
        ctx.fillStyle = `rgba(180,140,60,${0.15 * pulse})`;
        ctx.fillRect(viewW / 2 - btnW / 2, btnY, btnW, btnH);
        ctx.strokeStyle = COLORS.uiAccent;
        ctx.lineWidth = 2;
        ctx.strokeRect(viewW / 2 - btnW / 2, btnY, btnW, btnH);
        ctx.fillStyle = COLORS.gold;
        ctx.font = 'bold 18px monospace';
        ctx.fillText('按 SPACE 开始', viewW / 2, btnY + 26);

        // Help box
        const helpY = btnY + 60;
        ctx.fillStyle = 'rgba(30,20,10,0.8)';
        ctx.fillRect(viewW / 2 - 200, helpY, 400, 160);
        ctx.strokeStyle = COLORS.hudBorder;
        ctx.lineWidth = 1;
        ctx.strokeRect(viewW / 2 - 200, helpY, 400, 160);

        ctx.fillStyle = COLORS.uiAccent;
        ctx.font = 'bold 13px monospace';
        ctx.fillText('操作说明', viewW / 2, helpY + 20);

        ctx.fillStyle = COLORS.hudText;
        ctx.font = '11px monospace';
        const helpLines = [
            'A/D 或 方向键 - 移动',
            'W/上键 - 攀爬梯子',
            'SPACE - 跳跃 (墙壁可蹬墙跳)',
            'SHIFT/V - 鞭子攻击',
            'Z - 放置炸弹',
            'C - 投掷绳索',
            '找到钥匙 → 到达出口 → 进入下一层',
            '收集黄金和宝石！死亡即永久失败！',
        ];
        for (let i = 0; i < helpLines.length; i++) {
            ctx.fillText(helpLines[i], viewW / 2, helpY + 38 + i * 15);
        }

        ctx.textAlign = 'left';
    }

    renderGameOver(ctx, viewW, viewH) {
        // Background
        ctx.fillStyle = 'rgba(10,5,2,0.92)';
        ctx.fillRect(0, 0, viewW, viewH);

        const centerY = viewH * 0.3;

        // Title
        ctx.fillStyle = COLORS.uiDanger;
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('探险结束', viewW / 2, centerY);

        // Stats
        if (this.deathStats) {
            ctx.fillStyle = COLORS.hudText;
            ctx.font = '16px monospace';
            const stats = [
                `到达深度: ${this.deathStats.depth}`,
                `收集黄金: ${this.deathStats.gold}`,
                `消灭敌人: ${this.deathStats.kills}`,
            ];
            for (let i = 0; i < stats.length; i++) {
                ctx.fillText(stats[i], viewW / 2, centerY + 50 + i * 28);
            }

            // High score
            ctx.fillStyle = COLORS.gold;
            ctx.font = 'bold 14px monospace';
            ctx.fillText(`最高纪录: ${this.deathStats.highScore}`, viewW / 2, centerY + 140);
        }

        // Restart button
        const btnY = centerY + 170;
        const pulse = 0.8 + Math.sin(Date.now() / 400) * 0.2;
        ctx.fillStyle = `rgba(180,140,60,${0.15 * pulse})`;
        ctx.fillRect(viewW / 2 - 120, btnY, 240, 36);
        ctx.strokeStyle = COLORS.uiAccent;
        ctx.lineWidth = 1;
        ctx.strokeRect(viewW / 2 - 120, btnY, 240, 36);
        ctx.fillStyle = COLORS.gold;
        ctx.font = 'bold 14px monospace';
        ctx.fillText('按 SPACE 重新开始', viewW / 2, btnY + 24);

        ctx.textAlign = 'left';
    }

    renderShopOverlay(ctx, viewW, viewH) {
        // Semi-transparent background
        ctx.fillStyle = 'rgba(10,5,2,0.85)';
        ctx.fillRect(0, 0, viewW, viewH);

        const panelW = 400;
        const panelH = 320;
        const panelX = (viewW - panelW) / 2;
        const panelY = (viewH - panelH) / 2;

        // Panel
        ctx.fillStyle = COLORS.uiBg;
        ctx.fillRect(panelX, panelY, panelW, panelH);
        ctx.strokeStyle = COLORS.uiBorder;
        ctx.lineWidth = 2;
        ctx.strokeRect(panelX, panelY, panelW, panelH);

        // Title
        ctx.fillStyle = COLORS.gold;
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('商店', viewW / 2, panelY + 30);

        // Gold display
        ctx.fillStyle = COLORS.hudText;
        ctx.font = '14px monospace';
        ctx.fillText(`持有黄金: ${this.shopPlayer?.gold || 0}`, viewW / 2, panelY + 52);

        // Shop items
        if (this.shopItems) {
            for (let i = 0; i < this.shopItems.length; i++) {
                const item = this.shopItems[i];
                const iy = panelY + 70 + i * 42;
                const selected = i === this.selectedShopItem;
                const purchased = item.purchased;

                // Item row
                ctx.fillStyle = selected ? 'rgba(180,140,60,0.15)' : 'rgba(40,25,10,0.5)';
                ctx.fillRect(panelX + 10, iy, panelW - 20, 36);
                if (selected) {
                    ctx.strokeStyle = COLORS.uiAccent;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(panelX + 10, iy, panelW - 20, 36);
                }

                // Item name
                ctx.fillStyle = purchased ? '#555' : COLORS.hudText;
                ctx.font = '13px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(item.name, panelX + 20, iy + 22);

                // Cost
                ctx.fillStyle = purchased ? '#555' : COLORS.gold;
                ctx.textAlign = 'right';
                ctx.fillText(purchased ? '已购' : `$${item.cost}`, panelX + panelW - 20, iy + 22);
                ctx.textAlign = 'left';
            }
        }

        // Shop message
        if (this.shopMessageTimer > 0) {
            ctx.fillStyle = COLORS.uiDanger;
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(this.shopMessage, viewW / 2, panelY + panelH - 30);
            ctx.textAlign = 'left';
        }

        // Instructions
        ctx.fillStyle = COLORS.hudText;
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('上下键选择  SPACE购买  ESC离开', viewW / 2, panelY + panelH - 12);
        ctx.textAlign = 'left';
    }

    renderTransition(ctx, viewW, viewH) {
        if (this.transitionAlpha > 0) {
            ctx.globalAlpha = Math.min(1, this.transitionAlpha);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, viewW, viewH);
            ctx.globalAlpha = 1;
        }
    }
}

// === main.js ===
// main.js - Game loop, camera, collision, initialization

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.viewW = this.canvas.width;
        this.viewH = this.canvas.height;

        // Disable image smoothing for crisp pixels
        this.ctx.imageSmoothingEnabled = false;

        this.state = 'start'; // 'start', 'playing', 'shop', 'gameover'
        this.level = null;
        this.player = null;
        this.enemyMgr = new EnemyManager();
        this.itemMgr = new ItemManager();
        this.effects = new Effects();
        this.ui = new UI(this.canvas);
        this.shop = null;

        // Camera
        this.camX = 0;
        this.camY = 0;
        this.camTargetX = 0;
        this.camTargetY = 0;

        // Game stats
        this.depth = 1;
        this.totalGold = 0;
        this.totalKills = 0;
        this.timeBonus = 0;
        this.levelTime = 0;
        this.maxLevelTime = 60000; // 60 seconds for time bonus

        // High score
        this.highScore = parseInt(localStorage.getItem('spelunky_highscore') || '0');

        // Darkness overlay canvas
        this.darkCanvas = document.createElement('canvas');
        this.darkCanvas.width = this.viewW;
        this.darkCanvas.height = this.viewH;
        this.darkCtx = this.darkCanvas.getContext('2d');

        // Previous grounded state for landing detection
        this.wasGrounded = false;

        // Keys for shop/start
        this._shopKeyHandler = null;
        this._startKeyHandler = null;

        // Animation frame
        this.lastTime = 0;
        this.running = false;

        this.ui.showStart();
        this._setupStartInput();
        this._loop = this._loop.bind(this);
    }

    _setupStartInput() {
        const handler = (e) => {
            if (e.code === 'Space' && this.state === 'start') {
                e.preventDefault();
                window.removeEventListener('keydown', handler);
                Sound.jump();
                this.ui.transition(() => {
                    this.startGame();
                });
            }
        };
        window.addEventListener('keydown', handler);
    }

    _setupGameOverInput() {
        const handler = (e) => {
            if (e.code === 'Space' && this.state === 'gameover') {
                e.preventDefault();
                window.removeEventListener('keydown', handler);
                Sound.jump();
                this.ui.transition(() => {
                    this.startGame();
                });
            }
        };
        window.addEventListener('keydown', handler);
    }

    _setupShopInput() {
        if (this._shopKeyHandler) {
            window.removeEventListener('keydown', this._shopKeyHandler);
        }
        this._shopKeyHandler = (e) => {
            if (this.state !== 'shop') return;
            e.preventDefault();

            if (e.code === 'ArrowUp' || e.code === 'KeyW') {
                this.ui.selectedShopItem = Math.max(0, this.ui.selectedShopItem - 1);
                Sound.tick();
            } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                this.ui.selectedShopItem = Math.min(this.shop.items.length - 1, this.ui.selectedShopItem + 1);
                Sound.tick();
            } else if (e.code === 'Space' || e.code === 'KeyX') {
                const item = this.shop.items[this.ui.selectedShopItem];
                if (item) {
                    const bought = this.shop.tryBuy(item, this.player);
                    if (!bought) {
                        this.ui.shopMessage = '金币不足！';
                        this.ui.shopMessageTimer = 1500;
                    }
                }
            } else if (e.code === 'Escape' || e.code === 'KeyZ') {
                this.closeShop();
            }
        };
        window.addEventListener('keydown', this._shopKeyHandler);
    }

    startGame() {
        this.state = 'playing';
        this.depth = 1;
        this.totalGold = 0;
        this.totalKills = 0;
        this.timeBonus = 0;
        this.ui.hide();
        this._generateLevel();
    }

    _generateLevel() {
        this.level = new Level(this.depth);
        this.player = new Player(this.level.playerStart.x, this.level.playerStart.y);
        this.enemyMgr.clear();
        this.enemyMgr.spawnFromLevel(this.level);
        this.itemMgr.clear();
        this.itemMgr.spawnFromLevel(this.level);
        this.shop = null;

        // Create shop if it's every 3rd level
        if (this.depth % 3 === 0 && this.level.rooms && this.level.rooms.length > 2) {
            const rng = new RNG(Date.now() + this.depth * 1337);
            this.shop = new Shop(this.level, rng);
            // Place shop in a mid-level room (not the first or last)
            const shopRoomIdx = Math.floor(this.level.rooms.length / 2);
            const shopRoom = this.level.rooms[shopRoomIdx];
            this.shop.placeInRoom(shopRoom, TILE);

            // Mark shop floor and walls in tiles
            for (let x = shopRoom.x; x < shopRoom.x + shopRoom.w; x++) {
                if (shopRoom.y + shopRoom.h - 1 < this.level.rows) {
                    this.level.tiles[shopRoom.y + shopRoom.h - 1][x] = T.SHOP_FLOOR;
                }
            }
        }

        this.effects = new Effects();
        this.levelTime = 0;
        this.timeBonus = 0;

        // Center camera immediately
        this.camX = this.player.x - this.viewW / 2;
        this.camY = this.player.y - this.viewH / 2;
        this._clampCamera();

        this.ui.showLevelStart(`深度 ${this.depth}`);

        if (this.depth === 1) {
            this.ui.showTutorial('方向键移动 | SPACE跳跃 | SHIFT攻击 | Z炸弹 | C绳索');
        }
    }

    _loop(time) {
        if (!this.running) return;

        const dt = Math.min(time - this.lastTime, 50); // Cap at 50ms
        this.lastTime = time;

        this.update(dt);
        this.render();

        requestAnimationFrame(this._loop);
    }

    start() {
        this.running = true;
        this.lastTime = performance.now();
        requestAnimationFrame(this._loop);
    }

    update(dt) {
        this.ui.update(dt);

        if (this.state !== 'playing') return;

        this.levelTime += dt;

        // Update player
        const prevHp = this.player.hp;
        const prevGold = this.player.gold;
        const prevHasKey = this.player.hasKey;
        const prevRopes = this.player.ropes;
        const prevBombs = this.player.bombs;
        const wantAction = this.player.input.actionPressed;

        this.player.update(dt, this.level, Sound);

        // Check bomb explosions for effects
        for (const bomb of this.player.activeBombs) {
            if (bomb.exploded && bomb.explosionX !== undefined) {
                this.effects.explosion(bomb.explosionX, bomb.explosionY, 1.5);
                // Check if explosion hits enemies
                for (const enemy of this.enemyMgr.enemies) {
                    const dist = Math.hypot(enemy.x - bomb.explosionX, enemy.y - bomb.explosionY);
                    if (dist < BOMB_RADIUS * TILE) {
                        enemy.takeDamage(99);
                        this.totalKills++;
                        this.effects.enemyDeath(enemy.x, enemy.y, COLORS[enemy.type] || '#888');
                        this.player.gold += enemy.score;
                        this.itemMgr.addFloatingText(enemy.x, enemy.y - 10, `+${enemy.score}`);
                    }
                }
                bomb.explosionX = undefined; // Prevent re-triggering
            }
        }

        // Landing dust
        if (this.player.grounded && !this.wasGrounded) {
            this.effects.landingDust(this.player.x, this.player.y + this.player.h);
        }
        this.wasGrounded = this.player.grounded;

        // Walk dust
        if (this.player.grounded && Math.abs(this.player.vx) > 0.5) {
            this.effects.walkDust(
                this.player.x - this.player.facing * 5,
                this.player.y + this.player.h,
                this.player.facing
            );
        }

        // Player hurt effect
        if (this.player.hp < prevHp && !this.player.dead) {
            this.effects.playerHurt(this.player.x, this.player.y + this.player.h / 2);
        }

        // Player death
        if (this.player.dead) {
            this.effects.explosion(this.player.x, this.player.y + this.player.h / 2, 2);
            this._gameOver();
            return;
        }

        // Update enemies
        this.enemyMgr.update(dt, this.level, this.player.x, this.player.y);

        // Enemy-player collision
        for (const enemy of this.enemyMgr.enemies) {
            if (enemy.dead) continue;
            const ehb = enemy.getHitbox();
            const phb = this.player.getHitbox();
            if (this._boxOverlap(ehb, phb)) {
                // Check if player is stomping (falling on top)
                if (this.player.vy > 0 && this.player.y + this.player.h < enemy.y + enemy.h * 0.5) {
                    enemy.takeDamage(1);
                    this.player.vy = -6; // Bounce
                    this.totalKills++;
                    this.effects.enemyDeath(enemy.x, enemy.y + enemy.h / 2, COLORS[enemy.type] || '#888');
                    this.player.gold += enemy.score;
                    this.itemMgr.addFloatingText(enemy.x, enemy.y - 10, `+${enemy.score}`);
                } else {
                    this.player.takeDamage(enemy.damage, this.level);
                }
            }

            // Whip hit
            const whipBox = this.player.getWhipHitbox();
            if (whipBox && !enemy.dead) {
                if (this._boxOverlap(whipBox, ehb)) {
                    enemy.takeDamage(1);
                    this.totalKills++;
                    this.effects.enemyDeath(enemy.x, enemy.y + enemy.h / 2, COLORS[enemy.type] || '#888');
                    this.player.gold += enemy.score;
                    this.itemMgr.addFloatingText(enemy.x, enemy.y - 10, `+${enemy.score}`);
                    Sound.enemyDie();
                }
            }
        }

        // Update items
        this.itemMgr.update(dt);

        // Item collection
        for (const item of this.itemMgr.items) {
            if (item.collected) continue;
            const ihb = item.getHitbox();
            const phb = this.player.getHitbox();
            if (this._boxOverlap(ihb, phb)) {
                item.collected = true;
                this._collectItem(item);
            }
        }

        // Arrow traps
        this._updateArrowTraps(dt);

        // Shop interaction (press X near shopkeeper)
        if (this.shop && this.shop.shopkeeper && wantAction) {
            const sx = this.shop.shopkeeper.x;
            const sy = this.shop.shopkeeper.y;
            const dist = Math.hypot(this.player.x - sx, this.player.y - sy);
            if (dist < TILE * 2) {
                this.openShop();
            }
        }

        // Door interaction
        const doorCol = Math.floor(this.level.exitDoor.x / TILE);
        const doorRow = Math.floor(this.level.exitDoor.y / TILE);
        const playerCol = Math.floor(this.player.x / TILE);
        const playerRow = Math.floor((this.player.y + this.player.h / 2) / TILE);

        if (Math.abs(playerCol - doorCol) <= 1 && Math.abs(playerRow - doorRow) <= 1) {
            if (this.player.hasKey && !this.level.doorOpen) {
                this.level.doorOpen = true;
                Sound.doorOpen();
                this.effects.doorOpen(this.level.exitDoor.x + TILE / 2, this.level.exitDoor.y + TILE / 2);
            }
            if (this.level.doorOpen) {
                // Enter door
                if (Math.abs(this.player.x - (doorCol * TILE + TILE / 2)) < TILE * 0.7 &&
                    Math.abs(this.player.y - (doorRow * TILE)) < TILE) {
                    this._nextLevel();
                }
            }
        }

        // Effects
        this.effects.update(dt);

        // Camera
        this._updateCamera(dt);
    }

    _collectItem(item) {
        const cfg = ITEM_VALUES[item.type];
        if (!cfg) return;

        switch (item.type) {
            case 'gold_nugget':
            case 'gold_bar':
                this.player.gold += cfg.value;
                Sound.collectGold();
                this.effects.goldCollect(item.x, item.y);
                this.itemMgr.addFloatingText(item.x, item.y - 10, `+${cfg.value}`);
                break;
            case 'gem_ruby':
            case 'gem_emerald':
            case 'gem_sapphire':
                this.player.gold += cfg.value;
                Sound.collectGem();
                const gemColor = item.type === 'gem_ruby' ? COLORS.gemRuby :
                    item.type === 'gem_emerald' ? COLORS.gemEmerald : COLORS.gemSapphire;
                this.effects.gemCollect(item.x, item.y, gemColor);
                this.itemMgr.addFloatingText(item.x, item.y - 10, `+${cfg.value}`);
                break;
            case 'key':
                this.player.hasKey = true;
                Sound.collectKey();
                this.effects.keyCollect(item.x, item.y);
                this.itemMgr.addFloatingText(item.x, item.y - 15, '钥匙!', COLORS.gold);
                break;
            case 'rope_pickup':
                this.player.ropes += cfg.ropeAmount;
                Sound.collectItem();
                this.itemMgr.addFloatingText(item.x, item.y - 10, `+${cfg.ropeAmount}绳索`);
                break;
            case 'bomb_pickup':
                this.player.bombs += cfg.bombAmount;
                Sound.collectItem();
                this.itemMgr.addFloatingText(item.x, item.y - 10, `+${cfg.bombAmount}炸弹`);
                break;
            case 'health':
                if (this.player.hp < this.player.maxHp) {
                    this.player.heal(cfg.healAmount);
                    Sound.collectItem();
                    this.itemMgr.addFloatingText(item.x, item.y - 10, '+1生命', COLORS.uiSuccess);
                } else {
                    item.collected = false; // Don't consume if full HP
                }
                break;
            case 'chest':
                this.player.gold += cfg.value;
                Sound.collectGold();
                this.effects.goldCollect(item.x, item.y);
                this.itemMgr.addFloatingText(item.x, item.y - 10, `+${cfg.value}`, COLORS.gold);
                break;
        }
    }

    _updateArrowTraps(dt) {
        for (const trap of this.level.traps) {
            if (trap.type !== 'arrow' || trap.fired) continue;

            const dist = Math.abs(this.player.x - trap.x);
            if (dist < 3 * TILE) {
                trap.fired = true;
                Sound.arrowShoot();
                // Create arrow projectile
                const arrow = {
                    x: trap.x + (trap.dir > 0 ? TILE : 0),
                    y: trap.y + TILE / 2,
                    vx: trap.dir * 6,
                    vy: 0,
                    life: 2000,
                    active: true
                };
                if (!this.level.arrows) this.level.arrows = [];
                this.level.arrows.push(arrow);
            }
        }

        // Update arrows
        if (this.level.arrows) {
            for (const arrow of this.level.arrows) {
                if (!arrow.active) continue;
                arrow.x += arrow.vx;
                arrow.life -= dt;
                if (arrow.life <= 0) {
                    arrow.active = false;
                    continue;
                }
                // Hit solid
                const col = Math.floor(arrow.x / TILE);
                const row = Math.floor(arrow.y / TILE);
                if (this.level.isSolid(col, row)) {
                    arrow.active = false;
                    continue;
                }
                // Hit player
                const phb = this.player.getHitbox();
                if (arrow.x > phb.x && arrow.x < phb.x + phb.w &&
                    arrow.y > phb.y && arrow.y < phb.y + phb.h) {
                    this.player.takeDamage(1, this.level);
                    arrow.active = false;
                }
            }
            this.level.arrows = this.level.arrows.filter(a => a.active);
        }
    }

    _nextLevel() {
        this.effects.levelComplete(this.player.x, this.player.y);
        Sound.levelComplete();

        // Calculate time bonus
        const timeLeft = Math.max(0, this.maxLevelTime - this.levelTime);
        this.timeBonus += Math.floor(timeLeft / 100);

        this.depth++;
        this.totalGold = this.player.gold;

        this.ui.transition(() => {
            this._generateLevel();
        });
    }

    _gameOver() {
        this.state = 'gameover';
        this.totalGold = this.player.gold;

        // Update high score
        if (this.totalGold > this.highScore) {
            this.highScore = this.totalGold;
            localStorage.setItem('spelunky_highscore', String(this.highScore));
        }

        this.ui.showGameOver({
            depth: this.depth,
            gold: this.totalGold,
            kills: this.totalKills,
            highScore: this.highScore
        });

        this._setupGameOverInput();
    }

    openShop() {
        if (this.state !== 'playing') return;
        this.state = 'shop';
        this.ui.showShop(this.shop.items, this.player);
        this._setupShopInput();
    }

    closeShop() {
        if (this.state !== 'shop') return;
        this.state = 'playing';
        this.ui.hideShop();
        if (this._shopKeyHandler) {
            window.removeEventListener('keydown', this._shopKeyHandler);
            this._shopKeyHandler = null;
        }
    }

    _updateCamera(dt) {
        const targetX = this.player.x - this.viewW / 2;
        const targetY = this.player.y - this.viewH / 2 + 30;

        // Smooth follow
        this.camX += (targetX - this.camX) * 0.08;
        this.camY += (targetY - this.camY) * 0.08;

        this._clampCamera();
    }

    _clampCamera() {
        const maxX = this.level.cols * TILE - this.viewW;
        const maxY = this.level.rows * TILE - this.viewH;
        this.camX = Math.max(0, Math.min(maxX, this.camX));
        this.camY = Math.max(0, Math.min(maxY, this.camY));
    }

    _boxOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x &&
            a.y < b.y + b.h && a.y + a.h > b.y;
    }

    render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.viewW, this.viewH);

        // Background gradient
        const bgGrad = ctx.createLinearGradient(0, 0, 0, this.viewH);
        bgGrad.addColorStop(0, COLORS.bgGrad1);
        bgGrad.addColorStop(1, COLORS.bgGrad2);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, this.viewW, this.viewH);

        if (this.state === 'playing' || this.state === 'shop') {
            ctx.save();

            // Apply screen shake
            const shake = this.effects.getShakeOffset();
            const camX = Math.round(this.camX + shake.x);
            const camY = Math.round(this.camY + shake.y);
            ctx.translate(-camX, -camY);

            // Render level
            this.level.render(ctx, camX, camY, this.viewW, this.viewH);

            // Render arrows
            if (this.level.arrows) {
                for (const arrow of this.level.arrows) {
                    if (!arrow.active) continue;
                    ctx.fillStyle = COLORS.arrow;
                    ctx.save();
                    ctx.translate(arrow.x, arrow.y);
                    ctx.rotate(arrow.vx > 0 ? 0 : Math.PI);
                    ctx.fillRect(-10, -1.5, 20, 3);
                    // Arrowhead
                    ctx.beginPath();
                    ctx.moveTo(10, -4);
                    ctx.lineTo(14, 0);
                    ctx.lineTo(10, 4);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // Render items
            this.itemMgr.render(ctx);

            // Render shop
            if (this.shop) {
                this.shop.render(ctx);
            }

            // Render enemies
            this.enemyMgr.render(ctx);

            // Render player
            this.player.render(ctx);

            // Render particles
            this.effects.renderParticles(ctx);

            ctx.restore();

            // Darkness overlay (torch radius effect)
            this._renderDarkness(ctx, camX, camY);

            // Flash
            this.effects.renderFlash(ctx, this.viewW, this.viewH);

            // HUD
            this.ui.renderHUD(ctx, this.player, this.level, this.timeBonus, this.viewW, this.viewH);

            // Shop overlay
            if (this.state === 'shop') {
                this.ui.renderShopOverlay(ctx, this.viewW, this.viewH);
            }
        }

        // Overlays
        if (this.state === 'start') {
            this.ui.renderStartOverlay(ctx, this.viewW, this.viewH);
        } else if (this.state === 'gameover') {
            this.ui.renderGameOver(ctx, this.viewW, this.viewH);
        }

        // Transition
        this.ui.renderTransition(ctx, this.viewW, this.viewH);
    }

    _renderDarkness(ctx, camX, camY) {
        const dc = this.darkCtx;
        dc.clearRect(0, 0, this.viewW, this.viewH);

        // Fill with darkness
        dc.fillStyle = 'rgba(10,5,0,0.65)';
        dc.fillRect(0, 0, this.viewW, this.viewH);

        // Cut out torch lights
        dc.globalCompositeOperation = 'destination-out';

        // Player torch
        const px = Math.round(this.player.x - camX);
        const py = Math.round(this.player.y + this.player.h / 2 - camY);
        const torchRadius = 130;
        const flicker = 0.9 + Math.sin(Date.now() / 100) * 0.1;

        const grad = dc.createRadialGradient(px, py, 0, px, py, torchRadius * flicker);
        grad.addColorStop(0, 'rgba(0,0,0,1)');
        grad.addColorStop(0.7, 'rgba(0,0,0,0.6)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        dc.fillStyle = grad;
        dc.fillRect(px - torchRadius, py - torchRadius, torchRadius * 2, torchRadius * 2);

        // Level torches
        for (const torch of this.level.torchPositions) {
            const tx = Math.round(torch.x - camX);
            const ty = Math.round(torch.y - camY - 10);
            const tRadius = 70 * flicker;

            if (tx < -tRadius || tx > this.viewW + tRadius) continue;
            if (ty < -tRadius || ty > this.viewH + tRadius) continue;

            const tGrad = dc.createRadialGradient(tx, ty, 0, tx, ty, tRadius);
            tGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
            tGrad.addColorStop(1, 'rgba(0,0,0,0)');
            dc.fillStyle = tGrad;
            dc.fillRect(tx - tRadius, ty - tRadius, tRadius * 2, tRadius * 2);
        }

        // Door glow (if open)
        if (this.level.doorOpen) {
            const dx = Math.round(this.level.exitDoor.x + TILE / 2 - camX);
            const dy = Math.round(this.level.exitDoor.y + TILE / 2 - camY);
            const dRadius = 80;
            const dGrad = dc.createRadialGradient(dx, dy, 0, dx, dy, dRadius);
            dGrad.addColorStop(0, 'rgba(0,0,0,0.9)');
            dGrad.addColorStop(1, 'rgba(0,0,0,0)');
            dc.fillStyle = dGrad;
            dc.fillRect(dx - dRadius, dy - dRadius, dRadius * 2, dRadius * 2);
        }

        dc.globalCompositeOperation = 'source-over';

        // Apply darkness overlay
        ctx.drawImage(this.darkCanvas, 0, 0);

        // Add warm torch tint
        const warmGrad = ctx.createRadialGradient(px, py, 0, px, py, torchRadius * 1.5);
        warmGrad.addColorStop(0, 'rgba(255,150,50,0.04)');
        warmGrad.addColorStop(1, 'rgba(255,150,50,0)');
        ctx.fillStyle = warmGrad;
        ctx.fillRect(px - torchRadius * 1.5, py - torchRadius * 1.5, torchRadius * 3, torchRadius * 3);
    }
}

// Initialize game on load
let game;
function initGame() {
    game = new Game();
    game.start();
}

// Export for window.startGame
window.startGame = initGame;

// Auto-init if DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGame);
} else {
    initGame();
}

                document.getElementById('loading').style.display = 'none';
    
</script>
