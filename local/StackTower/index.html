<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叠叠乐</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;color:#fff}
        canvas{border-radius:8px}
        .hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
        .hud-item{background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;font-size:14px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
        .hud-item span{color:#e040fb;font-weight:bold}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85)}
        .overlay.hidden{display:none}
        .overlay-title{font-size:48px;margin-bottom:15px;text-shadow:0 0 20px rgba(224,64,251,0.5)}
        .menu-btn{background:linear-gradient(135deg,#e040fb 0%,#ab47bc 100%);border:none;padding:14px 40px;font-size:18px;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.3s;margin:6px}
        .menu-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(224,64,251,0.5)}
        .stats{font-size:20px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6}
        .help-box{margin-top:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;max-width:350px;text-align:left;font-size:13px;color:#aaa;line-height:1.8;backdrop-filter:blur(5px)}
        .help-box h3{color:#e040fb;font-size:14px;margin-bottom:6px;text-align:center}
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">分数: <span id="score">0</span></div>
        <div class="hud-item">层数: <span id="layers">0</span></div>
        <div class="hud-item">最高: <span id="high">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startOverlay" class="overlay">
        <div class="overlay-title" style="color:#e040fb">叠叠乐</div>
        <button class="menu-btn" onclick="startGame()">开始游戏</button>
        <div class="help-box">
            <h3>操作说明</h3>
            <div>点击 / 空格：放下当前方块</div>
            <div>方块会左右自动移动</div>
            <div>R：重新开始</div>
            <h3 style="margin-top:8px">游戏规则</h3>
            <div>精确对齐叠放方块</div>
            <div>超出部分会被切掉</div>
            <div>方块越小越难对齐</div>
            <div>完美对齐获得连击奖励</div>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-title" style="color:#f44336;text-shadow:0 0 20px rgba(244,67,54,0.5)">倒塌了！</div>
        <div id="goStats" class="stats"></div>
        <button class="menu-btn" onclick="startGame()">再来一局</button>
    </div>

<script>
// === ./sound.js ===
// sound.js - Web Audio API sound effects
const Sound = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    play(type) {
        if (!this.ctx) return;
        const c = this.ctx, o = c.createOscillator(), g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        const t = c.currentTime;
        switch (type) {
            case 'drop':
                o.type = 'sine';
                o.frequency.setValueAtTime(400, t);
                o.frequency.exponentialRampToValueAtTime(200, t + 0.1);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                o.start(t);
                o.stop(t + 0.1);
                break;
            case 'perfect':
                o.type = 'sine';
                o.frequency.setValueAtTime(600, t);
                o.frequency.setValueAtTime(800, t + 0.05);
                o.frequency.setValueAtTime(1000, t + 0.1);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                o.start(t);
                o.stop(t + 0.2);
                break;
            case 'gameover':
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, t);
                o.frequency.exponentialRampToValueAtTime(50, t + 0.4);
                g.gain.setValueAtTime(0.12, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                o.start(t);
                o.stop(t + 0.4);
                break;
        }
    }
};

Sound;

// === ./config.js ===
// config.js - Game constants
const W = 520;
const H = 720;
const BASE_W = 160;
const BLOCK_H = 36;
const COLORS = [
    '#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5',
    '#2196f3', '#00bcd4', '#009688', '#4caf50', '#8bc34a',
    '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'
];

// === ./blocks.js ===
// blocks.js - Block logic: state, movement, alignment, cutting

const state = {
    blocks: [],
    current: null,
    falling: [],
    particles: [],
    score: 0,
    highScore: 0,
    perfectCombo: 0,
    gameActive: false,
    gameEnding: false  // true while waiting for falling animation to finish
};

// Load high score from localStorage
state.highScore = parseInt(localStorage.getItem('stack_high')) || 0;

function initBlocks() {
    state.blocks = [{ x: W / 2 - BASE_W / 2, w: BASE_W, y: H - 30, color: COLORS[0] }];
    state.current = { x: 0, w: BASE_W, dir: 1, speed: 2, color: COLORS[1 % COLORS.length], y: H - 60 };
    state.falling = [];
    state.particles = [];
    state.score = 0;
    state.perfectCombo = 0;
    state.gameActive = true;
    state.gameEnding = false;
}

function dropBlock() {
    if (!state.gameActive) return;
    const top = state.blocks[state.blocks.length - 1];
    const overlap = Math.min(state.current.x + state.current.w, top.x + top.w) - Math.max(state.current.x, top.x);

    if (overlap <= 0) {
        // Missed completely - start game over animation
        Sound.play('gameover');
        state.falling.push({ ...state.current, vy: -2, vr: 0 });
        state.gameActive = false;
        state.gameEnding = true;  // wait for falling animation to finish
        state.highScore = Math.max(state.highScore, state.score);
        localStorage.setItem('stack_high', state.highScore);
        return;
    }

    const newX = Math.max(state.current.x, top.x);
    const isPerfect = Math.abs(state.current.x - top.x) < 5 && Math.abs(state.current.w - top.w) < 5;

    if (isPerfect) {
        state.perfectCombo++;
        state.score += 10 * state.perfectCombo;
        Sound.play('perfect');
        spawnPerfectParticles(newX + overlap / 2, state.current.y);
    } else {
        state.perfectCombo = 0;
        state.score += 10;
        // Cut off left overhang
        if (state.current.x < top.x) {
            const cutW = top.x - state.current.x;
            state.falling.push({ x: state.current.x, w: cutW, y: state.current.y, color: state.current.color, vy: 0, vr: 0.05 });
        }
        // Cut off right overhang
        if (state.current.x + state.current.w > top.x + top.w) {
            const cutX = top.x + top.w;
            const cutW = state.current.x + state.current.w - cutX;
            state.falling.push({ x: cutX, w: cutW, y: state.current.y, color: state.current.color, vy: 0, vr: -0.05 });
        }
    }

    state.blocks.push({ x: newX, w: overlap, y: state.current.y, color: state.current.color });
    Sound.play('drop');

    // Scroll up if block is too high
    const blockY = state.current.y;
    if (blockY < 300) {
        const scroll = 300 - blockY;
        for (const b of state.blocks) b.y += scroll;
        for (const f of state.falling) f.y += scroll;
        for (const p of state.particles) p.y += scroll;
    }

    // Prepare next block
    const nextIdx = state.blocks.length;
    const nextW = Math.max(20, overlap - (isPerfect ? 0 : Math.random() * 5));
    const speed = Math.min(5, 2 + nextIdx * 0.1);
    state.current = {
        x: nextIdx % 2 === 0 ? -nextW : W,
        w: nextW,
        dir: nextIdx % 2 === 0 ? 1 : -1,
        speed,
        y: blockY - 30,
        color: COLORS[nextIdx % COLORS.length]
    };
}

function spawnPerfectParticles(x, y) {
    const particleColors = ['#ffd700', '#ff0', '#e040fb', '#00ff96'];
    for (let i = 0; i < 20; i++) {
        state.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 3,
            life: 30 + Math.random() * 20,
            color: particleColors[Math.floor(Math.random() * 4)]
        });
    }
}

/**
 * Update all animations. Returns true when game-over falling animation is complete
 * and the overlay should be shown.
 */
function updateBlocks() {
    // Move current block only when game is active
    if (state.gameActive) {
        state.current.x += state.current.speed * state.current.dir;
        if (state.current.x + state.current.w > W) state.current.dir = -1;
        if (state.current.x < 0) state.current.dir = 1;
    }

    // Always update falling pieces (even during game over animation)
    for (let i = state.falling.length - 1; i >= 0; i--) {
        state.falling[i].y += state.falling[i].vy;
        state.falling[i].vy += 0.3;
        state.falling[i].x += state.falling[i].vr;
        if (state.falling[i].y > H + 50) state.falling.splice(i, 1);
    }

    // Always update particles
    state.particles = state.particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life--;
        return p.life > 0;
    });

    // Check if game over animation is done (all falling pieces have left the screen)
    if (state.gameEnding && state.falling.length === 0) {
        state.gameEnding = false;
        return true;
    }
    return false;
}

// === ./ui.js ===
// ui.js - Canvas rendering and HUD updates

let ctx = null;

function initCanvas(canvas) {
    canvas.width = W;
    canvas.height = H;
    ctx = canvas.getContext('2d');
}

function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    for (let y = 0; y < H; y += 30) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    // Stacked blocks
    state.blocks.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, BLOCK_H);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(b.x, b.y, b.w, BLOCK_H / 2);
    });

    // Current moving block (only when game is active)
    if (state.gameActive) {
        ctx.fillStyle = state.current.color;
        ctx.fillRect(state.current.x, state.current.y, state.current.w, BLOCK_H);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(state.current.x, state.current.y, state.current.w, BLOCK_H / 2);

        // Perfect combo glow indicator
        if (state.perfectCombo > 0) {
            ctx.fillStyle = 'rgba(255,215,0,0.2)';
            ctx.fillRect(state.current.x, state.current.y, state.current.w, BLOCK_H);
        }
    }

    // Falling pieces
    ctx.globalAlpha = 0.6;
    state.falling.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.fillRect(f.x, f.y, f.w, BLOCK_H);
    });
    ctx.globalAlpha = 1;

    // Particles
    state.particles.forEach(p => {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;

    // Perfect combo text
    if (state.perfectCombo > 1 && state.gameActive) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Perfect x' + state.perfectCombo, W / 2, state.current.y - 15);
    }
}

function updateHUD() {
    document.getElementById('score').textContent = state.score;
    document.getElementById('layers').textContent = state.blocks.length - 1;
    document.getElementById('high').textContent = Math.max(state.highScore, state.score);
}

// === main.js ===
// main.js - Game initialization, event listeners, game loop

const canvas = document.getElementById('gameCanvas');
initCanvas(canvas);

function startGame() {
    Sound.init();
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    initBlocks();
    updateHUD();
}

function showGameOver() {
    document.getElementById('goStats').innerHTML =
        `层数: ${state.blocks.length}<br>分数: ${state.score}<br>最高: ${state.highScore}`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function gameLoop() {
    requestAnimationFrame(gameLoop);
    const animDone = updateBlocks();
    if (animDone) showGameOver();
    draw();
}

// Expose startGame for onclick handlers in HTML
window.startGame = startGame;

// Keyboard controls
window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowDown') {
        e.preventDefault();
        dropBlock();
    }
    if (e.code === 'KeyR') {
        e.preventDefault();
        startGame();
    }
});

// Touch / click controls
canvas.addEventListener('click', dropBlock);
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    dropBlock();
});

// Initial HUD and start game loop
updateHUD();
gameLoop();


</script>

</body>
</html>
