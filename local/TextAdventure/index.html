<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诅咒古堡 - 文字冒险RPG</title>
  <style>
    /* ===== 基础重置 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'GameFont';
      src: local('Microsoft YaHei'), local('PingFang SC'), local('Noto Sans SC');
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a28;
      --bg-hover: #252538;
      --text-primary: #e0d8c8;
      --text-secondary: #8a8498;
      --text-dim: #5a5468;
      --accent: #c9a84c;
      --accent-dim: #8a7030;
      --danger: #c44040;
      --danger-dim: #6a2020;
      --success: #4caf50;
      --border: #2a2a3a;
      --glow: rgba(201, 168, 76, 0.15);
      --shadow: rgba(0, 0, 0, 0.6);
    }

    body {
      font-family: 'GameFont', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.8;
    }

    /* ===== 背景纹理 ===== */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(100, 60, 20, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 40, 100, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(80, 40, 40, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 主布局 ===== */
    .game-container {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ===== 顶部栏 ===== */
    .top-bar {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .game-title {
      font-size: 1.3em;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 20px var(--glow);
    }

    .top-controls {
      display: flex;
      gap: 8px;
    }

    .top-controls button {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .top-controls button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent-dim);
    }

    #skip-btn {
      display: none;
      background: rgba(201, 168, 76, 0.15);
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    /* ===== 章节标题 ===== */
    .chapter-header {
      grid-column: 1 / -1;
      text-align: center;
      padding: 10px;
      background: linear-gradient(90deg, transparent, var(--bg-card), transparent);
      border-bottom: 1px solid var(--border);
    }

    #chapter-title {
      font-size: 1.1em;
      color: var(--accent);
      letter-spacing: 5px;
      opacity: 0.9;
    }

    #chapter-title.fade-in {
      animation: fadeSlideIn 1s ease;
    }

    /* ===== 主内容区 ===== */
    .main-content {
      grid-column: 1;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      overflow-y: auto;
    }

    /* ===== 文本区域 ===== */
    #text-area {
      flex: 1;
      padding: 20px;
      min-height: 200px;
      line-height: 2;
      font-size: 1.05em;
      color: var(--text-primary);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #text-area.active {
      opacity: 1;
    }

    #text-area p {
      margin-bottom: 0.8em;
      text-indent: 2em;
    }

    #text-area p:first-child {
      text-indent: 0;
    }

    /* ===== 选择区域 ===== */
    #choices-area {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1em;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s;
      animation: choiceFadeIn 0.4s ease backwards;
      font-family: inherit;
      line-height: 1.6;
    }

    .choice-btn:hover:not(.disabled) {
      background: var(--bg-hover);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--glow);
      transform: translateX(6px);
    }

    .choice-btn.selected {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .choice-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .choice-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 50%;
      font-size: 0.85em;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      grid-column: 2;
      grid-row: 3;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 14px;
      border: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.85em;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* HP 条 */
    .hp-bar-container {
      background: var(--bg-primary);
      border-radius: 10px;
      height: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #66bb6a);
      transition: width 0.5s ease;
      border-radius: 10px;
    }

    .hp-fill.low {
      background: linear-gradient(90deg, #ff9800, #ffb74d);
    }

    .hp-fill.critical {
      background: linear-gradient(90deg, #c44040, #e55555);
      animation: hpPulse 1s ease infinite;
    }

    #hp-text {
      text-align: center;
      font-size: 0.8em;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* 属性 */
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 0.9em;
    }

    .stat-icon {
      font-size: 1.1em;
      width: 24px;
      text-align: center;
    }

    .stat-name {
      color: var(--text-secondary);
      flex: 1;
    }

    .stat-value {
      color: var(--accent);
      font-weight: bold;
      min-width: 20px;
      text-align: right;
    }

    /* 物品栏 */
    #inventory-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .inventory-item {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8em;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .inventory-item:hover {
      border-color: var(--accent-dim);
      color: var(--text-primary);
    }

    .empty-inventory {
      color: var(--text-dim);
      font-size: 0.85em;
      text-align: center;
      padding: 10px;
    }

    /* ===== 战斗面板 ===== */
    #combat-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
      animation: fadeSlideIn 0.5s ease;
    }

    #combat-panel.active {
      display: flex;
    }

    #enemy-info {
      text-align: center;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 10px;
      border: 1px solid var(--danger-dim);
    }

    .enemy-name {
      font-size: 1.3em;
      color: var(--danger);
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .enemy-hp-bar {
      background: var(--bg-primary);
      border-radius: 10px;
      height: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .enemy-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), #e55555);
      transition: width 0.4s ease;
      border-radius: 10px;
    }

    .enemy-hp-text {
      font-size: 0.85em;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    #combat-log {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 0.95em;
      line-height: 1.8;
    }

    .combat-log-line {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .combat-log-line.fade-in {
      animation: fadeSlideIn 0.3s ease;
    }

    #combat-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .combat-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95em;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .combat-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--glow);
    }

    .combat-btn.back-btn {
      background: var(--bg-primary);
      color: var(--text-secondary);
    }

    .item-select-title {
      width: 100%;
      color: var(--accent);
      font-size: 0.9em;
      margin-bottom: 6px;
    }

    /* ===== 主菜单 ===== */
    #menu-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    #menu-overlay.active {
      display: flex;
    }

    .menu-title {
      font-size: 2.8em;
      color: var(--accent);
      text-shadow: 0 0 40px var(--glow), 0 0 80px rgba(201, 168, 76, 0.1);
      letter-spacing: 8px;
      animation: titleGlow 3s ease infinite;
    }

    .menu-subtitle {
      color: var(--text-dim);
      font-size: 1em;
      letter-spacing: 4px;
      margin-top: -15px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 260px;
    }

    .menu-btn {
      padding: 16px 30px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 3px;
      font-family: inherit;
    }

    .menu-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow);
      transform: translateY(-2px);
    }

    /* ===== 结局画面 ===== */
    #ending-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 15, 0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    #ending-overlay.active {
      display: flex;
    }

    #ending-title {
      font-size: 2.2em;
      color: var(--accent);
      letter-spacing: 5px;
      text-shadow: 0 0 30px var(--glow);
    }

    #ending-type {
      font-size: 1em;
      color: var(--text-secondary);
      letter-spacing: 3px;
    }

    #ending-desc {
      max-width: 600px;
      text-align: center;
      line-height: 2;
      font-size: 1.05em;
      color: var(--text-primary);
    }

    .ending-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-card);
      border-radius: 8px;
      margin: 6px 0;
      border: 1px solid var(--border);
      text-align: left;
    }

    .ending-entry.locked {
      opacity: 0.5;
    }

    .ending-icon {
      font-size: 1.5em;
      min-width: 30px;
    }

    .ending-name {
      font-weight: bold;
      color: var(--accent);
    }

    .ending-desc-mini {
      font-size: 0.8em;
      color: var(--text-secondary);
      display: block;
      margin-top: 4px;
    }

    #ending-close {
      padding: 14px 40px;
      background: var(--bg-card);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 2px;
      font-family: inherit;
      margin-top: 20px;
    }

    #ending-close:hover {
      background: var(--accent-dim);
      box-shadow: 0 0 20px var(--glow);
    }

    /* ===== 消息提示 ===== */
    #message-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.95em;
      z-index: 200;
      transition: transform 0.4s ease;
      pointer-events: none;
      box-shadow: 0 4px 20px var(--shadow);
    }

    #message-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ===== 动画 ===== */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes choiceFadeIn {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 40px var(--glow), 0 0 80px rgba(201, 168, 76, 0.1); }
      50% { text-shadow: 0 0 60px var(--glow), 0 0 120px rgba(201, 168, 76, 0.2); }
    }

    @keyframes hpPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .game-container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        grid-column: 1;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 200px;
      }
      .main-content {
        padding: 16px;
      }
      .menu-title {
        font-size: 2em;
      }
    }
  </style>
</head>

  <!-- 主菜单 -->

  <!-- 游戏主界面 -->
  <div class="game-container">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <div class="game-title">诅咒古堡</div>
      <div class="top-controls">
        <button id="skip-btn" title="跳过打字动画 (Space)">跳过 ▶▶</button>

          <div class="empty-inventory">背包为空</div>
        </div>
      </div>
    </div>
  </div>

  <script>
// === ./config.js ===
// config.js - 常量配置
const CONFIG = {
  // 打字机效果速度（毫秒/字符）
  TYPE_SPEED: 50,
  TYPE_SPEED_FAST: 20,

  // 属性相关
  MAX_STAT: 10,
  MIN_STAT: 1,
  INITIAL_STAT_POINTS: 5, // 初始可分配点数

    strength: 3,
    dexterity: 3,
    wisdom: 3,
    charisma: 3,
  },

  // 战斗相关
  COMBAT: {
    BASE_HP: 100,
    BASE_ATTACK: 10,
    BASE_DEFENSE: 5,
    ESCAPE_CHANCE: 0.4,
    CRITICAL_CHANCE: 0.15,
    CRITICAL_MULTIPLIER: 2.0,
    DEFENSE_MULTIPLIER: 0.5, // 防御时受到伤害的倍率
  },

  // 存档
  SAVE_KEY: 'text_adventure_save',
  AUTO_SAVE_INTERVAL: 0, // 每次场景切换时自动保存

  // 章节名称
  CHAPTER_NAMES: {
    prologue: '序章：诅咒之门',
    chapter1: '第一章：幽暗大厅',
    chapter2: '第二章：迷失花园',
    chapter3: '第三章：深渊地牢',
    chapter4: '第四章：暗影高塔',
    chapter5: '终章：命运抉择',
  },

  // 属性名称映射
  STAT_NAMES: {
    strength: '力量',
    dexterity: '敏捷',
    wisdom: '智慧',
    charisma: '魅力',

    strength: '⚔️',
    dexterity: '🏃',
    wisdom: '📖',
    charisma: '💬',
  },
};

// === ./sound.js ===
// sound.js - Web Audio API 音效系统
class SoundManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.volume = 0.3;
    this._init();
  }

  _init() {
    // 在用户交互后初始化 AudioContext
    const initCtx = () => {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      document.removeEventListener('click', initCtx);
      document.removeEventListener('keydown', initCtx);
    };
    document.addEventListener('click', initCtx);
    document.addEventListener('keydown', initCtx);
  }

  _createOscillator(type, frequency, duration, volume = this.volume) {
    if (!this.enabled || !this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  }

  _createNoise(duration, volume = this.volume * 0.5) {
    if (!this.enabled || !this.ctx) return;
    const bufferSize = this.ctx.sampleRate * duration;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const source = this.ctx.createBufferSource();
    const gain = this.ctx.createGain();
    source.buffer = buffer;
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    source.connect(gain);
    gain.connect(this.ctx.destination);
    source.start();
  }

  // 点击音效 - 清脆短促
  click() {
    this._createOscillator('sine', 800, 0.08, this.volume * 0.4);
    setTimeout(() => this._createOscillator('sine', 1200, 0.05, this.volume * 0.3), 30);
  }

  // 战斗音效 - 金属碰撞感
  combat() {
    this._createNoise(0.1, this.volume * 0.4);
    this._createOscillator('sawtooth', 200, 0.15, this.volume * 0.3);
    setTimeout(() => {
      this._createOscillator('square', 150, 0.1, this.volume * 0.2);
      this._createNoise(0.08, this.volume * 0.3);
    }, 80);
  }

  // 获得物品音效 - 上升音阶
  item() {
    const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
      setTimeout(() => this._createOscillator('sine', freq, 0.2, this.volume * 0.3), i * 80);
    });
  }

  // 死亡音效 - 下降阴沉
  death() {
    const notes = [400, 350, 300, 200, 150];
    notes.forEach((freq, i) => {
      setTimeout(() => {
        this._createOscillator('sawtooth', freq, 0.4, this.volume * 0.25);
      }, i * 200);
    });
    setTimeout(() => this._createNoise(0.8, this.volume * 0.2), 600);
  }

  // 胜利音效 - 欢快上升
  victory() {
    const melody = [523, 659, 784, 1047, 784, 1047, 1319];
    melody.forEach((freq, i) => {
      setTimeout(() => this._createOscillator('sine', freq, 0.25, this.volume * 0.35), i * 120);
    });
  }

  // 恐怖氛围音效
  horror() {
    this._createOscillator('sine', 80, 1.5, this.volume * 0.15);
    setTimeout(() => this._createOscillator('sine', 85, 1.0, this.volume * 0.1), 500);
    this._createNoise(0.3, this.volume * 0.08);
  }

  // 打字音效 - 轻微键盘声
  type() {
    if (!this.enabled || !this.ctx) return;
    const freq = 400 + Math.random() * 200;
    this._createOscillator('sine', freq, 0.02, this.volume * 0.08);
  }

  // 切换音效
  toggle() {
    this.enabled = !this.enabled;
    return this.enabled;
  }
}

// character.js - 角色系统（属性、物品、状态）

class Character {
  constructor() {
    this.stats = { ...CONFIG.BASE_STATS };
    this.inventory = [];
    this.hp = CONFIG.COMBAT.BASE_HP;
    this.maxHp = CONFIG.COMBAT.BASE_HP;
    this.flags = {}; // 剧情标记
    this.currentScene = 'start';
    this.chapter = 'prologue';
    this.history = []; // 已访问场景
    this.combatState = null;
  }

  // 属性相关
  getStat(statName) {
    return this.stats[statName] || 0;
  }

  modifyStat(statName, amount) {
    if (this.stats[statName] !== undefined) {
      this.stats[statName] = Math.max(0, Math.min(20, this.stats[statName] + amount));
    }
  }

  // HP 相关
  modifyHp(amount) {
    this.hp = Math.max(0, Math.min(this.maxHp, this.hp + amount));
    return this.hp;
  }

  isAlive() {
    return this.hp > 0;
  }

  healFull() {
    this.hp = this.maxHp;
  }

  // 物品系统
  addItem(item) {
    if (!this.inventory.includes(item)) {
      this.inventory.push(item);
      return true;
    }
    return false;
  }

  removeItem(item) {
    const idx = this.inventory.indexOf(item);
    if (idx >= 0) {
      this.inventory.splice(idx, 1);
      return true;
    }
    return false;
  }

  hasItem(item) {
    return this.inventory.includes(item);
  }

  // 剧情标记
  setFlag(flag) {
    this.flags[flag] = true;
  }

  hasFlag(flag) {
    return !!this.flags[flag];
  }

  // 场景记录
  visitScene(sceneId) {
    if (!this.history.includes(sceneId)) {
      this.history.push(sceneId);
    }
    this.currentScene = sceneId;
  }

  hasVisited(sceneId) {
    return this.history.includes(sceneId);
  }

  // 序列化
  serialize() {
    return {
      stats: { ...this.stats },
      inventory: [...this.inventory],
      hp: this.hp,
      maxHp: this.maxHp,
      flags: { ...this.flags },
      currentScene: this.currentScene,
      chapter: this.chapter,
      history: [...this.history],
    };
  }

  // 反序列化
  static deserialize(data) {
    const c = new Character();
    if (!data) return c;
    c.stats = data.stats || { ...CONFIG.BASE_STATS };
    c.inventory = data.inventory || [];
    c.hp = data.hp ?? CONFIG.COMBAT.BASE_HP;
    c.maxHp = data.maxHp ?? CONFIG.COMBAT.BASE_HP;
    c.flags = data.flags || {};
    c.currentScene = data.currentScene || 'start';
    c.chapter = data.chapter || 'prologue';
    c.history = data.history || [];
    return c;
  }
}

// combat.js - 遭遇战系统（简单回合制）

class CombatSystem {
  constructor(character, onCombatEnd) {
    this.character = character;
    this.onCombatEnd = onCombatEnd;
    this.enemy = null;
    this.log = [];
    this.playerTurn = true;
    this.finished = false;
    this.result = null; // 'win' | 'lose' | 'escape'
  }

  start(enemyData) {
    this.enemy = {
      name: enemyData.name,
      hp: enemyData.hp,
      maxHp: enemyData.hp,
      attack: enemyData.attack,
      defense: enemyData.defense,
      description: enemyData.description,
      rewards: enemyData.rewards || {},
    };
    this.log = [`⚔️ 遭遇了 ${this.enemy.name}！`, this.enemy.description];
    this.playerTurn = true;
    this.finished = false;
    this.result = null;
    return this.log.slice();
  }

  // 玩家攻击力
  getPlayerAttack() {
    const base = CONFIG.COMBAT.BASE_ATTACK + this.character.getStat('strength') * 2;
    const variance = Math.floor(base * 0.3);
    let damage = base + Math.floor(Math.random() * variance * 2) - variance;

    // 暴击
    if (Math.random() < CONFIG.COMBAT.CRITICAL_CHANCE + this.character.getStat('dexterity') * 0.01) {
      damage = Math.floor(damage * CONFIG.COMBAT.CRITICAL_MULTIPLIER);
      return { damage, critical: true };
    }
    return { damage, critical: false };
  }

  // 玩家防御力
  getPlayerDefense() {
    return CONFIG.COMBAT.BASE_DEFENSE + this.character.getStat('dexterity');
  }

  // 敌人攻击
  getEnemyAttack() {
    const base = this.enemy.attack;
    const variance = Math.floor(base * 0.3);
    return base + Math.floor(Math.random() * variance * 2) - variance;
  }

  // 玩家行动
  playerAction(action, item) {
    if (this.finished || !this.playerTurn) return [];
    const msgs = [];

    switch (action) {
      case 'attack': {
        const { damage, critical } = this.getPlayerAttack();
        const actualDmg = Math.max(1, damage - this.enemy.defense);
        this.enemy.hp = Math.max(0, this.enemy.hp - actualDmg);
        if (critical) {
          msgs.push(`💥 暴击！你对 ${this.enemy.name} 造成了 ${actualDmg} 点伤害！`);
        } else {
          msgs.push(`⚔️ 你攻击了 ${this.enemy.name}，造成了 ${actualDmg} 点伤害。`);
        }
        if (this.enemy.hp <= 0) {
          msgs.push(`🎉 你击败了 ${this.enemy.name}！`);
          this.finished = true;
          this.result = 'win';
          this._applyRewards(msgs);
        }
        break;
      }
      case 'defend': {
        this._isDefending = true;
        msgs.push('🛡️ 你举起防御姿态，准备迎接攻击。');
        break;
      }
      case 'useItem': {
        if (item && this.character.hasItem(item)) {
          const healed = this._useItemEffect(item);
          if (healed > 0) {
            msgs.push(`💊 你使用了 ${item}，恢复了 ${healed} 点生命值。`);
          } else {
            msgs.push(`你使用了 ${item}。`);
          }
        } else {
          msgs.push('你没有这个物品。');
          return msgs;
        }
        break;
      }
      case 'escape': {
        const chance = CONFIG.COMBAT.ESCAPE_CHANCE + this.character.getStat('dexterity') * 0.05;
        if (Math.random() < chance) {
          msgs.push('🏃 你成功逃离了战斗！');
          this.finished = true;
          this.result = 'escape';
        } else {
          msgs.push('🏃 你试图逃跑，但被敌人挡住了去路！');
        }
        break;
      }
    }

    if (this.finished) return msgs;

    // 敌人回合
    this.playerTurn = false;
    msgs.push(...this._enemyTurn());
    this.playerTurn = true;

    // 检查玩家死亡
    if (!this.character.isAlive()) {
      msgs.push('💀 你的意识逐渐模糊……你倒下了。');
      this.finished = true;
      this.result = 'lose';
    }

    return msgs;
  }

  _enemyTurn() {
    const msgs = [];
    let atk = this.getEnemyAttack();

    if (this._isDefending) {
      atk = Math.floor(atk * CONFIG.COMBAT.DEFENSE_DEF_MULTIPLIER);
      this._isDefending = false;
      msgs.push(`🛡️ 防御减伤！${this.enemy.name} 的攻击被削弱了。`);
    }

    const actualDmg = Math.max(1, atk - this.getPlayerDefense());
    this.character.modifyHp(-actualDmg);
    msgs.push(`💀 ${this.enemy.name} 攻击了你，造成了 ${actualDmg} 点伤害。（HP: ${this.character.hp}/${this.character.maxHp}）`);

    return msgs;
  }

  _useItemEffect(item) {
    let healed = 0;
    switch (item) {
      case '草药包':
        healed = 25;
        break;
      case '治疗药水':
        healed = 50;
        break;
      case '神秘药水':
        healed = Math.random() < 0.7 ? 40 : -20;
        break;
      case '陈年红酒':
        healed = 15;
        break;
      case '月露精华':
        healed = 30;
        break;
      default:
        healed = 10;
    }
    this.character.modifyHp(healed);
    this.character.removeItem(item);
    return healed;
  }

  _applyRewards(msgs) {
    const rewards = this.enemy.rewards;
    if (rewards.addItem) {
      this.character.addItem(rewards.addItem);
      msgs.push(`🎁 获得了 ${rewards.addItem}！`);
    }
    if (rewards.setFlag) {
      this.character.setFlag(rewards.setFlag);
    }
  }

  getState() {
    return {
      enemyName: this.enemy?.name || '',
      enemyHp: this.enemy?.hp || 0,
      enemyMaxHp: this.enemy?.maxHp || 0,
      playerHp: this.character.hp,
      playerMaxHp: this.character.maxHp,
      finished: this.finished,
      result: this.result,
      log: this.log,
    };
  }
}

// 根据当前状态判断结局
function evaluateEnding(character) {
  // 优先检查特殊结局
  if (character.hp <= 0) return ENDINGS.death;

  // 检查场景结局
  for (const ending of Object.values(ENDINGS)) {
    if (ending.condition(character)) {
      return ending;
    }
  }
  return null;
}

// 获取所有已解锁的结局
function getUnlockedEndings() {
  try {
    const data = JSON.parse(localStorage.getItem('text_adventure_endings') || '[]');
    return data;
  } catch {
    return [];
  }
}

// 保存已解锁的结局
function unlockEnding(endingId) {
  const unlocked = getUnlockedEndings();
  if (!unlocked.includes(endingId)) {
    unlocked.push(endingId);
    localStorage.setItem('text_adventure_endings', JSON.stringify(unlocked));
  }
}

// 获取结局完成度
function getCompletionRate() {
  const unlocked = getUnlockedEndings();
  const total = Object.keys(ENDINGS).length;
  return { unlocked: unlocked.length, total, rate: Math.round((unlocked.length / total) * 100) };
}

    this.combatActions = document.getElementById('combat-actions');
    this.enemyInfo = document.getElementById('enemy-info');
    this.menuOverlay = document.getElementById('menu-overlay');
    this.endingOverlay = document.getElementById('ending-overlay');
    this.messageToast = document.getElementById('message-toast');
    this.soundBtn = document.getElementById('sound-btn');
    this.skipBtn = document.getElementById('skip-btn');

    this._typewriterTimer = null;
    this._currentText = '';
    this._charIndex = 0;
    this._isTyping = false;
    this._onTypeComplete = null;
    this._skipRequested = false;
  }

  // ===== 打字机效果 =====
  async showText(text, onAction) {
    return new Promise((resolve) => {
      this._currentText = text;
      this._charIndex = 0;
      this._isTyping = true;
      this._skipRequested = false;
      this.textArea.innerHTML = '';
      this.choicesArea.innerHTML = '';
      this.textArea.classList.add('active');

      // 显示跳过按钮
      if (this.skipBtn) {
        this.skipBtn.style.display = 'inline-block';
      }

      this._onTypeComplete = () => {
        this._isTyping = false;
        if (this.skipBtn) this.skipBtn.style.display = 'none';
        if (onAction) onAction();
        resolve();
      };

      this._typeNext();
    });
  }

  _typeNext() {
    if (this._skipRequested) {
      this.textArea.innerHTML = this._formatText(this._currentText);
      this._isTyping = false;
      if (this.skipBtn) this.skipBtn.style.display = 'none';
      if (this._onTypeComplete) this._onTypeComplete();
      return;
    }

    if (this._charIndex >= this._currentText.length) {
      this._isTyping = false;
      if (this.skipBtn) this.skipBtn.style.display = 'none';
      if (this._onTypeComplete) this._onTypeComplete();
      return;
    }

    const char = this._currentText[this._charIndex];
    // 追加字符
    if (char === '\n') {
      this.textArea.innerHTML += '<br>';
    } else {
      this.textArea.innerHTML += this._escapeChar(char);
    }

    // 打字音效（每3个字符一次，避免太频繁）
    if (this._charIndex % 3 === 0) {
      sound.type();
    }

    this._charIndex++;

    // 根据标点符号调整速度
    let delay = CONFIG.TYPE_SPEED;
    if ('。！？……'.includes(char)) delay = CONFIG.TYPE_SPEED * 4;
    else if ('，、；：'.includes(char)) delay = CONFIG.TYPE_SPEED * 2;
    else if (char === '\n') delay = CONFIG.TYPE_SPEED * 3;

    this._typewriterTimer = setTimeout(() => this._typeNext(), delay);
  }

  skipTypewriter() {
    if (this._isTyping) {
      this._skipRequested = true;
      sound.click();
    }
  }

  _escapeChar(char) {
    const map = { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' };
    return map[char] || char;
  }

  _formatText(text) {
    return text
      .split('\n')
      .map((line) => (line.trim() === '' ? '<br>' : `<p>${line}</p>`))
      .join('');
  }

  // ===== 选择按钮 =====
  showChoices(choices, onSelect) {
    this.choicesArea.innerHTML = '';
    choices.forEach((choice, index) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-number">${index + 1}</span> ${choice.text}`;

      if (choice.disabled) {
        btn.classList.add('disabled');
        if (choice.disabledReason) {
          btn.title = choice.disabledReason;
        }
      }

      btn.addEventListener('click', () => {
        if (choice.disabled) {
          sound.click();
          this.showMessage(choice.disabledReason || '条件不满足');
          return;
        }
        sound.click();
        btn.classList.add('selected');
        // 禁用所有按钮
        this.choicesArea.querySelectorAll('.choice-btn').forEach((b) => {
          b.classList.add('disabled');
          b.style.pointerEvents = 'none';
        });
        onSelect(choice, index);
      });

      // 延迟显示动画
      btn.style.animationDelay = `${index * 0.1}s`;
      this.choicesArea.appendChild(btn);
    });
  }

  // ===== 章节标题 =====
  setChapterTitle(title) {
    if (this.chapterTitle) {
      this.chapterTitle.textContent = title;
      this.chapterTitle.classList.add('fade-in');
      setTimeout(() => this.chapterTitle.classList.remove('fade-in'), 1000);
    }
  }

  // ===== 状态栏 =====
  updateStats(character) {
    // HP
    const hpPercent = Math.max(0, (character.hp / character.maxHp) * 100);
    if (this.hpBar) {
      this.hpBar.style.width = hpPercent + '%';
      this.hpBar.className = 'hp-fill';
      if (hpPercent <= 25) this.hpBar.classList.add('critical');
      else if (hpPercent <= 50) this.hpBar.classList.add('low');
    }
    if (this.hpText) {
      this.hpText.textContent = `HP: ${character.hp} / ${character.maxHp}`;
    }

    // 属性
    if (this.statsDisplay) {
      this.statsDisplay.innerHTML = '';
      for (const [key, name] of Object.entries(CONFIG.STAT_NAMES)) {
        const icon = CONFIG.STAT_ICONS[key];
        const val = character.getStat(key);
        const statEl = document.createElement('div');
        statEl.className = 'stat-item';
        statEl.innerHTML = `<span class="stat-icon">${icon}</span><span class="stat-name">${name}</span><span class="stat-value">${val}</span>`;
        this.statsDisplay.appendChild(statEl);
      }
    }
  }

  // ===== 物品栏 =====
  updateInventory(character) {
    if (!this.inventoryList) return;
    this.inventoryList.innerHTML = '';
    if (character.inventory.length === 0) {
      this.inventoryList.innerHTML = '<div class="empty-inventory">背包为空</div>';
      return;
    }
    character.inventory.forEach((item) => {
      const el = document.createElement('div');
      el.className = 'inventory-item';
      el.textContent = item;
      el.title = item;
      this.inventoryList.appendChild(el);
    });
  }

  // ===== 战斗面板 =====
  showCombat(combatState) {
    if (!this.combatPanel) return;
    this.combatPanel.classList.add('active');
    this.textArea.classList.remove('active');
    this.choicesArea.innerHTML = '';

    this.updateCombatUI(combatState);
  }

  hideCombat() {
    if (this.combatPanel) {
      this.combatPanel.classList.remove('active');
    }
    this.textArea.classList.add('active');
  }

  updateCombatUI(combatState) {
    if (!combatState) return;

    // 敌人信息
    if (this.enemyInfo) {
      const hpPercent = Math.max(0, (combatState.enemyHp / combatState.enemyMaxHp) * 100);
      this.enemyInfo.innerHTML = `
        <div class="enemy-name">${combatState.enemyName}</div>
        <div class="enemy-hp-bar">
          <div class="enemy-hp-fill" style="width: ${hpPercent}%"></div>
        </div>
        <div class="enemy-hp-text">HP: ${combatState.enemyHp} / ${combatState.enemyMaxHp}</div>
      `;
    }

    // 战斗日志
    if (this.combatLog) {
      this.combatLog.innerHTML = combatState.log.map((msg) => `<div class="combat-log-line">${msg}</div>`).join('');
      this.combatLog.scrollTop = this.combatLog.scrollHeight;
    }
  }

  showCombatActions(onAction) {
    if (!this.combatActions) return;
    this.combatActions.innerHTML = '';

    const actions = [
      { id: 'attack', text: '⚔️ 攻击', desc: '用力量进行攻击' },
      { id: 'defend', text: '🛡️ 防御', desc: '减少受到的伤害' },
      { id: 'useItem', text: '💊 使用物品', desc: '使用背包中的物品' },
      { id: 'escape', text: '🏃 逃跑', desc: '尝试逃离战斗' },
    ];

    actions.forEach((action) => {
      const btn = document.createElement('button');
      btn.className = 'combat-btn';
      btn.textContent = action.text;
      btn.title = action.desc;
      btn.addEventListener('click', () => {
        sound.combat();
        if (action.id === 'useItem') {
          this._showItemSelection(onAction);
        } else {
          onAction(action.id);
        }
      });
      this.combatActions.appendChild(btn);
    });
  }

  _showItemSelection(onAction) {
    const character = window.game?.character;
    if (!character || character.inventory.length === 0) {
      this.showMessage('背包中没有可用的物品！');
      return;
    }

    this.combatActions.innerHTML = '<div class="item-select-title">选择要使用的物品：</div>';
    const usableItems = character.inventory.filter((item) =>
      ['草药包', '治疗药水', '神秘药水', '陈年红酒', '月露精华', '幽冥之花'].includes(item)
    );

    if (usableItems.length === 0) {
      this.showMessage('没有可以在战斗中使用的物品！');
      setTimeout(() => this.showCombatActions(onAction), 1500);
      return;
    }

    usableItems.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = 'combat-btn item-btn';
      btn.textContent = item;
      btn.addEventListener('click', () => {
        sound.item();
        onAction('useItem', item);
      });
      this.combatActions.appendChild(btn);
    });

    const backBtn = document.createElement('button');
    backBtn.className = 'combat-btn back-btn';
    backBtn.textContent = '← 返回';
    backBtn.addEventListener('click', () => this.showCombatActions(onAction));
    this.combatActions.appendChild(backBtn);
  }

  appendCombatLog(msgs) {
    if (!this.combatLog) return;
    msgs.forEach((msg) => {
      const line = document.createElement('div');
      line.className = 'combat-log-line fade-in';
      line.textContent = msg;
      this.combatLog.appendChild(line);
    });
    this.combatLog.scrollTop = this.combatLog.scrollHeight;
  }

  // ===== 菜单 =====
  showMenu(onNewGame, onContinue, onEndings) {
    if (!this.menuOverlay) return;
    this.menuOverlay.classList.add('active');

    const newGameBtn = document.getElementById('menu-new-game');
    const continueBtn = document.getElementById('menu-continue');
    const endingsBtn = document.getElementById('menu-endings');

    if (newGameBtn) {
      newGameBtn.onclick = () => {
        sound.click();
        this.hideMenu();
        onNewGame();
      };
    }
    if (continueBtn) {
      continueBtn.onclick = () => {
        sound.click();
        this.hideMenu();
        onContinue();
      };
    }
    if (endingsBtn) {
      endingsBtn.onclick = () => {
        sound.click();
        onEndings();
      };
    }
  }

  hideMenu() {
    if (this.menuOverlay) {
      this.menuOverlay.classList.remove('active');
    }
  }

  // ===== 结局画面 =====
  showEnding(ending) {
    if (!this.endingOverlay) return;
    const title = document.getElementById('ending-title');
    const desc = document.getElementById('ending-desc');
    const type = document.getElementById('ending-type');

    if (title) title.textContent = ending.title;
    if (desc) desc.textContent = ending.description;
    if (type) {
      const typeMap = { bad: '🌑 坏结局', neutral: '🌗 中立结局', good: '🌖 好结局', true: '🌕 真结局' };
      type.textContent = typeMap[ending.type] || '';
    }

    this.endingOverlay.classList.add('active');

    // 根据结局类型播放音效
    if (ending.type === 'bad' || ending.id === 'death') {
      sound.death();
    } else {
      sound.victory();
    }
  }

  hideEnding() {
    if (this.endingOverlay) {
      this.endingOverlay.classList.remove('active');
    }
  }

  // ===== 消息提示 =====
  showMessage(text, duration = 2500) {
    if (!this.messageToast) return;
    this.messageToast.textContent = text;
    this.messageToast.classList.add('show');
    setTimeout(() => this.messageToast.classList.remove('show'), duration);
  }

  // ===== 音效按钮 =====
  updateSoundButton(enabled) {
    if (this.soundBtn) {
      this.soundBtn.textContent = enabled ? '🔊' : '🔇';
    }
  }

  // ===== 结局收集展示 =====
  showEndingsCollection(endings, unlockedIds) {
    if (!this.endingOverlay) return;
    const title = document.getElementById('ending-title');
    const desc = document.getElementById('ending-desc');
    const type = document.getElementById('ending-type');

    if (title) title.textContent = '结局收集';
    if (type) {
      const completion = Math.round((unlockedIds.length / Object.keys(endings).length) * 100);
      type.textContent = `完成度: ${unlockedIds.length}/${Object.keys(endings).length} (${completion}%)`;
    }
    if (desc) {
      desc.innerHTML = '';
      for (const [id, ending] of Object.entries(endings)) {
        const el = document.createElement('div');
        el.className = 'ending-entry';
        const unlocked = unlockedIds.includes(id);
        el.classList.add(unlocked ? 'unlocked' : 'locked');
        const typeIcon = { bad: '🌑', neutral: '🌗', good: '🌖', true: '🌕' };
        el.innerHTML = `
          <span class="ending-icon">${unlocked ? typeIcon[ending.type] : '❓'}</span>
          <span class="ending-name">${unlocked ? ending.title : '???'}</span>
          ${unlocked ? `<span class="ending-desc-mini">${ending.description}</span>` : ''}
        `;
        desc.appendChild(el);
      }
    }

    this.endingOverlay.classList.add('active');
  }

  // 清除所有内容
  clearAll() {
    if (this.textArea) this.textArea.innerHTML = '';
    if (this.choicesArea) this.choicesArea.innerHTML = '';
    this.hideCombat();
  }
}

// === main.js ===
// main.js - 游戏引擎、状态机、事件监听

class Game {
  constructor() {
    this.character = null;
    this.ui = new UI();
    this.combat = null;
    this.state = 'menu'; // menu | playing | combat | ending
    this.currentSceneData = null;

    // 暴露给全局（供 story.js 条件判断使用）
    window.game = this;

    this._bindEvents();
    this._showMainMenu();
  }

  // ===== 事件绑定 =====
  _bindEvents() {
    // 音效开关
    const soundBtn = document.getElementById('sound-btn');
    if (soundBtn) {
      soundBtn.addEventListener('click', () => {
        const enabled = sound.toggle();
        this.ui.updateSoundButton(enabled);
      });
    }

    // 跳过打字
    const skipBtn = document.getElementById('skip-btn');
    if (skipBtn) {
      skipBtn.addEventListener('click', () => {
        this.ui.skipTypewriter();
      });
    }

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      // 空格跳过打字
      if (e.code === 'Space' && this.ui._isTyping) {
        e.preventDefault();
        this.ui.skipTypewriter();
        return;
      }
      // 数字键选择
      if (e.key >= '1' && e.key <= '9' && this.state === 'playing') {
        const btns = this.ui.choicesArea?.querySelectorAll('.choice-btn:not(.disabled)');
        const idx = parseInt(e.key) - 1;
        if (btns && btns[idx]) {
          btns[idx].click();
        }
      }
    });

    // 结局界面关闭
    const endingClose = document.getElementById('ending-close');
    if (endingClose) {
      endingClose.addEventListener('click', () => {
        sound.click();
        this.ui.hideEnding();
        this._showMainMenu();
      });
    }

    // 存档按钮
    const saveBtn = document.getElementById('save-btn');
    if (saveBtn) {
      saveBtn.addEventListener('click', () => {
        this._saveGame();
        this.ui.showMessage('游戏已保存');
      });
    }
  }

  // ===== 主菜单 =====
  _showMainMenu() {
    this.state = 'menu';
    const hasSave = !!localStorage.getItem(CONFIG.SAVE_KEY);
    this.ui.showMenu(
      () => this._newGame(),
      () => this._loadGame(),
      () => this._showEndingsCollection()
    );
  }

  // ===== 新游戏 =====
  _newGame() {
    this.character = new Character();
    this.ui.clearAll();
    this.ui.updateStats(this.character);
    this.ui.updateInventory(this.character);
    this._enterScene('start');
  }

  // ===== 存档 =====
  _saveGame() {
    if (!this.character) return;
    const data = this.character.serialize();
    localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(data));
  }

  // ===== 读档 =====
  _loadGame() {
    try {
      const data = JSON.parse(localStorage.getItem(CONFIG.SAVE_KEY));
      if (!data) {
        this.ui.showMessage('没有找到存档');
        this._showMainMenu();
        return;
      }
      this.character = Character.deserialize(data);
      this.ui.clearAll();
      this.ui.updateStats(this.character);
      this.ui.updateInventory(this.character);
      this._enterScene(this.character.currentScene);
    } catch (e) {
      console.error('读取存档失败:', e);
      this.ui.showMessage('存档损坏，开始新游戏');
      this._newGame();
    }
  }

  // ===== 进入场景 =====
  async _enterScene(sceneId) {
    // 重新开始
    if (sceneId === 'restart') {
      localStorage.removeItem(CONFIG.SAVE_KEY);
      this._newGame();
      return;
    }

    const scene = STORY[sceneId];
    if (!scene) {
      console.error('场景不存在:', sceneId);
      this.ui.showMessage('场景不存在: ' + sceneId);
      return;
    }

    this.state = 'playing';
    this.currentSceneData = scene;
    this.character.visitScene(sceneId);
    this.character.chapter = scene.chapter;

    // 更新章节标题
    const chapterName = CONFIG.CHAPTER_NAMES[scene.chapter] || '';
    if (chapterName) {
      this.ui.setChapterTitle(chapterName);
    }

    // 场景进入效果
    if (scene.chapter === 'chapter3' || scene.chapter === 'chapter4') {
      sound.horror();
    }

    // 战斗场景
    if (scene.combat) {
      await this._startCombat(scene);
      return;
    }

    // 显示文本
    await this.ui.showText(scene.text);

    // 应用场景效果
    if (scene.effects) {
      this._applyEffects(scene.effects);
    }
    if (scene.addItem) {
      this.character.addItem(scene.addItem);
      sound.item();
      this.ui.showMessage(`获得了 ${scene.addItem}！`);
    }
    if (scene.setFlag) {
      this.character.setFlag(scene.setFlag);
    }
    if (scene.hp) {
      this.character.modifyHp(scene.hp);
    }

    // 更新UI
    this.ui.updateStats(this.character);
    this.ui.updateInventory(this.character);

    // 检查结局
    const ending = evaluateEnding(this.character);
    if (ending && ending.id !== 'death') {
      this._triggerEnding(ending);
      return;
    }

    // 显示选择
    this._showSceneChoices(scene);

    // 自动保存
    this._saveGame();
  }

  // ===== 显示场景选择 =====
  _showSceneChoices(scene) {
    const choices = scene.choices.map((choice) => {
      const processed = { ...choice };

      // 检查物品需求
      if (choice.requireItem && !this.character.hasItem(choice.requireItem)) {
        processed.disabled = true;
        processed.disabledReason = choice.conditionMessage || `需要物品: ${choice.requireItem}`;
      }

      // 检查条件函数
      if (choice.condition && !choice.condition()) {
        processed.disabled = true;
        processed.disabledReason = '条件不满足';
      }

      return processed;
    });

    this.ui.showChoices(choices, (choice) => this._handleChoice(choice));
  }

  // ===== 处理选择 =====
  async _handleChoice(choice) {
    // 设置标记
    if (choice.setFlag) {
      this.character.setFlag(choice.setFlag);
    }

    // 移除物品
    if (choice.removeItem) {
      this.character.removeItem(choice.removeItem);
    }

    // 属性检定
    if (choice.statCheck) {
      const { stat, difficulty } = choice.statCheck;
      const roll = this.character.getStat(stat) + Math.floor(Math.random() * 6) + 1;
      const success = roll >= difficulty;

      if (success && choice.successEffects) {
        await this.ui.showText(choice.successEffects.message || '');
        this._applyEffects(choice.successEffects);
      } else if (!success && choice.failEffects) {
        await this.ui.showText(choice.failEffects.message || '');
        this._applyEffects(choice.failEffects);
      }

      // 更新UI
      this.ui.updateStats(this.character);
      this.ui.updateInventory(this.character);

      // 检查死亡
      if (!this.character.isAlive()) {
        const ending = evaluateEnding(this.character);
        if (ending) {
          this._triggerEnding(ending);
          return;
        }
      }
    } else if (choice.effects) {
      await this.ui.showText(choice.effects.message || '');
      this._applyEffects(choice.effects);
      this.ui.updateStats(this.character);
      this.ui.updateInventory(this.character);
    }

    // 添加物品
    if (choice.addItem) {
      this.character.addItem(choice.addItem);
      sound.item();
      this.ui.showMessage(`获得了 ${choice.addItem}！`);
      this.ui.updateInventory(this.character);
    }
    if (choice.addItem2) {
      this.character.addItem(choice.addItem2);
      this.ui.updateInventory(this.character);
    }

    // 进入下一个场景
    const nextScene = choice.effects?.nextScene || choice.successEffects?.nextScene || choice.nextScene;
    if (nextScene) {
      await new Promise((r) => setTimeout(r, 500));
      this._enterScene(nextScene);
    }
  }

  // ===== 应用效果 =====
  _applyEffects(effects) {
    if (!effects) return;
    if (effects.hp) {
      this.character.modifyHp(effects.hp);
    }
    if (effects.addItem) {
      this.character.addItem(effects.addItem);
      sound.item();
    }
    if (effects.removeItem) {
      this.character.removeItem(effects.removeItem);
    }
    if (effects.setFlag) {
      this.character.setFlag(effects.setFlag);
    }
    if (effects.modifyStat) {
      for (const [stat, val] of Object.entries(effects.modifyStat)) {
        this.character.modifyStat(stat, val);
      }
    }
  }

  // ===== 战斗系统 =====
  async _startCombat(scene) {
    this.state = 'combat';
    this.combat = new CombatSystem(this.character, (result) => this._onCombatEnd(result, scene));

    // 先显示战斗前文本
    await this.ui.showText(scene.text);

    // 开始战斗
    const initLog = this.combat.start(scene.combat);
    const combatState = this.combat.getState();
    combatState.log = initLog;

    this.ui.showCombat(combatState);
    this._showCombatActions(scene);
  }

  _showCombatActions(scene) {
    this.ui.showCombatActions((action, item) => {
      const msgs = this.combat.playerAction(action, item);
      const state = this.combat.getState();
      state.log = msgs;
      this.ui.updateCombatUI(state);
      this.ui.updateStats(this.character);

      if (this.combat.finished) {
        setTimeout(() => this._onCombatEnd(this.combat.result, scene), 1500);
      }
    });
  }

  async _onCombatEnd(result, scene) {
    this.ui.hideCombat();
    this.state = 'playing';

    if (result === 'win') {
      // 检查死亡结局
      if (!this.character.isAlive()) {
        const ending = evaluateEnding(this.character);
        if (ending) {
          this._triggerEnding(ending);
          return;
        }
      }
      // 继续到下一场景
      if (scene.choices && scene.choices.length > 0) {
        await this.ui.showText(scene.text || '战斗胜利！');
        this._showSceneChoices(scene);
      }
    } else if (result === 'escape') {
      // 逃跑回到上一个场景
      await this.ui.showText('你成功逃离了战斗。');
      const prevScene = this.character.history[this.character.history.length - 2] || 'entrance_hall';
      this._enterScene(prevScene);
    } else if (result === 'lose') {
      const ending = evaluateEnding(this.character);
      if (ending) {
        this._triggerEnding(ending);
      }
    }

    this.ui.updateStats(this.character);
    this.ui.updateInventory(this.character);
    this._saveGame();
  }

  // ===== 结局 =====
  _triggerEnding(ending) {
    this.state = 'ending';
    unlockEnding(ending.id);
    this.ui.showEnding(ending);
  }

  // ===== 结局收集 =====
  _showEndingsCollection() {
    const unlocked = getUnlockedEndings();
    this.ui.showEndingsCollection(ENDINGS, unlocked);
  }
}

// ===== 启动游戏 =====
document.addEventListener('DOMContentLoaded', () => {
  new Game();
});


</script>
