  <script>
    // roundRect polyfill for older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        const [tl, tr, br, bl] = r;
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.arcTo(x + w, y, x + w, y + tr, tr);
        this.lineTo(x + w, y + h - br);
        this.arcTo(x + w, y + h, x + w - br, y + h, br);
        this.lineTo(x + bl, y + h);
        this.arcTo(x, y + h, x, y + h - bl, bl);
        this.lineTo(x, y + tl);
        this.arcTo(x, y, x + tl, y, tl);
        this.closePath();
      };
    }

// ==================== Web Audio API 音效系统 ====================

let audioCtx = null;
let masterGain = null;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function ensureResumed() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

// ---- 工具函数 ----
function playTone(freq, duration, type = 'square', volume = 0.3) {
  const ctx = ensureResumed();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function playNoise(duration, volume = 0.2) {
  const ctx = ensureResumed();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.value = volume;
  source.connect(gain);
  gain.connect(masterGain);
  source.start();
}

    const osc = ctx.createOscillator();

    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.15, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.12);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t + i * 0.08);
    osc.stop(t + i * 0.08 + 0.15);
  });
}

// ==================== 地图系统 ====================


/** 地图网格：0=空地, 1=路径, 2=塔 */
const grid = [];

/** 路径像素坐标（敌人行走用） */
const pathPixels = [];

/** 当前选中的地图索引 */
let currentMapIndex = 0;
/** 当前使用的路径 */
let currentPath = ENEMY_PATH;

/** 获取当前地图索引 */
function getCurrentMapIndex() { return currentMapIndex; }

/** 切换地图 */
function selectMap(index) {
  currentMapIndex = index;
}

/** 初始化地图 */
function initMap(path) {
  const enemyPath = path || ENEMY_PATH;
  currentPath = enemyPath;
  grid.length = 0;
  for (let r = 0; r < GRID_ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_COLS; c++) {
      grid[r][c] = CELL_EMPTY;
    }
  }
  // 标记路径
  for (const [c, r] of enemyPath) {
    if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
      grid[r][c] = CELL_PATH;
    }
  }
  // 计算路径像素坐标（格子中心）
  pathPixels.length = 0;
  for (const [c, r] of enemyPath) {
    pathPixels.push({
      x: c * CELL_SIZE + CELL_SIZE / 2,
      y: r * CELL_SIZE + CELL_SIZE / 2
    });
  }
}

/** 检查某格是否可建塔 */
function canBuild(col, row) {
  if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return false;
  return grid[row][col] === CELL_EMPTY;
}

/** 放置塔 */
function placeTower(col, row) {
  grid[row][col] = CELL_TOWER;
}

/** 移除塔（出售时） */
function removeTower(col, row) {
  grid[row][col] = CELL_EMPTY;
}

/** 绘制地图 */
function drawMap(ctx, path) {
  const enemyPath = currentPath;

  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      const x = c * CELL_SIZE;
      const y = r * CELL_SIZE;

      if (grid[r][c] === CELL_PATH) {
        // 路径 - 沙地风格
        ctx.fillStyle = '#d4a574';
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        // 路径纹理
        ctx.fillStyle = '#c9976a';
        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, 2);
        ctx.fillRect(x + CELL_SIZE / 3, y + CELL_SIZE / 2, CELL_SIZE / 3, 2);
      } else {
        // 空地 - 草地
        ctx.fillStyle = '#4a8c3f';
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        // 草地纹理
        ctx.fillStyle = '#3d7a34';
        ctx.fillRect(x, y, CELL_SIZE, 1);
        ctx.fillRect(x, y, 1, CELL_SIZE);
        // 随机草点
        const seed = (r * 31 + c * 17) % 7;
        if (seed < 3) {
          ctx.fillStyle = '#5a9c4f';
          ctx.fillRect(x + 15 + seed * 8, y + 20 + seed * 5, 3, 5);
          ctx.fillRect(x + 30 + seed * 4, y + 35 + seed * 3, 2, 4);
        }
      }

      // 网格线
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
    }
  }

  // 绘制路径方向箭头（每隔几格）
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let i = 0; i < enemyPath.length - 1; i += 3) {
    const [c1, r1] = enemyPath[i];
    const [c2, r2] = enemyPath[Math.min(i + 1, enemyPath.length - 1)];
    const cx = c1 * CELL_SIZE + CELL_SIZE / 2;
    const cy = r1 * CELL_SIZE + CELL_SIZE / 2;
    const dx = c2 - c1;
    const dy = r2 - r1;
    const angle = Math.atan2(dy, dx);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-5, -6);
    ctx.lineTo(-5, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 入口和出口标记
  const [ec, er] = enemyPath[0];
  const [xc, xr] = enemyPath[enemyPath.length - 1];

  // 入口
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('入口', ec * CELL_SIZE + CELL_SIZE / 2, er * CELL_SIZE - 8);

  // 出口
  ctx.fillStyle = '#2ecc71';
  ctx.fillText('出口', xc * CELL_SIZE + CELL_SIZE / 2, xr * CELL_SIZE + CELL_SIZE + 12);
}

/** 像素坐标转网格坐标 */
function pixelToGrid(px, py) {
  return {
    col: Math.floor(px / CELL_SIZE),
    row: Math.floor(py / CELL_SIZE)
  };
}

/** 网格坐标转像素中心坐标 */
function gridToPixel(col, row) {
  return {
    x: col * CELL_SIZE + CELL_SIZE / 2,
    y: row * CELL_SIZE + CELL_SIZE / 2
  };
}

// ==================== 塔系统 ====================


class Tower {
  constructor(type, col, row) {
    this.type = type;
    this.col = col;
    this.row = row;
    this.level = 0; // 0-indexed
    this.fireCooldown = 0;
    this.target = null;
    this.angle = 0;
    this.totalInvested = TOWER_TYPES[type].levels[0].cost;

    const pos = gridToPixel(col, row);
    this.x = pos.x;
    this.y = pos.y;
  }

  get stats() {
    return TOWER_TYPES[this.type].levels[this.level];
  }

  get typeName() {
    return TOWER_TYPES[this.type].name;
  }

  get icon() {
    return TOWER_TYPES[this.type].icon;
  }

  get maxLevel() {
    return TOWER_TYPES[this.type].levels.length - 1;
  }

  get upgradeCost() {
    if (this.level >= this.maxLevel) return 0;
    return TOWER_TYPES[this.type].levels[this.level + 1].cost;
  }

  get sellValue() {
    return Math.floor(this.totalInvested * SELL_REFUND_RATIO);
  }

  canUpgrade() {
    return this.level < this.maxLevel;
  }

  upgrade() {
    if (!this.canUpgrade()) return false;
    const cost = this.upgradeCost;
    this.totalInvested += cost;
    this.level++;
    return true;
  }

  update(dt, enemies) {
    this.fireCooldown -= dt;
    if (this.fireCooldown <= 0) {
      this.target = this.findTarget(enemies);
      if (this.target) {
        this.fireCooldown = this.stats.fireRate;
        // 更新朝向
        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        this.angle = Math.atan2(dy, dx);
        return this.fire();
      }
    }
    // 更新朝向
    if (this.target && this.target.alive) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      this.angle = Math.atan2(dy, dx);
    }
    return null;
  }

  findTarget(enemies) {
    const range = this.stats.range * CELL_SIZE;
    let closest = null;
    let minDist = Infinity;
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - this.x;
      const dy = e.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= range) {
        // 优先攻击路径进度最远的
        if (!closest || e.pathProgress > closest.pathProgress) {
          closest = e;
          minDist = dist;
        }
      }
    }
    return closest;
  }

  fire() {
    // 返回射击数据，由 main.js 创建投射物
    const s = this.stats;
    switch (this.type) {
      case 'arrow':
        playArrowShoot();
        break;
      case 'cannon':
        playCannonShoot();
        break;
      case 'ice':
        playIceShoot();
        break;
      case 'electric':
        playElectricShoot();
        break;
      case 'flame':
        playFlameShoot();
        break;
      case 'laser':
        playLaserShoot();
        break;
    }
    return {
      type: this.type,
      x: this.x,
      y: this.y,
      target: this.target,
      angle: this.angle,
      damage: s.damage,
      splashRadius: s.splashRadius || 0,
      slowFactor: s.slowFactor || 0,
      slowDuration: s.slowDuration || 0,
      chainCount: s.chainCount || 0,
      chainRange: (s.chainRange || 0) * CELL_SIZE,
      burnDamage: s.burnDamage || 0,
      burnDuration: s.burnDuration || 0,
      pierceCount: s.pierceCount || 0,
      speed: 400
    };
  }

  draw(ctx, isSelected) {
    const s = this.stats;
    const x = this.x;
    const y = this.y;
    const size = CELL_SIZE * s.size;
    const now = Date.now();

    ctx.save();
    ctx.translate(x, y);

    // 选中时显示范围
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(0, 0, s.range * CELL_SIZE, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 按类型绘制不同塔身
    switch (this.type) {
      case 'arrow': this._drawArrowTower(ctx, size, now); break;
      case 'cannon': this._drawCannonTower(ctx, size, now); break;
      case 'ice': this._drawIceTower(ctx, size, now); break;
      case 'electric': this._drawElectricTower(ctx, size, now); break;
      case 'flame': this._drawFlameTower(ctx, size, now); break;
      case 'laser': this._drawLaserTower(ctx, size, now); break;
      default:
        ctx.fillStyle = s.color;
        ctx.beginPath(); ctx.arc(0, 0, size / 2, 0, Math.PI * 2); ctx.fill();
    }

    // 等级星星
    const starSize = 3;
    for (let i = 0; i <= this.level; i++) {
      const sx = (i - this.level / 2) * (starSize * 2 + 2);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(sx, -size / 2 - 8, starSize, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // --- 箭塔：木质高塔+弓 ---
  _drawArrowTower(ctx, size, now) {
    // 石基
    ctx.fillStyle = '#6d4c41';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-size / 2, -size / 4, size, size * 0.6, 3);
    else ctx.rect(-size / 2, -size / 4, size, size * 0.6);
    ctx.fill();
    // 木质塔身
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(0, -2, size / 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 木纹
    ctx.strokeStyle = 'rgba(100,60,20,0.3)';
    ctx.lineWidth = 1;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(-size / 3, i * 4);
      ctx.lineTo(size / 3, i * 4);
      ctx.stroke();
    }
    // 弓臂
    ctx.rotate(this.angle);
    ctx.strokeStyle = '#A0522D';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 6, -0.6, 0.6);
    ctx.stroke();
    // 弓弦
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    const bowR = size / 2 + 6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(-0.6) * bowR, Math.sin(-0.6) * bowR);
    ctx.lineTo(Math.cos(0.6) * bowR, Math.sin(0.6) * bowR);
    ctx.stroke();
    // 箭
    ctx.fillStyle = '#ccc';
    ctx.beginPath();
    ctx.moveTo(size / 2 + 8, 0);
    ctx.lineTo(size / 2 + 2, -2);
    ctx.lineTo(size / 2 + 2, 2);
    ctx.closePath();
    ctx.fill();
  }

  // --- 炮塔：金属底座+粗炮管 ---
  _drawCannonTower(ctx, size, now) {
    // 金属底座
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size / 2);
    grad.addColorStop(0, '#777');
    grad.addColorStop(1, '#444');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 铆钉
    ctx.fillStyle = '#999';
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * size / 3, Math.sin(a) * size / 3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 炮塔旋转部分
    ctx.rotate(this.angle);
    // 炮管
    ctx.fillStyle = '#555';
    ctx.fillRect(0, -4, size / 2 + 10, 8);
    // 炮口
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    // 炮口焰
    if (this.fireCooldown > this.stats.fireRate - 0.1) {
      ctx.fillStyle = 'rgba(255,150,0,0.6)';
      ctx.beginPath();
      ctx.arc(size / 2 + 14, 0, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- 冰塔：水晶结构 ---
  _drawIceTower(ctx, size, now) {
    // 冰晶基座
    ctx.fillStyle = 'rgba(0,150,255,0.2)';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
    // 主水晶体（六边形）
    ctx.fillStyle = '#00BFFF';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i - Math.PI / 6;
      const r = size / 2.5;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // 内部折射
    ctx.fillStyle = 'rgba(200,240,255,0.4)';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i - Math.PI / 6;
      const r = size / 4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // 旋转冰晶碎片
    const rot = now * 0.002;
    ctx.fillStyle = 'rgba(0,191,255,0.5)';
    for (let i = 0; i < 3; i++) {
      const a = rot + (Math.PI * 2 / 3) * i;
      const r = size / 2 + 3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(a + 0.3) * (r - 4), Math.sin(a + 0.3) * (r - 4));
      ctx.lineTo(Math.cos(a - 0.3) * (r - 4), Math.sin(a - 0.3) * (r - 4));
      ctx.closePath();
      ctx.fill();
    }
    // 武器指向
    ctx.rotate(this.angle);
    ctx.strokeStyle = '#00CED1';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(size / 2 + 6, 0);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,191,255,0.6)';
    ctx.beginPath();
    ctx.arc(size / 2 + 6, 0, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- 电塔：特斯拉线圈 ---
  _drawElectricTower(ctx, size, now) {
    // 底座
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 线圈层
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const r = size / 3 + i * 3;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 顶部球体
    const pulse = Math.sin(now * 0.008) * 0.2 + 0.8;
    ctx.fillStyle = `rgba(255,215,0,${pulse})`;
    ctx.beginPath();
    ctx.arc(0, 0, size / 5, 0, Math.PI * 2);
    ctx.fill();
    // 电弧
    ctx.strokeStyle = `rgba(255,215,0,${0.4 + Math.sin(now * 0.01) * 0.3})`;
    ctx.lineWidth = 1;
    ctx.rotate(this.angle);
    for (let i = 0; i < 3; i++) {
      const a = (i - 1) * 0.3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const mid = size / 4;
      ctx.lineTo(mid, a * 8);
      ctx.lineTo(size / 2 + 4, a * 4);
      ctx.stroke();
    }
    // 顶部电光球
    ctx.fillStyle = `rgba(255,255,200,${pulse * 0.5})`;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- 火焰塔：火山口+火焰 ---
  _drawFlameTower(ctx, size, now) {
    // 火山基座
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(-size / 2, size / 4);
    ctx.lineTo(-size / 4, -size / 3);
    ctx.lineTo(size / 4, -size / 3);
    ctx.lineTo(size / 2, size / 4);
    ctx.closePath();
    ctx.fill();
    // 熔岩纹路
    ctx.strokeStyle = 'rgba(255,100,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-size / 6, 0);
    ctx.quadraticCurveTo(0, -size / 4, size / 6, 0);
    ctx.stroke();
    // 火焰核心
    const flicker = Math.sin(now * 0.012) * 2;
    ctx.fillStyle = '#FF4500';
    ctx.beginPath();
    ctx.arc(0, -size / 4 - 2 + flicker, size / 4, 0, Math.PI * 2);
    ctx.fill();
    // 内焰
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, -size / 4 - 1 + flicker, size / 6, 0, Math.PI * 2);
    ctx.fill();
    // 火焰粒子
    for (let i = 0; i < 3; i++) {
      const fy = -size / 3 - i * 4 + Math.sin(now * 0.01 + i) * 3;
      const fx = (Math.random() - 0.5) * size * 0.4;
      const alpha = 0.4 - i * 0.1;
      ctx.fillStyle = `rgba(255,${100 + i * 50},0,${alpha})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 喷射方向
    ctx.rotate(this.angle);
    ctx.fillStyle = '#FF6347';
    ctx.beginPath();
    ctx.moveTo(size / 2 + 6, 0);
    ctx.lineTo(size / 3, -5);
    ctx.lineTo(size / 3, 5);
    ctx.closePath();
    ctx.fill();
  }

  // --- 激光塔：科技天线碟 ---
  _drawLaserTower(ctx, size, now) {
    // 底座
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.fill();
    // 科技纹路
    ctx.strokeStyle = 'rgba(255,0,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, size / 3, 0, Math.PI * 2);
    ctx.stroke();
    // 能量环
    const ringRot = now * 0.003;
    ctx.strokeStyle = `rgba(255,0,255,${0.3 + Math.sin(now * 0.005) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, size / 2.5, ringRot, ringRot + 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, size / 2.5, ringRot + Math.PI, ringRot + Math.PI + 1.5);
    ctx.stroke();
    // 天线碟
    ctx.rotate(this.angle);
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.ellipse(size / 4, 0, size / 4, size / 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // 发射管
    ctx.fillStyle = '#FF00FF';
    ctx.fillRect(0, -2, size / 2 + 10, 4);
    // 透镜发光
    const lensGlow = Math.sin(now * 0.008) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,0,255,${lensGlow})`;
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    // 能量光圈
    ctx.fillStyle = `rgba(255,0,255,${lensGlow * 0.2})`;
    ctx.beginPath();
    ctx.arc(size / 2 + 10, 0, 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ==================== 投射物系统 ====================


class Projectile {
  constructor(data) {
    this.type = data.type;
    this.x = data.x;
    this.y = data.y;
    this.target = data.target;
    this.angle = data.angle;
    this.damage = data.damage;
    this.speed = data.speed || 400;
    this.splashRadius = data.splashRadius || 0;
    this.slowFactor = data.slowFactor || 0;
    this.slowDuration = data.slowDuration || 0;
    this.chainCount = data.chainCount || 0;
    this.chainRange = data.chainRange || 0;
    this.burnDamage = data.burnDamage || 0;
    this.burnDuration = data.burnDuration || 0;
    this.pierceCount = data.pierceCount || 0;
    this.pierced = new Set();
    this.alive = true;
    this.trail = [];
  }

  update(dt, enemies) {
    if (!this.alive) return;

    // 保存轨迹
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();

    // 激光是瞬时的
    if (this.type === 'laser') {
      this.applyLaser(enemies);
      this.alive = false;
      return;
    }

    // 电塔也是瞬时连锁
    if (this.type === 'electric') {
      this.applyChain(enemies);
      this.alive = false;
      return;
    }

    // 追踪目标
    if (this.target && this.target.alive) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      this.angle = Math.atan2(dy, dx);

      if (dist < this.speed * dt) {
        this.hit(enemies);
        return;
      }
      this.x += (dx / dist) * this.speed * dt;
      this.y += (dy / dist) * this.speed * dt;
    } else {
      // 目标已死，直线飞行
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
    }

    // 超出屏幕
    if (this.x < -50 || this.x > CANVAS_WIDTH + 50 || this.y < -50 || this.y > CANVAS_HEIGHT + 100) {
      this.alive = false;
    }
  }

  hit(enemies) {
    if (this.splashRadius > 0) {
      // 范围伤害
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        if (Math.sqrt(dx * dx + dy * dy) <= this.splashRadius) {
          e.takeDamage(this.damage);
          this.applyEffects(e);
        }
      }
      playExplosion();
    } else {
      // 单体伤害
      if (this.target && this.target.alive) {
        this.target.takeDamage(this.damage);
        this.applyEffects(this.target);
      }
    }
    this.alive = false;
  }

  applyEffects(enemy) {
    if (this.slowFactor > 0) {
      enemy.applySlow(this.slowFactor, this.slowDuration);
    }
    if (this.burnDamage > 0) {
      enemy.applyBurn(this.burnDamage, this.burnDuration);
    }
  }

  applyLaser(enemies) {
    // 直线穿透
    const dirX = Math.cos(this.angle);
    const dirY = Math.sin(this.angle);
    const range = 600;
    const hitWidth = 15;

    // 按距离排序
    const candidates = enemies
      .filter(e => e.alive)
      .map(e => {
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        const along = dx * dirX + dy * dirY;
        const perp = Math.abs(dx * (-dirY) + dy * dirX);
        return { enemy: e, along, perp };
      })
      .filter(c => c.along > 0 && c.along < range && c.perp < hitWidth + CELL_SIZE * c.enemy.size / 2)
      .sort((a, b) => a.along - b.along);

    let pierced = 0;
    for (const c of candidates) {
      if (pierced >= this.pierceCount + 1) break;
      c.enemy.takeDamage(this.damage);
      this.applyEffects(c.enemy);
      pierced++;
    }
  }

  applyChain(enemies) {
    // 连锁闪电
    const hit = [this.target];
    if (this.target && this.target.alive) {
      this.target.takeDamage(this.damage);
      this.applyEffects(this.target);
    }

    let current = this.target;
    for (let i = 0; i < this.chainCount && current; i++) {
      let nearest = null;
      let minDist = this.chainRange;
      for (const e of enemies) {
        if (!e.alive || hit.includes(e)) continue;
        const dx = e.x - current.x;
        const dy = e.y - current.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) {
          minDist = dist;
          nearest = e;
        }
      }
      if (nearest) {
        nearest.takeDamage(this.damage * 0.7);
        this.applyEffects(nearest);
        hit.push(nearest);
        current = nearest;
      }
    }
    // 存储连锁路径用于绘制
    this.chainPath = hit.map(e => ({ x: e.x, y: e.y }));
    this.chainPath.unshift({ x: this.x, y: this.y });
  }

  draw(ctx) {
    if (!this.alive && this.type !== 'electric' && this.type !== 'laser') return;

    ctx.save();

    switch (this.type) {
      case 'arrow':
        this.drawArrow(ctx);
        break;
      case 'cannon':
        this.drawCannonBall(ctx);
        break;
      case 'ice':
        this.drawIce(ctx);
        break;
      case 'electric':
        this.drawLightning(ctx);
        break;
      case 'flame':
        this.drawFlame(ctx);
        break;
      case 'laser':
        this.drawLaserBeam(ctx);
        break;
    }

    ctx.restore();
  }

  drawArrow(ctx) {
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -3);
    ctx.lineTo(-4, 3);
    ctx.closePath();
    ctx.fill();
  }

  drawCannonBall(ctx) {
    // 轨迹
    ctx.strokeStyle = 'rgba(100,100,100,0.3)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      if (i === 0) ctx.moveTo(t.x, t.y);
      else ctx.lineTo(t.x, t.y);
    }
    ctx.stroke();

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  drawIce(ctx) {
    ctx.translate(this.x, this.y);
    ctx.fillStyle = 'rgba(0,191,255,0.7)';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    // 冰晶光芒
    ctx.strokeStyle = 'rgba(0,191,255,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI * 2 / 4) * i + Date.now() * 0.003;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * 8, Math.sin(a) * 8);
      ctx.stroke();
    }
  }

  drawLightning(ctx) {
    if (!this.chainPath || this.chainPath.length < 2) return;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(this.chainPath[0].x, this.chainPath[0].y);
    for (let i = 1; i < this.chainPath.length; i++) {
      const p = this.chainPath[i];
      // 锯齿形闪电
      const prev = this.chainPath[i - 1];
      const midX = (prev.x + p.x) / 2 + (Math.random() - 0.5) * 20;
      const midY = (prev.y + p.y) / 2 + (Math.random() - 0.5) * 20;
      ctx.quadraticCurveTo(midX, midY, p.x, p.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 每个节点闪光
    for (const p of this.chainPath) {
      ctx.fillStyle = 'rgba(255,215,0,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawFlame(ctx) {
    // 火焰粒子轨迹
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = i / this.trail.length * 0.5;
      const r = 2 + (i / this.trail.length) * 3;
      ctx.fillStyle = `rgba(255,${60 + i * 15},0,${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x + (Math.random() - 0.5) * 4, t.y + (Math.random() - 0.5) * 4, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#FF6347';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  drawLaserBeam(ctx) {
    if (!this.target) return;
    const tx = this.target.x;
    const ty = this.target.y;

    // 光束
    ctx.strokeStyle = 'rgba(255,0,255,0.6)';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#FF00FF';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,200,255,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ==================== 敌人系统 ====================


let enemyIdCounter = 0;

class Enemy {
  constructor(type, waveMultiplier = 1) {
    this.id = enemyIdCounter++;
    const def = ENEMY_TYPES[type];
    this.type = type;
    this.name = def.name;
    this.maxHp = Math.floor(def.hp * waveMultiplier);
    this.hp = this.maxHp;
    this.baseSpeed = def.speed;
    this.speed = def.speed;
    this.reward = def.reward;
    this.color = def.color;
    this.size = def.size;
    this.armor = def.armor;
    this.flying = def.flying || false;
    this.healAmount = def.healAmount || 0;
    this.healRange = (def.healRange || 0) * CELL_SIZE;
    this.healInterval = def.healInterval || 0;
    this.healCooldown = 0;

    this.alive = true;
    this.reachedEnd = false;

    // 路径跟随
    this.pathIndex = 0;
    this.pathProgress = 0;
    this.x = pathPixels[0].x;
    this.y = pathPixels[0].y;

    // 状态效果
    this.slowTimer = 0;
    this.slowFactor = 1;
    this.burnTimer = 0;
    this.burnDamage = 0;
    this.burnTickTimer = 0;

    // 可视化
    this.hitFlash = 0;
    this.deathTimer = 0;
  }

  update(dt, enemies) {
    if (!this.alive) {
      this.deathTimer += dt;
      return;
    }

    // 状态效果：减速
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.speed = this.baseSpeed * this.slowFactor;
      if (this.slowTimer <= 0) {
        this.speed = this.baseSpeed;
      }
    }

    // 状态效果：灼烧DOT
    if (this.burnTimer > 0) {
      this.burnTimer -= dt;
      this.burnTickTimer -= dt;
      if (this.burnTickTimer <= 0) {
        this.takeDamage(this.burnDamage, true);
        this.burnTickTimer = 0.5; // 每0.5秒一次DOT
      }
    }

    // 治疗能力
    if (this.healAmount > 0) {
      this.healCooldown -= dt;
      if (this.healCooldown <= 0) {
        this.healNearby(enemies);
        this.healCooldown = this.healInterval;
      }
    }

    // 沿路径移动
    if (this.pathIndex < pathPixels.length - 1) {
      const target = pathPixels[this.pathIndex + 1];
      const dx = target.x - this.x;
      const dy = target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const moveSpeed = this.speed * CELL_SIZE * dt;

      if (dist <= moveSpeed) {
        this.x = target.x;
        this.y = target.y;
        this.pathIndex++;
        this.pathProgress = this.pathIndex / (pathPixels.length - 1);
      } else {
        this.x += (dx / dist) * moveSpeed;
        this.y += (dy / dist) * moveSpeed;
        this.pathProgress = (this.pathIndex + (1 - dist / CELL_SIZE)) / (pathPixels.length - 1);
      }
    }

    // 到达终点
    if (this.pathIndex >= pathPixels.length - 1) {
      this.reachedEnd = true;
      this.alive = false;
    }

    // 受击闪烁
    if (this.hitFlash > 0) this.hitFlash -= dt * 5;
  }

  takeDamage(amount, ignoreArmor = false) {
    let dmg = amount;
    if (!ignoreArmor && this.armor > 0) {
      dmg = Math.max(1, amount - this.armor);
    }
    this.hp -= dmg;
    this.hitFlash = 1;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
    }
  }

  applySlow(factor, duration) {
    // 取更强的减速
    if (factor < this.slowFactor || this.slowTimer <= 0) {
      this.slowFactor = factor;
    }
    this.slowTimer = Math.max(this.slowTimer, duration);
  }

  applyBurn(damage, duration) {
    this.burnDamage = damage;
    this.burnTimer = duration;
    this.burnTickTimer = 0.5;
  }

  healNearby(enemies) {
    let healed = false;
    for (const e of enemies) {
      if (e === this || !e.alive) continue;
      const dx = e.x - this.x;
      const dy = e.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= this.healRange) {
        e.hp = Math.min(e.maxHp, e.hp + this.healAmount);
        healed = true;
      }
    }
    // 治疗自身
    if (healed) {
      this.hp = Math.min(this.maxHp, this.hp + this.healAmount);
    }
  }

  draw(ctx) {
    const s = this.size * CELL_SIZE;
    const now = Date.now();

    ctx.save();
    ctx.translate(this.x, this.y);

    // 死亡动画
    if (!this.alive && this.deathTimer < 0.3) {
      const alpha = 1 - this.deathTimer / 0.3;
      ctx.globalAlpha = alpha;
      const scale = 1 + this.deathTimer * 3;
      ctx.scale(scale, scale);
    } else if (!this.alive) {
      ctx.restore();
      return;
    }

    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(2, s / 2 + 2, s / 2, s / 4, 0, 0, Math.PI * 2);
    ctx.fill();

    const flash = this.hitFlash > 0;

    // 按类型绘制不同外观
    switch (this.type) {
      case 'normal': this._drawSoldier(ctx, s, flash, now); break;
      case 'fast': this._drawRunner(ctx, s, flash, now); break;
      case 'flying': this._drawFairy(ctx, s, flash, now); break;
      case 'armored': this._drawTank(ctx, s, flash, now); break;
      case 'healer': this._drawPriest(ctx, s, flash, now); break;
      case 'boss': this._drawDemon(ctx, s, flash, now); break;
      default:
        ctx.fillStyle = flash ? '#fff' : this.color;
        ctx.beginPath(); ctx.arc(0, 0, s / 2, 0, Math.PI * 2); ctx.fill();
    }

    // 减速效果
    if (this.slowTimer > 0) {
      ctx.strokeStyle = 'rgba(0,191,255,0.6)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const a = (now * 0.003 + i * 2.1) % (Math.PI * 2);
        const r = s / 2 + 3;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // 灼烧效果
    if (this.burnTimer > 0) {
      for (let i = 0; i < 3; i++) {
        const fx = (Math.random() - 0.5) * s * 0.8;
        const fy = -s / 3 + (Math.random() - 0.5) * s * 0.5;
        ctx.fillStyle = `rgba(255,${80 + Math.random() * 120},0,${0.4 + Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.arc(fx, fy, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();

    // 血条
    if (this.alive && this.hp < this.maxHp) {
      const barW = s * 1.2;
      const barH = 4;
      const barX = this.x - barW / 2;
      const barY = this.y - s / 2 - 10;
      const hpRatio = this.hp / this.maxHp;

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
      ctx.fillStyle = hpRatio > 0.5 ? '#2ecc71' : hpRatio > 0.25 ? '#f39c12' : '#e74c3c';
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
    }
  }

  // --- 普通：小兵（盾牌+头盔） ---
  _drawSoldier(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    // 身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(0, 2, s / 2, 0, Math.PI * 2);
    ctx.fill();
    // 头盔
    ctx.fillStyle = flash ? '#eee' : '#c0392b';
    ctx.beginPath();
    ctx.arc(0, -3, s / 2.5, Math.PI, 0);
    ctx.fill();
    // 盾牌
    ctx.fillStyle = flash ? '#ddd' : '#7f8c8d';
    ctx.beginPath();
    ctx.ellipse(-s / 2 - 2, 2, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3, -1, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -1, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-2, -1, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -1, 1.2, 0, Math.PI * 2); ctx.fill();
  }

  // --- 快速：冲刺者（流线型+速度线） ---
  _drawRunner(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    // 身体（椭圆流线型）
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(0, 0, s / 2.5, s / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // 尖角头饰
    ctx.fillStyle = flash ? '#eee' : '#e67e22';
    ctx.beginPath();
    ctx.moveTo(s / 2, 0);
    ctx.lineTo(s / 2 + 5, -3);
    ctx.lineTo(s / 2 + 5, 3);
    ctx.closePath();
    ctx.fill();
    // 速度线
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.4)' : 'rgba(243,156,18,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const lx = -s / 2 - 4 - i * 4;
      const ly = -3 + i * 3;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - 6, ly); ctx.stroke();
    }
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(2, -2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(3, -2, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 2, 1, 0, Math.PI * 2); ctx.fill();
  }

  // --- 飞行：精灵（翅膀+光环） ---
  _drawFairy(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    const wingFlap = Math.sin(now * 0.008) * 8;
    // 翅膀
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.4)' : 'rgba(155,89,182,0.5)';
    ctx.beginPath();
    ctx.ellipse(-s / 2 - 2, -2 + wingFlap, 5, 9, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s / 2 + 2, -2 - wingFlap, 5, 9, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // 光环
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.5)' : 'rgba(155,89,182,0.4)';
    ctx.lineWidth = 1.5;
    const haloPulse = Math.sin(now * 0.005) * 2;
    ctx.beginPath();
    ctx.arc(0, -s / 2 - 4 + haloPulse, 4, 0, Math.PI * 2);
    ctx.stroke();
    // 身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 魔法光点
    for (let i = 0; i < 3; i++) {
      const a = now * 0.004 + i * 2.1;
      const r = s / 2 + 5;
      ctx.fillStyle = `rgba(155,89,182,${0.3 + Math.sin(now * 0.005 + i) * 0.2})`;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-2, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-1.5, -1, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2.5, -1, 1, 0, Math.PI * 2); ctx.fill();
  }

  // --- 装甲：坦克（履带+炮塔+铆钉） ---
  _drawTank(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    // 履带
    ctx.fillStyle = flash ? '#bbb' : '#555';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-s / 2 - 2, -s / 3, s + 4, s * 0.7, 4);
    else ctx.rect(-s / 2 - 2, -s / 3, s + 4, s * 0.7);
    ctx.fill();
    // 履带纹理
    ctx.strokeStyle = flash ? '#999' : '#444';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const ty = -s / 3 + 3 + i * (s * 0.7 / 4);
      ctx.beginPath(); ctx.moveTo(-s / 2, ty); ctx.lineTo(-s / 2 + 6, ty); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s / 2 - 6, ty); ctx.lineTo(s / 2, ty); ctx.stroke();
    }
    // 车身
    ctx.fillStyle = c;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-s / 3, -s / 4, s * 0.65, s * 0.5, 3);
    else ctx.rect(-s / 3, -s / 4, s * 0.65, s * 0.5);
    ctx.fill();
    // 炮塔
    ctx.fillStyle = flash ? '#ddd' : '#666';
    ctx.beginPath();
    ctx.arc(0, 0, s / 4, 0, Math.PI * 2);
    ctx.fill();
    // 炮管
    ctx.strokeStyle = flash ? '#aaa' : '#444';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(s / 2 + 4, 0); ctx.stroke();
    // 铆钉
    ctx.fillStyle = flash ? '#ccc' : '#888';
    const rivets = [[-s/4, -s/5], [-s/4, s/5], [s/6, -s/5], [s/6, s/5]];
    for (const [rx, ry] of rivets) {
      ctx.beginPath(); ctx.arc(rx, ry, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // --- 治疗：牧师（法杖+治愈光环） ---
  _drawPriest(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    // 治愈光环
    const pulse = Math.sin(now * 0.005) * 4;
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.4)' : 'rgba(46,204,113,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, this.healRange / CELL_SIZE * s + pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(46,204,113,0.15)';
    ctx.beginPath();
    ctx.arc(0, 0, this.healRange / CELL_SIZE * s + pulse + 4, 0, Math.PI * 2);
    ctx.stroke();
    // 长袍身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(-s / 3, s / 3);
    ctx.lineTo(-s / 4, -s / 3);
    ctx.lineTo(s / 4, -s / 3);
    ctx.lineTo(s / 3, s / 3);
    ctx.closePath();
    ctx.fill();
    // 头
    ctx.fillStyle = flash ? '#eee' : '#27ae60';
    ctx.beginPath(); ctx.arc(0, -s / 3 - 2, s / 5, 0, Math.PI * 2); ctx.fill();
    // 法杖
    ctx.strokeStyle = flash ? '#ccc' : '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(s / 4, -s / 4); ctx.lineTo(s / 4 + 2, s / 3 + 3); ctx.stroke();
    // 法杖宝石
    ctx.fillStyle = flash ? '#fff' : '#2ecc71';
    ctx.beginPath(); ctx.arc(s / 4, -s / 4 - 3, 3, 0, Math.PI * 2); ctx.fill();
    // 十字标记
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.6)' : 'rgba(46,204,113,0.6)';
    ctx.fillRect(-1, -s / 3 - 6, 2, 6);
    ctx.fillRect(-3, -s / 3 - 4, 6, 2);
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-2, -s / 3 - 2, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -s / 3 - 2, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // --- Boss：恶魔（双角+翅膀+核心+威压光环） ---
  _drawDemon(ctx, s, flash, now) {
    const c = flash ? '#fff' : this.color;
    // 威压光环
    const auraPulse = Math.sin(now * 0.003) * 6;
    ctx.fillStyle = 'rgba(192,57,43,0.15)';
    ctx.beginPath();
    ctx.arc(0, 0, s / 2 + 10 + auraPulse, 0, Math.PI * 2);
    ctx.fill();
    // 翅膀
    ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(139,0,0,0.6)';
    ctx.beginPath();
    ctx.moveTo(-s / 3, 0);
    ctx.quadraticCurveTo(-s / 2 - 8, -s / 2 - 5, -s / 2 - 4, s / 4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s / 3, 0);
    ctx.quadraticCurveTo(s / 2 + 8, -s / 2 - 5, s / 2 + 4, s / 4);
    ctx.closePath();
    ctx.fill();
    // 身体
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
    ctx.fill();
    // 装甲层
    ctx.fillStyle = flash ? '#ddd' : '#922';
    ctx.beginPath();
    ctx.arc(0, 0, s / 2, -0.8, 0.8);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, s / 2, Math.PI - 0.8, Math.PI + 0.8);
    ctx.fill();
    // 双角
    ctx.fillStyle = flash ? '#ccc' : '#8B0000';
    ctx.beginPath();
    ctx.moveTo(-5, -s / 2 + 2);
    ctx.lineTo(-10, -s / 2 - 12);
    ctx.lineTo(-1, -s / 2 - 3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -s / 2 + 2);
    ctx.lineTo(10, -s / 2 - 12);
    ctx.lineTo(1, -s / 2 - 3);
    ctx.closePath();
    ctx.fill();
    // 核心（发光）
    const coreGlow = Math.sin(now * 0.006) * 0.3 + 0.7;
    ctx.fillStyle = flash ? '#fff' : `rgba(255,50,50,${coreGlow})`;
    ctx.beginPath();
    ctx.arc(0, 0, s / 5, 0, Math.PI * 2);
    ctx.fill();
    // 眼睛（恶魔红眼）
    ctx.fillStyle = flash ? '#fff' : '#ff0';
    ctx.beginPath(); ctx.arc(-4, -3, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -3, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-3, -3, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

// ==================== 波次系统 ====================


/** 生成30波敌人配置 */
function generateWaveConfigs() {
  const waves = [];

  for (let w = 1; w <= 30; w++) {
    const enemies = [];
    const hpMult = 1 + (w - 1) * 0.15; // 每波血量增加15%

    // 基础数量随波次增加
    const baseCount = Math.min(5 + Math.floor(w * 1.2), 30);

    // 每5波Boss
    if (w % 5 === 0) {
      // Boss波
      for (let i = 0; i < Math.floor(w / 10) + 1; i++) {
        enemies.push({ type: 'boss', delay: i * 2 });
      }
      // 配一些小兵
      for (let i = 0; i < baseCount / 2; i++) {
        enemies.push({ type: 'normal', delay: i * 0.8 });
      }
    } else {
      // 根据波次解锁不同敌人
      for (let i = 0; i < baseCount; i++) {
        let type = 'normal';
        const roll = Math.random();

        if (w >= 3 && roll < 0.3) {
          type = 'fast';
        }
        if (w >= 6 && roll < 0.2) {
          type = 'flying';
        }
        if (w >= 10 && roll < 0.15) {
          type = 'armored';
        }
        if (w >= 14 && roll < 0.1) {
          type = 'healer';
        }

        enemies.push({ type, delay: i * 0.6 });
      }
    }

    waves.push({
      number: w,
      enemies,
      hpMultiplier: hpMult,
      bonusGold: w * 15
    });
  }

  return waves;
}

class WaveManager {
  constructor() {
    this.waves = generateWaveConfigs();
    this.currentWave = 0;
    this.spawnQueue = [];
    this.spawnTimer = 0;
    this.waveActive = false;
    this.allWavesComplete = false;
    this.betweenWaves = true;
    this.betweenWaveTimer = 5; // 5秒间隔
    this.pendingEnemies = [];
  }

  get totalWaves() {
    return this.waves.length;
  }

  get waveNumber() {
    return this.currentWave + 1;
  }

  get isLastWave() {
    return this.currentWave >= this.waves.length;
  }

  startNextWave() {
    if (this.currentWave >= this.waves.length) {
      this.allWavesComplete = true;
      return [];
    }

    const wave = this.waves[this.currentWave];
    this.spawnQueue = [...wave.enemies].sort((a, b) => a.delay - b.delay);
    this.spawnTimer = 0;
    this.waveActive = true;
    this.betweenWaves = false;
    this.pendingEnemies = [];

    return wave;
  }

  update(dt, spawnCallback) {
    if (this.betweenWaves && !this.allWavesComplete) {
      this.betweenWaveTimer -= dt;
      if (this.betweenWaveTimer <= 0) {
        this.startNextWave();
        return null; // 返回null表示波次刚开始
      }
      return;
    }

    if (!this.waveActive) return;

    this.spawnTimer += dt;

    // 生成敌人
    while (this.spawnQueue.length > 0 && this.spawnQueue[0].delay <= this.spawnTimer) {
      const spawn = this.spawnQueue.shift();
      const wave = this.waves[this.currentWave];
      const enemy = new Enemy(spawn.type, wave.hpMultiplier);
      spawnCallback(enemy);
    }

    // 检查波次是否结束（所有敌人已生成且场上无存活敌人）
    if (this.spawnQueue.length === 0) {
      return 'spawning_done'; // 通知main.js检查是否所有敌人已消灭
    }
  }

  waveCleared() {
    const bonus = this.waves[this.currentWave]?.bonusGold || 0;
    this.currentWave++;
    this.waveActive = false;

    if (this.currentWave >= this.waves.length) {
      this.allWavesComplete = true;
      return bonus;
    }

    this.betweenWaves = true;
    this.betweenWaveTimer = 8;
    return bonus;
  }

  skipWait() {
    if (this.betweenWaves) {
      this.betweenWaveTimer = 0;
    }
  }
}

let _canvas = null;

function initUI(canvas) {
  _canvas = canvas;

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    uiState.hoveredCell = {
      col: Math.floor(mx / CELL_SIZE),
      row: Math.floor(my / CELL_SIZE),
      x: mx,
      y: my
    };
  });

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    handleClick(mx, my);
  });

  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    // 右键取消选择
    uiState.selectedTowerType = null;
    uiState.selectedTower = null;
  });
}

function handleClick(mx, my) {
  // 开始菜单
  if (uiState.showStartMenu) {
    // 地图选择
    if (uiState._mapBtnRects) {
      for (const r of uiState._mapBtnRects) {
        if (hitTest(mx, my, r)) {
          uiState.selectedMapIndex = r.index;
          onMapSelect?.(r.index);
          return;
        }
      }
    }
    if (uiState._startBtnRect && hitTest(mx, my, uiState._startBtnRect)) {
      uiState.showStartMenu = false;
      uiState.isRunning = true;
      onStartGame?.();
    }
    return;
  }

  // 游戏结束/胜利
  if (uiState.showGameOver || uiState.showVictory) {
    if (uiState._restartBtnRect && hitTest(mx, my, uiState._restartBtnRect)) {
      // 重新加载页面
      location.reload();
    }
    return;
  }

  // 暂停按钮
  if (uiState._pauseRect && hitTest(mx, my, uiState._pauseRect)) {
    uiState.isPaused = !uiState.isPaused;
    onPauseToggle?.();
    return;
  }

  // 下一波按钮
  if (uiState._nextWaveRect && hitTest(mx, my, uiState._nextWaveRect)) {
    onSkipWait?.();
    return;
  }

  // 塔选择面板
  for (const item of towerPanelItems) {
    if (item._rect && hitTest(mx, my, item._rect)) {
      if (uiState.selectedTowerType === item.key) {
        uiState.selectedTowerType = null;
      } else {
        uiState.selectedTowerType = item.key;
        uiState.selectedTower = null;
      }
      onTowerSelect?.(item.key);
      return;
    }
  }

  // 速度按钮
  if (GAME_SPEEDS._rects) {
    for (const r of GAME_SPEEDS._rects) {
      if (r && hitTest(mx, my, r)) {
        uiState.gameSpeed = r.speed;
        onSpeedChange?.(r.speed);
        return;
      }
    }
  }

  // 升级按钮
  if (uiState._upgradeRect && hitTest(mx, my, uiState._upgradeRect)) {
    onTowerUpgrade?.();
    return;
  }

  // 出售按钮
  if (uiState._sellRect && hitTest(mx, my, uiState._sellRect)) {
    onTowerSell?.();
    return;
  }

  // 点击地图
  if (my < CANVAS_HEIGHT) {
    const col = Math.floor(mx / CELL_SIZE);
    const row = Math.floor(my / CELL_SIZE);

    if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
      if (uiState.selectedTowerType) {
        // 建造塔
        onTowerPlace?.(col, row);
      } else {
        // 选择已建造的塔
        onTowerSelect?.(null, col, row);
      }
    }
  }
}

function hitTest(mx, my, rect) {
  return mx >= rect.x && mx <= rect.x + rect.w &&
         my >= rect.y && my <= rect.y + rect.h;
}

// ---- 悬停提示 ----
function drawHoverInfo(ctx) {
  if (!uiState.hoveredCell || uiState.showStartMenu) return;
  const { x, y, col, row } = uiState.hoveredCell;
  if (y >= CANVAS_HEIGHT) return;

  // 建造预览
  if (uiState.selectedTowerType) {
    const px = col * CELL_SIZE;
    const py = row * CELL_SIZE;
    ctx.strokeStyle = 'rgba(46,204,113,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);

    // 射程预览
    const type = TOWER_TYPES[uiState.selectedTowerType];
    const range = type.levels[0].range * CELL_SIZE;
    ctx.beginPath();
    ctx.arc(px + CELL_SIZE / 2, py + CELL_SIZE / 2, range, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.stroke();
  }
}

// ---- 主绘制 ----
function drawUI(ctx) {
  drawHUD(ctx);
  drawTowerPanel(ctx);
  drawTowerInfo(ctx);
  drawHoverInfo(ctx);

  if (uiState.showStartMenu) {
    drawStartMenu(ctx);
  } else if (uiState.showVictory) {
    drawVictory(ctx);
  } else if (uiState.showGameOver) {
    drawGameOver(ctx);
  } else if (uiState.isPaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('已暂停', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
  }
}

// === main.js ===
// ==================== 游戏主循环 ====================


// ---- 游戏状态 ----
let canvas, ctx;
let towers = [];
let enemies = [];
let projectiles = [];
let particles = [];
let waveManager;
let lastTime = 0;
let gameStarted = false;

// ---- 粒子效果 ----
class Particle {
  constructor(x, y, color, life = 0.5, vx = 0, vy = 0, size = 3) {
    this.x = x;
    this.y = y;
    this.vx = vx + (Math.random() - 0.5) * 60;
    this.vy = vy + (Math.random() - 0.5) * 60;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.alive = true;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 80 * dt; // 重力
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ---- 初始化 ----
function init() {
  canvas = document.getElementById('gameCanvas');
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT + 100; // 额外100px给面板
  ctx = canvas.getContext('2d');

  // 使用默认地图初始化
  initMap(MAPS[0].path);
  initUI(canvas);
  waveManager = new WaveManager();

  setCallbacks({
    onStartGame: startGame,
    onPauseToggle: () => {},
    onSpeedChange: (spd) => { uiState.gameSpeed = spd; },
    onSkipWait: () => { waveManager.skipWait(); },
    onTowerSelect: handleTowerSelect,
    onTowerPlace: handleTowerPlace,
    onTowerUpgrade: handleTowerUpgrade,
    onTowerSell: handleTowerSell,
    onMapSelect: handleMapSelect
  });

  requestAnimationFrame(gameLoop);
}

// ---- 回调处理 ----
function handleMapSelect(index) {
  selectMap(index);
  // 重新初始化地图
  initMap(MAPS[index].path);
}

function startGame() {
  initAudio();
  // 使用选中的地图重新初始化
  const mapIndex = uiState.selectedMapIndex || 0;
  initMap(MAPS[mapIndex].path);
  gameStarted = true;
  waveManager = new WaveManager();
  waveManager.startNextWave();
  uiState.waveNumber = 1;
  playWaveStart();
}

function handleTowerSelect(key, col, row) {
  if (key) {
    uiState.selectedTowerType = key;
    uiState.selectedTower = null;
    return;
  }
  // 点击地图上的塔
  if (col !== undefined) {
    const tower = towers.find(t => t.col === col && t.row === row);
    if (tower) {
      uiState.selectedTower = tower;
      uiState.selectedTowerType = null;
    } else {
      uiState.selectedTower = null;
    }
  }
}

function handleTowerPlace(col, row) {
  const type = uiState.selectedTowerType;
  if (!type) return;
  const cost = TOWER_TYPES[type].levels[0].cost;
  if (uiState.gold < cost) return;
  if (!canBuild(col, row)) return;

  uiState.gold -= cost;
  placeTower(col, row);
  const tower = new Tower(type, col, row);
  towers.push(tower);
  uiState.towerCount++;
  uiState.selectedTower = tower;
  uiState.selectedTowerType = null;
  playBuild();
}

function handleTowerUpgrade() {
  const tower = uiState.selectedTower;
  if (!tower || !tower.canUpgrade()) return;
  const cost = tower.upgradeCost;
  if (uiState.gold < cost) return;

  uiState.gold -= cost;
  tower.upgrade();
  playUpgrade();
}

function handleTowerSell() {
  const tower = uiState.selectedTower;
  if (!tower) return;

  uiState.gold += tower.sellValue;
  removeTower(tower.col, tower.row);
  towers = towers.filter(t => t !== tower);
  uiState.selectedTower = null;
  uiState.towerCount--;
  playSell();
}

// ---- 游戏循环 ----
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05) * uiState.gameSpeed;
  lastTime = timestamp;

  if (gameStarted && !uiState.isPaused && !uiState.showStartMenu) {
    update(dt);
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ---- 更新逻辑 ----
function update(dt) {
  if (uiState.showGameOver || uiState.showVictory) return;

  // 更新波次
  const waveResult = waveManager.update(dt, (enemy) => {
    enemies.push(enemy);
  });

  // 更新塔（创建投射物）
  for (const tower of towers) {
    const fireData = tower.update(dt, enemies);
    if (fireData) {
      projectiles.push(new Projectile(fireData));
    }
  }

  // 更新投射物（造成伤害）
  for (const proj of projectiles) {
    proj.update(dt, enemies);
  }

  // 更新敌人（移动、状态效果、死亡动画）
  const reachedEndList = [];
  const diedList = [];
  for (const enemy of enemies) {
    const wasAlive = enemy.alive;
    enemy.update(dt, enemies);

    // 敌人到达终点
    if (enemy.reachedEnd && wasAlive) {
      reachedEndList.push(enemy);
    }

    // 敌人死亡（被击杀）
    if (!enemy.alive && !enemy.reachedEnd && wasAlive) {
      diedList.push(enemy);
    }
  }

  // 处理到达终点的敌人
  for (const _ of reachedEndList) {
    uiState.lives--;
    if (uiState.lives <= 0) {
      uiState.lives = 0;
      uiState.showGameOver = true;
      playDefeat();
      return;
    }
  }

  // 处理被击杀的敌人（奖励）
  for (const enemy of diedList) {
    uiState.gold += enemy.reward;
    uiState.score += enemy.reward;
    uiState.killCount++;
    spawnParticles(enemy.x, enemy.y, 'rgb(255,100,50)', 12);
    playEnemyDeath();
  }

  // 更新粒子
  for (const p of particles) {
    p.update(dt);
  }

  // 清理
  enemies = enemies.filter(e => e.alive || e.deathTimer < 0.3);
  projectiles = projectiles.filter(p => p.alive);
  particles = particles.filter(p => p.alive);

  // 波次生成完毕，检查是否全部消灭
  if (waveResult === 'spawning_done') {
    const aliveEnemies = enemies.filter(e => e.alive);
    if (aliveEnemies.length === 0) {
      const bonus = waveManager.waveCleared();
      uiState.gold += bonus;
      uiState.waveNumber = waveManager.waveNumber;

      if (waveManager.allWavesComplete) {
        uiState.showVictory = true;
        playVictory();
        return;
      }

      playWaveStart();
    }
  }

  // 更新UI状态
  uiState.enemyCount = enemies.filter(e => e.alive).length;
}

// ---- 渲染 ----
function render() {
  // 清除画布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 暗色背景
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制地图
  drawMap(ctx);

  // 绘制塔
  for (const tower of towers) {
    tower.draw(ctx, tower === uiState.selectedTower);
  }

  // 绘制敌人
  for (const enemy of enemies) {
    enemy.draw(ctx);
  }

  // 绘制投射物
  for (const proj of projectiles) {
    proj.draw(ctx);
  }

  // 绘制粒子
  for (const p of particles) {
    p.draw(ctx);
  }

  // 绘制UI（覆盖层）
  drawUI(ctx);
}

// ---- 启动 ----
document.addEventListener('DOMContentLoaded', init);


</script>
