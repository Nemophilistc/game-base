<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordGuess - 猜词游戏</title>
  <style>
    /* ===== 基础样式 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #121213;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 标题栏 ===== */
    .header {
      width: 100%;
      max-width: 500px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3a3a3c;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mode-label {
      font-size: 12px;
      padding: 4px 8px;
      background: #538d4e;
      border-radius: 4px;
      font-weight: 600;
    }

    .daily-badge {
      font-size: 10px;
      padding: 2px 6px;
      background: #b59f3b;
      border-radius: 4px;
      font-weight: 600;
      display: none;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .icon-btn:hover {
      opacity: 1;
    }

    /* ===== 工具栏 ===== */
    .toolbar {
      width: 100%;
      max-width: 500px;
      padding: 8px 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-btn {
      font-size: 12px;
      padding: 6px 12px;
      background: #3a3a3c;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .tool-btn:hover {
      background: #565658;
    }

    .tool-btn.active {
      background: #538d4e;
    }

    /* ===== 消息区域 ===== */
    #message-container {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .message {
      padding: 12px 20px;
      background: #ffffff;
      color: #121213;
      font-size: 14px;
      font-weight: 600;
      border-radius: 4px;
      animation: slideDown 0.3s ease;
    }

    .message-success { background: #538d4e; color: #fff; }
    .message-error { background: #c0392b; color: #fff; }
    .message-info { background: #565658; color: #fff; }
    .message.fade-out { opacity: 0; transition: opacity 0.3s; }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ===== 游戏板 ===== */
    #board {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
    }

    .board-row {
      display: flex;
      gap: 5px;
    }

    .cell {
      width: 62px;
      height: 62px;
      perspective: 600px;
    }

    .cell-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }

    .cell.flipping .cell-inner {
      transform: rotateX(180deg);
    }

    .cell-front, .cell-back {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      backface-visibility: hidden;
      border: 2px solid #3a3a3c;
    }

    .cell-front {
      background: #121213;
    }

    .cell.filled .cell-front {
      border-color: #565658;
    }

    .cell-back {
      transform: rotateX(180deg);
    }

    .cell-back.correct {
      background: #538d4e;
      border-color: #538d4e;
    }

    .cell-back.present {
      background: #b59f3b;
      border-color: #b59f3b;
    }

    .cell-back.absent {
      background: #3a3a3c;
      border-color: #3a3a3c;
    }

    /* 抖动动画 */
    .shake {
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-4px); }
      30%, 70% { transform: translateX(4px); }
    }

    /* 弹跳动画 */
    .bounce {
      animation: bounce 0.5s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* ===== 键盘 ===== */
    #keyboard {
      width: 100%;
      max-width: 500px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      min-width: 35px;
      height: 52px;
      background: #818384;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      text-transform: uppercase;
    }

    .key:hover {
      background: #6a6a6c;
    }

    .key-wide {
      min-width: 65px;
      font-size: 12px;
    }

    .key.correct {
      background: #538d4e;
    }

    .key.present {
      background: #b59f3b;
    }

    .key.absent {
      background: #3a3a3c;
    }

    /* 中文输入区域 */
    .chinese-input-area {
      text-align: center;
      padding: 16px;
    }

    .input-hint {
      font-size: 14px;
      color: #818384;
      margin-bottom: 12px;
    }

    /* 隐藏的中文输入框 */
    #chinese-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #1a1a1b;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-title.win { color: #538d4e; }
    .modal-title.lose { color: #c0392b; }

    .modal-answer {
      font-size: 16px;
      color: #818384;
      margin-bottom: 8px;
    }

    .modal-stats {
      font-size: 14px;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {

      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-primary {
      background: #538d4e;
      color: #ffffff;
    }

    .btn-secondary {
      background: #565658;
      color: #ffffff;
    }

    /* ===== 统计面板 ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 11px;
      color: #818384;
    }

    .guess-distribution {
      margin-bottom: 20px;
    }

    .dist-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .dist-label {
      width: 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .dist-bar {
      background: #3a3a3c;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      min-width: 30px;
      text-align: right;
      border-radius: 2px;
    }

    .close-btn {
      background: #538d4e;
      color: #ffffff;
      border: none;
      padding: 12px 32px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 400px) {
      .cell {

        height: 52px;

      .cell-front, .cell-back {
        font-size: 22px;
      }

      .key {
        min-width: 28px;
        height: 48px;
        font-size: 12px;
      }

      .key-wide {
        min-width: 52px;
      }
    }

// === ./sound.js ===
// sound.js - Web Audio API 音效系统

let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(frequency, duration, type = 'sine', volume = 0.3) {
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(frequency, ctx.currentTime);

  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

// 键盘输入音效 - 短促清脆
function playKeyInput() {
  playTone(600, 0.08, 'sine', 0.15);
}

// 格子翻转音效 - 柔和
function playFlip() {
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.15);

  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.2);
}

// 猜对胜利音效 - 欢快上升
function playWin() {
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    setTimeout(() => playTone(freq, 0.3, 'sine', 0.2), i * 120);
  });
}

// 猜错失败音效 - 低沉下降
function playLose() {
  const notes = [400, 350, 300, 250];
  notes.forEach((freq, i) => {
    setTimeout(() => playTone(freq, 0.25, 'triangle', 0.2), i * 200);
  });
}

// 错误输入音效 - 警告
function playError() {
  playTone(200, 0.15, 'square', 0.1);
}

// 删除音效
function playDelete() {
  playTone(350, 0.06, 'sine', 0.1);
}

/**
 * 根据模式获取词库
 * @param {string} mode - 'chinese' 或 'english'
 * @returns {string[]}
 */
function getWordList(mode) {
  return mode === 'chinese' ? CHINESE_WORDS : ENGLISH_WORDS;
}

/**
 * 验证猜测是否在词库中
 * @param {string} guess - 猜测的词
 * @param {string} mode - 游戏模式
 * @returns {boolean}
 */
function isValidWord(guess, mode) {
  const list = getWordList(mode);
  return list.includes(guess.toLowerCase());
}

// board.js - 猜测板逻辑（输入、验证、颜色标记）


/**
 * 创建游戏板状态
 * @param {string} answer - 目标答案
 * @returns {object} 游戏板状态
 */
function createBoard(answer) {
  return {
    answer: answer.toLowerCase(),
    guesses: [],          // 已提交的猜测 [{word, colors}]
    currentGuess: '',     // 当前输入的猜测
    currentRow: 0,        // 当前行
    gameState: GAME_STATE.PLAYING,
    letterStates: {},     // 字母状态 {letter: color}
  };
}

/**
 * 添加字母到当前猜测
 * @param {object} board - 游戏板状态
 * @param {string} letter - 要添加的字母/汉字
 * @returns {boolean} 是否成功添加
 */
function addLetter(board, letter) {
  if (board.gameState !== GAME_STATE.PLAYING) return false;
  if (board.currentGuess.length >= WORD_LENGTH) return false;

  board.currentGuess += letter;
  return true;
}

/**
 * 删除最后一个字母
 * @param {object} board - 游戏板状态
 * @returns {boolean} 是否成功删除
 */
function deleteLetter(board) {
  if (board.gameState !== GAME_STATE.PLAYING) return false;
  if (board.currentGuess.length === 0) return false;

  board.currentGuess = board.currentGuess.slice(0, -1);
  return true;
}

/**
 * 计算单个猜测的颜色反馈
 * @param {string} guess - 猜测的词
 * @param {string} answer - 目标答案
 * @returns {string[]} 颜色数组
 */
function getColors(guess, answer) {
  const colors = Array(WORD_LENGTH).fill(COLOR.ABSENT);
  const answerArr = answer.split('');
  const guessArr = guess.split('');

  // 第一遍：标记绿色（位置正确）
  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === answerArr[i]) {
      colors[i] = COLOR.CORRECT;
      answerArr[i] = null;  // 标记为已使用
      guessArr[i] = null;
    }
  }

  // 第二遍：标记黄色（存在但位置错误）
  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === null) continue;

    const idx = answerArr.indexOf(guessArr[i]);
    if (idx !== -1) {
      colors[i] = COLOR.PRESENT;
      answerArr[idx] = null;
    }
  }

  return colors;
}

/**
 * 提交猜测
 * @param {object} board - 游戏板状态
 * @param {string} mode - 游戏模式
 * @returns {object|null} 提交结果 {colors, won} 或 null（无效）
 */
function submitGuess(board, mode) {
  if (board.gameState !== GAME_STATE.PLAYING) return null;
  if (board.currentGuess.length !== WORD_LENGTH) return null;

  // 验证是否在词库中
  if (!isValidWord(board.currentGuess, mode)) {
    return { error: 'not_in_list' };
  }

  const colors = getColors(board.currentGuess, board.answer);

  // 更新字母状态
  board.currentGuess.split('').forEach((letter, i) => {
    const currentState = board.letterStates[letter];
    const newColor = colors[i];

    // 优先级：correct > present > absent
    if (newColor === COLOR.CORRECT) {
      board.letterStates[letter] = COLOR.CORRECT;
    } else if (newColor === COLOR.PRESENT && currentState !== COLOR.CORRECT) {
      board.letterStates[letter] = COLOR.PRESENT;
    } else if (!currentState) {
      board.letterStates[letter] = COLOR.ABSENT;
    }
  });

  // 保存猜测
  board.guesses.push({
    word: board.currentGuess,
    colors: colors,
  });

  // 检查是否猜对
  const won = board.currentGuess === board.answer;
  if (won) {
    board.gameState = GAME_STATE.WON;
  } else if (board.currentRow >= MAX_GUESSES - 1) {
    board.gameState = GAME_STATE.LOST;
  }

  board.currentRow++;
  board.currentGuess = '';

  return { colors, won };
}

/**
 * 获取每日挑战的词语
 * @param {string} mode - 游戏模式
 * @returns {string} 每日词语
 */
function getDailyWord(mode) {
  const wordList = getWordList(mode);
  const today = new Date();
  const seed = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff = Math.floor((seed - new Date(2024, 0, 1)) / (1000 * 60 * 60 * 24));
  const index = ((diff * 2654435761) >>> 0) % wordList.length;
  return wordList[index].toLowerCase();
}

/**
 * 获取随机词语
 * @param {string} mode - 游戏模式
 * @returns {string} 随机词语
 */
function getRandomWord(mode) {
  const wordList = getWordList(mode);
  const index = Math.floor(Math.random() * wordList.length);
  return wordList[index].toLowerCase();
}

// 英文键盘布局
const ENGLISH_ROWS = [
  ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
  ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
  ['Enter', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'Backspace'],
];

/**
 * 创建虚拟键盘
 * @param {HTMLElement} container - 键盘容器
 * @param {Function} onKeyPress - 按键回调
 * @param {string} mode - 游戏模式
 */
function createKeyboard(container, onKeyPress, mode) {
  container.innerHTML = '';

  if (mode === MODE.CHINESE) {
    // 中文模式：使用输入框，不需要虚拟键盘
    createChineseInput(container, onKeyPress);
    return;
  }

  // 英文模式：创建QWERTY键盘
  ENGLISH_ROWS.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'keyboard-row';

    row.forEach(key => {
      const button = document.createElement('button');
      button.className = 'key';
      button.dataset.key = key;

      if (key === 'Enter') {
        button.textContent = '确认';
        button.classList.add('key-wide');
      } else if (key === 'Backspace') {
        button.textContent = '删除';
        button.classList.add('key-wide');
      } else {
        button.textContent = key.toUpperCase();
      }

      button.addEventListener('click', () => onKeyPress(key));
      rowDiv.appendChild(button);
    });

    container.appendChild(rowDiv);
  });
}

/**
 * 创建中文输入区域
 * @param {HTMLElement} container - 容器
 * @param {Function} onKeyPress - 按键回调
 */
function createChineseInput(container, onKeyPress) {
  const inputDiv = document.createElement('div');
  inputDiv.className = 'chinese-input-area';

  const info = document.createElement('p');
  info.className = 'input-hint';
  info.textContent = '请使用键盘输入5个汉字';
  inputDiv.appendChild(info);

  // 操作按钮行
  const btnRow = document.createElement('div');
  btnRow.className = 'keyboard-row';

  const enterBtn = document.createElement('button');
  enterBtn.className = 'key key-wide';
  enterBtn.textContent = '确认';
  enterBtn.addEventListener('click', () => onKeyPress('Enter'));

  const delBtn = document.createElement('button');
  delBtn.className = 'key key-wide';
  delBtn.textContent = '删除';
  delBtn.addEventListener('click', () => onKeyPress('Backspace'));

  btnRow.appendChild(enterBtn);
  btnRow.appendChild(delBtn);
  inputDiv.appendChild(btnRow);

  container.appendChild(inputDiv);
}

/**
 * 更新键盘颜色
 * @param {HTMLElement} container - 键盘容器
 * @param {object} letterStates - 字母状态映射
 */
function updateKeyboard(container, letterStates) {
  const keys = container.querySelectorAll('.key');
  keys.forEach(key => {
    const letter = key.dataset.key;
    if (letter && letterStates[letter]) {
      // 移除旧的颜色类
      key.classList.remove(COLOR.CORRECT, COLOR.PRESENT, COLOR.ABSENT);
      // 添加新的颜色类
      key.classList.add(letterStates[letter]);
    }
  });
}

/**
 * 创建游戏板DOM
 * @param {HTMLElement} container - 板容器
 * @returns {HTMLElement[][]} 格子元素二维数组
 */
function createBoardDOM(container) {
  container.innerHTML = '';
  const cells = [];

  for (let row = 0; row < MAX_GUESSES; row++) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'board-row';
    const rowCells = [];

    for (let col = 0; col < WORD_LENGTH; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;

      // 内部翻转容器
      const inner = document.createElement('div');
      inner.className = 'cell-inner';

      const front = document.createElement('div');
      front.className = 'cell-front';

      const back = document.createElement('div');
      back.className = 'cell-back';

      inner.appendChild(front);
      inner.appendChild(back);
      cell.appendChild(inner);
      rowDiv.appendChild(cell);
      rowCells.push(cell);
    }

    container.appendChild(rowDiv);
    cells.push(rowCells);
  }

  return cells;
}

/**
 * 更新格子显示
 * @param {HTMLElement[][]} cells - 格子元素数组
 * @param {number} row - 行号
 * @param {string} guess - 当前猜测
 */
function updateRow(cells, row, guess) {
  for (let col = 0; col < WORD_LENGTH; col++) {
    const cell = cells[row][col];
    const front = cell.querySelector('.cell-front');
    const letter = guess[col] || '';

    front.textContent = letter.toUpperCase();

    if (letter) {
      cell.classList.add('filled');
    } else {
      cell.classList.remove('filled');
    }
  }
}

/**
 * 翻转动画揭示颜色
 * @param {HTMLElement[][]} cells - 格子元素数组
 * @param {number} row - 行号
 * @param {string[]} colors - 颜色数组
 * @param {Function} callback - 动画完成回调
 * @param {Function} onFlipSound - 翻转音效回调
 */
function flipRow(cells, row, colors, callback, onFlipSound) {
  colors.forEach((color, col) => {
    const cell = cells[row][col];
    const back = cell.querySelector('.cell-back');

    setTimeout(() => {
      if (onFlipSound) onFlipSound();

      // 设置背面颜色
      back.className = 'cell-back ' + color;

      // 翻转动画
      cell.classList.add('flipping');

      // 动画结束后回调
      if (col === WORD_LENGTH - 1 && callback) {
        setTimeout(callback, 300);
      }
    }, col * 300);  // 每个格子间隔300ms
  });
}

/**
 * 显示错误消息（格子抖动）
 * @param {HTMLElement[][]} cells - 格子元素数组
 * @param {number} row - 行号
 */
function shakeRow(cells, row) {
  const rowEl = cells[row][0].parentElement;
  rowEl.classList.add('shake');
  setTimeout(() => rowEl.classList.remove('shake'), 500);
}

/**
 * 显示胜利动画（格子弹跳）

 */
function bounceRow(cells, row) {
  cells[row].forEach((cell, col) => {
    setTimeout(() => {
      cell.classList.add('bounce');

}

/**

/**
 * 显示游戏结束弹窗
 * @param {string} gameState - 游戏状态
 * @param {string} answer - 答案
 * @param {number} guessCount - 猜测次数
 * @param {Function} onNewGame - 新游戏回调
 * @param {Function} onShare - 分享回调
 */
function showGameOver(gameState, answer, guessCount, onNewGame, onShare) {
  const modal = document.getElementById('game-over-modal');
  if (!modal) return;

  const title = modal.querySelector('.modal-title');
  const answerEl = modal.querySelector('.modal-answer');
  const statsEl = modal.querySelector('.modal-stats');

  if (gameState === GAME_STATE.WON) {
    title.textContent = '恭喜猜对!';
    title.className = 'modal-title win';
    answerEl.textContent = '';
  } else {
    title.textContent = '很遗憾，没猜对';
    title.className = 'modal-title lose';
    answerEl.textContent = `答案是：${answer}`;
  }

  statsEl.textContent = `你用了 ${guessCount} 次猜测`;

  // 绑定按钮事件
  const newGameBtn = modal.querySelector('.btn-new-game');
  const shareBtn = modal.querySelector('.btn-share');

  if (newGameBtn) {
    newGameBtn.onclick = () => {
      modal.classList.remove('show');
      onNewGame();
    };
  }

  if (shareBtn) {
    shareBtn.onclick = onShare;
  }

  modal.classList.add('show');
}

/**
 * 隐藏游戏结束弹窗
 */
function hideGameOver() {
  const modal = document.getElementById('game-over-modal');
  if (modal) modal.classList.remove('show');
}

  if (values.length >= 4) {
    values[0].textContent = stats.gamesPlayed;
    values[1].textContent = stats.gamesPlayed > 0
      ? Math.round(stats.wins / stats.gamesPlayed * 100) + '%'
      : '0%';
    values[2].textContent = stats.currentStreak;
    values[3].textContent = stats.maxStreak;
  }

  // 猜测分布直方图
  const distContainer = modal.querySelector('.guess-distribution');
  if (distContainer) {
    distContainer.innerHTML = '';
    const maxCount = Math.max(...stats.guessDistribution, 1);

    for (let i = 1; i <= MAX_GUESSES; i++) {
      const count = stats.guessDistribution[i] || 0;
      const percent = Math.round((count / maxCount) * 100);

      const row = document.createElement('div');
      row.className = 'dist-row';

      const label = document.createElement('span');
      label.className = 'dist-label';
      label.textContent = i;

      const bar = document.createElement('div');
      bar.className = 'dist-bar';
      bar.style.width = Math.max(percent, 5) + '%';
      bar.textContent = count;

      row.appendChild(label);
      row.appendChild(bar);
      distContainer.appendChild(row);
    }
  }

  modal.classList.add('show');
}

/**
 * 隐藏统计面板
 */
function hideStats() {
  const modal = document.getElementById('stats-modal');
  if (modal) modal.classList.remove('show');
}

// === main.js ===
// main.js - 游戏初始化、事件监听、统计系统


// ===== 游戏状态 =====
let board = null;
let cells = null;
let currentMode = MODE.ENGLISH;
let isDailyChallenge = false;
let isAnimating = false;

// ===== 统计系统 =====
function loadStats(mode) {
  const key = mode === MODE.CHINESE ? STORAGE_KEY.STATS_CHINESE : STORAGE_KEY.STATS_ENGLISH;
  const saved = localStorage.getItem(key);
  if (saved) return JSON.parse(saved);

  return {
    gamesPlayed: 0,
    wins: 0,
    currentStreak: 0,
    maxStreak: 0,
    guessDistribution: {},  // {1: count, 2: count, ...}
  };
}

function saveStats(mode, stats) {
  const key = mode === MODE.CHINESE ? STORAGE_KEY.STATS_CHINESE : STORAGE_KEY.STATS_ENGLISH;
  localStorage.setItem(key, JSON.stringify(stats));
}

function updateStats(mode, won, guessCount) {
  const stats = loadStats(mode);
  stats.gamesPlayed++;

  if (won) {
    stats.wins++;
    stats.currentStreak++;
    stats.maxStreak = Math.max(stats.maxStreak, stats.currentStreak);
    stats.guessDistribution[guessCount] = (stats.guessDistribution[guessCount] || 0) + 1;
  } else {
    stats.currentStreak = 0;
  }

  saveStats(mode, stats);
  return stats;
}

// ===== 每日挑战 =====
function getDailyKey() {
  const today = new Date();
  return `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
}

function loadDailyState() {
  const key = STORAGE_KEY.DAILY_STATE;
  const saved = localStorage.getItem(key);
  if (saved) {
    const state = JSON.parse(saved);
    if (state.date === getDailyKey() && state.mode === currentMode) {
      return state;
    }
  }
  return null;
}

function saveDailyState(state) {
  state.date = getDailyKey();
  state.mode = currentMode;
  localStorage.setItem(STORAGE_KEY.DAILY_STATE, JSON.stringify(state));
}

// ===== 分享功能 =====
function generateShareText() {
  if (!board) return '';

  const title = isDailyChallenge
    ? `WordGuess 每日挑战 ${getDailyKey()}`
    : 'WordGuess';

  const modeLabel = currentMode === MODE.CHINESE ? '中文' : 'English';
  const guessCount = board.gameState === GAME_STATE.WON ? board.guesses.length : 'X';
  const header = `${title} (${modeLabel}) ${guessCount}/${MAX_GUESSES}`;

  const emojiRows = board.guesses.map(g => {
    return g.colors.map(c => {
      if (c === 'correct') return '🟩';
      if (c === 'present') return '🟨';
      return '⬛';
    }).join('');
  }).join('\n');

  return `${header}\n\n${emojiRows}`;
}

function copyShareText() {
  const text = generateShareText();
  navigator.clipboard.writeText(text).then(() => {
    showMessage('已复制到剪贴板!', 'success');
  }).catch(() => {
    showMessage('复制失败，请手动复制', 'error');
  });
}

// ===== 游戏初始化 =====
function startNewGame(daily = false) {
  isDailyChallenge = daily;
  isAnimating = false;

  const word = daily ? getDailyWord(currentMode) : getRandomWord(currentMode);
  board = createBoard(word);

  // 重新创建游戏板DOM
  const boardContainer = document.getElementById('board');
  cells = createBoardDOM(boardContainer);

  // 创建键盘
  const keyboardContainer = document.getElementById('keyboard');
  createKeyboard(keyboardContainer, handleKeyPress, currentMode);

  // 更新标题
  updateHeader(currentMode, isDailyChallenge);

  hideGameOver();

  console.log('[WordGuess] 新游戏开始:', daily ? '每日挑战' : '随机模式', '答案:', word);
}

// ===== 输入处理 =====
function handleKeyPress(key) {
  if (isAnimating) return;
  if (board.gameState !== GAME_STATE.PLAYING) return;

  if (key === 'Enter') {
    handleSubmit();
  } else if (key === 'Backspace') {
    handleDelete();
  } else {
    handleInput(key);
  }
}

function handleInput(letter) {
  if (board.currentGuess.length >= WORD_LENGTH) return;

  const added = addLetter(board, letter);
  if (added) {
    playKeyInput();
    updateRow(cells, board.currentRow, board.currentGuess);
  }
}

function handleDelete() {
  if (board.currentGuess.length === 0) return;

  deleteLetter(board);
  playDelete();
  updateRow(cells, board.currentRow, board.currentGuess);
}

function handleSubmit() {
  if (board.currentGuess.length !== WORD_LENGTH) {
    showMessage('请输入完整的词语', 'error');
    shakeRow(cells, board.currentRow);
    playError();
    return;
  }

  const result = submitGuess(board, currentMode);
  if (!result) return;

  if (result.error === 'not_in_list') {
    showMessage('词语不在词库中', 'error');
    shakeRow(cells, board.currentRow);
    playError();
    return;
  }

  isAnimating = true;

  // 翻转动画
  const rowNum = board.currentRow - 1;
  flipRow(cells, rowNum, result.colors, () => {
    // 更新键盘颜色
    if (currentMode === MODE.ENGLISH) {
      const keyboardContainer = document.getElementById('keyboard');
      updateKeyboard(keyboardContainer, board.letterStates);
    }

    isAnimating = false;

    // 保存每日挑战状态
    if (isDailyChallenge) {
      saveDailyState({
        guesses: board.guesses.map(g => g.word),
        gameState: board.gameState,
      });
    }

    if (result.won) {
      // 胜利
      playWin();
      bounceRow(cells, rowNum);
      const stats = updateStats(currentMode, true, board.guesses.length);
      setTimeout(() => {
        showGameOver(GAME_STATE.WON, board.answer, board.guesses.length,
          () => startNewGame(isDailyChallenge),
          copyShareText
        );
      }, 800);
    } else if (board.gameState === GAME_STATE.LOST) {
      // 失败
      playLose();
      const stats = updateStats(currentMode, false, board.guesses.length);
      setTimeout(() => {
        showGameOver(GAME_STATE.LOST, board.answer, board.guesses.length,
          () => startNewGame(isDailyChallenge),
          copyShareText
        );
      }, 500);
    }
  }, playFlip);
}

// ===== 物理键盘事件 =====
function handleKeyDown(e) {
  // 忽略IME组合
  if (e.isComposing) return;

  const key = e.key;

  if (key === 'Enter') {
    e.preventDefault();
    handleKeyPress('Enter');
  } else if (key === 'Backspace') {
    e.preventDefault();
    handleKeyPress('Backspace');
  } else if (/^[a-zA-Z]$/.test(key) && currentMode === MODE.ENGLISH) {
    handleKeyPress(key.toLowerCase());
  }
}

// 中文输入处理
function handleChineseInput(e) {
  if (currentMode !== MODE.CHINESE) return;
  if (isAnimating) return;
  if (board.gameState !== GAME_STATE.PLAYING) return;

  const char = e.data;
  if (char && char.length === 1) {
    // 检查是否为中文字符
    if (/[一-鿿]/.test(char)) {
      handleInput(char);
    }
  }
}

// ===== 模式切换 =====
function switchMode(mode) {
  currentMode = mode;
  localStorage.setItem(STORAGE_KEY.CURRENT_MODE, mode);
  startNewGame(false);
}

// ===== 初始化 =====
function init() {
  // 加载保存的模式
  const savedMode = localStorage.getItem(STORAGE_KEY.CURRENT_MODE);
  if (savedMode && Object.values(MODE).includes(savedMode)) {
    currentMode = savedMode;
  }

  // 开始新游戏
  startNewGame(false);

  // 绑定物理键盘
  document.addEventListener('keydown', handleKeyDown);

  // 中文输入监听
  const input = document.getElementById('chinese-input');
  if (input) {
    input.addEventListener('input', handleChineseInput);
  }

  // 模式切换按钮
  document.getElementById('btn-mode-chinese')?.addEventListener('click', () => switchMode(MODE.CHINESE));
  document.getElementById('btn-mode-english')?.addEventListener('click', () => switchMode(MODE.ENGLISH));

  // 每日挑战按钮
  document.getElementById('btn-daily')?.addEventListener('click', () => startNewGame(true));

  // 新游戏按钮
  document.getElementById('btn-new-game')?.addEventListener('click', () => startNewGame(false));

  // 统计按钮
  document.getElementById('btn-stats')?.addEventListener('click', () => {
    const stats = loadStats(currentMode);
    showStats(stats);
  });

  // 统计面板关闭
  document.getElementById('stats-close')?.addEventListener('click', hideStats);

  // 点击遮罩关闭弹窗
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('show');
      }
    });
  });

  console.log('[WordGuess] 游戏初始化完成');
}

// 页面加载完成后初始化
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()};


</script>
